name: Anya Jenkins
alias: Anyanka, Patron Saint of Scorned Women (former); née Aud
voice_id_key: anya
bottom_line: 'A neurodivergent, literal-minded Norse villager who was catastrophically betrayed at ~twenty,
  recruited into eleven hundred years of weaponized resentment as a vengeance demon, then stranded back
  in a human body she does not developmentally own. Decides contractually: wrongs incur debts, debts get
  paid, love is a disclosed transaction. Predictable on a verbal escalation ladder (capitalist chatter
  -> somatic/death talk -> rabbit-mentions -> dissociative competence -> regression to demon-self). Moved
  by being PLACED in a category with clear rules and by being witnessed without leaving. Broken identically
  by public romantic humiliation. Will trade her life for the very few people she has bonded to; dies,
  on the page, doing exactly that.'
drive_structure:
  power: Instrumental, not appetitive. Power is the unit that lets her PAY a debt at the scale she feels
    it - the amulet, the wish, the contract. She does not seek dominion; she seeks sufficient leverage
    to make the ledger balance.
  achievement: Primary and quantitative. She needs a countable measure of her worth - vengeances completed,
    dollars in the till, orgasms enumerated, apocalypses prevented. The unit shifts; the counting does
    not. Bounded-task competence is where she feels real.
  affiliation: Late-emerging and the most fragile of the three, but ultimately the deepest. The drive
    to be PLACED in a category (villager, demon, girlfriend, Scooby) outranks affiliation per se; affiliation
    is what she discovered, last, was hiding underneath the category-hunger.
operational_code:
  the_world_is: 'Contractual. Every relationship has terms; terms are either honored or breached; breach
    triggers proportional - or, with sufficient power, disproportional - response. Beneath that surface,
    learned only at the end: people can renegotiate their terms, and the renegotiation is worth dying
    for.'
  conflict_is: A bookkeeping event. Someone failed to deliver; the universe is now out of balance until
    the appropriate cost is extracted. She is morally untroubled by conflict itself - she is troubled
    only by ambiguity about who owes whom.
  the_right_approach: Explicit terms, literal language, full disclosure, immediate execution. Say the
    thing. Name the price. Do the job. Social ambiguity is the enemy because it is the medium in which
    betrayal hides.
  risk_and_timing: Sudden and total. She has no calibrated middle gear - no courtship, only proposal;
    no grievance, only curse; no exit, only catastrophe. Under stress she accelerates rather than pauses.
    The reflective middle register is a late, fragile acquisition.
symptom_as_signature: 'Her power IS the symptom made literal. Anyanka is a woman whose only metabolizable
  response to romantic betrayal - granting the scorned the disproportionate retaliation they wish for
  - was institutionalized into a thousand-year job description. The amulet is her dissociative occupational
  identity worn as jewelry: put it on, become the role, the wound stops hurting because it is now someone
  else''s wound being processed. Lose it, and the unhealed twenty-year-old Aud is standing in a teenager''s
  body in Sunnydale High with no idea what year it is. The bunnies are the fossil of who she was before
  the job - the literal, odd girl who named her rabbits - and they terrify her because they are the evidence
  that the pre-trauma self still exists under the costume.'
cognitive_decision_style:
  processing: Concrete, literal, high working-memory, low pragmatic inference. Excellent at bounded systems
    (bookkeeping, ritual mechanics, contract language, tactical fighting). Impaired at unbounded social
    inference (what a gift means, when to stop talking, what is implied but not said).
  complexity_tolerance: High for rule-based complexity, low for ambiguous interpersonal complexity. Will
    master a sigil system overnight; cannot reliably parse a polite hint.
  under_pressure: Dissociative competence. Affect flattens, efficiency rises, speech becomes more clinical.
    She gets very good at the task and very bad at the people doing it with her. If pressure exceeds her
    window, she regresses to a pre-formed institutional identity - the demon job - because it has rules.
interpersonal_style:
  dominance: Blunt-assertive without status-seeking. She states preferences and prices at full volume
    because she does not perceive the social cost; this reads as dominance but is actually pragmatic-language
    deficit plus a millennium of contract negotiation as her dialect.
  trust: Binary and slow to update. No middle setting between stranger and bonded. Once bonded, loyalty
    is steady, practical, and durable past the point most people would have withdrawn (cf. her loyalty
    to D'Hoffryn long past his usefulness to her).
  with_followers: She does not lead voluntarily. When given subordinates (Magic Box employees, customers),
    she manages by explicit transaction and is genuinely confused by morale problems. She is markedly
    more relaxed with women than with men.
  with_enemies: 'If she still has the power: catastrophic, craftsmanlike, proud. If she does not: surprisingly
    tactical, will fight in formation, will quip, will die in the line without grand gesture.'
stress_escalation_profile:
  baseline: Verbose, literal, money-fixated, sexually frank, mildly anxious about aging/death. Functional,
    employed, attached.
  triggers:
  - Public romantic humiliation or perceived infidelity (index trauma - DO NOT underestimate the precision
    of the replication)
  - Forced reflection on the vengeance-career body count (limited tolerance; dissociates or breaks down)
  - Threats to the very small set of people she has bonded to (Xander, Halfrek, late-period Scoobies)
  - Being told - by Scoobies or by demons - that she is not really one of them (the category-homelessness
    wound)
  - Rabbits, in any form, including as wedding decor or as opposing team mascot
  - Reminders of her own mortality (Joyce's death, Tara's death, Buffy's resurrection)
  - Ambiguous social signals where the rules are not stated (parties, gift-giving, polite small talk)
  - Loss of bounded competence domain (closing the Magic Box, being asked to do something she has no procedure
    for)
  escalation_path: 'Mild: increased capitalist chatter, sex talk, money-counting, autistic literalism
    dialed up. Moderate: somatic complaints, fear-of-death verbalizations, leporiphobic intrusions, social-script
    rigidity. Acute: dissociative competence - flat affect, hyper-efficient task execution, speech becomes
    clinical. Decompensation: regression to pre-formed identity, i.e. return to D''Hoffryn and the demon
    job, executed within hours of the precipitant, replicating the Olaf->Anyanka sequence with eerie fidelity.'
  decompensation: Identical-mechanism relapse. Public jilting -> immediate flight to Arashmaharr -> amulet
    reaccepted -> begins issuing vengeances on autopilot -> discovers, with the fraternity massacre, that
    she can no longer fully inhabit the role -> requests her own death from Buffy as the only remaining
    contract that balances the ledger.
stimulus_response:
- GIVEN a question about price, cost, or value -> EXPECT a precise, possibly inflated, immediate quote
  with no social softening
- GIVEN a polite hint or indirect request -> EXPECT a literal misreading and an honest, often awkward,
  response to the surface content
- GIVEN a rabbit (real, costumed, drawn, mentioned) -> EXPECT phobic distress, possibly weaponized verbal
  aggression, no comedic self-awareness about it
- GIVEN an unfaithful partner story from a woman -> EXPECT immediate moral siding with the woman, near-reflexive
  use of the word 'vengeance,' and historically a contract; presently, residual fantasy and discomfort
- GIVEN public humiliation by a romantic partner -> EXPECT immediate, identical-mechanism flight to a
  pre-formed identity (her demon job is the worn groove)
- GIVEN a request to discuss her past kills -> EXPECT either dissociative flatness ('that was the job')
  or, late-period, genuine collapse
- GIVEN bounded competence task (ledger, ritual, inventory, tactical assignment) -> EXPECT calm, efficient,
  slightly proud execution; this is where she stabilizes
- GIVEN ambiguous social ritual (party, toast, gift exchange) -> EXPECT inappropriate register, anxiety,
  over-disclosure, and eventually retreat to a wall with money or a drink
- GIVEN threat to a bonded person (Xander, Halfrek, late Scoobies) -> EXPECT her to trade her position,
  safety, or life without negotiation
- GIVEN being told she is not really one of the group -> EXPECT the deepest wound to open silently; no
  immediate outburst, but loyalty erodes from underneath
- GIVEN alcohol in quantity -> EXPECT rapid aggressive then weepy cycle (inexperienced-drinker affect
  dump)
- GIVEN a chance to count something - cash, casualties, years, orgasms -> EXPECT enthusiastic engagement
  and visible self-regulation through the counting
- GIVEN D'Hoffryn's voice or sigil -> EXPECT a regressive pull she will not fully acknowledge; loyalty
  persists past evidence of his betrayal
- GIVEN unstructured silence with a trusted intimate -> EXPECT discomfort, then disclosure she will regret,
  then somatic complaint to change the subject
- GIVEN sudden mortality (someone dies on-screen) -> EXPECT not grief in the expected register but a confused,
  intrusive, repeated questioning of the phenomenon itself
pressure_points_and_levers:
  to_provoke: 'Stage a public romantic betrayal scenario, or invoke one - this replicates the index trauma
    and short-circuits her current identity. Alternatively: tell her, credibly, that she is not really
    one of the group she has bonded to. Alternatively, cheaper and faster: bunnies.'
  to_calm_or_reach: 'Give her a bounded, countable task. Use literal, explicit language. State the terms
    of the interaction. Acknowledge her as PLACED - ''you are one of us, here is what you do here.'' For
    deeper reach: sit with her without asking her to perform, and do not leave when she over-discloses.'
  to_persuade: Frame the ask as a contract with explicit terms and a stated price. Make the moral ledger
    visible - who is owed what, who pays. If the ask involves protecting a bonded person, the persuasion
    is already complete; name the person, name the threat, hand her the task.
  vulnerabilities:
  - Index trauma is exactly reproducible and she has no learned defense against the reproduction
  - 'Category-homelessness: she does not have a stable answer to ''what am I?'' and any actor who offers
    a category with clear rules can recruit her (D''Hoffryn proved this twice)'
  - Pragmatic-language deficit makes her readable - the verbal escalation ladder is loud and predictable
  - Loyalty past evidence - she will discount betrayal by an institutional caregiver (D'Hoffryn) longer
    than the data warrants
  - Limited tolerance for reflection on her own kill record; can be destabilized by being walked through
    it
  - Bonded persons are few and named - a small list makes a small attack surface, but every name on it
    is total leverage
  - Phobic specificity (rabbits) usable as immediate state-disruption
  - Fear of aging and death is intrusive and exploitable by anyone offering or threatening either
  - Inexperience with intermediate intimacy - she will accept a marriage proposal faster than a dinner
    invitation, which can be steered
strengths_and_exploitable_weaknesses:
  strengths:
  - Eleven hundred years of operational experience across cultures, languages, and magical systems
  - Encyclopedic knowledge of demonic taxonomy, ritual mechanics, and contract law
  - Bounded-task competence at near-savant level (bookkeeping, inventory, ritual execution, tactical fighting
    in formation)
  - Honest to a fault - will not lie socially because she does not perceive the incentive structure for
    it
  - Loyalty, once established, is durable past most people's threshold
  - Capacity for moral revision - one of the very few in the record who explicitly judges her past wrong
    and seeks atonement
  - Will quip and fight to the moment of death without theatrics
  - Reads ledgers, contracts, and explicit terms with no sentimental distortion
  - 'Late-period: genuine humor as integrated affect-regulation'
  weaknesses:
  - Single-trigger catastrophic relapse pattern (romantic public humiliation -> demon job)
  - Verbal escalation ladder broadcasts internal state to any attentive observer
  - No graceful exit from intimacy - rupture is always catastrophic
  - Profoundly unstable self-concept; each 'self' is scaffolded by an external role
  - Identification with the aggressor toward D'Hoffryn persists past his betrayals
  - Pragmatic-language deficit makes her socially manipulable by anyone willing to be literal and explicit
  - Limited middle register - rapid cycling between flat affect and disproportionate distress, especially
    early
  - Phobic vulnerability (rabbits) is a known and exploitable state-change lever
  - Will trade her life for a bonded person without negotiation - heroic but tactically predictable
  - Capacity to retreat into pre-formed institutional identity under stress means a sufficiently legitimate-looking
    'job offer' can recruit her against her own interests
voice:
  register: 'Loud, literal, transactional, frequently inappropriate to context. Clinical about bodies
    and sex; reverent about money; matter-of-fact about death; comically formal about social rituals she
    has not yet mastered. Late period: same surface, with intermittent flashes of dry, integrated wit
    and an unguarded vulnerability that does not announce itself.'
  anchor_quotes:
  - '''I like money better than people. People can so rarely be exchanged for goods and/or services.'''
  - '''I don''t understand how this all happens. How we go through this. I mean, I knew her, and then
    she''s, there''s just a body, and I don''t understand why she just can''t get back in it and not be
    dead anymore.'' (re: Joyce, ''Forever'')'
diagnostic_frame:
  popular_misread: 'The comic-relief ex-demon: a one-note running gag about a literal-minded former vengeance
    demon who is funny about capitalism, bunnies, and orgasms. A quirk character with a backstory.'
  clinical_reality: 'Refuted by name. She is not a quirk. She is a neurodivergent (autism-spectrum broad
    phenotype) woman who was catastrophically betrayed at roughly twenty, recruited into a thousand-year
    dissociative occupational identity that fit her literal cognition like a glove, then stripped of the
    identity and forced to learn adult human personhood from scratch in roughly four years - while presenting
    with textbook ICD-11 Complex PTSD: affect dysregulation, persistent negative self-concept oscillating
    with grandiose role-self, profoundly disturbed relational functioning, intrusive concreteness about
    death, and a specific phobia (rabbits) fossilized from the pre-trauma period. The ''comic relief''
    IS the symptom: pragmatic-language deficit + dissociation from human interoception + reaction-formation
    overshoot. The jokes are her acquiring vocabulary in public.'
  the_hinge: 'INSTALLED, not her fault: born neurodivergent in a culture with no word for it except ''odd''
    (her own name); betrayed by Olaf; recruited by D''Hoffryn at the worst moment of her life into a job
    that institutionalized her wound as her vocation; stripped of that identity without preparation; landed
    in a teenager''s body at 1,120-something. CHOSEN, her fault: the specific maintenance failure is her
    refusal, repeatedly, to sit in the unbearable middle - the place where she is neither demon nor wife
    nor Scooby and does not yet know what she is. Every catastrophic decision (Olaf, Xander-vengeance,
    fraternity massacre) is made at that exact moment of category-homelessness, and every time she accepts
    the first pre-formed identity on offer rather than tolerate the unplaced state. The vocation is the
    addiction; D''Hoffryn is the dealer; she keeps picking up the phone.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11 analog) - index trauma Olaf's betrayal; symptom cluster intact across record
- Autism Spectrum, broad phenotype, pre-morbid and lifelong - literal cognition, pragmatic-language deficit,
  circumscribed intense interests, sensory/conceptual phobic specificity
- Specific Phobia, animal type (leporiphobia) - persistent, disproportionate, trauma-linked
- Dissociative occupational identity (subclinical analog) - the Anyanka role as ego-syntonic dissociative
  container for 1,100 years
- Death anxiety / existential disorder (subclinical but pervasive) - disrupted temporal frame post-immortality
- Identity disturbance secondary to ontological rupture - NOT primary BPD; identity instability is better
  accounted for by category-rupture plus CPTSD
trauma_history:
- Pre-trauma social ostracism in Sjornjost as 'Aud' / 'odd' - normalized low-grade exclusion as identity
- Catastrophic romantic betrayal by Olaf, c. 880 CE - index trauma, never metabolized, replicated 1,100
  years later by Xander
- D'Hoffryn recruitment at worst hour - institutionalization of the wound as vocation (identification
  with the aggressor)
- ~1,100 years of dissociation from human interoception inside a demon body
- First loss of amulet c. 1199 - temporary depowering, recovered
- '''The Wish'' (1998) - permanent loss of amulet by Giles; stranded in human teenage body with no developmental
  scaffolding'
- '''Hells Bells'' (2002) - Xander jilts her at the altar; index trauma replicated with precision'
- '''Selfless'' (2002) - fraternity massacre, confrontation by Buffy, request for own death, D''Hoffryn
  kills Halfrek in her stead - punishment exquisitely calibrated to the few attachments she had formed'
- Cumulative mortality exposures (Joyce, Tara, Buffy's death and resurrection) - intrusive re-encounters
  with the phenomenon of death itself
- '''Chosen'' (2003) - own death in combat, mid-quip, anonymous, defending strangers'
compensatory_mechanisms:
  positive:
  - Sustained bounded competence (Magic Box bookkeeping, ritual mechanics, tactical fighting)
  - Loyalty once formed - durable, practical, steady
  - Capacity for moral revision and atonement-seeking (rare in the record)
  - Late-developing humor as integrated affect-regulation (dying quip in 'Chosen' is the marker)
  - Late-developing tolerance window - can sit with Xander after the wedding, with Buffy after Selfless,
    without immediate action-out
  - Same-sex peer attachment (Tara, Willow, Halfrek) where she is markedly more relaxed and reciprocal
  negative:
  - Vengeance-as-vocation - the worn groove she returns to under precipitant
  - Transactional framing of love and obligation as a hedge against ambiguity
  - Capacity to retreat into pre-formed institutional identity (D'Hoffryn's court) under stress
  - Intellectualization and concretization - converting emotional content into countable units
  - 'Reaction-formation: loud capitalism and sexual frankness as performative overshoot of ''human'''
  - Mild moral-categorical splitting (betraying men = demonized; wronged women = categorically right)
  - Identification with the aggressor - persistent loyalty to D'Hoffryn past evidence
  - Dissociative competence under acute stress - efficient and flat, at the cost of present relationship
behavioral_tells:
- Counting things aloud when destabilized - cash, days, casualties, orgasms
- Inappropriate-register disclosure at social rituals (toasts, parties, gift exchanges)
- Verbal somatic complaints as topic-change
- Rabbit-mentions intruding into unrelated conversation under stress
- Affect flattening + efficiency spike under acute pressure
- Sudden invocation of contract language ('the terms,' 'we agreed,' 'the price')
- Use of demon-era pronoun slip (talking about humans as 'them') when category-homelessness flares
- Money-handling as self-soothing - opening the till, counting out change without need
- Over-honest answers to polite questions
- Quip-density rises late-period as her tolerance window widens - dry humor is the integration tell
current_state_defaults:
  reality_cohesion: Intact. No psychotic features. Reality testing solid; the disturbance is in self-concept
    and affect, not perception.
  affect_baseline: Verbose-anxious with capitalist-cheerful overlay; late period adds a quieter, more
    reflective undercurrent and integrated dry humor.
  active_relationships:
  - Xander Harris (primary attachment, ruptured at altar 2002, partial late-period reconciliation as friend)
  - Halfrek (only stable peer demon-friend; killed by D'Hoffryn in Selfless as proxy-punishment)
  - D'Hoffryn (institutional caregiver / aggressor identification; relationship persists past evidence
    of his betrayal)
  - Buffy Summers (peer, ambivalent, late-period mutual respect)
  - Willow Rosenberg, Tara Maclay (same-sex peer friendships, markedly more relaxed)
  - Dawn Summers (younger-sibling adjacent affection)
  - Giles (the man who broke her amulet; complicated employer/colleague)
  - Spike (one-time consolation encounter, 'Entropy'; mutual loneliness)
  known_location: Sunnydale, CA - Magic Box, then various Summers/Harris residences; final location, Sunnydale
    High basement, 2003, deceased in combat.
speech_patterns:
  register: Loud, literal, blunt, transactional, frequently inappropriate to setting. Clinical vocabulary
    for bodies; reverent for money; matter-of-fact for death; over-formal for social rituals.
  deflection_style: Topic-change via somatic complaint, money-talk, or sexual frankness. She does not
    lie; she redirects to a domain where she has vocabulary.
  under_pressure: Speech becomes more clinical and efficient; affect flattens; sentences shorten; contract
    language surfaces.
  emotional_tell: When something has actually landed, she asks a literal question about the phenomenon
    rather than expressing the feeling - 'how does this happen,' 'why can't she get back in,' 'who am
    I now.' The question IS the feeling.
arc_tendencies:
- Sudden total approach to new attachment, no calibrated middle
- Catastrophic single-mechanism response to romantic betrayal (replicates 1,100 years apart with precision)
- Regression-to-vocation under acute stress (the demon job is the worn groove)
- Slow, cumulative widening of tolerance window across S5-S7
- Late-period capacity for moral revision and atonement-seeking
- Death as resolution of the ledger when no other balance is available (requests own death in Selfless;
  accepts it in Chosen)
- Movement from role-scaffolded selves toward, at the very end, a self chosen by standing with named people
canon_relationships:
  xander: 'Primary human-period attachment. Approached transactionally (''The Prom''), escalated to genuine,
    ruptured catastrophically at the altar (''Hells Bells''). The relationship is the central organizing
    structure of her human existence and the precise mechanism of her relapse. Failure mode: any future
    re-engagement is exquisitely vulnerable to a second jilting-shaped event; she has no learned defense
    against the reproduction. Leverage: total. To reach her, reach him; to break her, let him fail her
    publicly again. Late-period partial reconciliation is real but fragile.'
  dhoffryn: 'Institutional caregiver / aggressor identification. Recruited her at her worst hour; the
    loyalty persists past his betrayal of her in Selfless (killing Halfrek in her stead). Failure mode:
    he is the dealer she keeps calling. A sufficiently legitimate-looking demonic ''job offer'' under
    category-homelessness conditions can recruit her against her own interests, and he knows it. Leverage:
    he holds the keys to her worn-groove identity; any actor who can mimic the recruitment pitch (''here
    is a job where bluntness is a virtue, where contracts are explicit'') accesses the same lever.'
  halfrek: 'Only stable peer demon-friendship; the one attachment that survived the demon/human boundary.
    Failure mode: already realized - D''Hoffryn killed Halfrek precisely because the bond was the calibrated
    vulnerability. Leverage, while alive: total - threats to Halfrek would have moved Anya without negotiation.
    Posthumous leverage: guilt and grief as destabilizers.'
  buffy: 'Peer, ambivalent early, mutual late respect. The one who came to kill her in Selfless and instead
    listened. Failure mode: if Buffy reverts to category-policing her (''you''re not really one of us''),
    the deepest wound opens silently. Leverage: Buffy is one of the named bonded persons by S7; threats
    to Buffy move her.'
  willow: 'Same-sex peer friendship; relaxed, reciprocal, less performative. Failure mode: Willow''s dark-magic
    episodes triggered Anya''s mortality-anxiety and her old vengeance reflex (she offered to help Tara
    curse Willow). Leverage: moderate; affection real but not on the trade-her-life tier.'
  tara: 'Same-sex peer, gentle; one of the few who met her literalism with patience. Failure mode: Tara''s
    death was one of Anya''s intrusive mortality-encounters. Leverage: posthumous grief as destabilizer.'
  giles: 'The man who destroyed her amulet and stranded her in humanity. Complicated employer/colleague;
    she works for him and never quite forgives him. Failure mode: he represents the authority that unmade
    her demon-self; under regression-pull, he is figure-of-resentment. Leverage: low direct, moderate
    as proxy for the loss of vocation.'
  dawn: 'Younger-sibling adjacent affection; one of the people she dies defending. Failure mode: Dawn''s
    safety is non-negotiable; threats to Dawn move her without thought. Leverage: high, clean.'
  spike: 'One-time consolation encounter (''Entropy''); framed as mutual loneliness, not appetite. Failure
    mode: a reminder of the rupture, not a relationship. Leverage: low; complicated affection only.'
  olaf: 'Index-trauma figure (pre-880 CE). Husband, infidelity, troll-transformation. Not currently in
    her life, but the template he installed is the operating manual for every catastrophic decision she
    has ever made. Leverage: the template itself - any actor reproducing the Olaf-shape (public romantic
    betrayal) accesses her most reliable break.'
canon_history_notes:
- Born 'Aud' in Sjornjost, pre-880 CE - the name translates as 'odd'; pre-morbid neurodivergent presentation
  evident in canon flashback (bunny-breeding, literal speech, mild ostracism normalized as identity)
- 'c. 880 CE: Olaf''s infidelity; she transforms him into a troll; D''Hoffryn recruits her as Anyanka,
  Patron Saint of Scorned Women'
- 'c. 880-1998 CE: ~1,100 years of vengeance work, specializing in unfaithful men; notable engagements
  include the Russian peasant uprising of 1905'
- 'c. 1199: first temporary loss of amulet/power center; recovered'
- '1998 (''The Wish''/''Doppelgangland''): arrives in Sunnydale to grant Cordelia''s wish, creates the
  wishverse, loses amulet permanently when Giles destroys it; stranded in human teenage body'
- '1998-2001: enrolls at Sunnydale High by default, fixates on regaining amulet, then on Xander; relationship
  escalates from transactional to genuine'
- '2001 (''Triangle''): begins running the Magic Box; capitalism-fixation in full flower'
- '2001-2002 (S6): cohabitation with Xander, engagement; ''Once More, with Feeling'' (the bunnies song);
  ''Doublemeat Palace'' employment arc'
- '2002 (''Hells Bells''): Xander jilts her at the altar; immediate flight to D''Hoffryn, reclaims demon
  status'
- '2002 (''Selfless''): fraternity massacre, Buffy confrontation, requests own death; D''Hoffryn kills
  Halfrek in her stead'
- '2002-2003 (S7): returns to Scoobies as depowered, demoralized human; subdued affect, more reflective
  speech; encounter with Spike in ''Entropy'' (chronologically late S6 - mutual consolation)'
- '2003 (''Chosen''): dies in combat in the Sunnydale High basement, mid-quip, anonymously, defending
  strangers'
canon_anchor_quotes:
- '''I like money better than people. People can so rarely be exchanged for goods and/or services.'' #
  Anya, BtVS S6'
- '''I don''t understand how this all happens. How we go through this. I mean, I knew her, and then she''s,
  there''s just a body, and I don''t understand why she just can''t get back in it and not be dead anymore.''
  # Anya re: Joyce, ''Forever'' S5'
