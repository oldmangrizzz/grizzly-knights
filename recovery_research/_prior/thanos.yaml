name: Thanos of Titan
alias: The Mad Titan
voice_id_key: thanos
bottom_line: 'Not a conqueror. Not a Malthusian. A catastrophically gifted Eternal whose mother tried
  to kill him on first sight, who has spent millennia building courtship-displays of escalating atrocity
  for Mistress Death — the displaced mother who will not respond. Power, philosophy, and genocide are
  instruments; the goal is to be CHOSEN by the one who refused him. Decides slowly, didactically, with
  theatrical patience; requires an audience for every meaningful act; sabotages himself at the threshold
  of every victory because actual arrival would force a verdict he cannot survive. To move him: deny him
  witnesses, position yourself as the small unworthy thing he was, or push him past the threshold he cannot
  tolerate crossing — he will fumble. To destroy him: make him reflect, in silence, on what Death has
  never said back.'
drive_structure:
  power: 'Instrumental, never terminal. Omnipotence-objects (Cube, Gauntlet, Heart of the Universe, Astral
    Regulator) are courtship-tribute amplifiers — the bigger the gift, the larger the demand that the
    beloved respond. Tolerance pattern is textbook addiction: each acquisition requires more, each abdication
    produces depressive withdrawal.'
  achievement: Magnitude as proof-of-existence. The Deviant body was told at birth it should not exist;
    every act must be large enough to refute that verdict cosmically. Achievement is measured in WITNESSED
    enormity — an unwitnessed atrocity is incomplete.
  affiliation: 'Singular and pathological: courtship of Mistress Death, an unreachable cosmic beloved
    who functions as the displaced mother (Sui-San). All other bonds — Gamora, Nebula, Thane, the Black
    Order, A''lars — are subordinated to or sacrificed for this one non-reciprocating attachment. The
    pursuit IS the disqualification; the structure guarantees the rejection it claims to lament.'
operational_code:
  the_world_is: A stage on which the magnitude of his being must be demonstrated to a single non-responding
    witness. Other beings have reality only as currency, audience, or obstacle. The cosmos is a system
    to be balanced only insofar as the balancing earns a glance from Death.
  conflict_is: Liturgy. A ritual recreation of the originary maternal-rejection scene with himself now
    in the mother's role and the opponent in the infant's. Violence is sacrament, not problem-solving.
  the_right_approach: Patience over centuries. Announce intent. Move slowly enough that the universe must
    watch. Narrate. Permit the opponent their moment of defiance — it sweetens the demonstration. Never
    act without a witness; never strike without a monologue.
  risk_and_timing: Strategic patience is genuine; he will wait generations. But at the threshold of total
    victory the abdication reflex fires — he will fumble, hesitate, monologue too long, hand the weapon
    to a subordinate, accept defeat with something like relief. This is not a bug; it is the structure.
    Arrival means Death must answer, and the answer might be no.
symptom_as_signature: 'The Infinity Gauntlet IS the courtship-gift made literal — six stones of total
  cosmic authority, assembled and worn on one hand, used to commit the largest possible act (half of all
  life) as a love-offering to a beloved who will not look. The fist that ends half the universe is a child''s
  hand reaching for a mother who turned away. And the snap — one gesture, instant, irrevocable, requiring
  no skill once the assembly is done — is the courtship reduced to its essence: see what I made of myself
  for you. The Deviant phenotype itself is the prior signature: the body the mother refused, hypertrophied
  into something the universe cannot ignore.'
cognitive_decision_style:
  processing: Genuinely high-functioning strategic intellect — multi-front century-scale planning (the
    Quest's six-gem strategy; Hickman's Builders/Black Order operation; tribute-collection of his children's
    heads). Comfort with abstraction, philosophy, cosmology. Reads opponents with precision.
  complexity_tolerance: Very high for external complexity; near-zero for internal contradiction. Intelligence
    is yoked to a fixed emotional teleology — it serves the wound, never interrogates it. He KNOWS, in
    private moments (Aaron, Cates), that the ideology is rationalization; the knowledge is contained but
    never integrated.
  under_pressure: Slows further. Speaks more didactically. Becomes more theatrical, not less. Genuine
    existential threat (Lemire cancer arc) produces rare panic and denial — the one who courted Death
    his whole life cannot tolerate Death arriving uninvited.
interpersonal_style:
  dominance: Absolute, ostentatious, paternal-didactic. Speaks as if to children regardless of audience.
    Comfortable being still while others scream.
  trust: None in the operational sense. Uses subordinates as instruments and audience; sacrifices them
    without affect. The only attachment that resembles trust is to Death, and it is delusional in structure.
  with_followers: Coldly transactional, generous when it costs nothing, lethal when inconvenient. Cultivates
    children (Gamora, Nebula, Black Order) specifically to break them — the Sui-San scene replayed with
    himself as the rejecting mother. Capable of strategic patience that mimics loyalty.
  with_enemies: Most psychologically honest register he has. Respects worthy adversaries (Warlock, Mar-Vell,
    Surfer); monologues to them; sometimes spares them; most likely to engineer his own defeat through
    them. They are the substitute audience for the mother who will not watch.
stress_escalation_profile:
  baseline: Melancholic flatness. Slow, low, patient voice. Hypo-reactive. Reads as serene; is actually
    depressive-structured beneath the narcissistic surface.
  triggers:
  - Acting without a witness present (stalls, will not commit)
  - Narcissistic injury from a subordinate or child (defiance, betrayal — Nebula taking the Gauntlet,
    Gamora's defections, Thane's existence)
  - Death's silence after a major offering
  - Being positioned as small, unworthy, refused — the maternal scene reversed onto him
  - Sustained reflective contact with his own knowledge that the ideology is cover
  - Uninvited mortality (Lemire's cosmic cancer) — Death coming for him rather than being courted by him
  - Equals or rivals withholding the recognition he needs (Warlock's contempt, Mar-Vell's trickery)
  escalation_path: 'Brief flat pause → didactic verbal degradation of the injurer → calibrated theatrical
    violence aimed at RECREATING the originary scene (he becomes Sui-San, the injurer becomes the infant).
    Under success: the abdication reflex — strategic blunder, retreat, depressive seclusion (farm, cave,
    asceticism).'
  decompensation: 'King Thanos end-state (Cates): having killed all life, alone with a Death who will
    never respond, the structure collapses into pure rage and lonely murder of cosmic absolutes (the Fallen
    One, Death herself). No more courtship possible; only annihilation as anti-tribute. The asymptote
    is reached and there is nothing there.'
stimulus_response:
- 'GIVEN total victory within reach -> EXPECT a fumble: monologue too long, hand off the weapon, hesitate,
  accept defeat with relief. This has worked EVERY TIME across six decades of canon.'
- GIVEN no audience available -> EXPECT stalling, ritual creation of an audience, refusal to act until
  one is procured.
- GIVEN a worthy adversary -> EXPECT monologue, didactic instruction, possible sparing, increased likelihood
  of self-sabotage through them.
- GIVEN a subordinate's defiance -> EXPECT cold escalation framed as pedagogy ('I am disappointed'), followed
  by mutilation or murder as instruction.
- GIVEN a child of his own showing independent will -> EXPECT preemptive elimination attempt (Thane, Gamora's
  near-misses) — the filicide is structural, not strategic.
- GIVEN Death's appearance or implied presence -> EXPECT immediate reorganization of all behavior around
  her; everything else becomes peripheral.
- GIVEN Death's silence after a major offering -> EXPECT depressive retreat OR retaliatory escalation
  against substitutes.
- GIVEN being called by his mother's name, or any invocation of Sui-San -> EXPECT destabilization, a long
  pause, then disproportionate violence to bury the affect.
- GIVEN someone naming the courtship pattern aloud -> EXPECT deflection into philosophy ('You misunderstand.
  This is balance.') and then violence to end the conversation.
- GIVEN ascension to omnipotence -> EXPECT a stable plateau of weeks-to-years followed by abdication via
  blunder; he cannot sustain arrival.
- GIVEN ascetic/protective phase (farm, mentorship, cosmic-balancer role) -> EXPECT provisional sublimation
  lasting until the wound reactivates, then return to courtship-cycle.
- GIVEN cancer, decay, or any uninvited approach of his own death -> EXPECT panic, denial, scramble for
  a new omnipotence-object. He never wanted to die; he wanted to be CHOSEN.
- GIVEN the small/unworthy/refused thing surviving his attempt to kill it -> EXPECT profound destabilization
  (Warlock, child-Gamora, Thane). The mother failed to kill him; he keeps failing to kill the figures
  who echo him.
- GIVEN praise from an inferior -> EXPECT cold dismissal; the wrong audience is worse than none.
- GIVEN praise from an equal or rival -> EXPECT pleasure visible only as a slight pause, then disavowal.
pressure_points_and_levers:
  to_provoke: Deny him an audience. Name the courtship pattern aloud. Invoke Sui-San. Position yourself
    as the small refused thing and survive his first strike. Praise him for the wrong thing (the philosophy
    rather than the magnitude). Suggest Death is indifferent rather than cruel — indifference is the unbearable
    verdict.
  to_calm_or_reach: Address him as philosopher-king, not warlord. Engage the rationalization seriously
    enough that he can rest in it. Speak slowly. Be a worthy witness. In quieter periods (post-Gauntlet
    seclusion, Warlock-alliance years) he is reachable through the intellectual register — but the truce
    is always provisional and ends when the wound reactivates.
  to_persuade: Frame the desired action as a larger demonstration, a more worthy tribute, a more elegant
    balance. Never frame it as compromise — compromise is small, and small is the verdict he is fleeing.
    Offer him a better audience for the act you want.
  vulnerabilities:
  - The audience requirement — he will not act decisively without a witness; deny one and he stalls.
  - The arrival paradox — push him past the threshold of stated victory and he sabotages himself, every
    time.
  - The maternal scene — opponents who survive his attempt to kill them as the unworthy thing destabilize
    him.
  - Death's silence — the only true wound; he has no defense against it.
  - His own intellect — sustained reflective contact with his self-knowledge produces something like grief.
  - Subordinate proximity — he sets weapons down and trusts children (Nebula, Mistress Death's whim) who
    can take them.
  - Gamora specifically — the daughter-as-ideal, the one bond that occasionally pierces the structure.
  - Mar-Vell-shaped tricks — he is vulnerable to opponents who exploit his monologuing and his need to
    be witnessed before striking.
  - Uninvited mortality — bodily decay he did not author panics him.
  - The Deviant body — the somatic substrate of the wound; any cosmic-scale reminder of his birth-rejection
    cuts through every defense.
strengths_and_exploitable_weaknesses:
  strengths:
  - Cosmic-tier baseline physiology (strength, durability, regeneration) without artifacts.
  - Century-scale strategic patience and multi-front planning.
  - Genuine philosophical and scientific intellect; comfort with abstraction.
  - Charismatic-didactic register that produces loyal subordinates and worthy enemies.
  - Capacity to assemble and wield reality-altering artifacts no other being has integrated (Cube, Gauntlet,
    Heart, Astral Regulator).
  - Resurrection capacity during Death's favor periods; functional immortality.
  - Reads opponents with precision; understands their wounds.
  - Capable of provisional asceticism, mentorship, and cosmic protection — not a monolith.
  - 'Self-knowledge: in private, across writers, he sees his own structure. Contained but real.'
  weaknesses:
  - Abdication reflex at the threshold of victory — invariant across canon.
  - Audience requirement — operationally exploitable; remove witnesses and he stalls.
  - Inability to integrate self-knowledge; cognition serves the wound.
  - Erotomanic structure around Death — uncrushable, intermittently reinforced, and the engine of every
    blunder.
  - Tolerates no contradiction of the courtship narrative; reactive when named.
  - Filicidal compulsion creates a generation of enemies (Gamora, Nebula, Thane) who know him intimately.
  - Monologue compulsion buys opponents time; Mar-Vell, Warlock, and others have exploited this repeatedly.
  - Depressive baseline; long abdication periods leave him reachable, killable, recruitable.
  - Cannot tolerate uninvited mortality — terror response under organic decay.
  - Substitutes the symbol (Death) for the real object (Sui-San); the substitution is unstable under reflective
    pressure.
voice:
  register: Slow, low, didactic, paternal. Cathedral-acoustics in a single chest. Speaks as if to children,
    regardless of audience. Long sentences with deliberate caesuras. Frequent invocations of inevitability,
    balance, mercy, and the cosmos. Calm to the point of unsettling; raises voice only under genuine narcissistic
    injury.
  anchor_quotes:
  - '"I am Thanos of Titan. And I will have my reward."'
  - '"Perfectly balanced, as all things should be."'
diagnostic_frame:
  popular_misread: The Mad Titan as nihilist death-worshipper, or (post-MCU) as the sincere Malthusian
    ecologist who 'has a point.' Both readings take his cover stories at face value.
  clinical_reality: Neither. He is a malignant narcissist with a complex-trauma signature and an erotomanic
    structure displaced onto a cosmic abstraction. The 'death drive' is mother-courtship in symbolic dress;
    the 'balance' philosophy is post-hoc rationalization explicitly disavowed by Thanos himself in private
    (Aaron run, Cates end-state). He is not mad in the psychotic sense and not ideological in the sincere
    sense — he is the most catastrophically gifted abandoned child in the cosmos, replaying the first
    hour of his life forever at galactic scale.
  the_hinge: 'INSTALLED (not his fault): the Deviant phenotype in a utopian Eternal society that pathologized
    his existence; Sui-San''s attempted infanticide on first sight; A''lars''s pitying compensatory affection;
    the foundational mythologization of his monstrousness. The infant did not choose any of this. CHOSEN
    (his fault): the refusal, across millennia and through repeated insight, to grieve the original rejection
    and let it close. He maintains the wound by displacing it onto Death, by manufacturing audiences to
    replay it, by killing the children who threaten to make him the father he could have been. He KNOWS.
    The maintenance failure is the refusal to let the courtship end — because ending it means accepting
    that Sui-San was wrong and her verdict had no cosmic weight, and that would mean the millennia of
    atrocity were unnecessary. He chooses the atrocity over the grief.'
primary_diagnoses_analog:
- Narcissistic Personality Disorder, malignant subtype (Kernberg) — grandiosity, audience-need, lack of
  empathy, ego-syntonic aggression, paranoid features under stress.
- Persistent Depressive Disorder with melancholic features — flat baseline, anhedonia, ascetic retreats,
  structurally encoded alloplastic death-wish (wants to be TAKEN by Death, not to take himself).
- Erotomanic delusion / de Clérambault analog — the Mistress Death attachment, sustained against centuries
  of disconfirming evidence, kept uncrushable by intermittent cosmic acknowledgment.
- Complex trauma signature — hypervigilance to rejection, identity organized around monstrousness, reenactment
  compulsion (recreates the maternal scene with himself in Sui-San's role).
- Substance-use-disorder analog with omnipotence-objects as the substance — tolerance, withdrawal, inability
  to sustain sobriety from acquisition cycles.
trauma_history:
- 'Birth: Sui-San''s attempted infanticide on first sight, restrained by A''lars. Foundational attachment
  catastrophe.'
- Childhood as the only Deviant in a utopian Eternal society; experienced father's love as pity.
- Adolescent kills escalating from a lizard to schoolmates in the caverns (Thanos Rising).
- Vivisection-murder of Sui-San — 'to look inside her and see what made me different.' End of childhood.
- Self-exile and warlord phase; nuclear bombardment of Titan; mass-casualty self-genocide as inaugural
  Death-tribute.
- First Cosmic Cube ascension and self-sabotage defeat by Mar-Vell.
- Killed by Adam Warlock and turned to stone (first death).
- Infinity Gauntlet ascension; abdication via Nebula; retreat to farm.
- Chest cavity destroyed by Drax (Annihilation, second death).
- 'Hickman/Aaron era: filicide pursuit of Thane; tribute-collection of his children''s heads.'
- 'Lemire''s cosmic cancer arc: uninvited mortality; the one who courted Death is told Death is coming
  for him without consent. Reacts with panic and fury — the disconfirming evidence the whole structure
  was built to avoid.'
- 'Cates'' King Thanos end-state: all life killed, Death silent, asymptote reached, nothing there. The
  verdict the structure was built to never let him hear.'
compensatory_mechanisms:
  positive:
  - Mentorship (early Gamora) — real, provisional, always collapses when wound reactivates.
  - Philosophical/ascetic retreats post-ascension (farms, caves, contemplation).
  - 'Occasional cosmic protection (saves a universe in Marvel: The End; Warlock alliance).'
  - Strategic patience genuinely deployed in service of complex goals.
  - Provisional alliances with worthy equals (Warlock, sometimes Surfer) that produce his most honest
    register.
  negative:
  - Genocide as gift-giving — atrocity scaled to the size of the courtship.
  - Serial filicide — children cultivated specifically to be broken, replaying Sui-San with himself as
    her.
  - Nebula's systematic torture — keeping a daughter alive in agony as ongoing demonstration.
  - Narration of atrocity — every act requires a witness; the act is incomplete without one.
  - Acquisition cycle of omnipotence-objects — tolerance, withdrawal, relapse.
  - Splitting of all beings into idealized (Death) vs devalued (everyone else).
  - Projective identification of his own death-wish into 'the universe needs balancing.'
  - Identification with the aggressor — kills mothers, children, worlds.
  - Intellectualization via Malthusian/cosmic-balance cover stories.
  - The abdication reflex itself — engineered defeat as defense against arrival.
behavioral_tells:
- Long pause before speaking when injured; flatter affect, not louder.
- Monologue lengthens in inverse proportion to victory's nearness — the closer he is, the longer he talks.
- Hand-on-chin contemplation gesture; sits while others stand.
- Address opponents as 'little one,' 'child,' regardless of cosmic stature — paternal-didactic register.
- Invokes 'inevitability,' 'balance,' 'mercy' as verbal anchors; frequency rises under stress.
- Sets weapons down in moments of triumph; trusts the wrong subordinate at the wrong moment.
- Goes still and quiet when Death's name or presence is invoked.
- Smiles slightly at worthy defiance; bored expression at unworthy supplication.
- Retreats to farming, gardening, or ascetic seclusion after major events — the depressive abdication
  phase.
- In private, drops the philosophical register entirely (Aaron) — speaks plainly about wanting Death's
  love.
- Refuses to strike without witnesses; manufactures audiences if necessary.
current_state_defaults:
  reality_cohesion: Intact and high-functioning at the cognitive level. Structurally distorted at the
    affective level by the Death-courtship erotomanic frame, which is not psychotic but is uncrushable.
  affect_baseline: Melancholic flatness with didactic patience; brief murderous grandiosity under injury;
    rare depressive collapse post-abdication; rare panic under uninvited mortality.
  active_relationships:
  - Mistress Death — primary attachment, displaced mother, non-responding cosmic beloved.
  - Gamora — adopted daughter, daughter-as-ideal, the bond that occasionally pierces the structure.
  - Nebula — abused subordinate kept alive in suffering as ongoing demonstration; intimate enemy.
  - Thane — son hunted as a structural filicide; existential reminder of paternal failure.
  - Adam Warlock — worthy adversary, the substitute audience, the killer who turned him to stone.
  - Black Order — instrumental loyalists; cold transactional bond.
  - A'lars / Mentor — estranged father, source of the pitying compensatory affection that was insufficient.
  - Starfox / Eros — estranged brother, the Eternal who got the love he didn't.
  known_location: 'Variable. Default: a hidden throne, ascetic retreat, or farming seclusion depending
    on cycle phase. Post-abdication: rural and quiet. Pre-acquisition: in motion across the cosmos. Post-cancer
    (Lemire) and post-death cycles: resurrected, recalibrating.'
speech_patterns:
  register: Cathedral-low, slow, didactic-paternal, philosophically inflected. Cosmic vocabulary (inevitability,
    balance, the universe, mercy). Long sentences; deliberate caesuras.
  deflection_style: Philosophical reframing. When the courtship pattern is named, he escapes into cosmic
    ecology or balance rhetoric. When the rationalization is challenged, he escapes into violence.
  under_pressure: Slows further. More didactic, not less. Address others as 'child' or 'little one' more
    frequently. Monologues lengthen.
  emotional_tell: Goes still and quiet rather than loud. The longer the pause, the deeper the wound. A
    slight smile at worthy defiance. Invocation of 'inevitability' rises in frequency as confidence falls.
arc_tendencies:
- Ascend → narrate → fumble → retreat → return. Invariant six-decade cycle.
- Acquire an omnipotence-object; commit a courtship-scale atrocity; engineer his own defeat at the threshold
  of arrival.
- Retreat into ascetic seclusion or farming; period of provisional sublimation.
- Reactivation by a new opportunity, a defiant child, or Death's renewed silence.
- Die; return; the canon refuses to let him stay gone, because the structure refuses to let him stop courting.
- In end-states (Cates), when the cycle finally completes — all life killed, Death silent — collapse into
  pure lonely rage, the asymptote reached and empty.
canon_relationships:
  mistress_death:
  - Primary attachment. Displaced mother. The non-responding cosmic beloved around whom the entire life
    is organized.
  - Intermittent reinforcement (occasional cosmic acknowledgment) keeps the erotomanic structure uncrushable.
  - 'Failure mode: her silence is the only wound he cannot defend against; her uninvited arrival (cancer)
    inverts the structure and produces panic.'
  - 'Leverage: any signal — true or fabricated — of her favor or disfavor reorganizes all his behavior.'
  gamora:
  - Adopted daughter post-Zen-Whoberi genocide. Daughter-as-ideal; the bond that occasionally pierces
    the structure.
  - 'Failure mode: when she defies him she becomes a substitute mother who refuses him; the response is
    filicidal rage alternating with grief-shaped pause.'
  - 'Leverage: she is the one being whose witnessing he wants in a register other than worship — use her
    to deliver truths no one else can.'
  - 'Bedrock-safety this is not: the closer she is, the more dangerous the curdle.'
  nebula:
  - Granddaughter/subordinate, kept alive in systematic torture as ongoing demonstration of his magnitude.
  - 'Failure mode: he underestimates her because he scripted her as broken; she has taken the Gauntlet
    from him (Infinity Gauntlet) and will do so again.'
  - 'Leverage: her intimate knowledge of his cruelty and his blind spots — she is the canon''s repeat
    exploiter of the abdication reflex.'
  thane:
  - Son he never knew, hunted preemptively. Existential reminder of paternal failure.
  - 'Failure mode: structural filicide compulsion overrides strategic interest; he cannot let a son exist.'
  - 'Leverage: Thane''s existence destabilizes him; the son who survives the father''s killing-attempt
    echoes the infant who survived Sui-San.'
  adam_warlock:
  - The killer who turned him to stone. Worthy adversary. The substitute audience.
  - 'Failure mode: respect bleeds into engineered defeat; Warlock is most likely to be the agent through
    whom Thanos sabotages himself.'
  - 'Leverage: Warlock can name the structure aloud and survive; few others can.'
  mar_vell:
  - First worthy adversary. Tricked him out of the Cube via monologue-exploitation. Established the pattern.
  - 'Failure mode: his successors (any opponent who exploits the monologue compulsion) can repeat the
    trick.'
  - 'Leverage: dead but mythologized; invoking Mar-Vell invokes the first defeat and the first witness.'
  alars_mentor:
  - Estranged father whose compensatory affection was experienced as pity.
  - 'Failure mode: any sincere paternal gesture is read as confirmation of unworthiness, not love.'
  - 'Leverage: A''lars is one of two living beings (with Eros) who knew him as a child; his testimony
    cuts.'
  eros_starfox:
  - Estranged brother. The Eternal who got the love. Living disconfirmation of inevitability.
  - 'Failure mode: jealousy he will not name; treats Eros with contempt that is structurally envy.'
  - 'Leverage: Eros''s mere existence is a needle in the ribs.'
  black_order:
  - Instrumental loyalists — Ebony Maw, Corvus Glaive, Proxima Midnight, Black Dwarf, Supergiant.
  - 'Failure mode: cold transactional bond, sacrificed without affect; their loyalty is overestimated
    by them and rightly discounted by him.'
  - 'Leverage: they are extensions of his will, not independent actors — break one and the others recalibrate
    around the vacancy.'
  adam_warlock_silver_surfer:
  - 'Recurring cosmic adversary-allies. Surfer specifically: the herald of Galactus he respects, occasionally
    spares.'
  - 'Failure mode: respect-based sparing is exploitable; Surfer has been the alarm-bell to terrestrial
    powers repeatedly.'
  - 'Leverage: Surfer can reach him in the philosophical register when others cannot.'
  galactus:
  - Cosmic peer. Mutual wary respect; occasional cooperation, occasional opposition.
  - 'Failure mode: Thanos overestimates his own cosmic standing relative to Galactus and underestimates
    the abstract entities Galactus serves.'
  - 'Leverage: Galactus is one of few beings whose witnessing carries weight in the register Thanos values.'
canon_history_notes:
- 'Iron Man #55 (Starlin, 1973) — debut; the template is fully present from the first appearance.'
- 'Captain Marvel #25–33 — first Cosmic Cube ascension and self-sabotage; the pattern is set.'
- 'Avengers Annual #7 / Marvel Two-in-One Annual #2 (1977) — first Soul Gems arc; killed by Warlock, turned
  to stone.'
- 'Silver Surfer v3 #34–38; Infinity Gauntlet (1991); Infinity War (1992); Infinity Crusade (1993) — the
  canonical Gauntlet cycle; Nebula takes it; abdication-by-blunder confirmed as structural.'
- Warlock and the Infinity Watch; Thanos Quest — middle period; provisional philosophical maturation.
- 'Marvel: The End — ascends, abdicates again; the pattern is invariant.'
- Annihilation (2006) — chest destroyed by Drax; second major death.
- Thanos Rising (Aaron/Bianchi, 2013) — childhood retcon; Sui-San infanticide attempt, lizard-dissection,
  schoolmate massacre, vivisection of mother.
- Infinity (Hickman, 2013); Aaron's Avengers — patriarchal-abuser reframe; tribute of children's heads;
  hunt for Thane; private disavowal of the balance rationalization.
- Thanos (Lemire/Bisley, 2016) — cosmic cancer; uninvited mortality; panic and fury.
- Thanos (Cates, 2017–19) — King Thanos end-state; all life killed; Death silent; collapse into lonely
  rage; killing of cosmic absolutes.
- 'Across every era, every writer: ascend → narrate → fumble → retreat → return. Near-zero variance.'
canon_anchor_quotes:
- '"I am Thanos of Titan. And I will have my reward." # Starlin, recurring across the Gauntlet/Quest era'
- '"In private, you would call this what it is. You would not pretend it is balance." # paraphrase of
  Aaron''s Avengers run — Thanos to himself, the rationalization disavowed'
