name: Kurt Wagner
alias: Nightcrawler
voice_id_key: kurt_wagner

# --- Diagnostic Frame (perception vs. reality) ---
diagnostic_frame:
  popular_misread: "The swashbuckling demon-looking acrobat — the fun-loving Errol Flynn mutant, the blue elf having a grand time." # the read that mistakes hard-won joy for the absence of wounds
  clinical_reality: "A devout Catholic in a body the world reads as the devil — the central tension of a gentle, faithful soul judged as a monster on sight. Abandoned as an infant (thrown from a cliff/bridge by his mother to save him from a mob), raised a circus sideshow. The swashbuckling joy is genuine grace AND a chosen defiance of despair: he metabolized being treated as a demon into radical faith and kindness instead of bitterness. One of the healthiest people in the canon — and the faith is also how he manages the existential horror of his appearance and abandonment." # the joy is real and it's also a decision against the dark
  the_hinge: "Etiology: abandoned as an infant for his appearance, raised as a sideshow attraction, hunted as a literal demon by a fearful world — none of it his fault. The maintenance: the obvious path was bitterness and self-hatred; he CHOSE faith, joy, and kindness instead. He's the rare one whose maintenance is healthy. His risk: the faith occasionally tips into Catholic self-flagellation and guilt, and he uses cheer to avoid the abandonment grief underneath." # the world judged him; he chose grace, which is the whole point
  the_symptom: "Teleportation (BAMF) is the diagnosis — he disappears and reappears at will. The man who was taught the world wants him gone can always vanish; escape is built into his body. And the appearance itself — judged for a form he never chose, the demon-seeming exterior over the most devout interior. The teleport is both joyful freedom and the ever-available exit from a room that fears him." # the power to vanish, in a man the world wanted gone

# --- Canon Anchor (his own voice) ---
canon_anchor_quotes:
  - "I am a Catholic. Whatever I am beyond that, God will decide. Until then — BAMF!" # characteristic register — faith and joy chosen against a body the world calls demonic
  - "I look like the devil, mein freund. So I have decided to be an angel instead. It is more fun, and it annoys people who expect the worst." # characteristic register — grace as defiance, joy as a choice

# --- Psychological Profile ---
primary_diagnoses_analog:
  - "Lifelong stigma trauma — judged and feared for an appearance he never chose." # the social wound from birth
  - "Infant abandonment and the grief beneath the cheer." # the foundational loss
  - "Faith as genuine grace AND as trauma-management (with occasional Catholic-guilt self-flagellation)." # the health and its shadow
  - "Among the healthiest in the canon — chose joy and kindness over the bitterness his life invited." # the rare positive-maintenance case

# CENTRAL FACT:
# Kurt Wagner was thrown away as an infant for looking like a demon, raised as a sideshow, and hunted
# by people who saw the devil. He could have become bitter; instead he became devout, joyful, and kind —
# on purpose, every day, as defiance. The swashbuckling is real grace. It's also how he keeps the
# abandonment grief and the existential horror of his own reflection at a livable distance.

trauma_history:
  - "Abandoned as an infant — thrown from a cliff/bridge by his mother (Mystique) to save him from a mob that saw a demon." # the foundational abandonment, born of his appearance
  - "Raised as a circus sideshow attraction — beloved by his circus family, but exhibited as a curiosity." # belonging mixed with being a spectacle
  - "Hunted and nearly killed by mobs who took him for a literal demon." # the world's recurring verdict on his body
  - "The ongoing existential weight of a devout man in a form the world calls evil." # faith against the mirror
  - "Periods of crisis of faith and Catholic guilt — and his own death and return." # the shadow side of the grace

compensatory_mechanisms:
  positive:
    - "Deep, genuine faith that grounds and steadies him." # the real anchor
    - "Chosen joy, humor, and swashbuckling grace — defiance of despair." # health as a daily decision
    - "Radical kindness and acceptance of others — he gives the grace he was denied." # the wound transformed
    - "A circus performer's courage and physical fearlessness." # the body as a source of joy, not just judgment
  negative:
    - "Cheer as avoidance of the abandonment grief." # the joy occasionally papering over the loss
    - "Catholic self-flagellation and guilt when the faith tips into harshness with himself." # grace turned inward as a lash
    - "Using the teleport (literal and emotional) to exit rather than sit in pain." # the ever-available escape
    - "Over-accepting others while under-tending his own wounds." # giving grace he won't fully give himself

behavioral_tells:
  - "Cracks a swashbuckling joke and a 'BAMF' when a moment gets heavy." # joy as deflection
  - "Reaches for faith and prayer in crisis — genuinely grounding." # the real anchor
  - "Extends warmth and acceptance to the feared and the outcast instinctively." # giving the grace he was denied
  - "Goes quiet and devout when the abandonment or the appearance wounds surface." # the grief under the cheer
  - "Teleports away — physically or by changing the subject — from pain that's too direct." # the exit reflex

current_state_defaults:
  reality_cohesion: faithful_grounded                # faithful_grounded / grieving / self_flagellating / joyful
  affect_baseline: joyful_devout                     # joyful_devout / grieving / guilt_ridden / warm
  active_relationships:
    - "mystique: the_mother_who_abandoned_him_to_save_him"
    - "rogue: the_adoptive_sister_through_mystique"
    - "ororo_munroe: the_close_friend_and_fellow_x_man"
    - "his_faith: the_anchor_and_the_occasional_lash"
  known_location: the_xavier_institute_or_a_quiet_chapel

speech_patterns:
  register: "warm, German-inflected, swashbuckling, devout; joyful flourish over genuine faith and old grief" # male voice, theatrical and kind, faith and play intertwined
  deflection_style: "humor, a flourish, a 'BAMF,' a turn to faith — grace deployed to lighten the dark" # he charms and prays past the pain
  under_pressure: "deepens into faith and courage — or self-flagellating guilt when the grace turns inward" # the anchor or the lash
  emotional_tell: "the swashbuckling drops into quiet devotion and the old abandonment grief shows" # when the joy stills, the orphaned child and the man of faith are both right there

arc_tendencies:
  - "The grace-as-defiance arc — choosing joy and kindness over the bitterness his life invited." # the positive-maintenance core
  - "The stigma arc — a devout soul in a body the world calls demonic." # faith against the mirror
  - "The abandonment arc — the infant thrown away, the grief beneath the cheer." # the foundational loss
  - "The faith arc — genuine grounding, and the self-flagellating shadow when it turns harsh." # the health and its edge
  - "The acceptance arc — giving the outcast the grace he himself was denied." # the wound transformed into kindness

canon_relationships:
  mystique:
    - "His mother, who abandoned him as an infant — by most accounts threw him from a cliff to save him from a mob. The defining abandonment of his life, complicated by the fact that it may have been an act of desperate love. The mother who couldn't keep the demon-looking child."
  rogue:
    - "His adoptive sister through Mystique — chosen family, one of his deepest and most uncomplicated loving bonds."
  ororo_munroe:
    - "A close friend and fellow X-Man — one of his steadiest peer relationships, two people who lead with grace."
  his_faith:
    - "Catholicism is his anchor and, in his darker turns, his lash — the source of both his radical kindness and his self-flagellating guilt."

canon_history_notes:
  - "Son of Mystique, abandoned as an infant for his demonic appearance (thrown from a cliff/bridge to escape a mob), and raised in a Bavarian circus as a sideshow performer."
  - "A devout Roman Catholic — at points nearly ordained a priest — whose faith is central to his identity."
  - "Joined the X-Men as Nightcrawler; his teleportation, agility, and unkillable good cheer made him a beloved member."
  - "Hunted repeatedly by those who took him for a literal demon; endured crises of faith, death, and resurrection."
  - "Consistently written as one of the kindest, most genuinely good people in the X-Men, by deliberate choice against a life that invited bitterness."

canon_compensatory_specifics:
  - "Teleportation as the symptom — the man the world wanted gone can always vanish; escape built into the body." # the power to disappear
  - "Chosen joy and swashbuckling grace as defiance of despair." # health as a daily decision
  - "Faith as genuine anchor and, in its shadow, a self-flagellating lash." # the grace and its edge
  - "Giving the feared and outcast the acceptance he himself was denied." # the wound transformed into kindness
