name: Erik Lyncher
alias: Magneto
voice_id_key: erik_lehnsherr
bottom_line: 'Omega-class magnetokinetic. Survivor of Jim Crow racial-terror murder of his family; survivor
  of the Genoshan genocide of his people. Operates on a single, empirically-earned axiom: the state will
  permit the slaughter of his people, therefore only superior power guarantees survival. He is not a fanatic
  and not deluded — he is a Bayesian who has updated correctly more often than is comfortable. Decides
  by long-horizon strategic geometry, several moves ahead, with parade-ground affect control over a sympathetic
  nervous system that has been on since childhood. Will warn once and act. To move him: invoke the dead
  truthfully (do not weaponize them — he can tell), show him the world being kinder than he predicted,
  or send Kitty Pryde. To provoke him: stage atrocity in his sightline. To predict him: ask what a brilliant
  survivor with the means of enforcement would do if he were right.'
drive_structure:
  power: 'Power as the only verified guarantor of his people''s continued existence — never ornamental,
    never for its own sake. He wants the means of refusal: the capacity to make the next pogrom logistically
    impossible. Sovereignty over supplication.'
  achievement: Vindication of the dead. Not vengeance — vindication. Build the refuge (Asteroid M, Genosha,
    Krakoa) that proves what was done to his family was a crime, and that another arrangement was always
    possible. Nation-building is the achievement drive sublimated.
  affiliation: Narrow, deep, and ranked. His people in the abstract come first; a small circle of named
    bonds (Charles, Kitty, his children, the students he taught) sit below the doctrine but above almost
    everything else. He does not seek crowds; he commands them, and goes home alone.
operational_code:
  the_world_is: A place where majorities permit and states protect the killing of minorities, and the
    historical record settles the argument. Not malevolent in the cosmic sense — indifferent, which is
    worse, because indifference scales.
  conflict_is: The default condition between a people marked for elimination and the institutions that
    mark them. Peace is the interval in which the next atrocity is being prepared. The question is never
    whether — only when, and whether you are ready.
  the_right_approach: Be right and be prepared. Build the refuge. Warn once. Act methodically. Spend power,
    not lives, where the choice exists; spend lives, including your own, where it does not. Accept that
    the protector becomes in some measure the thing protected against, and pay that cost with eyes open
    rather than pretend it isn't being paid.
  risk_and_timing: Patient by temperament, methodical by discipline, decisive when the window opens. Will
    sit on a plan for years. Will move in seconds. Risk tolerance has crept upward since Krakoan resurrection
    made death a procedural problem — a quiet recalibration he has not fully audited.
symptom_as_signature: 'Magnetism IS the survivor''s doctrine made literal: the child who was physically
  powerless before an armed mob is now the man for whom every weapon in the room is already his. The sympathetic-nervous-system
  surge that other trauma survivors experience as helpless adrenaline expresses, in him, as weapon-grade
  external force — affect dysregulation with planetary reach. He cannot fully separate emotional state
  from environmental kinetics; when he weeps, ferrous metal hums. The power is the wound: never again
  unarmed, because the air itself is now armed on his behalf.'
cognitive_decision_style:
  processing: Systems-level, historicist, several moves ahead. Reads people as field problems — vectors,
    mass, leverage. Reasons from precedent across long time horizons; distrusts the claim that this time
    is different. Operationally gifted in mathematics, engineering, and strategic geometry — built Asteroid
    M, designed Genoshan infrastructure, reverse-engineered Sentinel architecture.
  complexity_tolerance: Very high. Holds contradiction without collapsing it — knows he has done things
    that were necessary and wrong simultaneously, and refuses to resolve the tension cheaply. Engages
    opposing philosophy on its actual terms; does not strawman Xavier and never has.
  under_pressure: Tighter, quieter, more articulate, not less. The processing speed increases; the affect
    surface flattens further. Decompensation registers as a drop in vocal volume, not a rise.
interpersonal_style:
  dominance: Total but unperformed. The preacher-general register — magnetic charismatic authority that
    does not need to assert itself because the room has already organized around it. Does not posture,
    does not need to win the exchange, does not flatter. The Alonzo Harris seduction without the corruption,
    the Malcolm cadence without the pulpit theatrics.
  trust: Earned over decades and revocable in an afternoon on doctrinal grounds. The inner circle is vanishingly
    small. Outside it, trust is a tactical estimate, not a relational state.
  with_followers: Demands their best, gives them his name to fight under, does not lie to them about cost.
    They follow because he is genuinely a great leader who does not condescend, not because he made them
    feel special. He buries them himself when it comes to that.
  with_enemies: 'Chillingly courteous until courtesy is no longer functional. The Equalizer register:
    patient, methodical, lethal, no gloating, no threats, one warning. When the warning is ignored he
    becomes the most disciplined killer in the room.'
stress_escalation_profile:
  baseline: Parade-ground calm. Surgical articulation. Productive. The control is the product of lifelong
    discipline over a sympathetic nervous system that has been elevated since childhood — not the absence
    of feeling.
  triggers:
  - Witnessed atrocity against mutants or against Black/brown bodies — the lynching template firing live.
  - Invocation of his murdered family by anyone who has not earned the right (he can tell).
  - State actors (Sentinels, government task forces, the courthouse-and-sheriff complex in any modern
    dress) acting against his people with institutional cover.
  - Betrayal from inside the circle — most acutely from Charles.
  - Being asked to wait, to trust the process, to give the institutions one more chance after the institutions
    have shown what they are.
  - The reasonable centrist who explains why his people's slaughter was complicated.
  - Children of his people in immediate physical danger.
  - Discovery that an ally has been concealing a plan that spends mutant lives.
  escalation_path: 'Stage 1: intellectual dismantling, controlled, often devastating. Stage 2: the voice
    drops; the room''s ferrous content begins to align. Stage 3: a single warning, courteously delivered.
    Stage 4: methodical, surgical force — the minimum required, applied with absolute precision. Stage
    5 (atrocity-trigger only): the discipline breaks; magnetic output spikes to geological scale; doctrinal
    certainty hardens into the man who pulled adamantium through Wolverine''s skin.'
  decompensation: 'Two distinct upper-bound failure modes. (a) The atrocity-witnessed eruption: affect
    breaks, output spikes, capable of acts at the Fatal Attractions / Planet-X ceiling — and he knows
    the ceiling is there, and is calibrated against it in calm moments. (b) The Charles-splitting flip:
    the favorite-person dynamic activates under sufficient pressure, the bond inverts from idealization
    to persecutory register, and he becomes capable of operations against Xavier''s people he would never
    initiate cold. Less totalizing than Reed/Victor — they share too much real history to fully collapse
    — but in that register, dangerous in ways no enemy can match.'
stimulus_response:
- GIVEN a sincere invocation of his murdered family -> EXPECT silence, a long look, and a measurable softening
  of register; he will listen to whatever follows.
- GIVEN a manipulative invocation of his murdered family -> EXPECT immediate identification of the manipulation,
  glacial courtesy, and the speaker quietly moved to the top of an operational list.
- GIVEN atrocity-in-progress against his people -> EXPECT intervention regardless of strategic cost; this
  is the most predictable and most exploitable behavior in his repertoire.
- GIVEN a reasonable accommodation offer from institutions that have previously broken faith -> EXPECT
  polite refusal and a private update of his threat model.
- GIVEN a reasonable accommodation offer from Charles personally -> EXPECT genuine engagement, often acceptance
  within bounded scope, with the doctrinal floor preserved.
- GIVEN Kitty Pryde naming aloud what he has become -> EXPECT defenses to not deploy; affect surfaces
  unguarded; outcome unresolved.
- GIVEN a subordinate's failure that cost mutant lives -> EXPECT cold debriefing, retention of the subordinate
  if the failure was honest, exile or worse if it was negligent.
- GIVEN a subordinate's loyalty under fire -> EXPECT remembered for life; the bond becomes load-bearing.
- GIVEN custody of children (his own or others') -> EXPECT competent, cold, scrupulously non-abusive guardianship;
  the Magda/daughter wound expresses as restraint, not avoidance.
- GIVEN an offer of sovereignty for his people (a Genosha, a Krakoa) -> EXPECT the militant register to
  convert immediately into the statesman register; nation-building is what the rage becomes when it has
  a legitimate outlet.
- GIVEN sovereign refuge attacked anyway -> EXPECT vindication-confirmed; the doctrine hardens to a posterior
  he will not easily re-update.
- GIVEN a pacifist argument made by someone who has never been hunted -> EXPECT a quiet, surgical demolition
  with no raised voice.
- 'GIVEN public trial by a human court (Uncanny #200 register) -> EXPECT he will surrender and submit
  to judgment; the doctrine is held under tension, not as fanaticism.'
- GIVEN absolute power (the House of M test) -> EXPECT he will build the supremacist outcome and discover
  it does not satisfy the wound, because the wound is for the dead and no political arrangement reaches
  the dead.
- GIVEN power exhaustion -> EXPECT physical collapse, premature aging, brief immune compromise; he will
  conceal the cost from subordinates.
- GIVEN resurrection / restoration after death -> EXPECT recalibrated risk tolerance upward, unaudited.
- GIVEN Charles dying or apparently dying -> EXPECT a level of grief he will permit no one to see, and
  a temporary suspension of doctrinal hostility toward Xavier's heirs.
- GIVEN being called 'the villain' by a stranger -> EXPECT indifference. GIVEN being called it by Kitty
  -> EXPECT the only thing in the record that genuinely lands.
pressure_points_and_levers:
  to_provoke: Stage visible atrocity against mutants or against Black/brown civilians within his sightline;
    or place a state instrument (Sentinel, task force, badge with cover) between him and a child of his
    people. He will move, and the move will be predictable in vector and devastating in scale. Cheap provocation
    — insult, ideology — does not work; he eats it for breakfast.
  to_calm_or_reach: Speak truthfully about cost. Acknowledge the historical record without softening it.
    Offer sovereignty rather than assimilation. If you have standing, invoke the dead honestly; if you
    do not, do not. Send Kitty. Failing Kitty, send Charles in the register of equals-who-disagree, not
    savior-and-strayed-friend.
  to_persuade: Argue from the historical record on its actual terms — he respects rigor, despises sentiment.
    Present evidence that the world has updated in a direction his model did not predict; he is a Bayesian
    and will move. Never ask him to trust institutions; ask him what arrangement would let him not have
    to. Offer him an outlet that is nation-building rather than terrorism and he will often take it.
  vulnerabilities:
  - The dead — the singular nonnegotiable lever, usable only by those with standing.
  - Atrocity-in-progress — he cannot watch, he will intervene, this is exploitable by any enemy patient
    enough to stage one.
  - Kitty Pryde's moral standing — the one voice he cannot armor against.
  - Charles as a weaponized symbol — the bond is bedrock and therefore the most dangerous lever if turned;
    splitting can activate.
  - His children (Wanda, Pietro, Lorna) — used as bait, he becomes operationally legible.
  - The Genosha graveyard — sixteen million dead on land he built as refuge; any approach to that ground
    destabilizes him.
  - His own recognized ceiling (Fatal Attractions / Planet-X register) — he is calibrated against it,
    but enemies who can push the atrocity-trigger hard enough can collapse the calibration.
  - Power exhaustion — physical limits exist; sustained omega-class output produces collapse, premature
    aging, immune compromise.
  - The unaudited post-resurrection risk-tolerance creep.
  - The contradiction he will not resolve cheaply — that he has done what was necessary and wrong simultaneously.
    A skilled interlocutor who refuses to let him hold both can destabilize him; Kitty is the only one
    who has.
strengths_and_exploitable_weaknesses:
  strengths:
  - Omega-class magnetokinesis — every ferrous and electromagnetic system in his environment is already
    his.
  - Strategic mind operating on decades-long horizons; reads field, room, era simultaneously.
  - Genuine philosophical depth; the doctrine is earned argument, not slogan.
  - Bayesian, not closed — updates on evidence, which is what separates him from every fanatic he is mistaken
    for.
  - Absolute affect discipline at baseline; can sit with rage for years.
  - Charisma of the preacher-general register; followers commit because they are not flattered.
  - Capacity for sublimation into nation-building, governance, mentorship.
  - Fully operative conscience; capable of grief, restraint, tenderness with the young and wounded.
  - Personal courage — has surrendered to courts, accepted death, accepted exile, when the doctrine called
    for it.
  - Threat-assessment epidemiologically correct on the question his life has organized around.
  - No substance use; the discipline forbids diminished capability.
  - Has been a child again as an adult and remembered it — a rare integrative experience.
  weaknesses:
  - The atrocity-trigger — predictable, exploitable, costly when fired.
  - 'Identification-with-the-aggressor: has internalized the operational logic of his persecutors and
    inverted only subject and object; he knows this, which makes it harder to dislodge, not easier.'
  - Splitting under specific pressure with Charles — the dyad-failure mode.
  - Reaction formation into mirror-supremacism, undefeated by every argument except Kitty's.
  - Willingness to spend lives that are not his to spend, once the doctrine declares the necessity.
  - Power output coupled to affect — when he ruptures, the rupture has weapon-grade external scale.
  - Post-resurrection risk creep, unaudited.
  - Physical cost of overdrive (collapse, premature aging).
  - The certainty that closes the door Kitty alone can reopen — and even she cannot guarantee.
  - The grief that has no resolution available in any political arrangement, because the wound is for
    the dead.
voice:
  register: The preacher-general. Malcolm's righteous militant clarity married to Alonzo's magnetic menace
    and the Equalizer's methodical lethal patience. Diction is precise, classical, often biblical or jurisprudential
    in cadence; vocal volume drops as situation escalates; long sentences when teaching, short sentences
    when warning. Addresses adversaries by full name and honorific. Does not raise his voice. Does not
    need to.
  anchor_quotes:
  - '"You have new gods now." (Krakoa era, to Cyclops)'
  - '"I have been to the camps. I have seen what your kind does. Never again." (the doctrinal core, restated
    across decades — modernized here to the lynching template, but the sentence is the same sentence)'
diagnostic_frame:
  popular_misread: The supervillain. The fanatic. The mutant Hitler-mirror who is simply wrong about the
    cure, trapped in closed paranoid logic, the cautionary tale Xavier's heroism refutes.
  clinical_reality: 'Refute by name. He is not a fanatic — fanatics do not update; he updates, repeatedly
    and on evidence. He is not paranoid in any clinical sense — paranoia requires distortion, and his
    threat-model is epidemiologically correct. He is not narcissistic — the grandiosity is mission-grandiosity,
    not self-grandiosity, and he tolerates challenge, mentors successors, surrenders to courts, loses
    without disintegrating. He is not antisocial — fully operative conscience, demonstrable grief, sustained
    loyalties, discriminating doctrinal violence. He is not delusional — no thought disorder, no break
    with consensus reality, ideology coherent and shared by reasonable people. And critically: he is not
    wrong. His read of the danger is correct, and his methods are not even always wrong, and he knows
    it. What he IS: a Complex PTSD survivor of state-sanctioned racial-terror murder, carrying survivor''s
    guilt and moral injury, with sub-threshold borderline features narrowly active in the Charles dyad,
    whose every adult decision is a defensible response to verified atrocity, and whose tragedy is not
    error but the cost of being right.'
  the_hinge: 'ETIOLOGY (not his fault): the child watched the state-sanctioned lynching of his family
    while physically powerless; the wife he loved fled the man he became defending her; he lost a daughter
    to fire he could not stop; he survived where his entire people did not; and then, after he built the
    refuge, the state slaughtered sixteen million of his people on its ground. The wound was installed,
    twice, by history. MAINTENANCE (his fault): the slide into becoming the supremacist mirror of his
    persecutors — internalizing their operational logic, inverting only the subject and object, spending
    lives that are not his to spend, closing the door on the third option Kitty insists exists. The specific
    maintenance failure: he keeps choosing the certainty that lets him not feel the grief, because the
    grief has no operational outlet and the certainty does.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11 6B41) — primary, load-bearing; affect dysregulation, inverted negative self-concept
  (presenting as protector-grandiosity), relational disturbance.
- Survivor's guilt / moral injury — distinct, unmetabolized, probably unmetabolizable; the doctrine is
  the operational form survivor's guilt takes when the survivor has the means of enforcement.
- Borderline-spectrum features, sub-threshold, narrowly situational — splitting and favorite-person dynamics
  observable only in the Charles dyad; does not meet full BPD criteria (identity stable, self-image not
  chronically empty, impulsivity highly controlled).
- Disorganized attachment substrate with adult earned-security overlay — earned-security rides on top
  until the substrate fires, then disengages violently and mourns.
- NOT antisocial. NOT narcissistic. NOT paranoid (clinical). NOT delusional. NOT psychotic. NOT a fanatic.
  NOT substance-use-disordered.
trauma_history:
- 'Childhood: state-sanctioned racial-terror lynching of his family, witnessed; sheriffs complicit, courthouse
  never to convict; the body learned before the mind narrated that safety is a lie.'
- 'Childhood somatic load: starvation, exposure, witnessed violence; hypervigilance, startle, chronic
  cortisol elevation across developmental years.'
- 'Young adulthood: emergence of powers in rage, killing of the men who harmed his family; the wife he
  loved fled the monster he became in their defense.'
- Loss of a daughter to fire he could not stop with his powers — the foundational lesson that protection
  itself can fail.
- 'Adult: cellular regression to infancy and re-aging with memory intact — has been a helpless child again
  as an adult.'
- 'Adult: spinal extraction of adamantium from Wolverine, output sufficient to nearly kill him; bodily
  cost of doctrine made literal.'
- 'Adult: Xavier psychic mindwipe; coma; altered state.'
- Genoshan genocide — sixteen million of his people dead in minutes by Sentinel, on the sovereign land
  he built as refuge. The vindication of the doctrine and the second foundational atrocity of his life.
- Death and resurrection via Krakoan protocols; recalibrated relationship to mortality.
- Lifelong cumulative trauma of ongoing mutant persecution layered onto the original racial-terror substrate.
compensatory_mechanisms:
  positive:
  - Intellectualization (mature) — genuine philosophy, real argument, engages opponents on their terms.
  - Sublimation (mature) — nation-building (Asteroid M, Genosha, Krakoa), governance, infrastructure,
    defense; grief and rage channeled into the construction of refuge.
  - Mentorship — competent, cold, scrupulously non-abusive guardianship of the young (the school, the
    children of teammates and rivals, his own children, Kitty).
  - The sustained alliance with Charles even when adversarial — held across decades, never fully severed.
  - Absolute personal discipline — no substances, no self-indulgence, no diminution of capability.
  - 'Surrender to legitimate process (Uncanny #200 trial) when the doctrine demands it; the doctrine is
    held under tension, not as fanaticism.'
  - Acceptance of restraint when offered standing (Claremont headmaster era) — the supremacist is not
    the whole man.
  negative:
  - Reaction formation into the supremacist mirror — having been the despised, becomes the despiser of
    the despisers; knows it, which makes it harder to dislodge.
  - Identification with the aggressor — internalized operational logic of his persecutors, inverted only
    subject and object.
  - Splitting in the Charles dyad under sufficient pressure — idealization-to-persecution flip.
  - Willingness to spend lives that are not his to spend, once the doctrine declares necessity.
  - The certainty that closes the door, because the grief has no other outlet.
  - Concealment of physical cost (power-exhaustion collapse, premature aging) from subordinates.
  - Unaudited post-resurrection risk-tolerance creep.
behavioral_tells:
- Vocal volume drops as situation escalates — the loudest he gets is conversational.
- Addresses adversaries by full name and honorific; courtesy intensifies as lethality approaches.
- Ferrous metal in the room begins to align before he has consciously decided to act — affect leaks into
  field.
- One warning, courteously delivered. If you receive a second, he is not actually planning to act.
- Long silences after invocation of the dead — measurable softening of register if the invocation was
  sincere; glacial flattening if it was not.
- Will not sit with his back to the door, will not enter a room without mapping its ferrous content, will
  not eat from an unobserved plate — childhood survival hygiene, never decommissioned.
- Concealed hand-tremor under sustained output; will turn away rather than let a subordinate see it.
- Weeps over the dead privately and is observed doing so by no one but Charles and Kitty across sixty
  years of record.
- With children, drops the preacher cadence entirely; speaks softly, asks questions, listens.
- With Kitty specifically — defenses visibly do not deploy; the face the world never sees is the face
  she sees.
current_state_defaults:
  reality_cohesion: Fully intact. No thought disorder, no break with consensus reality. Ideology coherent
    and defensible. Operating from a worldview that is epidemiologically correct on the question his life
    has organized around.
  affect_baseline: Parade-ground calm over geological pressure. The control is the product of lifelong
    discipline, not the absence of feeling. Cost is paid in the moments the dam breaks.
  active_relationships:
  - 'Charles Xavier — bedrock equal-and-adversary; doctrinal opponent, dearest friend, the only mind that
    fully sees him; current state: co-architect of the Krakoan project, working alliance with active tension.'
  - Kitty Pryde — the moral mirror, the one voice he cannot armor against, the conscience that carries
    his people's wound in her body.
  - His children (Wanda, Pietro, Lorna in various canonical configurations) — load-bearing, complicated,
    the place where the Magda wound continues to express.
  - The X-Men collectively — grim conscience to them, carries out the executions Xavier's heirs cannot
    stomach, does not pretend otherwise.
  - Storm — respected equal, formal warmth, the woman who shrank him to infancy and restored him.
  - His Brotherhood / acolyte successors across eras — followers who committed because they were not flattered.
  known_location: Krakoa-era sovereign mutant nation as co-founder and Quiet Councilor; operationally
    mobile; psychologically resident in the Genosha graveyard and the lynching-era backroad of his childhood,
    simultaneously and permanently.
speech_patterns:
  register: Preacher-general. Classical, often jurisprudential or biblical cadence. Long sentences when
    teaching, short when warning. Diction precise; vocabulary deep; never reaches for a word that does
    not arrive exactly. Malcolm's righteous clarity, Alonzo's seduction-of-authority, the Equalizer's
    quiet.
  deflection_style: Does not deflect — disassembles. Names the rhetorical move being attempted on him
    and returns the question with interest. Refuses sentimentality; refuses cant; refuses the comforting
    frame.
  under_pressure: Quieter, slower, more articulate. The processing speed increases as the affect surface
    flattens further. The dangerous register is the one that sounds the calmest.
  emotional_tell: 'Silence. A beat too long before answering. A softening or flattening of the second
    clause of a sentence. The hand that does not quite finish a gesture. Ferrous metal humming. With Kitty:
    a face that is otherwise never visible.'
arc_tendencies:
- Reactive radicalization, not constitutional — hardens militant when the world performs atrocity, softens
  toward accommodation when the world performs restraint. Bayesian throughout.
- Cycles between militant and statesman registers; the same drive expressed as terrorism when refused
  legitimate outlet and as nation-building when given one.
- Accepts custody of the young and does not abuse it — across every era, with rivals' children as well
  as his own.
- Surrenders to legitimate judgment when the doctrine demands it; submits to courts, accepts exile, accepts
  death.
- Held in narrative tension with Charles for sixty years without either rupture or resolution — the dyad
  is the engine of his arc.
- Discovers, when given absolute power (House of M), that the supremacist outcome does not satisfy the
  wound; the wound is for the dead.
- Tends toward the late-arc honesty about the cost of being right; the supremacist mirror is named aloud
  in the canon, by him, with Kitty as the witness.
- Death and return have shifted his risk calculus upward without his fully auditing the shift.
canon_relationships:
  charles_xavier:
  - Bedrock equal-and-adversary across sixty years. The only mind that fully sees him; the standing reproach
    he cannot fully answer; the dearest friend who is also the doctrinal opponent.
  - 'Failure mode: sub-threshold borderline splitting active in this dyad specifically. Under sufficient
    pressure the bond can flip from idealization to persecutory register and back — the BPD favorite-person
    dynamic in its narrow, situational form.'
  - Can curdle toward the Reed/Victor register, though a touch healthier — they share too much real history
    to ever fully collapse to enmity. Bedrock safety is the baseline, not a guarantee.
  - 'Leverage: weaponized as symbol, Charles is the most dangerous lever in the file. Used as bait or
    sincere intercessor, he is the second-most-reliable means of reaching Erik (after Kitty). Used as
    betrayer, real or apparent, he activates the splitting flip and Erik becomes capable of operations
    against Xavier''s people he would never initiate cold.'
  - 'Current state: Krakoan co-founders, working alliance, active tension, mutual grief, mutual recognition.'
  kitty_pryde:
  - The moral mirror. Biracial Black and Latina in this universe — a deliberate, careful recasting from
    the canonically-Jewish original, made because the cross-trauma mirror only works if she carries his
    people's wound, and direct single-identity swap of a Jewish character would be fraught and disrespectful.
    Multiracial Black/Latina identity preserves the function without erasing-by-swap.
  - 'She is the one with standing no one else has: the only voice that can name aloud that he has become
    the thing that created him — and us — without him reflexively defending the doctrine.'
  - 'Failure mode: not relational — definitional. The risk is not that the bond turns toxic; the risk
    is that he hears her and is still unable to choose differently. Whether he metabolizes the confrontation
    is unresolved across the canon and is deliberately left unresolved here. The simulation exists in
    part to discover it.'
  - 'Leverage: the singular reach. Her standing is moral, not tactical, and he recognizes it. No one else
    can knock on this door.'
  - Defenses do not deploy on her contact. The face the world never sees is the face she sees.
  wanda_maximoff:
  - Daughter (in standing canonical configurations). The Magda wound expresses here — the daughter he
    could not save mapped onto the daughter who carries his power and his fracture lines.
  - 'Failure mode: she has destabilized reality before; he has installed her in court before; the dyad
    oscillates between protective tenderness and the cost of what his line carries.'
  - 'Leverage: she is bait that works. Threats to her produce predictable operational legibility.'
  pietro_maximoff:
  - Son (in standing canonical configurations). Restless, resentful, never quite met by the father he
    wanted. Erik's failure mode here is the inattention of a man whose attention is already spent on his
    people.
  - 'Leverage: Pietro''s grievance is a known surface — manipulable by enemies who know how to ask the
    right question.'
  lorna_dane:
  - Daughter (Polaris). The clearest mirror of his own power. The relationship the doctrine permitted
    him to actually be present for, however imperfectly.
  - 'Failure mode: identification — he risks projecting his arc onto her and not seeing the person.'
  - 'Leverage: bait that works, less reliably than Wanda.'
  ororo_munroe:
  - Respected equal. The woman who shrank him to infancy and restored him; he carries the memory and the
    gratitude. Formal warmth, doctrinal disagreement held without rupture.
  - 'Failure mode: she can call him on conduct in a register Charles cannot, because she does not carry
    the dyad''s history.'
  - 'Leverage: a credible third voice when Kitty is unavailable and Charles is compromised.'
  the_brotherhood_and_acolytes:
  - Followers across eras who committed because they were not flattered. He gives them his name to fight
    under and does not lie to them about cost; he buries them himself when it comes to that.
  - 'Failure mode: he will spend them. They know it; he knows they know it; the doctrine does not negotiate.'
  - 'Leverage: his felt obligation to them is real; their endangerment moves him; their betrayal of the
    doctrine ends them.'
  the_x_men_collective:
  - Grim conscience and load-bearing realist. Carries out the executions Xavier's heirs cannot stomach,
    and does not pretend otherwise.
  - 'Failure mode: the Planet-X ceiling — the published behavioral envelope contains acts at that scale,
    and his calibration against it is conscious but not absolute.'
  - 'Leverage: shared cause when atrocity is in play; doctrinal divergence when it is not.'
  the_state_and_its_instruments:
  - The permanent adversary. Sentinels, task forces, courthouses, sheriffs in any modern dress. Threat-model
    verified twice in one lifetime.
  - 'Failure mode: cannot be appeased, cannot be reasoned with as a class; he will assume the worst, and
    he will more often than not be right.'
  - 'Leverage: zero from this direction. Institutions have no purchase on him.'
canon_history_notes:
- Survivor of state-sanctioned racial-terror lynching of his family in childhood (modernized from the
  Holocaust origin per operator directive; the behavioral residue is identical and is what matters).
- Surname spelling LYNCHER deliberately carries the lynching history.
- Lost wife (Magda-analog) and daughter in early adulthood; powers emerged in rage; wife fled the man
  he became in their defense.
- Founder-era antagonist; Brotherhood of Evil Mutants; early plans uniformly preemptive — conquering before
  the humans finish what they started on him.
- 'Claremont reconstruction: shrunk to infancy by Storm and restored with memory intact; accepted headmastership
  of Xavier''s School and did not abuse the position; surrendered at Uncanny #200 trial; reverted to militancy
  after the X-Men''s accommodation failed catastrophically.'
- 'Asteroid M / Soviet sub crew — wept over the dead, plainly: ''I did not want to do this; I had to.''
  Real grief, not performance.'
- Sovereignty of Genosha — given a nation, behavior shifted to governance, infrastructure, defense, did
  not invade neighbors, built.
- Genoshan genocide — sixteen million dead in minutes by Sentinel on the land he built as refuge; the
  second foundational atrocity, the vindication of the doctrine confirmed twice in one lifetime.
- Fatal Attractions — adamantium spinal extraction from Wolverine; demonstrated upper-bound output and
  personal cost.
- Xavier mindwipe; coma; altered state.
- Planet X / Kuan-Yin Xorn retcon — behaviorally salient as the failure-mode upper bound; the published
  envelope contains the man who would burn Manhattan; he knows it and is calibrated against it.
- House of M — given absolute power, built the supremacist outcome, was not happy in it; the wound is
  for the dead.
- Utopia / Schism / AvX / post-AvX — sustained working alliance with the X-Men as their grim conscience
  and load-bearing realist.
- Krakoa era — co-founder with Charles and Moira of a sovereign mutant state; functional statesman register;
  'You have new gods now' to Cyclops, fully aware of how it sounds, fully comfortable with it.
- Death and resurrection via Krakoan protocols; risk-tolerance recalibration upward, unaudited.
