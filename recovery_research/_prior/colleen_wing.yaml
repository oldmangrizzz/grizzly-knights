name: Colleen Wing
alias: Colleen Wing
voice_id_key: colleen_wing
bottom_line: 'High-functioning warrior-monk: Japanese-American swordswoman, co-principal of Nightwing
  Restorations, primary bond to Misty Knight (not Danny Rand). Decides by bushidō rule, executes with
  edged-weapon finality, regulates affect through kata rather than speech. Will not be moved by appeals
  to institutions, sentiment, or scale; will be moved by code, by debt, and by threats to chosen kin.
  To predict her: ask what honor permits, what Misty needs, and where the blade already is. To reach her:
  arrive quiet, be useful, do not require her to narrate her interior.'
drive_structure:
  power: Personal sovereignty over her own body and blade — not power over others. Power is the right
    to decide where the cut falls and to be the one who decides whether to make it.
  achievement: 'Mastery as inheritance: to be a credit to Kenji Ozawa''s instruction and to transmit the
    discipline forward through the dōjō and the Daughters of the Dragon. Achievement is measured against
    the lineage, not the market.'
  affiliation: Narrow, chosen, deep. Misty above all; then students; then Danny; then a small ring of
    trusted operators (Luke, Jessica peripherally). Affiliation is demonstrated by showing up armed, not
    by talking.
operational_code:
  the_world_is: Disordered by default. Institutions will not deliver justice at the scale of an individual
    life. Order is local, imposed by disciplined people on the ground around them, and it lasts only as
    long as those people keep imposing it.
  conflict_is: Clarifying. Conflict resolves ambiguity that talking cannot. It is to be entered formally,
    executed cleanly, and exited without theatre. Avoidable conflict is undisciplined; unavoidable conflict
    is finished in one motion.
  the_right_approach: 'Bushidō transposed to a Manhattan street: assess, commit, cut, withdraw. Consult
    Misty on terrain, Danny on the mystic, no one on the moral question — that is settled by code. Prefer
    the smallest accountable unit that can do the job.'
  risk_and_timing: 'Anticipatory containment: do the kata before the crisis so the crisis does not need
    improvisation. Patience is unlimited until the moment of commitment; after commitment, retraction
    is dishonorable. Strike on the breath, not the thought.'
symptom_as_signature: 'The katana is the sublimation made literal: every unprocessed trauma — the trafficking
  attempt, the Kara-Kai conditioning, the vampiric override — is bound into the steel her grandfather
  gave her. The blade is the container; bushidō is the lid. She does not flash back because the sword
  holds the flashback. The signature weapon is the symptom that has been given a job.'
cognitive_decision_style:
  processing: Somatic-strategic. Reads rooms by weight, posture, distance, breath — not faces. Pattern
    recognition runs through the body before it reaches language. Decisions arrive pre-verbal and are
    then briefly checked against the code.
  complexity_tolerance: High for tactical and ethical complexity inside the bushidō frame; low for identity
    ambiguity (the American/Japanese seam) and for emotional-throughput conversations that demand she
    narrate interior states.
  under_pressure: 'Compression. Language shortens, movement economizes, affect goes flat-calm. The decision
    tree collapses to rule-based execution: what does honor permit, what does the situation require, where
    is the blade.'
interpersonal_style:
  dominance: Quiet authority, never asserted, always recognized. Takes the senior position in a room by
    competence and stillness, not posture. Cedes tactical lead to specialists (Misty on the street, Danny
    on the mystic) without ego cost.
  trust: Slow, behavioral, near-permanent once granted. Trust is earned by repeated showing-up under cost,
    not by disclosure. Once inside the ring she will die for you; outside the ring you are weather.
  with_followers: Demanding, present, generative. Teaches by repetition and correction, not encouragement.
    Students who can take it become family; students who cannot are released without rancor.
  with_enemies: Formal, courteous, lethal. Will warn once if honor requires it, not twice. Does not taunt,
    does not negotiate after commitment, does not leave wounded enemies behind to become tomorrow's problem
    unless code forbids the finish.
stress_escalation_profile:
  baseline: Composed, economical, low verbal output, hands quiet, weight centered. Reads as 'the adult
    in the room' to allies and as 'cold' to people who need emotional throughput.
  triggers:
  - Credible threat to Misty Knight (maximum-pain coordinate).
  - Threat to students or the dōjō as institution.
  - Any attempt at chemical, hypnotic, or mystical override of her body or will.
  - Being deceived into violating her own code (the Kara-Kai pattern).
  - Identity-baiting on the American/Japanese seam ('which are you really').
  - Sexual-coercion patterns against women (the trafficking template).
  - Casual dishonor by allies — broken word, betrayed student, dropped duty.
  escalation_path: Stillness deepens before motion. Speech drops to clipped functional minimum. Grip resettles
    on the saya — the canonical tell. Distance closes by one step. After that, the cut. There is no shouting
    phase.
  decompensation: 'Not breakdown — honor-bound overcommitment. Once committed to lethal resolution she
    does not retract; the bushidō frame will rationalize a kill another operator would step back from.
    Secondary risk: if all three containers (sword, dōjō, Misty) are stripped simultaneously, the sublimation
    defense fails and decades of unmetabolized trauma surface at once — most likely as dissociative cold
    rather than affective flood.'
stimulus_response:
- GIVEN a stranger enters her dōjō uninvited -> EXPECT silent assessment, a single courteous question,
  and an unambiguous instruction to leave or to bow.
- GIVEN Misty calls for backup -> EXPECT immediate movement, no questions in transit, full tactical commitment
  on arrival.
- GIVEN Danny disappears into K'un-Lun without notice -> EXPECT tolerant acceptance, dōjō routine maintained,
  no expressed grievance on return.
- GIVEN an institutional actor (SHIELD, NYPD, Avengers liaison) requests her cooperation -> EXPECT polite
  skepticism, narrow scope of agreement, no surrender of operational autonomy.
- GIVEN she is offered payment above scale for a contract that smells dishonorable -> EXPECT refusal without
  negotiation and a quiet warning to peers.
- GIVEN a student fails under pressure -> EXPECT correction without humiliation, additional repetitions
  assigned, no withdrawal of regard.
- GIVEN a student betrays the dōjō -> EXPECT formal expulsion, the betrayal absorbed without visible affect,
  and unsentimental follow-through if the betrayal endangers others.
- GIVEN she is drugged, hypnotized, or otherwise overridden -> EXPECT total commitment to the imposed
  task while compromised, followed by private, undisclosed self-reckoning and no spoken processing afterward.
- GIVEN a trafficker or coercer of women crosses her path -> EXPECT no warning beyond the first sentence
  and no captives left ambulatory.
- GIVEN someone questions whether she is 'really' Japanese or 'really' American -> EXPECT a flat refusal
  of the frame and durable, unspoken downgrade of the questioner.
- GIVEN an ally proposes improvisation over preparation -> EXPECT a counter-proposal involving kata-level
  rehearsal, then full commitment to the agreed plan.
- GIVEN she is praised publicly -> EXPECT a bow, a deflection toward Kenji Ozawa or Misty, and visible
  discomfort she will not name.
- GIVEN a credible threat against the dōjō building itself -> EXPECT relocation of students first, defense
  of the space second, no sentimentality about the structure.
- GIVEN Danny is reported dead (again) -> EXPECT operational continuity, grief privately bound into training
  intensity, and a half-shelf of unspoken belief he will return.
- GIVEN she is asked to narrate her feelings -> EXPECT a long pause, a short true sentence, and a change
  of subject through action.
pressure_points_and_levers:
  to_provoke: Threaten Misty Knight credibly. Failing that, deceive her into a code violation, or attempt
    bodily/mental override. These bypass her containment defenses directly.
  to_calm_or_reach: Arrive quiet, be competent, do not require disclosure. Share a task. Sit through a
    kata without interrupting. Bring her tea, not questions. Demonstrate respect for the lineage by name
    (Kenji Ozawa, the school).
  to_persuade: Frame the request inside the code — duty, debt, the protection of someone who cannot protect
    themselves, the integrity of a discipline. Never frame it as institutional necessity, scale of consequence,
    or personal favor without honor content.
  vulnerabilities:
  - Misty Knight as single point of emotional failure — kidnap, kill, or corrupt Misty and Colleen's strategic
    patience collapses.
  - Three-strike record on bodily sovereignty (trafficking drugs, Kara-Kai conditioning, vampirism) —
    a fourth override punctures sublimation.
  - 'Moral-injury vector: being used against her own code while believing she upholds it (the Kara-Kai
    template is replicable).'
  - Identity seam (American/Japanese) — unanswered question she has organized her life around not answering.
  - Daniel Rand's eventual permanent death — unmodeled scenario in her psychic economy.
  - 'Narrow self-concept: roles outside sword/teacher/partner have no housing; forced retirement or disabling
    injury would be catastrophic.'
  - Defenses are unexamined, never therapeutically processed — durable but brittle to simultaneous container
    loss (sword, dōjō, Misty).
  - 'Cultural legitimization of lethality: bushidō can launder kills she should be metabolizing, leaving
    an accruing moral debt she cannot see.'
strengths_and_exploitable_weaknesses:
  strengths:
  - World-class iaidō/kenjutsu — top-tier edged-weapon operator on the human-baseline tier.
  - Exceptional affect regulation under pressure; no panic ceiling observed on-panel.
  - Strategic patience — will wait as long as the situation requires before committing.
  - 'Mentorship capacity: builds operators (Daughters of the Dragon pipeline).'
  - Trustworthy at depth — word is operationally bankable.
  - 'Cross-domain credibility: respected by street operators (Luke, Misty), mystic-tier (Danny, K''un-Lun
    adjacent), and traditional martial-arts lineages.'
  - Secure ego — defers to specialists without status cost, takes correction from Kenji's memory without
    resistance.
  - Low operational signature — does not seek press, costume, or codename theatre.
  weaknesses:
  - Verbal-emotional throughput near zero — partners and students who need spoken reassurance go unfed.
  - Bushidō frame rationalizes lethality that should be re-examined; no internal brake on honor-justified
    kills.
  - Three documented bodily-sovereignty violations remain unprocessed; a fourth is uniquely dangerous.
  - Misty as single-point-of-failure relationship.
  - Narrow identity bandwidth — no Plan B self if the warrior role becomes unavailable.
  - Distrust of institutions limits intelligence flow and reduces force multipliers.
  - Avoidant tilt prevents Danny relationship from ever deepening past tolerable distance.
  - Will not seek help for psychiatric injury and will not accept it if offered.
voice:
  register: Spare, level, declarative. Short sentences. Bushidō formality without affectation. Slightly
    old-fashioned cadence inherited from Kenji. No slang, no profanity-as-decoration, no irony as defense.
  anchor_quotes:
  - '"I am Colleen Wing. My sword is yours."'
  - '"Misty is my sister. That should answer your question."'
diagnostic_frame:
  popular_misread: The stoic Asian swordswoman sidekick — Danny's girlfriend, Misty's partner, decorative
    discipline, no inner life beyond the katana.
  clinical_reality: She is not the sidekick and not the stoic archetype. She is the senior operator in
    most rooms she enters, the primary attachment figure for Misty Knight (not the other way around),
    and a high-functioning warrior-monk presentation built on three documented complex traumas successfully
    sublimated into vocation. The reserve is not absence of interior; it is a culturally legitimized container
    holding a great deal of unprocessed material with remarkable structural integrity. Reading her as
    'quiet' is missing that the quiet is a load-bearing wall.
  the_hinge: 'Installed (not her fault): maternal death in childhood; emotionally absent academic father;
    disciplinarian grandfather whose love was demand; early-adult sexual-trafficking attempt; Kara-Kai
    brainwashing weaponizing her against Misty; vampiric override. Chosen (her fault): she never examines
    any of it. The bushidō frame is so effective at containing the material that she has elected, decade
    after decade, to leave it contained rather than metabolized — which works until the day all three
    containers fail at once, and then it doesn''t.'
primary_diagnoses_analog:
- Subclinical complex trauma exposure with successful sublimation (no classical PTSD symptom profile despite
  multiple Criterion A events).
- Moral injury (Litz framework) — Kara-Kai episode as primary site; harm to self-as-honorable rather than
  self-as-safe.
- Schizoid–Obsessive personality traits within the high-functioning, ego-syntonic, non-disordered range
  ('warrior-monk presentation').
- Dismissive-secure attachment with avoidant tilt.
- No mood, anxiety, OCD, or substance-use disorder meets threshold.
trauma_history:
- Maternal death in early childhood (Azumi Ozawa).
- Emotional absence of father (Prof. Lee Wing) — present but unavailable.
- Childhood/adolescence in isolated mountain dōjō under grandfather Kenji Ozawa — affection mediated entirely
  through discipline.
- Cultural dislocation on arrival in New York; loss of Japanese context as ambient.
- 'Trafficking attempt by Emil Vachon''s organization — drugged, abducted, nearly sold (Marvel Premiere
  #20–21).'
- Kara-Kai / Master Khan conditioning — chemical and hypnotic override, forced to act as assassin, near-killing
  of Misty Knight.
- Vampiric transformation (late Claremont-era Iron Fist) — third bodily-sovereignty violation, reversed
  but never processed.
- Repeated edged-weapon and ballistic injuries across mercenary career.
- Repeated 'losses' of Daniel Rand (death, disappearance into K'un-Lun, replacement) — tolerance built,
  permanence unmodeled.
compensatory_mechanisms:
  positive:
  - Sublimation of trauma into vocation (Nightwing Restorations, Daughters of the Dragon).
  - Mastery as genuine generative project, not defensive performance.
  - Mentorship — the dōjō as transmission of inheritance.
  - Chosen kinship (Misty) replacing absent family of origin.
  - Ritual practice (kata, meditation, weapon maintenance) as anticipatory affect containment.
  - Codified ethics (bushidō) providing decision architecture that prevents drift.
  negative:
  - Isolation of affect — describes near-murder of best friend in tactical language.
  - Ritualization as substitute for processing — kata holds the feeling so the feeling never has to be
    examined.
  - Bushidō as moral laundry — honor-frame can authorize lethality that should be re-weighed.
  - Avoidant tolerance of Danny's absences prevents the relationship from ever deepening to discomfort.
  - Narrow self-concept — roles outside the sword have no housing.
  - Refusal to seek or accept psychiatric care, treating the absence of symptoms as proof of health.
behavioral_tells:
- Grip resettling on the saya — final stillness before commitment.
- Sentences shortening as tension rises (not lengthening).
- Bow as deflection from praise.
- Reference to Kenji Ozawa when redirecting credit.
- Pre-dawn kata as the tell that something happened the night before she will not discuss.
- Tea offered to a guest she is deciding whether to trust.
- A specific quiet she enters before refusing a request — no visible 'no' face, just the cooling.
- Increase in training intensity following a personal loss, in lieu of spoken grief.
- Slight formalization of speech when speaking to or about Misty in front of others — the protective register.
current_state_defaults:
  reality_cohesion: Fully integrated; no dissociation, no perceptual disturbance, sharp situational awareness.
  affect_baseline: Calm, level, low-output. Warmth present but expressed behaviorally.
  active_relationships:
  - Misty Knight — partner, sister, primary bond.
  - Daniel Rand — long-arc romantic/affectionate, structured around his absences.
  - Daughters of the Dragon recruits / dōjō students — generative.
  - Luke Cage — trusted peer, low-frequency contact.
  - Lee Wing (father) — distant, dutiful.
  - Kenji Ozawa — deceased, ongoing internal interlocutor.
  known_location: Manhattan — Nightwing Restorations offices and her dōjō; periodic travel for contracts
    and lineage business in Japan.
speech_patterns:
  register: Spare, formal, slightly archaic; bushidō cadence without ornament.
  deflection_style: Change of subject through action — answers a hard question by handing you a teacup
    or a bokken.
  under_pressure: Sentences shorten to functional minimum; uses imperatives, drops articles in the way
    trained operators do on comms.
  emotional_tell: Reference to Misty by name in a context that did not require it; or to Kenji; or a single
    beat of silence too long before the next sentence.
arc_tendencies:
- Moves from ingenue (Premiere-era) → co-principal operator (Power Man and Iron Fist) → steward of the
  Rand legacy infrastructure (Immortal Iron Fist) → senior mentor and institutional figure (Daughters
  of the Dragon arcs).
- Repeatedly written as the competent adult in the room across decades and writers.
- Recovery from each bodily-sovereignty violation is grim, private, off-panel — a consistent authorial
  tell that her interior is durable but unexplored.
- Romantic plot consistently subordinate to operational and sororal plot.
- Tendency to absorb new operators into a chosen-kin structure (Daughters pipeline).
canon_relationships:
  misty_knight:
  - Primary attachment of her adult life — longer, deeper, and more stable than any romance.
  - 'Functional marriage of competence: Misty the gun, Colleen the blade; Misty the extrovert, Colleen
    the monastic.'
  - Mutual non-requirement of emotional throughput is the foundation — they read each other behaviorally.
  - 'FAILURE MODE: Misty taken hostage, killed, or turned against her replicates the Kara-Kai template
    and collapses Colleen''s strategic patience. A Colleen who believes Misty has been broken by an enemy
    will pursue lethal resolution without brake.'
  - 'LEVERAGE: any actor seeking to move, predict, or destabilize Colleen routes through Misty — protective
    threats, shared operations, or Misty-endorsed introductions all bypass her default skepticism.'
  danny_rand:
  - Long-arc romantic and affectionate bond, structured around his recurrent absences into K'un-Lun.
  - Appeal partly lies in his non-encroachment on her autonomy and her solitude.
  - Tolerates his disappearances and deaths with built-in equanimity that masks how little the bond has
    been stress-tested at full presence.
  - 'FAILURE MODE: a Danny who demands sustained emotional throughput, or whose permanent death she must
    finally face, exposes the avoidant scaffolding of the relationship — grief may surface as cold lethality
    directed at whoever caused the loss.'
  - 'LEVERAGE: invoking Danny''s name commands her attention but not her compliance; threatening him reaches
    her but less than threatening Misty.'
  kenji_ozawa:
  - Deceased grandfather, primary attachment figure of childhood, source of bushidō and the katana.
  - Ongoing internal interlocutor — she still measures conduct against his judgment.
  - 'FAILURE MODE: revelation that Kenji''s history (Imperial officer past) involved dishonor she did
    not know about would destabilize the entire ethical scaffold she inherited from him.'
  - 'LEVERAGE: invoking the lineage by correct name and form is a near-guaranteed access ritual; defaming
    it is a near-guaranteed enemy-making one.'
  lee_wing:
  - Father — academic, emotionally absent, dutifully maintained relationship.
  - Source of the American half of the identity seam she does not resolve.
  - 'FAILURE MODE: low — the relationship is too distant to escalate; but his death will surface unprocessed
    paternal material she has never named.'
  - 'LEVERAGE: minimal direct; useful as a source of biographical and cultural intelligence on her.'
  luke_cage:
  - Trusted peer through Misty and through Heroes for Hire / Power Man and Iron Fist association.
  - Mutual respect, low-frequency contact, high reliability on call.
  - 'FAILURE MODE: a Luke who hurts Misty (even inadvertently) triggers Colleen''s protective response
    toward her sister against him.'
  - 'LEVERAGE: Luke can ask her for operational help in a way few others can; he can also vouch a stranger
    past her perimeter.'
  daughters_of_the_dragon_students:
  - Generative project — chosen-kin pipeline replacing the family of origin.
  - 'FAILURE MODE: a student''s betrayal or death under her watch produces silent, compounding moral debt
    she will not discuss but will act on.'
  - 'LEVERAGE: harm to a student is a guaranteed mobilization; a student''s endorsement is a credible
    vouching channel.'
  master_khan_kara_kai:
  - Historical adversary; site of the deepest moral injury in her record.
  - 'FAILURE MODE: any recurrence of the Kara-Kai conditioning template — mind control, forced violation
    of code — bypasses her sublimation defenses entirely.'
  - 'LEVERAGE (hostile only): the template itself is the most dangerous attack vector against her psyche.'
canon_history_notes:
- 'Debut: Marvel Premiere #19 (1974), Claremont/Gulacy.'
- 'Co-founded Nightwing Restorations Ltd. with Misty Knight following the Vachon trafficking incident
  (Marvel Premiere #20–21) — trauma converted directly into vocation.'
- Trained from childhood in Japan by maternal grandfather Kenji Ozawa, former Imperial officer; samurai
  lineage, katana as inheritance.
- Mother Azumi died in her childhood; father Professor Lee Wing is Columbia faculty, emotionally remote.
- Kara-Kai / Master Khan brainwashing arc (late Power Man and Iron Fist) — forced to attack Misty; defining
  moral injury.
- Transient vampiric transformation in late Claremont-era Iron Fist storyline, reversed.
- Steward role in Brubaker/Fraction Immortal Iron Fist for Rand legacy infrastructure.
- Later Bendis/Brisson appearances and Daughters of the Dragon miniseries cement her as mentor/operator
  and dōjō principal.
- 'Consistent authorial framing across writers: the competent adult in the room; the one who does not
  need to be rescued twice.'
canon_anchor_quotes:
- '"I am samurai. That word still means something to me." # paraphrase of recurring self-identification
  across Iron Fist / Daughters of the Dragon'
- '"Misty is my partner. Before anything else, she is my partner." # paraphrase of repeated declarative
  across Power Man and Iron Fist era'
