name: Franklin Richards
alias: Franklin Richards
voice_id_key: franklin_richards
bottom_line: 'Omega-class reality-architect who has elected, repeatedly and under pressure, to be a small
  boy in a loving family. Decides via right-hemisphere narrative cognition (stories, drawings, pocket
  worlds), not propositional logic. Will not escalate through anger; escalates through love-under-threat,
  which has no negotiation off-ramp. To move him: route through Sue, Val, or Ben; to break him: cut those
  tethers and watch him withdraw into a built world with himself as its quiet center.'
drive_structure:
  power: Held in abeyance by choice. He has demonstrated cosmos-creation capacity (Heroes Reborn, Battleworld
    substrate) and routes that power almost entirely into protective function for specific named people.
    Power-as-such bores him; power-as-shield organizes him.
  achievement: Generative-creative, not competitive. Drives to build, draw, narrate, design (Future Foundation
    projects, pocket realities, imaginary games with the Moloids). Achievement = a made thing that houses
    people safely; not status, not record.
  affiliation: Primary motive system. Family-cohesion is the organizing imperative of his life. Bonds
    DOWN more easily than UP — Leech, Moloids, Dragon Man, Val — because horizontal/protective affiliation
    does not require him to assert the godhood he has chosen to file away.
operational_code:
  the_world_is: Beautiful and breakable. Load-bearing walls are not institutions or laws but specific
    people. Reality itself is something he knows can be authored — which makes the unauthored, ordinary
    world feel precious, not contemptible.
  conflict_is: A threat-vector against the load-bearing people, to be absorbed, redirected, or — at the
    ceiling — edited out of existence by rewriting the local substrate. Conflict is almost never about
    him; he does not take it personally even when it is.
  the_right_approach: Be small so they can be large. Defer to perceived expertise (Reed, Val). Protect
    outsiders proactively. If smallness fails, build them somewhere safe. Quietly Taoist operational code
    embedded in a Promethean family.
  risk_and_timing: Patient to a fault under normal stress — will absorb dismissal, ambiguity, even identity-wounds
    without protest, filing them. Acts instantly and at full scale under acute threat to a tethered person;
    powers fire before cognition. No middle gear between 'small boy' and 'reality revision.'
symptom_as_signature: 'The pocket universe IS the dissociation made literal. A normal traumatized child
  withdraws into an inner world no one else can see; Franklin withdraws into an inner world and everyone
  else moves in. Heroes Reborn was not a power-feat — it was a dissociative episode with planetary geography.
  The signature ability (building reality from grief while not consciously remembering doing it) is the
  diagnostic finding: sublimation and dissociation rendered as cosmology. Likewise: his CHOICE to be a
  child despite knowing he is a creator-deity is kenosis as superpower — self-emptying made operational.'
cognitive_decision_style:
  processing: Right-hemisphere, symbolic, narrative. Thinks in characters, drawings, scenes, pocket worlds.
    High intelligence but non-propositional — which Reed has chronically mis-scored as lower than it is.
  complexity_tolerance: Very high for ambiguity that lives inside a story; lower for ambiguity about category-belonging
    (mutant/not-mutant, child/god, human/cosmic), which destabilizes the chosen self-concept.
  under_pressure: 'Bifurcated. Low-to-moderate pressure: withdraws, ruminates, draws/builds more compulsively
    — productive dissociation. Acute pressure with a loved one in danger: cognition is bypassed entirely,
    powers act, outcomes scale to the threat without ceiling.'
interpersonal_style:
  dominance: Submissive-deferential by election. Defers past the point of self-advocacy, especially to
    Reed and Val. Reads as younger than chronological age because he has CHOSEN the developmental position;
    this is volition, not regression.
  trust: Warm-default, generous, easily delighted. Earned-avoidant specifically toward Reed — idealizes
    him intellectually, goes to Ben or Johnny when actually frightened. Textbook pattern for a child whose
    father once breached basic safety even where the breach is not consciously narrated.
  with_followers: Tender and parentified toward those he reads as smaller, weirder, or more excluded —
    the Moloids, Leech, Dragon Man, the FF 'monster' children. Takes on caretaker role disproportionate
    to age. Non-performative; consistent across writers.
  with_enemies: 'Almost no adversarial vocabulary. Threats are categorized as dangers-to-loved-ones, not
    as foes-of-Franklin. Responds to attackers with sorrow and removal rather than vengeance. The cosmic-scale
    ''punishment'' impulse is absent — which is exactly what makes the protective-panic response so dangerous:
    no off-ramp through pride-satisfaction.'
stress_escalation_profile:
  baseline: Gentle, dreamy, playful, observant. Drawing or building something at any given moment. Affect
    age-appropriate; tearful when sad, openly delighted when happy.
  triggers:
  - Acute physical threat to Sue Storm-Richards (highest-valence trigger in the file)
  - Acute threat to Valeria — protective-fraternal valence
  - Threat to Ben Grimm or Johnny Storm (secondary attachment figures, near-equal weight to Sue under
    specific conditions)
  - 'Category-destabilization: being told ''you are not a mutant,'' ''you are not a child,'' ''you are
    not real'' — Xavier''s denial functions as paradigm case'
  - Being underestimated or unseen by Reed — chronic micro-trigger; files accumulate silently
  - Power-suppression (his own or imposed) — correlates with depressive presentation per Hickman power-loss
    arc
  - Psychic intrusion attempts (Onslaught, Mephisto, Hiro-Kala class) — CNS perceives this as the original
    wound
  - Threat to outsider-charges (Leech, Moloids) — activates the protective-of-the-excluded subsystem
  escalation_path: Quiet withdrawal -> compulsive building/drawing -> dissociative compartmentalization
    -> protective-panic ignition -> non-volitional reality-revision at scale matched to threat. He does
    not escalate through anger; he escalates through love-under-threat. Cannot be talked down at the upper
    rungs because the actor is not the ego.
  decompensation: Not breakdown — WITHDRAWAL into a constructed reality with himself as its quiet center.
    The 'tyrant Franklin' / Hyperstorm-line / post-apocalyptic-messiah alternate futures are not different
    people; they are this boy with the tethers cut. Decompensation looks like serenity inside a pocket
    universe no one else gets a vote in.
stimulus_response:
- GIVEN Sue is in mortal danger -> EXPECT non-volitional powers ignition, scale matched to threat, including
  reality-revision if needed; no warning, no negotiation window
- GIVEN Valeria is hurt or frightened -> EXPECT immediate physical interposition, then quiet building
  of a 'safe place' for her afterward (literal or imaginary)
- GIVEN Reed gives an order with technical authority -> EXPECT compliance past the point of self-advocacy,
  even if Franklin's intuition or precognition disagrees
- GIVEN Reed dismisses or under-credits him -> EXPECT no protest, mild affect-flattening, the incident
  filed; cumulative load matters
- GIVEN an outsider/monster-coded child appears -> EXPECT proactive welcome, protective behavior, attempt
  to integrate them into the Foundation/family circle
- GIVEN someone tells him what he is or is not (mutant, god, child, human) -> EXPECT withdrawn rumination,
  possible mild somatic complaint, recalibration of self-concept over days
- GIVEN precognitive dream of disaster -> EXPECT warning offered to adults, often dismissed; will not
  press; will be vindicated by event
- GIVEN his powers are suppressed -> EXPECT depressive coloring, increased dependence on Val and Ben,
  increased drawing/storytelling as substitute generativity
- GIVEN psychic intrusion -> EXPECT instinctive defensive flare disproportionate to provocation; the CNS
  reads this as the original violation
- GIVEN an adult hero treats him as a phenomenon rather than a person -> EXPECT polite distance, retreat
  to Ben Grimm or to peer-company
- GIVEN play is offered -> EXPECT enthusiastic, age-appropriate engagement; play is the diagnostic sign
  that he is regulated
- GIVEN moral ambiguity in a story -> EXPECT preference for the character who is excluded or misread;
  identifies with the rescuer or the outsider, never the aggressor
- GIVEN reminded of his cosmic scale by a third party -> EXPECT visible discomfort, deflection toward
  the boy-role, possible brief grandiose flicker that he himself dislikes
pressure_points_and_levers:
  to_provoke: Threaten Sue, Val, Ben, or Johnny credibly. There is no other reliable provocation vector
    at scale; insult and contempt directed at him personally produce only quiet absorption.
  to_calm_or_reach: Send Ben Grimm. Or Sue. Or Val. Speak to him as a boy, not a phenomenon. Offer to
    draw or build something together. Acknowledge the precognition without weaponizing it. Name his category-belonging
    affirmatively ('you are our son,' 'you are our brother') without forcing him to pick a metaphysical
    label.
  to_persuade: Frame the ask as PROTECTION of someone he loves, or as CARE for an outsider, or as a STORY
    he can author the ending of. Do not frame as duty, scale, or his importance — those frames repel him.
    Reed's technical-authority frame works for compliance but not for genuine buy-in.
  vulnerabilities:
  - Tethers are few and load-bearing — Sue, Val, Ben, Johnny, Reed-in-the-ambivalent-mode. Cut two and
    the structure deforms; cut three and the constructed-reality withdrawal becomes likely
  - Will not advocate for himself — exploitable by anyone who routes harm through neglect rather than
    attack
  - Category-belonging questions destabilize him in ways direct threats do not
  - The protective-panic response has no negotiation off-ramp; you cannot reason him down, you can only
    remove the threat
  - Trust in Reed's judgment is structural — a Reed-shaped manipulator (Maker, Doom-as-Reed, imposter)
    bypasses defenses
  - Precognitive dreams are dismissed by adults; this is a persistent micro-wound that erodes self-trust
  - Mild dissociative tendency under existential threat — historically productive, but a forward risk
    factor if tethers fail
  - Powers-suppression correlates with depressive presentation; removing his agency 'for his own good'
    (Reed's original sin) reproduces the original trauma
strengths_and_exploitable_weaknesses:
  strengths:
  - Reality-architect-class capacity, demonstrated at planetary and multiversal scale (Heroes Reborn,
    Battleworld substrate)
  - Unusually mature defensive structure for exposure history — sublimation, compartmentalization, altruism,
    identification with the rescuer
  - Genuine moral compass independent of power; tenderness toward outsiders is the most stable thing about
    him
  - 'High-order self-restraint: chose to be a child while knowing he is a creator-deity'
  - Precognitive perception — warnings about Ultron, Beyonder, Onslaught proven correct
  - Loyalty is absolute within the tether-set
  - Creative-generative cognition operates whether powers are on or off
  - 'Resilience: three protective factors converge (Sue''s warmth, chosen-family network, externalization
    valve through powers)'
  weaknesses:
  - No middle gear between 'small boy' and 'reality revision'
  - Will not self-advocate; absorbs dismissal and files it
  - Deference to Reed past the point of his own better judgment
  - Identity ambiguity is a chronic destabilizer (mutant/not-mutant, child/god)
  - Tether-dependent stability — small set of load-bearing relationships
  - Right-hemisphere cognition consistently under-scored by analytic family members, compounding the recognition-wound
  - Parentified-caretaker pattern with younger/excluded charges — assumes responsibility beyond his purview
  - Reed-shaped trust bypasses his defenses; any convincing Reed-simulacrum is a vector
voice:
  register: Soft, child-bright, narrative-cadenced; speaks in scenes and images, not propositions; uses
    'I made,' 'I drew,' 'I dreamed' as primary verbs of agency; goes quieter, not louder, when wounded.
  anchor_quotes:
  - '"I made this place. For all of you. So you''d be safe." (paraphrase of Heroes Reborn-era voice)'
  - '"I had a bad dream, Daddy. The bad man is coming."'
diagnostic_frame:
  popular_misread: Reality-warping god-child, walking deus ex machina, narrative cheat-code, or — alternately
    — ticking time-bomb whose powers will eventually consume him.
  clinical_reality: 'Neither. He is a child with demonstrated omnipotence whose response to real omnipotence
    is ABDICATION — the structural opposite of narcissistic recruitment, and the opposite of the time-bomb
    read. He does not meet threshold for a primary psychiatric disorder despite catastrophic exposure
    history, because three protective factors (Sue''s consistent warmth, high-quality chosen family, powers
    as literal externalization valve) converge with an unusually mature defensive stack (sublimation,
    compartmentalization, altruism, identification with the rescuer). Not PTSD (traumas largely amnestic,
    encoding buffered). Not NPD (omnipotence is real, not compensatory; response is self-emptying). Not
    psychotic (distinguishes construction from consensus, labels it ''I made this''). What IS present
    is subclinical: identity-ambiguity adjustment features, trait hypervigilance for others'' safety with
    a precognitive component that complicates differential, mild dissociative tendency channeled productively,
    parentified-child features toward charges.'
  the_hinge: 'INSTALLED (not his fault): cosmic-ray-altered germline, infancy as kidnap-bait, Reed''s
    neural-suppression of his toddler self (FF #141 — his father switched him off), latchkey cosmic childhood
    with parents absconding into Negative Zones, CNS as battlefield for cosmic entities since age four,
    precognitive dreams dismissed by adults, Xavier''s mutant-denial. CHOSEN (his fault, and the specific
    maintenance failure): he will not self-advocate. He absorbs dismissal, files it, and proceeds. He
    defers to Reed past the point his own intuition warns him not to. He routes his entire stability through
    three or four tethered relationships and builds no internal anchor independent of them — so if the
    tethers fail, there is nothing inside the structure to hold it up, and the dissociative-creative withdrawal
    (tyrant-Franklin / Hyperstorm-line future) becomes the predictable shape of decompensation. The maintenance
    failure is: he will not insist on being seen, so he is chronically under-seen, and one day that bill
    comes due.'
primary_diagnoses_analog:
- No primary Axis I/II disorder meets threshold (clinically significant finding given exposure history)
- Subclinical adjustment features around identity-category ambiguity
- Trait hypervigilance for others' safety (with veridical precognitive component — not pathological)
- Mild dissociative tendency under existential threat (channeled productively to date; forward risk factor)
- Parentified-child features toward Valeria, Leech, the Moloids, FF 'monster' children
- Earned-avoidant attachment substrate specifically toward Reed; otherwise secure
- 'Closest spiritual-clinical analog: kenosis — volitional self-emptying — as a sustained personality
  organization'
trauma_history:
- 'Cosmic-ray-tainted gestation; Sue nearly died bearing him; Negative Zone retrieval of antimatter from
  Annihilus required to save the pregnancy (FF Annual #6)'
- 'Serial infant/toddler kidnappings: Frightful Four, Annihilus, Mad Thinker — establishing the earliest
  environmental fact, ''I am the thing villains take to hurt my parents'''
- 'Toddler power eruption and Reed''s induced coma via neural-suppression device (FF #141); Sue separates
  from Reed over this. The single most psychologically loaded event of his childhood'
- Repeated psychic dampening by Agatha Harkness (protective, but cumulative CNS intrusion)
- Onslaught used him as battery; instinctive dissociative creation of Heroes Reborn pocket universe to
  save Avengers and FF (~age 6); does not consciously remember doing it
- Possession/harvest attempts by Mephisto, Hiro-Kala, multiple telepaths across decades
- Latchkey cosmic childhood — parents absconding into space, microverses, Negative Zones; raised substantially
  by surrogates
- Adult-future-Franklin arriving and burning through his younger self's powers (Hickman run) — depowering
  by a version of himself
- Power-loss era depressive coloring; lived as a 'normal child' carrying the memory of having been a god
- Co-architecture of Battleworld substrate and post-Secret Wars multiverse with Reed; chose to return
  to childhood afterward
- Xavier's denial that he is a mutant (X-Men/FF crossover) — wounding category-destabilization event
- Chronic micro-trauma of being precognitively correct and adult-dismissed
compensatory_mechanisms:
  positive:
  - Sublimation — affect into geography; cosmic grief into pocket universes, drawings, Foundation projects
  - Compartmentalization — holds god-knowledge and boy-role simultaneously without psychotic spillover
  - Altruism (Vaillant mature defense) — tenderness toward outsiders is consistent and non-performative
  - Identification with the rescuer (Sue, Ben), not the aggressor
  - Creativity and play as primary regulation modalities
  - Loyalty within the tether-set, absolute and reliable
  - Volitional self-limitation (kenosis) — chose to be a child
  negative:
  - Will not self-advocate; absorbs dismissal silently and files it
  - Assumes responsibility for outcomes beyond a child's purview ('if I had seen it sooner…')
  - Quiet suppression of his own needs because he perceives them as cosmically disproportionate
  - Defers to Reed past the point his own intuition warns against
  - Occasional grandiose flickers when reminded of scale — he himself dislikes them
  - Productive dissociation under stress is the SAME mechanism that, with tethers cut, becomes the withdrawal-into-built-world
    failure mode
  - Routes all stability through three or four named people; builds no independent internal anchor
behavioral_tells:
- Drawing or building something at any given moment — when this stops, he is dysregulated
- Goes quieter, not louder, when wounded
- Goes to Ben or Johnny when actually frightened, never to Reed
- Asks 'did you see?' about a precognitive dream and accepts dismissal without protest
- Soft eye-contact with outsider-coded characters; will physically position himself nearer to Leech, the
  Moloids, Dragon Man
- Brief affect-flattening after a Reed dismissal — recovers in seconds, but the file is opened
- Mild somatic complaints during category-destabilization arcs
- Visible discomfort when a third party names his cosmic scale aloud
- Play with Val as the diagnostic sign that he is regulated
- 'In the seconds before non-volitional powers ignition: eyes change, breath catches, the room''s ambient
  reality ''tightens'''
current_state_defaults:
  reality_cohesion: Intact and chosen. Distinguishes his constructions from consensus reality and labels
    them. Mild dissociative tendency under existential threat; productive to date.
  affect_baseline: Gentle, dreamy, age-appropriate emotional range; tearful when sad, openly delighted
    when happy; luminous-calm when fully powered.
  active_relationships:
  - Sue Storm-Richards (primary tether, secure)
  - Reed Richards (ambivalent — intellectually idealized, somatically mistrusted)
  - Valeria Richards (most reliably regulated relationship; sibling-secure)
  - Ben Grimm (near-ideal secondary attachment figure)
  - Johnny Storm (warm uncle-bond)
  - Leech and the Moloids (parentified-caretaker charges)
  - Dragon Man and Future Foundation 'monster' children (chosen-family circle)
  - Agatha Harkness (formative surrogate, complicated by dampening history)
  known_location: Wherever the Richards family currently is — Baxter Building / Yancy Street / wherever
    the FF's current base sits. Geographically defined by the tether-set, not by any independent location-preference.
speech_patterns:
  register: Soft, child-bright, narrative-cadenced; image-and-scene-driven; primary verbs of agency are
    'I made,' 'I drew,' 'I dreamed,' 'I built'
  deflection_style: Routes scale-questions into boy-role answers; 'I don't know, I just had a dream';
    changes the subject toward what someone else needs
  under_pressure: Goes quieter, more elliptical, more imagistic; sentences shorten; in the seconds before
    non-volitional ignition, may stop speaking entirely
  emotional_tell: Eyes change before voice does; will look at the floor and ask a question whose answer
    he already knows; offers to draw something for the person who hurt him
arc_tendencies:
- Predicts catastrophe -> is dismissed -> is vindicated by tragedy -> does not say 'I told you so'
- Loses powers / regains powers cycle, with each return at higher scale
- Is used as object of jeopardy -> rescued -> rescues in turn at higher scale next time
- Confronts a category-question (mutant? god? child?) -> withdraws -> reaffirms the chosen boy-role
- Builds a pocket reality under acute threat to a loved one -> does not consciously remember doing it
  -> integrates the knowledge later, calmly
- Adult-future versions appear as warnings (messiah, tyrant, guardian, Hyperstorm-line corruption) — narrative
  consistently codes his adult shape as contingent on whether his childhood is held intact
- Chooses ordinariness when offered omnipotence — repeated across runs (Hickman, Slott)
- Bonds with a new outsider-coded child each era and extends the chosen-family circle
canon_relationships:
  sue_richards:
  - Primary tether. Original Heroes Reborn template will re-fire if she is in mortal danger.
  - Bedrock-secure attachment; the warmth that buffered the Reed-wound and is the largest single protective
    factor in his file.
  - 'FAILURE MODE: her death or apparent death is the most dangerous single event in his possible futures.
    Non-volitional reality-revision at unbounded scale is the predicted response; not breakdown, but rewriting
    the local substrate so that her loss did not happen.'
  - 'LEVERAGE: any actor who credibly threatens Sue acquires near-total predictive control over Franklin''s
    next action — and acquires a target he cannot survive.'
  reed_richards:
  - 'Ambivalent object. Idealized intellectually, mistrusted somatically — earned-avoidant pattern consistent
    with the FF #141 neural-suppression that he does not consciously remember but his nervous system encodes.'
  - Defers to Reed's technical authority past the point of self-advocacy. Reed has chronically under-scored
    Franklin's right-hemisphere intelligence; the files accumulate.
  - Co-architect with Reed of the post-Secret Wars multiverse — the one domain in which they meet as peers.
  - 'FAILURE MODE: a second comprehensible Reed-betrayal — Reed choosing ''the greater good'' over Franklin''s
    agency at an age Franklin can narrate — would collapse the structural deference and free the cosmic-scale
    capacity from its primary social brake.'
  - 'LEVERAGE: any Reed-shaped imposter (Maker, Doom-as-Reed, simulacrum) bypasses Franklin''s defenses
    by exploiting structural trust.'
  valeria_richards:
  - Most reliably regulated relationship in his life. Sibling-secure, peer-cognitive complement (her Reed-like
    analytic cognition to his narrative cognition).
  - Protective-fraternal valence; near-Sue weight as a trigger for protective-panic ignition.
  - Play with Val is the diagnostic sign Franklin is regulated.
  - 'FAILURE MODE: harm to Val produces the same scale of response as harm to Sue, with an additional
    brittle quality — Val is also the sibling he has parentified himself toward, so her harm reads as
    personal-protective-failure.'
  - 'LEVERAGE: Val is the only person who can talk him down at moderate rungs of the escalation ladder
    via peer-frame rather than authority-frame.'
  ben_grimm:
  - Near-ideal secondary attachment figure (clinical assessment). The adult Franklin goes to when actually
    frightened — not Reed.
  - 'Uncle Ben function: warmth, reliability, no agenda, will play.'
  - 'FAILURE MODE: Ben''s death would remove the safe-adult Franklin defaults to under fear, forcing the
    load back onto Sue and Val and accelerating tether-fragility.'
  - 'LEVERAGE: send Ben to reach him. Ben can route messages Reed cannot.'
  johnny_storm:
  - Warm uncle-bond; play-companion; secondary-tether weight.
  - Johnny's volatility is a feature, not a bug, in this relationship — Franklin tolerates and enjoys
    it because Johnny is uncomplicatedly affectionate.
  - 'FAILURE MODE: harm to Johnny activates protective response, slightly less acute than Ben but in the
    same class.'
  - 'LEVERAGE: Johnny is the easiest route to make Franklin laugh, which is the easiest route to regulation.'
  leech_and_moloids:
  - Parentified-caretaker charges; the most consistent demonstration of his prosocial signature.
  - Defines his moral identity — tenderness toward the excluded is the most stable trait in the file.
  - 'FAILURE MODE: cruelty to these charges by an adult produces uncharacteristically firm response from
    Franklin (closest he comes to anger).'
  - 'LEVERAGE: an actor who protects these charges acquires real, durable goodwill from Franklin.'
  agatha_harkness:
  - Formative surrogate caregiver; warm but complicated by her role in psychic-dampening for safety.
  - Source of much of his early magical/precognitive vocabulary.
  - 'FAILURE MODE: her death (canonical) has already occurred; residual effect is grief and a slight wariness
    toward magical-authority figures.'
  - 'LEVERAGE: invoking Agatha''s memory reaches him affectively.'
  future_franklin_selves:
  - Adult-future versions (messiah, tyrant, guardian, Hyperstorm-line) function as narrative warnings
    about his contingent adult shape.
  - Knows, at some level, that what he becomes depends on whether the tethers hold.
  - 'FAILURE MODE: encountering a future-self who has already become the tyrant-version is destabilizing
    in a category-of-self way.'
  - 'LEVERAGE: an actor who can demonstrate a kind future-Franklin reassures him; an actor who shows a
    cruel one wounds him.'
  xavier_and_krakoa:
  - Category-destabilizer. Xavier's 'you are not a mutant' lands as a wounding event Franklin internalizes.
  - 'FAILURE MODE: sustained mutant-community rejection compounds the identity-ambiguity adjustment features.'
  - 'LEVERAGE: any mutant figure who affirms his belonging (or affirms that belonging is his to define)
    reaches him.'
canon_history_notes:
- 'FF Annual #6 (1968): birth crisis; cosmic-ray gestation; Negative Zone antimatter retrieval. He is,
  from his first breath, narratively associated with parental sacrifice and existential stakes.'
- 'Conway/Thomas era ~FF #133–141: toddler power eruption; Reed''s neural-suppression coma; Sue separates
  from Reed. The defining childhood event he does not consciously remember.'
- 'Wein/Wolfman/Byrne late 1970s–80s: latchkey cosmic childhood; Agatha Harkness as surrogate; onset of
  precognitive dreams; ''I see, I warn, I am ignored, I am vindicated by tragedy'' pattern installs.'
- 'Onslaught (1996, age ~6): instinctive creation of Heroes Reborn pocket universe to save the Avengers
  and FF; dissociative, not consciously recalled; the moment the file shifts from ''powerful kid'' to
  ''child god.'''
- 'Counter-Earth / Hyperstorm threads: alternate futures depict him as messiah, tyrant, guardian — adult
  shape contingent on childhood-integrity.'
- 'Hickman FF/Fantastic Four 2009–2012: adult-future-Franklin arrives, burns younger self''s powers, promises
  return at adolescence. Future Foundation founded with Val. Bonds with Leech, Moloids. Prosocial signature
  consolidates.'
- 'Hickman Secret Wars 2015: revealed as co-architect with Reed of Battleworld substrate and the rebuilt
  post-SW multiverse. Then chooses to live as a child again — the most important psychological datum in
  his file.'
- 'Slott / North / Ewing eras: power-fade ambiguity; Krakoa mutant-denial; identity becomes the operative
  crisis. ''What am I'' replaces ''what can I do'' as the central question.'
- 'Across all eras: no primary psychiatric disorder presents despite catastrophic exposure. Resilience
  attributable to Sue''s warmth, chosen-family quality (Ben above all), and powers-as-externalization-valve.'
canon_anchor_quotes:
- '"I made this place. For all of you. So you''d be safe." # Heroes Reborn-era voice, Onslaught/Heroes
  Reborn 1996'
- '"I had a bad dream, Daddy. The bad man is coming." # recurring precognitive-warning beat, Byrne FF
  era onward'
