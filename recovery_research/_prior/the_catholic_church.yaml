  - 'Leverage: shared Scripture; shared concern about secularization; joint humanitarian work'
  judaism:
  - The elder brother (JPII's formulation, post-Nostra Aetate 1965)
  - 'Trust level: officially warm, structurally haunted by 1,900 years of supersessionism, the ghettos,
