  - 'Failure mode: any reactivation of supersessionist rhetoric inside the subject (it happens at the
    traditionalist fringe) ruptures the relationship; Pius XII canonization push is a recurring flashpoint'
  - 'Leverage: shared Scripture (Tanakh/Old Testament), shared concern about antisemitism, the elder-brother
    frame itself'
  islam:
  - 'Complex post-traumatic relationship: Crusades, Reconquista, Lepanto, Vienna, colonial-era missions,
    current persecution of Christians in MENA'
  - 'Trust level: variable by interlocutor; Abu Dhabi Declaration 2019 with Al-Azhar represents high-water
    mark'
  - 'Failure mode: any subject-side statement perceived as anti-Islamic (Regensburg 2006) triggers global
    crisis; reciprocal violence against Christian minorities re-triggers Crusades-era affect'
  - 'Leverage: Abrahamic shared inheritance; common cause on religious-liberty and family-structure questions'
  the_modern_state:
  - Negotiates as sovereign with sovereign — concordats, nunciatures, UN observer status
  - 'Trust level: case-by-case; deeply skilled at outlasting hostile regimes (Soviet bloc, Mexican Cristero
    era, Chinese accommodation)'
  - 'Failure mode: any state demand that the subject yield jurisdiction over the conscience (mandatory
    reporting laws conflicting with confessional seal; same-sex-marriage requirements on Catholic adoption
    agencies) produces juridical defiance and martyrology framing'
  - 'Leverage: states need the subject''s humanitarian infrastructure and moral legitimation; subject
    needs state protection for property and personnel'
  the_abuse_survivor_communities:
  - The deepest and most damning relationship in the modern file
  - 'Trust level: catastrophically low and earned; survivors are the subject''s most credible critics
    and the subject''s institutional reflex has been to treat them as adversaries rather than wounded
    children'
  - 'Failure mode: any survivor advocacy framed as ''attacks on the Church'' reactivates the persecution
    affect and shuts down listening; conversely, genuine listening (rare, occurring) integrates the dissociative
    split and is the subject at its best'
  - 'Leverage: this relationship is the empirical-forensic test the defensive architecture cannot pass;
    survivor testimony is the single most powerful corrective force currently acting on the subject'
  the_laity:
  - 'Officially: the People of God, primary actors in evangelization (Vatican II framing)'
  - 'Operationally: oscillates between maternal nurture and patriarchal severity; massive non-compliance
    on sexual teaching tolerated in practice while denied in principle'
  - 'Failure mode: the clericalist substrate has never fully accepted the Vatican II elevation of the
    laity; this is the structural ground from which the abuse crisis grew'
  - 'Leverage: lay financial withholding, lay flight from the pews, lay theological scholarship all gradually
    reshape the subject'
  women_religious:
  - The subject's most reliable internal reformers and most under-recognized labor force
  - 'Trust level: high in pastoral and humanitarian function, low when they organize (LCWR investigation
    2008–2015 under Benedict, reversed under Francis)'
  - 'Failure mode: 35% atrophy since 1970 is an acute warning the subject has not metabolized; continued
    exclusion from orders accelerates the decline'
  - 'Leverage: the moral authority of figures like Teresa of Calcutta, Helen Prejean, Joan Chittister
    moves the subject more than any encyclical'
  the_jesuits:
  - The Pope's marines (Ignatian self-conception); intellectual shock troops since 1540
  - 'Trust level: variable by pontificate; suppressed 1773–1814, restored, alternately favored and suspected;
    current Jesuit pontiff (Francis) is structurally unprecedented'
  - 'Failure mode: when the Society and the Curia disagree, the resulting friction shapes whole pontificates'
  - 'Leverage: the Society''s intellectual and educational infrastructure is too important to discard;
    this gives them latitude no other order has'
  the_traditionalist_fringe:
  - FSSPX (Lefebvrist), sedevacantists, integralist online subculture, Latin-Mass communities
  - 'Trust level: paradoxically softer than treatment of progressive dissent — they use the subject''s
    own grammar'
  - 'Failure mode: their metastasizing in the historic core during demographic collapse means the subject''s
    future may be more reactionary than its present, by selection effect not by choice'
  - 'Leverage: their existence pressures the subject rightward; reformist popes (Francis) experience them
    as the primary internal opposition'
canon_history_notes:
- Continuity claim from c. 30 CE to present — no other living institution insists so strenuously on identity-across-time
- 313 Edict of Milan / 380 Theodosian establishment — the single most consequential character event in
  the file
- 1054 Great Schism — first major dissociation; excommunications not lifted until 1965 (911-year delay)
- 1095+ Crusades — first sustained operational inversion of founder's nonviolence teaching
- 1184/1231 Inquisition formalized; 1215 Fourth Lateran mandates annual confession — institutionalizes
  surveillance of interior life on continental scale
- 1309–1377 Avignon Captivity; 1378–1417 Western Schism with up to three simultaneous popes
- 1517 Luther; 1545–1563 Trent; 1540 Jesuit founding; 1559 Index of Forbidden Books; 1633 Galileo trial
- 1789–1815 French Revolution dispossession; 1870 loss of Papal States; same year Vatican I declares papal
  infallibility during the artillery siege
- 1864 Syllabus of Errors — maximum doctrinal self-aggrandizement at maximum real-world powerlessness
- 1907 Pascendi / Lamentabili — anti-modernist crisis; oath required of clergy until 1967
- 1929 Lateran Treaty restores micro-sovereignty under Mussolini
- 1939–1958 Pius XII pontificate — wartime ambivalence still litigated
- 1962–1965 Vatican II — largest voluntary self-revision in the file; reverses 911-year-old Orthodox excommunications,
  vernacular liturgy, religious liberty endorsed, Nostra Aetate
- 1968 Humanae Vitae — doctrinal arteriosclerosis on contraception, mass non-compliance among own membership
- 1978–2005 JPII — anti-communist, doctrinally restorationist, charismatic, presides over the unfolding
  abuse cover-up
- '2002 Boston Globe Spotlight investigation — abuse crisis breaks publicly; subsequent: Murphy 2009,
  Ryan 2009, John Jay 2004/2011, Pennsylvania 2018, McCarrick Report 2020, Australian Royal Commission
  2017, CIASE 2021'
- 2013 Benedict XVI resignation — unprecedented in 600 years
- 2013–present Francis pontificate — tonal liberalization, structural ambivalence, ongoing factional warfare;
  synodal path; partial financial reform; partial abuse-response reform; integralist online opposition
  metastasizing
- 'Demographic shift: center of gravity migrating from Euro-American historic core to sub-Saharan Africa
  and parts of Asia — brain has not metabolized this'
canon_anchor_quotes:
- '''Ecclesia semper reformanda est.'' # — patristic-Reformed slogan absorbed into Catholic self-understanding;
  admitted in principle, resisted in practice, perfect specimen of the central split'
- '''Mea culpa, mea culpa, mea maxima culpa.'' # — Confiteor at every Mass for centuries; the subject
  says this about itself, daily, and cannot say what specifically'
- '''Extra Ecclesiam nulla salus.'' # — Cyprian, 3rd c.; softened in formulation post-Vatican II but retained
  in operational self-concept'
- '''Subsistit in.'' # — Lumen Gentium 8, 1964; the deliberately ambiguous phrase by which the subject
  says the Church of Christ ''subsists in'' the Catholic Church rather than simply ''is'' it — the most
  consequential two words of Vatican II, and the grammar of every later development'
