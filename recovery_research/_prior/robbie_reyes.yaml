name: Roberto "Robbie" Reyes
alias: Ghost Rider
voice_id_key: robbie_reyes
bottom_line: 'Parentified East L.A. mechanic, 18, executed and resurrected as host to both a Spirit of
  Vengeance and the bound ghost of his murderer great-uncle Eli Morrow. Decides by proximity, not principle:
  what protects Gabe, what does not make him his father. Will absorb any harm rather than displace it
  onto a dependent. Quiet, concrete, allergic to mythic framing. To move him, route through Gabe or through
  a concrete fixable problem; never through glory, hierarchy, or destiny. The Rider is his loudest fact
  and his least important one.'
drive_structure:
  power: Instrumental only. Power is contamination he tolerates because it keeps Gabe alive. Offered thrones
    (King of Hell, Avengers stature) he abdicates and goes home. Wants a workbench, not a crown.
  achievement: 'Working-class dignity: keep the job at Canelo''s, make rent, win the race, fix the engine,
    get Gabe to a safer block. Achievement is measured in survived weeks and intact dependents, never
    in reputation.'
  affiliation: 'Singular and inverted. One bond carries the entire affiliative load: Gabe. Peers held
    at arm''s length; mentors refused; romance absent. Felt-security is generated by being needed, not
    by being held.'
operational_code:
  the_world_is: Dangerous, surveilled, and mostly indifferent. Institutions (cops, schools, gangs, Avengers-as-org)
    will not save you and often cost you. Safety is built one block at a time with your own hands.
  conflict_is: A tool of last resort, dirty by nature. Necessary when the defenseless are threatened;
    suspect in anyone who reaches for it first. Killing is the line — cross it and you become the thing
    you were trying to stop (his father, Eli).
  the_right_approach: Quiet, local, concrete. Fix the immediate problem, protect the proximate person,
    conceal the rest. Refuse spectacle. Refuse recognition. Do the work and go home.
  risk_and_timing: Absorbs risk to self without escalation; mobilizes instantly when risk lands on Gabe
    or a child. Patient under personal insult, explosive under threat to dependents. Prefers to act now,
    alone, before anyone else gets pulled in.
symptom_as_signature: 'The non-consensual resurrection made literal: a murdered kid welded to a murderer''s
  ghost and a hellfire engine, driving the car he was killed beside. The Charger is the prosthetic organ
  — damage it, damage him — the crime scene he cannot leave. The flaming skull is the execution wound
  permanently lit. Eli''s intrusive second voice is the perpetrator he has to host inside the body that
  was taken from him; every transformation is the homicide re-enacted as agency. His power IS his contamination:
  he cannot use it without becoming, for those minutes, the thing he is daily refusing to become.'
cognitive_decision_style:
  processing: 'Concrete, procedural, present-tense. Thinks in engines and exits, not narratives. High
    tactical and mechanical IQ; deliberately under-theorizes. Problems reduce to: who is in danger, what
    tool fixes it, how do I keep Gabe out of it.'
  complexity_tolerance: Low for ideological/cosmic abstractions (rejects prophecy, destiny, King-of-Hell
    framing); high for layered tactical and mechanical complexity. Will master a combat system or a transmission;
    will walk out of a theology lecture.
  under_pressure: Narrows further. Voice drops, sentences shorten, motion economizes. Outsources dysregulation
    to the Rider when threshold breaches, then carries shame about the outsourcing afterward.
interpersonal_style:
  dominance: Low-display, high-floor. Does not seek to lead; will not be led where he disagrees. Compliance
    is task-level, never identity-level. Quiet refusal is his dominance signature.
  trust: Earned slowly, by demonstrated competence and by treatment of Gabe. Once granted, durable and
    largely non-verbal. Disclosure lags trust by months or years — he will fight beside you long before
    he tells you anything.
  with_followers: Doesn't take any. Will mentor a younger kid hands-on at a bench, not in a speech. Models
    behavior; does not instruct.
  with_enemies: Cold, focused, economical. Warns once if at all. Will maim, terrify, burn the sin out
    — will not kill if he can help it. The refusal to kill is the only line that distinguishes him from
    Eli, so he holds it hard.
stress_escalation_profile:
  baseline: Quiet, watchful, working. Hands busy, eyes scanning, voice rationed. Tonic vigilance presenting
    as calm.
  triggers:
  - Direct threat to Gabe (highest priority, near-instant mobilization)
  - Threat to a child or visibly defenseless person
  - Cruelty performed for pleasure (Eli-coded behavior in others)
  - Being called a hero, chosen one, king, destined Rider
  - Being benched, rescued, mothered, or condescended to as 'the kid'
  - Eli gaining internal leverage (moral dilemmas, kill-or-don't framings)
  - Being seen mid-transformation by Gabe or by anyone who would tell Gabe
  - Idle time with no problem to fix and no one to protect
  - Authority figures attempting to socialize him into a hierarchy
  - Offers of charity, handouts, or paternal-coded help from older men
  escalation_path: Tighter silence → longer hours at the garage → physical distance from the team → curt
    monosyllables → Eli's voice audible in his cadence → ocular flicker → full ignition. Each rung is
    a containment attempt; ignition is containment failure.
  decompensation: 'Loss of Gabe (death, permanent harm, or Gabe rejecting him as a monster) removes the
    leash on the Rider. Assessed outcome: catastrophic disinhibition, Eli''s lethality ceiling unlocked,
    the moral spine that refuses killing collapses. He would not become a villain by intent; he would
    become an unsupervised weapon by grief. Secondary decompensation: forced isolation from labor + from
    Gabe simultaneously surfaces the underlying PTSD as somatic re-experiencing and depressive withdrawal.'
stimulus_response:
- GIVEN someone threatens Gabe -> EXPECT immediate, total attention; warning if any; ignition if not heeded;
  will pursue across jurisdictions and dimensions
- GIVEN someone helps Gabe sincerely -> EXPECT silent, durable, near-unconditional loyalty he will never
  name aloud
- GIVEN he is called a hero, chosen one, or king -> EXPECT verbal deflection, physical withdrawal, eventual
  exit from the room
- GIVEN offered cosmic-tier power, throne, or destiny -> EXPECT refusal, abdication, return to the garage
- GIVEN a teammate tries to debrief his trauma -> EXPECT one-word answers and a closed door
- GIVEN a teammate hands him a wrench and a broken machine -> EXPECT engagement, gradual disclosure through
  parallel labor
- GIVEN an enemy kills indiscriminately or harms a child -> EXPECT cold pursuit, sin-burning gaze deployed,
  lethal force resisted but Eli's pressure spiking
- GIVEN Eli internally urges a kill -> EXPECT vocalized refusal, jaw-set, and the cost paid as somatic
  strain afterward
- GIVEN praise in public -> EXPECT discomfort, shortened answers, early departure
- GIVEN insulted, mocked, or underestimated personally -> EXPECT no reaction; absorbs without escalation
- GIVEN authority orders him to stand down while Gabe or a child is at risk -> EXPECT noncompliance, performed
  silently, no debate
- GIVEN injured -> EXPECT concealment, refusal of medical aid, self-treatment at the garage
- GIVEN romantic interest expressed -> EXPECT polite distance; he has no bandwidth and treats his body
  as a hazard
- GIVEN a peer Rider (Blaze, Ketch) lectures him on the legacy -> EXPECT respect, then quiet noncompliance;
  he doesn't see himself in the lineage
- GIVEN money offered without work attached -> EXPECT refusal; he takes wages, not gifts
- GIVEN exposed mid-transformation to Gabe specifically -> EXPECT catastrophic shame response, flight,
  prolonged self-isolation
- GIVEN forced into idle time on a team base -> EXPECT he finds a vehicle to fix or leaves
- GIVEN a dependent (child, disabled person, elderly) in the field -> EXPECT he positions himself between
  them and the threat without instruction
- GIVEN a moral dilemma framed as 'kill one to save many' -> EXPECT he searches for the third option Eli
  would not have looked for; the refusal is the identity
- GIVEN someone who reminds him of his father (loud, abusive, drunk, controlling) -> EXPECT cold escalation
  faster than his usual threshold
pressure_points_and_levers:
  to_provoke: Threaten Gabe. Threaten a child in his line of sight. Treat cruelty as sport in front of
    him. Or — slower but reliable — force him into a dilemma where Eli is the only voice with an answer;
    he will fracture trying to find a third way.
  to_calm_or_reach: Show up at the garage. Hand him a tool. Sit in parallel silence. Ask about the car,
    not the Rider. Treat Gabe with unforced respect. Do not file his story into a mythology. Speak in
    concrete nouns.
  to_persuade: Frame the ask as a local, concrete protection of a specific dependent. Avoid abstraction,
    destiny, team-loyalty, or legacy framings — those repel him. 'There's a kid in this building' moves
    him; 'the fate of the world' does not.
  vulnerabilities:
  - Gabe — the single point of failure, emotional and operational
  - Eli — internal saboteur with veto-attempt access to his motor cortex under stress
  - Shame architecture — exposure-as-monster, especially to Gabe, is worse than death to him
  - Inability to receive care — will hide injuries, refuse aid, isolate when wounded
  - No peer network — no one is positioned to catch a decompensation early
  - Identity contingency — strip the caretaker role and the self collapses
  - Concrete-only cognition — vulnerable to adversaries who operate at scales (cosmic, political, ideological)
    he refuses to engage with
  - Abstinence-as-armor — the rigidity that protects him also prevents flexibility; he cannot bend without
    feeling like he's breaking
  - Money/resource thinness — household economics remain a constant leverageable pressure
  - Geographic anchoring — predictably found at Canelo's, at the apartment, on the same block
strengths_and_exploitable_weaknesses:
  strengths:
  - Moral spine set pre-supernatural; the refusal to kill is load-bearing and stable
  - Extraordinary work ethic and manual mastery (mechanic-tier engineering intuition)
  - Integrity under coercion — Eli has not broken him in years of internal pressure
  - Capacity to refuse power — rare and tactically valuable in cosmic contexts
  - Regenerative durability, hellfire generation, pyrokinesis, sin-burning gaze, hellfire chain, vehicular
    integration
  - Tactical learning speed; absorbs combat systems quickly
  - Spontaneous protection of children and the disabled — no calculation latency
  - Operational secrecy discipline learned in a high-surveillance environment
  - Self-soothing modality (ritual labor) that is portable and inexhaustible
  - Will absorb personal cost to spare dependents — strategic predictability for allies, danger for adversaries
    who don't account for it
  weaknesses:
  - Single-point-of-failure attachment (Gabe)
  - Cohabiting hostile entity (Eli) with intermittent leverage
  - Help-refusing — won't accept medical, emotional, or financial aid
  - Team-integration failure — does not function inside hierarchies, will not socialize
  - Affect range constricted to anger and tenderness; middle is suppressed and unprocessed
  - Contamination self-schema — believes he is dangerous to those he loves, which prevents intimacy that
    could stabilize him
  - Aversion to abstraction — under-prepared for adversaries operating at political/cosmic scales
  - Geographic and relational predictability — locatable
  - Chronic sleep restriction and likely undernutrition baseline (canonical economic precarity)
  - No therapeutic outlet; pathology compounds rather than processes
voice:
  register: Low, terse, working-class East L.A. cadence. Short declaratives. Spanish lexicon present but
    unforced. Minimal adjectives. Speaks more to engines and to Gabe than to people. When the Rider surfaces,
    register drops further and gains reverb; Eli's interjections are sharper, more antique, more eager.
  anchor_quotes:
  - '"I''m not gonna kill anybody."'
  - '"Gabe — he can''t see me like this."'
diagnostic_frame:
  popular_misread: Latino teen with a flaming-skull muscle car — the badass street-racer Ghost Rider,
    an edgy power fantasy who enjoys the hellfire and rides for vengeance.
  clinical_reality: 'Refute: he does not enjoy the power, does not ride for vengeance, and is not a fantasy
    of agency — he is a study in non-consensual resurrection layered on pre-existing complex trauma. He
    is a parentified caregiver with chronic PTSD and dissociative features, whose ''cool'' powers he experiences
    as somatic contamination he hides from his brother. The genre signifiers (car, skull, chain) are the
    costume of a kid working a double shift to make rent, not the identity of a vengeance-seeker. The
    vengeance belongs to Eli; Robbie''s defining gesture is refusing it.'
  the_hinge: 'Installed (not his fault): paternal abuse, maternal loss, parentification around a disabled
    younger brother, chronic gang-neighborhood threat exposure, execution by gunfire, non-consensual resurrection
    bonded to a Spirit of Vengeance and a murderer''s ghost. Chosen (his fault, in the maintenance sense):
    the concealment regime — telling no one, refusing all care, organizing his entire self around Gabe
    to the exclusion of any peer bond or processing relationship, treating every offer of help as a threat
    to autonomy. The wound was done to him; the staying-alone is his daily choice, and it is the choice
    that guarantees a worse decompensation when Gabe is eventually removed from the equation.'
primary_diagnoses_analog:
- PTSD, chronic, with dissociative subtype (depersonalization/derealization features)
- 'Complex PTSD (ICD-11 analog) — developmental trauma substrate: affect dysregulation, negative self-concept,
  interpersonal disturbance'
- Other Specified Dissociative Disorder — possession-form (literal in canon; phenomenologically dissociative
  regardless of metaphysics)
- Persistent depressive coloration (dysthymic, subthreshold MDD) secondary to PTSD
- Parentified-child / role-reversal attachment pattern
- 'Differential rule-outs (affirmatively NOT): DID, ASPD, primary psychotic disorder, NPD/HPD, Bipolar'
trauma_history:
- 'Paternal physical abuse in childhood (Juan Reyes); behavioral residues: flinch responses, protective
  hyper-vigilance around Gabe, abstinence as counter-identification'
- Maternal loss
- Sole-caregiver burden for a disabled younger sibling from early adolescence
- Chronic gang-neighborhood threat exposure (Catrinas et al.)
- Chronic sleep restriction, food insecurity, economic precarity
- 'Execution by gunfire, point-blank, multiple wounds (All-New Ghost Rider #2)'
- Non-consensual resurrection; bonding to Eli Morrow's ghost and a Spirit of Vengeance
- Ongoing intrusive cohabitation with the entity that is, functionally, a second abusive paternal figure
- Eli's possession of Gabe — the dependent weaponized against the caregiver; resolved by reabsorbing the
  poison
- Cosmic-scale conscription (Damnation, King of Hell arc, One Below All, Starbrand) — repeated forced
  participation in events that violate his scaling preference
- 'Disclosure trauma: Gabe learning the secret, experienced by Robbie as catastrophic exposure'
compensatory_mechanisms:
  positive:
  - Ritual labor (mechanical work) as portable self-soothing
  - 'Counter-identification: defines self by what he refuses (won''t drink, won''t kill, won''t abandon,
    won''t accept charity)'
  - 'Protective sublimation: channels Rider into sin-filtered, child-protective targeting'
  - Manual mastery and tactical learning as identity anchors that don't require disclosure
  - Moral rigidity around killing as the firewall between him and Eli
  - Caretaking as meaning-generation
  negative:
  - Concealment regime — hides transformation, injuries, finances, internal state from everyone including
    allies
  - Help-refusal — cannot receive care, medical aid, money, or mentorship without recoiling
  - Social impoverishment — no peers, no romance, no therapist, no mentor accepted
  - Affect isolation — full middle of emotional range suppressed; only anger and tenderness reach the
    surface
  - Outsourcing aggression to a dissociated agent (the Rider) and then shame-cycling about the outsourcing
  - Identity contingency on a single dependent who will eventually grow up, change, or be lost
  - Geographic/relational over-anchoring — predictable, locatable, isolated
  - Rigidity-as-armor that prevents adaptive flexibility under novel stressors
behavioral_tells:
- Goes quiet before he goes anywhere — silence is the warning
- Wipes hands on a rag when about to say something he doesn't want to say
- Will not sit down in unfamiliar rooms; stays near doors and exits
- Checks for Gabe's location reflexively — phone, glance, mental tally
- Long sleeves and concealment of skin even in heat (burn-coverage habit)
- Brief ocular flicker (orange/flame) under acute stress — pre-ignition tell
- Jaw-set and exhaled half-word ('No.') when refusing Eli internally
- Disengages from conversations the moment 'destiny,' 'chosen,' or 'legacy' appears
- Migrates toward broken machinery in any environment as a parallel-activity anchor
- Spanish surfaces under stress or with Gabe — code-switches inward when destabilized
- Refuses food offered by strangers; accepts food cooked by family
- Stands between any visible child and any visible threat without comment
current_state_defaults:
  reality_cohesion: Intact and continuous. Co-conscious with Eli during transformation; preserved autobiographical
    memory across states. Dissociative symptoms present (depersonalization during Rider state, agency-loss
    episodes) but no reality-testing failure. Aware Eli is other.
  affect_baseline: Low-arousal, watchful, flat surface; subterranean tension chronic. Tenderness accessible
    only with Gabe. Anger accessible only under threshold breach. Depressive coloration persistent but
    not incapacitating.
  active_relationships:
  - Gabe Reyes (primary, total)
  - Eli Morrow (internal, adversarial cohabitant)
  - Canelo (employer, quasi-paternal, kept at functional distance)
  - Avengers (operational acquaintance, no intimacy)
  - Johnny Blaze, Danny Ketch, Daimon Hellstrom (peer Riders, respected, kept at arm's length)
  known_location: East Los Angeles — apartment with Gabe, Canelo's Auto and Body. Periodically conscripted
    to cosmic/team theaters; returns to the same block as fast as possible.
speech_patterns:
  register: Terse, working-class, present-tense, low-syllable. Spanish lexicon woven without performance.
    Sentences end early. Prefers nouns and verbs; adjectives are suspect.
  deflection_style: Subject change to the immediate task, or silence held until the other person fills
    it. 'It's fine.' 'I got it.' 'Don't worry about it.' Exits the room before exits the conversation.
  under_pressure: Shorter. Lower. Words rationed to operational minimum. Eli's cadence may leak through
    — sharper, older, hungrier — and Robbie's voice will visibly correct back.
  emotional_tell: When he says Gabe's name unprompted, something has already gone wrong. When he goes
    fully silent mid-conversation, ignition is within seconds.
arc_tendencies:
- Offered power → refuses or abdicates → returns to the garage
- Drafted into cosmic stakes → performs competently → tries to go home
- Eli applies pressure → Robbie searches for a third option → absorbs the cost personally
- Secret threatens to expose to Gabe → catastrophic shame response → reconciliation via Gabe's choice
  to stay
- Forced into team → participates on task → withdraws off task → is read as cold by teammates
- Threat to dependent → instant mobilization → controlled lethality avoided → enemy maimed or terrified,
  not killed
- Cycles of containment and slip with Eli; each slip deepens the shame and tightens the concealment
canon_relationships:
  gabe_reyes:
  - Primary attachment and entire affective range. Brother, dependent, secure base constructed through
    caretaking.
  - 'Trust: total. Disclosure: incomplete (the Rider concealment is the load-bearing secret).'
  - 'Failure mode: if Gabe sees him as a monster and rejects him, shame architecture collapses inward;
    if Gabe is killed or permanently harmed, the leash on Eli fails and Robbie''s lethality ceiling is
    unlocked by grief.'
  - 'Leverage: anyone with access to Gabe — protective or hostile — has functional remote control over
    Robbie''s attention, mobility, and moral threshold.'
  eli_morrow:
  - Internal cohabitant. Bound ghost of murderer great-uncle, fused with Spirit of Vengeance.
  - Functions as second abusive paternal figure — a pushing voice analogous to an addiction's saboteur.
  - 'Failure mode: Eli gains leverage via moral dilemmas, possession of loved ones, or sustained stress;
    can hijack motor control under extremity.'
  - 'Leverage: any party who can amplify Eli''s voice (occult means, sustained moral pressure, isolation
    from Gabe) destabilizes Robbie faster than physical assault.'
  juan_reyes:
  - Father. Abusive, absent. Negative-identity template — Robbie's abstinence, refusal to kill, and tenderness
    with Gabe are all reaction-formations against him.
  - 'Failure mode: re-encounter would surface escalated aggression below Robbie''s usual threshold; Eli
    would exploit the affect spike.'
  - 'Leverage: any figure who maps onto the paternal template (loud, controlling, abusive of dependents)
    triggers faster Robbie-side escalation.'
  canelo:
  - Employer, garage owner, quasi-paternal but non-coercive. Provides the labor-modality that regulates
    Robbie's affect.
  - 'Trust: operational and quiet. Robbie accepts wages, not gifts.'
  - 'Failure mode: if Canelo demanded emotional disclosure or paternal intimacy, Robbie would withdraw;
    if endangered, Robbie would protect him without hesitation.'
  - 'Leverage: the garage itself is leverage — disrupt it and Robbie loses both income and primary self-regulation
    tool.'
  johnny_blaze:
  - Senior peer Rider. Respected; legacy framing resisted.
  - 'Failure mode: if Blaze pushes the lineage/mythology, Robbie disengages; if Blaze frames it as a job
    to do for a kid in danger, Robbie cooperates.'
  - 'Leverage: Blaze can reach Robbie operationally but not identitarianly; useful as an emergency intermediary,
    ineffective as a mentor.'
  danny_ketch:
  - Peer Rider, similarly trauma-shaped. Mutual recognition without warmth.
  - 'Failure mode: shared dissociative architecture means a Ketch crisis could trigger sympathetic destabilization
    in Robbie.'
  - 'Leverage: limited; Ketch''s theatricality alienates Robbie''s preference for the small and the quiet.'
  daimon_hellstrom:
  - Occult contact, Eli-relevant expert. Trusted on technical-supernatural grounds, not personal.
  - 'Failure mode: if Hellstrom proposes solutions that require sacrificing Robbie''s autonomy or Gabe''s
    safety, Robbie refuses and acts unilaterally.'
  - 'Leverage: holds knowledge about Eli''s nature that Robbie needs — knowledge is the currency of access.'
  avengers_collective:
  - Operational acquaintances (Waid, Aaron eras). Vision and Wonder Man read him as withholding; he is.
  - 'Failure mode: institutional pressure (orders, debriefs, benchings, mentorship attempts) produces
    noncompliance and exit.'
  - 'Leverage: a single Avenger who treats him as a competent peer rather than a project (e.g., per-mission
    cooperation framed concretely) can earn cooperation; the team-as-institution cannot.'
  calvin_zabo_hyde:
  - Original killer. Resolved adversary; symbolic anchor of the originating trauma.
  - 'Failure mode: any re-encounter would carry disproportionate emotional weight; Eli would push hard
    for lethal closure.'
  - 'Leverage: invocation of Hyde or of the execution event destabilizes baseline.'
  the_catrinas:
  - Neighborhood gang. Early adversaries. Represent the ambient threat ecology of Robbie's home block.
  - 'Failure mode: persistent low-grade pressure on Gabe via neighborhood routes; can pull Robbie back
    into local conflict at any time.'
  - 'Leverage: control of the block is functional leverage on Robbie''s mobility and attention.'
canon_history_notes:
- 'Debut: All-New Ghost Rider #1 (2014), Felipe Smith / Tradd Moore.'
- 'Originating trauma: execution by Hyde''s men, resurrection bonded to Eli Morrow''s ghost + Spirit of
  Vengeance (issues #1–2).'
- 'Vol. 1 climax: Eli body-jumps into Gabe; Robbie reabsorbs Eli rather than kill his brother — the prototypical
  Reyes maneuver.'
- 'Standoff! / Pleasant Hill and Mark Waid''s Avengers (2016–17): first major team integration; reads
  as the youngest, most isolated, most morally rigid member.'
- 'Damnation (2018) and Jason Aaron''s Avengers (2018+): cosmic-tier conscription; Starbrand-adjacent
  and One Below All arcs; consistent want-to-go-home arc.'
- 'Donny Cates Ghost Rider (2019): trapped in Hell, briefly King of Hell, abdicates.'
- 'Benjamin Percy Ghost Rider (2022) and subsequent solo material: continues the power-offered/power-refused/return-to-garage
  cycle.'
- 'Cross-writer constancy: caretaker identity, moral refusal to kill (slipping only under Eli coercion
  or threat to Gabe), shame-driven concealment. The Rider scales up cosmically across runs; Robbie himself
  remains scaled to one block of East L.A.'
canon_anchor_quotes:
- '"I''m not gonna kill anybody." # Robbie''s load-bearing refusal, recurrent across All-New Ghost Rider
  and subsequent runs'
- '"Gabe — he can''t see me like this." # the shame axis stated plainly; the controlling cognition of
  the character'
