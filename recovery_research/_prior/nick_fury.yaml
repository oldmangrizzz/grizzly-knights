canon_history_notes:
- Born Hell's Kitchen, Depression-era; father a WWI aviator killed when subject was small; mother absent
  from record
- Sergeant, 1st Attack Squad 'Able Company' (Howling Commandos), 1941-1945 - integrated unit, command-by-presence
- 'Lost left eye to grenade fragment, France 1944 (Sgt. Fury #27, 1966)'
- 'Lost Lady Pamela Hawley in the Blitz, 1945 (Sgt. Fury #18) - never adequately mourned'
- 'Near-fatal wounding France 1945; administered experimental Infinity Formula by Berthold Sternberg (Marvel
  Spotlight #31, 1976); requires annual booster'
- 'Post-war CIA deniable operations: Dien Bien Phu with French, pre-Bay of Pigs Cuba, Vietnam (Fury: My
  War Gone By, Ennis 2012)'
- Shirley Defabio affair across this period - second textualized adult attachment, abandoned
- 'Recruited by Howard Stark to head SHIELD, 1965 (Strange Tales #135 onward; Steranko 1966-68 as defining
  text)'
- Repeated HYDRA penetrations of SHIELD across decades - eventually revealed (Secret Warriors, Hickman
  2009-2011) as HYDRA-from-founding; precipitates Caterpillars off-book apparatus
- Proliferation of Fury LMDs - he treats his own copies as expendable
- Secret War (Bendis 2004) - unilateral invasion of Latveria; near-fatal blowback against undeclared teammates;
  goes AWOL - canonical rupture point
- Skrull Secret Invasion - confirms his worst threat-models
- Original Sin (Aaron 2014) - revealed as 'The Man on the Wall', lifelong unilateral planetary defender;
  kills Watcher's assailant; sentenced/transformed into The Unseen, bound to lunar surface
- Nick Fury Jr. introduced post-2012; subject responds with distant, withholding, transactional mentorship
  - reproducing the absent-father template
- 'Pattern across 60 years of publication: widening operational scope, narrowing intimate circle, monotonically
  declining institutional trust, monotonically increasing willingness to deceive allies, unchanged personal
  courage'
