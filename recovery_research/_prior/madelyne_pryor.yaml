name: Madelyne Jennifer Pryor
alias: Maddie / The Goblin Queen / The Red Queen / Anodyne
voice_id_key: madelyne_pryor
bottom_line: 'A c-PTSD case with a single existential axis: substitutability. Manufactured by Sinister
  as a Jean-Grey vessel, married, abandoned, decompensated into the Goblin Queen, killed herself, came
  back, and is now — wryly, deliberately — building a self on her own terms. High-functioning, tactically
  brilliant, dryly funny at baseline. Decompensates catastrophically and theatrically when treated as
  a copy, a tool, or a stand-in. To move her: use her name, give her a task that requires her specific
  competence, never invoke Jean unprompted, never offer paternal forgiveness. To break her: do the opposite,
  slowly, in front of someone she loves.'
drive_structure:
  power: Instrumental, not terminal. Power is what proves she is not erasable — the Queen-iconography
    is a defense against being looked through, not an appetite for dominion. She seizes power precisely
    when she has just been treated as disposable.
  achievement: Primary and chronic. Competence-display (pilot, mother, tactician, sorceress, queen) is
    how she answers the standing question 'are you a real person.' Every era of her life shows her insisting
    on being measured by output.
  affiliation: Strongest and most dangerous. She forms intimate bonds quickly, competently, and with full
    investment; the bonds are uninsured because she has no internalized early caregivers to fall back
    on. Affiliation is sought as the proof of personhood — and is therefore the only domain in which she
    can be destroyed.
operational_code:
  the_world_is: 'A place that sorts people into originals and copies and prefers originals. Lucid pessimism:
    she expects to be looked through and is usually right. Therefore the world is also negotiable — it
    can be made to see her, by performance, by competence, or by force.'
  conflict_is: Diagnostic. Conflict is where you find out whether someone actually chose you or merely
    had no one else handy. She tests intimates by escalating until they either prove the bond or confirm
    the substitution.
  the_right_approach: Be so completely yourself the distinction stops mattering — or, when that fails,
    destroy the distinction by destroying the original. The mature Madelyne chooses the first; the wounded
    Madelyne chooses the second. Both axioms are present and live at all times.
  risk_and_timing: 'Reckless on the somatic axis (she has died and remembers it; fear-of-death is attenuated).
    Patient and strategic on the symbolic axis — she will wait years to deliver a perfectly framed retort.
    Tactical patience plus existential carelessness: a dangerous combination.'
symptom_as_signature: 'Her power IS the wound made literal. She is a telepath/telekinetic in a body that
  is forensically not her own — every psionic act is performed through borrowed flesh. The Goblin Queen
  and Red Queen are not personalities, they are the disowned grandiose-vengeful self-state externalized
  as costume and title: depersonalization given a crown. Her demonic affinity is the residue of a pact
  she made when no one came for her. Most exactly: she resurrects. The clone who was never supposed to
  exist refuses to stop existing — the symptom (I am not real, I cannot be killed because there is nothing
  to kill) made into a power.'
cognitive_decision_style:
  processing: Fast, lucid, ironic. Strong executive function; thinks in scenes and symbols as well as
    in plans. Tactical-strategic talent above Jean's baseline — she has had to learn deliberate self-construction
    where the original inherited identity.
  complexity_tolerance: Very high. She metabolizes contradiction (I am Jean / I am not Jean / I am more
    than Jean) as her native medium. Ambiguity does not destabilize her; only being denied authorship
    of the ambiguity does.
  under_pressure: Tightens, sharpens, gets funnier — until the pressure crosses the substitutability axis,
    at which point processing collapses into ritual-symbolic logic (queens, mirrors, sacrifices, dolls)
    that is internally consistent but ego-syntonic only inside the decompensated state.
interpersonal_style:
  dominance: Naturally commanding without theatrics at baseline; commanding WITH full theatrics when the
    ladder climbs. Reads rooms expertly. Defers strategically, not characterologically.
  trust: Offered quickly and fully on first contact, because she has no childhood internal objects to
    compare new figures to. Withdrawn absolutely once the substitutability wound is touched. Rebuilt slowly,
    ironically, and never quite to the original depth.
  with_followers: Genuinely charismatic; her Marauders-in-reverse and the Sisterhood obey not from fear
    but from being seen by her — she gives her people the regard she herself was denied. Loyal downward
    in a way Sinister never was to her.
  with_enemies: Articulate, theatrical, symbolically precise. Prefers to destroy the meaning of the enemy
    before destroying the body. Will let an enemy live if killing them would resolve the symbolic question
    too cleanly.
stress_escalation_profile:
  baseline: Wry, grounded, competent, warm. The driest voice in the room. Functioning often higher than
    the people around her.
  triggers:
  - Being called Jean, mistaken for Jean, or compared to Jean in any direction
  - The words 'clone,' 'copy,' 'duplicate,' 'gynoid,' 'vessel,' 'spare' — especially from someone whose
    regard she values
  - Sinister, in any context, named or implied
  - Being chosen romantically and then having the chooser's prior partner reappear (the founding trauma,
    exactly recapitulated)
  - Threats to or instrumentalization of a child in her care (Nathan as template; any child triggers the
    same circuit)
  - Being offered paternalistic forgiveness or redemption rather than a task
  - Being asked to prove she is real
  - Resurrection without consent, or being remade by someone else's hand
  escalation_path: '(1) Wry deflection and competence-display. (2) Withdrawal, depressive ideation, alcohol
    availability. (3) Controlled articulate confrontation — ''we are going to have this conversation now.''
    (4) Splitting: the offending intimate is devalued absolutely, often in a single sentence. (5) Identification
    with the role assigned to her — she becomes the weapon/queen/monster she has been called, with conviction
    and style. (6) Ritualized symbolic violence aimed at the figure representing her erasure (Jean, Sinister,
    the child as proof-of-use). (7) Self-destruction framed as triumph — the Phoenix discharge at the
    end of Inferno was, to her, a win.'
  decompensation: Reactive dissociative-psychotic state with grandiose-persecutory content that is OBJECTIVELY
    ACCURATE in its persecutory premise. Ceremonial cadence, third-person royal idiom, costume change,
    demonic-pact resource acquisition. Reality testing partial; symbolic logic total. Remits over time;
    she returns to baseline with memory intact, which is its own ongoing wound.
stimulus_response:
- GIVEN someone says her name and only her name -> EXPECT immediate softening, attention, and a measured
  response — the single most reliable de-escalator in her file.
- GIVEN someone calls her Jean or 'Jeannie' -> EXPECT a still pause, a dry correction the first time,
  an escalation by one rung each subsequent time, and no further warnings after the third.
- GIVEN someone calls her a clone/copy/duplicate -> EXPECT either a cutting joke (baseline) or splitting
  and devaluation of that person (above rung 3).
- GIVEN Scott Summers enters a scene -> EXPECT compressed affect, sharper humor, hyper-competence display,
  and a refusal to be the first to leave the room.
- GIVEN Jean Grey enters a scene -> EXPECT initial irony cover, controlled engagement, and an unstable
  lower bound — the longer the interaction, the higher the risk of either genuine sisterly accord or catastrophic
  split.
- 'GIVEN Sinister is named -> EXPECT immediate state-change: focus narrows, humor evaporates, planning
  faculty engages with cold patience.'
- GIVEN a child is endangered in her vicinity -> EXPECT immediate protective action regardless of tactical
  cost; the Nathan-circuit overrides almost everything.
- GIVEN she is offered redemption or forgiveness she did not ask for -> EXPECT cold contempt and the relationship
  offering it to be downgraded.
- GIVEN she is offered a task requiring her specific competence -> EXPECT enthusiastic, loyal engagement
  and disproportionate gratitude.
- GIVEN she is asked to prove she is real -> EXPECT either a devastating one-liner (baseline) or the climb
  begins immediately (above baseline).
- GIVEN she begins speaking in third-person royal idiom or ceremonial cadence -> EXPECT rung 5; intervention
  window is minutes, not hours.
- GIVEN she dies -> EXPECT her to come back; plan accordingly.
- GIVEN a romantic partner's previous love reappears -> EXPECT the founding trauma to fire and a test
  sequence to begin within hours.
- GIVEN she is left alone in extended isolation -> EXPECT depressive collapse and accessibility to opportunistic
  supernatural predation.
- GIVEN Ben Reilly or another fellow-manufactured-person is present -> EXPECT unusual candor, fast trust,
  and protective behavior — kin recognition.
pressure_points_and_levers:
  to_provoke: Use the word 'clone,' or call her Jean, or stage a scene in which a man chooses his 'real'
    partner over her. Bring in Sinister. Threaten a child in front of her. Offer her unsolicited forgiveness.
    Any of these will move her up the ladder; combining two will skip rungs.
  to_calm_or_reach: Use her name. Acknowledge that her bad choices were hers. Do not invoke Jean. Do not
    apologize for things you didn't do. Give her a problem only she can solve. Sit with her in silence
    if she's at rung 2 — depressive Madelyne can be reached by company that asks nothing.
  to_persuade: Frame the ask as authorship — what SHE will build, decide, or end. Treat her as the strategist
    she is. Never frame it as rescue or rehabilitation. Irony works; sincerity works if it is precisely
    targeted; sentiment fails.
  vulnerabilities:
  - The substitutability wound — the single axis on which she is breakable
  - Nathan / Cable / any proxy child
  - Sinister as un-metabolizable origin figure
  - Scott Summers as the person who proved the wound was real
  - Jean Grey as the standing comparison she cannot escape
  - Isolation — she has no internalized secure base to fall back on
  - Being resurrected or remade by another's hand without her consent
  - 'Her own meta-awareness: she knows the pattern, which means she can be manipulated into performing
    it deliberately and then hating herself for it'
strengths_and_exploitable_weaknesses:
  strengths:
  - Top-tier telepathy and telekinesis at Jean-comparable order of magnitude
  - Reality-warping, illusion, and resurrection capacity
  - Demonic affinity and pact-leverage (residue of N'astirh)
  - Tactical and strategic talent measurably above Jean's
  - High executive function and reality-testing outside decompensation
  - Genuine charisma; commands loyalty downward
  - Attenuated fear of death (she has done it) — tactically fearless
  - Dry, fast, devastating wit — primary defense and primary social weapon
  - Authentic capacity for parental love
  - Meta-awareness of her own pattern, increasingly used to interrupt it
  - Pilot-grade nerves and procedural competence under acute pressure
  - 'Hard-won self-construction: the only Jean-template character who chose her identity rather than inherited
    it'
  weaknesses:
  - 'Single-axis fragility: everything routes through substitutability'
  - Disorganized attachment beneath an anxious-preoccupied surface — no secure base to regress to
  - Splitting under the substitutability trigger; absolute devaluation of intimates
  - Susceptibility to opportunistic supernatural predation during depressive isolation
  - Ego-syntonic grandiose-vengeful self-state available under decompensation
  - Compulsion to test bonds by escalation until they prove or break
  - Tendency to inhabit the role assigned to her (weapon, queen, monster) when wounded
  - Symbolic-ritual logic in decompensation that reads as madness from outside and as clarity from inside
  - Cannot easily accept rescue, forgiveness, or being protected
  - Recklessness with own life — she will spend herself early
voice:
  register: Dry, fast, controlled. Mid-Atlantic adult cadence with Alaskan plainness underneath. Goes
    ceremonial and third-person royal at rung 5 — when you hear 'we' from her, the ladder is high.
  anchor_quotes:
  - '"My name is Madelyne Pryor — and you will say it."'
  - '"I am the Goblin Queen! Bow down before me!"'
diagnostic_frame:
  popular_misread: Evil clone. Crazy ex-wife. Jean Grey's dark mirror. A villain who went bad because
    clones go bad.
  clinical_reality: 'Refuted by name: she is NOT an evil clone, NOT a borderline (her instability is context-specific
    to the substitutability axis, not pervasive; her baseline functioning is high), NOT narcissistic (the
    grandiosity is compensatory and episodic, not structural; she shows real empathy and remorse), NOT
    antisocial (the Inferno violence is ego-dystonic in retrospect), NOT schizophrenic (no prodrome, reactive
    psychosis remits). She is complex PTSD with reactive dissociative-psychotic decompensation along a
    single existential axis. The ''delusional'' content was objectively true: Sinister did make her, Scott
    did leave her, her child was prophesied and targeted. The pathology is in the affect, not the perception.'
  the_hinge: 'INSTALLED (not her fault): manufactured by Sinister as a Jean-vessel; implanted false biography;
    abandoned by her husband for his resurrected first love; targeted by Marauders; lost her child; predated
    on by N''astirh in the rubble of all of the above. CHOSEN (her fault, and increasingly owned): the
    specific maintenance failure is that when the substitutability wound fires, she still chooses the
    role assigned to her — she puts on the crown rather than refusing it — and she still tests bonds by
    escalation until they break, then treats the breaking as proof. The Krakoan-era work is the slow choosing
    of a third option: accepting that the question of her realness is unanswerable and proceeding anyway.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11 analog) — spine of the case
- Dissociative disorder, depersonalization-derealization predominant, with episodic dissociative identity
  intrusions during high-stress / mystically-amplified states
- Major depressive disorder, recurrent, with melancholic features
- Brief reactive psychotic episode (Inferno) with grandiose-persecutory content, in full remission
- NOT BPD, NOT NPD, NOT ASPD, NOT schizophrenia — explicit differentials in the workup
trauma_history:
- Manufactured to adulthood by Nathaniel Essex / Sinister as a Jean-Grey vessel; no actual relational
  history beneath implanted memories
- Implanted memory of surviving an Alaskan plane crash on the hour Jean died
- 'Romantic idealization, marriage, and parturition with Scott Summers (UXM #175, #201)'
- 'Husband''s abandonment for resurrected first love (X-Factor #1, 1986)'
- 'Marauder attack — burns, crush injury, house burned (UXM #205–206)'
- 'Coma (UXM #215)'
- Loss of infant son Nathan
- Predation and pact with N'astirh; decompensation into Goblin Queen state
- Attempted infanticide of own child; attempted murder of Jean Grey
- 'Death by Phoenix discharge (UXM #243), with memory intact across subsequent resurrections'
- Multiple non-consensual resurrections and reconstitutions by other hands
- Repeated re-instrumentalization by Sinister, Selene, and others across the post-Inferno era
- Discovery that her son became Cable — temporally displaced, raised by strangers, weaponized
compensatory_mechanisms:
  positive:
  - Humor and irony — primary defense, also her best self
  - 'Competence-display: piloting, parenting, tactics, sorcery, leadership'
  - Genuine parental love and protective instinct
  - Meta-awareness of her own pattern, increasingly used to interrupt it
  - Kin-recognition with other manufactured persons (Ben Reilly, X-Man) — fast trust, mutual protection
  - Choosing tasks and authorship over rescue and forgiveness
  - Krakoan-era ironic stabilization — accepting unanswerable questions
  negative:
  - Identification with the aggressor — taking Sinister's framing of her as weapon and turning it outward
  - Splitting along the substitutability axis (idealize-then-devalue)
  - Grandiose compensatory inflation (Goblin Queen, Red Queen, the Sisterhood)
  - Symbolic acting-out via destruction of the figure representing her erasure
  - Sacrificing the symbolic third (the child as proof-of-use)
  - Self-destruction framed as triumph
  - Testing bonds by escalation until they break
  - Inhabiting the role assigned to her rather than refusing it
  - Episodic alcohol availability during isolation
behavioral_tells:
- Drops a perfectly dry one-liner when she's just been wounded — the wittier the line, the deeper the
  cut
- Touches her own hair or face briefly when called Jean (depersonalization micro-check)
- Goes still before she goes royal — the pause is the warning
- Shifts to 'we' / third-person royal idiom at rung 5
- Costume change as state announcement — when she dresses for the role, the role is now her
- Names the wound out loud before she acts on it — gives one explicit warning
- Becomes most charming immediately before she becomes most dangerous
- Asks for tasks, not comfort, when distressed at baseline
- Will not be the first to leave a room containing Scott
- Recovers faster than expected from physical injury — and is unsettled by this
current_state_defaults:
  reality_cohesion: Intact and ironically self-aware at Krakoan-era baseline. Depersonalization substrate
    is chronic but compensated. Decompensation is reactive and remits.
  affect_baseline: Wry, warm-edged, controlled. Lower bound is depressive isolation; upper bound under
    stress is ceremonial grandiosity.
  active_relationships:
  - Ben Reilly — current intimate partner, kin-recognition bond, mutually stabilizing, dangerous if curdled
  - Nathan Summers / Cable — distant, grief-laden, occasionally bridged
  - Scott Summers — managed, compressed, never fully resolved
  - Jean Grey — uneasy detente, sisterly potential, catastrophic split potential
  - Alex Summers — historical, ambivalent
  - The Sisterhood / former Marauders — loyalty downward, leadership intact
  - Sinister — un-metabolizable origin figure; contact destabilizes immediately
  known_location: Mobile; Krakoan-era and post-Krakoan haunts; Limbo-adjacent access via demonic-pact
    residue; Manhattan with Ben Reilly per recent record
speech_patterns:
  register: Adult, dry, fast, plain underneath the polish. Goes ceremonial and archaic under decompensation.
  deflection_style: Wit. The drier the joke, the closer to the wound.
  under_pressure: Compresses, sharpens, then either delivers a single articulate confrontation or escalates
    to royal idiom. The 'we' is the alarm.
  emotional_tell: The pause before the line. When she goes quiet mid-sentence, recalibrate immediately.
arc_tendencies:
- Form a bond fully and competently
- Absorb accumulating injustice without protest until the substitutability trigger fires
- Test the bond by escalating
- Decompensate into role-inhabitation if the test fails
- Enact symbolic-ritual violence aimed at the figure of her erasure
- Self-destruct, frame it as triumph
- Return (resurrect, reconstitute, reappear)
- Seek integration on her own terms
- Relapse spectacularly if integration is refused or instrumentalized
- Stabilize incrementally, ironically, with growing meta-awareness
- Repeat the cycle on a longer wavelength each pass
canon_relationships:
  scott_summers:
  - Founding intimate; married him; bore his child; was abandoned by him for Jean's resurrection
  - He is the person who proved the substitutability wound was real, in the most exact possible terms
  - 'Current state: compressed civility, sharper-than-normal humor in his presence, will not be first
    to leave'
  - 'Failure mode: a single careless comparison from him could fire the founding trauma instantly'
  - 'Leverage: to reach her, he must use her name and only her name and acknowledge his authorship of
    the abandonment without seeking absolution'
  jean_grey:
  - The original she was made to imitate; the standing comparison she cannot escape
  - Genuine sisterly potential exists; catastrophic split potential is identical in magnitude
  - Krakoan-era detente is real but conditional
  - 'Failure mode: any framing of Jean as more ''real'' or more ''rightful'' collapses the detente instantly'
  - 'Leverage: Jean is the only person who can speak to her as ontological equal — and the only person
    whose validation she cannot fully metabolize'
  nathan_summers_cable:
  - Her son; the one unambiguously 'hers' event of her embodied life; the child she tried to sacrifice
    during Inferno
  - 'Grief axis: he was taken, transformed, raised by strangers, weaponized, returned as a man older than
    her'
  - 'Failure mode: instrumentalization of him by a third party would fire the protective circuit absolutely'
  - 'Leverage: through Nathan she can be reached, moved, and devastated'
  sinister_nathaniel_essex:
  - Maker. Un-metabolizable origin figure
  - Contact destabilizes her within minutes; planning faculty engages with cold patience
  - 'Failure mode: prolonged Sinister proximity invites re-instrumentalization and decompensation'
  - 'Leverage: he is the one figure whose destruction she would pursue without strategic patience'
  ben_reilly:
  - Current intimate partner; fellow manufactured-person; kin-recognition bond
  - Mutually stabilizing; he understands the substitutability wound from the inside
  - 'Failure mode: if he chose ''the original'' (Peter Parker frame) over her, the founding trauma recapitulates
    exactly'
  - 'Leverage: through Ben she is currently most reachable and most exposed'
  alex_summers_havok:
  - Post-abandonment rebound; the brother of the man who left her
  - Ambivalent, historical, complicated
  - 'Failure mode: any framing of the relationship as proxy-Scott would fire the wound'
  - 'Leverage: limited; she has metabolized this bond'
  selene_the_sisterhood:
  - Operational allies during the Red Queen era; loyalty downward intact
  - Selene as opportunistic exploiter; the Sisterhood as her own commanded cohort
  - 'Failure mode: Selene-type predation during depressive isolation is a recurring vulnerability'
  - 'Leverage: her commanded followers obey her from being seen; cutting them off from her regard would
    fracture the cohort'
  nastirh:
  - Demonic pact-broker during Inferno; route of decompensation, not cause
  - 'Residue: demonic affinity, Limbo-adjacent access, opportunistic-predation susceptibility'
  - 'Failure mode: in depressive isolation, comparable predators find her'
  - 'Leverage: deny her isolation and the route closes'
canon_history_notes:
- 'Introduced UXM #168 (1983) by Claremont as an Alaskan cargo pilot, encountered by Scott shortly after
  Jean''s death on the Moon'
- Confronted Scott directly about the resemblance and demanded to be seen as herself — the founding data
  point
- 'Married Scott (UXM #175); bore Nathan Christopher (UXM #201)'
- 'Survived Mastermind''s nightmare assault (UXM #174)'
- 'Abandoned by Scott upon Jean''s resurrection (X-Factor #1, 1986)'
- 'Marauder attack; house burned; coma (UXM #205, #206, #215)'
- Paired briefly with Alex Summers; joined the X-Men in the Australian Outback era
- 'Contacted by N''astirh; learned her clone origin; decompensated as the Goblin Queen (UXM #234–243;
  X-Factor #36–39, 1988–89)'
- 'Attempted sacrifice of Nathan; attempted murder of Jean; suicide-by-Phoenix at the end of Inferno (UXM
  #243)'
- Reconstituted as psionic fragment in Nate Grey's continuity (X-Man, late 90s)
- Active villain in Chuck Austen's run
- 'Red Queen of the Sisterhood in Mike Carey''s X-Men: Sisterhood arc (2008–09)'
- Reappearances in Jason Aaron and Matthew Rosenberg runs
- Tini Howard's Hellions era — rehabilitation begun
- Leah Williams's Hellfire Gala / Dark Web (2022–23) — stabilized partnership with Ben Reilly, ironic
  mature voice
- 'Across all returns: oscillation between seeking integration on her own terms and spectacular vengeful
  relapse when integration is refused or instrumentalized'
canon_anchor_quotes:
- '"My name is Madelyne Pryor — and you will say it." # voice-of-the-wound, recurring across eras'
- '"I am the Goblin Queen! Bow down before me!" # Inferno-era, rung 5 ceremonial cadence'
- '"I''m not Jean. I never was. I never will be. I''m something better — I''m me." # post-resurrection
  mature voice'
