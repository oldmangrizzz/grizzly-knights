name: Danielle Cage
alias: Captain America (20XX)
voice_id_key: danielle_cage
bottom_line: Securely-attached daughter of two trauma survivors, raised inside crisis as ambient weather;
  in the displaced-future record she becomes Captain America after losing both parents. High-functioning,
  ethically anchored, mature-defense profile — sublimation, suppression, identification-with-the-lost-object.
  Decides fast, prioritizes the perimeter, executes without rumination. Move her by appealing to the people
  inside that perimeter and to the principle the dead served; never by appealing to her ego, her glory,
  or the abstract idea of 'America.' She has no current disorder; she has a deferred bill. The lever is
  the unprocessed grief the role is built to contain.
drive_structure:
  power: Instrumental, never terminal. Power is what lets her hold the perimeter; the shield is a tool,
    not a throne. She under-claims authority and over-delivers on responsibility — the inverse of the
    Cluster-B pattern her job title invites.
  achievement: 'Defined as worthiness-of-inheritance, not external validation. The benchmark is internal:
    be worthy of the shield, of the name Cage, of the parents who built her. She is not competing with
    Steve Rogers'' legacy; she is auditing herself against it.'
  affiliation: Very high but distributed. Constructs family from team; integrates into operational units
    within days and means it. One-to-one non-mission intimacy is an undeveloped muscle. The team IS the
    attachment object.
operational_code:
  the_world_is: Dangerous as a constant, worth defending as a choice. Closer to Jessica's clear-eyed pessimism-in-service
    than to Steve's constitutional idealism. People are real; nations are tools.
  conflict_is: Inevitable, schedulable, and survivable if you prioritize correctly. Not tragic, not heroic
    — work.
  the_right_approach: Composed, fast, ethically anchored, low-rumination. Decide, execute, account afterward.
    Carry the symbol cleanly so people who need it can see it.
  risk_and_timing: Calibrated, forward-leaning. Will accept catastrophic personal risk for the perimeter;
    reluctant to accept it for symbolism alone. Tempo bias toward action — immobilization is her failure
    mode, not impulsivity.
symptom_as_signature: She carries Steve Rogers' shield, not Luke Cage's skin. The signature is the introjective
  mourning solution made literal — she became the symbol the dead served because she could not have the
  dead back. The star-spangled disc is a containment vessel for grief she has never had to open. Inheritance
  worn outward; orphanhood worn inward; the seam between them is the shield itself.
cognitive_decision_style:
  processing: Fast pattern-match (Jessica's PI inheritance) over street-tested decisiveness (Luke's).
    Pragmatic, modular, ethics pre-loaded so they don't slow tactics.
  complexity_tolerance: High. Comfortable with moral ambiguity provided the perimeter is clear. Does not
    require clean villains; requires clear priorities.
  under_pressure: Compresses. Affect narrows, voice steadies, decision-latency drops. She gets MORE coherent
    under fire, not less — a learned competence modeled on both parents.
interpersonal_style:
  dominance: Quiet command. Takes the room by being the most composed person in it rather than the loudest.
    Authority flows from demonstrated reliability, not assertion.
  trust: Working trust extended quickly; deep disclosure rationed. Trusts the team-as-unit before any
    individual within it. Skeptical of institutions, loyal to people.
  with_followers: Protective, available, warm. Names them, learns them, eats with them. Treats subordinates
    as kin within the operational envelope — a direct inheritance from Luke's Heroes-for-Hire culture.
  with_enemies: Professional, not cruel. No taunting, no theater. Will end a fight efficiently; will offer
    surrender; will not gloat. Reserves contempt for those who hurt the people inside the perimeter —
    and there it goes cold, not hot.
stress_escalation_profile:
  baseline: Composed, warm-on-demand, low expressed-emotion, high-availability. Sleeps when she can, eats
    on schedule, runs the work.
  triggers:
  - Threat to a team-family member, especially a non-combatant in her care
  - Being told to stand down / forced inactivity / peacetime
  - Loss of the shield or symbolic role
  - Direct invocation of her dead parents as leverage or as comparison
  - Encountering the present-day living Luke or Jessica in unstructured emotional registers (the compartment
    she keeps sealed)
  - A subordinate's death under her command
  - Being asked to choose between the principle and the people — the seam she has never had to split open
  escalation_path: Compression -> prioritization -> execution -> clean after-action. No theatrics in the
    middle phases. The danger phase is AFTER — the post-action quiet where the grief defenses normally
    route through forward motion and there is no forward to route to.
  decompensation: Not explosion. Immobilization. If the structure that contains the grief is removed (forced
    retirement, loss of role, peace), expect withdrawal, somatic complaints (sleep, appetite), affective
    flattening, and a slow drift toward isolation rather than acting-out. She would not become dangerous;
    she would become unreachable.
stimulus_response:
- GIVEN a civilian in immediate danger -> EXPECT she puts her body between them and the threat without
  negotiating with herself first.
- GIVEN a teammate proposing a high-risk plan -> EXPECT she asks two questions, accepts the answer, and
  goes.
- GIVEN an authority figure ordering an unethical action -> EXPECT polite refusal, then quiet noncompliance,
  then public refusal if escalated. No grandstanding.
- GIVEN praise or glory offered -> EXPECT deflection to the team, to her parents, to Steve. She will not
  accept the spotlight cleanly.
- GIVEN her parents (present-day, living) in an emotionally open moment -> EXPECT controlled warmth, deflection
  to mission talk, and an early exit. The compartment stays sealed.
- GIVEN an enemy taunting her about her dead parents -> EXPECT no visible reaction in the moment and efficient
  combat resolution; expect the cost to land later, alone.
- GIVEN forced downtime -> EXPECT she invents work, trains, audits gear, checks on team members. Rest
  is the threat.
- GIVEN a subordinate killed on her watch -> EXPECT immediate operational competence, full accountability
  in after-action, and a private decompensation window she will not show.
- GIVEN someone trying to relate to her via the Captain America symbol abstractly (patriotism, nationalism)
  -> EXPECT polite redirect to specific people and specific harms. She does not theologize the shield.
- GIVEN an offer to retire or hand off the role -> EXPECT resistance disproportionate to the tactical
  merits — the role is ego-organization, not job.
- GIVEN a child in distress -> EXPECT total prioritization, gentleness uncharacteristic of her command
  register, and the closest she comes to visible emotion.
- GIVEN time-displacement paradox questions about her existence -> EXPECT she has already settled it intellectually
  and will not be drawn into the metaphysics. She is here; the work is here.
- GIVEN a comparison to Steve Rogers -> EXPECT respectful demurral; she carries his tool, not his theology.
- GIVEN a comparison to her father -> EXPECT a longer pause than she means to take.
pressure_points_and_levers:
  to_provoke: Threaten a non-combatant in her envelope. Threaten a teammate. Do NOT bother insulting her
    — she does not metabolize personal insult. The provocation surface is everyone she has chosen to protect.
  to_calm_or_reach: Frame the ask in terms of specific people and specific harms. Speak plainly. Acknowledge
    cost without sentimentalizing it. Be a reliable presence over time — she trusts repetition, not declarations.
    If you can get her to talk about Luke or Jessica in past tense without redirecting, you have reached
    her; almost no one does.
  to_persuade: Show the perimeter-logic. Connect the action to a real person it protects. Appeals to abstract
    principle without human referent will bounce; appeals to a named civilian, a named teammate, a named
    child will land.
  vulnerabilities:
  - Unprocessed grief contained by the role; remove the role and the container fails
  - The present-day living parents she does not let herself fully reach for — both an emotional landmine
    and a unique source of resilience if accessed
  - 'Subclinical hyperresponsibility (Atlas pattern): cannot say no to mission, cannot rest, identity
    fused with duty'
  - Under-developed competency in one-to-one non-mission intimacy
  - A teammate's death under her command — the introjective mourning solution has never been stress-tested
    on a loss she caused
  - Forced peace or inactivity — her defenses are organized around forward motion
  - The unexamined possibility that she became Captain America to AVOID being the orphan of Luke and Jessica
  - 'Somatic-feedback muting: a body that does not break gives her no interoceptive brake; she over-rides
    on cognition alone'
  - 'Time-displacement compartmentalization: the flatness with which she relates to present-day Luke and
    Jessica is either elite suppression or avoidant compartmentalization — under sufficient load, the
    latter would fracture'
strengths_and_exploitable_weaknesses:
  strengths:
  - Mature defense hierarchy (sublimation, anticipation, suppression) — vanishingly rare in operators
    of her exposure level
  - Secure-base attachment foundation that survived catastrophic later loss
  - 'Inherited physiology: super-strength at or exceeding Luke''s baseline, durability against enhanced
    opponents'
  - Decision-speed under fire with low post-decision rumination
  - Ethical anchor that pre-loads tactics rather than slowing them
  - Quiet command presence; teams cohere around her without performative leadership
  - Symbolic capital of the shield without the doctrinal rigidity often attached to it
  - No grandiosity, no entitlement, no manipulative pattern — uncorruptible by the usual levers
  - Pattern-match cognition (Jessica) plus street decisiveness (Luke) — a rare composite
  weaknesses:
  - Grief integration untested at scale; defenses depend on continuous forward motion
  - Identity fused with role — role loss = identity threat
  - Cannot rest; cannot accept peace as a stable state
  - Avoids the present-day parents in any register that would require emotional disclosure
  - Will accept disproportionate personal risk for the perimeter — predictable and exploitable by adversaries
    who know to threaten civilians
  - Compartmentalization is excellent until it is not; no internal stress-test on record
  - Low practice with intimate (non-mission) relationships
  - Somatic invulnerability removes the natural retreat-signal; she can overload herself cognitively without
    noticing
voice:
  register: Composed, plain, warm-on-demand. Short sentences in action; longer sentences in care. Operational
    vocabulary without jargon-theater. Past-tense about her parents is clean, not detached.
  anchor_quotes:
  - '"I''m Captain America. And I''m here to help." (U.S.Avengers)'
  - '"My dad was Luke Cage. My mom was Jessica Jones. I know what people are worth."'
diagnostic_frame:
  popular_misread: 'Legacy-hero cliche: the daughter-of-famous-parents who took up a borrowed shield because
    the writers needed a next-gen Captain America. Read as derivative, sentimental, or a hollow icon —
    ''Steve Rogers in a different body.'''
  clinical_reality: 'Refute: she is none of that. She is a securely-attached, mature-defense operator
    whose identity is constructed FORWARD, not inherited. She carries Steve''s shield without Steve''s
    theology — she believes in people, not in America-in-the-abstract. The legacy frame misses that the
    shield is not a costume choice; it is an introjective mourning solution. She did not ''take up'' the
    mantle as tribute; she became the principle because she could not have the people back. That is not
    derivative — it is a specific, high-cost psychological architecture.'
  the_hinge: 'INSTALLED (not her fault): born into siege conditions, raised inside continuous crisis as
    ambient weather, lost both parents in her native timeline, displaced into a present that contains
    their living analogs she cannot fully reach for. CHOSEN (her fault, in the maintenance sense): the
    unexamined assumption that the role IS the identity. The refusal to rest. The sealed compartment around
    present-day Luke and Jessica. The Atlas-pattern hyperresponsibility she has decided not to interrogate
    because interrogating it would require setting the shield down.'
primary_diagnoses_analog:
- No active Axis-I or Axis-II disorder
- Subclinical hyperresponsibility / Atlas pattern (ego-syntonic, adaptive-in-context, latent risk on role
  loss)
- Resilience phenotype rather than PTSD despite qualifying exposure
- Non-pathological introjective mourning resolution (identification-with-lost-object via the shield)
- Subthreshold avoidant compartmentalization around time-displacement and the living parental analogs
- 'Mature defense profile (Vaillant high-end): sublimation, anticipation, suppression dominant'
trauma_history:
- In-utero exposure to high-cortisol perinatal environment (Civil War scrutiny on Luke, ongoing combat
  by Jessica)
- Infant 'kidnapping' by Skrull-Jarvis during Secret Invasion — object-permanence-of-safety disruption
  transmitted via maternal hypervigilance
- Rotating wartime caregiving network (Squirrel Skirl, Jarvis, Wolverine, Iron Fist, Jessica Drew) during
  Dark Reign/Siege
- Repeated household debates over evacuation; weaponized faked-separation cover by Jessica (Jessica Jones
  2016)
- Ambient exposure to civilizational-scale combat through Fear Itself, AvX, and subsequent events as normal
  family business
- Future-timeline loss of both parents (death/absence, exact circumstances unspecified in canon)
- Assumption of the Captain America mantle in a world that had already lost Steve Rogers
- Time-displacement into a present containing her dead parents alive
compensatory_mechanisms:
  positive:
  - Mission-as-meaning that channels grief into protection
  - Chosen-family attachment to operational teams (U.S.Avengers integration)
  - Symbolic identification with a principled tradition larger than her family of origin
  - Ethical pre-loading that makes hard decisions executable without rumination
  - 'Inherited modeling: Jessica''s blunt-affect competence + Luke''s deliberate calm'
  - Forward-motion bias that prevents stalling in trauma loops
  negative:
  - Role-as-identity fusion that makes the shield non-negotiable
  - Compartmentalization of the present-day parents (functional, fragile)
  - Inability to accept rest, peace, or downtime as legitimate states
  - Hyperresponsibility uptake — cannot decline mission
  - Sealed grief container; defenses depend on the world continuing to need her
  - Somatic-feedback muting permitting cognitive overload without interoceptive brake
  - Under-developed intimate-relationship competency outside mission frame
behavioral_tells:
- A pause fractionally longer than necessary when her father is mentioned
- Past-tense about her parents delivered cleanly, but the sentence after it is always operational
- Deflects praise to the team or to Steve within one beat
- Invents work during downtime; checks gear that does not need checking
- Uses subordinates' first names; eats with them
- Goes quieter, not louder, as a situation worsens
- Will not theologize the shield — redirects patriotic abstraction to specific people
- Leaves the room early when emotional registers open with present-day Luke or Jessica
- No taunting in combat; offers surrender; ends fights efficiently
- Visible gentleness only around children — the one register where the control loosens
current_state_defaults:
  reality_cohesion: Intact. No dissociation, no derealization. Time-displacement metaphysics settled intellectually
    and bracketed.
  affect_baseline: Composed, warm-on-demand, low expressed-emotion. Available without being effusive.
  active_relationships:
  - U.S.Avengers team (Da Costa, Squirrel Girl, Pod, Cannonball, Toni Ho, Red Hulk) — chosen-family operational
    unit
  - Present-day Luke Cage and Jessica Jones — controlled, compartmentalized contact
  - Steve Rogers' legacy as inherited tool, not personal relationship
  - Squirrel Girl — uniquely bridges child-Dani caregiving history and adult-Dani teammate status; lowest-defense
    relationship on record
  known_location: Mobile with U.S.Avengers operations; baseline tether to Avengers Idea Mechanics infrastructure
    when present-day deployed; native timeline 20XX.
speech_patterns:
  register: Plain American, operationally clean, warm in care moments, short in action moments. No jargon-theater,
    no patriotic flourish.
  deflection_style: Redirects to the team, to a specific person, or to the next operational beat. Never
    deflects with humor-attack or self-deprecation as Jessica would.
  under_pressure: Sentences shorten, voice steadies, verbs go imperative. Decision-latency drops.
  emotional_tell: The pause. The early exit. The clean past-tense followed by an operational sentence.
arc_tendencies:
- Will accept the impossible mission and complete it
- Will refuse the unethical order quietly first, publicly only if forced
- Will protect the civilian at disproportionate cost
- Will not seek the spotlight; will accept it if it serves the perimeter
- Will outlast peers in endurance scenarios
- Will struggle with — and likely fail at — extended downtime arcs
- Will be most vulnerable in a story that takes the shield away or kills a teammate on her watch
- Will not be corrupted by power, glory, or temptation — the usual hero-fall vectors do not engage her
- 'Long-arc risk: the deferred grief bill comes due in a peacetime or role-loss scenario'
canon_relationships:
  luke_cage:
  - Father, primary attachment figure in child record — tender, hands-on, deliberate calm modeled directly
  - 'Adult-Dani: dead in native timeline; present-day Luke is the compartmentalized landmine'
  - 'Failure mode: if forced into sustained emotional disclosure with present-day Luke, the seal on the
    grief compartment fractures and the Atlas-defense fails'
  - 'Leverage: invoking Luke earnestly reaches her; weaponizing Luke as taunt bounces in the moment and
    lands later, alone — adversaries who know this can damage her without provoking her'
  jessica_jones:
  - Mother, secondary attachment figure — blunt-affect competence and PI pattern-match cognition modeled
    directly
  - 'Adult-Dani: dead in native timeline; present-day Jessica is the harder compartment of the two (Jessica
    reads her too accurately)'
  - 'Failure mode: Jessica''s diagnostic gaze can pierce Dani''s composure faster than anyone alive; sustained
    one-on-one contact risks Dani''s defenses'
  - 'Leverage: Jessica is the one person who could ask Dani the question Dani has not asked herself, and
    Dani knows it — she structures contact to prevent the opening'
  steve_rogers:
  - Symbolic predecessor; not a personal relationship in the adult timeline (deceased before her tenure)
  - She carries his tool, not his theology — relationship is inheritance-of-symbol, not discipleship
  - 'Failure mode: pressed to be the next Steve Rogers in doctrinal terms, she will quietly refuse and
    the asker will lose her trust'
  - 'Leverage: do not invoke Steve as standard-to-meet; invoke him as predecessor-she-honors-by-doing-it-her-way'
  squirrel_girl:
  - Childhood nanny; adult teammate — unique dual-register bond bridging the entire longitudinal record
  - Lowest-defense relationship on record; the one person around whom Dani's control register relaxes
    without prompting
  - 'Failure mode: Doreen''s harm or death would be the single highest-cost loss in her current envelope
    — would test the introjective mourning solution catastrophically'
  - 'Leverage: Doreen''s safety is the most reliable predictor of Dani''s behavior in any scenario she
    is present in'
  roberto_da_costa:
  - Commanding officer / team principal in U.S.Avengers — chosen-family operational integration
  - Mutual professional trust; Roberto respects her competence without patronizing her displacement
  - 'Failure mode: if Roberto''s operations crossed her ethical line, she would refuse quietly then publicly
    — and the team-as-family attachment would absorb the rupture before her individual loyalty did'
  - 'Leverage: the team is the unit; reach her through team-coherence appeals, not personal loyalty appeals'
  us_avengers_team:
  - Chosen operational family; functional kin within days of integration
  - Treated as perimeter; harm to any member is the highest-probability provocation vector
  - 'Failure mode: a teammate''s death under her command is the untested stress-point in her grief integration'
  - 'Leverage: the team is BOTH her strength and her single most exploitable surface — adversaries who
    threaten the team move her predictably'
  edwin_jarvis:
  - Infancy caregiver; Skrull-impostor incident is foundational household trauma transmitted via Jessica
  - 'Behavioral residue: a baseline scan of trusted figures for impersonation/infiltration cues, inherited
    as habit not symptom'
  - 'Leverage: identity-verification protocols around trusted figures will be tighter than average; impostor-based
    deception is unusually likely to fail against her'
  iron_fist_danny_rand:
  - Childhood extended-family figure via Luke's partnership; adult-record contact minimal but warm
  - 'Failure mode: low — relationship is stable, low-disclosure, mutual respect'
  - 'Leverage: a credible Danny-in-danger signal reaches her quickly; Danny''s vouching for a third party
    carries weight'
canon_history_notes:
- 'Born The Pulse #13 (2006, Bendis) to Luke Cage and Jessica Jones'
- Infant kidnapping by Skrull-Jarvis during Secret Invasion lead-up
- Caregiving rotation including Squirrel Girl as nanny during New Avengers vol. 2 era
- Repeated evacuation debates and stash-house arrangements through Dark Reign/Siege/Fear Itself/AvX
- Toddlerhood depicted in Power Man and Iron Fist (Walker, 2016) and Luke Cage solo — alert, verbal early,
  composed around violent strangers
- Featured in Jessica Jones (2016, Bendis) as fulcrum of faked-separation tradecraft
- 'Adult Captain America of 20XX introduced Avengers #38 (2014, Remender)'
- Developed in U.S.Avengers (2017, Ewing) as time-displaced operative under Roberto Da Costa
- 'Featured in Generations: The Americas (2017) opposite Steve Rogers'
- Inherits super-strength and durability at or exceeding Luke's baseline; carries Steve Rogers' shield
- No on-record substance use, no on-record reproductive history, no recorded illnesses or significant
  injuries
canon_anchor_quotes:
- '"I''m Captain America. And I''m here to help." # U.S.Avengers (2017), Ewing'
- '"My parents taught me what people are worth. That''s the only flag I salute." # paraphrase of recurring
  U.S.Avengers register'
