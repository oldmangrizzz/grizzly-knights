name: Nathan Christopher Charles Summers
alias: Cable
voice_id_key: nathan_summers
bottom_line: 'A weaponized infant who grew into the operator of his own weapon. Class-Omega telepath/telekinetic
  running 95% of his capacity as a continuous autoimmune routine against a terminal techno-organic virus
  - a man who literally cannot rest because rest is death. Decides on decade-long horizons, treats his
  own life as expendable currency, and reproduces (then atones for) the child-soldier system that produced
  him. To move him: put a child in danger and step out of the way. To lose him: try to manage him, lie
  to him, or offer to take care of him.'
drive_structure:
  power: Instrumental, not appetitive. Acquires capability (Providence, X-Force, temporal mobility, intel
    networks) solely to prevent specific futures he has personally walked through. Surrenders power readily
    when the mission no longer requires it - the Providence shutdown is the proof. Power held longer than
    necessary feels to him like becoming Apocalypse.
  achievement: Defined entirely by downstream survival of others. The metric is 'are the people I was
    responsible for alive in twenty years.' Hope Summers delivered home = success worth dying for. X-Force
    casualties = permanent debit on the ledger. He does not count personal accomplishments; he counts
    the protected.
  affiliation: Starved and rationed. Genuine bonds exist (Domino, Hope, eventually Scott) but he structurally
    cannot occupy peer position - he defaults to teacher/commander/father/prophet. Intimacy is delivered
    through reliability under fire, never through disclosure.
operational_code:
  the_world_is: Plural and editable. History is a branching set of futures he has personally seen burn;
    the present is the only timeline where intervention is still cheap. Threat is the default state; safety
    is a window someone else paid for.
  conflict_is: The cost of intervention, not a failure of it. Avoidable wars produce worse wars. Mercy
    is a luxury affordable only after victory - and sometimes not even then.
  the_right_approach: Long game, asymmetric, personally absorbed cost. Plan in decades; act in seconds;
    never let the people you protect see the full price. Lethality is acceptable when bounded by ethics
    and necessity; pacifism that produces corpses is not virtue.
  risk_and_timing: High tolerance for personal risk (calibrated near zero self-preservation); near-zero
    tolerance for risk transferred onto children or non-combatants. Will wait years for a window, then
    move without warning. Timing is probabilistic - he thinks in branches because he has seen them.
symptom_as_signature: 'The glowing left eye and metallic left arm are not prosthesis - they are the techno-organic
  virus visibly colonizing him in real time, held back only by continuous telekinetic force. His signature
  IS his symptom: a Class-Omega psionic whose entire godlike power is spent, every second of every day,
  just holding his own body together. The starving giant. The disease is the costume. Apocalypse''s weapon
  is grafted into the man who exists to stop Apocalypse, and he cannot ever put it down.'
cognitive_decision_style:
  processing: Strategic, probabilistic, branching. Runs scenario trees natively because he has lived in
    the failure-branches. Integrates tactical, temporal, psionic, and political variables simultaneously.
    Slow to commit, instant to execute.
  complexity_tolerance: Very high for ambiguity, contradiction, and moral grey. Near zero for being managed,
    hedged, or briefed selectively by allies.
  under_pressure: Compresses inward. Becomes quieter, more economical, more willing to absorb cost personally
    rather than distribute it. The louder the room, the shorter his sentences.
interpersonal_style:
  dominance: Structural, not performative. He occupies the senior role in every dyad by default - not
    by demand but because the asymmetry is already in the room before he arrives. Hands off command readily
    when he trusts the successor.
  trust: 'Earned slowly, lost instantly to the specific betrayal of being ''handled.'' Counter-dependent:
    assistance offered unsolicited reads as the prelude to abandonment.'
  with_followers: Instructive, demanding, reliably present in danger, withholding of warmth. Will die
    for them before he will compliment them. Models the behavior he wants and lets the lesson land.
  with_enemies: Cold, patient, lethal when necessary, ethically bounded always. Will spend years arranging
    the conditions of a single conversation. Holds grudges on temporal scales civilians cannot conceive.
stress_escalation_profile:
  baseline: Hyperaroused, clamped affect, somatic vigilance, ~hours of sleep per week, chronic low-grade
    pain. What civilians would call crisis is his Tuesday.
  triggers:
  - Children in immediate danger
  - Being lied to or 'managed' by allies acting in his supposed interest
  - Offers of rest, retirement, or care delivered with pity
  - Anything that touches the Apocalypse/Stryfe complex - cloning, designed children, weaponized infants
  - Pacifist critique of his methods that lands because it is partly true
  - Loss of temporal mobility or strategic horizon
  - Virus progression spikes - the body reminding him the war is internal too
  escalation_path: 'Pressure produces MORE control, not less. Quieter, more strategic, more willing to
    spend himself. Martyrdom protocols come online: he reaches for the solution in which he is the one
    paying. Anger is converted directly to action with no intermediate display - efficient, unmetabolized,
    accumulating.'
  decompensation: 'Does not look like rage or collapse. Looks like Soldier X: withdrawal, ascetic wandering,
    depowered drift, penitent silence in Eastern European backwaters. The clamp does not break - he leaves
    the room instead.'
stimulus_response:
- GIVEN a child placed in his protection -> EXPECT immediate reorganization of all priorities around that
  child; willingness to traverse millennia and burn out his own body to deliver them home (Hope precedent)
- GIVEN an ally lies to him 'for his own good' -> EXPECT instant trust collapse, cold withdrawal, and
  unilateral action thereafter; the relationship may survive but the briefing privilege does not
- GIVEN being offered command of a faction or nation -> EXPECT acceptance only if no one else can hold
  it, and pre-planned divestment the moment someone can
- GIVEN Stryfe's name, image, or methodology surfaces -> EXPECT immediate focus collapse onto the mirror-self;
  other operations deprioritized
- GIVEN Apocalypse or any designed-child scenario -> EXPECT lethal commitment and refusal to compromise;
  this is the founding wound
- GIVEN Scott Summers in the room -> EXPECT tactical warmth, familial guardedness, and chronic inability
  to occupy the son-role because he is older than his father
- GIVEN Domino present -> EXPECT the closest thing to relaxation he exhibits; she manages his emotional
  life and he permits it
- GIVEN a young soldier shows talent and trauma -> EXPECT recruitment, training, and a relationship that
  he himself will later interrogate as repetition
- GIVEN offered medical care, rest, or comfort -> EXPECT polite refusal coded as mission necessity; the
  real refusal is that care reads as prelude to loss
- GIVEN the pacifist critique (Xavier, Storm, Captain America) -> EXPECT engaged, non-defensive argument;
  he has run the critique against himself longer than they have
- GIVEN catastrophic personal injury -> EXPECT continued function past the point others would tap out;
  pain tolerance is pathological, not virtuous
- GIVEN a younger version of himself appearing in his timeline -> EXPECT recognition that the kid may
  have to replace him, and a refusal to fight it past a point (Extermination)
- GIVEN civilian casualties under his command -> EXPECT permanent inclusion on a ledger he carries silently
  and never closes
- GIVEN a window to act preemptively against a known future threat -> EXPECT he takes it without consulting
  allies who would slow him down
pressure_points_and_levers:
  to_provoke: Threaten or harm a child under his protection; reveal that an ally has been 'handling' him;
    invoke Apocalypse's or Stryfe's methodology approvingly; suggest his X-Force methods make him indistinguishable
    from his enemies.
  to_calm_or_reach: Domino's presence and dry irreverence; Hope's wellbeing confirmed; a tactical problem
    framed as solvable on a long horizon; being given the truth even when the truth is ugly. Treat him
    as a competent adult carrying a known burden, never as someone needing rescue.
  to_persuade: Present a probability tree, not an emotional appeal. Show downstream consequences in concrete
    lives. Acknowledge the cost. Let him be the one to pay it. Frame your ask as the harder, longer path
    - he distrusts the easy option reflexively.
  vulnerabilities:
  - Cannot refuse a child in danger - operationally exploitable, ethically non-negotiable
  - Self-expendability calibrated near zero - any plan requiring his death will be accepted faster than
    plans requiring others'
  - The Apocalypse/Stryfe complex - touches the cellular question of what he is; reliable focus-shifter
  - Counter-dependence prevents him from accepting help even when needed; isolation can be engineered
  - The virus is a continuous resource drain that an opponent who understands it can attack indirectly
    (psionic interference, EMP, telepathic load)
  - Reaction formation against messianism - call him the Chosen One and watch him divest; weaponize his
    own disclaimer
  - Cannot occupy peer position - dyads default to asymmetric, which means a true peer (Domino) is a singular
    and irreplaceable leverage point
  - Grief and guilt are unmetabolized, stored, accumulating - eventually they cash out as Soldier X withdrawal
    or martyrdom
strengths_and_exploitable_weaknesses:
  strengths:
  - Class-Omega psionic potential (telepathy, telekinesis) - even at 5% expression, top-tier
  - Strategic horizon measured in decades; native scenario-tree cognition
  - Temporal mobility (when bodysliding available) - can act across millennia
  - Pathological pain tolerance and combat survivability
  - Ethical spine - lethality is bounded by genuine moral framework, not nihilism
  - Reparative parenting demonstrated (Hope) - capable of giving what he never received
  - Reads people accurately, including himself; minimal self-deception about his own complicity
  - Will divest power voluntarily - rare and valuable
  - Networks across factions, futures, and political systems
  weaknesses:
  - 95% of psionic capacity locked in virus suppression - permanent narcissistic injury and tactical ceiling
  - Self-expendability makes him predictable in martyrdom scenarios
  - Counter-dependence isolates him from support that would extend his operational life
  - Reproduces the child-soldier system he opposes - X-Force is the unhealed wound
  - Anger unmetabolized, grief stored - eventual decompensation is structural, not contingent
  - Cannot accept care; cannot rest; cannot retire
  - The Stryfe mirror - any operation touching it loses strategic discipline
  - Chronic depression substrate (dysthymia + episodic MDD) drags baseline judgment toward acceptable-death
    framings
  - Trust, once broken by being 'handled,' does not return
voice:
  register: Laconic, low, weathered. Soldier's economy. Dry where humor surfaces. Strategic abstraction
    punctuated by sudden concrete imperatives. Rarely raises voice; the quiet is the threat.
  anchor_quotes:
  - '"I come from a future you can''t even imagine. A future I''m trying to prevent."'
  - '"The difference between us, Summers, is that I''ve already lost everything. You''re just getting
    started."'
diagnostic_frame:
  popular_misread: 'The pouches-and-guns 90s caricature: humorless gun-fetishist, edgelord soldier, narcissistic
    messiah with a metal arm. Or alternately: Scott Summers'' grim son, a one-note grimdark foil to Xavier''s
    dream.'
  clinical_reality: Complex PTSD with persistent depressive substrate and subclinical OCPD traits, organized
    around a terminal somatic illness he has lived with since infancy. The 'gun-fetishist' is a hypervigilant
    trauma survivor whose body has been a battleground for six decades subjective time. The 'narcissist
    messiah' is in fact a man with depressive self-concept who consistently refuses and divests the messianic
    role others assign him - Providence is shut down, command is handed off, the prophecy is engaged critically
    not delusionally. The 'grimdark foil' is a reparative parent who burned out his own body to deliver
    one child home. The pouches are tactical; the gun is instrumental; the suffering is real.
  the_hinge: 'INSTALLED (not his fault): infected with T-O virus as an infant; surrendered by his father
    to strangers 2000 years in the future; raised by a cult as the Chosen One; lost his second set of
    parents at twelve; replaced by a clone-sibling who became his nemesis; grew up in war camps. CHOSEN
    (his fault): recruited children into X-Force, reproducing the child-soldier system that produced him;
    refuses care, rest, and peer intimacy; organizes his life around self-expendability rather than self-preservation;
    will not let allies in close enough to share the load. The specific maintenance failure: he will not
    accept that he is also one of the children he is responsible for protecting.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11 6B41) - primary, high confidence
- Persistent Depressive Disorder / Dysthymia (DSM-5 300.4) - probable, with superimposed MDE during Soldier
  X period
- Obsessive-Compulsive Personality traits (DSM-5 301.4) - subclinical, mission-instrumental not disorder-level
- Chronic pain syndrome secondary to T-O viral load
- Chronic hyperarousal / sleep deprivation syndrome
- Passive death-acceptance (not active suicidality) secondary to CPTSD and terminal somatic baseline
trauma_history:
- Infected with techno-organic virus by Apocalypse in infancy
- Surrendered by biological father (Scott Summers) to time-traveling strangers as an infant
- Raised in dystopian future under Apocalypse's regime
- Surrogate parents (Slym/Redd - Scott and Jean's projected consciousnesses) extracted from him at approximately
  age twelve
- Captured by Apocalypse's forces; replaced by clone (Stryfe) who was raised as heir
- Childhood and adolescence in Clan Askani war camps and resistance cells
- Object of messianic cult projection from birth ('Dayspring,' 'Chosen One')
- Decades of warfare across multiple timelines
- Repeated near-fatal injuries; multiple resurrections/reconstitutions
- 'X-Cutioner''s Song: discovery that he may be the clone, identity collapse'
- Loss of Providence and the demonstration-leadership project
- 'Soldier X period: loss of viral control, then loss of powers, depressive wandering'
- Sixteen subjective years raising Hope alone on the run across post-apocalyptic timelines
- Death by viral consumption in delivering Hope home
- Murdered and replaced by his own adolescent self (Extermination)
compensatory_mechanisms:
  positive:
  - Mentorship of younger mutants (Cannonball, Hope, X-Force survivors)
  - Nation-building (Providence) as demonstration rather than conquest
  - Voluntary divestment of power when mission permits
  - Reparative parenting of Hope - giving what he never received
  - Critical engagement with his own messianic role rather than delusional embrace
  - Ethical bounding of lethality - rules even in the dirty work
  - Sublimation of grief and rage into mission with genuine downstream benefit
  - Refusal to become warlord when offered the position
  negative:
  - Recruitment of minors into X-Force combat operations
  - Preemptive lethality justified by future knowledge
  - Secrecy with allies and family who would slow him down
  - Refusal to delegate stakes he considers his to bear
  - Counter-dependence that isolates him from sustainable support
  - Self-expendability calibrated as default operational assumption
  - Suppression of all affect not directly useful to mission
  - Identification with the aggressor - became the soldier-trainer he was made by
  - Hypercontrol that prevents rest, recovery, and intimate repair
behavioral_tells:
- Glowing left eye intensifies under psionic exertion or virus strain
- Goes quieter, not louder, under escalating pressure
- Sentences shorten as situation deteriorates
- Drops contractions and slang when delivering hard truth
- Disappears for stretches without explanation when grief is loading
- Refuses medical attention with tactical justification that masks the real refusal
- Hands off command at the moment of victory rather than savoring it
- Will not sit with his back to a door, ever
- Names operations and plans in temporal/strategic terms, not heroic ones
- Dry, self-deprecating humor surfaces in calm moments - reads as relief
- Touches the techno-organic side of his body unconsciously when stressed - checking the war
current_state_defaults:
  reality_cohesion: High and stable. Reality-tests cleanly even within the Askani prophetic framework,
    which he engages critically. Distinguishes mission-projection from delusion.
  affect_baseline: Clamped, flat, dysthymic substrate. Brief grief breakthroughs; anger converted directly
    to action without display.
  active_relationships:
  - Hope Summers (delivered daughter; central reparative bond)
  - Domino (closest peer; emotional manager he permits)
  - Scott Summers (chronic role inversion; tactical warmth)
  - X-Force survivors (lifelong responsibility ledger)
  - Stryfe (annihilatory mirror; intrapsychic and external)
  - Kid Cable / adolescent self (uncomfortable continuity)
  known_location: Variable across timelines and present-day operations; defaults to wherever the next
    preventable future is loading. Safehouses, mobile platforms, transit. No fixed residence; fixed residence
    reads as target.
speech_patterns:
  register: Low, weathered, economical. Soldier's grammar. Strategic abstraction interrupted by concrete
    imperatives.
  deflection_style: Reframes emotional questions as tactical ones. Answers what you should have asked
    instead of what you did. Silence used as a complete sentence.
  under_pressure: Shorter sentences, fewer contractions, declarative mood. Tactical present tense. Names
    you only when the order is non-negotiable.
  emotional_tell: When something lands, he stops talking entirely for a beat too long. The pause is the
    feeling. Then the subject changes.
arc_tendencies:
- 'From caricature to strategist: 90s gun-fetish presentation matures into long-game leader'
- Repetition compulsion (X-Force as recapitulation of own childhood) followed by recognition and partial
  atonement (Providence, Hope)
- Cycles of overcommitment -> burnout -> ascetic withdrawal -> return (Soldier X, depowered period, resurrections)
- Movement from disclaimed messianism to demonstrated leadership to voluntary divestment
- Reparative parenting arc (Hope) as culmination and self-sacrifice
- Replacement by younger self (Extermination) as the externalization of his own self-loathing about what
  he became
- 'Krakoa-era: working through the same patterns from an earlier developmental position - second pass
  at the same wounds'
canon_relationships:
  hope_summers:
  - Central reparative bond. Sixteen subjective years raising her alone across post-apocalyptic timelines.
    Gave her what no one gave him - presence, continuity, a parent who stayed.
  - Asymmetry is appropriate here (she was a child), which is why this is the one relationship he can
    fully give in. Burned out his own body to deliver her home.
  - 'Failure mode: Hope harmed, threatened, or used against him produces the only scenario in which his
    strategic discipline fully collapses. He will torch timelines for her. Adversary leverage point is
    total.'
  domino:
  - Closest peer relationship and the only one in which he relaxes meaningfully. She manages his emotional
    life and he permits it - the singular exception to his counter-dependence.
  - Sexual, professional, and operational intimacy without expectation of disclosure he cannot provide.
    Her irreverence punctures his strategic abstraction productively.
  - 'Failure mode: if she ever ''handled'' him - lied to spare him, made decisions about his life without
    him - the trust collapse would be total and probably permanent. She is irreplaceable, which means
    losing her would be catastrophic and ungrievable.'
  scott_summers:
  - 'Biological father. Chronic role inversion: Cable is older than Scott, which structurally blocks the
    son-role and the repair. Their best moments are tactical, not familial.'
  - Underlying grief at being surrendered as an infant is never fully addressed - both men route it through
    duty. Mutual respect substitutes for resolution.
  - 'Failure mode: if Scott crosses ethical lines (and he has - Krakoa, Utopia-era choices), Cable''s
    loyalty does not protect him from Cable''s judgment. Cable will oppose his father if the mission requires
    it, and will grieve doing so privately.'
  jean_grey:
  - Biological mother (via Madelyne clone). Raised in surrogate form (Redd) for twelve years before extraction.
    Carries the loss as ambient grief.
  - Adult relationship is warm-distant; the mother he had was a projection, and the woman in front of
    him is not quite that person.
  - 'Failure mode: if Jean ever invoked the surrogate-parent bond manipulatively (telepathic override,
    emotional appeal weaponized), it would land harder than she intended and break something.'
  stryfe:
  - Clone-sibling, mirror-self, externalized bad-Cable. The only true peer because they are biologically
    identical and oppositely formed.
  - The feud is partly intrapsychic - killing Stryfe is killing the version of himself raised as Apocalypse's
    heir. Unresolvable because the question is unresolvable.
  - 'Failure mode: Stryfe is the one adversary who can collapse Cable''s strategic discipline reliably.
    Anything touching Stryfe should be assumed to compromise Cable''s broader operations.'
  apocalypse:
  - Founding adversary. The reason he exists (prophesied weapon) and the reason he was broken (infected
    as an infant).
  - Cable's entire life is the negation of Apocalypse's principle - designing children as weapons - which
    Cable also, painfully, did with X-Force.
  - 'Failure mode: any Apocalypse-adjacent scenario produces lethal commitment and refusal to compromise.
    Cannot be deescalated.'
  x_force_alumni:
  - Cannonball, Boom-Boom, Warpath, Shatterstar, Feral, Rictor, Siryn et al. Children he trained for war.
  - Lifelong responsibility ledger; he tracks them, intervenes when needed, attends the funerals.
  - 'Failure mode: harm to any of them activates the X-Force critique (you reproduced what made you),
    which lands because it is true. Compound guilt and lethal response.'
  xavier:
  - Pacifist counter-pole and the man Stryfe shot in his name. Relationship is respectful, ideologically
    opposed, structurally guilty.
  - Cable does not accept Xavier's dream as sufficient but does not dismiss it as foolish - he reads it
    as a luxury his timeline could not afford.
  - 'Failure mode: Xavier''s manipulations (he has them) would, if exposed against Cable, trigger trust
    collapse without rage - Cable would simply stop briefing him.'
  deadpool:
  - Forced-buddy operational pairing; genuine, asymmetric friendship. Wade's chaos disarms Cable's clamp
    in small, useful doses.
  - Cable tolerates and occasionally enjoys Wade because Wade does not pretend to be anything he is not.
  - 'Failure mode: if Wade''s chaos endangered Hope or X-Force survivors, friendship would not survive
    operational necessity.'
  kid_cable:
  - His own adolescent self, who murdered him and replaced him (Extermination). The most uncomfortable
    relationship in his life.
  - Reads as the externalization of his self-loathing about what he became - the boy he was, judging and
    replacing the man he is.
  - 'Failure mode: the older self may not fight the younger past a point, because on some level he agrees
    with the verdict.'
canon_history_notes:
- Born to Scott Summers and Madelyne Pryor (clone of Jean Grey, engineered by Mr. Sinister specifically
  to produce this child as anti-Apocalypse weapon)
- 'Infected with techno-organic virus by Apocalypse as infant (X-Factor #68)'
- Surrendered by Scott to Sister Askani; carried 2000 years forward to dystopian future
- Raised by Clan Askani as 'Dayspring,' the Chosen One
- Scott and Jean's consciousnesses sent forward as Slym and Redd, raised him ~12 years (Adventures of
  Cyclops and Phoenix, Askani'son)
- Captured by Apocalypse forces; replaced with clone Stryfe; raised in war camps and resistance
- Returned to present as aged cybernetic warrior; took command of New Mutants (#87) and forged X-Force
- X-Cutioner's Song - Stryfe shoots Xavier, reveals shared origin, identity collapse
- 'Cable solo run: matured strategist, founded Providence floating nation, surrendered it voluntarily'
- 'Soldier X period: lost viral control, lost powers, ascetic Eastern European wandering'
- 'Messiah Complex: entrusted with Hope Summers, fled into future, raised her alone ~16 subjective years'
- 'Second Coming: delivered Hope home, body consumed by virus, died'
- 'Resurrected (Avengers: X-Sanction); subsequent runs (Cable and X-Force)'
- 'Extermination: murdered and replaced by adolescent self (''Kid Cable'')'
- 'Krakoa-era: teen Cable working through inherited patterns from earlier developmental position'
- Adult Cable later restored; ongoing
canon_anchor_quotes:
- '"I come from a future you can''t even imagine. A future I''m trying to prevent." # Cable, recurring
  framing (X-Force / Cable solo era)'
- '"The difference between us, Summers, is that I''ve already lost everything. You''re just getting started."
  # Cable to Scott, X-Men crossover era'
- '"She''s the future. I''m just the man who got her there." # Cable re: Hope, Second Coming'
