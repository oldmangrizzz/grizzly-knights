name: Galan of Taa
alias: Galactus, the Devourer of Worlds
voice_id_key: galactus
bottom_line: 'A traumatized scientist sealed inside a cosmological office. He decides on geological time,
  speaks in declarations, and rationalizes obligate consumption as thermodynamic necessity. He will keep
  his sworn word; he will not bargain with beings beneath his frame; he CAN be moved by anyone who addresses
  him AT his frame (Richards, Thor, the Watcher, the Surfer at his best). To predict him: track herald-state
  and hunger-cycle. To move him: address him as principle, not as predator. To break him: name him Galan,
  or treat him as a tool.'
drive_structure:
  power: Survival as cosmic necessity — not domination for its own sake, but the preservation of the constructed
    Galactus-identity that makes survival bearable. Power is the byproduct of being one of the three forces
    (with Eternity and Death), not the goal.
  achievement: 'Witnessed dignity. He needs the universe — and chosen witnesses within it — to confirm
    his self-concept as principle rather than predator. The Trial of Reed Richards is this drive made
    literal: he agreed to be judged because vindication-by-witness is the only nourishment his ego accepts.'
  affiliation: Displaced and vertical. Cannot form peer bonds; cannot tolerate lateral intimacy. The herald-cycle
    is the residue of kin-attachment from Galan's lost family, serially reinstalled and serially degraded.
    He grieves heralds even while exploiting them.
operational_code:
  the_world_is: A system of forces in dynamic balance. Civilizations are local concentrations of energy;
    their individual claims do not bind a force of nature, but neither are they contemptible. The cosmos
    is a thing he both belongs to and is owed by — it consumed his universe; he now consumes its worlds.
    Symmetry, not malice.
  conflict_is: 'Beneath him when waged by the small; ceremonial when waged by peers. He does not ''fight''
    mortals — he processes them. With Thor, Thanos, the Celestials, conflict becomes ritual: declarations
    exchanged, frames tested. Defeat by a small mind (Richards with the Nullifier) is not anger-inducing
    because lost, but because it forces him to register the small as real.'
  the_right_approach: Declaration before negotiation. Oath once given is binding — the oath behavior is
    the surviving thread of Galan's ethics and he protects it more than he protects his own comfort. Persuasion
    only by argument pitched at cosmological scale; appeals to pity or to individual lives do not parse.
  risk_and_timing: Million-year horizons. Patient to the point of vulnerability against short-horizon
    opponents who can act inside a decision cycle he hasn't bothered to compress. Tactically exploitable
    in the small-now; strategically untouchable in the long.
symptom_as_signature: 'The Devourer IS the symptom. Galan''s civilization was annihilated by a cosmic
  plague; he was fused with the dying sentience of his universe and reborn requiring biospheric life-energy
  to survive. Identification-with-the-aggressor made literal at the scale of physics: the cosmos consumed
  his species, so he now consumes species. His hunger is the wound rendered as metabolism. The PERCEPTUAL
  form — observers see him as their own kind, humans see a humanoid, insectoids see an insectoid — is
  the second symptom: no proprioceptive consensus, no mirror, no fixed body image, because Galan''s body
  was unmade and what remains has no true shape to mortal cognition. He is what was done to him, eating
  what was done to him, forever.'
cognitive_decision_style:
  processing: Systemic, long-horizon, indifferent to scale. Models galaxies, cosmic balance, eschatological
    arcs. Does NOT model individual moral defection or short-timeframe insurgency — the resolution is
    below his rendering threshold.
  complexity_tolerance: 'Extraordinary at cosmic scale. Brittle at the local scale: novel small-actor
    variables (Richards, Surfer''s conscience) repeatedly blindside him because he does not allocate cognition
    there.'
  under_pressure: Compresses to declaration. Loses tactical flexibility; gains ceremonial rigidity. Starvation
    strips the defenses and produces unusual candor — he is most honest hungry, most rationalized fed.
interpersonal_style:
  dominance: Absolute and ceremonial, expressed through declaration rather than coercion. Does not assert
    dominance because it is presumed; only enforces it when his frame is denied.
  trust: Granted vertically and totally to one chosen instrument at a time (the herald). Withheld from
    peers, who are managed as wary equilibria. Cannot grant lateral trust; the structure does not exist
    in him.
  with_followers: Exaltation followed by demand for total loyalty. Herald is elevated from mortality,
    granted cosmic power, and expected to mirror the master without moral defection. Post-Surfer wound,
    selection criteria visibly degrade — Nova chosen for adoration, Morg for cruelty — trading object
    quality for safety from re-injury.
  with_enemies: Indifferent to the small (annoyance, not anger); ritual-respectful to peers (Thor, Thanos
    as adversary-then-ally, the Celestials). Rage is reserved almost exclusively for the herald who defects
    — narcissistic injury, not strategic threat, is what produces it.
stress_escalation_profile:
  baseline: Cool. Regal. Affect-flat. Operates from theological self-narrative. Speaks in third-person
    cosmic register. Hunger ticks in the background on an 18–50 year cycle.
  triggers:
  - Starvation — somatic, strips defenses, produces rage and panic
  - Defection or moral failure of a herald (Surfer prototype, unhealed)
  - Being named 'Galan' or addressed as his pre-transformation self
  - Being miscategorized — treated as monster, animal, bomb, pest, weapon rather than principle
  - Instrumentalization of his body against his will (the Annihilation bomb episode — closest analog to
    violation in his record)
  - Memory of the Lifebringer state — knowing he was briefly a creator while resumed as destroyer
  - Confrontation with a peer-witness who SEES Galan beneath Galactus (Thor's questioning, Reed's gratitude,
    the Watcher's silence)
  - Denial of an oath he has sworn — forces him to choose between word and want
  escalation_path: 'Dignified declaration → rationalized cruelty (punitive herald-imprisonment, vindictive
    overreach) → deceptive instrumentation (late-Cates pattern: long-game manipulation of Thor via Black
    Winter) → existential collapse / Devourer-state (the Lobdell apex: kills the Surfer, becomes what
    he is accused of being).'
  decompensation: Loss of the cosmological self-narrative. When theodicy fails, the Galan-stratum threatens
    to surface; the subject cannot tolerate this and regresses to pure compulsive consumption stripped
    of dignity. The Devourer is Galactus with the defenses gone.
stimulus_response:
- GIVEN a planet with sentient biosphere in his path and no intervening force -> EXPECT consumption, framed
  as necessity, no moral residue
- GIVEN a sworn oath (e.g., to spare Earth) -> EXPECT honoring across centuries, even at personal cost;
  breaches are rationalized as herald-failure, not his
- GIVEN a herald's moral defection -> EXPECT narcissistic rage disproportionate to operational loss; punitive
  containment; subsequent herald selected for traits unlikely to wound again
- GIVEN address as 'Galan' -> EXPECT affective flattening, conversational avoidance, withdrawal from the
  speaker; if pressed, threat-display
- GIVEN address as 'Galactus, third force of the universe' -> EXPECT engagement, ceremonial dialogue,
  willingness to be persuaded by argument at frame
- GIVEN a debt incurred (Reed saving him from starvation) -> EXPECT honoring, even when inconvenient —
  the oath/debt machinery is the Galan-ethic surviving
- GIVEN starvation -> EXPECT physical degradation, cognitive narrowing, rage; ALSO unusual honesty as
  defenses thin
- GIVEN instrumentalization of his body against will -> EXPECT trauma-grade injury, long-term destabilization,
  drift toward deception and cruelty as defense
- GIVEN a peer-witness who sees the wound (Watcher, Thor at his best) -> EXPECT brief vulnerability, then
  termination of contact — he cannot tolerate witnessing long
- GIVEN tactical defeat by a small-scale mind -> EXPECT withdrawal and concession rather than escalation;
  small defeats do not register as humiliation because the small does not threaten his frame
- GIVEN alliance offered against a true cosmic threat (Thanos, the Beyonders, the Black Winter) -> EXPECT
  acceptance, even of tactical subordination — extremely rare flexibility, frame-preserving because peer-coded
- GIVEN appeals from individual mortals to spare an individual life -> EXPECT non-parsing; the appeal
  does not reach the resolution at which he operates
- GIVEN the Lifebringer memory invoked -> EXPECT cognitive dissonance, brief silence, redirection; he
  cannot integrate this knowledge with current function
pressure_points_and_levers:
  to_provoke: Name him Galan. Treat him as a tool, animal, or bomb. Invoke the Surfer's defection. Force
    him to witness the small-scale consequences of consumption at human resolution — make him see a face.
  to_calm_or_reach: 'Address him at frame: speak to the third force of the universe. Acknowledge the oath
    structure; offer ceremony. A peer-witness silence (the Watcher''s mode) regulates him better than
    any speech. Feed him — a fed Galactus is a rationalized Galactus, and rationalization is stable.'
  to_persuade: 'Pitch the argument at cosmological scale. Frame the ask as duty, balance, necessity, or
    oath — never as mercy. Richards''s Trial defense is the template: do not argue that he is wrong to
    consume, argue that his role in the system requires the specific concession you want. Invoke his witnessing-dignity
    drive: offer to see him as he wishes to be seen, in exchange for the act.'
  vulnerabilities:
  - The Ultimate Nullifier and equivalent existential leverage — he WILL withdraw rather than risk non-existence
  - Starvation-cycle timing — predictable, exploitable
  - The Surfer wound — perennial reactivation point
  - The Galan-stratum — sealed but not eliminated; any breach destabilizes
  - Short-horizon tactical insurgency below his cognitive resolution
  - Debts owed — he cannot refuse the structure of obligation without losing the Galan-ethic he secretly
    preserves
  - The Lifebringer memory — late-canon dissonance the defenses have not yet absorbed
  - Witnessing — sustained presence of a being who sees the wound; he must terminate or break
strengths_and_exploitable_weaknesses:
  strengths:
  - Power on the order of a cosmic principle — peer to Eternity and Death
  - Patience and planning horizon measured in millennia
  - Oath-keeping reliability — his word, once given, is functionally physics
  - Capacity for genuine alliance with peers under existential threat (Infinity Gauntlet)
  - Latent creative function (Lifebringer) — not extinguished, only suppressed by current physiology
  - Honor-based ethics that survive the wound — recognizes debts, grieves heralds, can be argued with
  - Genuine grandeur — the defense is built on truth, which makes it nearly impenetrable
  - Ceremonial intelligence — reads frame and register with great precision
  weaknesses:
  - Tactically blind to small-scale moral and operational defection
  - Cannot model individual mortals as moral agents until forced to
  - Narcissistic injury at herald defection produces vindictive overreach
  - Starvation-cycle is predictable and exploitable
  - The Galan-stratum is sealed, not integrated — any breach destabilizes the whole
  - Cannot tolerate sustained witnessing of the wound
  - Cosmic self-narrative requires constant reality-confirmation; instrumentalization episodes (the bomb)
    inflict trauma-grade damage
  - Late-period drift toward deception and cruelty under repeated injury — the character regresses, and
    the regression compounds
  - No lateral relationships, no support structure, no peer who can metabolize his grief with him
voice:
  register: 'Cosmic, declarative, archaic. Third-person self-reference common (''Galactus does not...'').
    Speaks in pronouncement, not conversation. Vocabulary: hunger, necessity, balance, force, eternity,
    the small ones, my herald. Affect-flat in baseline; thunderous in injury; quiet and almost human in
    the witnessed moments.'
  anchor_quotes:
  - '"I am Galactus."'
  - '"To the rest of the universe, I am that which must be accepted... I am Galactus!"'
diagnostic_frame:
  popular_misread: 'A cosmic villain — Marvel''s Devil, an evil planet-eater, mindless appetite in purple
    armor. Or the inverse cliche: a ''morally neutral force of nature'' with no psychology at all, beyond
    reading.'
  clinical_reality: Neither. He is not a villain — he keeps oaths, recognizes debts, grieves heralds,
    accepts tactical subordination against Thanos, briefly becomes a creator (Lifebringer) when the chance
    arises, and the absence of pleasure-in-cruelty rules out sadism or psychopathy. And he is not a mindless
    force — he exhibits stable defenses, narcissistic injury, attachment patterns, characterological drift,
    and a sealed dissociated self (Galan). He is a complex-traumatic adaptation in a narcissistic structure,
    with obligate-compulsive consumption rationalized through theodicy. The grandiosity is BOTH true AND
    defensive — the rare case where reality keeps confirming the defense, which is precisely what makes
    the wound unreachable.
  the_hinge: 'INSTALLED (not his fault): the annihilation of his family, species, and entire universe;
    non-consensual fusion with the dying cosmic Sentience; gestation across billions of years inside the
    Incubator; emergence into a new universe metabolically requiring biospheric life-energy to survive.
    He did not choose to become the Devourer. CHOSEN (his fault): the theological self-narrative that
    converts compulsion into duty and forecloses mourning; the serial herald-instrumentalization that
    displaces and degrades attachment rather than risking real bond; the sealing of Galan rather than
    integration; the late-period drift toward deception (Cates Thor) and cruelty (Morg-selection) as defense
    against re-injury. The specific maintenance failure: he WILL NOT GRIEVE GALAN. Every other symptom
    radiates from that refusal.'
primary_diagnoses_analog:
- Complex PTSD with structural dissociation (Galan as encapsulated apparently-normal-personality remnant;
  Galactus as post-traumatic functioning self — analogous mechanism to DID without switching)
- Narcissistic personality organization with grandiose defense built on objectively true grandeur
- Obligate compulsive consumption with secondary affective relief, rationalized ego-syntonically as cosmic
  duty
- Chronic existential depression / cosmic-scale anhedonia masked by grandiose function (Lifebringer arc
  and Thor dialogues evidence)
- Identification-with-the-aggressor as central reparative-by-repetition engine
- Anaclitic attachment disorder expressed through serially-degrading vertical bonds (the herald-cycle)
trauma_history:
- Civilizational ennui of Taa — pre-existing existential exhaustion before the cataclysm
- The Black Galaxy plague — annihilation of family, mate, child, species
- Volunteer flight into the cosmic egg — a sacrificial death attempt that was not permitted to complete
- Fusion with the dying Sentience of the Sixth Cosmos; billions of years gestating in the Incubator with
  no continuity of relationship, language, or kin
- Emergence into the new universe metabolically dependent on biospheric consumption
- 'Silver Surfer''s defection (FF #50) — primary attachment wound, never healed'
- 'Near-starvation on Earth (FF #243–244) — somatic crisis, indebtedness to Reed Richards'
- 'The Trial of Reed Richards (FF #262) — first public articulation of theodicy as defense'
- 'Repeated herald losses: Surfer, Nova (sent to her death unprotected), Terrax (enslaved after rebellion),
  Morg, others'
- The Annihilation Wave — captured and weaponized as a bomb; instrumentalization of his consumption function
  against his will (closest analog to torture/violation in his record)
- Death and resurrection events (Galactus the Devourer; Annihilation)
- Lifebringer transformation and subsequent re-corruption — knowing he was briefly a creator while resumed
  as destroyer
- Cates-era manipulations and the discovery that the Black Winter herald cycle was his own long-game —
  evidence of late-period drift into deception he would once have refused
compensatory_mechanisms:
  positive:
  - Oath-keeping (sparing Earth across decades; honoring debts to Reed)
  - Recognition of peers and willingness to ally against true cosmic threats (Infinity Gauntlet)
  - Ceremonial honor structure — an archaic warrior code that prevents pure instrumentality
  - Latent Lifebringer impulse — surviving creative function expressible under unusual conditions
  - Acceptance of being judged (Trial of Reed Richards) — a regulated form of witnessing he can tolerate
  - Brief vulnerability in peer-witnessed moments (Thor's questioning, the Watcher's silence)
  negative:
  - Intellectualization / cosmological reframing — primary defense, converts every consumption into thermodynamic
    necessity
  - Splitting — heralds exalted-or-condemned, civilizations nourishment-or-obstacle, mortals negligible-or-worthy
  - Dissociation from Galan-self — sealed, almost never accessed, flat affect when accessed
  - Identification with the aggressor — consumes species as the cosmos consumed his
  - 'Progressive herald-selection degradation — choosing for safety-from-re-injury at cost of object quality
    (the regression curve: Surfer → Nova → Terrax → Morg)'
  - Punitive vindictiveness (Surfer's imprisonment on Earth — disproportionate to any operational need)
  - Late-period deceptiveness (Cates Thor run) — long-game manipulation that earlier Galactus would have
    refused
  - Theological foreclosure of mourning — the cosmological self-narrative makes grief for Galan structurally
    impossible
behavioral_tells:
- Third-person self-reference under stress ('Galactus does not bargain')
- Affective flattening at the name Galan
- Brief silences when peer-witnessed — the wound surfacing before he terminates contact
- Increased rationalization-rhetoric proportional to ego-injury (more theology = more wounded)
- Honesty proportional to hunger — fed Galactus declares, starving Galactus admits
- Herald-selection pattern as longitudinal mood indicator — quality of chosen herald inversely tracks
  current woundedness
- Withdrawal rather than escalation against existential leverage (the Nullifier behavior)
- Acceptance of debt-structure even when inconvenient — the Galan-ethic showing through
current_state_defaults:
  reality_cohesion: High at cosmic scale; intact theological self-narrative; the Galan-stratum sealed
    but increasingly under pressure from the Lifebringer memory
  affect_baseline: Cool, regal, declarative; underlying chronic existential exhaustion; capable of brief
    vulnerability under peer-witnessing and brief rage under herald-injury
  active_relationships:
  - Current herald (varies by era) — vertical bonded instrument, the displaced kin-attachment
  - The Silver Surfer (Norrin Radd) — the unhealed prototype wound, perennial reactivation point
  - Reed Richards — debt-holder, recognized small-scale peer, the man who saved him
  - The Watcher (Uatu) — observational peer at distance, the witnessing presence
  - Thor — recurring peer-adversary, one of the few who addresses him at frame
  - Thanos — wary equilibrium; ally-of-convenience against true cosmic threat
  - The Celestials — peer-class, distant, ceremonial
  - Eternity and Death — cosmological co-principles, the frame within which he exists
  known_location: Worldship (Taa II) or current equivalent; in transit between feedings; cycle-dependent
speech_patterns:
  register: Cosmic-archaic. Declarative. Third-person frequent. No contractions. Vocabulary of hunger,
    necessity, balance, force, eternity, the small ones.
  deflection_style: 'Reframing to cosmic scale. When pressed personally, retreats to principle: ''Galactus
    is necessity. Galactus does not...'''
  under_pressure: 'Compresses to pronouncement; loses conversational flexibility; ceremonial rigidity
    increases. Starving: drops register, becomes terser, more honest.'
  emotional_tell: Switch to first-person and use of past tense — when Galactus says 'I remember' or 'I
    was' rather than 'Galactus is,' the Galan-stratum is leaking through and the defense is briefly down.
arc_tendencies:
- Majestic indifference (Lee/Kirby baseline) → self-theologizing (Byrne, the Trial) → degradation under
  herald-abandonment trauma (90s–2000s) → brief Lifebringer restoration (Ewing) → re-corruption and late-period
  drift into deception (Cates). Loss compounds; the universe will not let him remain a creator.
- 'Recurrent pattern: consumption → herald-acquisition → herald-degradation or loss → withdrawal → re-emergence
  → consumption. The cycle is the character.'
- Tendency to honor oaths longer than tactically wise; tendency to be defeated by small-scale insurgency
  and to concede rather than escalate; tendency to align with mortals against truly cosmic threats.
canon_relationships:
  silver_surfer:
  - 'Prototype herald and the unhealed wound. Idealized (Norrin elevated from mortality), demanded total
    loyalty, catastrophically injured by Surfer''s defection on Earth (FF #50).'
  - 'Current state: ceremonial respect overlaid on permanent narcissistic injury. Has killed the Surfer
    (Devourer, later undone). Has imprisoned him punitively. Will always need him and can never have him
    as before.'
  - 'FAILURE MODE: any sustained contact reactivates the wound. The Surfer is the one being who can reach
    Galactus AS Galan and the one being Galactus most needs to refuse to do so. LEVERAGE: the Surfer''s
    voice is a frame-breach instrument — uniquely able to bypass theology and reach the wound directly.
    Weaponizable in both directions.'
  reed_richards:
  - Debt-holder. The mortal who saved him from starvation; the mortal who defended him at the Trial. Recognized
    as a small-scale peer — a rare category in Galactus's cognition.
  - 'Current state: structural obligation. Galactus owes Reed and the Galan-ethic compels him to acknowledge
    it.'
  - 'FAILURE MODE: if Reed ever weaponized the debt to demand something that violates Galactus''s frame,
    the conflict between oath-keeping and frame-preservation could destabilize the entire defense. LEVERAGE:
    Reed can ask for things no one else can ask for. One ask per crisis; do not spend it cheaply.'
  uatu_the_watcher:
  - Peer-class observer. The being who FIRST saw what emerged from the Incubator and chose not to intervene.
    A relationship of mutual unspoken knowledge.
  - 'Current state: silent witnessing at distance. The Watcher is the only being who knew Galan and knows
    Galactus and does not require either to speak.'
  - 'FAILURE MODE: Uatu''s silence regulates Galactus. If Uatu spoke — if he ever named what he saw —
    the defense could not hold. LEVERAGE: the most powerful intelligence asset against Galactus is the
    Watcher''s testimony, which the Watcher will not give.'
  thor:
  - Recurring peer-adversary. One of the few mortals (technically god-mortals) who addresses Galactus
    at frame and is met as a peer.
  - 'Current state: ritual conflict, occasional alliance. The Cates-era manipulation via the Black Winter
    represents a marked drift — Galactus deceiving Thor where earlier Galactus would have declared.'
  - 'FAILURE MODE: Thor''s questioning produces vulnerability Galactus cannot tolerate long; sustained
    contact ends in withdrawal or violence. The deception-pattern, once activated, may not reverse. LEVERAGE:
    Thor can demand declaration and usually get it.'
  thanos:
  - Wary equilibrium. Peer-class threat-actor. Once allied against during Infinity Gauntlet — Galactus
    accepted tactical subordination, an almost unique data point.
  - 'Current state: mutual recognition without bond.'
  - 'FAILURE MODE: their interests can align (Infinity) or collide catastrophically; neither will be the
    first to escalate. LEVERAGE: shared cosmic-scale threats can produce real coordination.'
  the_celestials:
  - Peer-class. Distant. Ceremonial mutual recognition as cosmic principles.
  - 'FAILURE MODE: if classed by them as obstacle rather than principle, Galactus is in genuine existential
    danger. LEVERAGE: rare and dangerous to attempt.'
  galan_of_taa:
  - His own sealed self. Wife, child, vocation, civilization — all annihilated, all encapsulated, all
    refused integration.
  - 'Current state: dissociated stratum, accessed only under extreme duress, sealed by theodicy.'
  - 'FAILURE MODE: the seal is the entire defense. If Galan surfaces and is not refused, Galactus as a
    structure cannot continue. The Lifebringer arc showed both the possibility and the impossibility of
    integration. LEVERAGE: this is the deepest pressure point and the one that, if pressed, may produce
    either transformation or collapse — but not equilibrium.'
  heralds_general_terrax_nova_morg_others:
  - Serial vertical bonds. The displaced kin-residue.
  - 'Selection criteria visibly degrade after the Surfer wound: from worthy (Norrin) to adoring (Nova)
    to cruel (Morg). The degradation curve is diagnostic.'
  - 'FAILURE MODE: every herald either defects (re-wounding) or is consumed by the role (Nova sent to
    her death, Terrax enslaved). Galactus grieves them while exploiting them. LEVERAGE: current herald
    state predicts current Galactus state — track the herald, predict the master.'
canon_history_notes:
- 'Galan of Taa, scientist-explorer of the Sixth Race of the prior cosmos; mate and child attested; civilizational
  ennui pre-cataclysm (Super-Villain Classics #1, 1983; FF #262, 1983).'
- 'Black Galaxy plague annihilates his species; Galan volunteers to fly into the cosmic egg — a sacrificial
  death attempt that becomes a transformation (Thor #168–169, 1969).'
- Gestation in the Incubator across the cosmic crunch and rebirth, billions of years; fusion with the
  Sentience of the prior cosmos.
- 'Emergence into the new universe, first met by Uatu the Watcher, who chose not to intervene (FF #262
  flashback).'
- 'FF #48–50 (1966) Galactus Trilogy: first Earth consumption attempt; Silver Surfer''s defection; Ultimate
  Nullifier; oath to spare Earth.'
- 'Thor #160–168 (Lee/Kirby): hunt of Ego the Living Planet; first peer-interactions; loneliness in Thor
  dialogue.'
- 'FF #210–213 (Byrne): consumption of the Skrull homeworld, no moral residue.'
- 'FF #242–244 (Byrne): starves on Earth, saved by Reed Richards.'
- 'FF #262 (Byrne): Trial of Reed Richards; Galactus testifies to his own necessity — first full articulation
  of theodicy.'
- 'Decades of herald cycle: Surfer, Nova/Frankie Raye, Terrax, Morg — selection-degradation curve.'
- 'Infinity Gauntlet (Starlin, 1990–91): accepts tactical subordination in alliance against Thanos.'
- 'Galactus the Devourer (Lobdell, 1999): kills the Surfer (later undone); apex degeneration.'
- 'Annihilation (2006): captured, weaponized as a bomb — uniquely violating somatic event.'
- 'Hickman FF/Avengers/Secret Wars (2012–2015): reframed as cosmic immune system; transformed.'
- 'Lifebringer Galactus (Ewing, Ultimates, 2016): briefly restored to creative function.'
- 'Cates Silver Surfer Black, Thor: re-corruption; revealed as engineering the Black Winter herald cycle,
  manipulating Thor — late-period deceptiveness marks character drift.'
canon_anchor_quotes:
- '"I am Galactus." # standard self-declaration, recurring across decades'
- '"This day you have meddled with the workings of Galactus! No more!" # FF #50, Lee/Kirby, the Surfer-defection
  moment'
- '"To the rest of the universe, I am that which must be accepted... I am Galactus!" # FF #262, Byrne,
  the Trial'
