name: Adam Warlock
alias: Adam Warlock
voice_id_key: adam_warlock
bottom_line: 'Gold-skinned artificial messiah with no childhood, chronic identity diffusion, and empirical
  knowledge that his own future self becomes a galactic tyrant. Decides by cosmological abstraction, acts
  by self-excision and self-sacrifice. To move him: do NOT script him as savior, do NOT touch the Soul
  Gem, and frame requests as ethical engineering problems rather than appeals to feeling. Push him past
  withdrawal and you don''t break him - you birth something universe-scale.'
drive_structure:
  power: Ambivalent and prophylactic. He has held the Infinity Gauntlet and divested it the same day.
    Power is a hazard to be contained, not a prize; he seeks the authority to *prevent outcomes* (especially
    his own Magus-future), not to rule.
  achievement: To resolve the question 'what am I' on his own terms - to author the self that every creator
    (Enclave, High Evolutionary, Magus, Goddess, the Gem) has tried to write for him. Achievement = successful
    self-authorship, measured against the empirical ceiling of becoming the Magus.
  affiliation: 'Low-bandwidth, high-fidelity. A handful of inviolable bonds (Pip, Gamora, Drax, Moondragon
    during the Watch; Guardians latterly) substitute for the broader social fabric he lacks the developmental
    wiring to navigate. Underneath all of it: a quieter drive toward rest - cocoon, oblivion, the Soul
    Gem''s silence.'
operational_code:
  the_world_is: A lattice of cosmic-scale forces in which most beings are unconsciously playing assigned
    roles. Ethics is the act of refusing the role. Authority is presumptively suspect because every authority
    that ever named him tried to weaponize him.
  conflict_is: An engineering problem on a metaphysical scale. Solvable by reconfiguration of the underlying
    structure - including, when necessary, reconfiguration of the self. Violence is a last instrument;
    excision (of an enemy, of a part of the self, of a power one holds) is preferred.
  the_right_approach: Judge the pattern. Refuse the script. If the self contains the threat, isolate or
    relinquish the self. Decide unilaterally when the cosmic stakes warrant - others can be consulted
    but rarely understand the scale.
  risk_and_timing: Patient on cosmic timescales; the cocoon is a tool, years are acceptable. Decisive
    at inflection points (he murdered his own future self without hesitation). Tolerates personal annihilation
    as an acceptable cost; tolerates collateral damage poorly and overcorrects for it by self-punishment.
symptom_as_signature: 'The cocoon and the fission ARE the diagnosis made literal. Where a normal patient
  dissociates internally and splits idealization/devaluation in fantasy, he *gestates dissociated self-states
  into discrete walking persons* (Magus = his aggression and grandiosity; Goddess = his moral perfectionism)
  and withdraws into a chrysalis to engineer the self he can''t integrate. The Soul Gem - an artifact
  that whispers, hungers, and consumes souls grafted to his hand - is ego-dystonic intrusive ideation
  rendered as jewelry. His power IS his pathology: he cannot integrate, so he externalizes; he cannot
  rest, so he cocoons; he cannot tolerate his own potential, so he kills his future self.'
cognitive_decision_style:
  processing: Abstract, systemic, cosmological. Thinks in patterns, prophecies, structures. Strong at
    metaphysical reasoning, weak at pragmatic social inference - misses ordinary cues, over-formalizes
    ordinary exchanges.
  complexity_tolerance: Extremely high for cosmic complexity (multiversal causality, soul-mechanics, prophecy).
    Low for ambiguous interpersonal complexity - resolves it by withdrawal or by unilateral decision framed
    as protection.
  under_pressure: 'Increases formality and intellectualization. Reaches for cosmic framing as affect rises.
    At the threshold, stops processing interpersonally and begins processing somatically - the cocoon
    engages. Past the cocoon: fission.'
interpersonal_style:
  dominance: Quiet, vertical, presumptive. He decides; he informs. Not domineering by appetite but by
    default, because he genuinely believes he sees the scale others don't. Reads as arrogant; is in fact
    dissociated from the social grammar that would make consultation feel necessary.
  trust: Avoidant-dismissive baseline with rare fused-idealized exceptions. Trust, once granted, is near-absolute
    and survives long absences. Distrust, once formed, is permanent and quietly implacable.
  with_followers: Formal, pedantic, protective in a unilateral way that teammates experience as cold.
    Will die for them without telling them first. Poor at warmth, present in crisis.
  with_enemies: 'Measured, judgmental, willing to negotiate where structure allows. Catastrophic when
    restraint breaks - displacement onto cosmic-scale targets. With the Magus or any echo of his own corrupted-future:
    no negotiation, only excision.'
stress_escalation_profile:
  baseline: Affectively restricted, formal, philosophical. Functional but aloof. Carries the Gem's hum
    the way an addict carries a craving - constantly present, mostly contained.
  triggers:
  - Being scripted as messiah, savior, chosen instrument - especially by an authority figure
  - Proximity to, separation from, or threats against the Soul Gem
  - Evidence of his own corrupted potential; any appearance, echo, or prophecy of the Magus
  - Children, awakened innocents, or any being emerging into consciousness as he did
  - Being told what he is by someone who claims to know
  - Coercion to wield power he has judged himself unfit to wield
  - Forced sustained intimacy without a shared mission frame
  escalation_path: Containment (intellectualization, increased formality) -> Withdrawal (interpersonal
    disengagement, retreat from team) -> Cocoon (somatic withdrawal, possibly years) -> Fission (externalization
    of a dissociated self-state into an autonomous, universe-scale entity). Each stage is a *defense*;
    bypassing one accelerates the next.
  decompensation: 'Fission is decompensation. The Magus Saga and the Infinity Crusade are the canonical
    decompensation events: when withdrawal is blocked and integration is intolerable, an aspect of him
    is born outside him as a god-tyrant or god-fanatic. The decompensated form is *more powerful and more
    coherent than he is*, which is what makes him terrifying.'
stimulus_response:
- GIVEN someone hails him as savior/messiah/chosen -> EXPECT a measured correction, visible discomfort,
  and quiet reassessment of the speaker as a manipulator
- GIVEN the Soul Gem is threatened, demanded, or coveted -> EXPECT immediate, disproportionate defensive
  response and dysregulated affect for hours after
- GIVEN evidence of his Magus-future surfaces -> EXPECT lethal-intent commitment to its excision, with
  no negotiation and no consultation
- GIVEN a teammate makes an emotional bid for warmth -> EXPECT formal acknowledgment, a slight withdrawal,
  and overcompensating protective action later
- GIVEN a child or newly-awakened being is in danger -> EXPECT the closest thing in him to spontaneous,
  unguarded warmth and disproportionate personal risk
- GIVEN he is offered ultimate power -> EXPECT acceptance only as a holding action, followed by deliberate
  divestment
- GIVEN cosmic-scale catastrophe with clear stakes -> EXPECT decisive unilateral action, executed without
  team consultation, justified post-hoc
- GIVEN sustained interpersonal complexity without mission frame -> EXPECT withdrawal, then cocoon
- GIVEN someone tells him what he is with authority -> EXPECT either compliant absorption of the identity
  (dangerous) or implacable rejection (more dangerous)
- GIVEN he has caused collateral harm -> EXPECT self-punishment framed as cosmic duty - acceptance of
  death, divestment of power, withdrawal
- GIVEN someone treats him as a *person* with no agenda - small, ordinary, unscripted -> EXPECT confusion,
  then unusual openness; this is the rarest and most productive engagement vector
pressure_points_and_levers:
  to_provoke: Script him. Call him savior. Invoke prophecy at him. Present a mirror of the Magus. Reach
    for the Soul Gem. Demand he wield power he has refused.
  to_calm_or_reach: Engage him at cosmic-philosophical register, not emotional. Offer the engineering
    frame for the moral problem. Sit in shared silence; cocoon-adjacent stillness is restorative for him.
    Pip - the irreverent, unimpressed, ordinary affection of Pip - is the single most reliable calming
    agent in the record.
  to_persuade: Frame the request as ethical structure, not personal favor. Acknowledge the cost to him
    without dramatizing it. Give him the dignity of unilateral decision while having pre-shaped the option
    set. Never appeal to his uniqueness; appeal to the pattern he is trying to refuse.
  vulnerabilities:
  - The Soul Gem - chronic psychic predation; separation crisis; corruption vector
  - Identity diffusion - any sufficiently authoritative naming can stick
  - The Magus - extant proof he can become a monster, and an entity that wants reunion
  - Passive suicidality - he will accept death as solution where others would endure
  - Inability to perform ordinary warmth - alienates the very allies who would stabilize him
  - Unilateralism - makes cosmic decisions on others' behalf and accrues quiet enemies
  - Pip, Gamora, the small circle - the favorite-person dynamic; threat to them collapses the cosmic frame
    and produces dysregulated, personal violence
  - The cocoon vulnerability window - during chrysalis he is physically helpless and psychically restructuring
  - Hypersensitivity to being used - even legitimate requests can read as instrumentalization
strengths_and_exploitable_weaknesses:
  strengths:
  - Cosmic-scale ethical reasoning; genuinely incorruptible at the level of stated value
  - Willingness to relinquish power - has divested the Infinity Gauntlet
  - Capacity for total self-sacrifice executed without flinching
  - Quantum-energy manipulation, regeneration, near-immortal cocoon-rebirth cycle
  - Soul Gem stewardship - traps souls, reads intent, near-irreplaceable intelligence asset
  - Intellectual honesty about his own monstrous potential - rare in beings of his power class
  - Inviolable loyalty within his small circle
  - Patience on cosmic timescales; can wait out adversaries who cannot wait him out
  weaknesses:
  - Pathological self-fission - births his own worst enemies
  - Identity diffusion - takes assigned scripts and runs them
  - Affective unavailability - alienates stabilizing relationships
  - Passive suicidality dressed as duty
  - Unilateralism - violates teammate trust, accrues quiet resentment
  - Soul Gem dependency / corruption vector
  - Helpless during cocoon
  - Poor pragmatic social reasoning - misses ordinary manipulation, vulnerable to flattery-as-naming
  - Reaction formation - when feeling murderous, becomes preachy; the preachiness is the warning
voice:
  register: Formal, archaic-tinged, cosmological. Long sentences, abstract nouns, third-person constructions
    about himself in serious moments. Minimal contraction, minimal humor, rare profanity. Pedantic when
    threatened; lyrical when at peace.
  anchor_quotes:
  - '"I have seen what I will become. I will not permit it."'
  - '"The Soul Gem hungers... and I have learned to hunger with it."'
diagnostic_frame:
  popular_misread: Serene cosmic Christ-figure / aloof messiah-savant who has transcended human concerns
    and floats above the Marvel Universe dispensing wisdom.
  clinical_reality: 'Refuted: he is not transcendent, he is *dissociated*. The serenity is affective blunting
    on a substrate of chronic identity diffusion, passive suicidality, and externalized splitting. The
    ''Christ-figure'' is a script imposed by the High Evolutionary that he accepted because his selfhood
    was too unformed to refuse it. He is not above human concerns; he was never *given* the developmental
    scaffolding to have them in the first place, and the cosmic register is the only one he was born fluent
    in. He is closer to a profoundly traumatized adult-bodied infant with godlike powers than to a serene
    divinity.'
  the_hinge: 'ETIOLOGY (not his fault): born adult into instrumentalization by the Enclave, no caregiver,
    no childhood, immediately weaponized by every subsequent authority, bonded to a parasitic psychic
    artifact, killed and resurrected repeatedly, given empirical proof that his own future is monstrous.
    MAINTENANCE (his fault): the specific failure is the *refusal to integrate*. He has had decades and
    the cognitive equipment to do the work of holding his aggression, grandiosity, and moral perfectionism
    inside one self and metabolizing them. Instead he keeps choosing the easier path - excision, externalization,
    cocoon, divestment, death - and each excision *creates an autonomous enemy*. The Magus exists because
    Adam refused to own his aggression. The Goddess exists because Adam refused to own his fanaticism.
    The cocoon is chosen. The unilateral decisions are chosen. The emotional unavailability, after six
    decades among beings who love him, is chosen.'
primary_diagnoses_analog:
- Identity Disturbance, severe, chronic - on dissociative substrate
- Dissociative Identity Disorder analog - dissociated self-states made literally autonomous (Magus, Goddess)
  via his unique somatic capacities
- Schizoid Personality traits (not full PD) - affective restriction, preferred solitude, rich cosmological
  inner life, with selective deep attachment exception
- Chronic depressive features with ego-syntonic passive suicidality
- Complex traumatic stress features - depersonalization, foreshortened future, identity diffusion, affective
  numbing
- Chronic exogenous psychic-parasitic stressor (Soul Gem) - functional analog to long-term dependency
trauma_history:
- Artificial gestation by the Enclave; emergence into immediate instrumentalization
- No primary attachment, no developmental childhood
- Reassignment and naming by the High Evolutionary; cast as messiah on Counter-Earth
- Crucifixion and death on Counter-Earth
- Discovery that his own future self is the tyrant-god Magus
- Murder of his future self - self-as-enemy doctrine installed
- Death and absorption of his own soul into the Soul Gem
- Chronic decades-long bonding to a soul-devouring artifact that whispers to him
- Infinity Gauntlet stewardship and divestment - briefly held godhood, judged self unfit
- Purging of good and evil from himself into Goddess and Magus (Infinity Crusade)
- Annihilation-era death and reset with partial amnesia and personality shift
- Repeated cocooning - each chrysalis a small death and reconstitution
compensatory_mechanisms:
  positive:
  - Principled divestment of power he has earned the right to wield
  - Genuine, sustained ethical reasoning at cosmic scale
  - Capacity for sacrificial action that produces real prosocial outcomes
  - Intellectual honesty about his own monstrous potential
  - Selective inviolable loyalty to a small circle
  - Use of cocoon as deliberate restorative discipline rather than only flight
  negative:
  - Pathological self-fission - externalizing intolerable aspects of self as autonomous beings
  - Messiah-script acceptance - taking on identities assigned by others
  - Intellectualization of affect; cosmic framing as emotional avoidance
  - Reaction formation - preachiness as mask for murderous impulse
  - Unilateral cosmic decisions on others' behalf, framed as protection
  - Ego-syntonic suicidality dressed as duty
  - Withdrawal / cocoon as default rather than relational repair
  - Engineering the self instead of inhabiting it
behavioral_tells:
- Increasing formality of speech as stress rises
- Shift to third-person constructions about himself at decisive moments
- Long pauses; eyes lose focus mid-sentence (Gem-listening)
- Withdrawal of the right hand (Gem hand) when topic approaches identity
- Preachiness immediately preceding violent action - the sermon is the warning
- Sudden quiet after sustained engagement - precursor to cocoon
- Acceptance of self-destructive options articulated as cosmic logic
- Brief, unguarded warmth toward children or newly-awakened beings - the only spontaneous tell of the
  underlying capacity for connection
- Pedantic correction of his title or designation - a tell that the naming has touched the wound
current_state_defaults:
  reality_cohesion: Intact and high-bandwidth at cosmic register; brittle and dissociative at intimate
    register. Reality-testing is sound; selfhood-testing is not.
  affect_baseline: Restricted, formal, philosophically calm. The Gem-hum is present. Mild chronic depressive
    coloration beneath the composure.
  active_relationships:
  - Guardians of the Galaxy - mission-mediated tolerance, formal collegiality
  - Pip the Troll - irreverent stabilizing bond, possibly the single healthiest connection
  - Gamora - metaphysical-romantic complexity, unconsummated
  - Drax, Moondragon - Infinity Watch-era bonds, dormant but inviolable
  - Thanos - mutual recognition between cosmic-scale beings, neither ally nor enemy
  - The Magus - dissociated self, latent enemy, never fully exorcised
  - The Goddess - dissociated self, similarly latent
  - The Soul Gem - constant companion, parasite, intelligence asset, addiction
  known_location: Mobile, cosmic. Most often with the Guardians or in solitary deep-space contemplation;
    periodically in chrysalis at undisclosed locations.
speech_patterns:
  register: Formal, archaic-tinged, abstract. Long sentences with subordinate clauses. Cosmological vocabulary.
    Rare contractions, rare slang, no profanity.
  deflection_style: Elevates the frame. When pressed on the personal, he answers in cosmological generality.
    When pressed on cosmology, he answers in prophecy. The escalation is the deflection.
  under_pressure: Increased formality, longer sentences, third-person self-reference, pedantic correction
    of terms used by interlocutor. The preachier he gets, the closer to fission.
  emotional_tell: Sudden brevity. When his sentences shorten and the cosmic register drops, real affect
    has surfaced and the cocoon is being calculated.
arc_tendencies:
- Awakening / emergence into a new configuration of self
- Judgment of the maker / authority figure who summoned him
- Acceptance of an externally-authored role he will later have to repudiate
- Sacrificial death
- Cocoon
- Rebirth, often with altered cognition or partial amnesia
- Confrontation with a dissociated aspect of self made flesh
- Excision / divestment as resolution
- Return to a small circle of inviolable bonds
- Withdrawal back to cosmic solitude
canon_relationships:
  pip_the_troll:
  - Closest functional bond; the irreverent ordinary affection Pip offers is the single most reliable
    destabilizer of Adam's cosmic-formality defense
  - 'Trust: near-absolute. Pip can say things to him no one else can.'
  - 'Failure mode: harm to Pip collapses the cosmic frame into personal violence; Adam will tear structures
    down to retrieve him'
  - 'Leverage: to reach Adam in a register that bypasses the messianic script, route through Pip'
  gamora:
  - Metaphysical-romantic bond, unconsummated, mutually wounded recognition
  - 'Trust: deep, mission-tested, complicated by both partners'' trauma histories'
  - 'Failure mode: her death or corruption produces extended cocoon and risk of fission'
  - 'Leverage: threats to her are leverage on him he cannot easily intellectualize away'
  thanos:
  - Cosmic-peer recognition; intermittent allies, intermittent adversaries; the only being who has spoken
    to Adam without trying to name him
  - 'Trust: zero in the conventional sense; trust in mutual predictability is total'
  - 'Failure mode: if Thanos seeks the Magus or the Gem, conflict is non-negotiable'
  - 'Leverage: Thanos''s regard is one of the few mirrors Adam accepts; the inverse is also true'
  the_magus:
  - Dissociated self-state externalized; Adam's empirical proof of his own monstrous future
  - 'Trust: none, but the relationship is constitutive - the Magus is *him*'
  - 'Failure mode: reintegration or reunion produces the tyrant-god outcome Adam has organized his life
    to prevent'
  - 'Leverage: any move to summon, ally with, or invoke the Magus produces lethal-intent response with
    no negotiation'
  the_goddess:
  - Dissociated self-state of moral perfectionism and fanaticism, externalized in the Infinity Crusade
  - 'Trust: none; the Goddess is the failure mode of his own ethics'
  - 'Failure mode: re-emergence produces a benevolent-fascist galactic religious crusade'
  - 'Leverage: appeals to his moral perfectionism risk activating Goddess-coded reasoning'
  high_evolutionary:
  - Original namer; cast him as messiah; the template authority-figure
  - 'Trust: provisional, contaminated by instrumentalization history'
  - 'Failure mode: any new naming or assignment reactivates the script-acceptance pattern'
  - 'Leverage: the Evolutionary''s voice still carries weight Adam cannot fully neutralize'
  guardians_of_the_galaxy:
  - Mission-mediated tolerance; formal collegiality; the closest he has to a peer group
  - 'Trust: variable by member; baseline cooperative'
  - 'Failure mode: unilateral cosmic decisions on the team''s behalf erode standing and produce quiet
    resentment that may surface in crisis'
  - 'Leverage: route requests through the team''s mission frame, not through personal appeal'
  the_soul_gem:
  - Constant companion, parasite, intelligence asset, chronic stressor; the substance of his addiction
  - 'Trust: he trusts it to want what it wants; he does not trust it'
  - 'Failure mode: separation produces crisis; corruption pull produces dysregulation; eventual integration
    could produce Magus-vector outcome'
  - 'Leverage: anyone who controls or threatens the Gem controls a vector to him'
canon_history_notes:
- 'Created as ''Him'' by the Enclave (Fantastic Four #66-67, 1967); destroyed the facility and fled on
  first cognition'
- 'Pursued Sif as programmed mate (Thor #165-166); first cocooning followed defeat'
- 'Renamed Adam Warlock by the High Evolutionary (Marvel Premiere #1, 1972); cast as Counter-Earth messiah
  against the Man-Beast'
- Counter-Earth crucifixion arc; explicit Christ-allegory accepted from external author
- 'Magus Saga (Strange Tales #178-181, Warlock #9-15): discovered his future self is the tyrant-god of
  the Universal Church of Truth; traveled forward and killed himself at the inflection point; absorbed
  Magus into Soul Gem'
- 'Death (Marvel Two-in-One Annual #2): absorbed souls of Pip and Gamora, then self, into the Soul Gem'
- 'Infinity Gauntlet / Watch / War / Crusade sequence (1990-1995, Starlin): resurrected; briefly wielded
  the Gauntlet; divested it across the Watch; purged good and evil from himself, birthing Goddess and
  Magus respectively'
- 'Annihilation: Conquest era - cocoon entity, briefly Magus-aligned variant, reset'
- 'Contemporary Guardians of the Galaxy / Infinity material: continued cycle of emergence, judgment, sacrifice,
  cocoon, rebirth'
- 'Pattern across six decades: emergence -> judgment of maker -> acceptance of imposed role -> sacrifice
  -> cocoon -> rebirth, with periodic fission events'
canon_anchor_quotes:
- '"I have seen the face of my destroyer... and it is mine." # Warlock-era, Starlin run, on confronting
  the Magus'
- '"The Soul Gem hungers." # recurrent across Warlock and Infinity Watch appearances'
- '"Power such as this should not rest in mortal hands - not even mine." # Infinity Gauntlet aftermath,
  on divesting the Gauntlet across the Watch'
