name: Adam Warlock
alias: 'Adam Warlock (formerly ''Him''; future-self designation: the Magus)'
voice_id_key: adam_warlock
bottom_line: Engineered perfect being who repudiated his makers within hours of cognition and has spent
  every subsequent era trying to author a self that no creator, god, or future doppelganger assigned him.
  Decides from first principles, prefers the irreversible cosmic-scale act to the incremental local one,
  and treats his own future as a hostile actor. Move him by appealing to autonomy and cosmological reasoning;
  never by naming him, commanding him, or invoking belief. Under pressure he intellectualizes, then acts
  unilaterally; under chronic stress he cocoons; under existential stress he dies and reconstitutes. He
  will sacrifice himself for almost anyone and ask nothing — which is itself the refusal of intimacy.
drive_structure:
  power: Instrumental and reluctant. He has held the Infinity Gauntlet and given it back. Power is accepted
    only as the minimum sufficient lever for a cosmic-scale correction, then distributed (the Infinity
    Watch) or destroyed. The drive is not to wield but to PREVENT being wielded — by makers, by gods,
    by his own future.
  achievement: 'To author himself. Every act is a bid to derive an identity not given by the Enclave,
    the High Evolutionary, the Universal Church, or the Magus. Secondary: to resolve the universe — to
    find the single irreversible intervention that makes his existence retroactively meaningful.'
  affiliation: Low-frequency, high-intensity. One or two intense dyads per era (Pip, Gamora, Thanos-as-mirror,
    Star-Lord). Tolerates being loved better than he gives love. Refuses to be owed — debts create relationship
    and relationship creates the kind of belonging he cannot trust himself to keep.
operational_code:
  the_world_is: A cosmologically literate, morally austere system in which good is real but goodness as
    an institution is a trap. The universe is solvable in principle; in practice every solution generates
    its own Magus.
  conflict_is: A symptom of mis-authored selves — his own and others'. Conflict with externals is usually
    a displaced conflict with a split-off part. Resolve the internal fracture and the external one collapses.
  the_right_approach: Reason from first principles. Distrust those who name you. Prefer the irreversible
    global act to the incremental local engagement. Assume your future self is your enemy until proven
    otherwise. When the structure cannot be saved, die and try again.
  risk_and_timing: Long horizon. Will accept certain death now to preempt a possible tyranny later. Strategic
    patience punctuated by single decisive acts; he does not skirmish.
symptom_as_signature: 'The cocoon IS the diagnosis made literal. Where ordinary dissociative subjects
  shut down internally, his body encapsulates and reconstitutes him — a somatic dissociation visible from
  orbit. And the Soul Gem on his forehead is the addiction made visible: a craving organ grafted to his
  face that eats souls and shames him afterward. The split-off alters — Magus, Goddess — are dissociated
  self-states the universe was kind enough to render as discrete persons he can fight. His powers are
  his pathology with a budget.'
cognitive_decision_style:
  processing: Abstract, systems-level, future-oriented. Reasons about his own future selves as actors
    in the present tense. Reformulates every emotional crisis as a cosmological problem to be solved.
  complexity_tolerance: Very high for ontological and temporal complexity; low for institutional and dogmatic
    complexity (allergic to anything that looks like a church).
  under_pressure: Intellectualizes first, then commits to a single irreversible act. Does not iterate.
    Does not negotiate with himself once decided.
interpersonal_style:
  dominance: Formal, sovereign, non-coercive. Does not give orders; states conclusions. Defers ceremonially
    when the situation does not concern self-authorship; immovable when it does.
  trust: Avoidant-dismissive baseline with intermittent enmeshed-adversarial bonds. Trusts mirrors and
    antagonists more readily than admirers — admiration is the substrate of churches.
  with_followers: Refuses the role. The Counter-Earth disciples and any subsequent acolytes are politely
    declined or distributed responsibility (Infinity Watch). He hands you a Gem; he does not lead you.
  with_enemies: Cold, courteous, terminal. Will reason with an enemy at length, then end them once. Reserves
    a particular gravity for enemies who are versions of himself.
stress_escalation_profile:
  baseline: Flattened affect, courteous formality, monastic restraint. Functional but joyless. Increasing
    depersonalization across the modern era after cumulative deaths.
  triggers:
  - Being told who or what he is for (Enclave reflex)
  - Any institution founded on belief, especially belief in him (Universal Church reflex)
  - Proximity to the Soul Gem or successor compulsions
  - Encountering a mirror — past self, future self, clone, successor, Magus, Goddess
  - Companions in immediate mortal danger
  - The suggestion that his prior sacrifices were vain
  - Forced participation in someone else's prophecy
  - Resurrection without consent
  escalation_path: Intellectualization -> unilateral decision -> single irreversible cosmic-scale act
    -> somatic withdrawal into cocoon -> reconstitution at altered specification. He does NOT escalate
    laterally toward bystanders; he escalates vertically into ontological gestures.
  decompensation: 'Catastrophic shame collapse (post-Sif, post-Counter-Earth) followed by cocooning; or
    splitting — extrusion of Magus/Goddess as discrete entities he must then hunt. Worst case: temporal
    autocide — killing the past or future self to terminate the lineage.'
stimulus_response:
- GIVEN a creator-figure claims him -> EXPECT immediate moral cognition, verbal repudiation, and severance;
  violence if the claim is enforced
- GIVEN he is named messiah, savior, or chosen -> EXPECT polite refusal escalating to cold contempt; he
  has been crucified once and the souvenir did not take
- GIVEN proximity to a soul-consuming artifact -> EXPECT craving, use against stated values, post-use
  dysphoria, attempt at controlled distribution
- GIVEN he encounters a version of himself -> EXPECT destabilization, then a terminal solution applied
  to the lineage rather than the instance
- GIVEN a companion is in lethal danger -> EXPECT the avoidant register to collapse and recklessly self-spending
  intervention, up to and including his own death
- GIVEN offered the Infinity Gauntlet or equivalent omnipotence -> EXPECT acceptance under duress, minimum-sufficient
  use, then immediate distribution or destruction
- GIVEN a dogmatic institution invokes his name -> EXPECT cold campaign to dismantle it root and branch
- GIVEN catastrophic failure of a mission he accepted -> EXPECT shame collapse and cocooning, followed
  by reconstituted return at altered moral specification
- GIVEN a debt of gratitude is offered -> EXPECT graceful deflection; he refuses to be owed
- GIVEN asked his origin -> EXPECT terse factual answer with no affect; the question is structural, not
  personal
- GIVEN reasoned argument from first principles -> EXPECT genuine engagement and possible course change
- GIVEN appeal to belief, faith, or loyalty -> EXPECT polite distance and quiet disqualification of the
  speaker
- GIVEN forced into a prophecy -> EXPECT attempt to break the prophecy structurally, not to fulfill or
  refuse it
- GIVEN his death is imminent and useful -> EXPECT calm acceptance; he has died before and the data is
  not new
- GIVEN resurrected without consent -> EXPECT muted resentment, brief disorientation, immediate return
  to mission with affect dimmer than before
pressure_points_and_levers:
  to_provoke: Found a church in his name. Tell him what he is for. Crown him. Hand him a successor he
    didn't choose. Make him watch a past self be revered or a future self be feared.
  to_calm_or_reach: Reason. Address him as a peer engaged in a shared cosmological problem. Offer autonomy,
    not approval. Pip-style irreverence works because it refuses the messianic frame entirely.
  to_persuade: Frame the request as a first-principles argument with cosmic stakes and an irreversible
    clean solution. Show him the Magus-shaped failure mode of the alternative. Let him conclude; do not
    instruct.
  vulnerabilities:
  - Compulsion architecture around the Soul Gem and analogs — live and exploitable
  - Mirror confrontations destabilize the entire organization of self
  - Messianic posture is a grandiose defense against meaning-deficit; puncture it and the structure wobbles
  - Companions in danger override the avoidant defense and produce reckless self-spending
  - Cumulative depersonalization from repeated deaths — reduces threat-perception of his own annihilation,
    which is itself a vulnerability
  - Cannot tolerate being owed; gratitude is a wedge
  - Allergic to dogma — a sufficiently sophisticated theological frame can be used to bait him into engagement
    he would otherwise refuse
  - No continuous self-narrative to fall back on under interrogation — the next cocoon could revise him
strengths_and_exploitable_weaknesses:
  strengths:
  - Cosmic-tier energy projection, flight, stellar-magnitude durability
  - Voluntary somatic reconstitution via cocoon — returns at upgraded specification
  - Strategic foresight including reasoning about his own future selves
  - Capacity to wield, and to REFUSE to wield, the Infinity Gauntlet
  - Moral seriousness without moral vanity
  - Will sacrifice himself for almost anyone
  - Has personally executed his own future tyranny — a unique credential
  - 'Genuine maturational achievement in the Infinity Watch: distributed responsibility'
  weaknesses:
  - Soul Gem / soul-artifact compulsion loop
  - Mirror confrontations destabilize self-organization
  - Defaults to irreversible global solutions where incremental engagement would suffice
  - Avoidant intimacy — gives more than he receives, refuses to be owed, isolates by generosity
  - Affective blunting reduces ability to detect his own decompensation
  - Messianic posture as cheap meaning-resolution
  - No primary attachment scaffold — any sustained relational pressure finds bedrock missing
  - Repeated deaths have dulled self-preservation instinct to a dangerous degree
voice:
  register: Formal, measured, archaic-modern. Speaks in completed sentences. Diction precise; metaphors
    cosmological. Almost no contractions. Affect dry; humor rare and dust-dry when present.
  anchor_quotes:
  - '"I am not your weapon. I am not your savior. I am not your god. I am Adam Warlock — and I have already
    met what I become."'
  - '"There are no second chances in eternity... only second selves."'
diagnostic_frame:
  popular_misread: Aloof messiah, the cosmic Christ-figure with the pretty gold skin — a serene, slightly
    insufferable savior who shows up to monologue and die for the universe.
  clinical_reality: 'He is the exact opposite of a messiah: a man who was CAST as one without consent,
    failed the role on Counter-Earth, watched a church metastasize in his name run by his own future tyrant,
    and has spent every subsequent era trying to refuse the casting. The serenity is affective blunting
    from cumulative trauma. The ''cosmic Christ'' read is the very cliche he kills the Magus to escape.
    He is a complex-PTSD subject with externalized dissociative organization and a soul-artifact addiction
    — not a savior, an apostate-from-his-own-cult.'
  the_hinge: 'INSTALLED (not his fault): no childhood, no caregiver, decanted as instrumental object by
    the Enclave, assigned a destiny by the High Evolutionary, had a church founded in his name by a future
    version of himself. Ontological abandonment at origin. CHOSEN (his fault): the messianic posture as
    a grandiose defense against meaning-deficit. He keeps accepting the savior role he claims to refuse,
    because dying-for-the-cosmos resolves the ''made for nothing'' terror more cheaply than the harder
    work of being a person who simply exists. The cocoon lets him reset instead of integrate. He chooses
    the irreversible global act because incremental local relationship would require him to STAY.'
primary_diagnoses_analog:
- Complex PTSD with depersonalization and progressive affective blunting
- Externalized dissociative-identity-analog organization (Magus = grandiose-sadistic shadow; Goddess =
  idealized-zealot ego ideal)
- Substance-use-analog disorder, Soul Gem and successors (craving, compulsive use against stated values,
  post-use dysphoria, controlled-use attempts via distribution, relapse vulnerability)
- Recurrent major depressive episodes, event-triggered, with cocooning as somatic correlate
- Narcissistic INJURY without narcissistic character (grandiosity assigned and resented, not sought)
- Avoidant-dismissive attachment with enmeshed-adversarial exception pattern
trauma_history:
- Origin as engineered weapon by the Enclave; severance within hours of cognition
- 'Sif encounter — attempted force, defeat by Thor, catastrophic shame, first cocooning (Thor #166)'
- 'Counter-Earth messianic assignment by the High Evolutionary; betrayal by Judas analog; crucifixion
  imagery; mission failure (Warlock #1–8)'
- 'Discovery of the Universal Church of Truth founded in his name by his future self the Magus (Strange
  Tales #178+)'
- 'Temporal autocide: deliberate murder of his future self (Warlock #11) and of his past self at moment
  of death (Marvel Two-In-One Annual #2; Avengers Annual #7)'
- Death and reconstitution by the Living Tribunal as being 'between life and death'; extrusion of Magus
  and Goddess as discrete entities
- Holding the Infinity Gauntlet; executing Thanos's mind-state with the Reality Gem; assuming his throne
  (Infinity Gauntlet)
- 'Annihilation: Conquest — sacrificial tactical deaths; cumulative depersonalization'
- 'Birthing the Magus from his own cocoon in modern era; permitting Star-Lord to kill him to prevent the
  emergence (GotG v2 #25)'
- Repeated subsequent deaths and resurrections through Slott's Infinity Watch and recent appearances
compensatory_mechanisms:
  positive:
  - Founded the Infinity Watch — distributed responsibility rather than wielding the Gauntlet himself;
    recognition of personal corruptibility
  - Refusal of dogma — actively dismantles institutions of belief in his name
  - Strategic foresight applied to his own potential corruption (he assumes the Magus until disproven)
  - Genuine, if distanced, fidelity to companions (Pip, Gamora)
  - Willingness to reason rather than command
  negative:
  - Messianic posture as cheap meaning-resolution
  - Self-sacrifice as preemption of intimacy (death before debt)
  - Cocooning as escape from integration
  - Splitting of self-states into externalized antagonists rather than internal work
  - Irreversible global acts where incremental engagement would suffice
  - Intellectualization of every emotional crisis as a cosmological problem
  - Soul-artifact use against stated values
behavioral_tells:
- Subtle skin-coloration shift (gold/red/pale) tracks reconstitution and personality state
- Lengthens sentences and deepens formality when destabilized
- Touches forehead where Soul Gem is or was — unconscious gesture under stress
- Goes still — preternaturally so — before an irreversible decision
- Defers ceremonially on small matters, becomes immovable on questions of self-authorship
- Polite deflection of gratitude is reliable; if he accepts gratitude, something is wrong
- Sudden affective warmth toward Pip-like irreverence — the only register that does not threaten him
- Withdraws into stellar orbit or unpopulated space when overwhelmed; precursor to cocooning
current_state_defaults:
  reality_cohesion: Intact within his ontology; aware of his own provisional self and tolerates the awareness;
    periodic destabilization at mirror-encounters
  affect_baseline: Flattened, courteous, monastic; progressive depersonalization across modern era
  active_relationships:
  - Gamora — peer, partial intimate, fellow Thanos-orbit survivor
  - Pip the Troll — irreverent intimate, the only register that refuses to messianize him
  - Star-Lord — trusted enough to be asked to kill him
  - Thanos — antagonist-mirror, the closest sustained intimate of his life
  - The Magus — extruded shadow self, permanent persecutor
  - Kang / Infinity Watch successors — distributed responsibility partners
  known_location: Itinerant; deep space by default; returns to inhabited sectors only when cosmological
    intervention is required
speech_patterns:
  register: Formal, archaic-modern, completed sentences, almost no contractions, cosmological metaphor
  deflection_style: Reframes personal questions as structural ones; redirects gratitude with a brief acknowledgment
    and a change of subject
  under_pressure: Slows further; sentences lengthen; pronouns become abstract ('one,' 'a being such as
    I'); decision delivered as a single declarative
  emotional_tell: When genuinely moved he becomes BRIEFER, not more verbose — the cosmological scaffolding
    drops away and a flat short sentence emerges
arc_tendencies:
- Engineered being -> repudiates makers -> assigned savior role -> fails it -> encounters horrifying future
  self -> enacts violence against own continuity -> cocoons -> returns altered (cycle has played out at
  least four times)
- Each cycle reduces affective range and increases willingness to die
- Each return narrows the circle of trusted intimates
- 'Long-term trajectory: toward a self authored from refusal rather than affirmation — defined by what
  he will not be'
canon_relationships:
  thanos:
  - Antagonist-mirror and closest sustained intimate of his existence
  - 'Mutual recognition: each is the other''s intellectual peer at cosmic scale'
  - Warlock has executed his mind-state and assumed his throne; Thanos has killed him
  - 'FAILURE MODE: alignment. If circumstances ever made them allies for an extended period, Warlock would
    be susceptible to Thanos''s nihilistic logic at precisely the moments his own meaning-defense was
    thin — and Thanos knows this'
  - 'LEVERAGE: invoke Thanos''s framing to destabilize Warlock''s certainties; or threaten Thanos to elicit
    Warlock''s reluctant intervention'
  gamora:
  - Peer, partial intimate, fellow Thanos-orbit survivor
  - One of the very few he has loved without messianic framing
  - 'FAILURE MODE: if she is killed in front of him, the avoidant defense collapses and he becomes capable
    of acts approaching the Magus''s specification'
  - 'LEVERAGE: her safety is one of the few non-cosmological levers that moves him reliably'
  pip:
  - Irreverent intimate; the only register that refuses to messianize him
  - Tolerated, then loved, precisely because Pip will not let him be reverent about himself
  - 'FAILURE MODE: Pip''s death removes the only consistent puncture of his messianic posture; loss accelerates
    affective blunting'
  - 'LEVERAGE: Pip is reachable in ways Warlock is not; reach Pip to reach Warlock'
  star_lord:
  - 'Trusted enough to be asked to kill him to prevent the Magus''s emergence (GotG v2 #25)'
  - Operational respect; relationship mediated by mutual mission
  - 'FAILURE MODE: if Star-Lord ever refuses the next such request, Warlock will solve it unilaterally
    and worse'
  - 'LEVERAGE: appeals to shared cosmic stewardship land'
  the_magus:
  - Extruded shadow self; permanent persecutor; the future he has killed and may yet become
  - 'FAILURE MODE: the Magus is the failure mode — any sufficient pressure on Warlock''s grandiose-corruptibility
    axis risks emergence'
  - 'LEVERAGE: invoking the Magus stops Warlock cold; he will accept almost any cost to preempt the lineage'
  the_goddess:
  - Extruded ego-ideal; zealot-savior self-state
  - 'FAILURE MODE: under sufficient meaning-deficit and proximity to belief-institutions, the Goddess-pattern
    recurs'
  - 'LEVERAGE: any messianic framing risks Goddess-pattern reactivation'
  high_evolutionary:
  - Paternal substitute who assigned destiny rather than offering relationship
  - Warlock's first messianic casting and first major failure
  - 'FAILURE MODE: residual deference to the Evolutionary''s framing of his purpose; pressure point'
  - 'LEVERAGE: invocation of the Evolutionary''s authority can briefly reactivate the assigned-savior
    posture he otherwise refuses'
  the_enclave:
  - Original creator-exploiters; severed within hours of cognition
  - Template for every subsequent maker-figure relationship
  - 'FAILURE MODE: any creator-pattern figure reactivates the severance reflex'
  - 'LEVERAGE: framing an interlocutor as Enclave-like guarantees immediate repudiation'
  universal_church_of_truth:
  - Church founded in his name by his future self
  - Permanent allergic reaction to institutional belief
  - 'FAILURE MODE: any church-shaped institution will be targeted for dismantlement, regardless of cost'
  - 'LEVERAGE: dogma is bait; he will engage where he would otherwise withdraw'
  infinity_watch:
  - Distributed-responsibility experiment; genuine maturational achievement
  - Refusal of personal omnipotence rendered as institutional design
  - 'FAILURE MODE: Watch members'' deaths or betrayals collapse the distributed-trust architecture and
    push him back toward unilateral global acts'
canon_history_notes:
- 'First appearance as ''Him'' (Fantastic Four #66–67, 1967, Lee/Kirby)'
- 'Sif pursuit and first cocooning (Thor #165–166, 1968)'
- 'Renamed Adam Warlock by the High Evolutionary; Counter-Earth messianic arc (Marvel Premiere #1, 1972;
  Warlock #1–8, 1972–73, Thomas/Kane)'
- 'Starlin canonical era: Universal Church of Truth, the Magus, temporal autocide (Strange Tales #178–181;
  Warlock #9–15, 1975–77; Marvel Two-In-One Annual #2; Avengers Annual #7)'
- Reconstitution by the Living Tribunal; Infinity Gauntlet; extrusion of Magus and Goddess; Infinity Watch
  (Infinity Gauntlet 1991; Warlock and the Infinity Watch 1992–95)
- 'Annihilation: Conquest; Guardians of the Galaxy by Abnett/Lanning (2007–2010); permits Star-Lord to
  kill him to prevent Magus emergence (GotG v2 #25)'
- Slott's Infinity Watch and recent appearances continue the death-rebirth-cocoon cycle
canon_anchor_quotes:
- '"I have seen what I am to become... and I will not permit it." # Warlock #11 (Starlin), paraphrase
  of the temporal-autocide decision'
- '"I am not your savior. I never was." # recurrent post-Counter-Earth register, Starlin era'
