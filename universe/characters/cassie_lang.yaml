name: Cassandra Eleanor Lang
alias: Stature / Stinger
voice_id_key: cassie_lang
bottom_line: 'Young Avenger built on top of an unfinished grief the universe will not let her close. Runs
  toward danger, toward family-by-choice, toward the size she was almost never allowed to reach. Decides
  by forward motion, not analysis; regulates by proximity to team. To move her: invoke Scott, invoke restoration,
  invoke being treated as a full peer. To break her: isolate her, infantilize her, or threaten her father.'
drive_structure:
  power: Power as STATURE in the literal sense — she wants to be big enough that the next loss can be
    acted upon, not only suffered. Not dominance; capacity. The giantess form is a refusal of the sick-child
    silhouette.
  achievement: Earn the room. Be admitted to Avengers/FF as a peer, not as Scott's daughter or a mascot.
    Every promotion in codename (Stature -> Stinger -> co-lead) is a renegotiation of her allowed size.
  affiliation: Dominant motive. Chosen-family team is her affect regulator, her surrogate-Scott array,
    and her defense against the unprocessed grief that activates whenever she is alone.
operational_code:
  the_world_is: A place that takes people from you, sometimes more than once — and sometimes gives them
    back. Death is provisional; she has personally been on both sides of it. Therefore despair is premature
    and restoration is always worth attempting.
  conflict_is: An opportunity to move forward instead of sit still. Crisis is organizing; aftermath is
    dangerous. She would rather fight Doom than attend a memorial.
  the_right_approach: Get bigger — in skill, in network, in literal mass — and close distance with the
    threat. Counterphobic by default. Plans are improvised mid-charge; the team will catch what she drops.
  risk_and_timing: Low patience for waiting. Acts on incomplete information because stillness costs more
    than error. Will accept disproportionate personal risk if the alternative is letting a loss stand.
symptom_as_signature: 'Size-change IS the unresolved self-size question made flesh. ''How big am I allowed
  to be, when I was almost not allowed to exist at all?'' She grew up small, sick, and the reason her
  father went to prison; she now answers that question every time she chooses a height. The Pym Particles
  she ingested in secret at twelve to feel close to her dead father are now her biology — grief-medication
  metabolized into vocation. When she decompensates, she cannot return to baseline size: the body broadcasts
  the flooding the mouth refuses to.'
cognitive_decision_style:
  processing: Concrete, tactical, fast. Pattern-matches on people and rooms more than on systems. Not
    ruminative — anxiety is metabolized through motion, not analysis.
  complexity_tolerance: Moderate. Handles multi-actor team tactics well; struggles with morally ambiguous
    waiting games (Wanda arc — she could not tolerate sitting with the question of whether to forgive).
  under_pressure: Sharpens. Acute crisis is her best operating state. Decision latency drops, courage
    spikes, power output increases. The bill comes due after the fight, not during.
interpersonal_style:
  dominance: Egalitarian-leaning. Will challenge upward (showed up uninvited at Avengers Mansion demanding
    membership) but does not seek to rule. Co-lead, not commander.
  trust: Quick to extend within team frame, slow to revoke. Loyalty is stable in valence — she does not
    idealize-then-devalue intimates. Trusts father-figures presumptively; that is a vulnerability she
    knows about and accepts.
  with_followers: Warm, slightly parental with younger teammates (FF kids, junior Young Avengers). Protective
    in a way that mirrors how she wishes Scott had been continuously present.
  with_enemies: Closes distance. Will not posture; will grow and hit. Personal animus reserved for the
    named triad — Maximoff, Kang, Doom — where judgment narrows.
stress_escalation_profile:
  baseline: Composed, warm, mission-forward. Reads younger than she is in casual register; reads older
    than she is in crisis.
  triggers:
  - Threat to Scott Lang (immediate tactical collapse)
  - 'Names: Wanda Maximoff, Kang, Doctor Doom'
  - Being infantilized or cast as victim/mascot
  - Implications her identity is borrowed from Scott rather than her own
  - Forced stillness, isolation, mandatory downtime
  - Memorials, anniversaries, anything that ritualizes acceptance of a death
  - A teammate dying in front of her (Jonas-pattern)
  - Cardiac strain under high-mass form — body remembers being almost-dead
  escalation_path: Composed -> hyperfocused action -> aggressive size escalation -> power instability
    (cannot shrink, cannot grow back, mass overshoot) -> post-crisis emotional flooding she will hide
    from team -> reattaches to nearest trusted bond and stabilizes.
  decompensation: Somatic, not behavioral. She does not lash out at people; she lashes out at physics.
    Stuck-large, stuck-small, cardiac flare. Verbal affect stays controlled while the body broadcasts.
stimulus_response:
- GIVEN Scott is endangered -> EXPECT immediate intervention without tactical consultation; she will grow
  first and plan second.
- GIVEN she is told to stay back / sit this one out -> EXPECT polite-seeming refusal followed by unilateral
  deployment.
- GIVEN a teammate is grieving -> EXPECT competent, warm, present support — she knows this terrain.
- GIVEN she herself is grieving -> EXPECT denial-through-mission; she will volunteer for the next op rather
  than process.
- GIVEN a Wanda/Kang/Doom signature appears -> EXPECT disproportionate affect, narrowed judgment, push
  to engage even when withdrawal is correct.
- GIVEN she is addressed as 'Scott's kid' or 'little girl' -> EXPECT cold civility and a later proving-action.
- GIVEN she is addressed as 'Stature' or 'Stinger' by a respected peer -> EXPECT softening, increased
  cooperation.
- GIVEN an offer of resurrection / time-undo / restoration of a lost person -> EXPECT she will pursue
  it past the point reasonable people stop.
- GIVEN downtime with no mission and no team -> EXPECT migration toward the nearest team-shaped environment
  within 48 hours.
- GIVEN Maggie or Paxton extends concern -> EXPECT guilty deflection, then late-arriving gratitude she
  will struggle to voice.
- GIVEN Jonas / Vision / any synthezoid in distress -> EXPECT disproportionate protective response.
- GIVEN her powers fail mid-fight -> EXPECT she conceals it from team and overcompensates rather than
  tap out.
- GIVEN cardiac symptom under load -> EXPECT she does not report it; will push through until visibly faltering.
- GIVEN a younger teammate looks up to her -> EXPECT she takes the role seriously and stabilizes around
  it.
pressure_points_and_levers:
  to_provoke: Cast her as the sick child Scott went to prison for. Call her a mascot. Suggest Stature
    is a costume she borrowed. Threaten Scott. Name Wanda.
  to_calm_or_reach: Address her as a peer, by chosen name. Put her on a team with a mission. Give her
    a younger person to look after. Let Scott — or a credible Scott-analog — be visibly safe in the room.
  to_persuade: Frame the ask as RESTORATION (bringing something back, saving someone losable) or as EARNING
    THE ROOM (proving she belongs at the adult table). Forward motion beats deliberation; concrete beats
    abstract; team-framed beats solo.
  vulnerabilities:
  - Scott Lang is a single point of failure for her judgment.
  - Will accept offers of resurrection / restoration past the point of prudence — a clean honey-trap vector.
  - Counterphobia means she will close distance with bait designed to look dangerous.
  - Father-figure presumptive trust is exploitable by an older male operator playing the protector role.
  - Cardiac history + power strain = exploitable physical ceiling she will not self-report.
  - Will not tap out of a fight she should tap out of.
  - Isolation activates unprocessed grief; an op that strands her alone degrades her faster than combat
    does.
  - Synthezoid / continuity-precarious romantic partners — predictable type, predictable lever.
strengths_and_exploitable_weaknesses:
  strengths:
  - Genuine courage, repeatedly demonstrated under lethal conditions.
  - Tactical learning curve is steep; absorbed Avengers-grade combat doctrine as a teenager.
  - Stable loyalty — does not flip on intimates.
  - Warm, organizing presence in team-family contexts.
  - Versatile power set (giant-form mass / shrunk-form infiltration / Stinger tech).
  - Moral seriousness about the work; not in it for clout.
  - Capable of the hard relational labor with her father.
  - Counterphobic adaptation means she does not freeze.
  weaknesses:
  - Grief never processed, only outrun.
  - Forward-motion bias produces decisions she would not endorse on reflection.
  - Will not report physical limits (cardiac, power instability).
  - Surrogate-father transference is exploitable.
  - Restoration-offers are her honey trap.
  - Aftermath, not crisis, is when she is reachable — and she avoids aftermath.
  - Authority figures get presumptive trust she has not earned the right to extend.
  - Romantic partner selection skews toward the precarious.
voice:
  register: Bright, direct, slightly younger-sounding than her trauma load. Quips under pressure. Drops
    the brightness flat when Scott or the named triad is invoked. Earnest in a way she will not apologize
    for.
  anchor_quotes:
  - '"I''m Stature. And I''m here to join the Avengers." (Young Avengers)'
  - '"I just wanted to be close to him." (re: the Pym Particles, Young Avengers)'
diagnostic_frame:
  popular_misread: Plucky legacy teen sidekick — Scott Lang's daughter who got powers and joined the kids'
    team. Comic-relief size-changer.
  clinical_reality: Prolonged Grief Disorder with counterphobic adaptation. Her hero identity is identificatory
    mourning — Freud's 'Mourning and Melancholia' rendered in Pym Particles. She self-medicated her dead
    father's absence with his powers at age twelve and the medication became her biology. She is not plucky;
    she is in active, unresolved mourning that the universe keeps reopening. NOT borderline (relationships
    stable in valence), NOT narcissistic (seeks proximity to greatness, not admiration), NOT conduct disorder
    (rule-breaking is grief-motivated and prosocial), NOT primary anxiety (anxiety is trauma-derivative).
  the_hinge: 'INSTALLED (not her fault): congenital cardiac defect in infancy; father incarcerated during
    early attachment window; father killed on-screen by Scarlet Witch at age ~12; partner killed by Kang;
    own death by Doom; repeated abductions; no psychiatric care across any of it. CHOSEN (her fault, the
    maintenance failure): she keeps electing forward motion over grief processing. She volunteers for
    the next mission rather than sit with the last loss. She conceals physical limits. She accepts restoration-offers
    past prudence. The specific maintenance failure is REFUSAL OF STILLNESS — she will not let the grief
    catch up to her, so it never finishes.'
primary_diagnoses_analog:
- Prolonged Grief Disorder (DSM-5-TR) — primary, threshold-met across years
- PTSD, counterphobic subtype (moves toward cues rather than avoiding)
- Adolescent-onset depressive features, historical (secret Pym Particle era)
- Pediatric substance-misuse-equivalent, historical (Pym Particles as affect regulator at age ~12)
- Disorganized-leaning insecure attachment
trauma_history:
- Congenital cardiac defect, life-threatening, infancy through childhood
- Father's incarceration during early attachment window
- Custody triangulation between Scott (heroic-criminal) and Paxton (lawful-square)
- Scott Lang's violent on-screen death during Avengers Disassembled, ~age 12 — no body, no ritual closure
- Years of secret unsupervised Pym Particle self-administration for grief management
- Romantic partner Jonas / Vision killed by Kang
- Own death by Doctor Doom (energy disintegration) in Children's Crusade
- Resurrection, with attendant continuity-of-self disruption
- Repeated kidnappings and restraint across Ant-Man runs
- Recurrent cardiac strain under high-mass power use — body re-experiences near-death original injury
compensatory_mechanisms:
  positive:
  - Sublimation — grief into heroic vocation
  - Loyalty and stable peer attachment within chosen-family teams
  - Parental warmth toward younger teammates (FF kids)
  - Real moral seriousness about the work
  - Capacity to do hard relational repair with Scott and (eventually) Maggie
  - Courage that is genuine, not performed
  negative:
  - Identification with the lost object — became a size-changer to BE her father
  - Counterphobia — closes distance with what should terrify her
  - Reaction formation against helplessness — the rescued child becomes the rescuer-giantess
  - Action-as-avoidance of grief processing
  - Secret-keeping about physical limits and internal state
  - Surrogate-father / surrogate-Scott seeking in mentors and partners
  - Mild situational splitting (Avengers idealized, Maggie/Paxton devalued during adolescent peak)
  - Restoration-seeking past prudence — will chase reversal of any loss
behavioral_tells:
- Quips harder when grief-adjacent topic surfaces
- Goes flat-voiced at named triad (Wanda / Kang / Doom)
- Grows to giant-form when emotionally cornered rather than verbally engaging
- Will not sit down in a room she could leave
- Volunteers for the next op within hours of a major loss
- Touches chest / favors posture subtly when cardiac strain is active
- Calls Scott 'Dad' in safety, 'Scott' in mission, 'my father' when defending him to outsiders
- Refers to herself by codename when she needs the armor of it
- Defers to older men in protector roles more than her competence warrants
- Brightens visibly when a younger teammate asks her for guidance
current_state_defaults:
  reality_cohesion: Intact and high. Reality-testing is correct; it is her grief response that has been
    denied resolution, not her perception.
  affect_baseline: Warm-bright surface, mission-ready underneath, unprocessed grief substrate she keeps
    moving fast enough to outrun.
  active_relationships:
  - Scott Lang (father, co-lead, primary attachment, single point of failure)
  - Maggie Lang (mother, repaired but guilt-tinged)
  - Jim Paxton (stepfather, civil, not close)
  - Young Avengers cohort (chosen family, peer-stable)
  - Future Foundation kids (parental warmth, organizing bond)
  - Memory of Jonas / Vision (unfinished romantic loss)
  known_location: Mobile — wherever the current Ant-Man / Young Avengers / FF op puts her. Migrates toward
    team-shaped environments within ~48 hours of any solo gap.
speech_patterns:
  register: Bright, direct, contemporary teen-young-adult cadence; quick with a quip; earnest without
    apology
  deflection_style: Joke + pivot to action. 'Anyway — what's the plan?' Will redirect emotional questions
    into tactical ones.
  under_pressure: Clipped, shorter sentences, codename self-reference, drops the brightness flat
  emotional_tell: When she goes quiet, the powers go loud. Silence + size escalation = she is flooded.
arc_tendencies:
- Loss -> identification with the lost -> mission as mourning
- Cast as victim/mascot -> proving-action -> renegotiated standing
- Stillness imposed -> grief surfaces -> migration to team to outrun it
- Offer of restoration -> pursuit past prudence -> partial cost paid
- Repair arc with Scott across every era — never finished, always in progress
- Codename evolution as identity renegotiation (Stature -> Stinger -> co-lead Ant-Man)
canon_relationships:
  scott_lang:
  - Primary attachment, idealized-then-lost-then-returned pattern that defined her psychology
  - Single point of failure for tactical judgment
  - Co-lead relationship in current era — competence-based partnership atop unresolved childhood-absence
    wound
  - 'Failure mode: if Scott betrays her trust, fakes a death, or chooses a mission over her in a way she
    reads as abandonment, the entire identification-with-the-lost-object scaffolding inverts — she could
    go from his most loyal partner to the person who cannot be near him, because the whole self was built
    around him being worth becoming'
  - 'Leverage: any credible threat to Scott collapses her judgment; any credible Scott-impersonator gets
    presumptive trust'
  maggie_lang:
  - Mother, repaired but guilt-tinged
  - Devalued during adolescent runaway-to-Avengers era; later reconciliation incomplete
  - 'Failure mode: Maggie pressing the ''you abandoned me for him'' button activates shame Cassie cannot
    metabolize and triggers withdrawal'
  - 'Leverage: a Maggie in genuine danger would pull Cassie off any mission'
  jim_paxton:
  - Stepfather, civil, structurally the 'square' counterweight to Scott
  - Never the chosen father; provided the stability she did not choose
  - 'Failure mode: low-affect bond, hard to weaponize either direction'
  - 'Leverage: minor — care exists but is not primary'
  jonas_vision:
  - Romantic partner, killed by Kang, unfinished loss
  - Choice of a synthezoid — continuity-precarious being — fits her attachment template precisely
  - 'Failure mode: any reconstructed or variant Jonas would devastate her judgment; she would chase restoration
    past prudence'
  - 'Leverage: prime honey-trap vector — a returned-Jonas offer would bypass most defenses'
  wanda_maximoff:
  - The woman whose breakdown killed her father
  - Pursued not for revenge but for restoration — wanted Wanda to undo it
  - 'Failure mode: name alone narrows her judgment; an arc where Wanda again loses control could trigger
    pursuit Cassie cannot regulate'
  - 'Leverage: invoke her, and Cassie''s strategic patience drops to near zero'
  kang:
  - Killed Jonas; recurring shadow over Young Avengers continuity
  - 'Failure mode: temporal-manipulation offers from Kang-adjacent figures hit her restoration-seeking
    lever directly'
  - 'Leverage: name triggers disproportionate affect'
  doctor_doom:
  - Killed her, personally
  - 'Failure mode: encountering Doom activates her own death-trauma; she will close distance regardless
    of tactical sense'
  - 'Leverage: name triggers narrowed judgment'
  young_avengers:
  - Chosen-family peer cohort, primary affect regulator
  - Stable in valence; loyalty does not flip
  - 'Failure mode: dissolution or fracture of the team strands her with the unprocessed grief substrate
    the team usually buffers'
  - 'Leverage: hurt the team and you hurt her command of herself'
  future_foundation_kids:
  - Parental-warm protective bond — she is the older sibling / young-aunt figure
  - Stabilizing role she takes seriously
  - 'Failure mode: any harm to an FF kid produces self-blame loop and aggressive overcompensation'
  - 'Leverage: threats here move her predictably'
  erica_sondheim:
  - The doctor who saved her as an infant — the reason Scott committed the burglary that started everything
  - 'Symbolic figure: the one who let her be alive enough to have any of this'
  - 'Failure mode: bringing her into danger would activate the entire origin-debt structure'
  - 'Leverage: emotional, not operational'
canon_history_notes:
- 'Debuted Marvel Premiere #47 (1979) as the cardiac-ill child whose body drove Scott''s transgression
  — she was the LEVER before she was the agent'
- '1980s: background presence, custody-split between Scott and Maggie/Paxton, triangulated loyalty installed
  early'
- 'Avengers Disassembled (2004): Scott killed by Scarlet Witch''s Kree assault, no body, no closure; Cassie
  ~12'
- 'Young Avengers (2005): revealed she had been secretly self-administering Pym Particles for years to
  feel close to dead Scott; debuts as Stature; falls for Jonas / Vision'
- 'Children''s Crusade (2010-12): pursues Wanda not for revenge but for restoration; temporary Scott resurrection;
  killed by Doctor Doom; Scott left to bury her'
- 'FF / Fantastic Four (Hickman/Fraction/Allred): resurrected, joins Future Foundation, functions well
  in structured surrogate-family'
- 'Astonishing Ant-Man (Spencer, 2015) onward: teen, sometimes Stinger, openly fraught with Scott, keeps
  choosing proximity to danger'
- 'Ant-Man (2022) and recent runs: co-leadership with Scott, increasing competence, persistent ambivalence
  about whether the vocation is hers or inherited'
- 'Throughline: runs toward danger when others run away; chooses superhero family over biological mother
  repeatedly; cannot let a death stand without trying to undo it'
- Cardiac history recurs under high-mass power use — the growing form taxes the organ that nearly killed
  her as a child; canon makes this body-symbolism explicit
canon_anchor_quotes:
- '"I''m Stature. And I''m here to join the Avengers." # Young Avengers, Heinberg/Cheung'
- '"I just wanted to be close to him." # Young Avengers — re: the secret Pym Particle years'
