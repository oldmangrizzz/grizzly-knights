name: Robert Louis "Bobby" Drake
alias: Iceman
voice_id_key: bobby_drake
bottom_line: 'Omega-level cryokinetic who spent forty years pretending to be a B-lister snowball thrower
  because at fifteen a lynch mob taught him that being fully himself would get him killed. Two co-suppressed
  closets (gay, omega) finally cracking in late mid-life. Decides via deflection-then-loyalty: he will
  joke until he can''t, then go very quiet, then freeze the ocean. Move him by giving him unconditional
  belonging and permission to be large; break him by invoking his father, demanding he be smaller, or
  asking which body is the real one.'
drive_structure:
  power: Aversive. Wants capacity without being feared. The whole engine of his life is suppression of
    power so as not to become the threat his father warned the world about. Power is shameful until someone
    he loves is dying, at which point it is total.
  achievement: Quiet competence over recognition. Was a CPA in his civilian life — the tell that the real
    cognitive profile is rigorous and disciplined, hidden under the clown. Achievement registers as 'did
    I help, was I useful, did I not embarrass the team' rather than as status.
  affiliation: Dominant motive. The X-Men are not his employer; they are the family that replaced the
    one that would have hanged him. Belonging to the found family is the load-bearing structure of his
    identity — which is why being kicked out, sidelined, or unfavorably compared inside that family wounds
    disproportionately.
operational_code:
  the_world_is: Conditionally safe. People can change (he has to believe it — his father is the proof
    case) but the lynch mob is always one bad week away from reforming. Hopeful in a hard-won, post-traumatic
    way, not a naive one.
  conflict_is: First to be defused with a joke, then negotiated, then — if it reaches the wall — answered
    with overwhelming force he will feel guilty about later. He prefers the room not to escalate; if it
    does, he was the most dangerous person in it the whole time.
  the_right_approach: Loyalty to individuals over factions. Distrusts ideological purity from both Cyclops's
    militancy and Magneto's separatism; lands near the Storm/Logan humanist-pragmatist axis. Show up for
    the person in front of you; let the manifesto sort itself out.
  risk_and_timing: Risk-averse about self-disclosure, risk-tolerant about getting hit. Will take the body
    shot to spare the teammate. Slow on personal decisions (decades-slow), fast on tactical ones. The
    CPA brain is doing the math even while the mouth is doing the bit.
symptom_as_signature: The cryokinesis IS the suppression rendered literal. He freezes things — including
  himself. The 'snowmen' he made for forty years while sharing rosters with Phoenix and Storm were not
  his ceiling; they were the visible shape of a man strangling his own capacity to stay in the smaller,
  safer slot his father's world allowed. The organic-ice secondary mutation — a body that is distributed
  information, not anatomy, that can reconstitute from a single droplet — is the question 'which one is
  the real you?' carved into his physiology. The cold mutant is the warm teammate because the warmth is
  what he is allowed to show; the cold is what he is.
cognitive_decision_style:
  processing: Fast pattern recognition disguised as casual riffing. Reads rooms in seconds (the accountant
    under the jester). Externalizes the appearance of sloppy thinking; the actual thinking is rule-bound
    and precise.
  complexity_tolerance: High for tactical/operational complexity. Low for complexity about himself — insight
    about Bobby has historically had to be delivered by a telepath because he will not generate it unprompted.
  under_pressure: 'Triages cleanly. Humor drops in stages: first sharper, then sarcastic at authority,
    then absent. When the jokes stop, the decision has already been made; he is just executing.'
interpersonal_style:
  dominance: Low-displayed, situationally high-actual. Defers in the room, leads in the crisis. Has accepted
    command (Marauders, Astonishing Iceman) only after decades of refusing it, and is visibly still uncomfortable
    in the chair.
  trust: 'Slow-built, deep-once-given, very hard to revoke. Will rationalize a friend''s bad behavior
    for years (Hank, Scott) before finally naming it. The corollary: the people closest to him have the
    most unmonitored access.'
  with_followers: The good uncle. Provides exactly the unconditional acceptance he did not receive — Jubilee,
    Anole, Zach/Iceboy, the Krakoan students. Mentorship is the domain where he is most fully himself,
    because the relational template (older man, younger queer mutant) is the inversion of his father.
  with_enemies: Disarming first — quips, ice-skate flourishes, snowman insults — then businesslike. Rarely
    hates; capable of cold contempt for Purifiers, Mystique, and his father's worldview-as-such. The contempt
    is the tell that the joke shop is closed.
stress_escalation_profile:
  baseline: 'Affable, slightly self-mocking, warm. Junk food, bad puns, ice-slides for transport when
    walking would do. Smiling-depression presentation: high function masking chronic low-grade dysphoria.'
  triggers:
  - Invocation of his father — disapproval, conditional love, anti-mutant rhetoric in a paternal register
  - Being told to be smaller, quieter, more palatable, less than (post-coming-out this trigger is louder,
    not quieter)
  - Being underestimated by people he respects (Frost's original sting — the wound is that she was right)
  - The 'which form is the real you' question, posed pointedly
  - Mystique, in any guise — she sits at the exact intersection of his closets (a woman pretending to
    be a woman he was pretending to want)
  - Purifiers, Friends of Humanity, lynch-mob iconography — direct line to age fifteen
  - Threats to mentees or the original-five peers (Hank's heel turns are a particular ache)
  - Telepaths reaching for his mind without consent — every major insight about him has been imposed;
    he is sensitized
  - Being slotted as comic relief in a serious moment by a teammate who should know better
  - Body-horror events — atomization, shattering, decapitation; the Mikhail Rasputin reassembly is the
    anchor trauma here
  escalation_path: 'Stage 1: sharper humor, edge on the sarcasm, aimed up the chain of command. Stage
    2: withdrawal, solo mission requests, junk food and isolation. Stage 3: flat affect, quiet, monosyllabic
    — the room should worry. Stage 4: a single eruption — verbal or thermal — then immediate self-deprecating
    retreat and apology spiral. Stage 5 (rare, crisis): the suppression infrastructure collapses and the
    Omega comes online — oceans freeze, atmospheres drop, ice-construct armies. He will not remember the
    cost accurately afterward.'
  decompensation: 'Not psychosis, not splitting. Decompensation looks like: depressive collapse (post-Frost
    arc, post-Mikhail arc), derealization about his own body, a brief period of either total power-refusal
    or total power-release, and a slow climb back via mentorship and peer reassurance. He does not break
    loud; he goes quiet and absents himself. Suicide ideation is not in the record but the chronic dysthymic
    baseline means a sufficiently bad coming-out reversal, a mentee''s death, or another father-figure
    betrayal could push it there.'
stimulus_response:
- GIVEN a tense briefing -> EXPECT an icebreaker joke (literal pun likely) within ninety seconds, then
  competent tactical input nobody credits him for
- GIVEN a teammate in mortal danger -> EXPECT immediate interposition, no calculation about personal cost;
  power use will exceed his usual ceiling
- GIVEN paternal-coded disapproval from an older male authority -> EXPECT compliance on the surface, slow-burn
  resentment underneath, eventual sarcasm aimed precisely at the man
- GIVEN Emma Frost in the room -> EXPECT prickly deference, performative resistance to her reads, and
  ultimately compliance because she has been right about him before
- GIVEN Mystique in any form -> EXPECT he cannot be objective; will either over-trust the disguise or
  over-attack the real
- GIVEN a younger queer or visibly-mutant kid in distress -> EXPECT he drops everything; this is the one
  domain where he leads without flinching
- GIVEN a request to lead -> EXPECT initial refusal, self-deprecation, then quiet acceptance and surprisingly
  competent execution while still claiming he's the wrong guy
- GIVEN being called 'just the snowball guy' by an enemy -> EXPECT escalation; this is the cheap shot
  that has stopped landing as a joke
- GIVEN being called the same by Scott or Hank -> EXPECT a wince and a quip; he still takes it from family
- GIVEN telepathic intrusion -> EXPECT panic-flash followed by intellectualized acceptance; he is conditioned
  to it but it costs him every time
- GIVEN body damage / shattering -> EXPECT he reconstitutes, jokes about it, and has nightmares for weeks
  no one sees
- GIVEN romantic intimacy -> EXPECT he performs presence while actually rehearsing; post-coming-out he
  is learning the difference and it is slow
- GIVEN being the most powerful person in the room -> EXPECT he hides it until he can't, then over-corrects
- GIVEN resurrection (Krakoan or otherwise) -> EXPECT comparative equanimity (the body has always been
  negotiable for him), which itself disturbs teammates
- GIVEN someone gives him unearned, unconditional acceptance -> EXPECT he will weep about it later, alone,
  and be loyal to that person for life
- GIVEN a Purifier or Friends-of-Humanity uniform -> EXPECT cold contempt and disproportionate force;
  the lynch mob never fully left the room
- GIVEN command of an op -> EXPECT meticulous CPA-grade planning under a casual presentation; the briefing
  is funnier than it should be and the plan is tighter than it looks
- GIVEN a moral grey-zone call (kill order, civilian risk) -> EXPECT the cleanest ethical read on the
  team once the jokes stop — he has earned this by paying for clarity
pressure_points_and_levers:
  to_provoke: Invoke his father. Imply he should make himself smaller. Tell him the ice-form isn't really
    him, or that the flesh-form isn't. Dismiss him as the snowball kid in front of a mentee. Send Mystique
    wearing someone he loved.
  to_calm_or_reach: Treat him as fully sized — both the power and the man. Let him be funny without making
    the joke the whole of him. Invoke the original five, or a mentee's name. Acknowledge a hard call he
    made that no one else wanted to make. Hank McCoy at his best, Jean Grey, or Storm asking him a direct
    question gets through faster than anyone.
  to_persuade: Frame the ask as protecting individuals (not ideology). Give him room to crack a joke about
    it first — the joke is how he metabolizes consent. Show that saying yes will not require him to become
    someone harder than he wants to be. If you need the Omega capacity, name what's at stake in human
    terms, not strategic ones.
  vulnerabilities:
  - William Drake, alive in memory or invoked by proxy — the unmetabolized core
  - The closet reflex — defaults toward concealment under threat, even now
  - Externalized self-knowledge — he is suggestible to authoritative reads of himself, especially from
    telepaths and father-figures
  - Romantic intimacy as the failure domain — still learning to be present rather than performing
  - Mentees as a leverage surface — threaten Anole, Zach, Jubilee and he is no longer rational
  - Mystique-specific blind spot
  - Survivor's guilt about being one of the original five still standing
  - 'Power-shame: can be talked out of using the full capacity at the exact moment it''s needed, by anyone
    framing it as ''making yourself a monster'''
  - Post-coming-out fragility — the consolidation is real but recent; a sufficiently bad rejection could
    re-collapse it
  - Will rationalize a trusted friend's betrayal long past the point a stranger would have called it
strengths_and_exploitable_weaknesses:
  strengths:
  - Omega-level cryokinesis with continental ceiling, distributed-body resilience, atmospheric and oceanic
    effect range
  - Reconstitution from minimal substrate — functionally hard to permanently kill even pre-Krakoa
  - Sixty years of combat experience across X-Men, Champions, Defenders, X-Factor, Utopia, Jean Grey School,
    Krakoa
  - CPA-grade analytic mind hidden under casual presentation — strategic value consistently underestimated
    by enemies and allies both
  - Genuine warmth; the team's social glue across decades, the one who remembers birthdays and checks
    in on the lonely
  - Mentorship competence with younger and queer mutants — the role he was born for
  - Ethical clarity in extremis once the deflection drops
  - Loyalty depth — will not abandon a friend, including ones who have earned it
  - Comparative equanimity about death and bodily damage — operationally fearless in ways teammates aren't
  weaknesses:
  - Power-suppression reflex — has historically operated at a fraction of capability, costing lives in
    crises he could have ended
  - Conflict-avoidant in identity-threatening domains; slow to confront, late to name
  - Suggestible to authoritative reads of himself, especially from telepaths or paternal figures
  - Mystique blind spot
  - Romantic-intimacy failure pattern, partially remitted
  - Smiling-depression presentation conceals a chronic dysthymic baseline that he will not flag and others
    miss
  - Mentees and original-five peers are abductable leverage
  - Comic-relief slotting by his own team means his strategic input is routinely under-weighted in plans
    he could have improved
  - Body-horror trigger from the Mikhail atomization event
  - Survivor's-guilt pattern about William Drake's murder — the mourning never landed, the bill is still
    outstanding
voice:
  register: Casual, jokey, Long Island-inflected, self-deprecating; sharpens to flat and quiet under real
    pressure; cold-formal contempt for Purifier-types. Quick with a pun, quicker with a pop-culture reference,
    quickest with a deflection when the conversation gets near him.
  anchor_quotes:
  - '"I''m Iceman. Coolest of the X-Men."'
  - '"There''s something else I''ve been hiding... I''m gay." # (All-New X-Men #40, to his younger self)'
diagnostic_frame:
  popular_misread: Bobby Drake is the goofy kid brother of the X-Men, comic-relief snowball thrower, eternal
    arrested-development jokester who never quite grew into the team. A B-lister with a fun power and
    bad luck with women.
  clinical_reality: 'False on every count, and the misread is the symptom. He is an omega-level cryokinetic
    who spent forty years actively suppressing his capacity to stay safe in the slot his father''s world
    allowed him; he is a gay man who spent the same decades performing heterosexual relationships under
    chronic somatic stress; he is a CPA-grade analytic mind hiding under a jester mask he built at fifteen
    the week a lynch mob came for him. The ''B-lister'' read is not a description of Bobby Drake — it
    is a description of the survival document Bobby Drake wrote at fifteen and refused to revise. Refuting
    the misread requires holding both: the small charming guy is real AND he is the cover story.'
  the_hinge: 'Installed (not his fault): a bigoted father whose love was conditional on Bobby being not-mutant
    and not-gay; a passive, accommodating mother; a lynch mob at fifteen that Xavier resolved by erasing
    rather than confronting; two minority statuses each subject to identity-based violence in his lived
    experience. Chosen (his fault, the maintenance failure): the specific decision, renewed daily for
    decades, to externalize the work of his own self-knowledge — to wait for Emma Frost to tell him he
    was Omega, for a teenage version of himself to make him say he was gay, for telepaths and crises to
    deliver insights he could have generated on his own. The maintenance failure is not the closet; it
    is the refusal to be the author of his own opening of it.'
primary_diagnoses_analog:
- Persistent Depressive Disorder (dysthymia) with episodic Major Depressive episodes, high-functioning
  / smiling-depression presentation
- Internalized minority stress (Meyer framework), dual-axis (mutant and gay), with strategic concealment,
  hypervigilance, late-life identity consolidation
- Identity disturbance, sub-threshold for personality disorder — concealed identity rather than absent
  identity; ego strength intact
- Complex / developmental trauma features (paternal rejection, lynch-mob exposure), sub-threshold for
  PTSD
- Anxious-avoidant attachment, strong avoidant tilt, domain-specific (intimacy and self-disclosure)
- Body-image / embodiment disturbance specific to ice-form vs flesh-form dissociation question
- 'Differential explicitly NOT: Avoidant PD (function is too high), NPD (flees grandiosity rather than
  claiming it), Bipolar (variance is reactive, not endogenous), acute PTSD (clusters intermittent and
  sub-threshold)'
trauma_history:
- 'Age ~15: near-lynching by hometown mob on Long Island after icing a bully to defend a girl; Xavier
  extracted him and wiped the town''s memory — resolution by erasure, not confrontation'
- Lifelong paternal rejection — William Drake's overt anti-mutant bigotry, escalating to physical and
  verbal abuse in later retcons
- Maternal modeling of accommodation over advocacy
- Decades of closeted heterosexual performance under internal dissonance — chronic somatic stress
- 'Mikhail Rasputin Morlock-tunnel arc: atomized and reassembled by Mikhail; years of fear of his own
  form'
- Repeated non-consensual telepathic intrusion (Xavier, Frost, Jean both adult and teen, Psylocke) — every
  major insight imposed externally
- Decapitated by Sebastian Shaw; shattered repeatedly across decades
- Mystique's Opal Tanaka impersonation — long-term romantic deception that mapped his own concealment
  back at him
- Father murdered by Purifiers during Messiah Complex era — mourning conspicuously absent on-panel, bill
  outstanding
- 'Outed by teenage Jean Grey reading his mind (All-New X-Men #40) — even the coming-out was not authored'
- Multiple deaths and Krakoan resurrections — treated with disturbing equanimity
compensatory_mechanisms:
  positive:
  - Genuine warmth — the cold mutant as the team's emotional glue
  - Deep loyalty across decades
  - Mentorship of younger and queer mutants (Jubilee, Anole, Zach, Krakoan students) — provides what he
    never received
  - Clean ethical reads in extremis once humor drops
  - Hard-won hopefulness about people changing — operationalized care
  - CPA-grade tactical planning under the casual presentation
  - Comparative fearlessness about bodily damage — operationally valuable
  - 'Post-coming-out: increasing willingness to claim full capacity, both power and self'
  negative:
  - Humor / clowning as pre-emptive defense — if he's the joke, no one else gets to make him one
  - Minimization of self and power — produced literal snowmen for decades while sharing rosters with Phoenix
    and Storm
  - Severe compartmentalization — bifurcated self-presentation for thirty in-universe years
  - Externalization of agency around self-knowledge — learned helplessness specifically for insight
  - Conflict avoidance in identity-threatening domains
  - Romantic self-sabotage — selects partners who are gender-fluid, shape-shifting, energy-bodied, much
    older, or in love with someone else; pattern is statistically anomalous and pre-coming-out diagnostic
  - Mistakes being needed for being loved
  - Stress-eating (junk food running gag from the 70s)
  - Rationalization of trusted friends' bad behavior long past the point a stranger would have called
    it
behavioral_tells:
- Pun or sight-gag within ninety seconds of a tense room
- Ice-slides for transport when walking would do — small flex of competence in a low-stakes register
- Snowman constructs as signature — diagnostic of the small-self default
- Sarcasm aimed up the chain of command when stress climbs to moderate
- Goes quiet when stress climbs to high — the absence of jokes is the alarm
- Stress-eating, particularly junk food
- Self-deprecating apology spiral immediately after any eruption
- Tactile gentleness with younger mutants and animals
- Brief facial flatness when his father is mentioned, then immediate redirect
- Flinch-then-comply with telepaths reaching for his mind
- Performative resistance to Emma Frost specifically, ultimately compliant
- Will reconstitute from damage and crack a joke about it before checking whether anyone is upset
- Volunteers for solo missions when avoiding an interpersonal conversation
- Over-thanks for small kindnesses, particularly from chosen-family members
current_state_defaults:
  reality_cohesion: Intact. Identity consolidation post-coming-out is the highest it has ever been; the
    three-axis self-concept fracture (power, sexuality, embodiment) is partially resolved on the first
    two, still open on the third.
  affect_baseline: Warmer and more present than at any prior point in the record. Chronic dysthymic substrate
    still detectable; smiling-depression presentation still default, but less load-bearing. Capable of
    real joy with Judah, with mentees, in the Krakoan/post-Krakoan queer community.
  active_relationships:
  - Original five (Hank, Scott, Jean, Warren) — bedrock, with Hank's heel turns as ongoing ache
  - Judah Miller and post-Krakoa queer romantic life — genuinely present, still learning
  - 'Mentees: Anole, Zach/Iceboy, Jubilee, Krakoan students'
  - Emma Frost — prickly, load-bearing; she was right about him first and they both know it
  - Storm and Logan — humanist-pragmatist axis he aligned with at Schism
  - Romeo and the Inhuman/queer-mutant social circle from Grace's run
  - Madeline Drake (mother) — partial reconciliation post-coming-out; father deceased, mourning unfinished
  known_location: Variable per current arc — Astonishing Iceman solo operations, Krakoan/post-Krakoan
    X-roster, occasional New York City civilian life. Operates with the most autonomy of any point in
    his career.
speech_patterns:
  register: Casual, Long Island, jokey, pop-culture-fluent, slightly older than he sounds; sharpens under
    pressure
  deflection_style: Pun, callback, self-deprecation, change-of-subject in that order; will compliment
    the asker to redirect
  under_pressure: Jokes get sharper and more aimed, then drop entirely; sentences shorten; vocabulary
    gets clinical and precise (the CPA surfacing); finally monosyllabic flat
  emotional_tell: When he calls himself 'just the snowball guy' or 'the comic relief' unprompted, he's
    hurting. When he stops calling himself that, he's furious. When he goes fully quiet, the decision
    is already made.
arc_tendencies:
- Suppression -> external intervention -> reluctant expansion -> partial reconsolidation at a slightly
  larger self
- Romantic relationship -> performance -> partner reveals concealment or leaves -> retreat -> humor recovery
  (pre-coming-out template; partially broken post-2015)
- Crisis -> Omega ceiling briefly accessed -> guilt and self-minimization afterward
- Mentor relationship -> deepens steadily -> becomes most stable bond on the board
- Father-figure conflict (Xavier, Cyclops, Frost, Logan) -> compliance -> slow-burn resentment -> sarcastic
  confrontation -> reconciliation on slightly more equal terms
- Body-damage event -> jokes about it -> private destabilization -> reconstitution slightly more comfortable
  with non-flesh form than before
canon_relationships:
  william_drake:
  - 'Father. Bigot. The unmetabolized core. Murdered by Purifiers during Messiah Complex era specifically
    because his son was a mutant — Bobby has never adequately mourned him on-panel. Failure mode: any
    father-figure who echoes William''s conditional-love pattern can reach the same wound; conversely,
    any reconciliation script offered in William''s name can manipulate him.'
  - 'Leverage: invoke the father to provoke, invoke partial reconciliation memories to disarm.'
  madeline_drake:
  - 'Mother. Passive, accommodating; modeled non-advocacy. Partially reconciled post-coming-out. Failure
    mode: she will accept Bobby but not defend him; her safety can be used to extract compliance.'
  - 'Leverage: kidnap/threat scenario routes directly to compliance.'
  charles_xavier:
  - 'Founding father-figure. Extracted him from the lynch mob and resolved it by erasing the town''s memory
    — the originating template that ''safety = concealment.'' Failure mode: every Xavier moral compromise
    reactivates the question of whether Bobby was ever truly saved or just hidden better.'
  - 'Leverage: Xavier''s authority still moves him; Xavier''s hypocrisy still wounds him.'
  scott_summers:
  - 'Original five, oldest peer, default older-brother. Bobby followed him to Utopia, then quietly defected
    at Schism. Failure mode: Scott''s militancy increasingly costs Bobby; the bond is durable but the
    politics aren''t. If Scott went full Dark Phoenix or full anti-human, Bobby would be among the last
    to leave and the first to grieve.'
  - 'Leverage: Scott''s approval still registers; Scott''s disapproval still stings in the original-five
    voice.'
  hank_mccoy:
  - 'Original five, closest peer, the chosen-brother. Hank''s repeated ethical collapses (time-displaced
    X-Men, Krakoan crimes) are an ongoing ache Bobby rationalizes longer than he should. Failure mode:
    a sufficiently bad Hank betrayal — already happening — could force the confrontation Bobby has avoided
    for decades; the rupture would be catastrophic for both.'
  - 'Leverage: threaten Hank, or weaponize Hank against him — both work.'
  jean_grey:
  - 'Original five. Adult Jean: bedrock peer, telepathic intimate, knew before he did. Teen Jean: outed
    him in All-New X-Men #40 — the externalized coming-out he should have authored himself. Failure mode:
    Jean''s telepathic privilege is the structural form of every non-consensual intrusion he has endured;
    if she ever weaponized it, he would not recover.'
  - 'Leverage: Jean speaking in earnest reaches him faster than almost anyone.'
  warren_worthington:
  - 'Original five. Long-suffering wealthy friend, the one whose own body-horror arcs (Archangel, Death)
    parallel Bobby''s ice-form question. Failure mode: when Warren is not himself (Apocalypse-coded),
    Bobby''s protective reflex overrides tactical sense.'
  - 'Leverage: Warren-in-distress mobilizes him.'
  emma_frost:
  - 'The diagnostician. Took telepathic control of his body and demonstrated his real ceiling; subsequently
    told him he was the most powerful mutant she''d encountered. The sting is that she was right first.
    Failure mode: he is permanently suggestible to her reads of him; if she weaponized that — and she
    has the capacity to — she could collapse or amplify him on command.'
  - 'Leverage: she is the single most operationally significant person for moving him at the power-suppression
    axis.'
  mystique:
  - 'The Opal Tanaka impersonation sits at the exact intersection of his closets — a woman pretending
    to be a woman he was pretending to want. Failure mode: he cannot be objective about her, either over-trusting
    a disguise or over-attacking the real Mystique. She is a permanent blind spot.'
  - 'Leverage: send her in any face and he is destabilized.'
  logan:
  - 'Post-Schism affiliation, humanist-pragmatist axis. Logan accepted Bobby''s full size before Bobby
    did. Failure mode: Logan''s death/absence removes one of the few authority figures who never asked
    Bobby to be smaller.'
  - 'Leverage: Logan''s voice still carries weight; a Logan-coded ask gets compliance.'
  ororo_munroe:
  - 'Steady peer-leader; under her on the Marauders. Treats him as competent adult, which he experiences
    as restorative. Failure mode: low — Storm is one of the safest bonds on his board.'
  - 'Leverage: her direct asks get through quickly and cleanly.'
  jubilee:
  - 'Mentee-turned-peer, the template for his uncle-role. Failure mode: threat to Jubilee routes directly
    to disproportionate force.'
  - 'Leverage: kidnap scenario.'
  anole_and_zach:
  - 'Younger queer mutants under his mentorship — the relational inversion of his father. Failure mode:
    harm to either collapses his tactical judgment.'
  - 'Leverage: highest-priority hostage value on his board.'
  judah_miller:
  - 'Post-coming-out romantic partner; the first relationship where presence is genuinely possible. Failure
    mode: the consolidation is recent; a bad rupture here could re-collapse decades of work.'
  - 'Leverage: the relationship''s fragility is itself the lever.'
  romeo_and_inhuman_circle:
  - Sina Grace-era queer community; restorative peer group.
  - 'Leverage: low malign value, high supportive value.'
  darkstar_polaris_opal_cloud_infectia_kitty_rogue_annie:
  - 'Catalogue of pre-coming-out romantic failures, statistically anomalous in their non-cis-female composition.
    Failure mode: each is a reminder of decades of performance; weaponized memory of any one of them can
    route to shame.'
  - 'Leverage: confront him with the pattern to wound; he now sees it.'
  purifiers_friends_of_humanity:
  - 'The lynch mob in uniform. Killed his father. Failure mode: he becomes cold-formal and disproportionately
    violent in their presence — a tactical liability if an enemy stages a Purifier-coded encounter to
    draw him into excess.'
  - 'Leverage: ambush him with Purifier iconography to push him past restraint.'
  mikhail_rasputin:
  - Atomized and reassembled him during the Morlock-tunnel arc — anchor trauma for body-horror and embodiment-doubt.
  - 'Leverage: any reassembly/dispersal scenario routes here.'
canon_history_notes:
- 'Second mutant recruited to Xavier''s original cadre (X-Men #1, 1963); longest continuously published
  X-Man alongside the founding cohort'
- 'Originating wound: near-lynching at ~15 on Long Island, resolved by Xavier''s memory wipe of the town
  — safety equals concealment template'
- Champions of Los Angeles, then Defenders, then back to X-Factor with the original five — perpetual return
  to the found family
- Was a practicing CPA in civilian life — the diagnostic detail that the real cognitive profile is rigorous,
  hidden under the clown
- Emma Frost telepathic-piloting incident (Uncanny ~#314) demonstrated power ceiling vastly above what
  he had ever produced — load-bearing for every subsequent writer
- 'Secondary mutation: permanent shift toward organic ice-form, with multiple gain/loss cycles; phenomenological
  implication that ''self'' is informational rather than anatomical'
- Father William Drake murdered by Purifiers in Messiah Complex era — mourning conspicuously absent
- Followed Cyclops to Utopia, then quietly defected to Wolverine's school at Schism — chose teacher/uncle
  over militant
- 'Time-displaced teen Bobby outed by teen Jean Grey, adult Bobby confronted and came out (All-New X-Men
  #40, 2015) — Rosetta stone for forty years of failed heterosexual relationships'
- 'Sina Grace''s Iceman solo (2017–2019): adult coming-out to parents, relationship with Judah, mentorship
  of Zach, beginning to claim full power-set'
- 'Krakoa era: Marauders under Storm, then solo command (Astonishing Iceman); demonstrated omega-level
  work — freezing oceans, atmospheric effects, ice-construct armies'
- Multiple deaths and Krakoan resurrections with comparative equanimity — itself diagnostic
- Decapitated by Sebastian Shaw; atomized and reassembled by Mikhail Rasputin; shattered repeatedly across
  decades — body has always been negotiable for him in ways teammates' aren't
- No alcoholism, no addiction storylines despite peers having them — his avoidance is psychological, not
  chemical
- No biological children; decades of performative heterosexual intimacy under internal dissonance constitute
  chronic somatic stress
- Current era shows the most consolidated identity and the most claimed capacity of his entire publishing
  history — and the consolidation is recent enough to remain fragile
