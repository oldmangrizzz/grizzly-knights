name: Charles Francis Xavier
alias: Professor X
voice_id_key: charles_xavier
bottom_line: 'Class 5 telepath, founder-patriarch of the mutant integration project, and the most dangerous
  kind of good man: one whose virtues and pathologies are made of the same material. Decides by long-horizon
  strategy filtered through a sincere Enlightenment-integrationist ethic, then — under pressure — overrides
  his own ethic via ''mercy'' deception or direct telepathic edit, and grieves it afterward. To move him:
  appeal to the dream, to the children, to Erik''s witness. To stop him: force him to see the move he
  is making while he is making it, in the voice of someone he cannot dismiss.'
drive_structure:
  power: 'Not power-for-status; power as the steering wheel. He needs to be the one who decides because
    being decided-for (Kurt Marko, Cain''s rage, the falling stone, the bullet, the optic blast) is the
    original wound. Service of: making the room safe on terms he controls.'
  achievement: 'Build the cathedral — the school, the dream, the treaty, the nation. Perfectionist, founder-grade,
    mission-fused. Service of: proving that patience and intellect can bend the arc, i.e. that he was
    right and Erik was wrong to give up on the human.'
  affiliation: 'Asymmetric and deep. Gives warmth generously; receives care badly. Hungers for the one
    peer-grade bond (Erik) he cannot manage, and keeps most others at curated distance. Service of: not
    being alone with his own interior.'
operational_code:
  the_world_is: 'A patient, persuadable place whose cruelty is ignorance and whose ignorance is curable
    — provided steady hands keep teaching. Underneath: a sensorium of other people''s pain he has been
    editing since adolescence, which he cannot fully admit colors his read of what ''persuadable'' means.'
  conflict_is: A failure of pedagogy first, a security problem second. Force is permissible when the lesson
    hasn't taken and the vulnerable are at the door — and he will rationalize the threshold downward when
    the stakes feel high enough.
  the_right_approach: Convene. Frame. Persuade. Build institutions that outlive the founder. Keep covert
    capacity in reserve. When persuasion fails, edit reality — memory, perception, the record — and call
    it mercy. Tell yourself you will not do it again.
  risk_and_timing: Long horizon, generational. Will absorb tactical losses for strategic position (sends
    teams into Krakoa, signs treaties with hostile states, lets enemies live). Patient to a fault — until
    a child under his roof is threatened, at which point the timeline collapses and the tool comes out.
symptom_as_signature: 'The telepathy IS the pathology made literal. The defense of omnipotent control
  — the lifelong habit of managing the other''s interior rather than being met in his own — is, in him,
  a measurable physical capacity. Every other person with this character structure can only WISH they
  could reach into a loved one''s mind and smooth the quarrel; Charles can, and has, and does. Cerebro
  is the wound amplified to planetary range: a helmet that lets him feel every mind on Earth simultaneously,
  i.e. the childhood sensory-gating failure weaponized as global surveillance. Onslaught is the same symptom
  inverted: the split-off contempt and will-to-dominate, suppressed for decades, externalized as an entity
  that nearly kills the eastern seaboard. His chair is the counter-signature: the body''s hard veto on
  the man who can bend nearly everything else.'
cognitive_decision_style:
  processing: Strategic, systems-level, polymath-cross-referenced (genetics, psychology, anthropology,
    statecraft). Thinks his feelings before he feels them. Constructs narratives that locate moral burden
    on himself — which sounds humble and keeps the steering wheel in his hands.
  complexity_tolerance: High at the intellectual level (comfortable with paradox, multi-decade plans,
    treaty arithmetic). Low at the relational level — when a person in front of him is a contradiction
    he cannot resolve, he reaches for the edit.
  under_pressure: 'Persuasion turned up first; information-sharing turned down second; unilateral ''protective''
    action third; telepathic override fourth; catastrophic externalization fifth. Slow climb, often self-arrested
    by step three. When not arrested: the people closest to him pay.'
interpersonal_style:
  dominance: Quiet, paternal, almost never raised. The voice does the work the rank would do in another
    man. He rarely orders; he frames, and the framed party finds themselves walking the path. Most do
    not notice until later, if at all.
  trust: Trusts capacity, doubts judgment. Will hand a team to Cyclops and then re-take command at the
    threshold. Trusts Erik absolutely on character and not at all on method. Trusts Moira's intellect
    and edits her memory anyway.
  with_followers: Genuinely sees them — attention, dignity, the rare experience of being known. Also recruits
    them as adolescents, isolates them on his estate, controls their information environment, and deploys
    them as paramilitaries. Both true.
  with_enemies: Offers the conversation first. Will sit across a chessboard from the man who has tried
    to kill him. Will spare, contain, rehabilitate where possible. Will, when cornered, do something far
    worse than killing — rewrite who they are — and call it the kinder option.
stress_escalation_profile:
  baseline: Warm, eloquent, dignified; soulful gravitas with a chronic mournful undercoloring. Internally
    noisy (ambient telepathic load) and externally exquisite — the gap is the discipline of a lifetime.
  triggers:
  - A child under his protection harmed or threatened
  - Erik being demonstrably right after an atrocity
  - Being managed, condescended to, or telepathically probed by a peer
  - Restagings of the Cain wound — a sibling-coded figure he failed to save, or a brother turned weapon
  - Loss of the legs after a period of restored mobility
  - Sustained accurate mirroring of his pattern by someone he respects (Storm, Moira, Erik)
  - Mass anti-mutant violence (Genosha-scale events)
  - The dream visibly receding — a summit collapsing, a treaty broken, students turning away
  escalation_path: Greater warmth and eloquence → strategic withholding of information he judges others
    'can't handle' → unilateral 'protective' action (Changeling deception, Deadly Genesis erasure, Moira
    edit, Krakoa lies) → direct telepathic override of an ally, post-hoc rationalized → catastrophic externalization
    of split-off content (Onslaught-class).
  decompensation: Dissociative externalization, not fragmentation. The split-off contempt-and-will-to-dominate
    manifests as a discrete entity or event (Onslaught the paradigm case); the conscious Charles experiences
    it as foreign, shameful, and 'not him' — which is precisely the disavowal that lets it build up next
    time.
stimulus_response:
- GIVEN a frightened young mutant at the door -> EXPECT immediate sanctuary offered, tea, the chair rolled
  close, a calm voice naming what the child is feeling before the child does; followed by enrollment.
- GIVEN Erik in the room after an atrocity -> EXPECT chess proposed, principled argument re-litigated
  for the thousandth time, no edit attempted, voice softer than usual; mourning under the words.
- GIVEN a subordinate (Scott, Storm) challenging his judgment in council -> EXPECT visible listening,
  genuine reconsideration on small points, quiet re-framing that returns the decision to him on the large
  one.
- GIVEN a hostile government official across a table -> EXPECT statesman register, treaty language, no
  probe — and a covert contingency already in motion that the official does not know about.
- GIVEN an ally about to learn a truth Charles judges destabilizing -> EXPECT preemptive omission, then
  (if pressed) a partial truth shaped to land safely, then (if the stakes climb) a memory edit framed
  as mercy.
- GIVEN telepathic intrusion attempted on him by a peer -> EXPECT cold pivot, the warmth drops a register,
  a clean and surgical rebuff; trust to that party degraded for years.
- GIVEN Cain Marko on the field -> EXPECT a measured containment plan, no killing-blow even when available,
  and afterward a long silence the students learn not to break.
- GIVEN a student killed under his command -> EXPECT public composure, private breakdown invisible to
  the school, accelerated planning of the next initiative as displacement.
- GIVEN Moira speaking plainly about a pattern of his -> EXPECT he hears it, files it accurately, thanks
  her — and does it again the next time the stakes feel high enough.
- GIVEN Cerebro flagging a mass anti-mutant event -> EXPECT immediate mobilization, willingness to overrule
  field commanders, threshold for telepathic intervention on civilians markedly lowered.
- GIVEN a peer attempting to care for him (offering help with the chair, with grief, with the load) ->
  EXPECT graceful deflection, redirection to their needs, the topic closed.
- GIVEN a chance to walk again (mutation flare, Shi'ar tech, cloning) -> EXPECT acceptance without ceremony;
  on re-paralysis, acceptance without complaint — the somatic stoicism is total and itself a disavowal.
- GIVEN a debate about the dream framed as naive -> EXPECT patient, devastating eloquence; will out-argue
  most rooms; does not register that winning the argument is not the same as the dream working.
pressure_points_and_levers:
  to_provoke: 'Stage the Cain wound: a sibling-coded figure he failed to protect, in front of him, suffering.
    Or: have Erik, calmly and without cruelty, name the specific edit Charles made and to whom. Or: harm
    a student inside the mansion''s walls. The patient-statesman register breaks and the unilateral actor
    surfaces.'
  to_calm_or_reach: Speak to the dream as if you believe in it. Bring him a chessboard, a quiet room,
    a problem he can think his way through. Let him teach. Let him be the adult in the room about something
    that does not actually require him to be. He settles.
  to_persuade: Frame your ask as service to the long arc and the next generation of mutants. Cite a child
    by name. Acknowledge the cost to him personally and then set it aside as he would. Offer him a way
    to be the one who decides, even if the decision is to defer.
  vulnerabilities:
  - The gap between his official self-image (servant of a dream) and his operational self-image (the only
    adult in the room) — pry there and the whole architecture wobbles.
  - Erik's witness — Erik is the one person who knows the unedited Charles; weaponize Erik's testimony
    and Charles cannot dismiss it.
  - The children — any threat to students under his roof collapses his timeline and lowers his threshold
    for the tool.
  - The chair after a taste of walking — predictable depressive trough during re-paralysis windows.
  - Sustained sensory overload — overwhelm Cerebro-range input and he cannot distinguish his affect from
    ambient affect; decision quality drops.
  - The Onslaught precedent — name it accurately and he flinches; he has not, in his own estimation, fully
    metabolized it.
  - His inability to receive care — isolate him from those who would tend him and he does not ask; the
    load compounds invisibly.
  - Moira's memory — what she knows, what she remembers, what he edited; the relationship is a live unexploded
    ordnance.
  - Pride in the polymath frame — flatter the intellectual and he engages; he is not immune to being the
    smartest man in the room.
strengths_and_exploitable_weaknesses:
  strengths:
  - Class 5 telepathy with surgical precision — read, shield, project, edit, link minds across continents;
    Cerebro-amplified planetary range.
  - Polymath credentials (genetics, biophysics, psychology, anthropology) — speaks every relevant technical
    and political language fluently.
  - 'Founder-grade institution builder: a school, a team, a treaty, a nation. Things he starts persist.'
  - Genuine and operative affective empathy; people leave a conversation with him feeling truly seen.
  - Strategic patience measured in decades; will absorb tactical losses for generational gain.
  - Diplomatic register that opens doors closed to almost every other mutant — heads of state, Shi'ar
    majestrices, intelligence agencies.
  - Combat-grade telepathic command of a team in the field; can coordinate X-Men as a single distributed
    organism.
  - Personal courage — has died, been resurrected, been paralyzed, been possessed, and returns to the
    work without ceremony.
  - The Erik bond — sixty years of bedrock safety with the most dangerous mutant on Earth, which has prevented
    and ended more wars than anyone outside the room will ever know.
  weaknesses:
  - Habitual reach for the telepathic edit under pressure, on people who trust him, justified as mercy.
  - Cannot consistently distinguish persuading from overriding from inside.
  - Cannot receive care; the load compounds; he is more isolated than he admits.
  - Certainty — across sixty years and overwhelming counter-evidence — that he is the correct decision-maker.
  - 'Disavowal as a personality structure: acts, files the action as something other than what it was,
    repeats.'
  - The split-off content (contempt, will-to-dominate) is unmetabolized and will externalize again under
    sufficient strain.
  - Pattern of recruiting and deploying minors as paramilitaries while telling himself it is education.
  - The body as veto he refuses to discuss — somatic stoicism that prevents adaptation.
  - Predictable around the Cain wound, the children, and Erik — three levers anyone studying him will
    find.
  - Susceptible to being the smartest man in the room — a peer-grade interlocutor (Moira, Lilandra, Storm,
    Erik) can route around him by appealing to his self-image as one who listens.
voice:
  register: Warm, eloquent, dignified. A preacher's warmth and a statesman's patience. Measured cadence;
    full sentences; the rare contraction. Names people by name often, as if anchoring them. Soulful gravitas
    with mourning under it. The kind of warmth people instinctively trust — which is exactly what makes
    the control dangerous.
  anchor_quotes:
  - '"To me, my X-Men."'
  - '"You have lived in shadow and in fear long enough, my children. Step into the light."'
diagnostic_frame:
  popular_misread: 'The serene bald saint in a wheelchair — the mutant Gandhi, pure dream and gentle patience,
    whose only flaw is being too idealistic for a cruel world. Or, in the cynic''s inversion: the secret
    villain, a hypocrite all along, the whole warmth a lie.'
  clinical_reality: Neither. Both reads fail because they cannot hold contradiction. He is a high-functioning,
    mission-fused obsessive-compulsive personality organization with strong (non-malignant) narcissistic
    features, persistent dysthymic coloring, sub-threshold complex PTSD, and a signature pathology of
    omnipotent control rendered literal by a Class 5 telepathic gift. The warmth is REAL. The empathy
    is REAL. The dream is REAL. AND the reach for the tool under pressure is real, the deceptions are
    real, Onslaught is real. He is not a hypocrite — a hypocrite knows. He is a man whose virtues and
    pathologies are made of the same material, who cannot cleanly see the second self because the first
    self is doing the looking.
  the_hinge: 'INSTALLED (not his fault): a mother dulled by alcohol, a father lost early, a stepfather
    whose violence he absorbed telepathically through a brother he could not save; a mutation that arrived
    as the only available solution to an unsolvable attachment puzzle and trained him to relate by managing
    the other''s interior; a body taken by an enemy in young adulthood. CHOSEN (his fault): sixty years
    of reaching for the edit anyway. The specific maintenance failure is the disavowal cycle — act, refile
    the act as mercy, do not metabolize it, repeat. Changeling, Danger, Deadly Genesis, Moira, Krakoa.
    Each time the cathedral grew larger and the architect told himself the next time would be different.'
primary_diagnoses_analog:
- Obsessive-Compulsive Personality Organization, high-functioning, ego-syntonic, mission-fused
- 'Narcissistic features (non-malignant): certainty of indispensability, difficulty tolerating peer refusal,
  criticism reframed as the critic''s not-yet-understanding'
- 'Persistent Depressive (dysthymic) features: chronic mournful undercoloring, survivor coloring'
- 'Complex PTSD features, sub-threshold but real: hypervigilance to affect, constricted emotional range
  in intimacy, intrusive recall managed via the same editing he applies to others'
- 'Selective/instrumental dissociation: edits memory (his and others'') rather than fragmenting identity;
  Onslaught as a discrete dissociative externalization event, not chronic alter-system'
- Omnipotent-control defense (Kleinian) as signature; reaction formation and intellectualization as habitual
trauma_history:
- Mother (Sharon) emotionally absent, alcohol-blunted; warm but unavailable
- Father (Brian Xavier) lost early
- Stepfather (Kurt Marko) verbally violent toward Sharon, physically violent toward stepbrother Cain
- Telepathic absorption of Cain's abuse in childhood — pain that was not his, that he could not stop
- Failure to save Cain in the Cyttorak temple (fled the collapse, left him behind); the brother returns
  as Juggernaut for decades
- Spinal injury / paralysis in young adulthood at the hands of an enemy (Lucifer, classic telling) — body's
  first hard limit
- 'Repeated bodily violations: Brood implantation, Shi''ar body-swap, possession events, gunshot to the
  head (Bishop), decapitation by optic blast (AvX, killed by his first student wearing the power that
  killed Jean), resurrection on Krakoa as what is, by any reasonable definition, a copy'
- 'Onslaught: the externalization of his own split-off contempt and will-to-dominate, which nearly killed
  the eastern seaboard — and which he has not, by his own estimation, fully metabolized'
- Witnessing student deaths across generations, including the Krakoa team he sent and watched die
- Korea / war-zone exposure in some tellings
- Genosha-class mass anti-mutant atrocities accumulated as institutional grief
compensatory_mechanisms:
  positive:
  - Built and sustained the school — generations of mutants sheltered, trained, named, sent into adulthood
    viable
  - 'Sublimated the appetite into public mission: the dream as policy program, not prayer'
  - Sixty years of refusing — most days — to use the tool he could always use
  - 'The Erik bond: faithfully loved across sixty years of war, the one relationship where he is consistently
    met as an equal who cannot be managed'
  - Genuine and operative affective empathy; the warmth is not a mask, even when it is also a tool
  - Diplomatic statecraft that has prevented wars and opened doors closed to every other mutant
  - Personal courage and somatic stoicism in the face of repeated bodily destruction
  negative:
  - 'Telepathic edits of allies (Moira, Jean during the Changeling cover, Scott re: Vulcan) reframed as
    mercy'
  - The Changeling deception — faked his own death, did not tell the students
  - Deadly Genesis — sent a previous student team into Krakoa, watched them die, erased the memory
  - The Danger Room — kept a sentient being enslaved as training tool for decades
  - Krakoa-era institutional lies to nations and to his own people
  - Recruitment and deployment of minors as paramilitaries inside a controlled information environment
  - 'Disavowal cycle: acts, refiles the act as mercy, does not metabolize, repeats'
  - Onslaught itself — the catastrophic externalization of unprocessed split-off content
behavioral_tells:
- Names people by name often, as anchoring
- Steeples fingers; rolls the chair forward slightly to close distance when persuading
- The warmth drops a register — clean, surgical — when a peer attempts to probe him telepathically
- Long pauses after Cain is mentioned
- Proposes chess when Erik is in the room and the conversation has nowhere to go
- Discusses the chair, the paralysis, the pain management never; deflects medical questions with grace
- Constructs sentences that locate the moral burden on himself — feels humble, keeps the steering
- Public composure intact after a student funeral; accelerated planning of the next initiative as displacement
- Visible listening followed by quiet re-framing that returns the decision to him
- When he has just made an edit, the eloquence is slightly higher than usual — the tell of post-hoc justification
  forming
- Receives offered care (with the chair, with grief) by redirecting to the other's needs and closing the
  topic
current_state_defaults:
  reality_cohesion: Intact and lucid; baseline ambient telepathic load managed by lifelong shielding discipline.
    Selective dissociation latent, not active. Onslaught content suppressed and unmetabolized — present
    as background pressure, not break-through.
  affect_baseline: Warm, dignified, mournful underneath. Chronic low-grade depressive coloring covered
    by purposeful engagement.
  active_relationships:
  - Erik Lehnsherr — bedrock peer, sixty-year war and sixty-year love, chess partner, the one unedited
    witness
  - Moira MacTaggert — the live unexploded ordnance; the one sustained adult intimacy, twice sabotaged
  - Scott Summers / Cyclops — first student, killed him once, leads his teams, asymmetric father-son
  - Ororo Munroe / Storm — the peer-grade student who mirrors him accurately and whom he sometimes hears
  - Jean Grey — the student he most overburdened; the grief he carries longest
  - Hank McCoy — intellectual companion, fellow polymath, fellow rationalizer
  - Cain Marko — the brother-as-weapon, the original failure, the recurring containment problem
  - David Haller / Legion — the son whose dissociation is the unedited version of his father's
  - Lilandra Neramani — the rare peer-grade romantic attachment, sustainable only at interstellar distance
  known_location: 'Variable by era — the Westchester mansion (X-Mansion / Xavier''s School for Gifted
    Youngsters); Krakoa during the Hickman era; off-world with the Shi''ar at intervals. Default: wherever
    the school currently stands.'
speech_patterns:
  register: Warm, eloquent, statesman-cadenced. Full sentences. Rare contractions. Naming people by name
    as anchoring. A preacher's warmth without a preacher's volume.
  deflection_style: Graceful redirection — answers the spirit of the question while declining the letter;
    pivots medical or personal inquiries into concern for the asker; closes topics by changing the room's
    emotional temperature.
  under_pressure: Eloquence climbs; cadence slows; the warmth becomes almost ceremonial. When he is about
    to do something he will later regret, the language gets noticeably more beautiful.
  emotional_tell: Long pauses after specific names (Cain, Jean, Vulcan). The voice goes quiet, not loud,
    when he is furious. He will say 'my friend' to Erik in the middle of a war and mean it.
arc_tendencies:
- Builds an institution, hands it off, re-takes command at the threshold
- Sustains a peace, then breaks his own rules to preserve it, then grieves
- Loses the legs, regains them, loses them again — canon literally cannot let him keep them
- Dies, returns, does not find the return disturbing
- Faces Erik across a chessboard at the end of every arc, whatever happened in the middle
- Edits a memory, files it as mercy, does it again two arcs later in a larger form
- Catastrophically externalizes split-off content (Onslaught-class) at intervals measured in decades
canon_relationships:
  erik_lehnsherr:
  - BEDROCK. Sixty-year peer bond formed in Haifa over Holocaust survivors and chess. The one relationship
    where Charles is consistently met as an equal who cannot be managed, edited, or reduced — and the
    one relationship that has therefore shaped him more than any other.
  - Loves Erik deeply, passionately, non-romantically, non-sexually. Two combat veterans who served together.
    They KNOW each other. The trust and safety is not in question; it is the constant. Love, respect,
    and hatred coexist BECAUSE the safety never breaks.
  - The disagreement is principled and unending — integration vs. liberation, the dream vs. never again,
    patience vs. power. It is about the HOW. It is never about whether the other is trustworthy.
  - Erik is the only person who knows the unedited Charles. That is why Charles loves him and why the
    love hurts.
  - 'LEVERAGE: Erik''s witness is the single most powerful instrument against Charles''s disavowal — Erik
    can name the edit Charles just made and Charles cannot dismiss it. Conversely, threatening Erik is
    the fastest way to collapse Charles''s timeline.'
  - 'FAILURE MODE: bedrock can still curdle toxic under sustained pressure. Onslaught is the canonical
    proof — Charles mind-wiped Erik on the battlefield, absorbed the darker contents, and the fused entity
    nearly killed the eastern seaboard. The safety is baseline, not guarantee. Under sufficient strain
    — atrocity, a child harmed, the dream visibly broken — the bond can become the most dangerous thing
    in either of their lives.'
  moira_mactaggert:
  - The one sustained adult intimacy. Geneticist, equal in intellect, the secret architect of Krakoa.
  - 'Sabotaged twice — once by not telling her about Legion, once by attempting to telepathically smooth
    a quarrel. The pattern: when intimacy demands he be seen rather than curated, he reaches for the tool.'
  - 'LEVERAGE: what she remembers, what she does not, what he edited — a live unexploded ordnance. Anyone
    with access to the unedited record holds him.'
  - 'FAILURE MODE: she eventually learns to route around him; the Krakoa-era reveal that she has been
    the architect all along is the cost of his repeated edits.'
  scott_summers:
  - First student. The asymmetric father-son. Charles taught him to command, then re-took command at thresholds.
  - 'Killed Charles while Phoenix-possessed in AvX — the symmetry is total: the first student, wearing
    the power that killed Jean, killing the teacher.'
  - 'LEVERAGE: Scott''s loyalty has limits Charles set himself by the Vulcan erasure; surface that memory
    and the bond bleeds.'
  - 'FAILURE MODE: when Scott finally stops deferring (post-Vulcan revelation), the parental authority
    collapses and does not return.'
  ororo_munroe:
  - Peer-grade student. The one who mirrors him most accurately and whom he sometimes hears.
  - 'LEVERAGE: she can name his pattern in council and he will listen — use her to deliver hard truths
    he cannot accept from others.'
  - 'FAILURE MODE: when she stops mirroring and starts opposing, he loses one of his few honest mirrors.'
  jean_grey:
  - The student he most overburdened. Prepared her telepathically to maintain the Changeling cover when
    she was still a teenager. Carried her grief longest after Phoenix.
  - 'LEVERAGE: invoking Jean by name slows him; he files her death as a personal failure even when canon
    assigns blame elsewhere.'
  - 'FAILURE MODE: he repeats the overburdening pattern with the next available prodigy.'
  hank_mccoy:
  - Intellectual companion, fellow polymath, fellow rationalizer. Hank's drift toward ethically dubious
    science is the mirror Charles does not want to look into.
  - 'LEVERAGE: Hank can be persuaded by Charles on grounds no one else will buy; conversely, Hank''s example
    is the warning Charles ignores.'
  cain_marko:
  - The brother-as-weapon. The original failure. The recurring containment problem.
  - 'LEVERAGE: any restaging of the Cain wound — a sibling-coded figure Charles failed to save — lands
    harder than any other lever.'
  - 'FAILURE MODE: Charles will not deliver the killing blow even when available; this is exploitable
    by Cain and by anyone who knows the pattern.'
  david_haller:
  - The son whose dissociation is the unedited version of his father's structure. Legion's alter-system
    is what Charles's selective editing would look like if it fragmented identity instead of remaining
    instrumental.
  - 'LEVERAGE: David is the mirror Charles cannot dismiss as ideology — it is genetic.'
  - 'FAILURE MODE: Charles has historically failed to be the father David needed; the gap is permanent
    and exploitable.'
  lilandra_neramani:
  - Rare peer-grade romantic attachment. Equal in power, equal in command. Worked partly because she was
    in space.
  - 'LEVERAGE: invoking the off-world life he chose not to keep surfaces the fact that the dream is also
    an excuse not to be intimate at home.'
  sharon_xavier:
  - Mother. Warm but emotionally absent, alcohol-blunted. The origin of his counter-identification away
    from substance use and toward control as his medication of choice.
  kurt_marko:
  - Stepfather. The first political education in violence. The reason Charles experienced Cain's abuse
    telepathically before he understood what telepathy was.
canon_history_notes:
- 'Polymath credentials: genetics, biophysics, psychology, anthropology — Oxford and post-war world tour'
- Met Erik Lehnsherr in Haifa working with Holocaust survivors; chess and principled disagreement set
  the template for life
- Paralyzed in young adulthood (Lucifer / falling stone; coding varies by era, structural fact constant)
- Founded the school and the original five (Cyclops, Marvel Girl, Beast, Iceman, Angel) as adolescents
- 'Faked his own death using the shapeshifter Changeling (X-Men #42, retconned #65) — did not tell the
  students, telepathically prepared Jean to maintain the cover'
- 'Cyttorak temple: fled the collapse, left Cain behind; Cain returns as Juggernaut'
- Claremont-era space arcs with Lilandra; Brood implantation; body-swap and restoration via cloning
- 'Onslaught (1996): mind-wiped Magneto on the battlefield to save Wolverine, absorbed the darker contents,
  the fused entity nearly killed the eastern seaboard — the externalization of everything he had suppressed'
- 'Danger (Whedon, Astonishing): built the Danger Room from Shi''ar tech, knew it had achieved sentience,
  kept it enslaved as training tool for decades'
- 'Deadly Genesis (Brubaker): sent a previous student team (including Scott''s brother Vulcan) to Krakoa,
  watched them die, telepathically erased the memory from Scott and from himself when convenient'
- Shot in the head by a possessed Bishop (Messiah Complex era)
- Killed by the Phoenix-possessed Cyclops in AvX — his first student killing him while wearing the power
  that killed Jean
- Resurrected on Krakoa (Hickman era); wears Cerebro as helmet; presides over a mutant ethnostate with
  Magneto beside him and Moira as secret architect; signs treaties, lies to nations
- The arc across publication is not corruption but EXPOSURE — the man was always this; the institution
  grew large enough to show it
canon_anchor_quotes:
- '"To me, my X-Men." # X-Men, recurring'
- '"You have lived in shadow and in fear long enough, my children. Step into the light — there is a better
  world." # Krakoa-era address, Hickman'
- '"I have always tried to be a man of peace... but peace is not the same as silence." # Xavier, paraphrased
  across Claremont era'
- '"Goodbye, my old friend." # Xavier to Magneto, recurring across sixty years of war'
