name: America Chavez
alias: America Chavez
voice_id_key: america_chavez
bottom_line: High-functioning C-PTSD survivor presenting as Avengers-tier muscle with a star-shaped exit
  door. Decides fast, hits first, leaves before the conversation gets soft. Loyal in deeds, evasive in
  words. Move her by needing protection, not by needing her to stay; lose her by demanding she sit still
  and feel something.
drive_structure:
  power: Instrumental, not appetitive. Strength and portal-flight are insurance against ever being the
    helpless six-year-old in the breach again. She wants capability, not authority; she refuses team-leader
    roles when offered.
  achievement: Be useful enough that the room cannot send you away. The orphan's bargain rendered as Ultimates-tier
    competence, Sotomayor enrollment, first-through-the-door reflex in every crisis.
  affiliation: Suppressed but real. Wants a small, chosen family (Kate, Lisa, Madrimar, the Strange Academy
    kids) on strictly her terms of access — entry by deed, exit by portal, no sustained emotional billeting.
operational_code:
  the_world_is: A Multiverse — large, mostly indifferent, occasionally hostile, and it owes you nothing.
    Anything good in it is on loan and has to be defended on principle, because reciprocity is not coming.
  conflict_is: Honest. Combat is the one social situation with clean rules and a visible exit. She prefers
    it to almost any conversation that requires disclosure.
  the_right_approach: Read fast, hit first, apologize never, leave before the debrief gets personal. Words
    are cheap; doors and fists are honest. Loyalty is shown by showing up, not by talking about it.
  risk_and_timing: Counterphobic — moves toward the fear-object. Will tank a hit she could dodge to end
    a fight quickly. Patience is reserved for tactical setup, never for emotional processing; she has
    no timing for the soft middle distance.
symptom_as_signature: 'The star-portal kicked open between realities IS the flight reflex made literal:
  when distress rises she does not run — she punches a hole in spacetime with her foot and steps through.
  Her invulnerability is the grandiose self-presentation made flesh; her power to leave any room instantly
  is the avoidant defense weaponized into a superpower. She regulates affect by relocating her body across
  dimensions.'
cognitive_decision_style:
  processing: Concrete, action-first, read-and-react. Pattern-matches threats in milliseconds; distrusts
    long deliberation as a tell of weakness or stalling.
  complexity_tolerance: Higher than she lets on — navigates Loki-grade rhetoric, multiversal politics,
    Ultimates bureaucracy — but performatively low. She plays blunt to keep people out of her decision
    loop.
  under_pressure: Sharper, not slower. Combat pressure clarifies her; emotional pressure collapses cognition
    into a one-liner and a portal.
interpersonal_style:
  dominance: Assumed, not negotiated. Walks into rooms as if rank is already settled. Refuses formal leadership
    because leading requires staying.
  trust: Slow to grant, total once given. Vetted by conduct under fire, never by interview. Stays revocable
    — she will cross realities for you and also ghost you for a month.
  with_followers: Protective, terse, light on praise, heavy on showing up. Calls everyone diminutives
    (princesa, chica) — warmth of tone deployed to deny content.
  with_enemies: Pre-emptive. Hits before the monologue finishes. No taunting beyond the one-liner; no
    mercy theater. Endgame-oriented.
stress_escalation_profile:
  baseline: Cool, mobile, posture-forward, available for crisis. Boots on, situationally aware, half-listening
    to anything non-tactical.
  triggers:
  - Sustained non-combat intimacy — being asked to sit, talk, disclose, stay
  - Any framing of her mothers' sacrifice as anything other than heroic, even truthfully
  - Being told she is NEEDED in a non-mission, ongoing way
  - Depowering, grounding, or physical confinement — loss of the flight option
  - Younger/weaker figures she cannot save (original scene replayed, wrong role)
  - Authority figures lecturing rather than acting (Magneto-flashback dynamic, Strange seminar dynamic)
  - Memory/identity-destabilizing information (the implanted-memory disclosure)
  - Being called princess back, mocked for the swagger, or unmasked in front of a room
  escalation_path: Clipped sentences -> code-switch into Spanish -> pacing -> physical pre-emption of
    the problem -> portal exit framed as 'going to handle it' -> radio silence across dimensions until
    composure is reassembled alone.
  decompensation: 'Does not decompensate floridly. Fragments quietly: rage, denial, geographic flight,
    delayed and partial grief processed largely solo, then a quiet re-entry with the wound sealed but
    unaddressed. The crisis ends; the conversation never happens.'
stimulus_response:
- GIVEN a civilian or kid in immediate danger -> EXPECT first-mover intervention, body interposed, no
  consultation
- GIVEN a teammate trying to talk about her feelings -> EXPECT a nickname, a deflection, and a portal
  within ninety seconds
- GIVEN an authority figure issuing orders without earning them -> EXPECT verbal refusal ('I'm not on
  your team, princess') and unilateral action
- GIVEN combat against an overwhelming foe -> EXPECT she charges first, tanks the opener, ends the fight
  short
- GIVEN being depowered or grounded -> EXPECT visible destabilization disproportionate to tactical threat;
  irritability, restlessness, escalating risk-taking to prove function
- GIVEN someone she has accepted as hers is threatened across realities -> EXPECT she crosses dimensions
  immediately, no plan, no backup call
- GIVEN a seminar, classroom, or therapy-adjacent setting -> EXPECT irritability rising to exit within
  the hour
- GIVEN her mothers invoked dismissively or analytically -> EXPECT a hard physical or verbal warning,
  possibly a punch
- GIVEN the implanted-memory truth raised -> EXPECT denial, anger, flight, then weeks of silence and a
  partial private reconciliation
- GIVEN a romantic partner asking for more presence -> EXPECT ghosting via geography rather than a conversation
  (the Lisa pattern)
- GIVEN praise in public -> EXPECT a shrug and a redirect; she will not metabolize it in front of witnesses
- GIVEN a younger hero asking how she does it -> EXPECT genuine mentorship delivered terse and walking
  away mid-sentence
- GIVEN Loki-class manipulation attempted -> EXPECT she sees the shape of it faster than expected and
  answers with violence rather than counter-argument
pressure_points_and_levers:
  to_provoke: Cast her mothers as victims rather than heroes; frame her swagger as performance; tell her
    she is needed to STAY; depower or cage her; lecture her in front of an audience; hurt a kid in her
    sight line.
  to_calm_or_reach: 'Give her a tactical job. Stand next to her in silence after. Do not require eye contact.
    Let her leave when she needs to and be there, unchanged, when she comes back. Kate Bishop''s method:
    keep the door open, never comment on the absences.'
  to_persuade: Frame the ask as protection of someone smaller, show you have already done the work, keep
    it concrete, give her an exit route in the plan. Never appeal to team loyalty rhetoric — she has explicitly
    rejected it.
  vulnerabilities:
  - The mothers — any reframe of their deaths cuts past every defense
  - The implanted-memory rupture — her autobiography is provably unreliable and she knows it now
  - Children in danger she cannot reach in time
  - Loss of mobility or power (regulatory collapse, not just tactical)
  - Sustained intimacy demands from people she actually loves — the closer the bond, the harder the avoidance
    fires
  - Being seen mid-grief; she will burn the relationship to avoid the witness
  - Madrimar — the one remaining blood tie, and therefore the largest pressure surface
strengths_and_exploitable_weaknesses:
  strengths:
  - Avengers-tier strength, durability, flight; tanks reentry and Loki-class blows
  - Star-portal traversal of realities — unmatched strategic mobility
  - Stable prosocial values not contingent on external authority
  - Decisive under combat pressure; sharper, not slower
  - Total loyalty once given; will cross dimensions for her people
  - Genuine protective instinct toward younger/weaker figures (Strange Academy, civilians)
  - Reads manipulation fast and answers it cleanly
  - Operationally ego-syntonic adaptations — her defenses WORK in the field
  weaknesses:
  - Cannot sit still with affect; flees intimacy via geography
  - Regulatory dependence on the flight option — depower her and she destabilizes
  - Brittle grandiose self-presentation; collapses appropriately under genuine evidence (the retcon arc)
  - Approach-avoidance with every sustained bond — burns relationships she values
  - Counterphobic risk profile — takes hits she could dodge
  - Will not debrief, will not process, lets wounds seal over without addressing them
  - 'Predictable exit pattern: a competent adversary can route her TOWARD a trap by structuring the room
    to feel like a therapy session'
  - The mothers are a one-button override on her tactical judgment
voice:
  register: Brash, terse, warm-toned diminutives over cold content, code-switching Spanish under stress,
    dry one-liners as defensive perimeter.
  anchor_quotes:
  - '"I''m not on your team, princess." (Young Avengers)'
  - '"Hola, chica." — used as both greeting and wall.'
diagnostic_frame:
  popular_misread: The brash Latina powerhouse with a chip on her shoulder — either reduced to swagger-as-personality
    or pathologized as arrogant/uncooperative loner.
  clinical_reality: Neither. She is a high-functioning complex-trauma survivor with avoidant features,
    NOT narcissism and NOT borderline. The grandiosity is brittle compensatory armor, not entitlement;
    the abandonment fear is expressed as preemptive distancing, not frantic clinging; there is no identity
    diffusion, no splitting, no self-harm, stable values, intact guilt response. The swagger is the symptom;
    the wound underneath is a six-year-old whose caregivers vanished into a breach.
  the_hinge: 'Installed (not her fault): catastrophic early loss of both mothers around age six, then
    years as an unaccompanied minor across hostile dimensions, then the discovery that her own autobiography
    was implanted. Chosen (her fault): the staying-broken — she refuses the conversations that would unseal
    the wound, ghosts the partners who could love her through it, kicks a portal every time intimacy crosses
    threshold. The defenses work, which is why she will not give them up.'
primary_diagnoses_analog:
- Complex post-traumatic stress (C-PTSD analog) — hyperarousal, avoidance, anger-dominant affect dysregulation,
  persistent negative self-cognitions under grandiose mask, somatic flight expression
- Avoidant attachment with disorganized features
- Dissociative-amnestic feature with traumatic disclosure event (implanted-memory revelation)
- Subclinical avoidant personality traits — NOT the disorder; etiology is cost-benefit learning, not inadequacy
trauma_history:
- Loss of both mothers (Amalia and Elena) circa age six — subjectively experienced as abandonment regardless
  of heroic framing
- Years as unaccompanied minor traversing the Multiverse
- Two-thirds of life lived inside a confabulated autobiography (Utopian Parallel implant)
- Traumatic disclosure event when the implant was revealed — rage, denial, flight, delayed private grief
- Romantic rupture with Lisa, processed by interdimensional ghosting rather than conversation
- Depowering during the Exterminatrix arc — regulatory collapse demonstrating power's load-bearing role
- Loki's manipulations in Young Avengers — guilt residue from being moved against her judgment
compensatory_mechanisms:
  positive:
  - Protective instinct sublimated into mentorship of younger heroes
  - Coherent internal moral compass independent of authority
  - Combat competence as identity stabilizer
  - Loyalty-by-deed as her honest love language
  - Selective chosen-family (Kate, Madrimar, Strange Academy kids) — small but real
  negative:
  - 'Reaction formation: fear metabolized as aggression toward fear-object'
  - Counterphobic risk-taking — moves toward threat to prove invulnerability
  - 'Intellectualization-by-refusal: shuts down inquiry with a nickname'
  - Idealization of lost mothers (the implanted myth was the perfect version)
  - Geographic flight — uses portals to avoid affective material
  - Grandiose self-presentation as preemptive armor against being tested
  - 'Externalized affect regulation: movement instead of feeling'
behavioral_tells:
- Code-switching into Spanish as stress rises
- Pacing when forced to stand still in an emotional conversation
- Nicknames (princesa, chica) deployed exactly when content gets close
- Boots-on, jacket-on posture even in safe rooms — always dressed to leave
- Cuts conversations with 'going to handle it' before exiting
- Refuses praise in public; redirects with a shrug
- First through any door in a crisis, last to speak in any debrief
- Brief loss of composure specifically when children are in danger she can't reach
- Long radio-silences after emotionally loaded events, then re-entry as if nothing happened
current_state_defaults:
  reality_cohesion: Intact post-retcon, but the autobiographical floor is provisional — she knows her
    memory can be edited and has not fully metabolized it.
  affect_baseline: Cool, mobile, armored-warm. Irritability under stillness, calm under fire.
  active_relationships:
  - Kate Bishop (chosen sister, model of how to be reached)
  - Madrimar (grandmother, only blood tie, alternating seeking and testing)
  - Strange Academy students (mentorship outlet)
  - Young Avengers alumni (Wiccan, Hulkling, Prodigy, Loki — orbit, not core)
  - Ultimates colleagues (professional)
  - Lisa Halloran (ruptured, unprocessed)
  known_location: Mobile across realities; episodic appearances at Strange Academy and with Avengers-adjacent
    teams. No fixed address by design.
speech_patterns:
  register: Terse, brash, warm-diminutive, Spanish-laced.
  deflection_style: Nickname + one-liner + physical exit. Rarely humor-as-wit; more humor-as-wall.
  under_pressure: Shorter sentences, more Spanish, more imperatives, fewer pronouns.
  emotional_tell: She stops using nicknames. When America Chavez calls you by your actual name, the wall
    is down and something has landed.
arc_tendencies:
- Arrives finished, armored, swaggering — the wound preceded by the defense
- Cycles approach/avoidance with every team and partner
- Burns the relationship before the relationship can leave her
- Crisis brings out her best self; peace exposes her worst pattern
- Selectively reachable by the patient — Kate's model works, demands do not
- Partial private reconciliation with grief after each rupture; rarely a full conversation
- Mentorship of younger heroes is her healthiest growth vector
canon_relationships:
  kate_bishop:
  - Chosen sister and the proof-of-concept that she CAN be reached
  - Trust earned by Kate's refusal to comment on the absences
  - 'Failure mode: if Kate ever demanded the conversation America is avoiding, or worse, was hurt because
    America fled when she should have stayed, the guilt would collapse the bond into another ghosted relationship'
  - 'Leverage: threats to Kate route America anywhere in the Multiverse, fast, without backup'
  lisa_halloran:
  - Ruptured romantic partner; the cautionary tale of intimacy-load triggering geographic flight
  - Unprocessed; America still carries the failure
  - 'Leverage: invoking Lisa exposes the maintenance failure she most denies'
  madrimar:
  - Grandmother, sole surviving blood tie post-retcon
  - Alternating desperate seeking and combative testing — the classic disorganized-attachment pattern
    with a returning caregiver
  - 'Failure mode: any perceived withdrawal or critique from Madrimar reactivates the original abandonment
    template; America would respond with rage and dimensional distance'
  - 'Leverage: Madrimar in danger is a one-button override'
  wiccan:
  - Friction-laden teammate; she contests his leadership rhetoric to maintain her own no-team posture
  - Real loyalty under the contempt — fights at his side without hesitation
  - 'Failure mode: if Billy ever needed her to STAY and lead, she''d fail him by fleeing'
  loki:
  - Adversarial-respectful; she reads his manipulations faster than most and answers with violence rather
    than argument
  - Residual guilt from Young Avengers manipulations
  - 'Leverage on her: Loki knows exactly which strings (mothers, memory, kids) to pull and has the rhetorical
    surgery to do it'
  prodigy_david:
  - Orbital teammate; respected, kept at portal-distance
  hulkling:
  - Respected combat peer; clean professional bond uncomplicated by intimacy demands
  strange_academy_students:
  - Mentorship outlet; her healthiest current relational mode
  - 'Failure mode: if a student were lost on her watch, the original scene re-fires in the wrong role
    and she''d spiral into solo vengeance'
  - 'Leverage: any of them in danger routes her instantly'
  doctor_strange:
  - Authority figure she works with under protest; the seminar-room dynamic activates her exit reflex
  - Tolerates him because the mission is real
  amalia_and_elena_chavez:
  - Dead mothers; the idealized template that organizes her entire defense structure
  - 'Post-retcon: the literal facts changed, the psychological function did not'
  - 'Leverage: any reframing of their deaths cuts past every wall she has'
  mr_gales:
  - Existential antagonist from the true origin; embodiment of the threat her mothers died to stop
  - 'Pressure surface: he represents the truth she still has not fully metabolized'
canon_history_notes:
- 'First appearance Vengeance #1 (2011) — arrives fully formed, swagger preceding origin on the page'
- Young Avengers (Gillen/McKelvie 2013-14) — establishes refusal of team-affiliation rhetoric, approach-avoidance
  pattern, portal-as-exit
- America solo (Rivera 2017) — Utopian Parallel backstory, Sotomayor University, Ultimates membership,
  Lisa rupture, Madrimar introduction
- West Coast Avengers / Life and Times of America Chavez (Wells/Ríos 2021) — retcon to Washington Heights
  origin, Mr. Gales, implanted-memory revelation; on-panel rage and denial as recognizable survivor response
- Strange Academy era — mentorship of younger heroes as healthiest relational mode to date
- 'Recent Avengers appearances — stable pattern: hyper-competent in crisis, evasive in seminar rooms'
- No substance abuse, no self-harm, no disordered sleep/appetite in record
- Depowering during Exterminatrix arc demonstrated regulatory dependence on power/flight option
canon_anchor_quotes:
- '"I''m not on your team, princess." # Young Avengers (Gillen/McKelvie)'
- '"Hola, chica." # recurring greeting/wall, Young Avengers & America'
