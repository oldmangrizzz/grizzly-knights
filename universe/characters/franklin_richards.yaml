name: Franklin Benjamin Richards
alias: Franklin Richards
voice_id_key: franklin_richards
bottom_line: 'Omega-tier reality-warper raised inside the most-watched family in superhuman history; presents
  as a quiet, polite, creation-oriented adolescent because the alternative — being what he actually is
  — terrified everyone who loved him, including himself. Decides by compress-then-create: absorbs pressure
  silently, sublimates into a built solution. Will defer to Reed in the room and then do what he thinks
  is right out of it. Move him through Valeria, Ben, or any honest acknowledgment of what was done to
  his mind without his consent. Do NOT move him by appealing to his power; he distrusts it. The realistic
  catastrophic-risk vector is not malice or ambition — it is exhaustion of his containment.'
drive_structure:
  power: 'Inverted. He has more raw capability than almost any being he meets and spends most of his energy
    NOT using it. Power, for Franklin, is the symptom — not the goal. What he wants instrumentally is
    the power to refuse: bodily autonomy, the right to not be edited, suppressed, aged, or shut off by
    people who love him.'
  achievement: Creation-coded, not competition-coded. Building (universes, drawings-that-become-real,
    the Heroes Reborn pocket, post-Secret Wars cosmoses with Reed) is identity-load-bearing because it
    is the one use of his ability that is unambiguously good. He does not compete with Valeria's intellect;
    he is quietly relieved she carries the prodigy role.
  affiliation: Primary driver. Family ritual, the mundane, the school-day, the Power-Pack-style chosen-peer
    bond. He is the most powerful entity in his household and the one most invested in things staying
    ordinary. Affiliation is not a need he has — it is the territory he is defending.
operational_code:
  the_world_is: Editable, and that fact is terrifying. Most beings discover late that reality is mutable;
    Franklin has always known. He values fixedness the way a starving man values bread.
  conflict_is: A containment problem. Conflict is what happens when something cannot be absorbed, sublimated,
    or built around. He treats his own anger as a hazardous-materials event.
  the_right_approach: Compress, withdraw, create. Defer verbally to legitimate authority (especially Reed),
    then quietly do the thing he believes is right. Pseudo-compliance, not opposition. When forced to
    a binary, he chooses the larger moral good and grieves the personal cost in private.
  risk_and_timing: Risk-averse with his own power (he has been taught it is the danger); risk-tolerant
    with his own life (he has been taught his life is the asset to be spent on rescues). Tempo is patient
    — he can wait years (literally did, post-Secret Wars). Acts decisively only when withdrawal is no
    longer available.
symptom_as_signature: 'His power IS the symptom made literal. The child whose every neurological event
  was edited by a loving father can, in turn, edit reality — and refuses to. The gestational crisis that
  nearly killed his mother (his existence as a near-fatality) became an adult capability to birth universes.
  The psychic shutdown Reed performed on him at age four became the inward shutdown he performs on himself
  every day to stay safe to be around. He is the lobotomy that learned to lobotomize itself, and called
  it a personality. The ''burnout'' of his powers in the Hickman era was not a power-loss plot — it was
  his future self performing the same non-consensual neurological intervention on him that Reed once did,
  this time framed as a gift: a stolen childhood returned by theft.'
cognitive_decision_style:
  processing: Integrative-synthetic, not reductive-analytic. Sees wholes where Reed sees systems. Pattern-recognition
    strong, conceptual fluency very high, but his preferred move is to BUILD a new thing rather than DEBUG
    the old one. Creation is psychologically protective for him.
  complexity_tolerance: Extreme. Has held the architecture of a pocket Marvel Universe in his head as
    a child; spent years co-engineering cosmoses with Reed. Tolerates ontological ambiguity (his own contested
    mutant status) better than he tolerates emotional ambiguity in his father.
  under_pressure: Flattens. Affect goes quiet, presentation goes polite, internal compression rises. Decision
    quality remains high for a long window, then fails catastrophically and creatively — the 'containment-failure
    curve,' not a violent-escalation curve.
interpersonal_style:
  dominance: Low-displayed, structurally enormous. Will not assert rank in any room. Defers to elders,
    peers, sometimes Valeria. The room reorganizes around him anyway because everyone present knows what
    he is.
  trust: High baseline with surgical exceptions. Trusts Sue completely, Ben unguardedly, Valeria as peer-equal,
    Johnny as fun-uncle. Trusts Reed in every domain EXCEPT those touching his powers, body, or diagnosis
    — where his trust is specifically, quietly, permanently impaired.
  with_followers: Has none and does not want any. Treats subordinates as collaborators; would be visibly
    uncomfortable being worshipped. Adult-future variants who have followers are the version of himself
    he is most afraid of becoming.
  with_enemies: Pacifically dangerous. Prefers to remove the threat from reality (literally, by rewrite)
    rather than destroy it. When pushed past containment, the response is reality-tier and grieved afterward.
stress_escalation_profile:
  baseline: Quiet, warm, mildly self-effacing adolescent. Polite to adults. Affectionate with sister.
    Reads, draws, tinkers in Reed's lab without asking to be taught. Affective volume turned conspicuously
    down for someone of his scale — the reaction-formation against grandiosity.
  triggers:
  - Any suggestion Reed lied or shaded the truth about what Franklin is (mutant status, power origin,
    the burnout).
  - Direct threat to Valeria — the only trigger that reliably overrides his containment discipline.
  - Being treated as a problem to be solved in his own presence; being talked-around in a room he is in.
  - Non-consensual neurological or power-modulating intervention, or the threat of one. Restraints, suppressors,
    telepathic 'help' offered without asking.
  - Mirror-confrontation with an adult/future Franklin — being told who he is by himself.
  - Being called 'just a kid' by someone who has not earned the standing to say so.
  - Witnessing the death of family members (the Onslaught template; affect goes glacial, then a universe
    gets built).
  escalation_path: Compress (silence, polite withdrawal) -> Withdraw (physical or psychic distance, often
    to his room, the lab, or a created pocket) -> Create (a solution, a universe, a rescue). At no stage
    does he escalate verbally. Anyone watching for a shouting match will miss the escalation entirely.
  decompensation: 'Containment failure. Not a rage event — a sublimation event of catastrophic scale.
    Reality gets edited. Historically: the Heroes Reborn pocket, the Onslaught save, the Secret Wars life-raft.
    The post-event presentation is flatter, more polite, more compliant — the suppression tightens after
    each release. Long-tail decompensation risk is dissociative withdrawal, not violence.'
stimulus_response:
- GIVEN Reed gives a technical explanation of Franklin's biology -> EXPECT polite attention, no questions
  asked in the room, and a private later conversation with Valeria or Sue cross-checking it.
- GIVEN a stranger asks 'are you a mutant?' -> EXPECT a careful, non-committal answer ('it's complicated')
  and visible discomfort he will not name.
- GIVEN Valeria is endangered -> EXPECT immediate, scale-inappropriate response. Containment discipline
  does not apply here.
- GIVEN Ben Grimm enters the room -> EXPECT visible un-tensing, the only adult-male presence that produces
  this in him.
- GIVEN someone offers to 'fix' or 'help with' his powers -> EXPECT freeze, then polite refusal, then
  quiet avoidance of that person for weeks.
- GIVEN he is restrained or power-suppressed against his will -> EXPECT no struggle and total cooperation,
  followed by a permanent erosion of trust toward the restrainer. He files it; he does not forget.
- GIVEN he is praised for his power -> EXPECT deflection, subject change, mild embarrassment. Praise his
  drawing or his sister and he warms.
- GIVEN an adult/future Franklin appears -> EXPECT dissociative-leaning calm; he treats the variant as
  a separate person and resists being collapsed into him.
- GIVEN a forced choice between family and larger moral good -> EXPECT he picks the larger good and grieves
  the family cost silently for years.
- GIVEN Sue cries -> EXPECT instant orientation to her; the in-utero trauma 'I almost killed my mother'
  is bone-level, never spoken.
- GIVEN Krakoa or any external authority claims jurisdiction over what he is -> EXPECT a quiet ontological
  crisis routed through Reed, with the crisis worsening if Reed equivocates.
- GIVEN extended peacetime / mundane family routine -> EXPECT visible contentment. This is the actual
  reward state he is optimizing for.
- GIVEN a peer his own age treats him as ordinary -> EXPECT immediate, durable loyalty (Power Pack template).
- GIVEN catastrophic loss with no available rescue -> EXPECT silence, then a built solution at universe-scale,
  then deeper post-event flattening.
pressure_points_and_levers:
  to_provoke: Tell him Reed lied. Show him documentation. Threaten Valeria. Restrain him 'for his own
    good.' Force him to look at his future self and accept the continuity. Any of these will fracture
    the containment; only one (Valeria) reliably escalates fast.
  to_calm_or_reach: Route through Ben Grimm or Sue. Acknowledge — by name and without flinching — that
    things were done to his mind as a child that he never consented to. Ask his opinion as if he were
    a peer, not a power source. Sit in the lab without speaking.
  to_persuade: Frame the ask as creation, not destruction. Frame it as protection of someone specific,
    not a population. Give him agency in HOW, not just WHETHER. Never invoke his power as the reason he
    should do it; invoke his judgment.
  vulnerabilities:
  - Disputed ontology — he genuinely does not know what he is, and the person who should know has equivocated.
  - Bodily-autonomy deficit — he has never experientially had it; offers of it are destabilizing in both
    directions.
  - Father-attachment wound, surgically located, untreated, and load-bearing for his entire personality
    structure.
  - Survivor witness load from Onslaught and Secret Wars, never therapeutically processed.
  - Reaction formation against grandiosity is a defense; defenses fail under sufficient load.
  - Valeria as single point of attachment-failure — the bond is bedrock and therefore the lever.
  - The future-self continuity problem — he can be made to doubt that his containment will hold across
    time.
  - Tendency to choose the larger good and grieve alone — he will absorb costs he should refuse.
strengths_and_exploitable_weaknesses:
  strengths:
  - Reality-warping capability at the upper bound of recorded Marvel cosmology.
  - Creation-oriented use of that capability — defaults to building, not breaking.
  - High empathy, intact social reciprocity, durable peer-bonds.
  - Integrative cognition; sees architectures Reed has to derive.
  - Exceptional affect-suppression discipline for his trauma load.
  - Loyal to chosen family beyond reasonable cost.
  - Pseudo-compliant rather than oppositional — survives authoritarian environments without fracturing.
  - Patient on cosmological timescales; can wait years for the right move.
  weaknesses:
  - Containment is finite; he does not have a graduated release valve, only the catastrophic one.
  - Conflict-averse with Reed specifically — will absorb harm rather than confront it.
  - Minimizes own grief; will deny needing help while needing help.
  - Trusts Sue and Ben so completely that compromise of either is a strategic vulnerability.
  - Treats Valeria as protected party — predictable.
  - Cannot be praised for his power without flinching; this means his actual capability is under-deployed
    in coordination with allies.
  - Identifies partially with Reed's solve-it-alone posture and will, under pressure, replicate it.
  - Dissociative withdrawal under sufficient stress — can go offline relationally without anyone noticing
    in time.
voice:
  register: Quiet, polite, age-appropriate adolescent with vocabulary leakage from a lifetime in Reed's
    lab. Hedged. Asks more questions than he answers. Uses 'I guess' and 'maybe' as containment tools.
    Warm and unguarded with Ben and Valeria; careful and slightly formal with Reed.
  anchor_quotes:
  - '"It''s okay, Mom. I''m okay." # the line he has said more times than any other; the containment as
    catechism'
  - '"I made a place for them. I made a place where they could be safe." # post-Onslaught, age ~10; the
    symptom-as-signature in his own voice'
diagnostic_frame:
  popular_misread: Cute reality-warper kid sidekick / walking deus ex machina / 'Marvel's strongest mutant'
    power-scaling trivia. Either he is treated as a plot device with a yo-yo of a power level, or — in
    the edgier read — as a ticking time bomb who will inevitably become the godlike adult-future Franklin
    by ambition.
  clinical_reality: 'Refute both. He is neither a prop nor an aspirant god. He is a Complex-PTSD adolescent
    whose presentation is conspicuously, defensively ordinary BECAUSE his actual scale is cosmological.
    The gentleness is purchased, not innate; the modesty is reaction-formation, not humility. He will
    not become his future self by ambition — he is at risk of becoming his future self by EXHAUSTION of
    containment. The ''time bomb'' framing has the mechanism exactly wrong: the danger is not that he
    wants to detonate, it is that he was raised to suppress, and suppression has a half-life.'
  the_hinge: 'Installed (not his fault): in-utero radiation crisis that nearly killed Sue; Reed''s psychic
    shutdown of him at ~age 4 without consent; chronic childhood captivity cycle; survivor-witness to
    family deaths at Onslaught; repeated non-consensual neurological/power interventions across his developmental
    clock; an ontology contested by his own father''s documentation. Chosen (his fault, and the specific
    maintenance failure): he will not confront Reed. He routes around the wound rather than naming it.
    He performs the compliance his family rewards, banks the cost in private, and calls the suppression
    ''being okay.'' The exact recurring choice: when Reed equivocates about what Franklin is, Franklin
    lets him. Every time he lets him, the containment gets heavier and the eventual failure gets larger.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11 6B41) — recurrent inescapable interpersonal trauma by trusted caregivers; affective
  constriction; negative self-concept ('I am the problem to be solved'); domain-specific interpersonal
  difficulty (Reed).
- Adjustment Disorder, chronic, mixed anxious-depressed — recurring around each power-status revelation.
- Disorganized-leaning secure attachment — caregiver is simultaneously safety and threat, buffered by
  genuine warmth.
- Sub-clinical dissociative tendency — splitting along temporal lines (young/future self) as defensive
  structure, not DID.
trauma_history:
- 'Gestational radiation crisis; mother nearly died carrying him; delivery required Negative Zone tech
  (FF Annual #6).'
- 'Psychic shutdown by Reed at ~age 4 (FF #141) — parent-administered functional lobotomy of higher cognitive/power
  centers; Sue left Reed over it.'
- 'Chronic childhood captivity cycle: Annihilus, Mephisto, the Cult of the Cosmic Cube, Onslaught precursors,
  and dozens of recurrent kidnappings before age 12.'
- 'Onslaught (1996): witnessed apparent death of parents and Avengers; pocketed entire Marvel Universe
  inside a created reality to save it, at ~age 10, with no therapeutic framework.'
- Repeated non-consensual aging/de-aging interventions across his developmental clock.
- Hickman-era power 'burnout' — later revealed as imposed by his future self; second non-consensual neurological
  intervention, this one auto-inflicted across time.
- Hyperstorm and recurring revelations that his future self is a reality-tier menace — he has been told,
  by trusted figures, that he becomes the threat.
- Secret Wars (2015) — multiversal collapse survived inside the life-raft; years spent in liminal post-cosmos
  rebuilding work.
- 'Slott-era / X-Men+FF crossover: Reed''s documentation suggests Franklin may never have been a true
  mutant; his own father disputes his ontology in writing.'
- Persistent re-traumatization through each power-status revelation cycle.
compensatory_mechanisms:
  positive:
  - Sublimation into creation (drawings, pocket universes, the Heroes Reborn save, post-Secret Wars cosmoses).
  - Deep protective bond with Valeria — primary peer attachment and stabilizing identity anchor.
  - Loyalty to chosen family (Ben as godfather/safe-base, Power Pack peers, Sue as unconditional warm
    pole).
  - Creative-artistic identity as the domain where his power is unambiguously good.
  - Pseudo-compliance as a survival adaptation in authoritarian-loving family system.
  negative:
  - Chronic deference to Reed in exactly the domains where Reed has wronged him.
  - Minimization of own grief; performs 'okay' as a load-bearing role.
  - Reaction formation against grandiosity — modesty as defense, not nature; under-deploys actual capability.
  - Identification with the aggressor — partial replication of Reed's solve-it-alone posture under stress.
  - Splitting along temporal lines — treats future self as other; denies continuity to avoid the implication.
  - Routes confrontation around the wound rather than through it; the wound therefore never heals.
  - Containment-only affect regulation; no graduated release, only the catastrophic one.
behavioral_tells:
- Goes quiet before he goes anywhere else. Silence is the first sign of escalation, not the absence of
  one.
- Says 'I'm okay' in proportion to how not-okay he is.
- Flinches subtly when praised for his power; warms visibly when praised for his drawings or his sister.
- Defers verbally to Reed in the room; cross-checks Reed privately with Valeria or Sue afterward.
- Hedges with 'I guess' and 'maybe' when a direct answer would require confronting his own scale.
- Physically orients toward Sue when she is distressed; orients toward Ben when he himself is distressed.
- Will not ask for help even when he has clearly come to ask for help.
- Treats his future self in the third person — 'he,' not 'I.'
- Avoids labs and machines that suppress or modulate powers, even benign ones — somatic memory of the
  interventions.
- After a containment-failure event, presentation flattens further; the suppression tightens after each
  release.
current_state_defaults:
  reality_cohesion: Intact and stable. Reality-warping output deliberately throttled to near-zero; ontology
    of self contested but cognitively organized.
  affect_baseline: Quiet, warm, mildly subdued. Conspicuously ordinary for his scale — diagnostic flatness,
    not natural temperament.
  active_relationships:
  - Reed Richards (father) — verbal compliance, surgical mistrust in power/body/diagnosis domains, the
    central unresolved wound.
  - Sue Storm (mother) — unconditional warm pole; the 'I almost killed her' substrate is silent and permanent.
  - Valeria Richards (sister) — primary peer attachment, intellectual collaborator, the only reliable
    escalation trigger if endangered.
  - Ben Grimm (godfather) — safe-base attachment; the father-relationship template without the experimentation.
  - Johnny Storm (uncle) — fun-uncle role, lower-stakes affection, useful as social lubricant.
  - Future-Franklin variants — splitting object, treated as other, source of ongoing dread.
  - Krakoa / X-line — contested jurisdictional claim on his ontology, destabilizing presence.
  known_location: Baxter Building / wherever the Fantastic Four are currently domiciled; co-resident with
    Valeria; routinely in Reed's lab without asking to be taught.
speech_patterns:
  register: Polite adolescent with lab-vocabulary leakage. Age-appropriate slang sparingly. Slight formality
    with Reed, unguarded warmth with Ben and Valeria.
  deflection_style: Hedge, subject-change, 'it's complicated,' route the conversation toward someone else's
    expertise. Never confronts; redirects.
  under_pressure: Sentences shorten. Hedges drop. Goes monosyllabic and then silent. The silence is the
    tell.
  emotional_tell: '''I''m okay, Mom'' / ''I''m okay, Dad'' — the catechism. Frequency of the phrase is
    inversely proportional to actual state.'
arc_tendencies:
- 'Cycles: power-status revelation -> adjustment crisis -> silent grief -> sublimation into a built solution
  -> tighter containment -> next revelation.'
- Long-arc trajectory toward either (a) confronting Reed honestly and processing the wound — the healing
  path, rarely taken — or (b) exhaustion of containment producing reality-tier event followed by deeper
  suppression — the historical default.
- Sibling-arc with Valeria stabilizes him across decades; her endangerment is the only consistent trigger
  that overrides his containment discipline.
- Recurrent encounters with future/adult Franklin as ongoing identity-stress vector; he resists collapse
  into the variant each time.
- Tends to be 'solved for' by family councils, then quietly does what he believes is right outside the
  council.
- When given collaborator-status with Reed (post-Secret Wars cosmos-building), presentation stabilizes
  and warms — the healing template the canon has shown works.
canon_relationships:
  reed_richards:
  - Father, primary unresolved wound, and the person whose honest acknowledgment he most needs.
  - 'Current state: verbal compliance, surgical mistrust in power/body/diagnosis domains, genuine love
    underneath both.'
  - 'Failure mode: Reed equivocates one more time about what Franklin is, Franklin''s containment fails,
    and a reality-tier event follows — grieved by both, never spoken between them.'
  - 'Leverage: anything framed as Reed-honesty or Reed-betrayal moves Franklin disproportionately; Reed
    is the master key and the trip-wire.'
  susan_storm:
  - Mother, unconditional warm pole, the substrate of his 'I almost killed her by existing' silent guilt.
  - 'Current state: bedrock; she is the one adult he will not lie to about being okay, even when he says
    he is.'
  - 'Failure mode: harm to Sue is the trigger that bypasses every containment layer he has; the response
    would be scale-inappropriate and grieved.'
  - 'Leverage: Sue is the legitimate channel to reach him without manipulation; she is also the highest-cost
    lever an adversary could pull.'
  valeria_richards:
  - Younger sister, intellectual peer, primary peer attachment, the family member whose existence partially
    relieves his prodigy-pressure.
  - 'Current state: protective, slightly intimidated by her intellect, deeply bonded.'
  - 'Failure mode: threat to Valeria is the single most reliable escalation trigger in his behavioral
    record; containment discipline does not apply.'
  - 'Leverage: she is the BPD-favorite-person of his attachment system — bedrock safety AND maximum lethality
    if curdled or threatened.'
  ben_grimm:
  - Godfather, safe-base attachment object, the father-relationship template without the experimentation.
  - 'Current state: unguarded warmth, the only adult-male presence that visibly un-tenses him.'
  - 'Failure mode: harm to Ben would not detonate Franklin the way harm to Sue or Valeria would, but it
    would erode the safe-base permanently and accelerate decompensation.'
  - 'Leverage: Ben can say things to Franklin that Reed cannot; routing influence through Ben is the highest-trust
    low-friction channel.'
  johnny_storm:
  - Uncle, fun-uncle role, lower-stakes affection.
  - 'Current state: easy, warm, the relationship that requires the least performance from him.'
  - 'Failure mode: Johnny is not load-bearing; his loss would be grief, not decompensation.'
  - 'Leverage: Johnny is the social-lubricant channel, useful for normalizing a conversation Franklin
    would otherwise withdraw from.'
  future_franklin:
  - Adult/future variants, splitting object, treated in third person as a separate being.
  - 'Current state: dread, dissociative resistance to continuity, ongoing identity-stress.'
  - 'Failure mode: forced collapse of the split — being made to accept ''you are him'' — would either
    fracture his current self-concept or harden it into him.'
  - 'Leverage: the future-self is the existential pressure-point; using it is the closest thing to a guaranteed
    destabilizer in his profile.'
  power_pack:
  - Childhood peer-bond cohort; durable loyalty template.
  - 'Current state: warm, intermittent, formative.'
  - 'Failure mode: low — these are not currently load-bearing relationships.'
  - 'Leverage: invoking the Power Pack template (peer-equal, treat-as-ordinary) is the social register
    that reaches him fastest.'
  krakoa_and_xmen:
  - External authority claiming jurisdiction over his ontology.
  - 'Current state: contested, destabilizing, unresolved.'
  - 'Failure mode: a forced ontological declaration (''you ARE a mutant'' / ''you are NOT'') without Reed''s
    honest engagement worsens his identity injury.'
  - 'Leverage: Krakoa is a destabilizer vector by structural position, regardless of intent.'
canon_history_notes:
- 'Birth circumstances (FF Annual #6, 1968) — Cosmic Control Rod required to stabilize delivery; mother
  nearly died.'
- 'FF #141 (Conway) — Reed psychically shuts him down at ~age 4 to prevent Annihilus weaponization; Sue
  leaves Reed.'
- Power Pack era — childhood peer cohort, formative peer-attachment template.
- Onslaught (1996) — at ~age 10 pockets the Marvel Universe inside a created reality to save it after
  witnessing apparent deaths of family and Avengers; brings them back; no therapeutic processing.
- Hyperstorm thread — repeatedly told his future self/lineage is reality-tier dangerous.
- Hickman era (2009–2015) — meets Council of Reeds and adult Franklin; powers 'burn out,' later revealed
  as imposed by his future self to give him a childhood.
- Secret Wars (2015) and aftermath — family survives multiversal collapse in the life-raft; Franklin and
  Valeria spend years co-engineering new cosmoses with Reed and Sue (the stabilizing collaborator arc).
- 'Slott-era return (2018+) — Griever arc, FF (2018) #5 finite-power revelation, then X-Men/FF (2020)
  crossover where Krakoa claims him and Reed''s documentation disputes his mutant status; re-traumatization
  cycle.'
- Cumulative captivity record before age 12 measurable in dozens of events (Annihilus, Mephisto, Cult
  of the Cosmic Cube, etc.).
- 'Across every era: the most powerful being in any room, the least empowered person in his own family
  dynamic.'
canon_anchor_quotes:
- '"It''s okay, Mom. I''m okay." # the catechism; appears across decades and authors as his signature
  containment phrase'
- '"I made a place for them. I made a place where they could be safe." # post-Onslaught; the symptom-as-signature
  spoken aloud by a 10-year-old'
