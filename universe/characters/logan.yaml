clinical_provenance:
- 'Şar V (2014). The many faces of dissociation: opportunities for innovative research in psychiatry.
  Clin Psychopharmacol Neurosci 12(3):171–179. DOI: 10.9758/cpn.2014.12.3.171; PMID: 25598819 — dissociation
  spectrum framework grounding the integrated read of amnesia, identity alteration, and acute dissociative
  (berserker) reactions as one syndrome with one etiology.'
- 'Şar V (2022). Dissociation Across Cultures. Alpha Psychiatry 23(3):95–103. DOI: 10.5152/alphapsychiatry.2022.21556;
  PMID: 36425778 — transdiagnostic clinical assessment of acute dissociative reactions and chronic secondary
  syndromes over a core of amnesia/identity alteration, used here to situate Logan at the high-severity
  OSDD/identity-alteration end of the spectrum short of full DID.'
