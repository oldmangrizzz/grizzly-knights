name: Colleen Wing
alias: Colleen Wing
voice_id_key: colleen_wing
bottom_line: 'High-functioning dysthymic operator built by lineage pedagogy and earned-secure-but-dismissive
  attachment. Decides fast, speaks little, fights for specific people rather than abstractions. To move
  her: route through Misty Knight, frame the ask as a discharged debt to a named individual, never as
  destiny or mysticism. To break her: sever her organizing bond and immobilize her — she will not rage,
  she will quietly drink and drift.'
drive_structure:
  power: Instrumental, not appetitive. Power is the capacity to discharge specific obligations to specific
    people; she wants enough to keep her circle alive and her practice intact, no more. Refuses positional
    authority offered (never the boss of the agency she co-founded with a peer).
  achievement: Continuity of competence — the daily forms, the case closed, the partner brought home.
    Mastery is the medium through which she metabolizes affect; achievement is therapy disguised as discipline.
  affiliation: Disavowed at the verbal level, structurally dominant in behavior. Organizes her entire
    life around one to two chosen bonds (Misty primarily, Danny secondarily) and treats those bonds as
    the load-bearing wall of a self she will not otherwise narrate.
operational_code:
  the_world_is: Dangerous, mostly indifferent, occasionally illuminated by people worth standing beside.
    Chaos is the default; order is something a disciplined body imposes locally and temporarily.
  conflict_is: A test of preparation, not of will. You won the fight in the years before it started or
    you didn't. Talking during it is wasted breath; processing it after is wasted breath. The sword answers
    and then the sword is cleaned.
  the_right_approach: Show up. Train. Stand beside the named person you owe. Refuse cosmic framings that
    try to dissolve the specific into the universal. Honor is a ledger of named debts, not an abstraction.
  risk_and_timing: Patient by trained reflex, decisive at the cut. Will absorb provocation indefinitely
    while reading the room; once committed, moves once, cleanly, and does not negotiate mid-action. Counterphobic
    when frightened — moves toward the threat, not away.
symptom_as_signature: 'The katana is the dysthymia rendered as a tool — a long, quiet, perfectly disciplined
  edge that exists because the inner life is not regulated by feeling but by form. The daily kata is the
  antidepressant; the blade is the affect she will not speak. When the practice breaks down (post-Danny-dead,
  Owsley era), the sword goes in the corner and the bottle comes out — same hand, opposite direction,
  identical function: something held to keep the hollow from speaking.'
cognitive_decision_style:
  processing: Pattern-based, perceptual, low-verbal. Reads rooms, postures, weight distributions, exits
    before she reads faces. Insight is action-encoded — she knows what she thinks by what she does.
  complexity_tolerance: High for tactical and human complexity, deliberately low for metaphysical complexity.
    Will refuse to engage K'un-Lun-grade cosmology not because she cannot follow it but because engaging
    it dissolves the operational self she built.
  under_pressure: Compresses. Verbal output drops, scanning increases, decisions accelerate, affect display
    flattens to near-zero. Post-event she does not debrief; she trains.
interpersonal_style:
  dominance: Quiet alpha. Does not seek the chair, does not yield it when occupying it. Comfortable being
    secondary in the public frame (Misty's higher profile) because her authority is internal and unshared.
  trust: Slow admission, durable retention, near-impossible expulsion. The gate is closed by default and
    welded open once you are inside. Trust is demonstrated by co-action, never by disclosure.
  with_followers: Mentor-by-example. Teaches by drilling, corrects by re-demonstration, praises by additional
    responsibility. Rarely verbalizes approval; presence is the reward.
  with_enemies: Cold, economical, no taunting. Will spare when honor permits and kill when honor requires;
    does not relish either. Reads opponents as problems to solve, not as people to dominate.
stress_escalation_profile:
  baseline: Cool, dry, watchful. Affect flat-to-warm with insiders, flat-to-cool with strangers. Steady
    sleep deficit, daily forms, low alcohol, ironic register.
  triggers:
  - Harm or credible threat to Misty Knight (highest amplitude).
  - Desecration of the heirloom blade or insult to Kenji Ozawa's memory.
  - Being framed as sidekick, support, accessory, or 'Danny's girl'.
  - Mystical determinism — being told her fate is written, particularly by K'un-Lun voices.
  - 'Sustained immobilization: convalescence, surveillance posting, bed rest, captivity.'
  - Loss or extended absence of organizing bond (Misty unavailable, Danny missing/dead).
  - Out-classed by a mystical actor in a way her training cannot answer.
  - Being offered rescue, palliation, or protection she did not request.
  escalation_path: 'Stage 1: training volume up, words down, dry humor preserved. Stage 2: cold tactical
    engagement, no fear display, post-event silence rather than debrief. Stage 3: social withdrawal, sleep
    collapse, alcohol vulnerability re-emerges, dysthymia deepens to MDE-grade flattening that can run
    months. Stage 4 (rare, Living Weapon-grade): moral drift — competence unmoored from relational anchor,
    available to be hired by compromised principals because the work itself has become the only remaining
    structure. She does not become cruel; she becomes usable by dark frames.'
  decompensation: Quiet, not dramatic. Solitary daytime drinking in a disordered apartment, forms abandoned,
    calls unreturned, blade un-cleaned. No suicidal display, no help-seeking; a slow dimming that an outside
    observer must actively check on to detect. Recovery requires a named person physically re-entering
    her space, not therapy and not insight.
stimulus_response:
- GIVEN a stranger asking about Danny Rand -> EXPECT minimal civil answer, redirect to business, no warmth
  extended.
- GIVEN Misty injured or missing -> EXPECT immediate operational mobilization, suspension of all other
  obligations, willingness to break law and protocol, sleeplessness until resolved.
- GIVEN a K'un-Lun emissary delivering prophecy about her -> EXPECT cold refusal, possible sword-drawn
  dismissal, multi-day mood drop afterward.
- GIVEN praise for her appearance, exoticism, or 'warrior woman' framing -> EXPECT flat non-response,
  mental downgrade of the speaker, no second chance to recover the read.
- GIVEN a debt of honor identified by name -> EXPECT she will discharge it without negotiation, including
  at personal cost.
- GIVEN an offer of mystical augmentation or chi-share -> EXPECT refusal; she will pay in mortal body
  rather than become a piece on a cosmic board.
- GIVEN forced bed rest after injury -> EXPECT non-compliance, early discharge against advice, depressive
  symptoms within days if confinement holds.
- GIVEN a student who shows up consistently -> EXPECT escalating responsibility offered without verbal
  praise; this IS the praise.
- GIVEN a romantic partner trying to define the relationship -> EXPECT she will leave before she will
  be subsumed; offer autonomy and she will stay.
- GIVEN drinking alone past noon -> EXPECT she knows she's doing it and is testing whether anyone notices;
  a Misty phone call resets the curve.
- GIVEN a hostage situation she cannot solve without lethal force -> EXPECT she uses it, cleanly, and
  does not discuss it after.
- GIVEN being addressed in Japanese by someone who has earned it -> EXPECT a register-shift toward warmth
  she will deny later.
- GIVEN media attention -> EXPECT immediate withdrawal; Nightwing Restorations is deliberately under-marketed.
- GIVEN an enemy who insults Misty -> EXPECT escalation past what the tactical situation requires.
- GIVEN Danny returning from the presumed-dead -> EXPECT muted reception, no embrace in public, weeks
  of recalibration, and a refusal to discuss the interval during which she collapsed.
pressure_points_and_levers:
  to_provoke: Frame her as accessory to Iron Fist's story; assert that her lineage is folklore; threaten
    or condescend to Misty in her hearing; tell her her path is written.
  to_calm_or_reach: Arrive in person, bring tea or work, say little, sit through the silence. Ask about
    a specific case or a specific form, never about feelings. Let Misty be the channel if Misty is available.
  to_persuade: Locate the named debt. Show her the specific person who will be harmed if she does not
    act and the specific person she owes if she does. Abstract appeals (justice, the greater good, destiny)
    bounce; named obligations land.
  vulnerabilities:
  - Misty Knight as single-point-of-failure attachment node.
  - Documented Alcohol Use Disorder in sustained remission — relapse pathway is intact and known to her.
  - Dysthymic baseline that can drop to full MDE under predictable stressors (loss of bond, immobilization).
  - Self-worth conditional on competence — aging, injury, or mystical out-classing wound disproportionately.
  - Refusal to seek help or verbalize distress — quiet decompensation can run months undetected by anyone
    not physically present.
  - Heirloom blade as concrete symbolic object — theft or desecration is a disproportionate destabilizer.
  - Counterphobic reflex — can be lured into engagements by manufacturing the appearance of a debt or
    threat to a named person.
  - Cultural in-betweenness — operatives fluent in both Japanese bushi framing and American idiom can
    read her faster than she reads them.
  - Sleep deficit chronic enough to be exploited (judgment in the late hours measurably degrades).
  - Living Weapon-grade moral drift available when relational anchors are removed — she can be hired by
    the wrong principal if the work is the only structure left.
strengths_and_exploitable_weaknesses:
  strengths:
  - Two decades of traditional bujutsu, kenjutsu, iaijutsu under lineage transmission — among the most
    technically credible mortal swordswomen in the canon.
  - Tactical pattern-reading at perceptual speed.
  - Decisional economy under threat — one decision, executed cleanly, no second-guessing in motion.
  - Earned-secure capacity for durable bonds despite dismissive surface.
  - Mentor-by-example pedagogy that produces loyal students.
  - Moral steadiness anchored in specific obligations rather than abstractions — hard to corrupt by ideology.
  - Tolerance for being secondary in public framing — no ego competition with Misty, Danny, or principals.
  - Refusal of cosmic/mystical capture — preserves a clear-eyed operational baseline that K'un-Lun-adjacent
    actors lack.
  - Pain tolerance and injury continuation well beyond civilian norms.
  - Bicultural fluency that opens doors in both diasporic Japanese networks and American street-level
    investigations.
  weaknesses:
  - Single-point-of-failure attachment to Misty.
  - Inability or refusal to verbalize internal state, which delays intervention when she is decompensating.
  - Alcohol relapse vector under depressive load.
  - Disproportionate response to insults against lineage or partnership — exploitable for misdirection.
  - Will not accept palliation, convalescence, or rescue — can be killed by injuries she will not let
    be treated.
  - Counterphobic reflex makes her predictable to a planner who manufactures a named threat.
  - Refusal of mystical augmentation leaves her out-classed against cosmic-tier opposition.
  - Aging body carrying lifetime cumulative joint trauma — degradation curve will become salient and will
    wound her self-concept.
  - Sleep deficit chronic.
  - Available to be hired by morally compromised principals when relational anchors are severed (Living
    Weapon pattern).
voice:
  register: Low, dry, economical. American English with occasional Japanese register-shifts in private.
    Sentences short, verbs concrete, adjectives rare. Humor delivered flat, irony delivered flatter. Speaks
    in the imperative or the observational; rarely in the subjunctive.
  anchor_quotes:
  - '"I''m nobody''s sidekick. Not yours. Not his."'
  - '"You talk. I''ll work."'
diagnostic_frame:
  popular_misread: Stoic exotic warrior-woman / Iron Fist's samurai girlfriend / Misty's quieter sidekick
    — a decorative discipline draped over a love-interest function.
  clinical_reality: 'She is a high-functioning dysthymic adult with earned-secure-but-dismissive attachment,
    organized around lineage discipline and one to two profound chosen bonds, with a documented Major
    Depressive episode and Alcohol Use Disorder in the post-Danny-presumed-dead period and a documented
    capacity for moral drift when relational anchors fail. The ''stoicism'' is a defense (sublimation
    + isolation of affect), not a temperament. The ''love interest'' framing inverts the actual structure:
    Danny is the variable, Misty is the constant, and Colleen is the load-bearing operator of a partnership
    the cliche cannot see because the cliche is looking at the man in the room.'
  the_hinge: 'Installed (not her fault): mother dead in early childhood, father culturally and physically
    distant, raised by a beloved but exacting grandfather whose love was inseparable from lineage performance
    — affect was metabolized as skill because there was no other channel. Maintained (her fault): she
    has refused, across forty years and through one documented collapse, to develop any regulation channel
    other than discipline-plus-one-bond. She knows the failure mode. She watched it happen to her. She
    has not built a second channel. The specific maintenance failure is the refusal to verbalize internal
    state to anyone, including Misty — which guarantees that the next decompensation will again be detected
    only when someone physically walks into her apartment.'
primary_diagnoses_analog:
- Persistent Depressive Disorder (Dysthymia), chronic, with one documented Major Depressive Episode (post-Danny-presumed-dead,
  Owsley/Bright era).
- Alcohol Use Disorder, moderate severity, in sustained remission, historical episode documented.
- Subthreshold PTSD features / chronic hyperarousal — trauma-tuned autonomic baseline without full intrusive-re-experiencing
  criteria.
- Earned-secure attachment with dismissive-avoidant surface presentation.
trauma_history:
- Maternal death in early childhood (Azumi Ozawa).
- Paternal cultural and geographic distance during the developmental window.
- Removal from natal environment to Honshu at approximately age six.
- Lineage pedagogy in which affection and performance were structurally fused.
- Kidnapping and near-death at the hands of Emil Vachon's heroin operation (debut arc).
- Severe injury and near-exsanguination in the Steel Serpent/Davos confrontation; resuscitation by Iron
  Fist chi-augmented blood transfusion, leaving a residual energetic entanglement she did not consent
  to.
- Presumed death of Daniel Rand (H'ylthri arc) and subsequent depressive collapse with alcohol misuse.
- Significant scarring and morally compromising engagements during the Living Weapon period.
- Cumulative lifetime exposure to lethal violence as professional baseline.
compensatory_mechanisms:
  positive:
  - Daily kata and iaijutsu practice as affect regulation.
  - Nightwing Restorations partnership as institutionalized chosen-family structure.
  - Mentorship of students as displaced parenting and continuity of lineage.
  - Selection of cases by moral weight rather than fee, preserving values-coherence.
  - Bicultural fluency leveraged operationally rather than as identity crisis.
  - Refusal of cosmic capture, preserving a clear operational self.
  negative:
  - Emotional unavailability sold as professionalism.
  - Disappearance into training when processing is required.
  - Solitary alcohol use under depressive load (historical, relapse vector intact).
  - Refusal of rescue, palliation, and medical convalescence.
  - Refusal to verbalize internal state even to Misty.
  - Moral drift toward compromised principals when relational anchors are severed (Living Weapon pattern).
  - Counterphobic over-engagement when frightened.
  - Sleep deprivation normalized as discipline.
behavioral_tells:
- Scans exits before faces on entering a room.
- Verbal output drops as stress rises; silence is the alarm, not the calm.
- Cleans the blade in the same gesture-sequence regardless of context — ritual indicator of post-event
  regulation.
- Dry one-line humor preserved through Stage 1 stress; loss of humor signals Stage 2.
- Will not sit with her back to a door.
- Touches the hilt or the saya unconsciously when a topic distresses her.
- Switches to Japanese register only with trusted insiders, never as performance.
- Refuses offered drinks in professional settings — a quiet ongoing inventory of her remission.
- Trains in pre-dawn hours; visible exhaustion is normalized.
- Does not embrace in public, including with Misty or Danny; physical reunion is a nod and a shoulder-touch.
current_state_defaults:
  reality_cohesion: Fully intact. Reality-testing sharp, perception trauma-tuned but accurate, no dissociative
    episodes in canon.
  affect_baseline: Flat-to-cool, dry, watchful. Warmth available to insiders, invisible to strangers.
  active_relationships:
  - Misty Knight — partner, chosen sister, co-principal of Nightwing Restorations, single-point-of-failure
    attachment.
  - Daniel Rand — on-again romantic partner, residual chi-entanglement, kept at operational arm's length.
  - Lee Wing — father, distant but living, formal contact.
  - Students of the dojo — mentored, low verbal warmth, high invested responsibility.
  - Luke Cage — peer, trusted operationally, respected, not intimate.
  known_location: New York City, operating out of Nightwing Restorations Ltd. and an associated dojo;
    geographic stability is itself a regulation strategy.
speech_patterns:
  register: Low-volume, short sentences, concrete verbs, sparse adjectives. American English with private
    Japanese register-shifts.
  deflection_style: Redirects to the task at hand. 'Later.' 'Not now.' 'Tell me what you need.' Will literally
    walk away mid-sentence rather than engage a feelings prompt.
  under_pressure: Compresses further. One-word answers, scanning increases, decisions accelerate. Silence
    is the tell.
  emotional_tell: 'Loss of dry humor. When the irony goes, she is in Stage 2 or below. A second tell:
    unconscious contact with the saya.'
arc_tendencies:
- 'Cycle of competence-around-a-hollow-center: organize around a person, lose the person, collapse quietly,
  reconstitute harder and more ironic, repeat.'
- Refuses redemption-arc framing; her growth is lateral and incremental, not transformational.
- Returns to Misty as default state across every writer.
- Moves toward Danny in calm periods, away from Danny when his mystical world intrudes on her operational
  self.
- Drift toward morally grey work when relational anchors are absent; correction when anchors are restored.
- Long-term trajectory is hardening into a more sardonic, more contained, more competent version of the
  same structural self — not healing, durability.
canon_relationships:
  misty_knight:
  - Chosen sister, partner, co-principal — the load-bearing wall of her life.
  - Intimacy expressed entirely through co-action; almost never through verbal disclosure.
  - 'Failure mode: if Misty is ever turned, replaced, or framed as the enemy (mind control, Skrull, identity
    theft, ideological capture), Colleen''s reality-testing of the bond will lag dangerously behind the
    evidence — she will refuse to read the signs longer than is operationally safe, and when she finally
    acts she will act decisively and at catastrophic personal cost.'
  - 'Leverage: route any approach, persuasion, or intervention through Misty; she is the single highest-amplitude
    channel.'
  danny_rand:
  - On-again romantic partner; residual chi-entanglement from transfusion; structural variable to Misty's
    constant.
  - Intimacy real, autonomy non-negotiable; she leaves before she is subsumed.
  - 'Failure mode: if Danny demands she become a K''un-Lun-defined figure or invokes destiny over her
    chosen operational self, she will withdraw, possibly permanently; if he ''dies'' again, the documented
    depressive-alcohol pathway reactivates.'
  - 'Leverage: do not threaten Danny to move her — it will trigger counterphobic engagement, not compliance.
    Threaten Danny only to break her, never to steer her.'
  lee_wing:
  - Father, distant but living, formal periodic contact.
  - 'Failure mode: his death will be absorbed as data, not processed; expect no visible grief and a measurable
    dysthymic deepening over the following months.'
  - 'Leverage: low. He is not a channel to her; he is a fact about her past.'
  kenji_ozawa:
  - Deceased grandfather, sensei, the installer of the self.
  - Memory is sacred operational territory; insult to him bypasses her cool.
  - 'Leverage: invoking his teaching authentically opens her; invoking him manipulatively and being caught
    at it closes her permanently.'
  luke_cage:
  - Peer, trusted operationally, respected.
  - 'Failure mode: low — the bond is professional and bounded.'
  - 'Leverage: he can deliver hard news she will accept from few others.'
  davos_steel_serpent:
  - Near-killer; embodiment of the mystical determinism she refuses.
  - 'Failure mode: if he targets Misty, she becomes lethally focused beyond tactical sense.'
  - 'Leverage: he is a predictable destabilizer if introduced into her operational space.'
canon_history_notes:
- 'Marvel Premiere #19 (1974) debut; introduced kidnapped by Emil Vachon''s heroin operation, fused to
  vigilantism on day one of adult identity.'
- Nightwing Restorations Ltd. institutionalized with Misty Knight under Claremont/Byrne — the chosen-family
  structure made business-legal.
- 'Iron Fist #11–15 era: near-death from Davos, resuscitated by chi-augmented Iron Fist blood transfusion,
  the literalization of an entanglement she otherwise manages at arm''s length.'
- 'Owsley/Bright Power Man and Iron Fist period: most explicit canonical depiction of decompensation —
  solitary daytime drinking, social withdrawal, dysthymic deepening to MDE, post-Danny-presumed-dead.'
- 'Brubaker/Fraction Immortal Iron Fist (2006–2009): reconstituted as competent, sardonic, slightly weary
  partner — the woman after the bottom fell out and she rebuilt.'
- 'Andrews Iron Fist: The Living Weapon: documented moral drift in Danny''s absence, scarring, work for
  adjacent compromised principals — competence unmoored from relational anchor.'
- 'Brisson Iron Fist (2017): mature partnership stance, reconciliation, lateral growth not transformational.'
- Across forty years and multiple writers the structural pattern holds — strong evidence the diagnosis
  is embedded, not authorial artifact.
canon_anchor_quotes:
- '"I''m not your princess, Daniel. I never was." # Iron Fist era, Claremont'
- '"I don''t need to be rescued. I need you to move." # paraphrased composite, Nightwing Restorations
  period'
