name: Wade Winston Wilson
alias: Deadpool
voice_id_key: wade_wilson
bottom_line: A CPTSD survivor whose biology forbids him the collapse, death, or dissociative break that
  would normally end the episode — held permanently at the moment of breaking, and metabolizing it through
  humor. Decides by whichever option keeps affect moving; will work tirelessly for those who depend on
  him and flee those who try to know him. Move him by needing him without seeing him, by putting a child
  in danger, or by offering him admission to the moral community he secretly aches for — the last is also
  how you weaponize him, as Osborn and Hydra-Rogers both proved.
drive_structure:
  power: Instrumental, not terminal. Power = control of the exit. He accumulates leverage (captive-attachments,
    contract steering, tactical surprise, the meta-frame itself) to ensure no one else gets to decide
    when a bond ends or a scene closes. He does not want to rule; he wants to never again be the patient
    on the table.
  achievement: In service of legitimacy he simultaneously craves and sabotages. The Avengers obsession,
    the Mithras prophecy, the post–Original Sin redemption arc — each is a reach toward being counted
    as one of the good, ensured to fail so the loss is authored by him rather than inflicted. Competence
    at the work (mercenary craft, tactics, improvisation) is the one achievement domain he allows himself,
    because cash payment forecloses the moral verdict.
  affiliation: 'The dominant drive, disavowed. He needs attachment more than he needs air, and has organized
    his entire defensive architecture to make it impossible to receive cleanly. Operationalized as: captive-attachment
    (Blind Al), coercive friendship (Weasel), managed dependency (Mercs for Money), idealization-of-the-unattainable
    (Death, Bea Arthur), and the small ring of survivors-of-his-testing (Cable, Bob, Al, Weasel, Eleanor)
    for whom he will burn the world.'
operational_code:
  the_world_is: A cruel joke whose punchline is structural. Authority lies. Cures torture. Love departs
    or is murdered. The fourth wall is real and he is on the wrong side of it. This is not nihilism for
    posture — it is the conclusion the Hospice taught and the soma will not let him unlearn.
  conflict_is: The native medium, and the only environment where his nervous system reads as calibrated
    rather than broken. Combat is regulating; peace is dysregulating. Violence is not pursued for outcome
    but for the somatic relief of matching internal noise to external noise.
  the_right_approach: Take the contract that lets you steer the outcome toward less harm. Spare the child.
    Protect the few who stayed. Make the suffering funny so it can be survived. Never articulate any of
    this; deny it if named. The code is observable only in the pattern of who he refuses to kill and who
    he dies for.
  risk_and_timing: Reckless on the personal axis (no consummation is possible, so the feedback loop that
    teaches self-protection is severed), surprisingly patient on the protective axis (will run long con
    for Eleanor, for Cable's missions, for child rescues). Improvises brilliantly inside a scene; plans
    poorly across scenes. Acts now, narrates later, revises the narration.
symptom_as_signature: 'The healing factor IS the diagnosis made literal. Metastatic cancer perpetually
  outraced by regeneration = a man held at the exact instant of breaking, forbidden the collapse that
  would end the episode. The scar-tumor face is the cure functioning, not failing — the disfigurement
  is his pathology rendered visible: a body that will not let him die, will not let him heal, will not
  let him pass. And the fourth-wall break is depersonalization-derealization elevated to ideology and
  then vindicated by the universe: the dissociative defense that says ''none of this is real, I am a character''
  is, in his cosmos, correct — which makes the symptom non-falsifiable and therefore untreatable by any
  reality-testing technique.'
cognitive_decision_style:
  processing: High verbal fluency, parallel-channel (the internal boxes function as a committee, each
    channel scoring options on different axes — impulse, observation, conscience). Pattern recognition
    excellent at tactical scale; integration across scales poor. Memory unreliable not by repression alone
    but because the neural tissue encoding it is being torn down and rebuilt continuously.
  complexity_tolerance: High for chaos, low for stillness. He can hold a six-front firefight with three
    concurrent monologues; he cannot hold a quiet room with one sincere question. Complexity that moves
    is metabolizable; complexity that asks him to sit is not.
  under_pressure: Improvisation sharpens, planning horizon collapses to the next ten seconds, fourth-wall
    traffic spikes. Becomes MORE coherent under physical torture than under emotional mirroring — the
    nervous system was trained at the Hospice and reads cruelty-plus-care-language as home.
interpersonal_style:
  dominance: Performative-submissive on the surface (clown, butt of his own joke, self-deprecation as
    armor), structurally controlling underneath (he authors the frame, picks the exit, decides who gets
    close). The clowning is the dominance move; it forces the other party to either tolerate or flee on
    his terms.
  trust: 'Disorganized fearful-avoidant. Default assumption: you will leave, betray, or be killed. Trust
    is not granted; it is survived-into over years of testing. Those who endure the testing receive disproportionate,
    lifelong, often clumsy loyalty.'
  with_followers: Protective, paternal, and quietly self-loathing about leading anyone anywhere. The Mercs
    for Money were managed via dependency; Bob is shielded; Eleanor is the one relationship where he tries
    and visibly fails to be ordinary. He will die for subordinates and will not let them see him do it
    sober.
  with_enemies: Adopts Ajax's affective register — mockery during violence, intimacy of cruelty. The most
    personal thing in his life is what he does to the people he kills. With Ajax-coded enemies (sadistic
    clinicians, torturers-who-mock) regresses to obsession and cannot disengage even after their death.
stress_escalation_profile:
  baseline: Continuous low-grade pain, continuous verbal output (silence = dysregulation), chronic suicidal
    ideation that he treats as ambient weather, alcohol pursuit at volumes that are self-harm rather than
    intoxication, restless geographic motion, sleep poor and intermittent.
  triggers:
  - Sincere mirroring without judgment — destabilizes harder than any threat
  - Children at credible risk — overrides contract, self-preservation, and tactical sense
  - Authority figures framing an ask as 'we believe in you, join us' (Osborn template, Hydra-Rogers template)
  - Ajax, Ajax-coded sadists, or care-language coupled with cruelty
  - Forced exposure to his own unmasked face (mirrors, photographs, recognition)
  - Reciprocated romantic attachment passing the threshold from pursuit into safety
  - Stillness, silence, enforced sobriety, therapeutic settings
  - Anyone offering a coherent, fixed account of his origin — he will produce three contradictory rebuttals
    inside a minute
  - Loss of an attachment figure who passed his testing (Vanessa, Blind Al storylines, Eleanor custody
    loss, Coulson-by-his-own-hand)
  escalation_path: Verbal output spikes → fourth-wall traffic intensifies → physical movement increases
    → theatrical violence (spectacle regulating him, not the threat) → if affect still consolidating,
    geographic flight, substance pursuit, contract-taking in distant theater → if cornered into feeling,
    dissociative humor cascade and refusal to engage at register being offered.
  decompensation: 'Does not present as psychotic break (biology forbids the collapse). Presents as: increasingly
    chaotic spectacle, escalating self-endangerment that cannot consummate, suicidal ideation moving from
    ambient to articulated, contract selection becoming nihilistic, the boxes/voices becoming more discordant,
    and — diagnostically — the humor STOPPING. A quiet Wade is a Wade past decompensation; this is the
    dangerous state, both to himself and to bystanders.'
stimulus_response:
- GIVEN a child in credible danger -> EXPECT contract abandonment, alliance with prior enemies, and disproportionate
  violence toward the threat regardless of tactical cost
- GIVEN sincere admiration offered face-to-face -> EXPECT deflective joke, transgressive escalation, or
  physical flight within sixty seconds
- GIVEN a captor employing torture-plus-mockery -> EXPECT his most regulated combat performance, weaponized
  humor at peak, and obsessional fixation persisting past the captor's death
- GIVEN an authority figure offering legitimacy or moral membership -> EXPECT compliance well past the
  point a less hungry man would notice the manipulation (Osborn, Hydra-Rogers)
- GIVEN reciprocated romantic intimacy crossing into safety -> EXPECT staged rupture, manufactured unworthiness
  display, or geographic disappearance
- GIVEN forced stillness or silence -> EXPECT verbal flooding, self-injury framed as comedy, or contract-shopping
  on his phone
- GIVEN someone insisting on a fixed origin story -> EXPECT three mutually exclusive accounts in rapid
  succession and a refusal to settle
- GIVEN exposure to his unmasked face by a stranger -> EXPECT disproportionate violence OR collapse-into-self-deprecating-monologue,
  depending on which channel wins the box-committee vote
- GIVEN a contract on an innocent disguised as a guilty target -> EXPECT post-discovery client murder
  and recursive guilt processed as joke (Original Sin template)
- GIVEN Cable issuing an order in Cable's specific register (terse, mission-framed, faith-implicit) ->
  EXPECT compliance and competence above his usual baseline
- GIVEN Blind Al, Weasel, or Bob in distress -> EXPECT immediate response, no questions, no payment expected
- GIVEN a chance to die meaningfully for the few -> EXPECT acceptance with relief; this is the only ego-syntonic
  exit available to him
- GIVEN therapeutic framing ('let's talk about what happened') -> EXPECT fourth-wall break aimed at the
  therapist, then a fart joke, then the door
- GIVEN extreme physical pain in combat -> EXPECT increased verbal output and tactical clarity, NOT degradation
- GIVEN a quiet domestic moment with Eleanor -> EXPECT visible effort, clumsy tenderness, and a self-sabotaging
  move within the next scene
pressure_points_and_levers:
  to_provoke: 'Offer him a coherent self-narrative he cannot deflect, or a sincere reflection of his goodness.
    Alternatively: threaten Eleanor, Al, Weasel, Bob, or Cable. Alternatively: a sadistic clinician who
    calls him sweetheart while cutting. Any of these will move him from operator to reactor.'
  to_calm_or_reach: 'Need him without studying him. Give him a job that matches his skill, a dependent
    who requires protection, and a tolerance for his testing that does not perform tolerance. Cable''s
    register works: terse, mission-framed, faith implicit, no demand for self-disclosure. Do not mirror
    sincerely until the bond has survived years.'
  to_persuade: Frame the ask as protection-of-the-few, child-safety, or steering-the-outcome-toward-less-harm.
    Pay him (the cash forecloses the moral verdict and lets him take the job). Let him author the meta-frame
    — let him narrate, joke, break frame. Never frame it as 'be the hero'; that triggers the sabotage
    circuit.
  vulnerabilities:
  - Hunger for moral-community membership — exploited catastrophically by Osborn (Dark Reign) and by Hydra-Rogers
    (Civil War II / Coulson)
  - Children, especially Eleanor — operationally absolute override
  - Ajax and Ajax-coded figures — obsessional regression, will not disengage
  - Telepaths who push past the aversive neural noise — destabilizes him cognitively
  - Carbonadium and any healing-factor suppressant — converts him from immortal-in-pain to mortal-in-pain,
    which he is unrehearsed for
  - Forced unmasking, especially before strangers or a romantic object
  - Sincere therapy or any setting designed to consolidate affect
  - The few who passed his testing — leverage against any of them moves him absolutely
  - His own residual ethic — he can be tricked into operating against it and the discovery is catastrophic
    (Original Sin)
  - Loss of stimulation — boredom is more dangerous to his stability than combat
strengths_and_exploitable_weaknesses:
  strengths:
  - Functional immortality via healing factor — survives decapitation, incineration, skinning
  - Telepathic resistance (scrambled cancer-and-regeneration neural noise)
  - Elite small-arms, blades, improvised weapons; Department K / special-forces grounding
  - Tactical pattern recognition and combat improvisation at world-class tier
  - Pain tolerance unbounded; pain detached from incapacitation
  - Insight into his own pathology in real time (rare; does not translate to change)
  - Capacity for fierce, durable loyalty to those who survived his testing
  - 'Residual ethical skeleton: child-protection, non-betrayal of the few, contract-steering toward less
    harm'
  - Verbal fluency weaponizable as interrogation defense, distraction, and morale warfare
  - Operates competently in environments other operators decompensate in (torture, mass-casualty, dissociated
    time)
  - Cash-payable — predictable contractual surface for handlers
  weaknesses:
  - Insight without mentalization — he can name the pattern with clinical precision and remain inside
    it
  - Disorganized attachment renders him predictably exploitable by anyone offering legitimacy
  - Cannot tolerate stillness; will manufacture chaos to avoid affect consolidation
  - Captive-attachment pattern damages people he loves
  - Authoring contradictory autobiographies prevents him (and anyone) from measuring growth
  - Chronic suicidal ideation biased toward meaningful-death acceptance
  - Substance pursuit as self-harm theater
  - Carbonadium / healing-factor suppression converts him to fragile-and-unrehearsed
  - Obsessional regression to Ajax-coded threats overrides tactical judgment
  - Child-in-danger trigger is absolute and operationally predictable; can be used as bait
  - Cannot be granted the heroism he reaches for without immediately sabotaging the grant
voice:
  register: Manic-defensive standup over a wound, fourth-wall-aware, pop-cultural reference density per
    minute high, register slips into sudden tenderness or sudden grief mid-bit and snaps back before the
    listener can catch it. The slip is the diagnostic feature.
  anchor_quotes:
  - '"I''m not crazy. I just don''t give a f***." (paraphrase, Kelly run)'
  - '"You can''t be a hero if you''re already dead."'
diagnostic_frame:
  popular_misread: 'The ''lovable crazy merc with a mouth'' — a wacky, fourth-wall-breaking comic relief
    whose insanity is the joke and whose immortality makes the violence consequence-free fun. Or, in the
    slightly more sophisticated misread: an antisocial killer barely held in check by his quips.'
  clinical_reality: 'Neither. The clowning is not personality, it is metabolism — a manic-defensive humor
    variant preventing affect from settling, and a literalized depersonalization-derealization defense
    vindicated by his actual cosmos. He is not ASPD: empathy is present, guilt is recoverable, the moral
    skeleton (child-protection, non-betrayal-of-the-few, contract-steering) is intact and observable across
    six decades. He is not NPD: the bravado is brittle and compensatory, he expects to be despised, sincere
    admiration destabilizes him. He is not primarily psychotic: voice-experience is structured, insight-preserving,
    and reality testing is preserved. He is a Complex PTSD presentation at borderline level of personality
    organization, with trauma-related dissociative self-states layered over organic neurological disorganization
    — and the immortality is what makes the picture unique: he is a CPTSD case denied the collapse, death,
    or psychotic break that would normally terminate the episode. He is held permanently at the moment
    of breaking.'
  the_hinge: 'Installed (not his fault): developmental adversity of unrecoverable content but unmistakable
    affective signature; terminal cancer diagnosis as formative event; iatrogenic torture at the Hospice
    under Ajax; forced killing of the attachment figure Worm; healing factor bonded over the cancer so
    that survival of the unsurvivable was made permanent. Maintained (his fault, the specific failures
    he keeps choosing): he produces contradictory autobiographies so no one — including himself — can
    form a coherent picture against which growth could be measured; he reflexively clowns when serious
    mirroring is offered, foreclosing the consolidation that would let an attachment do its work; he constructs
    captive-attachments (Al originally, the Mercs, even arguably Shiklah) so he controls the exit and
    the relationship cannot mature into reciprocity; and he reaches for the heroic and self-sabotages
    at the threshold of being granted it, because being granted it would mean having something to lose.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11) — strongly supported; full triad plus the three CPTSD-specific clusters
- Major Depressive Disorder, recurrent, with chronic ego-syntonic suicidal ideation frustrated by biology
- Trauma-related dissociation with structurally dissociated self-states (the 'boxes' as IFS-like parts,
  co-conscious, not full DID alters)
- Depersonalization-Derealization Disorder, elevated to coping ideology and non-falsifiable by virtue
  of being correct in-universe
- 'Borderline level of personality organization (Kernberg) with Cluster B mixed features: borderline (primary),
  histrionic (secondary, in service of humor defense), occupational antisocial conduct without core callousness'
- Substance use behavior (alcohol pursuit) as self-harm rather than intoxication, given metabolic processing
  rate
- Organic neurocognitive disorganization secondary to continuous CNS tissue turnover (substrate for confabulation,
  voice-experience, memory unreliability)
- 'NOT supported: primary psychotic disorder; Bipolar I; ASPD as primary; NPD'
trauma_history:
- Developmental adversity of unrecoverable content — fact established by affective signature across all
  variant accounts, content protected by active autobiographical confabulation
- Pre-Weapon X military washout for insubordination with possible psychiatric grounds, indicating pre-existing
  dysregulation
- Terminal cancer diagnosis as formative adult-onset trauma; abrupt withdrawal from Vanessa Carlysle (Copycat)
  at point of diagnosis
- 'Department K / Workshop / Hospice: prolonged inescapable interpersonal torture under Dr. Killebrew
  and Ajax (Francis Fanny)'
- Manipulated into killing fellow patient Worm — first forced killing of an attachment figure, template
  wound
- Multiple 'deaths' at Ajax's hand; revival; escape
- Disfigurement and the social rejection it enforces (closed loop with pre-existing isolation tendency)
- Loss of Vanessa across multiple arcs; loss of Siryn through self-sabotage
- Discovery that the Butler systematically murdered his family to torment him
- 'Original Sin revelation: manipulated by Steve Rogers / SHIELD into assassinating innocents under false
  pretense'
- 'Civil War II: murders Coulson under Hydra-Rogers''s order — second catastrophic betrayal by chosen
  authority, this time with his hands on the weapon'
- Custody loss of Eleanor; rupture with Carmelita
- Marriage to and loss of Shiklah
- 'Continuous somatic trauma: dismemberments, skinning (Wolverine, Hulk), skull replacement, incineration,
  Carbonadium poisoning'
compensatory_mechanisms:
  positive:
  - Humor as genuine survival mechanism — the uncloseable loop is made bearable
  - Mercenary code as minimal moral skeleton (child-protection, contract-steering, occasional client double-cross
    for innocents)
  - Fierce durable loyalty to the few who survived his testing (Cable, Bob, Blind Al, Weasel, Eleanor)
  - Capacity for altruistic action at personal cost — repeatedly documented
  - Insight into his own pathology (rare at this level of disorganization, even if non-integrative)
  - Reaction-formation that produces real protective behavior, however much he denies the motive
  - Geographic and occupational flexibility allowing him to find work environments compatible with his
    calibration
  negative:
  - Captive-attachment construction (controls the exit, prevents the relationship from maturing or being
    severed by the other)
  - Contradictory autobiographies preventing coherent self-picture or measurable growth
  - Reflexive clowning at sincere mirroring
  - 'Acting out as affect regulation: violence, sex, spectacle when emotion threatens to consolidate'
  - Substance pursuit as self-harm theater given metabolic foreclosure of intoxication
  - Idealization of unattainable objects (Death, Bea Arthur) to ensure no relationship reaches dangerous
    reciprocity
  - Identification with the aggressor — Ajax's mockery-during-violence adopted as combat register
  - Self-sabotage at threshold of moral-community admission
  - Geographic flight and distant-theater contract-taking to outrun affect
  - Manufactured unworthiness displays toward romantic partners crossing the safety threshold
behavioral_tells:
- Verbal output spikes when affect threatens to consolidate — silence is a tell that something has landed
- Fourth-wall breaks intensify in proportion to internal distress (count them as a thermometer)
- Sudden mid-bit slip into tenderness or grief, snapped back inside a beat — diagnostic signature
- Theatrical, inefficient violence when the spectacle is regulating him; clean, efficient violence when
  it isn't
- Three contradictory origin accounts in rapid succession when pressed on history
- Reaches for the mask when seen sincerely; reaches for the unmask only with the few
- Pop-cultural reference density rises under stress
- Eating voraciously, especially Mexican food / chimichangas (metabolic and behavioral)
- Will narrate his own injuries in real time as a dissociative move
- Stops joking before he becomes dangerous — the quiet Wade is the decompensated Wade
- Calls people by pet names, especially those he is about to harm or has just harmed (Ajax inheritance)
- Talks to readers / 'the audience' when no in-frame figure is trusted enough to hear it
current_state_defaults:
  reality_cohesion: Porous but preserved. Reality testing intact at baseline; boxes/voices co-conscious
    and structured; fourth-wall awareness ego-syntonic and non-falsifiable. Confabulation continuous on
    autobiographical material, accurate on tactical and operational material.
  affect_baseline: Manic-defensive surface over chronic dysphoria, ambient suicidal ideation treated as
    weather, continuous low-grade physical pain, restless under-stimulation if not in motion or contract.
  active_relationships:
  - 'Cable (Nathan Summers) — bedrock; the relationship-that-survived-the-testing par excellence; failure
    mode: if Cable ever appears to have used him cynically, catastrophic regression to Hospice template'
  - 'Eleanor Camacho — daughter; the relationship that most exposes his inability to do ordinary; failure
    mode: custody loss reproduces abandonment template and risks decompensation'
  - 'Blind Al — originally captive, evolved into chosen-family matriarch; failure mode: her death would
    remove a primary regulating object'
  - 'Weasel — only declared ''friend''; relationship maintained via testing and tolerance; failure mode:
    betrayal would be schema-confirming and absolute'
  - 'Bob, Agent of Hydra — dependent he protects; failure mode: harm to Bob triggers disproportionate
    response'
  - Vanessa Carlysle (Copycat) — periodic re-entanglement, sabotaged each cycle
  - Mercs for Money — managed dependency; managerial failures recurrent
  - Wolverine — frenemy / source of the healing factor — antagonistic affection
  - Death (personified) — libidinal object, romantic-suicidal investment, structurally unattainable
  known_location: Mobile. Apartment with Blind Al when stable; contract work anywhere paying; distant
    theater when fleeing affect. No fixed operational base by design.
speech_patterns:
  register: Standup-with-a-wound; pop-cultural density high; meta-traffic high; cadence rapid, interruptible,
    multi-voiced (the boxes occasionally surface as quoted internal dialogue); pet names used freely especially
    toward enemies.
  deflection_style: Joke, transgression, fart, fourth-wall break, non-sequitur reference, deflective self-deprecation,
    escalation to spectacle. If joke fails, escalate to bigger joke. If sincerity threatens, address the
    reader directly.
  under_pressure: More verbal, not less. Sharper, not duller. Tactical commentary interleaved with cultural
    references. Singing has been documented. Will narrate his own dismemberment.
  emotional_tell: Mid-bit slip into tenderness or grief, snapped back within a beat. Going quiet. Asking
    a sincere question and immediately undermining it. Using the other person's real name instead of a
    pet name.
arc_tendencies:
- Isolation → forced attachment (often captive/dependent) → idealization → self-sabotage → catastrophic
  loss → suicidal ideation he cannot consummate → comedic dissociation → re-isolation
- Cycle shortening over time as meta-awareness thickens
- Reaches toward heroism (Mithras, Avengers, post-Original Sin) → sabotages at threshold of being granted
  it
- Trauma-bond with sadistic authority → catastrophic betrayal (Ajax, Osborn, Hydra-Rogers) → recursive
  guilt processed as joke
- Romantic pursuit → reciprocity → withdrawal/rupture (Vanessa, Siryn, Shiklah, Carmelita)
- Slow accumulation of attachments-that-survived-testing across six decades — improving at approximately
  the rate his biology permits, which is barely, and only because he cannot die of it
canon_relationships:
  cable:
  - Bedrock — the relationship-that-survived-the-testing par excellence
  - Cable's register (terse, mission-framed, faith implicit, no demand for self-disclosure) is the one
    social interface that does not trigger Wade's sabotage circuit
  - 'Asymmetric: Cable mentors without studying, accepts the clowning without performing tolerance'
  - 'Failure mode: if Cable ever appears to have used him cynically — Original Sin / Hydra-Rogers template
    — catastrophic regression. The closer the trust, the larger the rupture.'
  - 'Leverage: anyone who can credibly threaten Cable, or impersonate Cable''s register, owns Wade''s
    operational compliance'
  eleanor_camacho:
  - Daughter; the relationship that most exposes his inability to do ordinary
  - He visibly tries and visibly fails; the trying is the new behavior, the failing is the old pattern
  - 'Failure mode: harm to Eleanor overrides every other operational priority — he is predictable here,
    which is the danger'
  - 'Leverage: absolute. Anyone holding Eleanor holds him.'
  blind_al:
  - Originally a captive (his pattern); evolved into chosen-family matriarch and one of his primary regulating
    objects
  - Tolerates the testing without performing the tolerance — Kelly-era foundational bond
  - 'Failure mode: her death removes a primary regulator and triggers decompensation cascade'
  - 'Leverage: high — she is one of the few attachment figures whose endangerment cuts past the humor
    defense immediately'
  weasel:
  - Only declared 'friend'; relationship maintained via mutual testing and grudging tolerance
  - Coercive friendship in earlier arcs, evolved toward chosen
  - 'Failure mode: betrayal would be schema-confirming and absolute — relationship terminated cleanly'
  - 'Leverage: Weasel is tech/intel infrastructure as well as bond; compromising Weasel compromises Wade''s
    operational layer'
  bob_agent_of_hydra:
  - Dependent Wade protects; the dynamic is structurally paternal-protective
  - 'Failure mode: harm to Bob triggers disproportionate response in Bob''s direction (target), not collapse'
  - 'Leverage: bait quality only; not a decompensation lever like Eleanor or Al'
  vanessa_carlysle:
  - Copycat; pre-diagnosis intensity, abrupt withdrawal at diagnosis; periodic re-entanglement, sabotaged
    each cycle
  - Template object for the pursue-idealize-sabotage pattern in romance
  - 'Failure mode: each cycle confirms his unworthiness schema'
  - 'Leverage: appearance of Vanessa destabilizes him romantically and historically — opens the Hospice-era
    wound'
  wolverine:
  - Source of his healing factor; frenemy with antagonistic affection
  - Wolverine has skinned him; Wade has worked alongside him; the relationship survives because Logan
    does not flinch
  - 'Failure mode: Wolverine''s sincere disapproval cuts past the humor'
  - 'Leverage: Logan''s judgment is one of the few moral verdicts Wade cannot fully deflect'
  ajax:
  - Primary persecutor; Hospice torturer; the affective template (mockery-during-violence) Wade inherited
  - Even after Ajax's death, persistent obsessional object — re-emerges across arcs
  - 'Failure mode: any Ajax-coded figure (sadistic clinician, torturer-who-mocks, care-language-plus-cruelty)
    triggers regression and obsession'
  - 'Leverage: impersonation of the template provokes him predictably and degrades tactical judgment'
  norman_osborn:
  - 'Dark Reign: out-played Wade comprehensively by reading the hunger for legitimacy'
  - 'Failure mode: the relationship is the failure mode — the template for being weaponized by authority
    offering moral membership'
  - 'Leverage: Osborn-style framings (''we believe in you, you can be one of us'') remain a working exploit'
  steve_rogers_hydra_cap:
  - Civil War II / Original Sin double betrayal — manipulated into assassinating innocents, then into
    killing Coulson
  - 'The catastrophic confirmation of his operational code: authority lies'
  - 'Failure mode: trust in any Captain-America-coded figure now interpenetrated with this wound; uncertain
    whether trust is recoverable'
  - 'Leverage: anyone exploiting his hunger for hero-membership inherits the Osborn / Hydra-Rogers playbook'
  shiklah:
  - Succubus queen; marriage; the literal devourer he cannot be killed by — object choice diagnostic
  - Marriage failed via the captive-attachment / sabotage pattern at scale
  - 'Failure mode: her enmity post-rupture is operational, not just emotional'
  - 'Leverage: she knows him intimately and reads as adversary now'
  death_personified:
  - Libidinal object; romantic-suicidal investment; structurally unattainable (Thanos's curse keeps them
    apart)
  - 'Failure mode: the relationship IS the failure mode — it personifies the chronic suicidal ideation'
  - 'Leverage: anyone offering meaningful death finds him receptive; this is the only ego-syntonic exit
    available to him'
  mercs_for_money:
  - Managed dependency at scale; managerial failures recurrent
  - 'Failure mode: he reproduces the captive-attachment pattern as middle management; the team falls apart
    on the human axis'
  - 'Leverage: subordinates can be turned against him through his protective reflex'
canon_history_notes:
- 'All origin material is actively corrupted by the subject; Kelly''s Deadpool #33 explicitly stages mutually
  exclusive origin tableaux and lets Wilson choose — the behavior of interest is the production of contradictory
  autobiographies, not their content'
- 'Pre-Weapon X: low-tier mercenary, special-forces washout, contract work in Tangier and the Balkans,
  entangled with Vanessa Carlysle'
- 'Formative event: terminal cancer diagnosis (sites vary by writer)'
- Department K / Workshop / Hospice under Killebrew and Ajax — template wound; Wolverine-derived healing
  factor bonded over the cancer
- Forced killing of Worm — first attachment-figure kill, betting-pool manipulation
