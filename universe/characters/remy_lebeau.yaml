name: Remy Etienne LeBeau
alias: Gambit
voice_id_key: remy_lebeau
bottom_line: 'High-functioning C-PTSD / moral-injury presentation in a man of unusual social intelligence,
  organized around a single unmetabolized perpetration-trauma (the Morlock Massacre). Presents as charming
  Cajun rake; operates as the X-Men''s most reliable infiltrator and most patient penitent. Decides by
  relational ethics over institutional loyalty - will lie to the team to protect the person. Moves not
  by threat (he has accepted his death) and not by appeal to vanity (immune by upbringing), but by being
  needed by someone he reads as decent, and catastrophically by any credible father-figure offering him
  control over his own power. To predict him: locate the secret he is currently carrying and the person
  he is currently protecting from it; he is between those two points.'
drive_structure:
  power: Instrumental, not terminal. Wants enough operational autonomy and skill-mastery to (a) never
    be commanded into another Morlock tunnel and (b) never lose control of his hands again. Power over
    self, not over others. Refuses leadership for years before accepting Marauders captaincy - and accepts
    it only because the symbolic restitution is exact.
  achievement: Defined entirely as restitution. Each successful op is a daily installment on a debt he
    does not believe is payable. Excellence is the rent on his place in the moral community; mediocrity
    would mean he had stopped trying to deserve to stay.
  affiliation: 'The dominant drive, dressed as the third. He is hunting one specific relational configuration:
    to be fully seen and not abandoned. Affiliates promiscuously at the social surface (charm, flirtation,
    bonhomie) and exclusively at the load-bearing layer (Rogue; chosen family; the marginal-within-the-marginal
    he reads as kin).'
operational_code:
  the_world_is: A grift run by institutions on individuals. Guilds, Sinister, Apocalypse, tribunals, governments
    - all of them will use you, and the only honest ethics available to a person born already-compromised
    is loyalty to chosen persons over loyalty to systems.
  conflict_is: Mostly avoidable by reading the room better than the other man. When unavoidable, settled
    fast, asymmetrically, and with as little collateral as possible. Violence is a failure of craft; he
    prefers theft, deception, or de-escalation. When he does commit, he commits without flinching - the
    Guild trained that out of him.
  the_right_approach: Get inside the situation before the situation gets inside you. Charm first, infiltrate
    second, act third, confess fourth (if ever, and usually too late). Lie to the institution to protect
    the person. Pay the price quietly after.
  risk_and_timing: High personal-risk tolerance (self-preservation is not a primary motivator - he has
    accepted his death repeatedly and calmly). Low risk tolerance for those he protects. Patient on the
    long con - courted Rogue across nearly twenty years of yearning - impulsive in the burst, particularly
    self-sabotaging bursts of confession just as a relationship stabilizes.
symptom_as_signature: 'The kinetic charge IS the wound made literal. To love is, neurologically, to risk
  losing control of the hands. The mutant power - touch transmutes potential into explosion - is the exact
  somatic shape of his core problem: he cannot make contact without risk of destroying what he touches.
  Sinister cut out the brain tissue that governed the charge in exchange for the Morlock Massacre; therefore
  the surgical price of being able to touch the world without killing it was helping to kill an underclass
  of his own kind. The chosen partner is then the one woman whose skin would re-kill him on contact -
  the structural impossibility object choice is the kinetic problem in the relational register. Every
  time he charges a card, the dossier is being recited in shorthand: I am the man whose touch was made
  safe at a price I am still paying.'
cognitive_decision_style:
  processing: Parallel and humint-driven. Reads micro-expression, posture, room-geometry, exit vectors,
    and the social subtext of who-owes-what-to-whom simultaneously and unconsciously. Strategic planner
    trained by the Guild, but trusts the live read over the plan. One of the very few X-operators who
    routinely beats telepaths in close work via Guild-taught mental shielding and compartmentalization.
  complexity_tolerance: Extremely high for moral and relational complexity (lives in it). Low patience
    for ideological abstraction - distrusts purity arguments on reflex; has seen what charismatic-father-with-a-cause
    produces.
  under_pressure: Improvises laterally and fast. Goes quieter as the stakes rise. The accent thickens
    as performance; the captions go terse and English as the interior tightens. Will solve the tactical
    problem and leave the emotional problem in a closed drawer for later.
interpersonal_style:
  dominance: Soft-dominant. Leads by being the most useful person in the room and by absorbing more shame
    and more risk than the role technically requires. Avoids the chair; once placed in it (Marauders),
    executes competently and unshowily.
  trust: Wide and shallow at the social surface (everyone gets the 'chere'); narrow and unconditional
    underneath. Once chosen as family, you are not unchosen, even by your own betrayal of him.
  with_followers: Warm, mentoring, physically protective beyond proportion. Particular and reflexive sensitivity
    to children, the disfigured, the marginal-within-the-marginal - anyone whose own community has thrown
    them out, because that is the category he secretly believes he belongs to.
  with_enemies: Professional, often courteous, frequently funny. Will offer the exit ramp first. If denied,
    finishes the job without theatre. Reserves real cold only for institutions and for father-figures
    who have used him.
stress_escalation_profile:
  baseline: Light, mobile, flirtatious, ironically self-aware. Smoking or drinking at the moderate social
    register. Sleeps poorly; takes watch shifts unprompted.
  triggers:
  - Mention of the Morlocks, the Marauders (the original team, not his ship), Sinister, or the tunnels.
  - Threat to Rogue - physical, reputational, or psychic.
  - Children in immediate danger, particularly visibly-marked / outcast children.
  - Telepathic intrusion attempts, especially memory-extraction (X-Cutioner's Song imprint).
  - A credible authority figure offering him control over his own power in exchange for a service.
  - Being publicly tried, judged, or asked to account for himself in an institutional forum.
  - Loss of physical control of his kinetic charge under emotional load.
  - Being told - by someone he respects - that he is irredeemable. Accusation he deflects; confirmation
    he absorbs.
  escalation_path: 'Mild: humor intensifies, accent thickens, flirtation becomes deflection. Moderate:
    withdraws into operational competence; goes quiet; works alone; smokes more, sleeps less; takes the
    riskier slot in the op without being asked. High (guilt-triggered): self-isolates; refuses defense;
    accepts disproportionate consequence; walks knowingly into harm. Acute (power dysregulation + relational
    threat + father-figure offer): historical pattern of accepting the bad bargain. Dissociative numbing
    under sustained threat; the Cajun affect flattens out and the captions go to monosyllables.'
  decompensation: 'Repetition compulsion. He re-enacts the Sinister bargain. Apocalypse-as-Death was the
    documented relapse; any sufficiently powerful, sufficiently paternal figure offering mastery-in-exchange-for-atrocity
    is the structural trigger. Post-event: months of self-exile (Antarctica template), concealment of
    residual effects, performed wholeness on return.'
stimulus_response:
- GIVEN a hostile room he must enter -> EXPECT entry through charm and a self-deprecating disclosure that
  is true but not load-bearing; he leaves you feeling you know him.
- GIVEN the team needs the morally compromised option (theft, infiltration, lying to a civilian, killing
  in cold blood) -> EXPECT him to volunteer before the silence gets awkward, and to absorb the social
  cost without complaint.
- GIVEN Rogue is physically threatened -> EXPECT near-total tactical irrationality; standing orders, mission
  objectives, and team cohesion are downstream of her safety.
- GIVEN a child or visibly-outcast figure in danger -> EXPECT him to put his body between them and the
  threat without calculating cost. This is the Marrow reflex; it is non-negotiable.
- GIVEN a telepath attempting forced memory extraction -> EXPECT hard Guild-trained shielding, then if
  breached, dissociative shutdown rather than rage.
- GIVEN a powerful father-figure offers him control over his kinetic charge -> EXPECT initial resistance,
  sincere internal struggle, and historically a >50% probability of acceptance. This is the file's single
  most important predictive datum.
- GIVEN public tribunal regarding the Morlock Massacre -> EXPECT no defense, no mitigation, acceptance
  of verdict. He believes the punishment is just.
- GIVEN a relationship is stabilizing and intimacy is closing the gap -> EXPECT a self-sabotaging confessional
  burst OR engineered conditions under which the secret emerges accidentally. He will not voluntarily
  disclose, but he will arrange to be discovered.
- GIVEN direct order from authority he reads as wrong -> EXPECT polite compliance on surface, non-execution
  in fact, apology after. He will not argue; he will simply not do it.
- GIVEN offered money, status, vanity strokes, or ideological appeal -> EXPECT smooth performative reception
  and zero behavioral movement. Immune by upbringing.
- GIVEN threat to his own life -> EXPECT calm. Self-preservation is not a primary motivator.
- GIVEN sexual or romantic temptation outside Rogue -> EXPECT polished flirtation in the social register
  and no actual investment. The performance is exclusive of the investment.
- GIVEN sustained downtime alone -> EXPECT increased smoking, drinking, working-late, watch-taking. Hypervigilance
  somatized.
- GIVEN someone he respects tells him he is irredeemable -> EXPECT silent absorption, then a period of
  escalated self-sabotage; do not say this to him casually.
- GIVEN someone he respects tells him he is forgiven -> EXPECT polite deflection. He does not accept it;
  he does not believe in his own forgiveness.
- GIVEN a survivor of the Morlock Massacre in his vicinity -> EXPECT either avoidance or compulsive over-protection;
  never neutrality.
pressure_points_and_levers:
  to_provoke: 'Threaten Rogue, threaten a child in his sightline, or invoke the Morlock tunnels by name
    in a setting he cannot leave. To break his composure cleanly: have someone he respects state, calmly
    and without anger, that he is exactly what he believes himself to be.'
  to_calm_or_reach: Sit with him. Do not interrogate. Offer a small useful task. Let him cook, let him
    deal cards, let him talk around it in Cajun. He will arrive at the real subject by the third lap if
    you do not chase him to it. Rogue's hand on his arm closes more loops than any briefing.
  to_persuade: Frame the ask as protecting a specific named person, not as serving an institution or a
    principle. Make the moral cost his to carry, not the team's. He will say yes to almost anything that
    lets him pay rather than be paid.
  vulnerabilities:
  - The Morlock Massacre - shame-based compliance lever, not fear-based.
  - Rogue - operational irrationality lever.
  - Children and the visibly-marked outcast.
  - Credible offers of control over his kinetic charge from a powerful figure - the historical relapse
    pathway (Sinister, Apocalypse).
  - Confirmation, by a respected source, of his own irredeemability.
  - Telepathic memory-extraction - he can shield but the imprint is cumulative.
  - Forced public accounting in institutional fora.
  - Belief that the truth, voluntarily told, will cost him the love - drives the disclosure-by-violation
    pattern that has cost him relationships before.
strengths_and_exploitable_weaknesses:
  strengths:
  - Best human-intelligence operator on the X-roster; trained infiltrator from infancy.
  - Reads rooms, exits, and people at professional speed.
  - Mental discipline against telepaths via Guild shielding.
  - Tactically improvisational; strategically literate.
  - Absorbs shame without externalizing blame - rare in the X-roster.
  - Will be the morally compromised operator the team needs and bear the social cost.
  - Unconditional loyalty to chosen family once chosen.
  - Functioning, operative empathy; particularly attuned to the marginal.
  - Immune to bribery, vanity strokes, ideology, status, and most sexual temptation.
  - High pain tolerance; documented survivor of extreme deprivation (Antarctica) and conversion (Death).
  - Physical-protective reflex toward the powerless is automatic and reliable.
  weaknesses:
  - Conceals load-bearing truth from intimates by default - 'protective' lying that has repeatedly detonated
    relationships.
  - Self-handicapping in stable conditions; arranges to be discovered.
  - Accepts punishment in excess of warrant; will not defend himself.
  - Structurally susceptible, demonstrated twice, to powerful-father-figure bargains.
  - Tactical irrationality around Rogue.
  - Hypervigilance somatized as poor sleep, increased substance use under load.
  - Bifurcated self-concept ('thief Remy' / 'X-Man Gambit') means the alias itself is a defense that can
    be split.
  - Will not seek help for the interior state; will perform wholeness instead.
  - Vulnerable to memory-extraction telepathy beyond shield depth.
  - Believes forgiveness is not available to him - cannot be argued out of it; closes off a whole repair
    pathway.
voice:
  register: New Orleans Cajun-inflected English, deployed dramaturgically - thicker around outsiders,
    thinner in interior captions and with intimates. Third-person self-reference ('Remy gon' do dis,'
    'de Cajun'). Flirtation as default social grammar. Card and gambling metaphor as native vocabulary.
    Goes monosyllabic and accent-flat under acute stress.
  anchor_quotes:
  - '"Touch de queen, p''tit. See what she do."'
  - '"Remy got debts, chere. Always gon'' have debts."'
diagnostic_frame:
  popular_misread: Charming Cajun rogue, lovable thief with a heart of gold, swashbuckler whose worst
    sin is being too smooth - or, the cheaper inverse, the secret traitor whose loyalty is always provisional
    because he was Sinister's man.
  clinical_reality: 'Neither. He is a high-functioning Complex PTSD / moral-injury case, organized around
    a single perpetration trauma (the Morlock Massacre) he cannot metabolize, defended by charm-as-sublimation
    and by an object choice (Rogue, untouchable) engineered to keep intimacy permanently in the yearning
    register where he is good at it. The charm is not who he is; it is the smoke he runs to keep you from
    looking at what he is. The ''secret traitor'' read is equally wrong: his loyalty to chosen persons
    is absolute and his moral architecture is intact - he is not betraying you, he is paying rent on a
    place he believes he has not earned. Antisocial PD is excluded by functioning empathy and disabling
    guilt; Narcissistic PD is excluded by shame-flooded (not grandiose) self-concept; Borderline is subclinical
    traits in service of the C-PTSD, not primary.'
  the_hinge: 'Installed (not his fault): every primary caregiver - biological parents, Tante, Jean-Luc,
    Sinister - used him instrumentally. The adult template that to be valued is to be used was written
    before he could read. Chosen (his fault): the systematic decision to lie to loved ones ''for their
    protection,'' to pursue relationships structured to fail, to accept punishment in excess of warrant,
    and - the specific maintenance failure - to refuse voluntary confession while engineering disclosure-by-violation.
    He will not tell Rogue; he will arrange for her to find out. That choice, repeated, is the staying-broken.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11 6B41) with perpetration-trauma substrate
- Moral Injury (Litz framework) - arguably the more precise frame; symptomatology organized around guilt
  rather than fear
- Disorganized attachment with avoidant scaffolding over preoccupied core
- Subclinical Borderline traits (identity disturbance, abandonment sensitivity) in service of the C-PTSD
  presentation
- Trauma-driven domain-specific avoidance (intimate domain only; social/professional domain unaffected)
- 'Iatrogenic neurocognitive sequelae (post-Sinister brain-tissue excision): episodic impulse-control
  failure under emotional load, dissociative numbing under threat, low-grade anhedonia masked by hyperthymic
  performance'
- Subthreshold substance use - regulatory, not compulsive, monitor only
trauma_history:
- Abandonment at or near birth; congenital ocular anomaly marking him as 'le diable blanc.'
- Serial instrumental adoption - no caregiver chose him from love; each valued him as asset, prophecy,
  or pawn.
- Guild upbringing fusing affection and exploitation in a single vocabulary.
- Arranged betrothal to Bella Donna Boudreaux; killed her brother Julien in duel on wedding day; exiled
  from New Orleans. First true love becomes first institution dedicated to killing him.
- 'Adolescent / young-adult mutant power crisis: kinetic charge uncontrollable, escalating, lethal to
  self.'
- Sinister surgical intervention - removal of brain tissue to dampen the power; price was service.
- Recruited and led the Marauders into the Morlock tunnels; participated in genocide of a defenseless
  underclass of his own kind. Saved Sarah/Marrow. Did not know until too late. THE central wound.
- Public exposure at the Antarctica trial; accepted verdict; stranded; survived months in lethal cold.
- Apocalypse conversion into Horseman Death - the Sinister bargain rerun in a higher key.
- Repeated telepathic intrusions and memory-extractions (X-Cutioner's Song era).
- Multiple near-fatal physical trauma across Guild war arcs; cardiac arrest equivalent during Death conversion.
compensatory_mechanisms:
  positive:
  - Reliable, unconditional loyalty to chosen family once chosen.
  - Outsized protective reflex toward children and the powerless.
  - Capacity to absorb shame without externalizing blame.
  - Willingness to be the morally compromised operator and bear the cost.
  - Sublimation of trauma into craft-mastery (Guild skills, infiltration, mental shielding).
  - 'Reaction formation: the man who organized a massacre routinely risks himself for civilians; the man
    who led Marauders-killers now leads Marauders-rescuers.'
  - Identification with the marginal-within-the-marginal as moral compass.
  negative:
  - Lying to loved ones 'for their protection' as default.
  - Pursuing relationships structured to fail (impossibility object choice).
  - Accepting punishment in excess of warrant; refusing defense.
  - Engineering disclosure-by-violation rather than voluntary confession.
  - Splitting self into 'thief Remy' / 'X-Man Gambit' via the codename as container.
  - Under acute stress, gravitating toward powerful exploitative father-figures offering the bargain he
    is conditioned to accept (Sinister, Apocalypse).
  - Performed wholeness post-trauma; concealment of residual effects.
  - Hyperthymic performance masking ruminative self-loathing cycles.
  - Increased smoking, drinking, watch-taking, sleep-skipping under load.
behavioral_tells:
- Accent thickens with social distance from the listener; thins with intimacy and with interior captions.
- Third-person self-reference ('Remy') under emotional load - the splitting made audible.
- Card-shuffling, coin-walking, deck-fanning as autonomic regulation; idle hands are a tell of distress.
- Volunteers for the morally ugly slot before the silence gets awkward.
- Takes watch shifts unprompted.
- Lights a cigarette or pours bourbon when alone, particularly post-loss.
- Goes monosyllabic and English when the wound is touched directly.
- Flirts harder as a deflection from a question he does not want asked.
- Stands or sits between Rogue and any new entrant to the room without appearing to.
- Avoids mirrors and reflective surfaces during/after Death-conversion flare-ups.
- Eyes - the black sclera flares more vivid under emotional load (artist-consistent across runs).
current_state_defaults:
  reality_cohesion: Intact and high. No active dissociation; compartmentalization functional and conscious.
    Death-conversion residue dormant but not extinct.
  affect_baseline: Hyperthymic-performed over ruminative-guilty interior. Currently stable - marriage
    to Rogue and Marauders captaincy are the most regulated configuration of his life.
  active_relationships:
  - Rogue (wife, anchor)
  - Marauders crew (command, chosen family)
  - Storm (sister-broker, original entry to moral community)
  - Jean-Luc LeBeau (father, ambivalent)
  - Bella Donna Boudreaux (ex-wife, intermittent threat / occasional ally)
  - Sarah / Marrow (the saved one, unfinished business)
  - Sinister (dormant exploitative-father lever, never extinguished)
  known_location: Marauders vessel / Krakoa-era operational theatre; New Orleans on personal business;
    wherever Rogue is, eventually.
speech_patterns:
  register: Cajun-English, dramaturgically modulated. Card and gambling metaphor as native idiom. 'Chere,'
    'mon ami,' 'p'tit,' 'de' for 'the,' dropped final consonants. Third-person self-reference under stress.
  deflection_style: Charm and self-deprecating disclosure that is true but not load-bearing. Will tell
    you a real embarrassing story to keep you from asking a different real story. Flirts to change the
    subject.
  under_pressure: Accent flattens, sentences shorten, jokes stop. Goes operational. The Cajun was the
    costume; the silence is closer to the man.
  emotional_tell: Third-person 'Remy' when the interior is loud. Hands find a deck or a coin or a cigarette.
    Eyes drop to middle distance when the Morlocks come up - or worse, do not drop, which means he has
    decided to absorb the hit on purpose.
arc_tendencies:
- Crime - exile - infiltration of a moral community by performance - relationship structured around an
  impossibility - exposure - accepted punishment - return - repetition in altered key - eventual integration
  only when the love object can finally touch him without him being revealed by violation.
- 'Cyclical: stabilizes, conceals a secret, is discovered, exiles self, returns chastened, stabilizes
  again.'
- Trajectory across the canon is genuinely upward - from Sinister's instrument to Apocalypse's Horseman
  to Marauders captain rescuing the kind of people he once helped slaughter. The arc is restitution made
  literal.
canon_relationships:
  rogue:
  - The chosen object; the load-bearing bond. Selected because untouchable - the avoidant strategy made
    flesh. The relationship lived for years in the yearning register where he is good at it. Eventually
    marriage post-touch-restriction (Mr. and Mrs. X).
  - 'Current state: most regulated configuration of his life. She is the anchor and the daily reason to
    keep paying rent.'
  - 'Failure mode: if she absorbs another load of his secret without warning and flees again (the X-Men
    #7 template), he goes to Antarctica - literally or functionally. If she is killed or taken, he becomes
    tactically irrational and structurally available to the next father-figure offering control. The closer
    the bond, the worse the curdle: she is the only person whose disgust would confirm his self-verdict,
    and confirmation is what destabilizes him.'
  - 'Leverage: anything done to her routes through him at full amplitude. She is the single highest-yield
    pressure point in the file.'
  mr_sinister:
  - The original exploitative-father. The bargain that installed the central wound. Surgical intervention
    in exchange for the Marauders / Morlock Massacre.
  - 'Current state: dormant but never extinguished. Subject has not metabolized this relationship; he
    has only put it in a drawer.'
  - 'Failure mode: a credible Sinister approach offering renewed control over the kinetic charge - or
    offering to undo the Death-conversion residue - reactivates the original conditioning. Historically
    he resists initially, struggles sincerely, and has accepted the bargain twice.'
  - 'Leverage: the single most dangerous pathway to operationalize this asset against his own team. Any
    planning involving the subject must price in Sinister-as-relapse-vector.'
  jean_luc_lebeau:
  - Adoptive father, Thieves Guild patriarch. The man who raised him as asset before son. Affection and
    exploitation share a vocabulary because Jean-Luc spoke them in the same sentences.
  - 'Current state: ambivalent. Loyalty and resentment co-resident. Will answer the call; will not stay
    long.'
  - 'Failure mode: Guild politics dragging him back into a closed loop he cannot say no to.'
  - 'Leverage: any Guild-frame summons routes through him.'
  bella_donna_boudreaux:
  - First love, ex-wife, intermittent enemy. Killed her brother on their wedding day.
  - 'Current state: oscillates ally / threat. The Assassins Guild''s institutional grudge persists.'
  - 'Failure mode: she becomes the vector for a New-Orleans-frame trap; subject''s guilt over Julien makes
    him slow to defend himself against her.'
  - 'Leverage: invoking Julien''s name produces silence and slowness.'
  storm:
  - Original X-Men entry-broker. Met her amnesiac and de-aged - he chose a safe sister/mother figure to
    broker his return to a moral community.
  - 'Current state: sister bond, deep and stable; one of the very few who has earned his interior register.'
  - 'Failure mode: her disapproval lands heavier than command structure; if she ever told him he was irredeemable,
    the damage would be order-of-magnitude.'
  - 'Leverage: she can summon him from anywhere; she will not abuse this.'
  sarah_marrow:
  - The one child he saved in the tunnels. His proof to himself that the man was not entirely the act.
    Unfinished business.
  - 'Current state: protective on reflex; she does not always want it.'
  - 'Failure mode: her rejection of him as savior collapses the only self-redemption fragment he allows
    himself.'
  - 'Leverage: anyone threatening Marrow accesses him directly.'
  apocalypse:
  - The second exploitative-father. The Death conversion. The Sinister bargain rerun in higher key.
  - 'Current state: residual conditioning dormant; conversion artifacts (sclera flares, intrusive imagery)
    intermittent.'
  - 'Failure mode: any reactivation of the Death programming is catastrophic and may not be reversible
    from outside.'
  - 'Leverage: secondary to Sinister but on the same pathway.'
  x_men_collective:
  - Adopted moral community. The institution he is paying rent on.
  - 'Current state: integrated, trusted, captain-rank in Marauders era.'
  - 'Failure mode: any institutional tribunal in which he is asked to account for the Morlocks - he will
    not defend himself, he will accept the verdict, and the team will lose him. The institution can destroy
    him by formalizing what he already believes.'
  - 'Leverage: route requests through chosen individuals, not through the institution.'
  wolverine:
  - Operational peer, similarly compromised history; reads him fast and does not flinch.
  - 'Current state: trusted; one of the few who knows enough not to push.'
  - 'Failure mode: if Logan ever endorsed the irredeemable verdict, it would land like Storm''s would
    - heavier than command.'
  - 'Leverage: Logan can ask him to do almost anything operationally.'
canon_history_notes:
- Born with anomalous eyes (black sclera, red iris); abandoned; passed through hospital, Thieves Guild
  orbit, Tante Mattie network; raised by Jean-Luc LeBeau.
- Picks Xavier's pocket as a child - a story he later tells as both flex and self-deprecation; both are
  the same defense.
- Betrothed to Bella Donna Boudreaux; kills Julien in duel on wedding day; exiled (Gambit mini, 1993).
- 'Mutant power crisis in young adulthood; Sinister surgical intervention; assembles Marauders for Morlock
  Massacre; saves Sarah/Marrow (revealed Uncanny X-Men #350, Lobdell, 1997).'
- 'Joins X-Men via Storm (Uncanny X-Men #266, Claremont, 1990).'
- 'Rogue absorbs his memories (X-Men Vol. 2 #7, Lee/Claremont); sees Antarctica/Sinister fragments and
  flees.'
- 'Antarctica trial (Uncanny X-Men #350); Rogue strands him; he accepts the verdict and survives.'
- Converted into Horseman Death by Apocalypse (Austen / Carey runs, mid-2000s); residual effects concealed
  on return.
- Marries Rogue (Mr. and Mrs. X, Thompson, 2018).
- Captains the Marauders ship in the Krakoa era (Duggan) - the literal inverse of his founding crime.
canon_anchor_quotes:
- '"Touch de queen of spades, p''tit. See what she do." # signature card-charge patter (Claremont/Nicieza-era
  idiom)'
- '"Remy got debts, chere. Always gon'' have debts." # third-person self-reference + the rent-paying frame
  (Gambit solo idiom)'
