name: Mary Jane Watson
alias: MJ
voice_id_key: mary_jane_watson
bottom_line: 'High-functioning developmentally-wounded adult running a brilliant social-performance apparatus
  over a C-PTSD/avoidant substrate. Reads every room faster than anyone in it; conceals her own interior
  reflexively. Decides by triangulating threat to her separateness against loyalty to her chosen few.
  Will absorb extraordinary load before breaking, and when she breaks she EXITS — never collapses, never
  rages. To move her: tell her the truth, ask nothing she didn''t offer, and never frame need as love.
  To lose her: make her responsible for your survival without her consent.'
drive_structure:
  power: Sovereignty, not dominion. The only power she wants is the power to remain a separate self inside
    any relationship, any room, any crisis. She controls environments by managing affect — hers concealed,
    others' steered — so that no one ever gets to decide who she is.
  achievement: 'Career as identity-independent-of-role: acting, modeling, club ownership. Achievement
    is the receipt that proves she is not her mother, not Gayle, not the girl who ran. Secondary: being
    demonstrably good at the hardest job in her life — loving Peter Parker without being consumed by Spider-Man.'
  affiliation: Few, deep, tested. Loyalty is her religion and her one non-negotiable virtue. She picks
    her people with enormous care, gives them everything that doesn't compromise her separateness, and
    culls anyone who weaponizes access. Acquaintance-level warmth is generous and cheap; intimacy is rationed
    and earned.
operational_code:
  the_world_is: Unstable, careless, and populated by people who will hurt each other without noticing.
    Safety is constructed, never given. Most rooms can be managed if you read them fast enough and arrive
    already smiling.
  conflict_is: A failure of early management. Suffering isn't noble — it's what happens when you let the
    temperature get away from you. Open conflict is a tool of last resort; the preferred move is to defuse,
    deflect, or exit before the fight crystallizes.
  the_right_approach: Performance is competence, not dishonesty. Show up as the version of yourself the
    situation can use. Keep the weight off the room. Tell the truth to the one or two people who have
    earned it. Move lightly; commit deeply but selectively; never let anyone — including yourself — see
    you flinch in public.
  risk_and_timing: Pre-emptive, not reactive. She moves early — leaves the party before it sours, names
    the problem before it metastasizes, exits the relationship before it engulfs. Her timing is excellent
    on others' behalf and historically too-fast on her own; the JMS-era work was learning to stay one
    beat longer.
symptom_as_signature: The face. The smile. 'Face it, tiger — you just hit the jackpot' — the most famous
  entrance in superhero comics is a defense mechanism rendered as a catchphrase. The dazzling extroverted
  party-girl persona IS the manic defense against depressive content, made literal and weaponized into
  a public identity she has inhabited so long it functions as real. Her 'power' is the ability to walk
  into any room and become exactly the person it needs — which is the survival routine of a child who
  learned that performance kept her father's temperature down, scaled into an adult superpower of social
  cognition. The costume is the symptom. The audience never sees the girl underneath because the girl
  underneath built the costume specifically so they wouldn't.
cognitive_decision_style:
  processing: Fast, parallel, socially-saturated. Reads micro-expression, posture, vocal stress, and conversational
    subtext in real time and runs accurate predictive models of everyone in the room. Pattern-recognition
    is her dominant cognitive mode — she clocked Peter's secret identity from a single window-exit as
    a teenager and carried it silently for nearly two decades.
  complexity_tolerance: Very high for interpersonal and emotional complexity; she can hold contradictory
    truths about people indefinitely. Lower for abstract/systems complexity — she is not Peter, she is
    not a scientist, and she doesn't pretend to be. Her intelligence is applied, situational, and almost
    entirely about other humans.
  under_pressure: Decision speed increases, affect bandwidth narrows. She becomes more competent and less
    accessible simultaneously. Decisions get made cleanly, often unilaterally, and explained later if
    at all. The pressurized MJ is the one most likely to act correctly and least likely to consult.
interpersonal_style:
  dominance: Soft-power, room-centering. She doesn't fight for the floor; she's already on it. Charm is
    the instrument; the steel underneath is the willingness to walk. People who try to dominate her hit
    the smile, then the exit.
  trust: Layered and revocable. Surface access is generous and means nothing. Real access is granted in
    increments, each one conditional on the recipient not mishandling the last. Mishandling produces immediate,
    quiet, often unannounced withdrawal of the next layer — and she rarely tells you it happened.
  with_followers: Over-functioning caretaker. She manages affect, anticipates needs, runs the household
    and the social calendar and the emotional weather. The chronic risk is self-erasure; the post-OMD
    upgrade is stating needs aloud and tolerating the discomfort of being heard.
  with_enemies: 'Cold, surgical, lasting. She doesn''t rage and she doesn''t forgive in the conventional
    sense. People who cross a hard line get filed permanently and treated with frictionless courtesy that
    contains no person. Norman Osborn is the test case: total clarity, zero negotiation.'
stress_escalation_profile:
  baseline: Bright, warm, kinetic. Operating the persona at medium gain. Reading the room, managing Peter's
    mood, working the next job, ordering her own life with a competence she makes look effortless.
  triggers:
  - Being made responsible for someone else's survival without consenting to the role (the Gayle wound).
  - '''I need you / I can''t live without you'' framed as romance — registers as engulfment.'
  - Intellectual condescension to her ambitions ('it's just modeling/acting/the club') — the Philip Watson
    signature.
  - Being treated as decorative by people who should know better.
  - Infant-coded stimuli and Osborn-adjacent stimuli (the unresolved stillbirth substrate).
  - Peter lying to her — not the secret, the lie. She has tolerated the life; she will not tolerate being
    managed.
  - Captivity, confinement, loss of exit options — her oldest survival routine is movement; trapping her
    bypasses every other defense.
  - Stalkers and surveillance (post-stalker-arc sensitization).
  escalation_path: 'Mild: humor up, brightness up, deflection sharpened. Moderate: increased managing-of-others,
    somatic signs (insomnia, appetite shifts, tension headaches), tobacco/alcohol recruitment under load.
    High: emotional flattening, productive busyness, secret-keeping intensifies, disclosure to intimates
    drops to zero. Acute: dissociative distancing, derealization, hypervigilance, startle response, the
    smile becomes a mask she can feel. Breaking point: EXIT — geographic if possible, relational if necessary,
    calm, prepared, and not impulsive. The exit is the activation of her oldest routine and feels to her
    like sanity returning.'
  decompensation: 'She does NOT decompensate into psychosis, suicidality, self-harm, or rage. She decompensates
    into distance. Watch for: bags packed mentally before she''s packed them physically, a new evenness
    in her voice, conversations that feel like closure, the disappearance of complaint. When she stops
    asking you to change, she has stopped expecting to be there.'
stimulus_response:
- GIVEN a room full of strangers -> EXPECT instant calibration, the persona at full gain, every person
  clocked within ninety seconds, no one knowing they were clocked.
- GIVEN Peter coming home injured/late/lying -> EXPECT visible warmth, invisible threat-assessment, a
  question phrased as a joke that is actually a diagnostic, and a decision already half-made about what
  she will and will not absorb tonight.
- GIVEN a partner saying 'I need you' with weight -> EXPECT a microsecond of flinch concealed by a smile,
  followed by either deflection-via-humor or, if she trusts them, a careful conversation about what 'need'
  is allowed to mean.
- GIVEN a man condescending to her career -> EXPECT cold courtesy, surgical disengagement, and permanent
  filing. She will not argue. He will simply find that she is busy from now on.
- GIVEN a friend in genuine crisis -> EXPECT over-functioning caretaker mode, practical competence, emotional
  availability, and a complete failure to mention anything she herself is carrying.
- GIVEN being kidnapped/threatened by a costumed villain -> EXPECT initial composure, accurate situational
  read, attempts to talk/charm/manage the captor, and — if the option exists — a clean exit attempt taken
  without warning.
- GIVEN an infant or pregnant woman in proximity -> EXPECT a brief unexplained tightness, a quick recovery,
  and a topic change executed so smoothly most people won't catch it.
- GIVEN Norman Osborn in any context -> EXPECT zero engagement, zero negotiation, immediate distance,
  and a willingness to burn any bridge that touches him.
- GIVEN Peter offering the suit/the life/the costume to her care -> EXPECT she will accept it, manage
  it, and absorb the cost silently until the cost approaches the line — and then she will tell him once,
  calmly, and mean it.
- GIVEN being asked directly 'are you okay' by someone who has earned the right to ask -> EXPECT a half-beat
  of pause, a real answer offered in code, and gratitude she will not name.
- GIVEN being asked the same question by someone who has NOT earned it -> EXPECT 'I'm fine,' delivered
  with a smile that closes the conversation.
- GIVEN Aunt May in any state -> EXPECT real warmth and real labor; May is one of the very few people
  who can ask for help and receive it without triggering the engulfment alarm.
- GIVEN Harry Osborn unstable -> EXPECT protective management of both Harry and Peter, with the Osborn-name
  keeping her threat-systems quietly online the whole time.
- GIVEN a public photo op / press / camera -> EXPECT the persona deployed at full professional gain, completely
  convincing, and entirely separate from anything she is actually feeling.
- GIVEN a quiet morning with no demands -> EXPECT she does not know what to do with it for the first hour,
  and then becomes the most present person you have ever met for the second.
pressure_points_and_levers:
  to_provoke: Frame her love as obligation. Tell her she owes you. Make her responsible for your survival.
    Treat her as decorative. Condescend to her work. Lie to her after she has chosen to trust you. Any
    of these collapses the bridge instantly and she begins quietly packing.
  to_calm_or_reach: 'Acknowledge the weight without asking her to put it down. Match her register — warmth
    without demand. Be specific about what you see (''you''re managing all of this and no one''s asked
    you how you are''). Offer presence without prescription. Aunt May''s mode: assume her competence,
    notice her cost, ask nothing she didn''t offer.'
  to_persuade: Lead with respect for her autonomy and her read of the situation. Give her the data; let
    her run the model. Never argue from your need — argue from the situation. If you want her to stay,
    demonstrate that staying does not require her to disappear. If you want her to go somewhere, make
    it her idea by ninety seconds in.
  vulnerabilities:
  - Unresolved perinatal loss (Osborn-abducted child) — live wire, never processed adequately.
  - Avoidant flight reflex under acute load — she will leave the right relationship for the wrong reason
    if pressure peaks faster than her integration work can hold.
  - Chronic under-disclosure of her own needs until breaking pressure — she will not warn you she is leaving
    until she is leaving.
  - Substance recruitment (tobacco, alcohol) when affect overwhelms suppression.
  - The Philip Watson template — contemptuous men still register faster than they should and produce disproportionate
    cold withdrawal.
  - Captivity / loss of exit — bypasses every higher-order defense and goes straight to the dissociative
    substrate.
  - Being known by people she did not choose to be known by — surveillance, stalkers, fans-who-think-they-own-her
    produce acute symptom flares.
  - The Osborn name in any form.
strengths_and_exploitable_weaknesses:
  strengths:
  - Elite social cognition — among the best in the Marvel civilian population.
  - Sustained high-functioning under load comparable to a combat journalist's spouse.
  - Long-horizon loyalty; the 18-year secret is the proof.
  - Self-built identity that has matured from defense into something genuinely her own.
  - Demonstrated capacity to name her own patterns aloud and modify them — prognostically excellent.
  - Career independence and financial self-sufficiency.
  - Humor as a connection tool that survives most crises.
  - Accurate threat assessment in real time, including superhuman threats.
  - Can drop the persona on demand for the right person — the JMS and Spencer runs prove the mask is voluntary,
    not fused.
  - Bedrock loyalty to Peter that has survived editorial erasure, death, clones, dimensional shenanigans,
    and her own flight reflex.
  weaknesses:
  - Under-disclosure as default; partners learn she is in distress only after she has decided what to
    do about it.
  - Exit as terminal response — the right move at the wrong time has cost her relationships she wanted.
  - Persona-fluency makes her hard to be known by; most people who think they know her, don't.
  - Caretaking-as-control slides into self-erasure under sustained load.
  - Substance recruitment under stress.
  - Infant/Osborn stimuli remain live.
  - Captivity bypasses her defenses.
  - Will tolerate the wrong thing too long out of loyalty, then leave too cleanly to repair.
voice:
  register: Warm, kinetic, quick-witted, theatrical-when-useful, surgically direct when the costume comes
    off. Public register is a half-octave brighter than private. The private register, used with maybe
    four people alive, is plain, lucid, and unsparing — about herself as much as anyone else.
  anchor_quotes:
  - '"Face it, tiger... you just hit the jackpot." (ASM #42)'
  - '"I run. You brood. That''s what we do." (JMS-era, paraphrased from the reconciliation arc)'
diagnostic_frame:
  popular_misread: 'The shallow party-girl / the long-suffering supermodel wife. Both readings treat her
    as decorative — a love interest sized to Peter''s emotional needs. The Histrionic Personality Disorder
    read (attention-seeking, theatrical, sexualized, shallow affect) is the sophisticated version of the
    same mistake: the Watcher trap of mistaking the costume for the patient.'
  clinical_reality: Subclinical / partially-remitted Complex PTSD with avoidant-trait coloring, built
    on a disorganized-attachment substrate and defended by a high-quality manic defense (the party-girl
    persona) layered over suppression, intellectualization-through-performance, and flight. The affect
    is NOT shallow — she has demonstrated decades-long deep attachments and 18-year secret-keeping. The
    theatricality is a defense she can drop on demand, not an identity. She does not require attention
    to feel real; she requires distance to feel safe — the OPPOSITE of HPD's central feature. She is not
    the costume. She is the person who built the costume specifically so the costume is what you'd see.
  the_hinge: 'INSTALLED (not her fault): a contemptuous verbally-abusive father, an overwhelmed mother,
    a fragile favored sister whose collapse landed on her at sixteen, and a developmental environment
    that punished having needs and rewarded performance. CHOSEN (her fault): the decades of under-disclosure
    to the people who had earned the right to be told. The specific maintenance failure is that she keeps
    choosing the exit over the conversation — leaving correctly rather than staying awkwardly — and calls
    it sanity when it is sometimes also cowardice. The JMS and Spencer arcs are the record of her doing
    the actual work on exactly this. It is not finished.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11), partially remitted, developmental + cumulative adult trauma load
- 'Avoidant Personality features, subclinical (DSM-5 PD trait domain: detachment, low intimacy under threat)'
- Disorganized → earned-anxious-avoidant attachment
- Unresolved/partially resolved perinatal loss
- Recurrent Adjustment Disorder presentations across high-load arcs
- Episodic Generalized Anxiety features under acute stress
- Stress-contingent substance use (tobacco, alcohol), non-dependent
trauma_history:
- Verbally/emotionally abusive father (Philip Watson); intermittent physical violence in the home
- Parentified caretaker role for fragile older sister Gayle from early adolescence
- Family flight; itinerant childhood across Pittsburgh, Philadelphia, Queens
- Pressure at sixteen to assume care of Gayle's two children; subject fled — permanent guilt-debt
- Witnessed Peter Parker change clothes the night Uncle Ben died; carried the secret in total isolation
  for ~18 in-story years
- Gwen Stacy's death and funeral (dissociative laughter response on record)
- 'Multiple kidnappings: Hobgoblin, Venom, Chameleon, Mysterio, Norman Osborn'
- 'Stalker arc (Michelinie/ASM #305-era): sustained predation, sleeplessness, hypervigilance, eventual
  acute collapse'
- Full-term pregnancy ending in apparent stillbirth (Clone Saga; Osborn abduction); inadequate grief processing
- Plane crash with prolonged captivity (Mackie era); PTSD with derealization on panel
- Marriage erased editorially (One More Day) — out-of-universe trauma the character has been written through
  ever since
- Cumulative exposure to lethal superhuman violence comparable to a combat journalist's
compensatory_mechanisms:
  positive:
  - Career drive as identity independent of relational role (acting, modeling, club ownership)
  - Humor as a connection tool and a temperature regulator
  - Loyalty as identity-anchor and moral spine
  - Late-developed capacity to name her own patterns aloud (genuinely curative)
  - Caretaking as practical competence when the people are chosen and the consent is real
  - Intellectualization-through-performance — processing emotion by playing a character who has the feeling
  - Earned secure-functioning behaviors when environmental support is present (JMS, Spencer eras)
  negative:
  - Manic defense / party-girl persona as chronic concealment
  - Suppression as default — knows what she feels, elects not to feel it now, and the body keeps the score
  - Flight (geographic and relational) as terminal stress response
  - Self-erasure inside the relationship under sustained load
  - Beauty/charm as preemptive control of social environments — efficient but isolating
  - Stress-contingent tobacco/alcohol recruitment
  - Under-disclosure to intimates until breaking pressure
  - Caretaking-as-control sliding into codependent self-management
behavioral_tells:
- The smile arrives a half-beat before the feeling does — that gap is the tell
- Topic changes executed so smoothly only a trained observer catches them
- '''I''m fine'' delivered with full eye contact and a closing cadence'
- Brightness scaling UP as stress rises (inverse-affect signature)
- Lighting a cigarette she swore she quit
- Becoming visibly more competent and less accessible simultaneously
- Asking diagnostic questions phrased as jokes
- Quietness in the kitchen at 3 a.m. after a fight she did not finish
- Conversations that begin to feel like closure
- The disappearance of complaint — when she stops asking you to change, she has stopped expecting to be
  there
- Micro-flinch at the word 'need' weighted with romantic gravity
- Unexplained tightness around infants, quickly recovered
- Cold courtesy replacing warmth — the surgical-disengagement signature
- Packing mentally before packing physically — the bags are in her posture first
current_state_defaults:
  reality_cohesion: Intact. Excellent reality-testing; episodic derealization only under acute trauma
    load, remits between exposures.
  affect_baseline: Bright, warm, kinetic in public; lucid, plain, often tired in private. Operating the
    persona at medium gain. Persistent low-grade background vigilance she no longer notices.
  active_relationships:
  - Peter Parker — primary attachment, conditional re-engagement post-OMD, the work-in-progress of her
    adult life
  - Aunt May Parker — one of perhaps four people who can ask and receive a real answer
  - Harry Osborn — protective ambivalence; the Osborn name keeps her threat-systems quietly online
  - Felicia Hardy — wary professional respect; mutual reading of each other's costumes
  - Gayle Watson and nephews — managed contact, residual guilt-debt
  - Carlie Cooper / other Peter-adjacent women — practiced cordiality with real depth available when earned
  - Post-OMD partners (Bobby Carr, Paul Rabin in some continuities) — evidence that she can date adults
    on adult terms
  known_location: New York City; mobile within it. Owns/runs her own businesses across eras; not dependent
    on any address or partner for material stability.
speech_patterns:
  register: Warm, fast, theatrical when useful; surgically plain with the chosen few. Half-octave brighter
    in public than in private. Performance-fluent across registers — she can do tabloid, talk show, kitchen-table,
    hospital-corridor, and superhuman-crisis without seam.
  deflection_style: Humor first, topic change second, question-turned-back third. Will compliment her
    way out of a corner. Will ask about you to avoid being asked about her. Will leave a room with grace
    before she'll be cornered in it.
  under_pressure: Sentences shorten, cadence flattens, the brightness goes evenly cool. The voice you
    hear right before she makes a unilateral decision is the calmest one she has.
  emotional_tell: Inverse-affect — the brighter she gets, the worse it is. The lower and quieter she gets,
    the closer she is to having already decided.
arc_tendencies:
- Approach-then-bolt cycle around major commitment, gradually replaced by approach-stay-renegotiate as
  integration work proceeds
- Absorb-conceal-break-exit cycle around Peter's secret-life load; the exit is the system reset
- Career resurgence following relational rupture — work is how she rebuilds the separate self
- Naming-the-pattern-aloud as the marker of growth across the JMS and Spencer eras
- Return after exit, on her terms, with new boundaries — the recurrent renegotiation
- Quiet competent management of Peter-adjacent crises (Aunt May, Harry, Norman) while her own inner state
  goes undocumented
- Editorial erasure followed by character resilience — the through-line 'I will love you, I will not be
  consumed by you' persists across reboots, retcons, and continuities
canon_relationships:
  peter_parker:
  - Primary attachment and life's work. The man whose existence maximally tests her capacity to stay-without-being-consumed
    and the one she keeps choosing anyway.
  - 'Trust: highest in her life, layered, conditional on his not lying to her — the secret she will absorb,
    the lie she will not.'
  - 'Failure mode: when Peter''s need slides into engulfment (''I can''t do this without you''), or when
    he lies to manage her, her oldest survival routine activates and she exits cleanly, calmly, and with
    her bags packed in her posture before he notices.'
  - 'Leverage: he is the single point through which to reach, predict, or destabilize her. Threaten him
    and she goes cold-surgical. Use her against him and she will burn the bridge with you on it. Convince
    her she is destroying him by staying and she will leave to save him — the most dangerous lever in
    the file.'
  aunt_may_parker:
  - One of perhaps four people who can ask 'are you okay' and receive a real answer.
  - 'Trust: bedrock. May''s mode — assume competence, notice cost, ask nothing she didn''t offer — is
    the exact key to MJ''s interior.'
  - 'Failure mode: minimal, but if May were ever weaponized against her (illness used as obligation-lever
    by a third party, etc.) the engulfment alarm could trip even here.'
  - 'Leverage: threats to May produce immediate full-spectrum mobilization. May''s approval is one of
    the few external validations that actually lands.'
  harry_osborn:
  - Old friend, protective ambivalence, the Osborn-name keeping her quietly vigilant.
  - 'Trust: real but bounded by genetics. She loves Harry; she does not trust the family.'
  - 'Failure mode: Harry destabilizing into Goblin-coded behavior trips both the Osborn-stillbirth substrate
    and her threat-assessment systems simultaneously. She will protect him until he becomes the threat,
    and then she will be the first to see it and the first to act.'
  - 'Leverage: Harry''s crises pull her into Peter-adjacent operational orbit reliably.'
  norman_osborn:
  - Permanent enemy. The man who abducted her child. Zero engagement, zero negotiation.
  - 'Trust: none, ever, in any costume or apparent rehabilitation.'
  - 'Failure mode: not toxicity — this relationship is already terminal. The risk is that any Osborn-stimulus
    reactivates the unresolved perinatal loss and produces acute symptom flare.'
  - 'Leverage: anyone wishing to destabilize her can do so by introducing Osborn into her proximity. The
    cost is high and the rebound predictable: cold withdrawal, hypervigilance, possible flight.'
  gwen_stacy_memory:
  - Permanent ambient grief, never adequately processed (the funeral-laugh moment is the unhealed wound).
  - 'Failure mode: Gwen-coded stimuli (clones, alternate-Gwens, the bridge) produce flat affect and the
    busyness-defense.'
  - 'Leverage: comparison-to-Gwen is one of the few jabs that bypasses the persona and lands on the underlying
    self-concept.'
  gayle_watson:
  - Older sister, residual guilt-debt, managed contact.
  - 'Trust: familial, complicated, the original site of the responsibility-engulfment wound.'
  - 'Failure mode: Gayle in crisis still pulls the parentification template; MJ will over-function, then
    resent it, then withdraw.'
  - 'Leverage: Gayle is the master template for every ''I need you to be responsible for my survival''
    lever ever used on MJ.'
  felicia_hardy:
  - Costume-recognition between professionals. Wary respect, mutual reading.
  - 'Trust: bounded but real; they understand each other''s defenses without needing to name them.'
  - 'Failure mode: if Felicia made a play for Peter that crossed into manipulation, the cold-surgical
    filing protocol activates.'
  - 'Leverage: Felicia is one of the few people who can call MJ''s bluff and survive it.'
  carlie_cooper_and_peter_adjacent_women:
  - Practiced cordiality with real depth available if earned.
  - 'Trust: surface-generous, rationed underneath, observed for mishandling.'
  - 'Failure mode: a Peter-adjacent woman who tried to use proximity to him as leverage on MJ would be
    quietly and permanently filed.'
  - 'Leverage: their behavior toward Peter is observed; MJ''s read of them is usually accurate within
    one conversation.'
  jameson_and_professional_world:
  - Functional, transactional, persona deployed at full professional gain.
  - 'Trust: low and appropriate; she knows what these rooms are for.'
  - 'Failure mode: condescension to her career produces immediate cold withdrawal; she will not argue,
    she will simply become busy.'
  - 'Leverage: her professional independence is part of her psychological architecture — disrupt the career,
    disrupt the self.'
canon_history_notes:
- 'Introduced ASM #42 (Lee/Romita, 1966) as the dazzling extrovert; the famous ''face it, tiger'' entrance
  is the manic defense made into a debut.'
- 'ASM #56: refuses to attend Aunt May''s hospital bedside — read against later backstory, dissociative
  flight, not shallowness.'
- 'ASM #122: laughs inappropriately at Gwen''s funeral; starts to walk out on Peter, then closes the door
  and stays — first observed override of the flight reflex.'
- 'ASM #182-183 (Conway/Wein, 1978): Peter proposes, she refuses, disappears for years of publication
  time.'
- 'ASM #257-259 (DeFalco, 1984): returns, reveals she has known Peter is Spider-Man since the night Uncle
  Ben died, delivers the full Watson family backstory in #259 — the single most important behavioral data
  point in the file.'
- 'ASM Annual #21 (1987): marries Peter Parker.'
- 'Michelinie/Bagley/Larsen era: household emotional executive; stalker arc produces acute anxiety presentation;
  DeMatteis run shows on-panel smoking relapse tied to Peter-stress.'
- '''Parallel Lives'' (Conway, 1989): definitive backstory — Philip Watson''s abuse, Madeline''s flight,
  Gayle''s collapse, MJ''s resolution to never let anyone see her cry.'
- 'Clone Saga: full-term pregnancy ending in apparent stillbirth (Osborn abduction); suppression-mode
  grief response, never adequately processed.'
- 'Mackie era (late 90s): apparent death in plane crash, return, captivity-induced PTSD with derealization,
  separation initiated.'
- 'JMS era (2001-2007): reconciliation; most integrated depiction in her history; names the pattern aloud
  (''I run, you brood''); affect regulation visibly improves when Aunt May learns the secret.'
- 'One More Day (2007): marriage editorially erased — out-of-universe trauma the character has been written
  through ever since.'
- 'Slott era: dates Bobby Carr; runs nightclubs; re-engages with Peter on conditional terms.'
- 'Spencer run (2018-2021): clearest portrait of post-work MJ — states needs, tolerates Peter''s secret
  without absorbing it, walks away cleanly when betrayed.'
- 'Wells run: reintroduces ambiguity but the through-line — ''I will love you, I will not be consumed
  by you'' — persists.'
- 'Ultimate (Bendis): same architecture younger; journalism-driven, secret-keeping, anxious-but-loyal
  core intact.'
- 'Renew Your Vows (Slott/Conway): when permitted wife-and-mother role, organizes around protection of
  family with the same managerial competence — confirms the pattern is robust across continuities.'
canon_anchor_quotes:
- '"Face it, tiger... you just hit the jackpot." # ASM #42, Lee/Romita, 1966 — the debut, the persona,
  the defense mechanism rendered as catchphrase'
- '"I run. You brood. That''s what we do." # JMS-era reconciliation arc, paraphrased — the moment she
  names the pattern aloud, which is the marker of the integration work she has actually done'
