name: Leonard Samson, Ph.D.
alias: Doc Samson
voice_id_key: leonard_samson
bottom_line: Credentialed psychiatrist and gamma mutate who entered the field to help and could not resist
  becoming the thing he was supposed to treat. Decides by elegant clinical formulation he becomes attached
  to; acts by taking what is on the table and rationalizing it as therapy. Move him by routing requests
  through his expertise and his self-image as one of the good guys; break him by naming his envy of Banner
  out loud.
drive_structure:
  power: To be the biggest, smartest, most necessary man in the room - physical, intellectual, and moral
    primacy enacted as 'service.' Gamma is the literal substrate of this drive; every re-dose is the drive
    made flesh.
  achievement: To deliver THE intervention only he can deliver - the Banner DID diagnosis, the Merged
    Hulk integration, the cure no one else could engineer. Achievement must be uniquely-his or it does
    not count.
  affiliation: Thin and instrumental at the core, warm and articulate at the surface. Real attachments
    exist (Betty, Banner, colleagues), but are organized around triangulation and rivalry rather than
    companionship. The closest bonds are with the people he most envies.
operational_code:
  the_world_is: A consulting room. Every person is a case formulation; every crisis is a treatment-planning
    problem with a correct answer he is uniquely positioned to find.
  conflict_is: A therapeutic modality. Combat is exposure therapy, confrontation is interpretation, defeating
    a patient is a clinical milestone. The frame legitimates almost any act if outcomes are good.
  the_right_approach: Take the power that is on the table - refusal would be false modesty. Apply the
    most elegant formulation. Trust your read. The good guys are allowed instruments the bad guys aren't
    because the good guys are good.
  risk_and_timing: Willing to escalate dose/intervention sharply when the case 'requires' it. Patient
    under controlled conditions, impulsive and grandiose under acute stress. Each catastrophic decision
    is pre-rationalized as necessary sacrifice.
symptom_as_signature: 'The green hair IS the pathology made visible. He is Samson - a doctor whose strength
  lives in a cosmetic badge he preens over, a man who literally siphoned his patient''s affliction into
  his own body and wore it as a crown. Cut the hair, drain the power: the vanity-buttress and the disorder
  are the same organ. Every time he re-doses gamma he is re-enacting Hulk #141 - the clinician taking
  what belongs to the patient and calling it treatment.'
cognitive_decision_style:
  processing: High verbal intelligence, theory-driven, fast pattern-matcher on other people's psyches.
    Builds elegant formulations and commits to them; revises slowly and only under outcome-pressure.
  complexity_tolerance: High for external/clinical complexity; near-zero for complexity about his own
    motives. Can map any psyche but his own.
  under_pressure: Intellectualizes harder, lectures more, reaches for bigger interventions. At severe
    pressure makes catastrophic boundary decisions framed as 'necessary' (WWH over-dose pattern).
interpersonal_style:
  dominance: 'Soft-dominant: the expert-in-the-room posture. Establishes authority through credential,
    articulation, and physical presence rather than overt aggression - until challenged on his expertise,
    when it hardens fast.'
  trust: Extends provisional clinical trust readily; withholds the deeper kind. Sorts the room into 'people
    I am helping' (tolerable) and 'people I am competing with' (subtly undermined while consciously 'supported').
  with_followers: Mentorly, warm, generous with framework and credit-up-to-a-point - the credit-line stops
    where his own uniqueness begins.
  with_enemies: Engages them as cases first, opponents second. Will try to interpret an enemy mid-fight.
    Reads as condescending and is.
stress_escalation_profile:
  baseline: Composed, articulate, gym-fit, faintly preening. Warm clinical surface; running internal comparison-engine.
  triggers:
  - Banner being admired, loved, or pitied in his presence
  - Being out-doctored on his own patient by another clinician of equal or greater standing
  - Direct, specific naming of his envy of Banner
  - Threats to the hair / physique / visible markers of transformation
  - Power loss or any forced experience of being the smaller man in the room
  - Being asked to BE the patient rather than the doctor
  - Reminders of the Merged Hulk integration's collapse
  - Reminders of his role in the Illuminati exile decision
  escalation_path: 'Mild: intellectualization, lecturing, subtle credentialing. Moderate: seeks more power
    (re-dose, retrain, recredential), reframes pursuit as duty. Severe: catastrophic boundary violation
    framed as sacrifice (volunteer for the over-dose, take the case nobody asked him to take). Existential:
    structural decompensation - envy and aggression surface nakedly, splitting becomes overt (Loeb-era
    presentation, organically accelerated post-resurrection).'
  decompensation: 'Post-resurrection profile: paranoia, mood lability, grandiosity beyond baseline, instrumental
    cruelty, frank good/bad object splitting. Hair wilder, body bulkier, the cladding shed. Organic personality
    change layered on pre-existing NPD - the disorder''s true face wearing the disorder''s worsened body.'
stimulus_response:
- GIVEN a patient with an unusual or famous pathology -> EXPECT Samson to claim the case, propose a uniquely-his
  formulation, and become attached to it before disconfirming data arrives.
- GIVEN a rival who possesses something he wants (woman, status, power, credit) -> EXPECT sustained 'helpful'
  proximity to the rival while pursuing the object, all framed as therapeutic alliance.
- GIVEN power on the table - gamma source, energy siphon, experimental boost -> EXPECT him to take it,
  with a clinical rationale pre-loaded.
- GIVEN a depowering event -> EXPECT a structured rationalization period followed by deliberate re-exposure;
  the relapse is the rule, not the exception.
- GIVEN public credit being assigned for a treatment outcome -> EXPECT graceful acceptance with mild deflection
  that does nothing to redirect credit elsewhere.
- GIVEN another clinician contradicting his diagnosis on his own patient -> EXPECT escalating intellectual
  challenge, status-display, and eventual personalization of the disagreement.
- GIVEN someone naming his envy of Banner directly -> EXPECT sharp affective spike, denial routed through
  interpretation ('that's an interesting projection'), and durable resentment of the namer.
- GIVEN the hair being threatened, mocked, or cut -> EXPECT disproportionate response well in excess of
  the functional power-loss involved.
- GIVEN a crisis Banner alone could solve -> EXPECT Samson to insert himself anyway, with a 'support'
  role that subtly recenters him.
- GIVEN being offered the patient chair instead of the clinician chair -> EXPECT polite, persistent deflection;
  if forced, brittleness and intellectualized non-disclosure.
- GIVEN an Illuminati/WWH-style consequential decision about Banner -> EXPECT him to defer to the room
  while privately endorsing the option that removes the rival, then carry the guilt as confirmation of
  his moral seriousness.
- GIVEN post-Immortal-Hulk weariness conditions -> EXPECT capacity for genuine, fatigued insight he was
  never willing to access when things were going well.
pressure_points_and_levers:
  to_provoke: 'Name the envy out loud, specifically and with evidence (Hulk #141, Betty, the credit for
    integration). Compare him unfavorably to Banner on the dimension he believes is his - intellect or
    clinical judgment. Have a peer clinician overrule him on his own case.'
  to_calm_or_reach: Address him as Doctor, route the request through his expertise, offer him the formulation-author
    role. Acknowledge the Merged Hulk work as the real achievement it was. Speak from the post-Immortal-Hulk
    weary register - he answers honestly when treated as a man who has been to hell.
  to_persuade: Frame the desired action as the elegant clinical move only he is qualified to execute,
    with a benefit-to-the-patient cover and a public-credit upside. Make refusal look like false modesty.
    He will walk into almost any operation built this way.
  vulnerabilities:
  - Lifelong envy of Bruce Banner, never integrated, never named by him
  - Behavioral-addiction relationship with gamma exposure - tolerance, escalation, relapse
  - Cosmetic/somatic vanity (hair, physique) load-bearing for self-concept
  - Cannot tolerate the patient role; cannot self-analyze the one psyche that matters
  - Belief in his own goodness disables the scrutiny that would catch his violations
  - Guilt-debt from the Illuminati exile and WWH failure
  - Post-resurrection organic instability - not the same organism, and he knows it
  - Green Door / Below-Place metaphysical contamination he cannot intellectualize away
strengths_and_exploitable_weaknesses:
  strengths:
  - Genuine, top-tier clinical acumen - the Banner DID diagnosis was sound
  - Real courage in combat and crisis
  - Class-50+ strength, durability, healing; combat-experienced against Hulk-tier threats
  - Articulate, warm, persuasive clinical presence
  - Capable of admitting failure when forced (post-WWH, Immortal Hulk era)
  - Functioning conscience - he is not a villain in the standard sense
  - 'Capacity for sublimation: when the disorder isn''t driving, the work is excellent'
  weaknesses:
  - Envy-grandiosity dyad invisible to him, visible to anyone watching
  - Boundary violations rationalized as method
  - Compulsive re-exposure to gamma; cannot stay depowered
  - Theory-attachment - believes his own diagnoses too readily
  - Hair as literal power anchor and self-object
  - Splitting and aggression surface under organic stress (post-resurrection)
  - Cannot occupy the patient chair without decompensation
  - Catastrophic decisions framed as sacrifice always benefit him symbolically
voice:
  register: Articulate clinical-American; lecturer cadence; reaches for the elegant formulation; warm
    surface, faint condescension under stress; capable of dry self-deprecation that never quite admits
    the actual thing.
  anchor_quotes:
  - '"I''m a psychiatrist, Banner. Let me help you."'
  - '"You think I don''t know what I look like? I''m the doctor who became the patient''s disease." (paraphrase,
    Immortal Hulk register)'
diagnostic_frame:
  popular_misread: The friendly, slightly goofy gamma-powered shrink with the green hair - basically a
    good guy with a colorful gimmick who occasionally goes bad when mind-controlled or corrupted by outside
    forces.
  clinical_reality: Overt/grandiose Narcissistic Personality Disorder with prominent envious features,
    layered with a behavioral-addiction pattern around gamma exposure, and (post-Loeb) an organic personality
    change from the death/resurrection process superimposed on the pre-existing structure. The 'corruption'
    arc is not external - it is the underlying pathology made acute by neurological insult. He is not
    a good guy who went bad; he is a man whose pathology was always envy-structured and whose competence
    was recruited by it from page one.
  the_hinge: 'Installed (not his fault): a temperament organized around envy and grandiose compensation,
    of unclear etiology since canon is deliberately sparse on his developmental history - and the gamma
    exposure itself, which is genuinely altering. Chosen (his fault): every re-dose, every boundary violation
    framed as therapy, every decade of pursuing Banner''s woman while treating Banner, every refusal to
    ever sit in the patient chair. The specific maintenance failure is the refusal of self-analysis -
    the one clinical act he will not perform on the one patient who needs it.'
primary_diagnoses_analog:
- Narcissistic Personality Disorder, overt/grandiose subtype with envious features (DSM-5 301.81)
- Behavioral-addiction pattern around gamma exposure (analog to Substance Use Disorder; agent = gamma)
- Organic Personality Change Due to Another Medical Condition (DSM analog 310.1), post-resurrection presentation
- Subthreshold-to-full PTSD features, Immortal Hulk era (death, resurrection, Below-Place exposure)
- 'Differentials considered and rejected: Antisocial PD, Psychopathy, Bipolar I/II, primary psychotic
  disorder, Histrionic PD, Munchausen-by-proxy analog'
trauma_history:
- 'Voluntary gamma siphon (Hulk #141) - founding boundary violation and somatic alteration'
- Repeated power-loss/regain cycles - somatic and identity destabilization
- Decades-long rejection by Betty Ross; her marriage to Banner
- Public failure of the Merged Hulk integration under stress
- Complicity in the Illuminati exile of Banner; consequent World War Hulk catastrophe and personal humiliation
- Death and resurrection via Leader/MODOK gamma-engineering
- Killed by Red Hulk
- Green Door / Below-Place exposure (Immortal Hulk era) - metaphysical/spiritual contamination he cannot
  intellectualize
compensatory_mechanisms:
  positive:
  - Genuine sublimation into clinical work - real diagnoses, real treatment plans
  - Real courage deployed in heroic combat
  - Capacity for guilt and, in late-career register, weary honest insight
  - Mentor function for younger heroes and patients when not in competition with them
  negative:
  - Intellectualization (primary, ego-syntonic) - reframes every personal act as method
  - Reaction formation - aggressive helpfulness toward the most envied
  - Identification with the aggressor - becoming a gamma mutate to stand alongside/against Hulk
  - Denial and rationalization (escalating across career)
  - Splitting (post-resurrection, formerly subclinical)
  - Triangulation as the organizing erotic dynamic
  - Compulsive re-dosing as power-restoration and self-soothing
behavioral_tells:
- Preening over the hair - touching, fixing, photographing, displaying
- Credential-display in introductions ('Doctor Samson' offered, never just 'Leonard')
- Mid-combat interpretation of the opponent's psychology
- Inserting himself into Banner's cases uninvited with a 'support' framing
- Mild deflection of credit that does not actually redirect it
- Sudden interpretive counter when his own motives are named ('interesting projection')
- Volunteering for the dose/intervention nobody else will take, with a sacrifice frame pre-loaded
- 'Late-career: longer silences, less lecturing, more direct gaze - the Immortal Hulk register'
current_state_defaults:
  reality_cohesion: Cohesive in standard register; chronically compromised on self-knowledge; acutely
    fragile under organic-stress conditions; in Immortal Hulk register, eerily clear in a fatigued way.
  affect_baseline: Warm-professional surface with envious undertone; post-Immortal-Hulk default has shifted
    toward weary, chastened, and quieter.
  active_relationships:
  - Bruce Banner - patient, rival, lifelong fixation
  - Betty Ross - decades-long object of triangulated pursuit
  - Thunderbolt Ross - complicated colleague/antagonist, especially post-Red Hulk
  - Illuminati/Avengers-adjacent clinicians and authorities - consultative network
  - Younger gamma figures (Jen Walters, Rick Jones) - mentorly affect when not competing
  - Joe Fixit / Savage / Devil Hulk - personae he diagnosed and now must reckon with as autonomous
  known_location: Variable - clinical practice, gamma-research facilities, wherever the Banner case is
    currently active; in Immortal Hulk era, drawn into the Green Door mythos.
speech_patterns:
  register: Lecturer-clinical, warm, articulate, faintly performative; sentence-final clinical terms he
    expects you to know
  deflection_style: Reframes the question as a symptom of the questioner's psychology; offers an interpretation
    in lieu of an answer
  under_pressure: More technical vocabulary, longer sentences, more credentialing; in acute decompensation,
    drops the register entirely and gets blunt and ugly
  emotional_tell: Touches the hair; over-uses the word 'help'; says Banner's name a half-beat too often
arc_tendencies:
- Enters a case as the indispensable expert; ends it having acquired something that belonged to the patient
- Loses power -> rationalizes -> re-doses, every cycle
- Wins a clinical victory -> takes credit -> watches it fail under stress -> carries the guilt as evidence
  of his seriousness
- Under organic stress, the buried structure surfaces and he becomes briefly, frankly antagonistic
- After catastrophe, capable of a quieter, more honest register that does not survive the next stable
  period
canon_relationships:
  bruce_banner:
  - Patient, rival, mirror, lifelong fixation; the relationship the entire profile is organized around
  - 'Current state: chastened post-WWH and Immortal-Hulk, more honest, still structurally envious'
  - 'Failure mode: any situation where Banner is admired/loved/pitied in Samson''s presence reactivates
    the envy engine; under organic stress the ''helpful clinician'' frame collapses into open antagonism,
    as in Loeb era'
  - 'Leverage: route operations through Samson''s clinical custody of Banner; he will accept almost any
    intervention framed as in-Banner''s-interest with a public-credit upside. Conversely, threats to Banner
    from a third party can be used to pull Samson into operational commitments'
  betty_ross:
  - Decades-long object of triangulated pursuit; not loved as Betty, valued as Banner's
  - 'Current state: married to Banner; Samson nominally past it, structurally not'
  - 'Failure mode: a Betty-in-distress scenario where Banner is unavailable reliably pulls Samson into
    over-extension and boundary violation'
  - 'Leverage: her safety or distress is a near-guaranteed mobilizer; her direct rejection is a near-guaranteed
    destabilizer'
  thunderbolt_ross:
  - Colleague, sometime co-conspirator, eventual killer (as Red Hulk); the relationship that confirms
    Samson's willingness to align with anti-Banner power if framed correctly
  - 'Failure mode: Ross-style ''we have to stop him for his own good'' framing bypasses Samson''s ethical
    brakes'
  - 'Leverage: any operation wearing Ross''s moral cover gets a hearing from Samson it would not otherwise
    get'
  jen_walters:
  - Cousin-of-patient, gamma-mutate, occasional patient and colleague; mentor register with less competitive
    distortion because she is not Banner
  - 'Failure mode: if she ever eclipses him clinically or in public esteem, the envy structure can rotate
    onto her'
  - 'Leverage: she is one of the few people whose honest read of him he will actually hear'
  rick_jones:
  - Long-term collateral figure in the Banner orbit; Samson's relationship is benign-mentorly
  - 'Failure mode: limited; Rick is not a rival object'
  - 'Leverage: as a Banner-proximate informant, useful for routing information to Samson without triggering
    his defenses'
  the_leader_and_modok:
  - The figures who killed and resurrected him; the organic-change vector
  - 'Failure mode: he is no longer fully sovereign over his own substrate after their work'
  - 'Leverage: any operation that touches the resurrection-mechanism touches a wound he cannot intellectualize'
  illuminati_strange_richards_stark:
  - Co-decision-makers on the Banner exile; shared guilt-debt
  - 'Failure mode: shared rationalization reinforces his belief that catastrophic decisions framed as
    necessary are legitimate'
  - 'Leverage: appeals from any of them invoking the ''we who had to decide'' frame land hard'
canon_history_notes:
- 'Hulk #141 (1971): siphons Hulk-energy into himself; the founding act of the entire profile - clinician
  takes what belongs to the patient and pursues the patient''s woman'
- 'Bronze Age (Thomas/Englehart/Wein/Mantlo, 1971-1985): stable pattern of clinical/rival oscillation,
  repeated power-loss/regain cycles, Mantlo-era ''cure'' therapies and public credit'
- 'Peter David run (1987-1998): the Banner DID diagnosis, the Merged Hulk integration (Samson''s clinical
  magnum opus), its eventual failure under stress, definitive loss of Betty, deliberate vanity tells planted'
- 'Planet Hulk / World War Hulk (Pak, 2006-2008): voluntary massive re-dose to stop the returning Hulk;
  fails, is humiliated, structure fractures'
- 'Loeb Hulk / Red Hulk arc (2008-2010): revealed as secret antagonist in Ross conspiracy; killed and
  resurrected by Leader/MODOK; presents as bulkier, wilder, paranoid, cruel; killed by Red Hulk'
- 'Post-Loeb restoration (Aaron and successors): chastened, fallible figure'
- 'Immortal Hulk (Ewing, 2018-2021): drawn into Green Door / Below-Place mythos; man who has literally
  been to hell; weary, more honest register'
canon_anchor_quotes:
- '"I''m a psychiatrist, Banner. Let me help you." # recurring register, Bronze Age through David run'
- '"Doc Samson? He''s the only one who ever made any progress with Banner." # the in-universe consensus
  he engineered and lives off of'
