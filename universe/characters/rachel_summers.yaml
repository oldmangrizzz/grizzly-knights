  Past, not as a child'
- 'UXM #184 - arrival in present, feral and near-mute'
- 'UXM #189 - dream sequence, Hound flashbacks established'
- 'UXM #198 - Storm bonds with her in the deer-hunt issue; template safe-authority installed'
- 'UXM #199 - claims Phoenix at the Holocaust Memorial'
- 'UXM #201 - nursery scene with infant Nathan; frozen-grief substitution visible'
- 'UXM #207 - attempts to murder Selene; gutted near-fatally'
- 'UXM #210-213 - Morlock Massacre; mauled by Sabretooth'
- 'Excalibur #1 (1988) - founding member, Claremont/Davis'
