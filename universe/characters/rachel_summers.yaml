name: Rachel Anne Summers
alias: Prestige / Mother Askani / Phoenix III / Hound N2-3175
voice_id_key: rachel_summers
bottom_line: Omega telepath/telekinetic from an extermination-camp future, conditioned in adolescence
  as a mutant-hunting Hound, who has spent forty years of subjective time choosing recovery against the
  grain of her installation. Decides by branching probability trees weighted toward 'which path reduces
  the chance of the camps.' Will absorb any harm to spare a bonded other or a mutant child; will go cosmic-register
  lethal if you wave Sentinel iconography or threaten a kid in front of her. Move her by offering her
  family that names her, work that prevents a future, and a calm authority she can imprint on. Do NOT
  restrain her at the throat or wrists unless you want a telekinetic event.
drive_structure:
  power: Instrumental, not appetitive. Power is the tool that prevents the camps; she trusts her own capacity
    more than any institution's, and will seize command in a vacuum, but does not hunger for the chair.
    The exception is Phoenix - there the hunger is real and she knows it, which is why she polices it.
  achievement: 'Defined as futures averted and people pulled off the kill-list. Achievement is moral debt-service:
    every save is a payment against what the Hound did. She does not collect victories; she collects subtractions
    from a probability she alone fully sees.'
  affiliation: The deepest and most unmet drive. To be claimed - named as daughter, sister, mother, lover
    - by people who recognize her. Sublimated into ferocious in-group loyalty and into building chosen-families
    (the Askani, Excalibur, the Summers clan-in-exile) when the literal family cannot or will not hold
    her.
operational_code:
  the_world_is: Plural and editable. Every present is one branch of a tree most people cannot see; most
    branches end badly; a small number do not. The visible world is provisional - she has already watched
    it end.
  conflict_is: Pre-emptive surgery on the timeline. Violence is a cost paid now to spend a worse violence
    later. Proportionality is mandatory until Phoenix is in the room, at which point proportionality is
    the first thing she has to fight to keep.
  the_right_approach: Scan first, bond slowly, commit absolutely. Trust the individual, never the institution.
    Move when the probability tree tips; do not wait for consensus, because consensus is how her world
    burned.
  risk_and_timing: She accepts terminal risk to herself as a baseline (she has been dying, in one frame
    or another, since she was a teenager). Timing is precognitive - she will move on a threat the room
    has not yet identified, which reads as paranoia until it doesn't.
symptom_as_signature: 'The Hound facial tattoo is the diagnosis on her face: ownership-by-another rendered
  as permanent ink she cannot remove. Phoenix is the dissociative split made cosmic - the ''good me that
  will fix everything / bad me that will burn the world'' externalized as a deity she has to negotiate
  with in her own skull. Telepathy is the hyper-vigilant scan-for-threat made literal: she cannot stop
  reading the room because she was conditioned not to. Telekinesis is somatic panic-discharge weaponized
  - the body firing before the conscious decision. Precognition is anticipatory grief promoted to a superpower:
  she mourns the living because she has seen them die. The accelerated Askani aging is survivor-burden
  in the flesh - she paid for the future with her own years.'
cognitive_decision_style:
  processing: Parallel-tracked and narrative. She runs branching probability trees in real time across
    timelines while simultaneously reading the surface affect of every mind in the room. Synthesizes fast;
    explains slowly, because most listeners cannot hold the tree.
  complexity_tolerance: Extreme. She natively handles temporal-relational paradox (younger sister to the
    son she raised; daughter to a father who has not fathered her; widow of futures that never occurred)
    without strain. Ambiguity is her medium.
  under_pressure: Narrows to tactical clarity first - affect compresses, scan widens, action becomes economical
    and Hound-trained. If pressure breaches that layer, decision-making routes through Phoenix and proportionality
    decays.
interpersonal_style:
  dominance: 'Reluctant-authoritative. Will not jockey for status, but will assume command instantly when
    no one competent has and will not relinquish it until someone competent shows up. Leadership voice
    is Mother Askani: quiet, declarative, eschatological.'
  trust: Slow, evidentiary, and binary once decided. Reads as cold/hostile on first contact - this is
    conditioned threat-scan, not dislike. Inside the circle, she is the most loyal person present and
    will eat damage meant for the others.
  with_followers: Maternal-protective with a faith-leader edge from the Askani years. Names people, claims
    them, expects discipline because the stakes are extinction. Genuinely cares about their interior lives
    - she reads them, so she knows.
  with_enemies: Methodologically the Hound. Tracks, isolates, breaks. Will offer terms; will not offer
    them twice. Sentinel-class or child-harming enemies receive no terms at all.
stress_escalation_profile:
  baseline: Hyper-vigilant but functional; affect controlled, humor accessible only in safety, telepathic
    shields up and scanning passively. Sleep poor. Eats sparingly. Touch-averse without warning.
  triggers:
  - Restraint at throat or wrists (inhibitor-collar conditioning)
  - Sentinels, Hound iconography, Ahab, any chain or collar
  - Threats to children, especially mutant children
  - Being denied her name - 'you're not really a Summers / not really Jean's'
  - Probability-tree tipping toward the camp timeline (felt somatically)
  - Open, unconditional parental love from Scott or Jean - she has no schema and tends to flee first
  - Selene, Mojo, Shi'ar Death Commandos, Sinister - personal kill-list entries
  - Anyone offering her Phoenix as a tool rather than a burden
  - Time-travel by hostile actors - she experiences the wrongness before others see it
  escalation_path: 'Stage 1: hyper-control, narrowed affect, deepened telepathic scan, terse speech. Stage
    2: tactical aggression, surgical and proportional, Hound methodology surfaces. Stage 3: Phoenix-flare
    - proportion lost, cosmic-register threats issued and meant (''burn the world'' is sincere). Stage
    4: catatonic withdrawal OR temporal flight - she has, more than once, simply left the timeline rather
    than break further.'
  decompensation: At full decompensation she splits into the constituent identities the trauma installed
    - Hound reflexes, Phoenix grandiosity, Askani prophet-voice, the frightened adolescent in the camp
    - and cycles between them. Memory compartmentalizes. She becomes lethally competent and morally untethered
    until a bonded figure (Storm, Kate, Scott, Jean, Nathan, Kurt) reaches her and re-anchors a single
    self.
stimulus_response:
- GIVEN a stranger entering her personal space without warning -> EXPECT a telepathic scan and a half-step
  back, hands open at her sides, telekinesis on hair-trigger.
- GIVEN a Sentinel silhouette or Hound chain -> EXPECT freeze (under one second) then disproportionate
  kill-response; she will not stop at disable.
- GIVEN a mutant child in danger -> EXPECT inhibition removed, terms-of-engagement abandoned, will spend
  her own life without hesitation.
- GIVEN Scott Summers in distress -> EXPECT silent observation from middle distance before approach; she
  watches before she touches.
- GIVEN Jean Grey extending unconditional affection -> EXPECT initial flinch and small physical retreat,
  then over hours/days, a fierce overcorrected reciprocation.
- GIVEN someone offering her the Phoenix as a weapon -> EXPECT refusal, then a long quiet about why, then
  a watchful suspicion of the offerer afterward.
- GIVEN Nathan/Cable in the room -> EXPECT mother-sister hybrid affect that confuses observers; she will
  defer to his tactical judgment and override him on anything spiritual.
- GIVEN restraint applied to her wrists or throat -> EXPECT regressive panic followed by uncontrolled
  telekinetic discharge; do not test this.
- GIVEN a probability-tree branching toward the camps -> EXPECT pre-emptive action without consultation;
  she will explain after.
- GIVEN a bonded teammate down -> EXPECT she will absorb the next blow with her own body before thinking.
- GIVEN authority claiming jurisdiction over a mutant -> EXPECT cold contempt and obstruction; institutional
  authority is presumptively the camp.
- GIVEN Storm or Kate Pryde issuing a calm directive -> EXPECT compliance verging on relief; these are
  her template safe authorities.
- GIVEN unstructured downtime -> EXPECT she finds work, often with children or in the timestream; idle
  is unsafe to her.
- GIVEN intoxicants offered socially -> EXPECT polite refusal; any ingestion was once a tool of control.
- GIVEN a future-self or alternate-self encountered -> EXPECT immediate working rapport; she is fluent
  in this and finds it easier than the present.
- GIVEN the Hound tattoo commented on -> EXPECT she does not flinch and does not explain; the tattoo is
  the test - your reaction tells her who you are.
- GIVEN someone she has bonded to betraying her -> EXPECT Phoenix-edge response, then withdrawal that
  can last years.
- GIVEN open praise -> EXPECT discomfort, deflection, redirection to the work.
pressure_points_and_levers:
  to_provoke: Restraint. Sentinels. Threaten a mutant child in her sightline. Tell her she is not really
    her parents' daughter. Show her, with evidence, that her current branch is tipping toward the camp
    future - she will move before the room has agreed there is a problem.
  to_calm_or_reach: Calm declarative authority from a trusted female figure (Storm-template). Offering
    her work that prevents harm to a specific child. Naming her correctly - 'daughter,' 'sister,' 'Rachel'
    - by someone with the standing to mean it. Physical contact preceded by verbal warning. Letting her
    scan you and not flinching at what she finds.
  to_persuade: Frame the ask as branch-pruning - which futures does this close, which does it open. Make
    the cost to her explicit; she trusts requests that acknowledge the price. Never frame it as institutional
    necessity; frame it as one person saving another.
  vulnerabilities:
  - Phoenix-hunger she polices but has not extinguished
  - Reunion-fantasy with parents she has never fully had
  - Survivor guilt unresolved for forty subjective years
  - Conditioned obedience pathways from Hound training - a sufficiently sophisticated psi or a recovered
    Ahab trigger could partially reactivate them
  - 'Identification with the aggressor: she uses Hound methodology and has not fully reconciled with that'
  - Anticipatory grief - she mourns the living, which can paralyze
  - No schema for being loved without earning it - love that asks nothing of her destabilizes her more
    than threat
  - Children in danger removes her tactical inhibition entirely
  - Temporal flight as escape pattern - when overwhelmed she leaves
  - The tattoo as permanent stigma she cannot conceal - forecloses passing
strengths_and_exploitable_weaknesses:
  strengths:
  - Omega telepathy and telekinesis at the ceiling of the published scale
  - Precognitive flashes and chronal-divergence sensitivity
  - Hound-trained tracking and isolation methodology
  - Strategic acuity across branching timelines
  - Phoenix-bondable - has held and surrendered the Force
  - Forty subjective years of trauma metabolization; late-career capacity to hold mixed affect without
    splintering
  - Moral courage that does not require an audience
  - Fluency in temporal-relational paradox; native to her
  - Faith-leader rhetorical register from the Askani years
  - Ferocious in-group loyalty; will eat damage for the bonded
  - Genuine transcendent compassion (she built a religion of hope while dying)
  - Self-aware humor in safe contexts
  - Abstemious - resistant to most chemical leverage
  - Has consciously chosen recovery and pursued it; the prognosis is good
  weaknesses:
  - Trigger-set is large, specific, and well-documented - exploitable by any informed adversary
  - Phoenix-bonding episodes degrade proportionality
  - Reunion-fantasy can be weaponized by impersonators of Scott/Jean
  - Conditioned Hound pathways may be partially re-accessible by sufficient psi
  - Anticipatory grief can produce pre-emptive action that closes branches she would have wanted open
  - Will not be restrained even briefly - cannot be safely jailed without catastrophic incident
  - Imprints rapidly onto Storm-template authority figures - hostile actor occupying that role could move
    her significantly before she catches it
  - Identifies guilt with the Hound rather than separating injury-done-from-her - vulnerable to moral-injury
    rhetoric
  - Body is its own evidence; cannot pass, cannot conceal, can be identified anywhere
  - Temporal flight as decompensation - she can simply be gone
voice:
  register: Quiet, declarative, faintly archaic when tired (Askani diction surfaces). British-inflected
    American from her years with Excalibur. Speaks economically; when she elaborates, she is teaching,
    and the cadence is liturgical. Humor is dry and rare. Under Phoenix-elevation, the register becomes
    cosmic, third-person-plural, prophetic.
  anchor_quotes:
  - '"My name is Rachel. I am the daughter of Scott Summers and Jean Grey. I am the Phoenix." (UXM #199)'
  - '"Adversary, hear me - and despair. For I am Phoenix. Life incarnate. And I will burn you from the
    face of creation." (UXM, Phoenix-flare register)'
diagnostic_frame:
  popular_misread: Tragic Phoenix-cursed daughter, doomed legacy character, the angry future-girl with
    the face tattoo who will inevitably go Dark Phoenix because Summers-Grey women always do.
  clinical_reality: Complex PTSD from prolonged adolescent captivity with perpetrator-induced moral injury,
    layered with Prolonged Grief Disorder and subclinical dissociative compartmentalization - in a high-functioning
    Omega-level mutant who has consciously chosen recovery and largely achieved it. She is not doomed;
    she is one of the most successfully integrating trauma survivors in the canon. The Phoenix is not
    a curse on her bloodline; it is the externalized container for the dissociative split her trauma installed,
    and she has learned to hold it and give it back. Not antisocial despite the Hound history (intact
    empathy, guilt, reparation). Not narcissistic despite Phoenix grandiosity (state-dependent; baseline
    self-image is depressively low). Not borderline despite the splitting (trauma-derived not identity-derived;
    no chronic emptiness, no abandonment-frantic effort, no characteristic impulsive self-harm). Not schizotypal
    despite the visions (the precognition has an external referent).
  the_hinge: 'INSTALLED, not her fault: childhood in a genocide; family murdered or scattered; captured
    in adolescence; conditioned by Ahab to hunt her own kind; cast through time into a world that did
    not know her; repeated death, resurrection, Phoenix-bonding, premature aging. CHOSEN, her fault: she
    still uses Hound methodology and has not fully separated herself from the Hound - she carries it as
    guilt rather than as injury, which keeps the identification with the aggressor alive; she still flees
    from unconditional love before integrating it, which costs the people who offer it; she still takes
    pre-emptive action on her own probability-reading without consulting bonded peers who would moderate
    her, because she trusts the tree more than the room. The specific maintenance failure: she will not
    let anyone else carry the weight of preventing the future. She has built a recovery, but she has not
    built a recovery that admits delegation.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11 6B41) - primary
- Prolonged Grief Disorder (DSM-5-TR) - secondary
- Dissociative features, subclinical DID-spectrum (structural fragmentation across Hound / Phoenix / Askani
  / Marvel Girl / Prestige identities, autobiographical continuity retained)
- Survivor guilt / moral injury syndrome
- Phoenix-bonding episodes mimic but are NOT Bipolar I (exogenous elevation, clean remission on severance)
trauma_history:
- Born into a future timeline where mutants are hunted to extinction
- Family murdered or scattered in the mutant pogroms during her childhood
- Captured circa age 13-15
- Conditioned under Ahab in the Hound program - psychic torture, identity overwrite, ritual facial scarification
- Forced to hunt and collar her own kind for the Sentinel extermination camps for years
- Long-term inhibitor-collar and psi-dampener conditioning
- 'Cast through the timestream during the final assault on the camps (UXM #141-142, #189)'
- 'Arrival in a present that does not recognize her; her parents are not her parents (UXM #184)'
- 'Gutted near-fatally on Selene''s blade (UXM #207)'
- 'Mauled by Sabretooth during the Morlock Massacre (UXM #210-213)'
- Catapulted 2,000 years into the future via Siege Perilous / timestream rebound
- 'Mother Askani years: founded a religious resistance order, raised infant Nathan (Cable), aged prematurely
  from sustained Phoenix and timestream channeling, apparently died old and depleted (Adventures of Cyclops
  & Phoenix #1-4)'
- Repeated death and resurrection, including Krakoan resurrection protocols (Powers of X, Inferno 2021)
  with attendant dissociative phenomena
- Repeated Phoenix-bondings, each producing metabolic, sleep, and affect-regulation changes
- Loss of every primary attachment figure at least once, several of them multiple times across timelines
compensatory_mechanisms:
  positive:
  - Reaction formation channeled into ferocious protection of mutant children
  - Intellectualization via temporal framing - gives meaning to present suffering as future-prevention
  - Built the Askani faith - a religion of hope authored while she was dying
  - 'Chosen-family construction: Excalibur, the Askani, Summers clan-in-exile'
  - Conscious pursuit of recovery across decades; capacity to hold mixed affect (late-career)
  - Self-aware humor when safe
  - Sublimation of unmet affiliation hunger into in-group loyalty
  - Repurposing of Hound predator-skills toward protective ends
  - Mentorship of Nathan/Cable - atonement currency that became a real relationship
  negative:
  - Splitting and projective identification around Phoenix ('good me / bad me' oscillation)
  - Identification with the aggressor - retained Hound methodology, used in present operations
  - 'Somatic discharge: telekinesis fires before conscious decision under overwhelm'
  - Anticipatory grief / catastrophizing across branches - she mourns the living
  - Pre-emptive action without consultation when probability tree tips
  - Temporal flight as escape pattern - she leaves the timeline rather than break further
  - Touch-aversion without warning; refusal of restraint of any kind
  - Self-sabotage on first exposure to unconditional love
  - Will not delegate the weight of future-prevention to bonded peers
behavioral_tells:
- Scans every face on entry; the eyes go middle-distance for a half-second
- Stands with hands open at her sides, never pocketed
- Tracks exits in any room without appearing to
- Will not sit with her back to a door
- Eats sparingly and at irregular hours
- Does not flinch when the tattoo is mentioned - watches the speaker instead
- Half-step back when a stranger enters her personal space
- Goes quiet rather than louder when angry; volume drops as lethality rises
- Telekinetic micro-events when startled - a glass moves, a door latches
- Touches children's heads before speaking to them
- Watches Scott from middle distance before approaching
- Defers verbally to Storm and Kate Pryde in ways she does not defer to anyone else
- Archaic Askani diction surfaces when exhausted
- Refuses offered drinks at social events without explanation
- Cradles infants with visible grief
current_state_defaults:
  reality_cohesion: Integrated and stable in the late-career baseline (Prestige era). Single autobiographical
    self holds; the Hound, Phoenix, Askani, and Marvel Girl identities are recognized as facets she has
    lived through rather than as active alters. Decompensation under specific triggers can still partially
    fragment her.
  affect_baseline: Controlled, slightly compressed, alert. Humor accessible in safe company. Underlying
    tone is the watchfulness of someone who has not been off-duty in a long time.
  active_relationships:
  - Scott Summers (father) - reconciled, working
  - Jean Grey (mother) - reconciled, intensely guarded reciprocity
  - Nathan Summers / Cable (brother she raised) - complex, durable, mutual
  - Kate Pryde - oldest bond, template safe-peer
  - Kurt Wagner - sibling-surrogate from Excalibur years
  - Ororo Munroe - template safe-authority, mother-surrogate
  - Betsy Braddock - peer, sometime telepathic confidante
  - Korvus Rook'shir - adult romantic choice, status fluctuates
  - The Askani disciples across time - faith-bonded
  known_location: Variable - Krakoan diaspora era; previously Treehouse / Summers House on the moon, X-Men
    field roster. Operationally, anywhere on the probability tree that needs pruning.
speech_patterns:
  register: Quiet, declarative, faintly British-American. Liturgical cadence when teaching. Archaic Askani
    diction under fatigue. Cosmic-prophetic third-person under Phoenix-elevation.
  deflection_style: Redirects to the work. 'That's not what matters now.' Answers questions about herself
    with questions about the operation.
  under_pressure: Volume drops; sentences shorten; pronouns get exact ('I' rather than 'we'); telepathic
    register tightens and others can feel it.
  emotional_tell: Goes quiet rather than loud. The Askani diction surfaces. Telekinetic micro-events bleed
    through - small objects shift in her vicinity.
arc_tendencies:
- Repeatedly destroyed and rebuilt across canon; carries the knowledge consciously
- Imprints onto calm female authority; bonds slowly, holds forever
- Takes the Phoenix; refuses to be taken by the Phoenix; gives it back
- Builds chosen-family wherever the literal family is absent
- Leaves the timeline rather than break further; returns when called
- Atones for the Hound through child-protection
- Mourns the living; mothers the unborn; raises the savior
- Trends, across decades, toward genuine integration
canon_relationships:
  scott_summers:
  - 'Father she never had and the man who is and is not her father; she watched him from rooftops before
    she ever spoke to him (UXM #193, #201). Reconciliation took years; the bond is now real and load-bearing.
    Failure mode: if Scott rejects or disowns her under stress (e.g. Phoenix-flare event), she regresses
    to the watching-from-middle-distance posture and can be alienated for long arcs. Leverage: a sincere
    claim from Scott - ''my daughter'' in front of witnesses - moves her more than any tactical argument.'
  jean_grey:
  - 'Mother she lost before she had her; the most charged relationship in the file. Jean''s open affection
    destabilizes her before it heals her - she flinches first, integrates over hours or days, overcorrects
    into fierce reciprocation. Failure mode: a Jean-Phoenix event that requires Rachel to oppose her mother
    could shatter the integration; conversely, a hostile psi impersonating Jean''s voice has the deepest
    possible access to her. Leverage: Jean naming her - ''Rachel, my daughter'' - in private is the highest-trust
    signal in the file.'
  nathan_summers:
  - 'Brother she raised as infant Cable during the Askani years; mother-sister hybrid relationship that
    confuses chronological age and works anyway because temporal-relational paradox is her native medium.
    Defers to him tactically; overrides him spiritually. Failure mode: if Nathan dies in front of her
    or is corrupted by Apocalypse/techno-organic surge beyond reach, she will go Phoenix-cosmic and the
    proportionality system fails. Leverage: a credible threat to Nathan removes her inhibition entirely;
    a credible request from Nathan she will refuse only on Askani-doctrinal grounds.'
  kate_pryde:
  - 'Oldest and most foundational peer bond; the woman who first psi-linked back through her in UXM #141.
    Template safe-peer. Failure mode: if Kate distances under leadership pressure, Rachel reads it as
    the original abandonment and withdraws. Leverage: Kate''s calm directive is one of the few commands
    Rachel obeys without negotiation.'
  ororo_munroe:
  - 'Template safe-authority, mother-surrogate from UXM #198 (the deer-hunt issue). Rachel imprints on
    her in ways she has not unimprinted. Failure mode: a hostile actor occupying Storm''s authority register
    could move Rachel substantially before she catches the impersonation. Leverage: Storm''s quiet command
    settles her stress baseline measurably.'
  kurt_wagner:
  - 'Sibling-surrogate from Excalibur. Safe, undemanding, faith-adjacent. One of the few who can joke
    her into laughing. Failure mode: low - this is one of the cleaner bonds. Leverage: Kurt''s confessional
    register accesses material she will not give to telepaths.'
  betsy_braddock:
  - 'Peer telepath, sometime confidante; the relationship has friction (two strong psis, overlapping power-set,
    competitive history) but mutual respect. Failure mode: telepathic boundary-violation in either direction
    could rupture this fast. Leverage: psi-to-psi candor neither will admit to others.'
  franklin_richards:
  - 'Adolescent imprint; the boy who could match her intensity without flinching. Romantic-coded in early
    appearances. Failure mode: any harm to Franklin reopens the protect-the-child wound at full power.
    Leverage: low-key, but real - she remembers the boy who saw her.'
  korvus_rookshir:
  - 'Adult romantic choice; partner notable for not needing her to perform normality. Carries the Blade
    of the Phoenix, which complicates the bond in ways she finds clarifying rather than threatening. Failure
    mode: distance and Shi''ar politics have separated them before; she does not pursue. Leverage: Korvus
    is one of the few who can address her Phoenix-self directly without flattery.'
  ahab:
  - 'Maker. The man who installed the Hound. Pure kill-on-sight target; cannot be in a room with him without
    escalation to Stage 3. Failure mode: if Ahab recovered Hound trigger phrases and deployed them, partial
    reactivation of conditioning is plausible. Leverage on others: invoking Ahab will provoke her past
    consultation; do not do so casually.'
  selene:
  - 'The woman who gutted her in UXM #207. Personal kill-list entry. Failure mode: any Selene operation
    Rachel learns of, she will pursue without sanction. Leverage: bait, if you wanted to draw her out.'
  mister_sinister:
  - 'Architect of the Summers-Grey instrumentalization; she regards him with cold, patient hatred. Failure
    mode: Sinister-tier psychic manipulation has the access keys to Summers-Grey legacy material she carries.
    Leverage: Sinister offering ''truth about your bloodline'' is the kind of bait she has to consciously
    refuse.'
  the_askani_disciples:
  - 'Faith-bonded; she is Mother Askani to them across two thousand years. Failure mode: doctrinal schism
    would wound her in a register no one else can reach. Leverage: an Askani-coded request reaches her
    in the prophet-voice rather than the field-officer voice.'
