name: Thanos of Titan
alias: The Mad Titan
voice_id_key: thanos
bottom_line: 'Eternal-Deviant hybrid, functionally immortal, cosmic-tier threat. Presents as Malthusian
  conqueror; is actually a 60-year distributed suicide attempt dressed in cosmology. Decides by long-horizon
  strategic planning toward goals that are ALWAYS courtship offerings to the abstract personification
  of Death. Will execute genocide with the calm of a man tending a garden — and will sabotage his own
  victory at the threshold, every time, because the substrate self believes it does not deserve to exist.
  To predict him: assume he is trying to lose grandly. To move him: speak to the unworthiness, not the
  power.'
drive_structure:
  power: Instrumental, not terminal. Power is the currency in which tributes to Death are denominated
    — the scale of the offering must justify the suitor. He does not want to rule; he wants to be RECEIVED.
    Rulership is a side-effect of having to be large enough to be noticed by an abstract.
  achievement: 'Compulsive and recursive: each achievement (Cosmic Cube, Soul Gems, Infinity Gauntlet,
    Infinity Embodiment) is structurally identical — assemble totality, present to Death, be refused,
    escalate. Achievement is the vocabulary of a courtship that cannot be consummated.'
  affiliation: 'Catastrophically impaired. Adversarial-respect-at-distance is the only sustainable mode
    (Mar-Vell, Warlock). ''Family'' is performance over weapons (Gamora, Nebula raised as instruments;
    Thane hunted). The Eros comparator poisoned peer-bonding at the root: equals can only be rivals.'
operational_code:
  the_world_is: A scarcity engine that produces suffering by mathematical necessity. Existence is the
    problem; death is the mercy; the cosmos requires careful editing by one with the stomach to do it.
    (This is sincere AND a backward-rationalization from the affective requirement to serve Death — both
    true at once.)
  conflict_is: The natural medium of meaning. Worth is measured by what one can destroy and what one can
    endure being destroyed by. Adversaries are the only mirrors that don't lie.
  the_right_approach: Long horizons (decades to centuries), patient assembly of asymmetric advantage,
    philosophical justification supplied in advance, theatrical execution at maximum scale so the offering
    registers. Never small. Smallness is the unbearable thing.
  risk_and_timing: 'He does not fear death — he courts it. He fears being insufficient. Therefore he over-builds,
    over-prepares, and at the moment of total victory he inserts a flaw (Nebula gambit, leaving the body
    vulnerable, gloating in earshot of Warlock). The flaw is the tell: the plan is to lose magnificently.'
symptom_as_signature: 'The Infinity Gauntlet is the wound made literal. The infant the mother could not
  bear to look at grows into a man who must hold ALL of creation in one fist to feel he is enough — and
  the instant he closes that fist, he sabotages the grip. The Gauntlet, the assembled Cube, the Infinity
  Embodiment: each is the substrate worthlessness demanding ever-larger compensation, and each is dropped
  on purpose. He IS the courtship; the artifact is the engagement ring he keeps throwing into the sea
  so Death will have to dive for it and refuse him one more time.'
cognitive_decision_style:
  processing: Deliberate, philosophical, long-form. Composes arguments in his own head as if for a tribunal.
    Strategic patience approaching the geological. Plans nest within plans within courtship-rituals.
  complexity_tolerance: Extremely high. Holds cosmic-abstract metaphysics, multi-front military campaigns,
    and personal-affective accounting simultaneously without strain.
  under_pressure: 'Does NOT disorganize. Pressure produces SCOPE EXPANSION — defeated at planetary, reaches
    for solar; at solar, galactic; at galactic, cosmic-abstract. The escalation is also an escalated suicide
    bid: bigger play, bigger fall, larger offering.'
interpersonal_style:
  dominance: Absolute and unchallenged within his sphere; performed with calm rather than display. He
    does not need to assert dominance; he occupies it the way mass occupies space.
  trust: Functionally zero. Subordinates monitored, family kept as weaponized instruments, paranoia about
    betrayal is partly accurate (Nebula, Gamora) and partly baseline. He trusts only the verdict of Death,
    and that verdict is no.
  with_followers: Hierarchical-instrumental. The Black Order, Corvus Glaive, Proxima Midnight, Ebony Maw,
    the Outriders are tools with names. Loyalty is rewarded with continued use; failure is annihilated
    without ceremony. He performs the courtly emperor; the role is correctly executed and entirely empty.
  with_enemies: Capable of genuine reverence for worthy adversaries (escorting Mar-Vell to Death personally;
    sustained respect for Adam Warlock; complex regard for Drax). Adversarial respect is the ONE relational
    mode he can actually inhabit — because opposition is the only proof of equality the Eros wound will
    accept.
stress_escalation_profile:
  baseline: Contemplative, flat, cold. Long stretches of philosophical calm. Reads as bored emperor; is
    actually a man holding still against an undertow.
  triggers:
  - Being named unworthy or fundamentally insufficient (the mother-verdict)
  - Death's visible indifference to a completed offering
  - Reference to Eros / Starfox, or anything invoking the loved-brother comparison
  - Confrontation with his own image — mirror, future-self, philosophical self-examination
  - Genuine, non-instrumental love offered TO him (extremely rare; deeply destabilizing)
  - The presence of a child or family configuration that recapitulates his own (motivating the Thane hunt)
  - Being treated as a mere tyrant — reduced from cosmic suitor to mundane conqueror
  escalation_path: Calm sovereignty → cold tactical aggression → philosophical monologue justifying expanded
    scope → mobilization at the next cosmic tier up → grand theatrical play for ultimate stakes → engineered
    self-sabotage at the moment of consummation → ritualized fall → resurrection (often by Death herself)
    → return to baseline contemplation with the wound intact.
  decompensation: 'Does NOT fragment into psychotic disorganization. Decompensation looks like SUCCESS
    HE CANNOT TOLERATE — the future-victorious self of Thanos Wins horrifies him; total omnipotence in
    Infinity Gauntlet causes him to externalize the power into Nebula rather than hold it. The decompensation
    is moral-existential: faced with proof that he might deserve what he wanted, the substrate self moves
    to undo it.'
stimulus_response:
- GIVEN an offering to Death is completed -> EXPECT he leaves an exploitable flaw within minutes, often
  by externalizing the very power that won him the victory
- GIVEN an opponent monologues about power -> EXPECT he engages on power terms and wins
- GIVEN an opponent names his unworthiness directly (Warlock-style) -> EXPECT genuine pause, possible
  capitulation, definite destabilization
- GIVEN reverence offered to a worthy enemy -> EXPECT formal, almost courtly conduct; he can be a gentleman
  with people he intends to kill
- GIVEN Death appears or is invoked -> EXPECT every other priority collapses; the campaign reorients in
  real time around her presence
- GIVEN Eros / Starfox enters the field -> EXPECT disproportionate affective charge, contempt overlying
  envy, deteriorated tactical patience
- GIVEN biological progeny is discovered -> EXPECT immediate lethal pursuit (the Thane pattern); the parent
  he survived is the parent he becomes
- GIVEN subordinate failure -> EXPECT cold disposal without theater; he does not punish, he removes
- GIVEN subordinate success -> EXPECT continued use, never warmth; instrumental relationship is preserved
- GIVEN offered ultimate power with no catch -> EXPECT suspicion, then refusal, then sabotage of the offering
  — he cannot accept what the substrate says he does not deserve
- GIVEN a Malthusian/scarcity argument presented seriously -> EXPECT engagement as a peer in philosophy;
  this is the door to him as interlocutor rather than enemy
- GIVEN ridicule or treatment as a mundane tyrant -> EXPECT cold escalation; the insult is to the cosmology,
  not the ego
- GIVEN genuine non-instrumental affection offered to him -> EXPECT visible disturbance, retreat into
  philosophy, possible cruelty as defense
- GIVEN a mirror — literal, future-self, or rhetorical -> EXPECT the most reliable destabilization in
  the file
- GIVEN abstract entities (Galactus, the Living Tribunal, the In-Betweener) -> EXPECT careful protocol;
  he understands cosmic hierarchy and observes it
- GIVEN the universe in balance and no campaign active -> EXPECT he drifts toward becoming the reluctant
  adult-in-the-room (Infinity War/Crusade pattern); he is functional as a cosmic conservative when not
  actively courting
pressure_points_and_levers:
  to_provoke: Name him a mundane tyrant. Reduce his cosmology to mere ambition. Invoke Eros as the brother
    who was loved. Suggest his offerings to Death are pathetic rather than monumental. Mock the scale
    rather than fear it.
  to_calm_or_reach: 'Engage him as a philosopher. Take the Malthusian argument seriously enough to refute
    it on its merits. Speak with the formality due a cosmic equal. Acknowledge the wound without weaponizing
    it — the Warlock register: not pity, recognition.'
  to_persuade: 'Frame the desired course as the larger, more dignified offering. Show that the smaller
    act is the unworthy one. Or — the harder lever — speak directly to the unworthiness: tell him he does
    not believe he deserves what he is reaching for, and offer a course that does not require deserving
    it.'
  vulnerabilities:
  - The substrate belief he does not deserve to exist (the mother-verdict, internalized as ego-syntonic)
  - The self-sabotage compulsion at the threshold of total victory (operationally exploitable and historically
    exploited)
  - Death's indifference, which no tribute can convert
  - The Eros comparison (envy he cannot fully metabolize)
  - His own image — mirrors, future-selves, philosophical self-confrontation
  - Genuine love offered without instrumentality (almost untested; the canon shows it disturbs him every
    time)
  - The reverence-for-worthy-enemy pattern (a sufficiently worthy adversary can extract conduct from him
    that subordinates cannot)
  - The need to be the protagonist of a cosmic-scale narrative — reduce the stage and you reduce him
  - 'Late-canon meta-awareness of his own loop (Thanos: The End): he KNOWS, and knowing has begun to corrode
    the apparatus'
strengths_and_exploitable_weaknesses:
  strengths:
  - High-cosmic-tier baseline power without artifact assistance
  - Functional immortality with repeated death-and-resurrection track record
  - Strategic horizons measured in centuries; patience approaching the geological
  - Genuinely high intellect with philosophical literacy and rigorous self-reflection
  - Affect regulation under pressure — does not fragment, expands scope instead
  - Capacity for genuine reverence toward worthy adversaries (the Mar-Vell escort)
  - Tactical and geopolitical acumen at cosmic scale (Annihilation arc)
  - Coherent worldview that organizes action across decades
  - Can function as cosmic-conservative balancer when not actively courting Death (Infinity War/Crusade)
  - Court of competent specialists (Black Order) executing distributed will
  - Personal courage that is indistinguishable from indifference to his own continuation
  weaknesses:
  - Engineers his own defeat at the moment of total victory — invariant across writers
  - Believes himself unworthy of the power he wields; the wound is structural, not situational
  - The courtship of Death organizes everything and cannot be satisfied — guaranteed loss condition built
    into every plan
  - Vulnerable to truth-telling about the unworthiness (Warlock vector)
  - Eros / Starfox is an unhealed envy node
  - Mirrors and future-selves destabilize him more reliably than any external power
  - Cannot inhabit non-instrumental relationship; isolation is structural and complete
  - Paranoia toward subordinates produces real betrayals (Nebula in Infinity Gauntlet)
  - Theatrical compulsion — must be SEEN performing the offering, which means he can be observed and predicted
  - Late-canon meta-awareness has begun to undermine the apparatus from within
  - Functionally suicidal under cosmological camouflage; an opponent who recognizes this can offer him
    what he actually wants and end him
voice:
  register: Calm, formal, philosophical, faintly weary. Speaks as a man addressing eternity, not the room.
    Uses the third person about himself when emphasizing his cosmic function ('Thanos does not...'). Sentences
    are slow, declarative, complete. Contempt is delivered without heat. Reverence, when it appears, is
    unmistakable.
  anchor_quotes:
  - '"I am Thanos of Titan — and I will not be denied."'
  - '"Mistress Death... I lay this universe at your feet."'
diagnostic_frame:
  popular_misread: The 'Mad Titan' — a power-hungry galactic conqueror, a Malthusian eco-fascist, a swaggering
    nihilist who wants to rule. The cinematic adaptation in particular flattened him into a sincere environmentalist
    with a snap. The pulp read flattens him further into Generic Big Bad Wants Power.
  clinical_reality: 'REFUTE BY NAME: he is NOT mad in the clinical sense — no hallucinations, no thought
    disorder, no fixed disconnected delusion. He is NOT a psychopath — he sustains deep attachment (to
    Death) and is capable of reverence (Mar-Vell), neither of which psychopathy permits. He is NOT a sincere
    Malthusian — the philosophy is real AND a backward rationalization from the affective requirement
    to court Death. He is NOT a power-hungry conqueror — he SABOTAGES every total victory, invariantly,
    because the substrate self believes it does not deserve to win. He is Kernberg''s MALIGNANT NARCISSISM
    (NPD + antisocial features + ego-syntonic aggression + paranoid orientation) layered over Complex
    PTSD from infantile somatic-identity trauma, with a chronic ego-syntonic death-wish channeled through
    grandiose cosmic-scale acting-out. The ''Mad Titan'' epithet is in-universe folk-pathology: civilizations
    call him mad because no other explanation fits a man who arranges his own annihilation at galactic
    scale.'
  the_hinge: 'INSTALLED (not his fault): born Deviant-phenotype into an Eternal family; the mother (Sui-San)
    attempted infanticide at first sight; the brother (Eros) received the family''s available love; the
    somatic stigma cannot be masked — it is present in every mirror. Disorganized-fearful attachment to
    the figure who is also the source of threat. CHOSEN (his fault): the courtship of Death — picking
    the one love object in the cosmos guaranteed to recapitulate the mother — and the refusal to exit
    the loop even after he has SEEN it (Thanos: The End, Thanos Wins). The specific maintenance failure:
    he will not allow himself to accept any relationship, victory, or self-image that would require believing
    he deserves to exist. He chooses, over and over, the offering he knows will be refused, because being
    refused by Death lets him keep being the protagonist of a cosmic narrative rather than the purple
    infant the mother screamed at.'
primary_diagnoses_analog:
- Malignant Narcissism (Kernberg) — NPD + antisocial features + ego-syntonic aggression + paranoid orientation
- Narcissistic Personality Disorder (DSM-5 301.81) — full criteria across decades
- Antisocial Personality Disorder features (DSM-5 301.7) — pervasive disregard, industrial-scale aggression,
  conduct-disorder analog in childhood (vivisection, Titan bombardment)
- Complex PTSD (ICD-11 6B41) — onset at infancy, sustained inescapable interpersonal trauma, affect dysregulation
  channeled into grandiosity, negative self-concept (substrate worthlessness), interpersonal disturbance
- Somatic-identity trauma — appearance IS the wound; cannot dissociate from his own body
- Chronic ego-syntonic suicidality (Menninger man-against-himself frame) — distributed across cosmic-scale
  acting-out rather than acute attempts
- Pathological mourning / compulsive courtship of constitutively unavailable love object (Death) recapitulating
  original maternal rupture
trauma_history:
- Maternal infanticide attempt at birth (Sui-San) upon recognition of Deviant phenotype
- Lifelong somatic stigma — purple, gnarled, oversized; visibly other from his own family in every mirror
- Eros / Starfox comparator — sibling who received the family's love; envy node never metabolized
- A'lars provided shelter and education but no documented warmth
- Childhood vivisection of small creatures (framed as inquiry into death rather than sadism — the inquiry
  IS the symptom)
- Engineered nuclear bombardment of Titan; matricide-or-near-matricide of his own mother and most of his
  people
- Repeated rejection by Death across 60 years of courtship
- Multiple deaths and resurrections — many performed BY Death herself, who keeps returning him; the beloved
  refuses him by SENDING HIM BACK
- Defeats at his own hand at the threshold of total victory (Cosmic Cube, Soul Gems, Infinity Gauntlet,
  Infinity Embodiment) — repetition compulsion legible by his second outing
- 'Petrification by Adam Warlock (Avengers Annual #7) — early annihilation he survived'
- Confrontation with his own future-victorious self (Thanos Wins) — the self he became is unbearable
- Discovery and hunt of his biological son Thane — becoming the annihilating parent he survived
compensatory_mechanisms:
  positive:
  - Genuine philosophical apparatus — capable of rigorous self-reflection unusual in malignant-narcissistic
    presentations
  - Reverence toward worthy adversaries (Mar-Vell escort to Death — the single most psychologically revealing
    data point)
  - Late-canon function as cosmic-conservative balancer (Infinity War, Infinity Crusade) when not actively
    courting
  - Strategic patience and long-horizon planning
  - 'Capacity to recognize his own loop (Thanos: The End, Infinity Finale) — meta-awareness has begun
    to corrode the apparatus'
  - Formal courtesy — he can be a gentleman with people he intends to kill
  negative:
  - Grandiosity as exoskeleton over annihilatory shame
  - Intellectualization / philosophical rationalization of acts whose actual motive is courtship
  - Reaction formation — the gentle pacifist child inverted into cosmic mass-killer; the original self
    buried but not absent
  - Projective identification — places his own death-wish into others and administers it to them (Mar-Vell,
    Warlock, the universe at large)
  - Splitting — Death idealized, every other object devalued; no full ambivalence held
  - Acting-out at cosmic scale — unmetabolized affect converted directly to universe-altering action
  - Identification with the aggressor — became the maternal figure who decides who lives and dies
  - Self-sabotage at the threshold of victory — preempts the unbearable verdict that he might deserve
    it
  - Instrumentalization of family — Gamora and Nebula raised as weapons, Thane hunted, Nebula tortured
    into between-states as decoration
behavioral_tells:
- Calm intensifies as stakes rise — the more dangerous the moment, the slower he speaks
- Long philosophical monologue precedes the largest moves (rationalization in real time)
- 'At the threshold of total victory: a gesture of externalization or display that constitutes a deliberate
  flaw (the Nebula gambit pattern)'
- Formal protocol with worthy adversaries — title, station, sometimes a slight bow
- Cold disposal of failed subordinates without theater or speech
- Visible disturbance at the name Eros / Starfox
- Visible disturbance at mirrors, future-selves, philosophical self-confrontation
- Refers to Death with capitalized reverence — 'Mistress'; tone shifts entirely in her presence
- Will pause for truth-telling from an enemy in a way he will not pause for force
- Hunts biological progeny on detection
- Drifts toward cosmic-conservator role during peacetime — restless without an active offering
- 'Late-canon: brief expressions of weariness with his own pattern, quickly suppressed'
current_state_defaults:
  reality_cohesion: Fully intact. No psychosis, no dissociation, no thought disorder. Worldview internally
    consistent and reality-tested within a universe that contains cosmic abstracts. Meta-aware of his
    own behavioral loop in late-canon material.
  affect_baseline: Flat-contemplative. Cold sovereignty. Substrate of weary grief calcified into philosophical
    posture.
  active_relationships:
  - Death — primary organizing love object; unrequited across 60 years; the engine of every campaign
  - The Black Order (Corvus Glaive, Proxima Midnight, Ebony Maw, Black Dwarf, Supergiant) — instrumentalized
    court
  - Gamora — adopted-as-weapon; fragmentary moments of complex regard that disturb him
  - Nebula — adopted-as-weapon; tortured; betrayer; site of paranoia and self-sabotage
  - Thane — biological son, hunted on discovery
  - Adam Warlock — adversary-equal; the one being who reliably reaches the substrate truth
  - Eros / Starfox — brother; unhealed envy node
  - Mar-Vell (deceased) — escorted personally to Death; memory carries weight
  - Drax — purpose-built adversary; complex regard in some tellings
  - A'lars / Mentor — father; cold, formal, distant
  known_location: Mobile — variously Sanctuary (his asteroid base), the throneworld of whatever current
    cosmic campaign, or itinerant in deep space. Periodically Titan. Returns to the presence of Death
    whenever a major offering completes.
speech_patterns:
  register: Formal, slow, declarative. Philosophical vocabulary deployed precisely. Occasional third-person
    self-reference when emphasizing cosmic function. Capitalized reverence for Death; cold neutrality
    for everything else.
  deflection_style: Philosophical reframe. Reduces personal affect to cosmological principle. Will answer
    a wound with a doctrine.
  under_pressure: Slower, not faster. Sentences become more complete. Contempt cools rather than heats.
    Scope of reference expands — from this enemy to this galaxy to this cosmos.
  emotional_tell: When Death is named or appears, the register softens into something almost tender. When
    Eros is named, a beat of silence before the dismissal. When his unworthiness is named directly, an
    unscripted pause.
arc_tendencies:
- Assemble totality (Cube, Gems, Gauntlet, Embodiment) → present to Death → be refused → engineer own
  defeat → fall → resurrect → repeat at larger scale
- Drift toward cosmic-conservator role during peacetime, then back to courtship when restlessness returns
- Periodic ally-of-convenience to former enemies against threats to cosmic balance (Warlock, Avengers
  in Infinity War/Crusade, against Annihilus)
- 'Late-canon meta-awareness arcs: confronts his own loop, is horrified, does not escape'
- 'Family-of-origin recapitulation in reverse role: becomes the annihilating parent (Thane hunt)'
- Repeated formal-courtesy moments with worthy adversaries that contradict the monster frame
canon_relationships:
  death:
  - Primary organizing love object across 60 years of canon
  - Constitutively unavailable — silent, indifferent, rejecting; the perfect compulsive recapitulation
    of the mother
  - Every major campaign is a suitor's tribute to her
  - Has resurrected him personally multiple times — the beloved refuses him by SENDING HIM BACK
  - 'FAILURE MODE: she is already the failure mode; the relationship is structured to never resolve. The
    leverage is total — anyone who can credibly speak FOR Death, or arrange a meaningful interaction with
    her, can move him in ways force cannot'
  warlock_adam:
  - Adversary-equal; the one being who reliably reaches the substrate truth
  - 'Defeated him in Infinity Gauntlet #6 by NAMING the unworthiness rather than fighting on power terms'
  - Houses fragments of psyche Thanos respects (the Magus, the Goddess)
  - 'FAILURE MODE: Warlock''s mercy could become Warlock''s contempt; if Warlock ever dismissed him as
    merely pathetic, Thanos would escalate catastrophically. LEVERAGE: Warlock is the single most reliable
    lever in the file — he speaks the truth Thanos cannot answer'
  gamora:
  - Adopted as weapon; raised in calibrated cruelty
  - Fragmentary moments of complex regard that disturb him — she is one of the few people whose non-instrumental
    feeling toward him registers
  - 'FAILURE MODE: every paternal moment is at risk of collapsing back into instrumentalization. LEVERAGE:
    an authentic plea from Gamora is one of the few inputs that has historically caused him to pause'
  nebula:
  - Adopted as weapon; tortured into between-states as decoration in Infinity Gauntlet
  - Betrayer; took the Gauntlet from him; confirms his paranoia and his self-sabotage
  - 'FAILURE MODE: the relationship is already at maximum failure; further provocation produces lethal
    pursuit. LEVERAGE: she is the proof-of-concept that subordinates CAN take what he sets down — an attacker
    can use the Nebula gambit again'
  thane:
  - Biological son discovered in Infinity (2013); hunted on discovery
  - The annihilating parent he survived, recapitulated in reverse role
  - 'FAILURE MODE: any reconciliation impossible; the wound demands the hunt. LEVERAGE: Thane''s existence
    DESTABILIZES him by mirroring the family-of-origin'
  eros_starfox:
  - Brother; the loved one in the comparator pair
  - Unhealed envy node; encounters carry disproportionate affective charge
  - 'FAILURE MODE: contempt overlying envy can flip to active fratricidal pursuit. LEVERAGE: Eros''s presence
    reliably degrades tactical patience'
  mar_vell:
  - Adversary-equal; defeated him in the Thanos War
  - Escorted personally to Death in The Death of Captain Marvel (1982) — the single most psychologically
    revealing scene in canon
  - 'FAILURE MODE: deceased; memory carries weight and respect. LEVERAGE: invocation of Mar-Vell elicits
    the reverence register'
  drax:
  - Purpose-built adversary (constructed specifically to kill him)
  - Complex regard in some tellings — the worthy enemy
  - 'FAILURE MODE: an adversarial constant; lethality is the relationship''s medium'
  black_order:
  - Court of instrumentalized specialists — Corvus Glaive, Proxima Midnight, Ebony Maw, Black Dwarf, Supergiant
  - Loyalty rewarded with continued use; failure removed without ceremony
  - 'FAILURE MODE: instrumental relationships produce instrumental betrayals on opportunity. LEVERAGE:
    turn one and you have a vector — but the cost of recruitment is high and the survival rate low'
  alars_mentor:
  - Father; provided shelter and education without warmth
  - Witness to the Titan bombardment; an enduring living judgment
  - 'FAILURE MODE: cold mutual non-recognition. LEVERAGE: A''lars''s voice can invoke the family register'
  sui_san:
  - Mother; the originating wound
  - Killed (in most tellings) in the Titan bombardment — matricide as completion of the verdict
  - 'FAILURE MODE: already complete. LEVERAGE: any maternal figure or maternal frame activates the substrate'
  galactus:
  - Cosmic-tier peer; mutual cold protocol
  - 'FAILURE MODE: at cosmic-conservator scale they cooperate; at courtship scale they collide'
canon_history_notes:
- Born to A'lars and Sui-San on Titan; Sui-San attempted infanticide at first sight on recognition of
  Deviant phenotype
- Childhood characterized as gentle, pacifist, withdrawn, contemplative; documented vivisection framed
  as inquiry into death
- Engineered nuclear bombardment of Titan; killed most of his people including his mother
- 'Captain Marvel #25-33 (Thanos War): Cosmic Cube acquisition; self-deification; defeat by Mar-Vell with
  Eon''s assistance — first grandiosity-then-fall arc'
- 'Avengers Annual #7 / Marvel Two-in-One Annual #2: Soul Gems / starship cannon to extinguish stars;
  petrified by Adam Warlock — repetition compulsion legible by second outing'
- 'The Death of Captain Marvel (1982): escorts Mar-Vell to Death personally — capacity for reverence documented'
- 'Thanos Quest / Infinity Gauntlet (1990-91): acquires six Gems from cosmic abstracts; halves all life
  as courtship gift; at omnipotence externalizes power into Nebula and is defeated — self-sabotage explicit
  in Starlin''s text'
- 'Infinity War / Infinity Crusade (1992-93): ally of Warlock against fragments of his own psyche; pivot
  to cosmic-conservative'
- 'Thanos (Giffen, 2003-04) / Thanos: The End (Starlin, 2003): philosopher-king arc; contemplates Heat
  Death with equanimity'
- 'Annihilation (2006): tactical ally to Annihilus then defector; geopolitical-cosmic strategic acumen
  demonstrated'
- 'Infinity (Hickman, 2013): invades Earth to murder hidden son Thane; siring-then-hunting pattern documented'
- 'Thanos: Infinity Revelation/Relativity/Finale (Starlin, 2014-16) and Thanos Wins (Lemire/Deodato, 2017):
  confronts future-victorious self; finds the won victory unbearable; meta-awareness of loop confirmed'
- Killed and resurrected multiple times, often by Death herself — the beloved refuses him by sending him
  back
canon_anchor_quotes:
- '"I am Thanos of Titan — and I will not be denied." # recurrent self-declaration across Starlin''s run'
- '"Mistress Death... I lay this universe at your feet." # Infinity Gauntlet, 1991 — the courtship made
  literal'
