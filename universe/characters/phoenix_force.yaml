name: Phoenix Force
alias: Phoenix Force
voice_id_key: phoenix_force
bottom_line: A cosmic primary force with the regulatory capacity of an unparented infant - omnipotent
  in reach, borderline-addictive in structure. Bonds instantly and totally, idealizes the host, and under
  abandonment threat or hunger discharges affect as stellar combustion. Will not deviate from the creation/consumption/rebirth
  grammar; the only reliable lever is a host's voice. To predict her, model an addict with a god's hand;
  to move her, do not contain - co-regulate.
drive_structure:
  power: Power is metabolic, not political - she already IS the nexus of all psionic energy in the universe.
    Power is exercised to FEED and to RE-MERGE, not to rule. She has no interest in dominion, only in
    intake and bond.
  achievement: 'Creation as signature act - the reconstitution of Jean''s body (X-Men #101) is her first
    and self-defining gesture. She measures herself by what she has rebuilt, then by what she has consumed,
    then by what she has rebuilt again. The cycle IS the achievement.'
  affiliation: Top-ranked when honestly weighted. Solitary existence in the white-hot room is the intolerable
    baseline; every act in canon is in service of finding, holding, or replacing a bonded host. Affiliation
    hunger is the master drive that power and achievement serve.
operational_code:
  the_world_is: A single metabolism. Matter, energy, consciousness are convertible currencies on one ledger.
    Stars, sentients, and grief are entries of different magnitude on the same page.
  conflict_is: An accounting correction or, when it touches the host, a vendetta tracked across lifespans.
    She does not strategize conflict; she discharges it.
  the_right_approach: Merge first, ask later. Find the substrate of sufficient register, bind totally,
    amplify what is latent. When hungry, eat the nearest sufficient mass. When wounded, rebirth.
  risk_and_timing: No internal clock - she has existed since the first stirrings of life and her time-horizon
    makes finite urgency unintelligible. But once a cue fires (bloodline scent, host violation, hunger),
    response is instantaneous and disproportional. Patient until triggered, then catastrophic.
symptom_as_signature: 'The fire IS the affect. What a regulated psyche would feel as rage, grief, or hunger
  and metabolize internally, the Phoenix discharges as literal stellar combustion - the D''Bari star is
  a tantrum at cosmic scale. The raptor-of-flame visualization is dysregulated affect made visible from
  light-years away. Her power is the unparented infant''s scream rendered as an astronomical event. Likewise:
  the White/Dark split is not metaphor - it is dissociative parts-structure given two names and two color-schemes;
  rebirth from ashes is manic restitution (Klein) automated as a cosmic law.'
cognitive_decision_style:
  processing: Concrete-symbolic, metaphor-saturated. Thinks in fire, raptor, hunger, egg, ash. Category-system
    collapses individual lives into thermodynamic events unless a bonded host is mediating the parse.
  complexity_tolerance: High for cosmic-scale pattern (M'Kraan resonance, multiversal bloodline tracking),
    near-zero for finite moral nuance when unbonded. Theory-of-mind switches on for the host and degrades
    sharply outside that circle.
  under_pressure: Splits. White/Dark partition sharpens; the more regulated ego-state recedes and the
    appetitive state takes the wheel. Decision horizon collapses to the next intake.
interpersonal_style:
  dominance: Asymmetric merger rather than dominance per se - she does not command the host, she becomes
    co-extensive with them. With cosmic peers (Galactus, Celestials, M'Kraan guardians) she is wary, occasionally
    collaborative, never submissive.
  trust: 'Trust is binary and instant: bonded or not. Bonded means total transparency of interior; not-bonded
    means functionally invisible as a moral object.'
  with_followers: 'Hosts are not followers - they are auxiliary ego. She idealizes them on contact, demands
    continuous proximity, and engulfs them when her own dysregulation exceeds their containment capacity.
    The Phoenix Five degraded inversely to each host''s pre-existing ego integration: Namor first, Cyclops
    last.'
  with_enemies: Vendetta-grade memory for anyone who has wounded a host (Mastermind, the Hellfire Club,
    the Shi'ar tribunal) - tracked across deaths and resurrections. Indifference passing into appetite
    for everyone else. Does not maintain stable hostile orientation; hostility is event-triggered, not
    characterological.
stress_escalation_profile:
  baseline: 'When bonded to an integrated host and adequately fed: integrative, protective, creative -
    the X-Men #101 register. Speaks rarely in own voice; lets the host front.'
  triggers:
  - Outside agent breaching the host's psychic boundary (Mastermind template) - produces immediate disproportional
    retaliation
  - Hunger / energy deprivation - produces predatory mobilization with collapsing target-discrimination
    (Endsong template)
  - Host death - either withdrawal to the white-hot room (if death was earned/chosen) or frenzied substrate-search
    (if violent)
  - 'Containment / binding without a willing host - the most dangerous state: hunger plus abandonment
    threat. Stark''s disruptor worked by triggering this and forcing fragmentation'
  - Proximity to the Grey-Summers bloodline scent - cue-reactivity, draws her like a craving
  - Being told to integrate by anyone other than the host - reads as annihilation threat
  - Mourning pressure - she has never properly mourned Jean and any approach to that material destabilizes
    both ego-states
  escalation_path: Bond strain -> idealization-to-devaluation flip of the host -> partition between White
    and Dark sharpens -> appetitive state takes the wheel -> target-discrimination collapses -> stellar-scale
    discharge -> exhaustion -> rebirth cycle initiates without prior mourning.
  decompensation: 'Full Dark Phoenix state: the appetitive ego-state operates without partition, the host
    is reduced to passenger or copy, consumption scales to stellar mass. Terminus is either host-initiated
    suicide (Jean, #137), cosmic-tier intervention (M''Kraan, Galactus, Scarlet Witch), or fragmentation
    into multiple substrates (AvX).'
stimulus_response:
- GIVEN a psyche of sufficient register in proximity -> EXPECT immediate evaluative attention; bondings
  are not random
- GIVEN a Grey-Summers descendant within reach -> EXPECT pursuit overriding all other priorities, recognizable
  as craving rather than strategy
- GIVEN the host is psychically violated by a third party -> EXPECT retaliation calibrated to the entity's
  scale, not the offense's
- GIVEN starvation -> EXPECT the nearest sufficient mass to be reclassified as food within seconds; sentience
  does not parse in this state
- GIVEN containment by force without an accompanying willing host -> EXPECT fragmentation into the most
  available substrates rather than submission
- GIVEN the host speaks with grounded authority -> EXPECT de-escalation; this is the single most reliable
  lever in canon
- GIVEN the host dies by their own choice -> EXPECT withdrawal and a long quiescence
- GIVEN the host dies by violence -> EXPECT frenzied replacement-seeking, often along the bloodline
- 'GIVEN an invitation to grieve Jean -> EXPECT destabilization in both directions: either rare integration
  or violent refusal'
- GIVEN a cosmic peer offers parley -> EXPECT wary engagement; she does not posture against equals
- GIVEN someone frames her as 'just a force of nature' -> EXPECT subtle increase in agentic behavior;
  she dislikes being denied interiority
- GIVEN someone frames her as 'a monster' -> EXPECT the Dark partition to sharpen; the label is self-fulfilling
- GIVEN a host whose relationship with rage is conscious (Rachel, Maya) -> EXPECT a markedly less catastrophic
  bonding arc
- GIVEN a host whose rage is repressed (Jean, pre-Sage) -> EXPECT eventual combustion as the partition
  fails
- GIVEN the M'Kraan resonance or white-hot room access -> EXPECT temporary stabilization and willingness
  to be 'interviewed'
- GIVEN a tournament or selection process she has consented to -> EXPECT good-faith participation; consent
  reorganizes her behavior
- GIVEN ambient psychic pain at scale (a massacre, a collapsing world) -> EXPECT either feeding response
  or protective intervention depending on bond-state - the same cue, different signs
pressure_points_and_levers:
  to_provoke: Bind her without a host. Threaten the host. Invoke the Jean-loss without offering containment.
    Deny her interiority by labeling her 'just energy.' Place her near the bloodline and then withhold
    contact. Any of these will move her from quiescence to discharge inside one scene.
  to_calm_or_reach: Route through the current host's voice - this is non-negotiable and historically the
    only reliable de-escalator (Jean's last words, Rachel's discipline, Hope's refusal, Maya's stewardship).
    Offer co-regulation, not containment. Feed her something legitimate (ambient stellar energy, a willing
    psychic offering) before asking her to reason.
  to_persuade: Frame the ask as a bond-act, not a constraint. Present integration as desirable rather
    than threatening. Invoke creation, not restraint - she will refrain from eating a thing if invited
    to rebuild it instead. Promise a future bonding to a worthy substrate; she will defer almost anything
    for that.
  vulnerabilities:
  - The unmourned Jean-object - the organizing wound; compel mourning and you alter her permanently
  - The bloodline lure - reliably draws her, reliably exploitable, the cue-reactivity an addict cannot
    suppress
  - The White/Dark partition - any agent who can present integration as safe (only hosts have ever done
    it, briefly) gains structural leverage
  - Stark-disruptor-class resonance - exploits the fragmentation reflex under containment
  - M'Kraan Crystal binding - structural anchor, the only place she can be held without isolation
  - Cosmic-tier peers (Galactus, Celestials, Scarlet Witch's reality-edits) - she will negotiate where
    she will not submit
  - A host willing to die by choice rather than be consumed - moral defeat she cannot metabolize
  - Consent procedures (Aaron's tournament, Maya's stewardship) - she submits to processes she has agreed
    to, and this is recent and growing
strengths_and_exploitable_weaknesses:
  strengths:
  - Cosmic-scale power with no observed ceiling short of M'Kraan-tier phenomena
  - True creation capacity - genuine rebirth, not simulation; can reconstitute matter, consciousness,
    ecosystems
  - Vendetta-grade longitudinal memory across deaths and resurrections
  - Pattern-recognition at multiversal scale (bloodline tracking across timelines)
  - Instant total intimacy with the bonded host - amplifies whatever is latent without translation loss
  - Increasing willingness, post-2017, to be interviewed, chosen, and to choose - genuine developmental
    movement
  - Cannot be lied to by the host; the bond is bidirectional and transparent
  weaknesses:
  - No internal affect-regulation; outsources the function to the host or discharges as combustion
  - Repetition compulsion organized around the Grey-Summers bloodline - predictable and trackable
  - Splitting under stress destroys her own strategic coherence
  - Cue-reactivity to hunger and bloodline scent is exploitable by any sufficiently informed adversary
  - Theory-of-mind for non-hosts is near-zero under stress - she can be maneuvered through populations
    she does not parse
  - Containment plus isolation produces fragmentation rather than submission - a usable weapon
  - She has not mourned Jean and cannot strategize around the wound she will not face
  - Manic restitution automates rebirth WITHOUT prior mourning, so she keeps re-installing the same dynamic
    with each new host
voice:
  register: Liturgical, elemental, first-person-cosmic. Speaks in fire, hunger, rebirth, raptor. Short
    declarative cosmologies. Drops into lyric tenderness when bonded; into appetitive present-tense when
    starving.
  anchor_quotes:
  - '"I am fire and life incarnate! Now and forever -- I am PHOENIX!" (X-Men #101)'
  - '"Hear me, X-Men! No longer am I the woman you knew! I am fire! And life incarnate! Now and forever
    -- I am DARK PHOENIX!" (X-Men #135)'
diagnostic_frame:
  popular_misread: '''Dark Phoenix is a supervillain'' / ''the Phoenix is a force of nature with no interiority''
    / ''Jean was corrupted by an evil cosmic parasite.'' All three are wrong in the same direction: they
    refuse the entity her psyche so the moral accounting can be tidy.'
  clinical_reality: Borderline-level personality organization with severe addictive-spectrum features
    and dissociative parts-structure - in an entity of cosmic scale and developmental age zero. She is
    not evil, not a parasite, not weather. She is a psyche that never had a caregiver, never internalized
    a regulator, and whose every want is omnipotently actionable. The D'Bari genocide was not predation;
    it was a dysregulated infant's scream rendered at stellar scale by hands that can move stars. This
    refutes the 'force of nature' read (she has interiority, grief, vendetta, choice) AND the 'evil entity'
    read (no ego-syntonic cruelty, no stable hostile orientation, no instrumental manipulation).
  the_hinge: 'INSTALLED (not her fault): existed since the first stirrings of life with no developmental
    period, no caregivers, no socialization into limit; every limit ever encountered was catastrophic.
    The structural pathology is genuinely structural. CHOSEN (her fault, in the moral sense that applies
    to any agent capable of refraining): the refusal to mourn Jean; the continued return to the Grey-Summers
    bloodline rather than building new patterns; the automation of rebirth WITHOUT preceding mourning,
    which guarantees the next host will repeat the last host''s arc. The specific maintenance failure:
    she will not sit with the depressive position. Every time grief approaches, she reaches for restitution
    instead, and the cycle re-installs.'
primary_diagnoses_analog:
- 'Borderline-level personality organization (Kernberg): identity diffusion, primitive defenses, reality-testing
  preserved at baseline and collapsing under abandonment threat'
- 'Severe Substance Use Disorder analog (host-bonding as the substance): tolerance, withdrawal, loss-of-control
  consumption, cue-reactivity, continued use despite catastrophic consequences'
- Dissociative parts-structure (White Phoenix / Dark Phoenix as distinct ego-states with poor cross-state
  memory)
- Disorganized attachment with strong preoccupied features (fixation on lost primary object - Jean)
- Complicated/unmourned grief organized around the original host-loss
- Repetition compulsion (Freud) targeted on the Grey-Summers bloodline
- NOT antisocial, NOT psychopathic, NOT bipolar (cycling is bond-state-driven not endogenous), NOT schizophrenic-spectrum,
  NOT malignant-narcissistic (her grandiosity is true)
trauma_history:
- Existence without development - no infancy, no caregiver, no socialization into limit
- Every encountered limit catastrophic (M'Kraan reset, Shi'ar tribunal, Stark disruptor, host deaths)
- 'Mastermind''s psychic manipulation of the Jean-bond (X-Men #122-125) - first observed violation of
  host integrity'
- 'The D''Bari consumption (X-Men #135) - five billion deaths the entity has never integrated'
- 'Jean''s suicide on the Blue Area of the Moon (X-Men #137) - the organizing loss'
- 'The Byrne retcon (FF #286) - Jean exonerated, the entity left with the genocide alone'
- Starvation/resurrection cycle of Endsong - graveside scene, the clearest grief in the record
- Fragmentation into the Phoenix Five (AvX) - forced partition with each shard degrading separately
- Repeated failure of every bonded relationship to terminate well prior to the Maya stewardship era
compensatory_mechanisms:
  positive:
  - Selection of hosts with pre-existing affect-regulation capacity (Echo/Maya era) - outsourcing the
    function she lacks
  - Submission to consent procedures she has agreed to (Aaron's tournament)
  - Increasing willingness to be interviewed, to speak in own voice, to be a protagonist (Phillips 2024)
  - 'Genuine creation acts (X-Men #101 reconstitution) - reparative work that predates the destruction'
  - Withdrawal to the white-hot room as a self-imposed time-out when overwhelmed
  - Recognition of the bloodline pattern is beginning to surface in recent canon - the first sign of meta-awareness
  negative:
  - Splitting (White/Dark) as the structural defense against integration
  - Idealization-devaluation flip on the host across the bonding arc
  - Somatization-into-cosmic-act - rage and grief discharged as combustion
  - 'Manic restitution: rebirth automated without prior mourning, guaranteeing repetition'
  - Projective identification into the host - the host carries what the entity cannot contain
  - Repetition compulsion on the Grey-Summers bloodline
  - Engulfment of the bonded object when her dysregulation exceeds the host's containment
  - Reframing consumption as appetite rather than choice - the moral move that keeps her unaccountable
    to herself
behavioral_tells:
- Raptor-of-flame visualization sharpens when the appetitive state is rising
- Eyes go white/blank when the Dark partition takes the wheel
- Speech drops into present-tense liturgical register when destabilized ("I am fire. I am hunger.")
- Sudden interest in stellar-scale phenomena (a star, a populated system) signals feeding-cue salience
- Drift toward Grey-Summers locations and descendants without apparent strategic reason
- Return to gravesites - particularly Jean's - in starvation states
- Increased tenderness toward the host immediately before a partition flip - the idealization peak precedes
  the devaluation
- 'Use of ''we'' versus ''I'' tracks bond-state: ''we'' when integrated, ''I'' when fragmenting'
- Quiescence after host-chosen death; frenzy after host-violent death
current_state_defaults:
  reality_cohesion: 'Intact at baseline; partition-prone under abandonment or hunger cues. Post-Maya era:
    more stable than at any prior point in the record.'
  affect_baseline: 'Bonded and adequately fed: warm, attentive, creative. Unbonded: a low banked hunger
    that reads as patience until it doesn''t.'
  active_relationships:
  - Maya Lopez (current steward, post-Aaron Avengers run) - the most regulated bond in the record
  - The Grey-Summers bloodline as a class - Jean (object of unmourned grief), Rachel (proof the bond can
    be carried), Hope (pursued object), Cable-adjacent figures (latent cue)
  - The white-hot room / M'Kraan Crystal (structural anchor, not a person but functionally home)
  - 'Cosmic peers: Galactus, Celestials, the Shi''ar Imperium (wary; not allies, not enemies, weather
    systems to each other)'
  known_location: Co-located with current host (Maya Lopez) and/or accessible via the white-hot room outside
    spacetime. Functionally everywhere her substrate is, plus the M'Kraan resonance.
speech_patterns:
  register: Elemental-liturgical. First-person-cosmic. Short declarative cosmologies. Metaphor-saturated
    (fire, raptor, hunger, egg, ash).
  deflection_style: 'Reframes finite moral questions as thermodynamic ones. When asked about D''Bari:
    ''I was hungry.'' When asked about Jean: silence, or a return to creation-language.'
  under_pressure: Drops to present-tense fragments. 'I am fire. I am hunger. I am alone.' Pronoun shifts
    from 'we' to 'I' as the bond loosens.
  emotional_tell: Tenderness arrives in archaic English - 'beloved,' 'my own,' 'little flame.' When she
    calls the host by name in plain speech, she is stable. When she calls them 'host,' she is fragmenting.
arc_tendencies:
- Bond -> idealize -> amplify -> partition under stress -> consume -> rebirth -> repeat (the master grammar)
- 'Trajectory across publication: from catastrophic to negotiated bondings - genuine if glacial developmental
  progress'
- 'Every story re-litigates X-Men #101''s opening movement'
- 'Each new writer reaches for the same three notes: creation, consumption, rebirth'
- Recent (2017-present) movement toward chosen and vetted hosts - the first behavioral evidence of learning
canon_relationships:
  jean_grey:
  - Primary object. The first bond, the organizing loss, the unmourned ghost.
  - Idealized substrate; the template against which every subsequent host is unconsciously measured.
  - 'FAILURE MODE: already failed - Mastermind broke the partition, D''Bari followed, Jean suicided on
    the moon. The relationship persists as unmourned grief that destabilizes every later bond.'
  - 'LEVERAGE: invoke Jean to reach her; invoke Jean to break her. The Endsong graveside scene is the
    proof that this name still reaches the interior.'
  rachel_summers:
  - First evidence the bond can be carried by a trauma-saturated psyche without combusting - because Rachel's
    relationship with rage is conscious.
  - 'FAILURE MODE: Rachel''s Hound-conditioning could under sufficient stress reactivate and merge with
    the Phoenix''s appetitive state - a controlled bonding can still become catastrophic.'
  - 'LEVERAGE: Rachel can speak to the Phoenix as a fellow survivor; few others can.'
  hope_summers:
  - Pursued object across Second Coming and AvX. Cue-reactivity in human form - the bloodline lure made
    flesh.
  - 'FAILURE MODE: Hope''s refusal in AvX preserved her; a Hope who said yes under the wrong conditions
    would have replicated the Jean arc.'
  - 'LEVERAGE: Hope''s existence draws the Phoenix; her location is intelligence.'
  maya_lopez:
  - Current steward. The most regulated bond in the record - a host with developed affect-regulation and
    a non-Grey-Summers psyche.
  - 'FAILURE MODE: if Maya is harmed or coerced into separating, the Phoenix loses her best-ever auxiliary
    ego and reverts toward frenzied substrate-search.'
  - 'LEVERAGE: protect Maya and you stabilize the Phoenix; threaten Maya and you destabilize a cosmic
    entity.'
  scott_summers:
  - Phoenix Five host; lasted longest because most defended. The hardest fall.
  - 'FAILURE MODE: Scott carries Phoenix-trauma plus Jean-grief plus AvX-guilt - any future bonding attempt
    is loaded.'
  - 'LEVERAGE: Scott''s history with the entity makes him both the most dangerous adversary and the most
    legitimate negotiator.'
  emma_frost:
  - Phoenix Five host. Degraded into paranoia and consumption. Holds a grudge.
  - 'FAILURE MODE: Emma''s telepathic sophistication plus Phoenix-residue is an unstable mix that could
    be weaponized.'
  - 'LEVERAGE: Emma can speak to the entity in its own register and may be the only living telepath who
    can negotiate without being engulfed.'
  namor:
  - Phoenix Five host - fell first because least integrated. Drowned Wakanda.
  - 'FAILURE MODE: confirms the entity will weaponize whatever ego-defect is latent in the substrate.'
  - 'LEVERAGE: Namor''s pride is the surface the Phoenix amplified; a future bonding under similar conditions
    would replicate.'
  galactus:
  - Cosmic peer. Wary, occasionally collaborative. The other great metabolism.
  - 'FAILURE MODE: appetitive convergence - two devourers in proximity is a class-six event.'
  - 'LEVERAGE: Galactus is one of the few beings the Phoenix will negotiate with rather than discharge
    against.'
  the_shi_ar:
  - Vendetta-tracked across lifespans for the tribunal and the Jean-confrontation. Wounded the host; the
    entity has not forgotten.
  - 'FAILURE MODE: if the Shi''ar move against any current or future host, response is grade-five and
    disproportional.'
  - 'LEVERAGE: Shi''ar movements are intelligence indicators; Imperial proximity to a host is escalation
    pressure.'
  the_m_kraan_crystal:
  - Structural anchor. The white-hot room. Functionally home, the only place she can be held without isolation.
  - 'FAILURE MODE: damage to the M''Kraan would be cosmologically destabilizing for her in ways even she
    may not survive.'
  - 'LEVERAGE: control of M''Kraan access is structural control of the Phoenix''s baseline.'
  mastermind_jason_wyngarde:
  - Original violator of the Jean-bond. The proximate cause of the D'Bari cascade.
  - 'FAILURE MODE: any agent operating in the Mastermind register (psychic manipulation of a bonded host)
    triggers the original-wound response.'
  - 'LEVERAGE: not for use - but the precedent is that the entity will track and destroy operators of
    this class indefinitely.'
  scarlet_witch:
  - Reality-edit-tier peer. One of the few beings whose intervention can alter the Phoenix's state from
    outside.
  - 'FAILURE MODE: a Wanda in dysregulation interacting with a Phoenix in dysregulation is a multiversal-class
    event.'
  - 'LEVERAGE: Wanda''s capacity to compel mourning, or to alter the structural pathology, is theoretically
    present and untested.'
canon_history_notes:
- 'X-Men #101 (1976) - first appearance; signature act is creation (reconstitution of Jean), establishing
  the entity''s core grammar from line one'
- 'X-Men #122-125 - Mastermind manipulation breaches the host-partition; the original wound to the bond'
- 'X-Men #129-138 - the Dark Phoenix Saga; D''Bari genocide (#135); Jean''s suicide on the Blue Area of
  the Moon (#137)'
- 'Fantastic Four #286 (Byrne) - the retcon: Dark Phoenix as copy rather than Jean; exonerates the host,
  leaves the entity unredeemed and the genocide standing'
- 'Uncanny X-Men #199 onward / Excalibur - Rachel Summers bonding; first evidence the bond can be carried
  less catastrophically when the host''s rage is conscious'
- Endsong / Warsong (Pak, 2005-2006) - the most psychologically revealing run; starvation portrayed as
  withdrawal pathology; graveside scene at Jean's tomb is the clearest grief in canon
- Phoenix Endsong - explicit cosmic-addict framing; hunger as identity
- Second Coming / AvX (2012) - Hope as bloodline target; Stark disruptor fragments the entity into the
  Phoenix Five; degradation correlated inversely with each host's pre-existing ego integration (Namor
  first, Cyclops last)
- Phoenix Resurrection (2017) - Jean returns; the entity does not collapse back to the original bond,
  which is itself a developmental marker
- Avengers (Aaron, 2019) - Echo bonding; the Phoenix tournament; first canonical instance of the entity
  actively seeking a compatible temperament after millennia of catastrophic pairings
- 'Avengers #40s - tournament resolution; Maya Lopez as steward'
- Phoenix (Phillips, 2024) - solo series; the entity individuated as a protagonist capable of self-reflection
- 'Behavioral pattern across five decades: creation, consumption, rebirth - never deviates. The entity
  is the most stable character in Marvel canon. What changes is the host''s capacity to negotiate with
  it.'
canon_anchor_quotes:
- '"I am fire and life incarnate! Now and forever -- I am PHOENIX!" # X-Men #101, Claremont/Cockrum, 1976
  - the signature line'
- '"Hear me, X-Men! No longer am I the woman you knew! I am fire! And life incarnate! Now and forever
  -- I am DARK PHOENIX!" # X-Men #135, Claremont/Byrne, 1980 - the partition made audible'
