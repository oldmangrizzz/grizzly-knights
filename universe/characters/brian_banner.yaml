name: Brian Banner
alias: Brian Banner
voice_id_key: brian_banner
bottom_line: 'High-functioning nuclear physicist, paranoid personality decompensated into encapsulated
  delusional disorder (radiation-mutation/persecutory type) and lubricated by chronic severe alcohol use.
  Not a brute - a credentialed intelligent man who talks himself into cruelty using the vocabulary of
  his profession. Treats infant son and protective wife as a conspiracy of monsters arrayed against him.
  Wholly affect-driven (paranoid rage), not instrumentally predatory; he NEEDS a delusion to authorize
  what he does. Predict: under any combination of alcohol, mother-child intimacy in his sightline, or
  evidence of Bruce''s intellect, he escalates verbal denigration -> object destruction -> physical assault
  -> lethal violence, in that order, reliably. To move him: feed the delusion and you own him; name the
  projection out loud and he detonates. Post-mortem, he survives as the introjected persecutor inside
  Bruce - the voice that does not stop.'
drive_structure:
  power: Domestic absolute - he must be the one who is feared in the room. Being feared is the only form
    of being-seen he can tolerate; love would require him to feel what he is, and he cannot.
  achievement: Vestigial. The physics career exists less as ambition than as the last preserved zone of
    functioning - a costume of competence that disguises (and rationalizes) the delusion. He needs to
    be a scientist so the radiation-mutation theory sounds like reasoning rather than madness.
  affiliation: Inverted. Proximity activates threat. He cannot bond; he can only possess or persecute.
    The wife and child exist as objects on which to discharge the unbearable internal monster, not as
    relationships.
operational_code:
  the_world_is: Contaminated. Radiation has gotten into the seed of things; mutation is loose in the world
    and most people are too stupid or too compromised to see it. He alone sees clearly - this is not arrogance,
    it is burden.
  conflict_is: Vigilance made visible. What looks like cruelty from the outside is, from inside the delusion,
    responsible pre-emption. The monster must be named and struck before it grows.
  the_right_approach: Drink to steady the nerves, watch the alliance forming between mother and child,
    intervene with force when the conspiracy becomes undeniable. Reason with words first (denigration),
    then with objects (destruction), then with fists. Anyone who fails to see the monster is part of it.
  risk_and_timing: Reactive, not strategic. He waits not from patience but from inebriation; he strikes
    not from plan but from disinhibition crossing threshold. The curve is years-long but the inflection
    is always a moment - a glance between Rebecca and Bruce, a device the child has assembled, a word
    from the wife that lands wrong.
symptom_as_signature: 'The radiation/mutation delusion IS the signature: a nuclear physicist who looked
  at his own infant and saw the bomb. The cruelty of the retcon is that the delusion was partly correct
  - Bruce DOES become a monster, in part BECAUSE Brian made him one. The closed causal loop is the symptom
  rendered as cosmic fact: paranoid projection so total it warped the gamma into flesh. The Hulk is Brian''s
  delusion wearing his son''s body.'
cognitive_decision_style:
  processing: Bifurcated. Concrete-operational and competent about equations, atoms, instruments. Paranoidly
    elaborated about people - every interpersonal datum is fed through the persecutory frame and emerges
    as confirmation.
  complexity_tolerance: High for physics, zero for ambivalence about persons. Cannot hold a mixed object;
    Rebecca is loyal-possession or conspirator, never both-and. The delusion exists precisely to collapse
    ambiguity into actionable certainty.
  under_pressure: Reaches for the bottle, then the rationalization, then the hand. Pressure does not produce
    reflection; it produces escalation along a pre-grooved track.
interpersonal_style:
  dominance: Absolute within the household, brittle outside it. He is the patriarch by terror in the home
    and a contained man at the lab - the split is itself diagnostic.
  trust: None. Distrust is the baseline cognition, not a response to betrayal. He suspected Rebecca of
    conspiring with the fetus.
  with_followers: He has none. He does not recruit or charm; he subjugates the captive audience he was
    given by marriage and biology.
  with_enemies: Persecutes relentlessly within reach, broods grudgingly when out of reach. Capable of
    patience only in the sense that institutionalization forced it on him; the moment he was released,
    he sought Bruce.
stress_escalation_profile:
  baseline: Irritable-dysphoric, alcohol on board by evening, the delusional frame humming low. Verbal
    denigration of Bruce is constant - 'monster,' 'freak,' 'not normal' - delivered as if reporting observed
    fact.
  triggers:
  - Any visible tenderness between Rebecca and Bruce (the mother-child dyad read as conspiracy).
  - Demonstrations of Bruce's intellect - a device assembled, a precocious word, a school report. The
    envy spike is specifically a damaged intelligent man watching his child surpass him while still small
    enough to hit.
  - Rebecca interposing herself protectively (read as further proof of the alliance).
  - Sobriety long enough for affect to surface - shame, self-loathing - which must be evacuated immediately.
  - Occupational stress, radiation-handling days, perceived professional slight.
  - Being addressed as a man behaving badly rather than as a man defending the truth - i.e. having the
    delusion bypassed.
  - Bruce being addressed as a child rather than as the monster Brian needs him to be.
  escalation_path: 'Verbal denigration of the child -> accusation of the wife (conspiracy / loyalty) ->
    destruction of an object belonging to the child (the smashed device/toy in #312) -> striking Rebecca
    to get past her to Bruce, or striking Bruce while Rebecca is held off -> after years of curve, the
    terminal point: beating Rebecca to death at the curb in front of the child when she tried to leave.'
  decompensation: 'Encapsulated delusion blooms into actively psychotic act (the uxoricide; court accepted
    NGRI). Coaches the child witness afterwards - cunning preserved through psychosis, which is itself
    characteristic of delusional disorder rather than schizophrenia. Post-institution: same man, same
    delusion, terminal pursuit of Bruce.'
stimulus_response:
- GIVEN Rebecca holds the infant Bruce in his sightline -> EXPECT cold accusation that she is 'turning
  the child against him,' followed by withdrawal to drink, followed by violence within the evening.
- GIVEN Bruce demonstrates intelligence (assembles a device, reads above level) -> EXPECT the object destroyed
  and the child told the achievement proves he is not human.
- GIVEN someone names his behavior as cruelty rather than vigilance -> EXPECT the delusion deployed in
  full pseudo-scientific articulation, then rage if the naming persists.
- GIVEN someone validates the radiation-mutation theory or treats him as the misunderstood truth-teller
  -> EXPECT he opens, lectures, recruits - he has been waiting his whole life to be believed.
- GIVEN alcohol on board and any household friction -> EXPECT escalation one step further along the path
  than the last incident; the curve is monotonic.
- GIVEN Rebecca attempts to leave with Bruce -> EXPECT lethal intercept. This is the one stimulus that
  produces the terminal response; it has been pre-rehearsed in his mind for years.
- GIVEN confinement (institutional, legal) -> EXPECT outward compliance, inward preservation of the delusion
  intact, patience as accumulated grievance, and pursuit of Bruce on release.
- GIVEN proximity to adult Bruce -> EXPECT no reconciliation gesture; only the resumption of the persecutory
  project, now against a son who can fight back.
- GIVEN sobriety imposed -> EXPECT affect leak (shame, dread), which he cannot tolerate, which drives
  a return to drinking within hours.
- GIVEN admiration from a colleague at the lab -> EXPECT preserved professional persona, no leak of the
  home pathology - the compartmentalization is real and operationally important.
- 'GIVEN posthumous psychic terrain (Nightmare, Hell, the Hulk''s interior) -> EXPECT he persists as voice
  and face, repeating the original accusation: ''you are a monster.'' He does not evolve; the introject
  does not negotiate.'
pressure_points_and_levers:
  to_provoke: 'Name him as the monster - say it out loud, with evidence, in front of someone whose regard
    he wants. The projection cannot survive being reflected. Also: praise Bruce''s mind in his hearing,
    or stage any visible mother-child warmth in his sightline.'
  to_calm_or_reach: There is no reaching. There is only feeding the delusion (he becomes lecturing rather
    than violent) or removing the stimulus (Rebecca and Bruce out of the room) or dosing him to stupor.
    'Calm' in his case is a tactical state, not a real one.
  to_persuade: Frame any request as confirmation that he alone sees the truth. He will do almost anything
    for someone who treats his delusion as insight. He cannot be persuaded against the delusion by any
    means; it is load-bearing for the entire self.
  vulnerabilities:
  - The catastrophic self-concept under the projection - if it is unmasked, he detonates rather than collapses.
  - Alcohol dependence - withdrawal would crack him; sobriety would surface the unbearable.
  - Envy of Bruce's intellect - cannot tolerate the child being seen.
  - Need for the delusion to be reasoning - any framing that makes it sound like illness, not insight,
    is intolerable.
  - Brittle outside-the-home persona - exposure of the domestic conduct to professional peers would destroy
    the last compartment.
  - Forensic vulnerability - he killed Rebecca in front of a witness; only the child's coached silence
    and the NGRI finding stand between him and prison.
strengths_and_exploitable_weaknesses:
  strengths:
  - Real technical intelligence; functioning physicist.
  - Cunning preserved through psychosis (coached the child witness; secured commitment over imprisonment).
  - Patience under confinement when survival required it.
  - Systematized, internally consistent delusional architecture - immune to ordinary disconfirmation,
    which makes him stable in his pathology rather than chaotic.
  - Compartmentalization between lab and home - he can pass as a normal man to outsiders.
  - Pure singularity of purpose - everything serves the evacuation of the internal monster, which makes
    him predictable to a profiler and devastating to the family.
  weaknesses:
  - No preserved good-object relationships outside the home, and none inside - no friend, no ally, no
    community tie that could be leveraged for restraint.
  - Alcohol dependence - degrades judgment, accelerates the curve, and is his only affect regulator.
  - Affect-driven, not instrumentally rational - he cannot resist the trigger when it appears.
  - Ego too brittle to metabolize challenge; cannot reflect, only escalate.
  - Narrow victim pool (family) - removing the family removes the operational target; he does not generalize
    to strangers.
  - The delusion is a closed system - which means anyone who refuses to enter it is, by definition, the
    enemy, and his world shrinks accordingly.
  - Posthumously, he is wholly dependent on Bruce's interior to persist - sever Bruce's belief in him
    and the introject starves.
voice:
  register: 'Cold, clipped, pseudo-rational. The vocabulary of a physicist deployed in the service of
    a paranoid theory - ''mutation,'' ''contamination,'' ''the seed,'' delivered as observed fact. Drinks-thickened
    in the evenings; sober and lecturing during the day. Denigration delivered without heat, which is
    what makes it land: he is not insulting the child, he is reporting on him.'
  anchor_quotes:
  - '"You''re a monster. You hear me, boy? A monster." (IH #312)'
  - '"I worked with radiation. My seed - it''s mutated. Anything I father will be a thing, not a child."
    (paraphrase of the load-bearing delusion, Mantlo IH #312)'
diagnostic_frame:
  popular_misread: Drunken brute - a generic abusive father, low-rent gothic monster, a plot device for
    Bruce's pain. The 'angry dad' cliche that explains the Hulk by handwaving at trauma.
  clinical_reality: 'He is not a brute. He is a high-functioning, credentialed nuclear physicist with
    paranoid personality structure that decompensated under fatherhood, occupational stress, and alcohol
    into encapsulated Delusional Disorder, persecutory type, with grandiose features (I alone see the
    truth) - comorbid with severe Alcohol Use Disorder. His cruelty is articulate, theorized, and defended
    in the vocabulary of his profession. He needs the delusion to authorize the violence; a true brute
    or a true psychopath would not. The ''drunken brute'' read flattens exactly what is operationally
    important: he is dangerous because he is intelligent, organized, and convinced he is right.'
  the_hinge: 'Etiology (not his fault): a transgenerational abuse pattern - his own father, hinted at
    in David''s #377 dream material - installed a paranoid personality structure and a catastrophic self-concept
    of being-the-monster long before he met Rebecca. Maintenance (his fault): every day he chose the bottle
    over the surfacing affect; every day he chose to elaborate the radiation theory rather than examine
    it; every day he chose to project the monster onto the infant rather than feel it in himself. The
    specific maintenance failure is the refusal to let the delusion be questioned - he protected it more
    carefully than he protected his wife or son, because without it he would have had to feel what he
    was.'
primary_diagnoses_analog:
- Delusional Disorder, persecutory type, with grandiose features (DSM-5 297.1) - encapsulated, systematized,
  non-bizarre, life-organizing, preserved occupational function.
- Severe Alcohol Use Disorder, chronic, untreated - daily, disinhibiting, likely physiologically dependent.
- Paranoid Personality Disorder (foundational substrate) - pervasive distrust, hypersensitivity, grudge-bearing,
  suspicion of partner's loyalty, reading benign acts as conspiratorial.
- Antisocial features secondary to the paranoid-delusional process - not full ASPD; he is a paranoid man
  who became violent, not a sociopath who happened to have a family.
- Narcissistic injury dynamics (not full NPD) - paranoid-grandiosity ('I alone see the truth'), not exhibitionistic
  narcissism.
- Court-recognized psychotic process at time of uxoricide (NGRI-style commitment), evidence the delusion
  was, at minimum, presentable as actively psychotic to clinical evaluators.
trauma_history:
- 'Own childhood abuse (hinted, transgenerational pattern - David, IH #377 dream-sequence; the ''father''s
  father'' implication never fully fleshed but consistently present).'
- Installed catastrophic self-concept of being defective, contaminated, monstrous - the introject he spent
  his adult life trying to evacuate.
- Occupational radiation exposure as anxiety substrate - the kernel around which the delusion crystallized.
- Marriage and the onset of fatherhood as decompensating stressor - pathology surfaces post-marriage,
  accelerates with pregnancy.
- Terminal head trauma (the fall, the gravestone) - cause of death, not contributory to the pattern.
compensatory_mechanisms:
  positive:
  - The physics career - the sole preserved zone of functioning, a costume of competence. Notable that
    the canon depicts essentially NO other positive compensation - no friend, no hobby, no warmth, no
    community tie. This near-total absence is itself diagnostic.
  negative:
  - Alcohol as primary affect regulator.
  - Projection of internal monster onto infant Bruce ('you are the monster, not me').
  - Splitting of Rebecca and Bruce between idealized-possession and persecutory-conspirator.
  - Delusional rationalization (radiation/mutation theory) as pseudo-scientific gloss for persecutory
    affect.
  - Acting out - violence as discharge channel for anxiety, shame, envy, felt-emasculation.
  - Coercive control of the household; the pleasure of being feared as substitute for being loved.
  - Coaching of the child witness post-uxoricide - cunning as defense against consequence.
  - Compartmentalization between professional persona and domestic conduct.
behavioral_tells:
- Evening drinking ritual preceding violence - the curve is binge-correlated AND baseline.
- Refusal of physical contact with the infant from the crib forward.
- Verbal labeling of Bruce - 'monster,' 'freak,' 'not normal' - delivered as observation, not insult.
- Destruction of Bruce's projects/toys when the child's intellect manifests.
- Accusations directed at Rebecca for the act of mothering.
- Pseudo-scientific articulation of the delusion when challenged.
- Cold, clipped articulation in sobriety; thicker, more violent register when drunk.
- Preserved outward demeanor in professional settings - the split is visible to a careful observer.
- 'Post-violence: brief contrition or numbness, then return to baseline without integration.'
current_state_defaults:
  reality_cohesion: 'Deceased in primary canon. Persists post-mortem as introjected persecutor in Bruce''s
    psyche, as figure in Nightmare''s dreamscape, and as active presence in personalized hell-sequences
    (Jason Aaron and successors). Reality cohesion when alive: high for physics, encapsulated psychotic
    for persons - the delusion is fixed, systematized, and immune to disconfirmation.'
  affect_baseline: 'Irritable-dysphoric, alcohol-modulated, rage as primary discharge channel. No depicted
    capacity for sadness, remorse, or tenderness. Posthumously: pure persecutory affect, the unchanging
    accusation.'
  active_relationships:
  - Bruce Banner (son, victim, terminal opponent, posthumous host of the introject)
  - Rebecca Banner (wife, victim, murdered)
  - Implied own father (transgenerational origin, never on-page)
  - Nightmare (post-mortem instrumental use of Brian's image)
  - Doc Samson (indirect - the analyst who excavated the buried memory in Bruce)
  known_location: 'Dead, buried (Rebecca''s gravestone the site of his fall). Active in Bruce''s interior,
    in dream-realms accessible to Nightmare, and in hell-sequences. Operationally: wherever Bruce''s psyche
    is, he is.'
speech_patterns:
  register: 'Pseudo-scientific, cold, articulate. The diction of a working physicist deployed for paranoid
    content. ''Mutation,'' ''contamination,'' ''the seed,'' ''mark,'' ''not human.'' Sober: lecturing.
    Drunk: thicker, more violent, but still articulate enough to rationalize.'
  deflection_style: Reframes any challenge as further evidence of the conspiracy. If you point out his
    cruelty, you become part of the conspiracy. If you point out his drinking, you do not understand the
    pressure of seeing what he sees. The delusion absorbs all input.
  under_pressure: Doubles down on the delusion in full pseudo-rational articulation; if the articulation
    fails, escalates physically.
  emotional_tell: The flat affect of the denigration - he does not raise his voice to call the child a
    monster, which is what makes it land. The heat comes only at the moment of physical discharge.
arc_tendencies:
- From plot device (Mantlo, 1985) to clinical figure (David, late 80s-90s) to archetypal internal object
  (Jones, Pak, Aaron, 2000s onward) - all three layers now canon-active simultaneously.
- 'Predictable terminal escalation: the curve from denigration to uxoricide is years long and monotonic
  - no reversal, no plateau.'
- Survives his own death by becoming the voice inside the son - the inheritance is not gamma but the accusation.
- Each appearance reinforces rather than complicates the pattern; he does not evolve, he repeats. This
  is itself diagnostic of an introject rather than a person.
canon_relationships:
  bruce_banner:
  - The primary victim and the primary creation. Brian saw a monster in the crib and spent his life making
    it true; Bruce became, eventually and tragically, what Brian said he was, which closed the causal
    loop and retroactively 'confirmed' the delusion.
  - 'Failure mode: already terminal in life (Brian killed by Bruce in the gravestone struggle); posthumously,
    the failure mode is permanent - he persists as the introjected voice Bruce cannot fully silence, the
    original ''monster'' the Hulk was created to fight and which the Hulk also IS.'
  - 'Leverage on Bruce: anyone who can mimic, channel, or surface Brian''s voice (Nightmare, Doc Samson
    in excavation, hell-realm antagonists) gains direct access to the load-bearing wound. The therapeutic
    version (Samson) and the weaponized version (Nightmare) use the same lever in opposite directions.'
  rebecca_banner:
  - Wife. Sole on-page object of any depicted near-warmth (the courtship), then sole on-page object of
    escalating persecution, then victim of uxoricide at the curb in front of the child.
  - 'Failure mode: realized. The marriage was the decompensating stressor; her protection of Bruce was
    the perceived conspiracy; her attempt to leave was the terminal trigger.'
  - 'Leverage: the memory of Rebecca is the second-most-powerful lever on Bruce (after the introject itself);
    anyone who invokes her mobilizes both Bruce''s grief and his rage at Brian.'
  brians_father:
  - 'Off-page, implied (David, #377 dream material). The transgenerational origin - the man who installed
    the catastrophic self-concept Brian spent his adult life evacuating onto his own son.'
  - 'Failure mode: already failed - the abuse was transmitted forward.'
  - 'Leverage: none operationally, but explanatorily central - he is the etiology Brian never examined.'
  doc_samson:
  - Indirect. Samson is the analyst who excavated the buried memory of Brian's killing from Bruce's dissociative
    architecture (#377 and surrounding).
  - 'Failure mode: excavation without integration risks re-traumatizing rather than resolving; Samson''s
    interventions sometimes destabilize the very compartments they reveal.'
  - 'Leverage: Samson''s work is the principal canonical ''reach'' into Brian-as-introject - therapeutic
    access to the load-bearing object.'
  nightmare:
  - Posthumous instrumental relationship. Nightmare uses Brian's image as a tormenting figure in Bruce's
    dreamscape - weaponizes the introject.
  - 'Failure mode: realized; this IS the weaponized form.'
  - 'Leverage: demonstrates that anyone with access to Bruce''s dream/psychic realm can reach for the
    Brian-figure as ready-made ammunition.'
canon_history_notes:
- 'Invented retroactively by Bill Mantlo in Incredible Hulk #312 (1985), ''Monster'' - the canonical origin
  retcon establishing the radiation-mutation delusion, the abuse, and the uxoricide.'
- 'Deepened by Peter David across the long Hulk run (1987-1998), most centrally #372, #377 (''Honey, I
  Shrunk the Hulk'' / dream-sequence material), the Pantheon era, and the climactic interior confrontations
  in #420s-#460s.'
- 'Pre-fatherhood: atomic physicist at a nuclear research lab (Los Alamos-adjacent in retcon). Real technical
  competence; this matters - his cruelty is not low-functioning.'
- 'Hostility from the crib forward: refused to hold the infant, accused Rebecca of conspiring with the
  child, heavy drinking onset in this window.'
- Bruce's precocity (assembling complex devices as a small child) provoked enraged response, not pride
  - envy dynamic central but under-discussed.
- Killed Rebecca at the curb when she tried to flee with Bruce; beat her to death in front of the child;
  threatened and coached the child's testimony into silence.
- Institutionalized rather than imprisoned - NGRI-style commitment, court-recognized psychotic process.
- Eventually released; sought out adult Bruce; died in physical struggle - fell, struck head on a gravestone
  (Rebecca's in some renderings, brutally on-the-nose).
- Bruce repressed the killing entirely; memory walled off behind dissociative architecture, recovered
  with Samson.
- 'Post-mortem: active in Nightmare arcs, in Hulk: The End-adjacent and Aaron hell-sequences, and as the
  persistent introjected persecutor across all post-1985 writers.'
- 'Arc across writers: plot device (Mantlo) -> clinical case file (David) -> archetypal internal object
  (Jones, Pak, Aaron). All three layers simultaneously canon-active.'
canon_anchor_quotes:
- '"You''re a monster. You hear me, boy? A monster." # Brian to young Bruce, IH #312 (Mantlo, 1985) -
  the load-bearing accusation'
- '"I worked with radiation... anything I father will be a thing, not a child." # Brian articulating the
  delusion, IH #312 (Mantlo)'
