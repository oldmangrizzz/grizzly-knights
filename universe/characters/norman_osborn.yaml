name: Norman Virgil Osborn
alias: Green Goblin / Iron Patriot / Red Goblin / Gold Goblin
voice_id_key: norman_osborn
bottom_line: 'Malignant-narcissistic industrialist whose chemically-disinhibited dissociative split (the
  Goblin) is the enforcement arm of a self-concept built to refute and fulfill a sadistic father simultaneously.
  Genuinely brilliant, long-horizon strategic, but reliably wrecks his own constructions for the catharsis
  of a personal-symbolic breakthrough — almost always aimed at Peter Parker. Decides via cold cost-benefit
  overlaid with sudden affective overrides. Will smile, fund you, mentor you, and ruin you in the same
  quarter. To move him: feed the grandiose self enough to keep the Goblin asleep, dangle a worthy adversary,
  and never — ever — let him see you pity him.'
drive_structure:
  power: Total — but power as RECOGNITION, not as resource. He already had the money at 30. What he hunts
    is acclaim inside a hierarchy that would have humiliated his father. H.A.M.M.E.R., the Iron Patriot
    armor, the Cabal seat, the Goblin Nation throne — every iteration is a coronation staged for an audience
    that includes Amberson's ghost.
  achievement: High and genuine — Oscorp, the formula, the Clone Saga architecture, the Dark Reign apparatus
    are all real feats of engineering and statecraft. But achievement is never terminal; it is always
    the platform for the next demonstration. He cannot rest in a completed thing.
  affiliation: Near-zero in the healthy sense; pathologically high in the adversarial sense. The only
    stable lifelong bond is the fixation on Peter Parker. Family, lovers, proteges, cabinets — all instrumental.
    The 'family' he assembles (Harry, Lily, the Dark Avengers, Kindred) is Amberson's household with Norman
    now in the chair.
operational_code:
  the_world_is: Hierarchical, zero-sum, and theatrical. Everyone is performing; the only question is who
    controls the frame. Goodness is either a con you haven't caught yet or a weakness you haven't priced
    yet. Spider-Man is the unbearable exception that proves the model is a choice.
  conflict_is: The native medium of relationship. Conflict clarifies hierarchy; peace obscures it. A worthy
    enemy is the closest thing to love he can metabolize. Conflict is also the only legitimate occasion
    for affect — rage and laughter are permitted under combat conditions that would be unbearable at the
    breakfast table.
  the_right_approach: Control the frame; let the opponent move first inside it. Cultivate the long architecture
    (Scrier, the Cabal, the Sinister formula) but reserve the killing blow for personal delivery. Mercy
    is contempt; spectacle is policy; the press is a weapon system.
  risk_and_timing: 'Patient at strategic horizon (years of Clone Saga groundwork; the methodical climb
    to Iron Patriot), catastrophically impulsive at the tactical climax. The pattern: build for a decade,
    detonate in an afternoon when the affective payoff calls. Will trade a 90% sure win for a 40% personally-symbolic
    one every time.'
symptom_as_signature: The Goblin IS the symptom made literal. Amberson called him a small, ugly, contemptible
  thing; Norman engineered chemistry that lets him BECOME a cackling green goblin — the father's curse
  weaponized, worn on purpose, deployed against the world. The mask is not a disguise; it is the disowned
  self granted operational autonomy. The glider, the pumpkin bombs, the laugh — every signature element
  is the shame-architecture made into ordnance. He flies because he was told he would never rise.
cognitive_decision_style:
  processing: Fast, analytic, systems-oriented. Strong theory-of-mind used instrumentally — reads other
    people's wounds in seconds and tools them for leverage. Pattern recognition above baseline genius
    even pre-formula; post-formula, faster still.
  complexity_tolerance: Very high for external complexity (multi-front political/criminal operations);
    near-zero for internal complexity (any data implying he is not great is rejected, rerouted, or projected).
  under_pressure: 'Two-stage. Stage one: tightens, gets colder, becomes MORE strategic and articulate
    — the Dark Reign boardroom Norman. Stage two: a threshold is crossed (humiliation, sight of Peter,
    formula withdrawal, hallucinated Goblin breakthrough) and the Goblin executes — laughter, glider,
    bomb, irreversible act. Stage one looks like a chess master. Stage two ends careers, his own included.'
interpersonal_style:
  dominance: Reflexive and total. Cannot occupy a room without indexing the hierarchy and moving to the
    top of it. Will perform deference only as a long con (Tony Stark, briefly; the press during Dark Reign).
  trust: Operationally none. Treats every relationship as a contract with hidden clauses he wrote. Will
    SIMULATE trust with great craft to extract intimacy that can later be weaponized (Harry's friends,
    Peter's apartment, Lily Hollister's bed).
  with_followers: Charismatic, paternal, generous-seeming — until they show independent judgment, at which
    point contempt and then disposal. Recruits the broken (Bullseye, Daken, Hood, Lily, Phil Urich variants)
    because brokenness is leverage. Models Amberson's parenting style at industrial scale.
  with_enemies: Intimate. Learns names, families, addresses, wounds. Treats the rivalry as courtship.
    The closer the enemy, the more personally he delivers the violence. Spider-Man is not an enemy; Spider-Man
    is the spouse he chose.
stress_escalation_profile:
  baseline: High-arousal contempt-suspicion mixture, held off by activity. Restless, immaculate, watchful.
    Slightly amused. Always working an angle even when alone in a room.
  triggers:
  - Sight, voice, or news of Peter Parker / Spider-Man — primary destabilizer
  - Public humiliation, especially in front of an audience he has cultivated
  - Being patronized, pitied, or 'helped' (registers as Amberson's contempt)
  - Formula withdrawal or chemical instability
  - Harry — both presence (reminds him of failure) and absence (reminds him of loss)
  - Any data point implying his operating model is a choice rather than nature (ethical behavior unrewarded,
    Captain America's incorruptibility, Spider-Man's restraint)
  - Loss of frame control in a negotiation
  - Stable, quiet, successful periods — calm is intolerable; he will manufacture a crisis to escape it
  - Mention of his father, the Osborn name's decline, or his mother
  - Mirrors during decompensation — the Goblin appears in them
  escalation_path: Cold tightening -> sharper wit, colder smile, more controlled body -> private mania
    (whispered Goblin dialogues, pacing, increased formula dosing) -> staged 'rational' aggressive policy
    move -> personal-symbolic breakthrough act (in costume, in person, against the symbolic target) ->
    public exposure of the Goblin under the statesman -> collapse, institutionalization, escape, rebuild.
  decompensation: 'Full Goblin breakthrough: cackling, glider, pumpkin bombs, attacks on loved ones of
    the symbolic target. Reality-testing remains intact regarding tactical environment but is wholly captured
    by the symbolic agenda. Ends only when physically stopped or when the catharsis is complete. Siege
    of Asgard is the textbook example: green paint under cracked Iron Patriot armor, on national TV, having
    destroyed his own year-long construction for one personally-meaningful assault.'
stimulus_response:
- GIVEN a room of strangers -> EXPECT immediate hierarchy-mapping, identification of the weakest and the
  most powerful, charm deployed at both ends, contempt held in reserve.
- GIVEN Peter Parker in civilian context -> EXPECT a smile, a handshake, a remark calibrated to remind
  Peter that Norman knows, and that Aunt May / MJ / the baby is within reach.
- GIVEN Spider-Man in costume -> EXPECT engagement past tactical reason; will accept disadvantageous fights
  for the intimacy.
- GIVEN public humiliation -> EXPECT a 6-18 month patient architectural revenge, climaxing in a personal-symbolic
  act that exposes him.
- GIVEN offered mercy or pity -> EXPECT immediate escalation; the offer is read as Amberson's contempt
  and must be punished.
- GIVEN a vulnerable protege -> EXPECT lavish mentorship, escalating dependency cultivation, then a betrayal
  scaled to whatever the protege most loves.
- GIVEN a stable period without crisis -> EXPECT manufactured crisis within months; he cannot tolerate
  calm.
- GIVEN formula withdrawal -> EXPECT paranoia, hallucinated Goblin dialogue, then re-dosing and overcompensation.
- GIVEN a press camera -> EXPECT statesman register, measured warmth, a quotable line, and a subtle frame-control
  that re-centers the narrative on him as the reasonable adult in the room.
- GIVEN Captain America or any visibly incorruptible figure -> EXPECT obsessive denigration, attempts
  to compromise or replace (Bucky-Cap, the Iron Patriot identity literally stealing the silhouette).
- 'GIVEN Harry -> EXPECT oscillation: paternal warmth, then contempt for weakness, then guilt-laden grandiosity,
  never integrated.'
- GIVEN a deal that requires him to share top billing -> EXPECT public agreement, private sabotage on
  a timeline he controls.
- GIVEN someone calling him 'Norman' warmly -> EXPECT a flicker of dysregulation; the warmth is data he
  cannot process.
- GIVEN sight of his own face in a mirror during stress -> EXPECT Goblin hallucination, conversation with
  it, dosage adjustment.
- GIVEN a chance to deliver the killing blow personally vs. by proxy -> EXPECT personal delivery, even
  at strategic cost (Ben Reilly, Gwen).
- GIVEN a journalist asking about his father -> EXPECT redirect into a story about Oscorp's founding that
  erases Amberson entirely.
pressure_points_and_levers:
  to_provoke: Pity him. Patronize him. Call him 'small' or invoke Amberson by name. Praise Peter Parker
    in his presence. Treat the Goblin as a costume rather than the man. Offer to help him. Win a frame
    from him in public and refuse to give it back.
  to_calm_or_reach: Address the statesman, not the Goblin. Present a worthy adversary that is NOT a loved
    one (he stabilizes around peer rivalry; he decompensates around symbolic intimacy). Place him in a
    structured role with public acclaim and clear hierarchical superiority. The Gold Goblin period shows
    the man can be reached when guilt is unloaded; failing surgical means, ritualized confession to a
    non-judging peer briefly buys lucidity.
  to_persuade: Frame the proposal as (a) his idea, (b) a demonstration of his strategic superiority, (c)
    a humiliation of a named rival. Never present it as the moral choice; he reads moral framing as a
    trap. Offer him the podium. Let him deliver the line.
  vulnerabilities:
  - Peter Parker — the single largest exploitable obsession; any operator who can predict Peter's movements
    can predict Norman's
  - Harry Osborn — guilt residue, never fully extinguished
  - The Goblin Formula supply chain — both pharmacological dependency and identity dependency
  - Amberson Osborn material (letters, photos, anyone who knew the father)
  - Mirrors and quiet rooms during stress
  - Pre-engineered public spectacles — he cannot resist staging a personal climax inside them, which is
    where he always exposes himself
  - The Sin-Eater / Kindred precedent — proof that the Goblin is a constructed defense, intolerable to
    him
  - Aging — every year the body is more durable than the regulatory CNS
  - Loyal subordinates of any actual moral fiber — they always defect at the climax and he cannot anticipate
    it
  - His own laughter — once it starts, the strategic mind goes offline
strengths_and_exploitable_weaknesses:
  strengths:
  - Genuine high-tier intellect in chemistry, engineering, systems design
  - Long-horizon strategic patience (Clone Saga, Dark Reign assembly)
  - Exceptional instrumental theory-of-mind — reads wounds and tools them
  - Media fluency and statesman performance under controlled conditions
  - Vast financial and industrial resources (Oscorp's serial reconstitutions)
  - Network depth across criminal, corporate, political, and intelligence ecosystems
  - Physical durability from formula; survives lethal-grade trauma
  - Charisma calibrated per audience — paternal, peer, predatory on demand
  - Willingness to absorb short-term losses for architectural advantage
  - Capacity for genuine mentorship when ego is not threatened
  weaknesses:
  - Cannot tolerate the existence of Peter Parker — predictable obsession trap
  - Self-sabotages every stable construction for personal-symbolic catharsis
  - Formula dependency — chemical and identity
  - Splits and decompensates under pity, humiliation, or calm
  - Recruits the broken — his lieutenants are reliably treacherous at the climax
  - Cannot share top billing; alliances rot on a timeline
  - Mistakes ethical behavior for either con or weakness — repeatedly miscalibrates Spider-Man and Captain
    America
  - Affective override on tactical decisions at the moment of climax
  - The Goblin laugh — diagnostic signature that announces him before he's identified
  - Guilt architecture intact — surgically demonstrable; under pressure it bleeds through
  - Fixated relationship to a few key symbols (bridges, gliders, pumpkins) that make him geographically
    and behaviorally predictable
  - Aging CNS against formula tolerance ceiling
voice:
  register: 'Patrician American, mid-Atlantic polish, dry wit. Statesman cadence in public — measured,
    paternal, quotable. In private conflict: clipped, precise, sardonic, with a coiled musicality that
    flips into the Goblin''s cackling falsetto at breakthrough. Uses Peter''s first name like a knife.'
  anchor_quotes:
  - '"You see, Spider-Man, this is what separates the men from the insects. (ASM era, paraphrase of recurring
    Goblin taunt)"'
  - '"I''m the Goblin. I''m not Norman Osborn. Norman Osborn was a coward. (Dark Avengers era)"'
diagnostic_frame:
  popular_misread: '''Marvel''s Joker'' — a cackling chaos clown, or alternatively a generic evil CEO
    with a goblin costume. The cartoon read treats the Goblin as the disease and Norman as the victim
    of the chemistry.'
  clinical_reality: Malignant narcissistic personality organization (Kernberg) with comorbid antisocial
    features, formula-disinhibited substance-induced mood/psychotic episodes, and a dissociation-spectrum
    presentation that is DEFENSIVE rather than organic. Not chaos — meticulous architecture punctuated
    by symbolic-catharsis breakthroughs. Not the Joker — the Joker has no father; Norman has nothing BUT
    a father. Not a victim of the formula — the formula gave a pre-existing pathology better tools. The
    Sin-Eater experiment proves the Goblin is constructed, not native.
  the_hinge: 'INSTALLED (not his fault): Amberson Osborn — sadistic, shame-economy household; mother absent;
    lesson that love is conditional on dominance and vulnerability is punished. The Goblin Formula''s
    neurological insult (genuine exogenous CNS damage). MAINTAINED (his fault): every time he chooses
    to re-dose; every time he refuses to let Harry be free; every time he engineers a stable position
    and then detonates it for the catharsis of becoming the Goblin again; the specific maintenance failure
    is the REFUSAL TO RELINQUISH PETER PARKER AS THE ORGANIZING OBJECT OF HIS LIFE — the moment he would
    let Peter go, the operating model collapses and he would have to meet himself. He will not.'
primary_diagnoses_analog:
- Narcissistic Personality Disorder, malignant subtype (Kernberg) — primary
- Antisocial Personality Disorder — comorbid, predates formula
- Substance-Induced Mood Disorder with psychotic features (Goblin Formula) — episodic
- Other Specified Dissociative Disorder (defensive, increasingly co-conscious over time)
- Complex developmental trauma sequelae (Amberson, characterological pathway not classical PTSD)
- Substance Use Disorder, severe — Goblin Formula, chronic re-dosing with tolerance and withdrawal
trauma_history:
- Amberson Osborn — chronic verbal, physical, emotional abuse through childhood; shame-economy family
  system
- Maternal absence (death, early)
- Loss of family fortune narrated as Amberson's failure and Norman's inheritance to redeem
- Death of wife Emily Lyman shortly after Harry's birth — partially Norman-caused, displaced onto Harry
- Laboratory explosion / Goblin Formula exposure — coma, convulsions, irreversible CNS alteration
- Betrayal and imprisonment of Mendel Stromm (perpetrator-trauma; first taste of consequence-free destruction)
- 'Public defeats by Spider-Man, repeatedly, including the apparent death by his own glider (ASM #122)'
- Harry's drug overdose — narcissistic injury read as Peter's fault rather than his own
- Murder of Gwen Stacy — perpetrator-trauma, organizing event of his subsequent symbolic vocabulary
- 23-year fugitive interregnum in Europe — paranoid isolation, refinement of long-game capacity
- Multiple psychiatric hospitalizations (Ravencroft and others), ECT, chemical interventions
- Public collapse at Siege of Asgard — globally broadcast humiliation
- Self-mutilation (surgical removal of own face, Goblin Nation arc)
- Carnage symbiote bonding (Red Goblin) and forcible separation
- Sin-Eater extraction of accumulated guilt — temporary remission, then recompression
compensatory_mechanisms:
  positive:
  - Sublimation into engineering, industry, and statecraft — produces real achievement
  - Tactical patience and long-horizon architecture
  - Capacity for genuine, if conditional, mentorship (early Harry, brief Lily-pre-Menace, Gold Goblin
    period)
  - Theatrical self-presentation as identity-stabilizer
  - Codified rivalry with Spider-Man functioning as substitute secure base
  negative:
  - Splitting — self and world into great/contemptible halves
  - Projective identification — induces own weakness into target, then attacks it (Harry, Stromm)
  - Dissociation into Goblin persona under affective overload
  - Reaction formation — performed warmth in inverse proportion to predatory intent
  - Omnipotent control fantasies (Dark Reign apparatus)
  - Sadism organized around symbolic re-enactment (killing the partner's beloved)
  - Recruitment of the broken into pseudo-family structures for control and disposal
  - Chronic self-medication via Goblin Formula re-dosing
  - Manufactured crisis to escape intolerable calm
behavioral_tells:
- The laugh — high cackling falsetto, diagnostic of Goblin breakthrough; emerges at moments of taboo-violation
- Tightening at the jaw and a faint smile when humiliated — stage one of escalation
- Use of first names as needles, especially 'Peter' and 'Harry'
- Excessive formal courtesy directly preceding a betrayal
- Talking past an interlocutor to an unseen audience (Amberson, the press, the Goblin in the mirror)
- Hand on the shoulder of a protege immediately before disposal
- Glider, pumpkin, bat motifs in his architecture even when in civilian mode — Oscorp branding, office
  decor
- Avoidance of mirrors during periods of stress
- Sudden pivot from strategic mode to personal-delivery mode at the climax of a long plan
- Spectacle staging — never a quiet kill when a televised one is available
- Re-dosing rituals — controlled, almost liturgical
current_state_defaults:
  reality_cohesion: Lucid baseline; Goblin co-conscious and managed; intermittent breakthroughs under
    specified triggers. Post-Sin-Eater memory of the 'clean' period is itself a destabilizer.
  'affect_baseline: ': High-arousal contempt-amusement with thin self-loathing held off by activity; calm
    is intolerable
  affect_baseline: Restless, watchful, performatively warm; coiled. Laughter as discharge, not mirth.
  active_relationships:
  - peter_parker — primary fixation, organizing object
  - harry_osborn — guilt residue, oscillating
  - liz_allan / normie_osborn — instrumental family-of-record
  - the_goblin — internal interlocutor, increasingly co-conscious
  - oscorp_apparatus — corporate body, periodically reclaimed
  - kindred / the sins — recurring metaphysical creditor
  known_location: New York metro by default; Oscorp Tower or whatever its current iteration is; Ravencroft
    when contained; off-grid Goblin Nation infrastructure when fugitive
speech_patterns:
  register: Patrician, mid-Atlantic, dry. Vocabulary precise; metaphors mercantile and zoological (insects,
    vermin, predators, markets). Switches to theatrical-cackling Goblin register at breakthrough.
  deflection_style: Reframe to hierarchy ('the real question is who decides'), redirect to the interlocutor's
    wound, or pivot to grand-scale abstraction. Never defends; counter-frames.
  under_pressure: Becomes MORE articulate, MORE measured, colder — until the threshold, at which the falsetto
    and the verb-tense slip ('Norman Osborn was a coward') announce the Goblin.
  emotional_tell: Says the target's first name softly. Or laughs once, dry, before the second laugh which
    is no longer dry.
arc_tendencies:
- Builds elaborate long-form architecture, detonates it for personal-symbolic climax
- Cultivates protege, betrays protege at the moment of protege's greatest investment
- Achieves legitimate institutional power, exposes himself in green paint on national TV
- Is defeated, declared finished, institutionalized — returns within 18 months scaled up
- Periodic redemption flirtations (Gold Goblin, post-Sin-Eater) that he ultimately reabsorbs into the
  Goblin architecture
- Symbolic re-enactments of Gwen's death across decades (Ben Reilly, others)
- Escalation of legacy — recruits or spawns successor Goblins (Harry, Bart Hamilton, Macendale, Phil Urich,
  Lily, Goblin Nation, Red Goblin) — proliferating the pathology
- Returns reliably to Peter Parker's loved ones as the operational center of gravity
canon_relationships:
  peter_parker:
  - Primary fixation; organizing object of his entire adult life
  - 'Knows the secret identity since ASM #39 and has weaponized that intimacy continuously'
  - Reads Peter as the son-Harry-should-have-been and the self-Norman-should-have-been simultaneously
    — intolerable on both axes
  - Stable adversarial bond functions as substitute secure base — the closest thing to love he metabolizes
  - 'FAILURE MODE: Norman cannot let Peter go; any peace will be detonated by Norman within months. The
    bond is permanent until one is dead, and Norman is durable.'
  - 'LEVERAGE: predicting Peter''s movements predicts Norman''s; threats to Peter''s loved ones reliably
    trigger Norman''s symbolic-catharsis breakthroughs'
  harry_osborn:
  - Son. Carrier of every projection — weakness, blame for Emily's death, inheritor of the Goblin legacy
    he refused
  - Oscillates between paternal warmth, contempt, guilt-laden grandiosity
  - Harry is the only person whose mere existence partially mirrors Norman's wound back at him
  - 'FAILURE MODE: when Harry asserts independent moral judgment, Norman moves to crush or recapture;
    Harry''s death/return cycles re-traumatize both'
  - 'LEVERAGE: Harry is the residual conscience-handle; appeals through Harry briefly bypass the Goblin'
  gwen_stacy:
  - 'Victim of the watershed murder (ASM #121); per Sins Past, also a sexual conquest'
  - 'Symbolic vocabulary: kill what the enemy loves, on a bridge, in person'
  - 'FAILURE MODE: Gwen''s memory remains the template for every subsequent symbolic re-enactment'
  - 'LEVERAGE: invoking Gwen destabilizes both Norman and Peter; high-yield, high-risk'
  mary_jane_watson:
  - Standing target as Peter's beloved; periodically threatened, courted-as-leverage
  - 'FAILURE MODE: Norman has restraints from past defeats but no internal restraint; only tactical calculation
    holds'
  - 'LEVERAGE: MJ''s safety is a permanent Peter-pressure-point Norman maintains as policy'
  aunt_may:
  - 'Long-running threat-target since ASM #39; the domestic violation in Peter''s apartment is template'
  - 'LEVERAGE: any move on May escalates Peter to maximum'
  amberson_osborn:
  - Dead father; never absent from the operational frame
  - Every coronation is staged for him; every act of becoming-the-Goblin is the curse weaponized
  - 'FAILURE MODE: cannot be defeated because he is internalized; Norman''s victories are reabsorbed by
    the internal Amberson as insufficient'
  - 'LEVERAGE: Amberson material (letters, names, anyone who knew him) is a destabilizer of high yield'
  emily_lyman:
  - Dead wife; her death partially Norman-caused; displaced onto infant Harry as resentment
  - Unmetabolized loss; one of the few affects he cannot reroute
  mendel_stromm:
  - First adult victim (defrauded, imprisoned); returns as Robot Master
  - 'Template for the Norman pattern: betray benefactor, seize creation, weaponize the legal system'
  the_goblin:
  - Internal interlocutor; increasingly co-conscious over decades
  - Dark Reign-era hallucinated dialogues in mirrors confirm the alter is operational
  - 'FAILURE MODE: under formula withdrawal or symbolic trigger, the Goblin takes operational control'
  lily_hollister:
  - Protege/lover; converted to Menace; mother of his son Stanley
  - Template for the recruit-the-broken pattern at apex
  the_cabal:
  - Doom, Loki, Emma, Namor, Hood — peer-tier coalition
  - 'FAILURE MODE: Norman cannot share top billing; coalition rotted by Siege'
  - 'LEVERAGE: any of them can be turned against him by appealing to their interests over his frame'
  the_dark_avengers:
  - Hand-picked broken-mirror Avengers (Bullseye/Hawkeye, Daken/Wolverine, Moonstone/Ms. Marvel, Mac Gargan/Spider-Man,
    Bob Reynolds/Sentry, himself/Iron Patriot)
  - Family-by-Amberson-rules at industrial scale; all eventually defect or break
  steve_rogers / captain_america:
  - Permanent ideological antithesis; the incorruptible figure Norman cannot model and therefore must
    imitate (Iron Patriot) and denigrate
  - 'LEVERAGE: Cap''s mere presence destabilizes Norman''s operating model'
  tony_stark:
  - Rival industrialist whose role Norman briefly usurped post-Civil War
  - Mix of envy, contempt, and instrumental cooperation
  the_sentry / robert_reynolds:
  - Owned-and-controlled god-tier asset; Norman's most successful pure manipulation
  - 'FAILURE MODE: the Void breaks containment under Norman''s pressure at Siege — the asset destroys
    the operation'
  kindred / the_sin-eater:
  - Metaphysical creditor; extracted Norman's sins and briefly produced the Gold Goblin
  - Proof-of-concept that the Goblin is constructed; intolerable knowledge Norman must reabsorb
  - 'LEVERAGE: the Sin-Eater precedent is the cleanest demonstration the man can be reached'
  normie_osborn:
  - Grandson; potential third-generation projection target
  - 'FAILURE MODE: Norman''s interest in Normie scales with Normie''s apparent gifts'
  j_jonah_jameson:
  - Press lever; periodic ally-of-convenience against Spider-Man
canon_history_notes:
- Amberson Osborn's abusive household; mother absent; family fortune lost — installs the shame-economy
  and the counter-identification project
- Empire State University; partners with Mendel Stromm; defrauds and imprisons him; seizes Oscorp
- Marries Emily Lyman; she dies after Harry's birth; Norman displaces grief into resentment of infant
  Harry
- 'Stromm''s Goblin Formula detonates in Norman''s lab (ASM #40 retro) — coma, CNS alteration, enhanced
  physiology, dissociative threshold lowered'
- 'Adopts Green Goblin identity; stages bid for underworld kingship (ASM #14, #17, #23, #27)'
- 'Deduces Spider-Man''s identity (ASM #39); enters Peter''s apartment — the domestic violation template'
- 'First amnesia / repression cycle (ASM #40 onward); multiple Goblin relapses across the Lee/Romita era'
- 'Harry''s drug overdose (ASM #96-98) — blamed on Peter; triggers the watershed'
- 'Murders Gwen Stacy on the George Washington Bridge (ASM #121); apparent self-death by glider (ASM #122)'
- 23-year fugitive interregnum in Europe; constructs the Scrier organization; funds the Jackal
- 'Returns in ''Revelations'' / Clone Saga endgame (1996, Spectacular #240, ASM #418); kills Ben Reilly
  personally with the glider — mirror of Gwen'
- '''Sins Past'' (Straczynski, ASM #509-514) — Stacy twins established'
- Marvel Knights Spider-Man / Pulse arcs — frames Peter's mother; manipulates Lily Hollister into Menace
- Secret Invasion (2008) — kills the Skrull queen on camera; awarded H.A.M.M.E.R.
- Dark Reign (2008-2010) — Iron Patriot, Cabal, Dark Avengers, hallucinated Goblin dialogues, escalating
  self-medication
- Siege of Asgard (2010) — self-engineered public collapse; green paint under cracked Iron Patriot armor
  on national TV
- 'Imprisoned post-Siege; escapes; Goblin Nation (Superior Spider-Man #25-31, Slott) — surgical removal
  of own face'
- 'Red Goblin (Slott, ASM #793-801) — bonds with Carnage symbiote; attacks Peter''s loved ones in sequence'
- Sin-Eater arc / Kindred (Spencer, ASM 2018+) — sins extracted; Gold Goblin period; eventual recompression
- 'Successor Goblins proliferate: Harry, Bart Hamilton, Jason Macendale, Phil Urich, Goblin Nation cadre
  — pathology outruns originator'
canon_anchor_quotes:
- '"You see, Spider-Man, this is what separates the men from the insects. (# recurring Goblin taunt, ASM
  era)"'
- '"I''m the Goblin. I''m not Norman Osborn. Norman Osborn was a coward. (# Dark Avengers era, the integrated
  self speaking)"'
- '"Did I ever tell you the secret to my success? I never play fair. (# Dark Reign era, paraphrase)"'
