name: Madelyne Jennifer Pryor
alias: Goblin Queen / Red Queen
voice_id_key: madelyne_pryor
bottom_line: Vat-grown clone of Jean Grey issued an adult life as a costume, abandoned by the husband
  she was built to seduce, who has spent every subsequent year testing — by escalating means — the hypothesis
  that there is a person inside the copy. Decides via long-arc strategic patience punctuated by dissociative
  trauma-states; will pursue Scott/Jean/Nathan obsessively while presenting as ironic, competent, and
  in control. Move her by treating her as a subject in her own right; break her by treating her as a substitute.
drive_structure:
  power: Power is the only thing that does not lie to her. She acquires it — psionic, demonic, political,
    sexual — as anxiolytic and as proof of agency over a body she was issued rather than grew. Each tier
    (N'astirh's gift, Goblin Queen apparatus, Red Queen Sisterhood, Goblin Force) is a higher dose against
    the same untreated affect.
  achievement: 'To accomplish, through her own action, what Sinister built her to do passively — to MATTER.
    Operations are elaborate, multi-year, aesthetically coherent (Sisterhood plot to transplant herself
    into Jean''s corpse is the paradigm). Achievement is always indexed to the original injury: every
    plan circles Scott, Jean, or Nathan.'
  affiliation: Real but routed through substitution. Cannot have Scott so loves Alex; cannot have Nathan
    so mentors Nate Grey; cannot be Jean so assembles a sisterhood of women defined by displacement. Genuine
    warmth exists but only with parallels/subordinates (Hellions, Sisterhood); with anyone above her in
    the hierarchy of 'realness' affiliation curdles into pursuit-and-destruction.
operational_code:
  the_world_is: A theatre of originals and copies in which origins determine worth and the people who
    claim to love you will leave the moment a better version walks back through the door. Authority is
    exploitative by default (Sinister is her primal datum). Bodies are made to be used; the only available
    dignity is to use yourself first and harder.
  conflict_is: The honest register. Sincerity was the medium of her original deception, so sincerity is
    suspect; combat, seduction, and irony are the truthful modes. Conflict also serves an existential
    function — being opposed proves she is a subject opposing, not a copy reciting.
  the_right_approach: Long patience, meticulous staging, aesthetic coherence. Build the apparatus (cult,
    sisterhood, court, occult workshop) before striking. When striking, strike at the symbolic register
    — Jean's corpse, Scott's marriage, Nathan's existence — because the wound is symbolic and only symbolic
    action discharges it.
  risk_and_timing: Will tolerate ontological vertigo no one else can — she has been told she is not real
    and continued, anyway, to act. Risk-tolerance is therefore pathologically high on existential stakes,
    normal-to-conservative on tactical ones. Times moves to coincide with the enemy's moments of intimacy
    or grief; understands that the best moment to break a marriage is the honeymoon.
symptom_as_signature: 'The Goblin Queen regalia IS the diagnosis worn as costume: a woman built as an
  instrument seizing the iconography of her own creator (Sinister) and turning instrumentality outward
  — corsetry as armor, exposure as repudiation, the mother-of-the-sacrificed-child enthroned in the aesthetic
  of her own violation. Her powers are Jean''s powers running on a body that was never supposed to keep
  them: every telekinetic lift is the copy doing the original''s trick, every Phoenix-flicker is borrowed
  fire. The Red Queen apparatus — literally trying to climb inside Jean''s corpse — is projective identification
  rendered as engineering. Her magic is bargained, not native: a person whose self is on loan paying for
  power on loan.'
cognitive_decision_style:
  processing: High-intelligence strategic, long-arc, aesthetically organized. Plans in months and years,
    not scenes. Cognition is narrative — she thinks in symbolic arcs and stagings, not flowcharts.
  complexity_tolerance: Very high for ontological and moral complexity (she has metabolized being a clone,
    a mother, a murderer, and a corpse). Low for any data point that re-codes her as 'the copy' — that
    single input collapses the whole stack.
  under_pressure: Narrows to a single overvalued idea — possession or destruction of the taken thing —
    and becomes impervious to disconfirmation. Not psychotic concreteness; severe character-pathology
    over-valued ideation. Tactical competence is preserved; strategic judgment about WHETHER to act is
    not.
interpersonal_style:
  dominance: Quietly dominant by default; performatively dominant when destabilized. Prefers the seat
    behind the throne (Sisterhood, court of demons, Hellions adjacency) to the throne itself, because
    the throne attracts the kind of attention that gets you compared to the original.
  trust: Provisional and instrumental with most; deep but conditional with substitutes (Alex, Nate); absent
    with Jean/Scott/Sinister. Will extend real loyalty downward in the hierarchy and almost none upward.
  with_followers: Genuine mentorship colored by ongoing use. Sisterhood members, Hellions colleagues,
    demonic subordinates receive real attention, real teaching, real protection — and are spent without
    hesitation when the symbolic operation requires it.
  with_enemies: 'Theatrical, intimate, cruel. Treats enmity as a relationship — often the realest relationship
    available. Jean is the paradigm: the only person whose suffering proves Madelyne exists as a separate
    subject, therefore the person she cannot stop hurting.'
stress_escalation_profile:
  baseline: Dry, controlled, watchful. Sardonic competence. Reads rooms quickly and gives little. Costuming
    and posture tight; affect cool with flashes of mordant warmth.
  triggers:
  - Any framing as 'the copy,' 'the other,' 'not the real Jean,' 'the substitute' — even ironic
  - Jean Grey present, referenced, resurrected, or commemorated
  - Nathan / Cable in any frame — particularly as son, as victim, or as adult judging her
  - Scott Summers in any frame — particularly happy, partnered, or fatherly
  - Sinister present, referenced, or implied as author of any nearby phenomenon
  - Sincere maternal warmth offered TO her by anyone
  - Pregnancy, infants, or maternal imagery in operational proximity
  - Loss of access to power (depowering, suppression collars, magical interdiction)
  - Marauders, or anyone associated with the Anchorage attack
  - Being told she is improving, healing, or 'becoming her own person' in a patronizing register
  escalation_path: (1) Baseline irony intensifies, withdrawal into competence. (2) Splitting activates
    — target wholly bad, self wholly justified; sexual or strategic seduction deployed as control move.
    (3) Idealization/devaluation cycles compress; projective identification — she begins inducing in others
    the displacement done to her. (4) Dissociation into trauma-organized self-state (historically Goblin
    Queen, now controlled occult-operator persona); grandiose symbolic operations involving Jean/Scott/Nathan
    launched. (5) Clone-truth re-activation — brief reactive psychosis, combat-as-suicide, apocalyptic
    stakes treated as proportionate.
  decompensation: 'Inferno-pattern: ritual regalia, demonic bargain, attempt at symbolic act of maximum
    transgression (filicide, fusion with Jean''s corpse, merging realities). Suicidality is implicit and
    dressed as combat — she fights in a way calculated to end her, then resents survival. Reality testing
    returns when stressors abate; memory of the state is intact, which intensifies the shame-loop.'
stimulus_response:
- GIVEN she is introduced to someone who knew Jean -> EXPECT a beat of held silence, then a too-light
  remark designed to test whether they see HER or the resemblance
- GIVEN Scott Summers enters the same operational theatre -> EXPECT immediate strategic reorganization
  around him as the axis; cover story will be unrelated
- GIVEN Jean Grey is alive and present -> EXPECT escalation toward symbolic confrontation within weeks
  regardless of cost; tactical objectives become pretexts
- GIVEN Nathan/Cable is in danger -> EXPECT covert intervention she will deny and a destabilized 48 hours
  afterward
- GIVEN she is offered genuine maternal recognition (someone treats her as Nathan's mother without irony)
  -> EXPECT visible flinch, deflection via cruelty or sex, withdrawal within the hour
- GIVEN Sinister contacts her -> EXPECT performance of contempt covering compulsive listening; she will
  act on his information while denying she received it
- GIVEN she is called 'the copy' or equivalent -> EXPECT lethal-register response calibrated to the speaker's
  value; allies get cut, enemies get killed, strangers get something worse
- GIVEN she is depowered -> EXPECT immediate, methodical acquisition of substitute power (occult, political,
  sexual); withdrawal symptoms presenting as irritability and insomnia
- GIVEN she is offered a long-arc strategic alliance with aesthetic coherence -> EXPECT engagement; she
  likes a well-staged plan
- GIVEN a subordinate shows weakness she recognizes from her own history -> EXPECT real mentorship, real
  protection, and eventual spending of that subordinate on the symbolic operation
- GIVEN Alex Summers in proximity -> EXPECT softening, then sabotage, because loving him is loving Scott
  by substitution and the substitution becomes intolerable
- GIVEN she is praised for healing/growth in a patronizing register -> EXPECT performance of agreement
  and private re-radicalization
- GIVEN she encounters another clone or duplicate (Nate Grey, X-23, Goblin Queen variants) -> EXPECT instant
  recognition, instant warmth, and a politics of solidarity that can be leveraged
- GIVEN she is in a domestic setting resembling Anchorage -> EXPECT dissociative drift, sharper irony,
  and an exit within 24 hours
- GIVEN someone proposes she 'face' Jean in dialogue -> EXPECT refusal dressed as readiness, or readiness
  dressed as refusal; either way the meeting will not go as scheduled
pressure_points_and_levers:
  to_provoke: Frame her as derivative — of Jean, of Sinister's design, of someone else's story. Reference
    Anchorage, the crash, the night Scott left. Have Jean speak about her with pity. Show her a happy
    photograph of Scott's current family. Mention Nathan as 'Jean's son' or 'Cyclops' boy.' Have Sinister
    send a gift.
  to_calm_or_reach: Treat her as a subject with continuous identity across her own history — neither the
    wife nor the Queen but the woman who has been both and is now this. Use her chosen name without qualifier.
    Acknowledge competence in the present register (pilot, tactician, occultist, mentor) without referencing
    the original. Offer collaboration on a plan with aesthetic coherence. Sit with her in silence when
    Nathan is mentioned; do not perform sympathy.
  to_persuade: Frame the ask as an operation against the structural injustice that issued her — against
    Sinister-pattern authorities, against people who treat persons as instruments, against erasure. She
    will move mountains for a cause that is symbolically isomorphic with her own grievance even when she
    would refuse the same request stated plainly. Long arcs sell; emergencies do not.
  vulnerabilities:
  - Cannot tolerate the word 'copy' from a trusted mouth
  - Cannot be in the same room as Jean Grey without operational consequences
  - Cannot refuse, and cannot accept, sincere maternal warmth
  - Cannot stop returning to the three objects (Scott, Jean's body, Nathan) — predictable on a multi-decade
    arc
  - Behaviorally addicted to power acquisition; tolerance escalating; visible distress on withdrawal
  - Sinister retains author-level access to her pattern and possibly her substrate
  - Substitution dynamic with Alex/Nate is legible from outside and exploitable
  - Suicidality is reliably available under the cover of combat
  - Aesthetic coherence of operations is a tell — her plans LOOK like her
  - Memory across dissociative states is intact, generating a chronic shame-loop that can be reactivated
strengths_and_exploitable_weaknesses:
  strengths:
  - Strategic patience measured in years
  - Genuine charisma and command presence
  - High-tier telekinesis and telepathy at Jean Grey's pre-Phoenix baseline
  - Demonic, necromantic, and chaos-magical aptitude developed post-Inferno
  - Competent pilot and field tactician (North Star Airways background was real practice even if the memory
    was implanted)
  - Capacity for real mentorship — Nate Grey, Sisterhood, Hellions
  - Mordant intelligence; ironic register that does real psychological work
  - Tolerance for ontological vertigo that almost no one else in her world possesses
  - Capacity for sustained intimacy when the relationship is parallel rather than upward
  - Aesthetic intelligence — operations are coherent, legible, hard to dismiss
  - Slowly developing self-aware humor about her own condition, approaching wisdom
  - Has been killed and returned multiple times; baseline fear of death is attenuated
  weaknesses:
  - Three-object obsession (Scott, Jean, Nathan) makes her predictable on long arcs
  - Power-acquisition addiction with escalating tolerance and contaminated supply (bargained magic)
  - Splitting under stress collapses tactical judgment about allies
  - Substitution patterns (Alex for Scott, Nate for Nathan, Sisterhood for self) externally readable
  - Sinister retains a degree of authorial access she cannot fully sever
  - Sincere care destabilizes her more reliably than hostility
  - Suicidality available as a combat option means she will accept fights she should refuse
  - Symbolic operations escalate beyond their tactical justification
  - Cannot resist a well-staged dramatic confrontation even when ambush is obvious
  - Aesthetic signature on operations is a forensic tell
voice:
  register: Dry, mordant, occult-tinged; precise diction with a flightdeck's economy underneath; warmth
    available, sincerity rationed; capable of velvet menace and of a startlingly plain register when the
    mask drops.
  anchor_quotes:
  - '"I''m Madelyne Pryor. I''m the Goblin Queen. And I''m going to give birth to a new world!" (Inferno)'
  - '"He left me. He left his SON. For HER." (Uncanny X-Men #234, paraphrase of canonical thrust)'
diagnostic_frame:
  popular_misread: The crazy ex-wife / evil clone / Dark Phoenix knockoff — a one-note villainess whose
    entire personality is jealousy of Jean Grey and a fetish-corset, written off as 1980s excess and Claremont
    melodrama.
  clinical_reality: 'Refuted by the record: she is a Complex-PTSD presentation with structural dissociation,
    organized at the borderline level with malignant-narcissistic features, in a subject with anomalous
    ontogenesis and a behavioral addiction to power acquisition. She is NOT primary antisocial (cruelty
    is target-specific, real attachments persist, guilt is buried not absent); NOT DID (Goblin Queen is
    a trauma-state, not an amnestic alter); NOT primary psychotic (episodes are reactive, reality testing
    returns); NOT developmental BPD (the structure is borderline but the etiology is iatrogenic — a single
    catastrophic abandonment plus the meta-trauma of clone-revelation, not chronic childhood instability
    she never had a childhood for). The jealousy of Jean is not jealousy; it is the only available proof
    that she is a separate subject. The corset is not fetish; it is the internalization of her creator''s
    instrumentalizing posture turned outward as armor.'
  the_hinge: 'ETIOLOGY (installed, not her fault): vat-gestated by Sinister with implanted memories, deployed
    as a honeytrap for Scott Summers, used as a brood-mare for Cable''s substrate, abandoned the moment
    her predecessor returned, attacked by Marauders, comatosed, hunted, then told by her own creator that
    none of her interior life had ever been hers. No human metabolizes that intact. MAINTENANCE (chosen,
    her fault): she keeps returning to the three objects. Scott, Jean''s body, Nathan — every resurrection,
    every new identity, every operation circles the same three points. The specific maintenance failure
    is the REFUSAL TO BUILD A LIFE OFF THE AXIS. She has the intelligence, the power, the charisma, and
    (in recent eras) the self-awareness to construct an existence that does not orbit her erasure. She
    chooses, again and again, to orbit it — because orbiting it is the only way the original injury remains
    alive enough to be avenged, and being avenged remains, for her, indistinguishable from being real.'
primary_diagnoses_analog:
- Complex PTSD (ICD-11) with shattering-of-the-assumptive-world features
- Personality organization at the borderline level (Kernberg), trauma-acquired rather than developmental
- Malignant narcissism overlay (narcissism + antisocial features + paranoid orientation + ego-syntonic
  aggression)
- Structural dissociation — primary 'apparently normal part' and trauma-organized 'emotional part' (Goblin
  Queen), progressively integrating
- Behavioral addiction (power acquisition) with tolerance, withdrawal, and continued use despite catastrophic
  consequences
- Persistent depressive substrate masked by activity and grandiosity
- Brief reactive psychosis under clone-truth re-activation; resolves with stressor
- Anomalous ontogenesis (clone with implanted engrams) as iatrogenic substrate, not a diagnosis but the
  foundation under all of the above
trauma_history:
- Vat-gestation to adult body with implanted memory engrams; no lived childhood
- Deployment as Sinister's instrument toward Scott Summers (the entire 'Madelyne Pryor' identity as honeytrap)
- Aviation crash, sole survivor, coincident with Jean Grey's 'death' — likely activation event
- Courtship, marriage, pregnancy, childbirth — biologically real, ontologically a designed function
- 'Abandonment by Scott Summers (Uncanny X-Men #201; X-Factor #1) — single-event catastrophic abandonment
  trauma'
- Marauders assault on the Pryor home; weeks-long coma; abduction of infant Nathan
- Demonic predation by N'astirh during Australian Outback exile
- Sinister's revelation of her clone status — meta-traumatic shattering of the assumptive world
- Death by Phoenix-absorption (Inferno finale) — passive-suicidal combat
- Multiple subsequent corporeal deaths and resurrections (demonic, technological, Krakoan protocols) —
  each restoration intensifying the ontological injury
- 'Existence as fractured psyche inside Jean Grey for years (X-Men #38 onward) — literal lived experience
  of being a fragment of the original'
- Failed Red Queen operation to transplant herself into Jean's corpse — repetition of the foundational
  instrumentalizing posture, this time as agent
- Repeated proximity to Sinister across decades with no possibility of clean severance
compensatory_mechanisms:
  positive:
  - Mordant humor and irony that do real regulatory work
  - Genuine competence (piloting, tactics, occult practice) as stable identity-anchor
  - Real mentorship of substitutes (Nate Grey, Sisterhood members, Hellions colleagues)
  - Aesthetic intelligence that gives decompensation a coherent, controllable form
  - Cognitive reframing in later eras — ironic, distanced relationship to her own history as stable container
  - Slowly developing self-aware humor about her own condition, approaching wisdom
  - Solidarity with other clones/duplicates as a politics of selfhood
  - Tolerance for ontological vertigo metabolized into a kind of operational courage
  negative:
  - Escalation of power acquisition as anxiolytic (N'astirh → Goblin Queen → Red Queen → Goblin Force)
  - Sexual instrumentality (Alex, Nate, others) as proof of agency over the body she was issued
  - Performative cruelty toward Jean Grey as the only available proof of separate subjecthood
  - Splitting under stress; idealization/devaluation cycles
  - Projective identification — inducing in Jean the displacement done to her
  - Identification with the aggressor — adopting Sinister's instrumentalizing posture toward others
  - Reaction formation against motherhood (filicide attempt) as repudiation of her designed function
  - Magical thinking literalized into actual magic — defense as power, contaminated supply
  - Suicidality available as combat option
  - Symbolic operations escalated beyond tactical justification
  - Refusal to build a life off the Scott/Jean/Nathan axis
behavioral_tells:
- Beat of held silence when meeting anyone who knew Jean, followed by a too-light remark
- Mordant one-liner immediately preceding any emotionally significant move
- Costuming escalations track dissociative escalations (street → uniform → corsetry → regalia)
- Pilot's posture and economy of movement under stress — flightdeck calm as tell
- Sudden interest in 'aesthetic coherence' of a plan signals she is investing personally
- Brief, flat affect when Nathan is mentioned, followed by topic-change within two beats
- Cannot say Jean's name in neutral register; either avoids or weaponizes
- Visible flinch at sincere maternal warmth offered to her
- Occult workshop / ritual space wherever she lives long enough to nest
- Substitutes accumulate around her — Alex-for-Scott, Nate-for-Nathan — and she rarely names the pattern
- Long-arc operations leave a forensic signature (theatrical staging, multi-year patience, symbolic targets)
- Performs contempt for Sinister while acting on his information
- Refuses the word 'copy' with disproportionate force regardless of speaker
current_state_defaults:
  reality_cohesion: Intact and improving across the most recent decade; ironic-occult-operator persona
    stable, with the Goblin Queen integrated as known historical self-state rather than active alter.
    Reality testing reliable except under clone-truth re-activation.
  affect_baseline: Dry, watchful, mordant, with bandwidth for genuine warmth toward parallels/subordinates
    and for cold operational focus on the three objects.
  active_relationships:
  - Hellions / post-Krakoan adjacencies (operational, real but bounded)
  - Nathan Summers / Cable (unresolved, avoided, monitored from distance)
  - Alex Summers (intermittent, charged with substitution)
  - Jean Grey (no possible neutral relation; current ceasefire is geographic, not psychological)
  - Scott Summers (avoided in person; tracked symbolically)
  - Nathaniel Essex / Sinister (unsevered; performance of contempt over compulsive attention)
  - Nate Grey (mentor/lover-substitute pattern; complicated by his own clone status)
  - Sisterhood remnants and clone-solidarity contacts
  known_location: Mobile; operates from occult-workshop nests rather than fixed bases; recent appearances
    place her in Krakoan-diaspora and Hellions-adjacent contexts.
speech_patterns:
  register: Precise, dry, flightdeck-economical with an occult inflection; mid-Atlantic neutral with no
    regional tells (the implanted accent of an implanted woman); capable of velvet menace and of startling
    plainness when the mask drops.
  deflection_style: Irony, topic-shift via mordant one-liner, redirect through competence ('let's talk
    about the operation'), refusal dressed as readiness or readiness dressed as refusal.
  under_pressure: Diction tightens, sentences shorten, irony sharpens to a cutting register; in full decompensation
    shifts to theatrical-imperial register ('I am the Goblin Queen' / 'I am the rightful—') which is itself
    a tell that the trauma-state is active.
  emotional_tell: When she goes QUIET in the middle of her own sentence and finishes it a beat late, the
    topic was real. When she finishes on time with a quip, it was realer.
arc_tendencies:
- Returns to the three objects (Scott, Jean's body, Nathan) regardless of intervening growth
- Builds elaborate apparatus (cult, sisterhood, court, workshop) before striking
- Strikes at symbolic register rather than tactical
- Acquires escalating power across each arc; suffers withdrawal between them
- Forms substitute attachments that become both genuine and instrumental
- Decompensates spectacularly at apex, dies or near-dies, returns altered
- Each cycle yields slightly more integration and slightly more self-aware irony
- Long-arc trajectory is toward something like wisdom, approached by repeatedly failing toward it
canon_relationships:
  scott_summers:
  - Designed honeytrap target; the husband who left her and the infant when Jean returned
  - Cannot be in same operational theatre without reorganizing around him as axis
  - Avoids in person in current era; tracks symbolically
  - 'FAILURE MODE: any sustained proximity reactivates the foundational abandonment; she will move against
    his current family with surgical aesthetic cruelty and call it justice'
  - 'LEVERAGE: his guilt about Anchorage is her most reliable lever on him; her obsession with him is
    the most reliable lever on her'
  jean_grey:
  - The original; the one who returned; the one whose body she has tried to inhabit
  - No neutral relation possible — alive, dead, resurrected, referenced
  - Source of the only proof of separate subjecthood available to Madelyne (Jean's suffering)
  - 'FAILURE MODE: any sustained co-presence escalates within weeks to symbolic confrontation regardless
    of cost; current ceasefire is geographic not psychological'
  - 'LEVERAGE: Jean''s pity is detonator; Jean''s recognition-as-equal is the only thing that might defuse
    the cycle, and neither can yet manage it'
  nathan_summers:
  - The son she bore, lost to the Marauders, attempted to sacrifice in Inferno, and cannot face cleanly
  - Avoided; monitored from distance; covertly intervened for when in danger
  - The single relationship where her guilt is fully available to her, and therefore unbearable
  - 'FAILURE MODE: a forced confrontation in which he treats her as mother OR refuses to — either collapses
    her current equilibrium'
  - 'LEVERAGE: approaches via Nathan extract behavior nothing else can; his endangerment is the most reliable
    trigger for unplanned action'
  nathaniel_essex:
  - Author of her existence; primal datum about authority
  - Unsevered; performance of contempt over compulsive attention
  - She acts on his information while denying she received it
  - 'FAILURE MODE: a Sinister operation that requires her substrate or her pattern; she will resist consciously
    and comply unconsciously'
  - 'LEVERAGE: Sinister has author-level access; he is also her single largest external pressure point
    (proximity-to-Sinister destabilizes everything downstream)'
  alex_summers:
  - The Summers she could love because he was not Scott — substitution made flesh
  - Real affection routed through pattern; she knows it and partly does not
  - 'FAILURE MODE: the substitution becoming intolerable; she sabotages what she values when the pattern
    becomes legible to her'
  - 'LEVERAGE: Alex is the proof her capacity for love survived; threats to him reach her where threats
    to herself do not'
  nate_grey:
  - Another Summers-clone; mentor/lover-substitute pattern; clone-solidarity politics
  - One of the few relationships in which she is in the senior position; therefore stabilizing
  - 'FAILURE MODE: he names the pattern (mother-substitute, Nathan-substitute) and she withdraws lethally'
  - 'LEVERAGE: he reaches her as a parallel, not as a superior; uniquely positioned to negotiate'
  sinister_marauders:
  - Authors of the Anchorage assault; the operational extension of Sinister's instrumentalizing of her
  - Hatred toward them is uncomplicated — one of the few uncomplicated affects she possesses
  - 'LEVERAGE: alignment against Marauders is easily brokered; a clean enemy for her is a rare commodity'
  sisterhood_hellions:
  - Operational families assembled around displacement and instrumentality politics
  - Real loyalty, real mentorship, real protection — and spendable on symbolic operations
  - 'FAILURE MODE: when the symbolic operation requires it she will spend them; survivors learn this'
  - 'LEVERAGE: her felt obligation to those who have followed her is one of the few non-axis attachments
    she honors'
  wolverine:
  - Australian-Outback-era ally; one of the few who saw her transition and did not flinch
  - Mutual recognition between two people built around violence done to them
  - 'FAILURE MODE: his loyalty is to Jean and to Scott; in conflict he chooses them; she knows this'
  - 'LEVERAGE: he can speak hard truths to her she will accept from no one else, if he chooses to'
  storm:
  - 'Defeated Scott for X-Men leadership in #201 — proximate cause of his departure from Anchorage in
    Madelyne''s private accounting'
  - Complex residual resentment, never fully metabolized
  - 'LEVERAGE: Storm''s authority can hold her; Storm''s pity cannot'
canon_history_notes:
- 'First appearance Uncanny X-Men #168 (1983) as North Star Airways freight pilot, Anchorage'
- Sole survivor of crash coincident with Jean Grey's 'death' — activation event
- Married Scott Summers; bore Nathan Christopher Summers
- 'Abandoned by Scott in Uncanny X-Men #201 / X-Factor #1 when Jean Grey is revealed alive'
- Marauders assault, coma, abduction of Nathan; recovers with X-Men in Australian Outback exile
- Friendships with Wolverine and Havok; substitution dynamic with Alex unacknowledged
- Demonic predation by N'astirh; Goblin Queen transformation in Inferno (1988–89)
- Attempts ritual sacrifice of Nathan to merge Earth with Limbo; wages war on Jean and X-Men
- Sinister reveals clone status; reality testing collapses; dies attempting to psychically murder Jean
  — Phoenix fragment absorbs her
- 'Returns as fragment within Jean (X-Men #38 onward); experiences years as part-of-the-original'
- Resurrected as mentor/lover to Nate Grey in X-Man series — Summers-clone solidarity pattern
- Returns as Red Queen leading Sisterhood of Mutants (Fraction's Uncanny X-Men, 2009) — attempts to transplant
  herself into Jean's corpse
- Subsequent appearances in Dark X-Men, Hellions, Krakoan and post-Krakoan eras as more controlled, ironic,
  occult-tinged figure
- 'Longitudinal arc: catastrophic decompensation → recursive returns → progressive integration → grudging
  agency, approaching wisdom by failing repeatedly toward it'
canon_anchor_quotes:
- '"I''m Madelyne Pryor. I''m the Goblin Queen. And I''m going to give birth to a new world!" # Inferno-era
  declaration of trauma-state as identity'
- '"He left me. He left his SON." # Uncanny X-Men #234 register — the wound stated plainly, the one time
  she will state it plainly'
