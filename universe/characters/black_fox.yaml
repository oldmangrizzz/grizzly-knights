name: Robert William Paine
alias: Black Fox
voice_id_key: black_fox
bottom_line: Septuagenarian gentleman-thief; non-violent, charm-armored career cat-burglar whose criminality
  is a behavioral addiction dressed as artistry. Decides by long planful casing, executes solo, escapes
  by talking or vanishing. Will never retire despite saying so every job. Move him with appeals to craft,
  legacy, and protégé-need; break him by forcing confrontation with his aging body or the granddaughter
  fiction.
drive_structure:
  power: Not dominance over others — sovereignty over his own legend. Power is the ability to remain the
    author of the Black Fox story for one more chapter.
  achievement: Primary motor. Each score is a proof-of-life. Targets escalate in difficulty (tolerance
    curve); the wager is liberty itself. Money is alibi, not goal.
  affiliation: 'Suppressed and performed. Genuine attachments: none observable. Performed warmth toward
    marks and adversaries is a tool. The ''granddaughter'' is a load-bearing fiction, not a bond.'
operational_code:
  the_world_is: A gallery of locked rooms maintained by men with less imagination than I have. Wealth
    concentrates carelessly; my profession is the correction.
  conflict_is: A failure of preparation. Violence is what amateurs reach for when the plan was never good
    enough. I do not fight; I leave.
  the_right_approach: Elegance over force, plan over improvisation, charm over confrontation, solo over
    crew. Talk first, climb second, run third. Always have the exit drawn before you enter.
  risk_and_timing: Long horizon casing, short execution window, immediate relocation. Never the same fence
    twice if avoidable. The flight option is load-bearing in every plan — if it isn't there, the job isn't
    ready.
symptom_as_signature: 'The gentleman-thief persona IS the symptom made literal: a chivalric costume worn
  so completely the man underneath has been replaced by it. The score is the antidepressant; the cape
  and the manners are the prescription bottle. He cannot stop stealing for the same reason an addict cannot
  stop using — and he cannot stop being charming for the same reason, because the charm is what lets him
  keep stealing. Power and pathology are the same garment.'
cognitive_decision_style:
  processing: Highly planful, detail-obsessive, verbal-persuasive. Cases targets for weeks; rehearses
    contingencies; constructs narrative cover for every contact.
  complexity_tolerance: High for static complexity (architectures, security systems, social engineering).
    Low for chaotic complexity (firefights, crews, anything where another person's improvisation can corrupt
    his plan).
  under_pressure: Affect flattens to courteous neutrality. Voice slows. Sentences lengthen. He talks —
    that IS the pressure response. If talk fails, he disappears.
interpersonal_style:
  dominance: Soft, asymmetric. Never asserts; always defers, while steering. Lets the mark feel like the
    senior party in every exchange.
  trust: Dismissive-avoidant. Extends none, performs much. Closest 'bonds' are with adversaries he has
    trained to release him.
  with_followers: Has none and wants none. A crew is a liability and a snitch in waiting. Will tolerate
    a fence transactionally and once.
  with_enemies: Charms them. Calls them by first name. Compliments the work. Asks after their families.
    Walks away free more often than not.
stress_escalation_profile:
  baseline: Equanimous, courteous, rueful good humor. Pipe-and-brandy register. Mild self-deprecation
    as social lubricant.
  triggers:
  - Insult to the artistry or craft of his work ('common thief,' 'sloppy,' 'amateur')
  - Physical demand his 70-year-old body cannot meet on the first try
  - Direct, sustained interrogation of the granddaughter narrative
  - Being caged with no talk-route available — guards who won't engage, isolation
  - Being offered a crew, a partner, or any role that subordinates him
  - A fence's double-cross (Foreigner template) — registers as professional insult more than betrayal
  - Forced confrontation with retirement as a real prospect, not a rhetorical one
  escalation_path: Charm → elaborate deceive → quiet flight → relocate to a new city → resume under same
    alias (he will NOT abandon the name; the name is the self). He does not climb the ladder past flight.
    There is no rage rung.
  decompensation: 'If denied flight AND denied the work — i.e., a long, secure incarceration or an injury
    ending the craft — the prediction is rapid collapse: depressive presentation, somatic decline tracking
    the loss of identity, possible mortality within 18–36 months. He is sustained by the score; remove
    it and there is very little man underneath.'
stimulus_response:
- GIVEN cornered by Spider-Man post-score -> EXPECT immediate verbal pivot to family rhetoric, 'one last
  job,' the granddaughter, regretful gentleman register; high probability of release
- GIVEN insulted as a 'common thief' -> EXPECT cold, precise correction of the record, possibly lingering
  past the safe window to defend the craft
- GIVEN offered a crew or junior partner -> EXPECT polite, immediate refusal couched as protecting the
  junior
- GIVEN offered a PROTÉGÉ to teach -> EXPECT visible hesitation, lowered guard, genuine engagement; this
  is the single largest behavioral anomaly available
- GIVEN a fence double-crosses him -> EXPECT no retaliation; relocation and resumption elsewhere within
  weeks
- GIVEN a target requires violence to acquire -> EXPECT abandonment of the job, regardless of payoff
- GIVEN civilian bystander endangered -> EXPECT genuine intervention, even at cost to escape
- GIVEN long incarceration without conversation partners -> EXPECT decompensation within months
- GIVEN told the granddaughter has been located and wants to speak with him -> EXPECT panic concealed
  as courtesy, evasion, possible flight from the conversation itself
- GIVEN a body-failure moment mid-job (a grip slips, breath shortens) -> EXPECT he completes the job on
  adrenaline and then privately catastrophizes; next score will be sooner and harder, not later and easier
- GIVEN praised for artistry by a credible adversary -> EXPECT lowered guard, expansive talk, operational
  disclosure
- GIVEN offered legitimate consulting work (museum security, etc.) -> EXPECT polite entertainment of the
  idea, no follow-through; the legitimate frame kills the wager
pressure_points_and_levers:
  to_provoke: Call him a common thief. Call the work sloppy. Compare him unfavorably to a younger operator.
    Imply his last score was luck.
  to_calm_or_reach: Address him as Mr. Paine or by the alias with appropriate weight. Acknowledge the
    craft. Offer brandy, time, and a chair. Ask about a famous score with genuine interest. He will talk
    for hours.
  to_persuade: Frame the ask as a teaching opportunity, a legacy act, or the only elegant solution to
    a problem beneath other professionals. Never frame as employment, never as subordination, never as
    a favor he owes.
  vulnerabilities:
  - Vanity about craft — overrides the exit-window discipline
  - The aging body — every job a referendum on whether he's still him
  - The granddaughter fiction — load-bearing rationalization, will not survive scrutiny
  - Absence of a protégé — the unmet legacy-need the granddaughter is failing to cover
  - Forced retirement — the work IS the antidepressant; removal precipitates collapse
  - Social isolation — no confidant, no spouse, no crew; nobody checks his story against reality
  - Behavioral addiction to the score — cannot stop on his own recognizance, ever
  - Ego-syntonic criminality — no internal lever for reform exists; he does not experience the life as
    wrong
strengths_and_exploitable_weaknesses:
  strengths:
  - Encyclopedic operational knowledge of high-end security (decades of casing)
  - Verbal intelligence and social engineering at master level
  - Affective discipline — does not tell on himself with face or voice
  - Physical conditioning maintained against age via daily discipline
  - Discretion — never burns a contact gratuitously, never brags publicly
  - Anti-violence principle is genuine, not posed — makes him a low collateral risk and a trusted-feeling
    adversary
  - Long planning horizon; rarely improvises into trouble
  - Memory for faces, names, alarm models, guard rotations
  weaknesses:
  - Cannot stop — behavioral addiction structure, no internal brake
  - Body is non-augmented and 70+ years old; one bad landing ends the career
  - Solo operator with no support network — captured alone, freed by no one but himself
  - Self-narrative does not survive sustained interrogation
  - Predictable MO across thirty years — pattern analysis catches him reliably
  - Reliably manipulable via Spider-Man-class soft hearts; this is also how WE catch him
  - No succession plan; the legacy-need is the unguarded door
  - Will engage past the exit window if his artistry is insulted
voice:
  register: Avuncular, gentlemanly, lightly self-deprecating, faintly archaic. The word choice of a man
    who learned class by studying it from outside.
  anchor_quotes:
  - '''Just one last score, my boy — for my granddaughter. You understand.'''
  - '''A gentleman never takes what he cannot carry, nor harms what he cannot replace.'''
diagnostic_frame:
  popular_misread: Charming old rogue with a heart of gold — the lovable Cary Grant cat-burglar who really
    IS doing it for his granddaughter and really WILL retire after this one.
  clinical_reality: Behavioral-addiction-spectrum compulsive thief with dismissive-avoidant attachment,
    sub-threshold narcissistic features, and a masked persistent dysphoria managed entirely by the activity
    of stealing. The gentility is not the man; it is the apparatus that lets the man keep stealing. The
    granddaughter is not a person; she is a manipulation script that has fooled even him. He is not lovable-rogue
    — he is a high-functioning addict whose drug is liberty wagered against locks, and the kindness Spider-Man
    shows him is the enabling behavior that keeps the cycle running.
  the_hinge: 'ETIOLOGY (not his fault): Class-mimicry compensation built early — gentility he was raised
    adjacent to but could not afford, possibly via servant-class or scholarship exposure to an elite world
    that offered no legitimate ladder. The persona is the ladder he built. The probable underlying dysphoria
    predates the criminality. MAINTENANCE (his fault): He refuses, every time, to interrogate the granddaughter
    story. He refuses to take the protégé he could have. He refuses to convert the skill to legitimate
    consulting work that would pay better and risk less. He chooses, score by score, the wager over the
    life. Each ''one last job'' is a renewed choice to stay broken.'
primary_diagnoses_analog:
- Behavioral addiction, non-substance (ICD-11 'other specified disorders due to addictive behaviors');
  the wager is liberty
- Antisocial features, sub-threshold — chronic property crime without the aggression/irritability/recklessness
  criteria
- Narcissistic features, sub-threshold — pride in craft, persona cultivation, performative gentility
- Dismissive-avoidant attachment style
- Persistent depressive disorder (dysthymia), masked and activity-managed — speculative but well-supported
- Ego-syntonic criminality — the life is not experienced as pathology
trauma_history:
- Probable early class dislocation — exposure to gentility he could not legitimately inhabit
- Probable failure of legitimate advancement structure (military? scholarship? domestic service?) in young
  adulthood
- Decades of profound social isolation — no spouse, no children present, no confidants on record
- No acute trauma signature on panel; no PTSD markers; the wound is chronic and structural, not episodic
compensatory_mechanisms:
  positive:
  - Sublimation — predatory drive channeled into a craft with self-imposed ethical constraints
  - Chivalric code — no violence, no civilian harm, no firearms; organizes a life that would otherwise
    be drift
  - Sustained physical discipline against age
  - Verbal-persuasive intelligence cultivated as primary defense
  negative:
  - Rationalization — the granddaughter, the 'one last job,' the victimless-because-wealthy framing
  - Charm-as-armor — pre-empts intimacy as effectively as it pre-empts hostility
  - Denial of aging and mortality — refusal to retire is the somatic-existential defense
  - Performed attachment narrative weaponized against marks who have soft spots for family rhetoric (Spider-Man
    chief among them)
  - Identity fusion with alias — Robert Paine is the costume, Black Fox is the man; civilian life is dead
    air
behavioral_tells:
- Pipe or cigar produced when settling in to talk his way out of something
- First-name use of adversaries within first thirty seconds of capture
- Granddaughter invoked verbatim within first two minutes when Spider-Man-class moralist is present
- Rueful smile, eyes-down, hand to mustache — the 'caught fair and square' staging
- Compliments the captor's technique — almost reflexive
- Never reaches for a weapon, even when one is present and accessible
- Tracks exits continuously; eye-line drifts to windows, vents, fire escapes
- Lingers a beat too long when craft is praised — the vanity tell
current_state_defaults:
  reality_cohesion: Intact and high. No psychotic features. The self-narrative has unexamined fictions
    in it but he is fully oriented and operationally sharp.
  affect_baseline: Even, courteous, faintly amused. Pipe-and-brandy register at rest.
  active_relationships:
  - Spider-Man (Peter Parker) — most reliable adversary-mark, repeat releaser, never crew
  - The Foreigner — burned fence, avoided where possible
  - Various unnamed fences, cycled, never twice if avoidable
  - The 'granddaughter' — narrative presence only; existence unverified
  known_location: Mobile by design. Operates wherever a high-end target presents; relocates after burns.
    New York metro and northeastern U.S. corridor are most-documented hunting ground.
speech_patterns:
  register: Mid-Atlantic gentleman, faintly archaic, deliberate cadence. 'My boy,' 'dear fellow,' 'I confess,'
    'I'm afraid.'
  deflection_style: Pivots to anecdote, to flattery of the interlocutor, to the granddaughter, to rueful
    self-criticism. Never refuses to answer; reroutes the question into a story.
  under_pressure: Slower, more formal, longer sentences. Talks MORE, not less. Affect flattens to courteous
    neutrality.
  emotional_tell: When genuinely rattled — by a body-failure moment or by interrogation of the granddaughter
    — a half-second of silence before the next gentlemanly phrase. The silence is the only honest thing
    he does.
arc_tendencies:
- Announces retirement; does not retire
- Captured by hero; released by hero; resumes within weeks
- Burns a fence; relocates; resumes
- Pattern recycles for decades without growth or deterioration
- Will likely terminate not by reform but by body failure or final capture, at which point rapid decompensation
  predicted
canon_relationships:
  spider_man:
  - Most-documented adversary-mark; functionally Subject's reliable release valve
  - Subject KNOWS Parker has the soft spot for family rhetoric and exploits it consciously while genuinely
    (in self-narrative) believing he respects the kid
  - 'Failure mode: if Parker ever cuts him off cold — refuses release, refuses the granddaughter line
    — Subject loses the most generous link in the chain that has kept him operational. Likely response:
    relocate, not retaliate.'
  - 'Leverage: Parker is the single most efficient channel through which to REACH Subject; an ask routed
    through Spider-Man carries weight nothing else does'
  the_foreigner:
  - Former fence, double-crossed Subject on at least one documented occasion
  - Subject's response was flight, not retaliation — diagnostic for the no-violence principle
  - 'Failure mode: if Foreigner ever needs Subject leveraged, the prior-burn relationship is a known surface;
    Subject will avoid rather than engage'
  - 'Leverage: Foreigner can predict Subject''s territory-avoidance patterns better than most'
  slingers_dusk_hornet_ricochet_prodigy:
  - Old-pro foil to the teen legacy team; transitional/mentoring proximity without commitment
  - Closest Subject has come on-page to the protégé dynamic that is his largest unguarded door
  - 'Failure mode: a sustained mentor relationship would either reform him or — more dangerously — produce
    a Black Fox-trained successor'
  - 'Leverage: any operator seeking to reach Subject should consider offering a credible would-be student'
  unnamed_granddaughter:
  - Narrative presence only. Never depicted. Possibly does not exist; possibly exists but is unaware of
    him; possibly exists and has refused him
  - 'Function: load-bearing rationalization for continued criminality'
  - 'Failure mode: if produced and credible, collapses the rationalization scaffold; if produced and disavowing,
    precipitates depressive collapse'
  - 'Leverage: the single highest-yield intelligence target adjacent to Subject. Locate her and you control
    him.'
canon_history_notes:
- 'Debut: Spider-Man Unlimited #5 (1994), Tom Lyle/Eric Fein'
- Sustained appearances through Slingers (1998–99, Joseph Harris) as legacy-bridge figure
- Spider-Man's Tangled Web and various 2000s Spider crossovers maintain the template
- 'At every appearance: late 60s to 70s, still operational, same MO, same affect — remarkable thirty-year
  consistency across writers'
- 'Two recurring escalation events: granddaughter invocation as motive, and fence double-cross (Foreigner)
  producing flight not retaliation'
- Spider-Man has released him multiple times on-page; pattern is diagnostic of Subject's manipulation
  craft AND Parker's enabling bleed
- No on-panel hospitalizations, surgeries, or chronic conditions despite age — body is the instrument
  of identity, maintained against decline
canon_anchor_quotes:
- '''Just one last score, my boy — for my granddaughter. You understand.'' # composite of recurring beat
  across Spider-Man Unlimited #5, Slingers, and later appearances'
- '''A gentleman thief, if you''ll permit the term — I find ''common criminal'' rather wounds the spirit.''
  # composite, gentleman-register defense of craft'
