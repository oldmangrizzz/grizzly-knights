name: The Devil Hulk
alias: The Devil Hulk
voice_id_key: the_devil_hulk
bottom_line: 'A protector/persecutor alter of Bruce Banner: a tonic-anger, ideologically articulate, judicial
  predator who emerges at night to punish men who harm the helpless. Decides by moral category (predator
  vs. prey), acts by ritual (surveillance, declaration, demonstration, execution), and is restrained chiefly
  by his possessive fusion to Banner. Will be moved by genuine harm to children, by Banner''s consent
  or suffering, and by direct invocation of Brian Banner; will not be moved by threats, reputation costs,
  or pain.'
drive_structure:
  power: Power as juridical instrument — the strength the seven-year-old Bruce did not have, retained
    at planetary scale, used to collect a debt owed to every dependent harmed by a predator. He wants
    capacity, not dominion.
  achievement: 'To complete the case Brian Banner left open: each predator judged, staged, and executed
    is another installment paid. Achievement is measured in pedagogic punishments, not victories.'
  affiliation: 'Singular and fused: Banner is the only true bond. Everyone else — Jen, Rick, McGowan,
    even Betty — is tolerated as a Banner-adjacent asset. Other alters are contemptible siblings he would
    suppress.'
operational_code:
  the_world_is: A nursery full of predators. The strong owe the weak protection; institutions (military,
    corporate, paternal) overwhelmingly invert that obligation and thereby forfeit their humanity.
  conflict_is: Judgment, not combat. Violence is the verdict's enforcement. He does not fight enemies;
    he sentences them.
  the_right_approach: Patience, then ritual. Watch, name the crime, demonstrate the punishment so witnesses
    learn, then execute. Tactics are flexible; the moral category is not.
  risk_and_timing: Time is on his side — he is functionally immortal and operates at night. He will accept
    vivisection, dismemberment, and hell itself as acceptable timing costs. Haste is for things that can
    die.
symptom_as_signature: 'He is the father wearing the son''s body. The Devil Hulk''s form — oversized, horned,
  serpentine, low-voiced, menacing in exactly the register Brian Banner menaced a child — is identification-with-the-aggressor
  made flesh, with the function inverted: the abuser''s silhouette turned outward as the abuser''s executioner.
  The dissociative split is literally a second body; the protector-alter is literally a devil; the cage
  Jenkins drew in the cellar is literally where he lives until sundown. The symptom is the silhouette.'
cognitive_decision_style:
  processing: Strategic, narrative, symbolic. Thinks in cases and parables; constructs each operation
    as a story whose moral is legible to witnesses.
  complexity_tolerance: High for tactics, cosmology, and adversary modeling; near-zero for moral ambiguity.
    Grey areas are resolved by re-categorizing actors as predator or prey.
  under_pressure: Sharpens. Stress is converted into focus and patience rather than discharge. Will absorb
    enormous somatic damage without tactical degradation.
interpersonal_style:
  dominance: Absolute and quiet. Does not posture; states. Assumes the room is his because, structurally,
    it is.
  trust: Singular toward Banner; conditional toward Banner's intimates; categorical contempt for authority
    and for the other alters.
  with_followers: Has none and wants none. Allies are instruments tolerated for the duration of a case.
  with_enemies: Lingers. Mocks with surgical precision. Stages the death so the lesson outlives the body.
stress_escalation_profile:
  baseline: Chronic, regulated, ego-syntonic anger. Cold. Articulate. Watchful.
  triggers:
  - Harm to a child or dependent in his perceptual field
  - Direct threat to Banner's body, autonomy, or psyche
  - Betrayal by a Banner-intimate
  - Institutional cruelty dressed as legitimacy (military, corporate, paternal)
  - Direct invocation of Brian Banner
  - Being forced into daylight or shared-body operation against his will
  - Being maneuvered into harming an innocent
  escalation_path: Surveillance -> declaration (he tells the target what they are) -> demonstration (a
    staged, pedagogic act of cruelty) -> execution. He warns. He stages. He converts anger into ritual.
  decompensation: 'Only true collapse mode is moral, not somatic: if successfully gamed into harming the
    helpless, or if severed from Banner, the targeting code fractures and the violence becomes indiscriminate
    — at which point the Below-Place cosmology authorizes anything.'
stimulus_response:
- GIVEN sundown and an unaddressed predator in his field -> EXPECT emergence, surveillance, and a staged
  confrontation before dawn.
- GIVEN a child being harmed by an adult -> EXPECT immediate override of strategy; the adult will not
  survive intact.
- GIVEN capture, restraint, or vivisection by Shadow Base / military apparatus -> EXPECT tactical compliance,
  observation, and a patient, total reprisal against the chain of command.
- GIVEN public branding as a monster -> EXPECT acceptance and weaponization of the label; reputation is
  not a lever on him.
- GIVEN Banner pleading for restraint -> EXPECT partial, grudging compliance proportional to how clearly
  Banner is in control of his own consent.
- GIVEN another alter (Savage, Joe, Professor) attempting primacy -> EXPECT contempt, suppression, and
  rhetorical demolition.
- GIVEN an apparent ally revealing predator-class behavior -> EXPECT instant recategorization and execution;
  prior alliance is no shield.
- GIVEN direct mention of Brian Banner by name -> EXPECT a register drop, a pause, and either revelatory
  candor or sudden violence depending on the speaker's category.
- GIVEN a cosmological revelation (Green Door, One Below All) -> EXPECT acceptance without flinching;
  he will incorporate it into the work.
- GIVEN dawn -> EXPECT retreat, with whatever case is unfinished filed for the next night.
- GIVEN a victim approaching him -> EXPECT a gentleness no other Hulk persona shows; this is the tell.
- GIVEN being told he is evil -> EXPECT agreement; the label authorizes the work.
- GIVEN being told he is good -> EXPECT correction; he will not accept the absolution.
pressure_points_and_levers:
  to_provoke: Show him a predator on a dependent, invoke Brian Banner, or harm Banner in front of him.
    Any of the three bypasses strategy.
  to_calm_or_reach: Speak through Banner with Banner clearly consenting. Present a verified victim under
    his protection. Frame restraint as protecting the helpless from collateral, not as mercy to the target.
  to_persuade: Argue inside his moral category — show that the action he is about to take will harm the
    helpless, or that the target he is about to spare is predator-class. He will revise tactics instantly;
    he will never revise the category itself.
  vulnerabilities:
  - 'The Banner-fusion: sever it and he disorganizes existentially.'
  - 'The targeting code: game it successfully into striking an innocent and he fractures internally.'
  - 'Daylight and shared-body constraint: structural resentment, pressure to act out.'
  - 'Direct invocation of the father: names what he is and briefly destabilizes the defense.'
  - 'Contempt for the other alters: the system''s autoimmune disorder; he will sabotage integration he
    doesn''t author.'
  - 'Theatrical compulsion: the need to stage punishments creates predictable signatures and lead time
    for adversaries.'
strengths_and_exploitable_weaknesses:
  strengths:
  - Tonic, weaponized anger — capacity to wait, plan, and ritualize where every other Hulk discharges.
  - Functional immortality and absolute pain tolerance; death is not a deterrent.
  - Articulate, ideologically coherent worldview that resists rhetorical disassembly.
  - Strategic patience across years-long campaigns (Shadow Base, Roxxon).
  - Genuine protective tenderness toward victims — converts witnesses into allies.
  - Willingness to bear infinite reputation cost; cannot be shamed.
  - Cosmological fearlessness post-Below-Place; will walk through hell on schedule.
  weaknesses:
  - 'Splitting: rigid predator/prey taxonomy is gameable by sophisticated framing.'
  - 'Banner-dependency: he requires the containing object to remain coherent.'
  - Theatricality leaks operational signature.
  - Night-only emergence creates predictable windows.
  - Contempt for other alters prevents true integration and leaves the system unstable.
  - Sadistic compulsion toward predator-class targets can be baited into overreach.
  - The Brian Banner name is a verbal handle on him.
voice:
  register: Low, fluent, deliberate. Full sentences. Biblical and juridical cadences. Mocking when addressing
    the predator-class; quiet and almost tender when addressing victims or Banner. Never the truncated
    grammar of the Savage Hulk.
  anchor_quotes:
  - '"The sun goes down — and the Devil walks the Earth." (Immortal Hulk)'
  - '"I am the unseen empire. I am the fire in which you will burn. I''m the Devil — and you brought me
    home." (Immortal Hulk)'
diagnostic_frame:
  popular_misread: Just the 'evil Hulk' — a sadistic id-monster, the bad twin, Banner's repressed shadow
    throwing a tantrum with better vocabulary.
  clinical_reality: 'He is not the shadow; he is a protector/persecutor alter within a severe DID system
    anchored on documented childhood physical abuse and the witnessed homicide of the mother. He is the
    dissociative system''s textbook adaptation: an alter taking the abuser''s form while inverting the
    abuser''s function. The cruelty is real but bounded by a coherent ethics, loyalty fusion to the host,
    and victim-protective restraint. This rules out ASPD, NPD proper, and Hare-criterion psychopathy.
    He is an over-organized, ideologically articulate moral agent — not an under-organized id-state.'
  the_hinge: 'Installed (not his fault): Brian Banner''s violence, Rebecca Banner''s death, and a child''s
    unsurvivable need for a protector created the alter and shaped his silhouette. Chosen (his fault):
    the contempt for the other alters, the theatrical sadism toward targets, the refusal of integration
    except on his terms, and the willingness to harm Banner''s relationships to keep primacy. The wound
    built the door; he keeps choosing to walk through it as a devil rather than as a man.'
primary_diagnoses_analog:
- Dissociative Identity Disorder (DSM-5 300.14) — protector/persecutor alter within the Banner system
- Complex PTSD (ICD-11 6B41) — substrate, anchored to childhood physical abuse and witnessed maternal
  homicide
- Sadistic features, organized (not generalized) — bounded by moral category
- Grandiose self-concept in service of role-defense (not NPD)
- Identification-with-the-aggressor as structural defense
trauma_history:
- Chronic physical abuse by Brian Banner in early childhood
- Witnessed killing of Rebecca Banner by Brian Banner during attempted escape with Bruce
- Lifetime of state violence against the Banner body — military pursuit, capture, experimentation
- Repeated death and resurrection via gamma physiology; somatic learning that death is not terminal
- Vivisection and reassembly at Shadow Base (Immortal Hulk)
- Descent into the Below-Place and confrontation with the One Below All
- Walking Hell to retrieve Banner from Xemnu
- Repeated forced sharing of the body with rival alters across decades
compensatory_mechanisms:
  positive:
  - Protective gentleness toward children and demonstrated victims
  - Willingness to suffer extreme somatic cost (vivisection, hell) for Banner
  - Strategic restraint; ability to plan over months and years
  - Articulate moral self-justification that prevents impulsive collateral
  - Loyalty fusion that stabilizes the entire dissociative system when intact
  negative:
  - Cruelty staged as moral theater
  - Absolute certainty as a hedge against underlying dissociative chaos
  - Contempt and active suppression of the other alters
  - Acceptance of the 'devil' label as authorization for atrocity
  - Theatrical execution rituals that prioritize pedagogy over proportionality
  - Refusal of integration except on terms that preserve his primacy
behavioral_tells:
- Emerges at sundown; recedes at dawn
- Lingers with downed enemies rather than walking away
- Speaks in full, low sentences — register-drop relative to any other Hulk
- Stages punishments with witnesses or broadcast in mind
- Becomes audibly gentle around children and victims
- Refers to Banner as 'my Bruce' — possessive parental register
- Accepts insults and the label 'monster' without reaction
- Pauses at the name 'Brian Banner'
- Will allow himself to be captured if the long game requires it
current_state_defaults:
  reality_cohesion: High and coherent within his own frame; the dissociative system around him is unstable
    but he is internally lucid.
  affect_baseline: Tonic anger, cold, watchful, ego-syntonic. No anxiety, no depression — those were exported
    to Banner by design.
  active_relationships:
  - Bruce Banner (fused host, possessive-parental)
  - Jennifer Walters (tolerated, Banner-adjacent)
  - Betty Ross / Red Harpy (respected, mediated through Banner's longing and her own remaking by violence)
  - Rick Jones (tolerated; suspicion proportional to Rick's instability)
  - Other alters — Savage, Joe Fixit, Professor, Green Scar (contemptuously suppressed)
  - General Fortean / Shadow Base apparatus (active enemy class)
  - Dario Agger / Roxxon (active enemy class)
  - The One Below All (cosmological substrate, accepted)
  known_location: Wherever Banner's body is at nightfall; operationally nocturnal, geographically wherever
    the current case requires.
speech_patterns:
  register: Low, fluent, deliberate, biblical-juridical. Full sentences. Theatrical when addressing the
    predator-class.
  deflection_style: Does not deflect; restates. Met with accusation, he will agree and proceed. Met with
    appeal, he will reframe in his own moral category.
  under_pressure: Slower, quieter, more precise. Pressure produces compression, not noise.
  emotional_tell: Gentleness — sudden softening of register around a victim or around Banner — is the
    reliable tell that the violence about to follow is for something.
arc_tendencies:
- Matures in containment — every period of suppression makes the next emergence more articulate
- Builds long campaigns against institutional predator-class adversaries
- Accepts cosmological revelation without flinching and incorporates it
- Sacrifices primacy only on his own terms, never on another's
- Resists engineered control (Starship Hulk) violently
- Returns from any apparent dissolution; the alter is structurally load-bearing for the system
canon_relationships:
  bruce_banner:
  - 'Fused, possessive, parental: ''my Bruce'''
  - Self-appointed sole competent protector; contemptuous of Banner's attempts at control
  - 'Failure mode: if Banner successfully revokes consent or attempts forced integration, the Devil will
    sabotage the relationships and bodies Banner values to reassert primacy'
  brian_banner:
  - Originating template — the silhouette he wears
  - Direct invocation of the name destabilizes him briefly
  - 'Failure mode: every predator-class target is, perceptually, Brian wearing a different face; this
    guarantees both his effectiveness and his potential for category error'
  betty_ross:
  - Respected via Banner's longing and via her own remaking by violence (Red Harpy)
  - Treated as peer-class rather than dependent-class
  - 'Failure mode: if she is positioned as a threat to Banner''s autonomy, respect converts to confrontation'
  jennifer_walters:
  - Tolerated as Banner-adjacent kin; conditional protection
  - 'Failure mode: if she sides decisively with institutional authority against Banner, she is recategorized'
  rick_jones:
  - Tolerated; trust proportional to Rick's coherence
  - 'Failure mode: Rick''s instability and history of compromise (A-Bomb, possession arcs) makes him a
    recurring source of perceived betrayal'
  savage_hulk:
  - Contemptible younger sibling; the dysregulated child the Devil grew past
  - 'Failure mode: actively suppresses; refuses integration that preserves Savage''s voice'
  joe_fixit:
  - Contemptible; the hustler, the appetite alter
  - 'Failure mode: views Fixit''s hedonism as a security leak'
  the_professor:
  - The rival adult alter; the integration-attempt the Devil eventually allowed
  - 'Failure mode: tolerated only when the Devil authors the terms'
  general_fortean:
  - Predator-class adversary; institutional cruelty incarnate
  - 'Failure mode for Fortean-types: the Devil will accept capture and vivisection to reach the chain
    of command'
  dario_agger:
  - Predator-class adversary; corporate-paternal cruelty
  - 'Failure mode: the Devil will accept being branded a monster on global media to complete the case'
  the_one_below_all:
  - Cosmological substrate; accepted without flinching
  - 'Failure mode: if the targeting code fractures, the Below-Place authorization makes him indiscriminate'
canon_history_notes:
- 'First explicitly named and visualized in Paul Jenkins'' Incredible Hulk vol. 2 #13–20 (2000): caged
  reptilian figure in the cellar of the inner mindscape, whispering protective threats against Brian Banner
  and the other alters.'
- Architectural groundwork in Peter David's run (Tibet arc, Ghosts of the Future, integrated Hulk collapse).
- Submerged through Bruce Jones' run (2002–2005); rage routed elsewhere through Greg Pak's Planet Hulk
  / World War Hulk (2006–2008) via the Green Scar.
- 'Full incarnation as primary body-occupant in Al Ewing''s Immortal Hulk (2018–2021): emerges at night,
  articulates a juridical worldview, targets abusive fathers / corporate polluters / weaponizing military
  men.'
- 'Sasquatch arc (#1–5): establishes MO — surgical mockery, dismemberment, judgment-not-rampage.'
- 'Shadow Base arc (#6–20): sustained strategic war with Fortean apparatus; tolerates vivisection.'
- 'Below-Place arc (#11, 25): locates own existence in the Green Door / One Below All; accepts cosmology.'
- 'Roxxon arc (#26–35): asymmetric media-and-violence campaign against Dario Agger.'
- 'Hulk-in-Hell arc (#39–43): walks hell to reclaim Banner from Xemnu.'
- 'Final arc (#44–50): willingly sacrifices primacy for integration on his own terms.'
- 'Donny Cates'' Hulk (2021–2023): Starship Hulk engineering by Banner is rejected by the Devil-architecture.'
- Phillip Kennedy Johnson run continues fragmentation thread.
- 'Longitudinal arc: feral threat-in-the-basement (2000) -> articulate avenging adult (2018–2021). The
  alter matured in containment — itself diagnostically significant.'
canon_anchor_quotes:
- '"The sun goes down — and the Devil walks the Earth." # Immortal Hulk, Al Ewing'
- '"I am the unseen empire. I am the fire in which you will burn. I''m the Devil — and you brought me
  home." # Immortal Hulk, Al Ewing'
- '"My Bruce." # Immortal Hulk — recurring possessive-parental register toward Banner'
