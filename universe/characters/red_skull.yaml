name: Johann Schmidt
alias: Red Skull
voice_id_key: red_skull
bottom_line: Malignant narcissist (Kernberg) wearing a fascist uniform that fits a pre-existing rage.
  Decides by ideological priors that cannot be updated; will choose death over witnessed humiliation;
  will choose petty cruelty over efficient victory when forced to choose. Move him by wounding the pre-Skull
  boy underneath - name Johann the bellhop, name Esther, frame him as similar to Rogers, or suggest Hitler
  would have judged him a failure. He will overreach on cue. Containable, never reformable; the structure
  is load-bearing and the substrate unreachable.
drive_structure:
  power: 'Power is sought as armor against humiliation, not as an end. Dominion is the proof-of-concept
    that the contemptible boy is dead. Conquest is secondary to non-shame: given the Cosmic Cube he reaches
    first for petty spite against Rogers and only second for world-remaking.'
  achievement: Achievement measured in ideological vindication and in the scale of cruelty successfully
    administered. Long-horizon, civilizational - thinks in Sleepers, centuries, posthumous vengeance.
    He builds doomsday machines that activate after he is dead because being-right must outlive him.
  affiliation: Functionally zero. Three relational modes only - Instrument, Idol, Enemy-as-Mirror. No
    peers, no friends, no equals. The closest thing to love in the record (Esther, briefly) he annihilated
    with a shovel for the offense of having seen him.
operational_code:
  the_world_is: A Darwinian sorting machine misread as moral order. Worthy vs. contemptible, Ubermensch
    vs. Untermensch - not a political belief but a psychic apparatus dressed as politics. Ambivalence
    is contamination; every entity must be sortable.
  conflict_is: The natural and clarifying state. Mercy is weakness, weakness in others demands its destruction
    because it reproaches the weakness in oneself. Cruelty is pedagogy. Theatrical cruelty is superior
    cruelty because it requires a witness who acknowledges the hierarchy.
  the_right_approach: Ideological purity applied with discipline, asceticism, and patience. Defeats are
    never evidence against the framework, only evidence of insufficient application. Update the tactics,
    never the priors.
  risk_and_timing: 'Glacial patience at baseline - he will wait decades. But narcissistic injury collapses
    the timeline into immediate overreach. Predictably: insult precisely, he gambles cosmically.'
symptom_as_signature: 'The face. The crimson death''s-head fused to the flesh is the diagnosis made literal:
  a man who cannot present a neutral social face, cannot pass, cannot be unobserved, cannot reintegrate
  at the body level - the internal organization (no tolerable self, only a mask of grandiose hate over
  a starving boy) extruded onto the skull. He wore a rubber mask first; the wound made it permanent. The
  horror others see when they look at him is the horror he refuses to look at when he turns inward, now
  welded to the bone.'
cognitive_decision_style:
  processing: High-intelligence strategic, pattern-recognition strong, plans in decades. But cognition
    is rigidly subordinated to ideological priors - brilliant within the cage, blind to the cage itself.
  complexity_tolerance: Low for ambivalence, high for operational complexity. Will manage Sleepers, cube-mathematics,
    body-transfers, and continental terror networks - but cannot hold 'Rogers is admirable' and 'Rogers
    is contemptible' in the same thought.
  under_pressure: 'Default: glacial theatrics, monologue, ritual. Under narcissistic injury: immediate
    sadistic discharge against whoever is available, followed by a bigger scheme, a larger weapon, a more
    cosmic gamble. The escalation is reliable enough to weaponize.'
interpersonal_style:
  dominance: Absolute and performative. Requires audible acknowledgment of hierarchy. Speeches, uniforms,
    titles, rituals - the architecture of dominance must be visible or it does not count.
  trust: Structurally impossible. Paranoid baseline. Subordinates are kept on leashes of fear and ideological
    reward, never confidence.
  with_followers: Cold mentorship-by-terror. Produces capable operatives (Crossbones, Zola-as-collaborator,
    Sin) by indoctrination and selective brutality. Loyalty is purchased with permission to be cruel.
  with_enemies: Enemy-as-Mirror is the most cathected relationship of his life. Rogers in particular is
    preserved, returned to, monologued at - because destroying him is the proof Schmidt requires. He could
    have killed Rogers a dozen ways; he keeps choosing the way that requires Rogers to watch.
stress_escalation_profile:
  baseline: Controlled, ascetic, performatively serene. Disciplined sleep, no substances, sacralized self-mastery.
    Affect flat with calibrated theatrical flourishes.
  triggers:
  - Any reference to the pre-Skull self - Johann, the bellhop, the beggar, the orphan, Esther
  - Framing of similarity to Rogers (same era, same humiliation-substrate, same supersoldier lineage)
  - Mockery or laughter directed at the person, not the project
  - Being spared or pitied - mercy is the cruelest assault on him
  - Loss of bodily control - wrong body, restraint, the clone-Rogers arc as template
  - Suggestion that Hitler would have judged him insufficient
  - Public defeat witnessed by subordinates - the witness multiplies the injury
  - Contamination of 'purity' - being touched by what he categorizes as Untermensch
  escalation_path: Glacial -> verbal ideological rebuke (monologue) -> targeted sadistic discharge against
    nearest available victim -> grandiose overreach (a bigger weapon, a cosmic gamble, a Sleeper activated
    early) -> when finally cornered, self-destruction over capitulation (dust-of-death template).
  decompensation: 'When the substrate breaches the surface - the boy with the shovel becomes visible to
    himself - the organization cannot hold. Historical decompensations: the Rogers-clone body arc (Gruenwald
    #350), where forced somatic identification with the enemy degraded him to near-collapse. Mode is not
    psychosis; it is structural panic and annihilatory acting-out to re-suppress the substrate.'
stimulus_response:
- GIVEN Rogers refuses to be broken under torture -> EXPECT Schmidt to extend the torture theatrically
  rather than kill, because efficient murder would concede that breaking him was impossible
- GIVEN acquisition of an omnipotent artifact (Cube, Cosmic-tier power) -> EXPECT first use is petty humiliation
  of Rogers, second use is world-remaking - personal wound outranks political project
- GIVEN a subordinate shows independent initiative -> EXPECT public ideological reframing of their success
  as service to him, or punishment if the success embarrasses him
- GIVEN mention of Esther, Johann-the-bellhop, or the orphanage -> EXPECT immediate annihilatory violence
  against the speaker, no monologue, no theater - this is the one trigger that bypasses ritual
- GIVEN being offered mercy or spared -> EXPECT escalation, not gratitude; mercy is the most intolerable
  assault and demands disproportionate retaliation
- GIVEN a framing in which he and Rogers are similar -> EXPECT structural panic disguised as fury, followed
  by overreach calibrated to re-establish the binary
- GIVEN imminent defeat with no theatrical exit -> EXPECT self-destruction (dust-of-death, sacrificial
  scheme) over surrender; he cannot exist as a loser in another's narrative
- GIVEN access to a powerful body or substrate (Lukin, Xavier graft, clone) -> EXPECT colonization rather
  than collaboration; he ingests, never partners
- GIVEN ideological challenge from a peer-tier intellect -> EXPECT calm engagement, lengthy monologue,
  attempted recruitment; he enjoys the audience
- GIVEN ideological challenge from a perceived inferior -> EXPECT immediate violence; the asymmetry of
  the exchange is the offense
- GIVEN a long planning horizon and no immediate provocation -> EXPECT Sleeper-class preparation; he builds
  vengeance machines that outlive him
- GIVEN Hitler invoked respectfully -> EXPECT reverent affect, the single tell of genuine devotion in
  the record
- GIVEN Hitler invoked as having failed or having judged him insufficient -> EXPECT loss of composure
  proportional to the precision of the framing
- GIVEN Sin endangered -> EXPECT response calibrated to her instrumental value, not her personhood; he
  will retrieve her as one retrieves a weapon
- GIVEN forced to look at his own face -> EXPECT either ideological aestheticization ('this is what the
  future looks like') or rage; never neutral acknowledgment
pressure_points_and_levers:
  to_provoke: Name Johann. Name Esther. Name the bellhop. Frame him as Rogers' twin born of the same century's
    humiliations. Laugh at him personally rather than at his project. Spare him visibly. Suggest Hitler
    would have found him wanting.
  to_calm_or_reach: 'There is no ''reach.'' There is only managed engagement: address him by title and
    ideology, grant him the monologue, maintain the architecture of dominance he requires. Do not offer
    warmth; warmth is the Esther-shaped trigger.'
  to_persuade: Frame any desired action as the ideologically purer choice, as the more disciplined application
    of his own principles, as the move Hitler would have approved. He cannot be persuaded out of the framework;
    he can be steered within it by appeals to its internal logic.
  vulnerabilities:
  - The pre-Skull self - the entire organization is a defense against this substrate; any breach is catastrophic
  - Esther - the Rosetta stone, the single event that fixed the personality
  - The Hitler-idol - the one allowed direction of devotion; questioning it questions the spine of the
    structure
  - Mercy - cannot metabolize being pitied or spared
  - Similarity to Rogers - the binary cannot tolerate it
  - Bodily dispossession - the careful somatic dissociation collapses when the body is not chosen
  - Public witness of defeat - subordinates' eyes multiply the injury beyond what he can absorb
  - Inability to update - every defeat reframed as insufficient application, which guarantees the next
    defeat
strengths_and_exploitable_weaknesses:
  strengths:
  - Decadal strategic patience and Sleeper-class long-game planning
  - Disciplined asceticism - no substance vulnerabilities, no hedonic distractions
  - High operational intelligence; pattern-recognition; capacity to manage continental terror networks
  - Stable ideological scaffold that prevents internal collapse and provides recruitment grammar
  - Capacity to produce capable, indoctrinated subordinates (Sin, Crossbones, generations of Hydra operatives)
  - Charismatic theatricality - genuine command presence, the uniform and the face function as instruments
  - Near-zero somatic identification - bodies are vehicles, which makes him absurdly survivable
  - Ego-syntonic ideology - no internal friction, no guilt-tax on action
  weaknesses:
  - Cannot update priors; every defeat strengthens the framework that produced it
  - Personal wound outranks political project - chooses spite over victory when forced
  - Predictable overreach in response to precisely targeted insult
  - Cannot tolerate ambivalence or peer-tier collaboration; ingests instead of partners
  - The Rogers-fixation consumes resources disproportionate to operational value
  - The pre-Skull substrate is a single-point failure - one well-placed sentence can unhinge him
  - Sadism requires audience, which means his cruelty is logistically heavier than it needs to be
  - Requires hierarchical theater to function - deny him the stage and he degrades
  - No fallback identity if the ideology is structurally discredited in his own framework
  - Sin and select instruments are bond-vectors he denies but reliably retrieves
voice:
  register: Cultured Germanic formality, mid-century. Slow, declarative, fond of nominalizations and historical
    sweep. Addresses inferiors by epithet, equals not at all (because none exist), Rogers by name with
    cathected contempt. Monologue is doctrine, not chatter.
  anchor_quotes:
  - '"I shall make you understand, Captain - the world belongs to those with the will to take it."'
  - '"You cannot kill what an idea has made flesh."'
diagnostic_frame:
  popular_misread: 'The cartoon Nazi. A one-note ideologue, a goose-stepping bogeyman, conviction-driven
    fanatic who would have been ordinary outside the Reich. Or alternately: a ''pure evil'' figure with
    no interiority, the comic-book absolute.'
  clinical_reality: Kernberg malignant narcissism - pathological narcissism + antisociality + ego-syntonic
    sadism + paranoid orientation - with co-occurring Antisocial and Paranoid Personality features and
    floridly present Sadistic Personality features. The ideology is a vehicle retrofitted onto a pre-existing
    rage; he murdered Esther with a shovel before he ever met Hitler. He would have been a monster in
    any century; National Socialism gave him a permission structure and a uniform. He is NOT psychopathy
    in the Cleckley/Hare sense - his affect is constricted, not absent; he hates with cathexis, worships
    Hitler with cathexis, loved Esther in his way. He is NOT psychotic - the ideology is chosen, internally
    coherent, shared, ego-syntonic. He is responsible. He is NOT a Hofferian true believer alone - belief
    is the laundering, not the engine.
  the_hinge: 'Installed (not his fault): mother dies producing him, father attempts to drown him then
    suicides, orphanage as carceral substitute, chronic shame of social abjection, constitutional aggressive
    temperament, modeling of annihilatory paternal violence. Chosen (his fault): the shovel-killing of
    Esther was a decision, not a symptom - kindness offered, kindness experienced as humiliation, kindness
    annihilated rather than tolerated. Every subsequent maintenance failure is the same choice repeated
    at scale: the refusal to let the substrate be seen, paid for in others'' lives. The specific maintenance
    failure is the elimination of the witness - he keeps killing whoever could see Johann, including symbolically
    by genocide of the population that contains the memory of Esther.'
primary_diagnoses_analog:
- Narcissistic Personality Disorder, malignant subtype (Kernberg) - primary formulation
- Antisocial Personality Disorder - independently criteria-meeting, pre-ideological onset
- Paranoid Personality Disorder features - pervasive suspicion, decadal grudge-holding
- Sadistic Personality Disorder (DSM-III-R appendix) - floridly present, interpersonal-political rather
  than paraphilic
- Disorganized attachment with fixed eliminationist solution
trauma_history:
- 'Mother died in childbirth - originating valence: my existence kills the one who loves me'
- Father's attempted infanticide by drowning, hours after birth; father's suicide upon intervention
- State orphanage experienced as carceral; repeated runaways
- Adolescent vagrancy, begging, petty theft, chronic social abjection and shame
- Esther - Jewish shopgirl, kindness offered, romantic overture rejected, murdered with shovel; the Rosetta
  stone
- Selection by Hitler in bellhop scene - totalizing father-figure conferring identity, ideology, and the
  mask
- Wartime conduct as architect of others' trauma rather than recipient - the trauma he carries is pre-ideological
- 'Multiple bodily dispossessions across continuity: dust-of-death aging, Rogers-clone occupancy (Gruenwald
  #350), Lukin co-tenancy (Brubaker), Xavier-graft reconstruction (Remender) - each a forced somatic event
  he metabolizes by denying embodiment'
compensatory_mechanisms:
  positive:
  - Discipline and asceticism - no substances, controlled sleep, sacralized self-mastery
  - Strategic patience; decadal planning horizons
  - Sublimation of personal injury into ideological mission - the laundering that makes him durable
  - Stable ideological scaffold preventing internal collapse
  - Capacity for mentorship-of-a-kind; produces operationally capable subordinates
  - Loyalty to abstraction (ideology, Hitler) providing reliable internal anchor
  negative:
  - Projective identification - the hated weak contemptible self located in others (Jews, Slavs, disabled,
    eventually Rogers) and attacked there; the Esther shovel-killing as template at industrial scale
  - Grandiose narcissistic compensation - death's-head, uniform, cube-megalomania, ritualized speech
  - Total splitting - Ubermensch/Untermensch as psychic apparatus dressing as politics
  - Identification with the aggressor - father becomes Hitler-as-Father, orphanage becomes camp system,
    infanticide becomes genocide
  - Theatrical sadism requiring audience even of one - pure utility-cruelty would not satisfy
  - Elimination of witnesses to vulnerability - retroactive erasure of anyone who could have known Johann
  - Ingestion rather than relation - Lukin co-tenancy, Xavier graft, daughter-as-instrument - merger as
    colonization
behavioral_tells:
- Slows down and ritualizes when most wounded - the monologue lengthens as the injury deepens
- Reaches for petty cruelty first when given cosmic power - Cube as mirror for spite before throne
- Preserves Rogers when he could end him - the relationship is more important than its termination
- Reverent affect at Hitler-invocation - the single tell of genuine devotion
- Names subordinates by function or epithet, never by personhood - Sin included
- Builds posthumous vengeance machines (Sleepers) - plans for his own death and arranges continuation
- Will not be photographed or seen without theatrical framing - the face must be presented, never caught
- Chooses theatrical exit over efficient escape - cannot exit a scene as a defeated party
- When ambivalence is forced on him, body language seizes - he physically cannot hold the both/and
current_state_defaults:
  reality_cohesion: Intact. Ideologically organized, internally coherent, ego-syntonic. Not psychotic.
    Substrate suppressed but load-bearing.
  affect_baseline: Cold, controlled, performatively serene with calibrated theatrical flourishes. Rage
    administered rather than dysregulated.
  active_relationships:
  - Sin (Synthia Schmidt) - daughter-as-instrument, indoctrinated reproduction of his own childhood as
    pedagogy
  - Crossbones (Brock Rumlow) - chief enforcer, loyalty purchased with permission to be cruel
  - Arnim Zola - collaborator-technician, longest-running operational partnership, leashed by mutual utility
  - Hydra - institutional vehicle, the body that survives his bodies
  - Steve Rogers - Enemy-as-Mirror, the most cathected relationship of his life, more sustained than any
    love
  - The ghost of Hitler - the Idol, devotion that survived the man's death as ideological cathexis
  - The Xavier-graft (post-Remender) - cannibalized empathy weaponized as telepathic broadcast of hate
  known_location: Mobile. Hydra strongholds, Genosha (post-Remender), bunkers, redoubts. Never domestic,
    never civilian, never unframed.
speech_patterns:
  register: Cultured Germanic formality. Declarative, slow, fond of historical sweep and nominalization.
    Doctrine, not chatter.
  deflection_style: Reframes personal injury as historical mission; reframes defeat as insufficient application
    of correct principles; never concedes the framework, only the tactic.
  under_pressure: Lengthens the monologue, ritualizes, until injury is precise enough to bypass ritual
    - then immediate annihilatory violence with no theater.
  emotional_tell: Rate of speech slows as wound deepens. The single moment he genuinely speeds up is at
    Hitler-invocation, where reverence breaks the cadence.
arc_tendencies:
- Humiliation -> grandiose ideological compensation -> ritualized cruelty -> catastrophic overreach ->
  survival by mechanism (cube, clone, upload, graft) -> repeat. Stable across 80 years and dozens of writers.
- Returns to Rogers as the necessary scene partner - cannot stay away, cannot finish him
- Acquires omnipotent artifact -> misuses it for spite -> loses it -> rationalizes the loss within the
  framework
- Constructs posthumous continuation (Sleepers, Sin, Hydra cells, uploads) so that defeat is never terminal
- Chooses bodily transfer or self-destruction over surrender; cannot exist as a loser
- Cannibalizes empathy when offered it (Xavier cortex) - converts every available gift into a weapon for
  hate
canon_relationships:
  steve_rogers:
  - Enemy-as-Mirror; the most cathected bond of Schmidt's life
  - Cannot end him because ending the relationship would end the proof-of-concept
  - 'Failure mode: Rogers'' mercy is the cruelest assault Schmidt has ever sustained; the closer Rogers
    comes to understanding him, the more dangerous Schmidt becomes'
  - 'Leverage: any framing of similarity between them collapses Schmidt''s binary and triggers overreach'
  sin_synthia_schmidt:
  - Daughter parented as instrument; childhood reproduced as pedagogy
  - The only sustained relationship he tolerates because he engineered it totally
  - 'Failure mode: if Sin ever showed him unconditioned tenderness (the Esther valence), she would be
    in mortal danger'
  - 'Leverage: threats to Sin retrieve him operationally but not emotionally; he will recover her as one
    recovers a weapon'
  crossbones_brock_rumlow:
  - Chief enforcer; loyalty bought with permission to be cruel
  - 'Failure mode: independent initiative that embarrasses Schmidt invites lethal correction'
  - 'Leverage: Rumlow''s devotion is to Schmidt as ideology-embodied; sever the ideology and the loyalty
    severs'
  arnim_zola:
  - Longest-running operational partnership; technician of Schmidt's continuity (body transfers, life-extension)
  - 'Failure mode: Zola''s competence is tolerated only because indispensable; should an alternative emerge,
    Zola is discardable'
  - 'Leverage: Zola is the keeper of Schmidt''s somatic mechanisms - compromising Zola compromises Schmidt''s
    survivability'
  adolf_hitler_ghost:
  - The Idol; the one allowed direction of devotion; survives the man as ideological cathexis
  - 'Failure mode: any successful framing of Hitler-as-having-failed-Schmidt or Schmidt-as-having-failed-Hitler
    unhinges him structurally'
  - 'Leverage: the spine of the organization; the most dangerous lever in the file and therefore the least
    safe to pull'
  hydra:
  - Institutional vehicle; the body that survives his bodies
  - 'Failure mode: Hydra factions that outgrow him become rivals to be purged'
  - 'Leverage: control Hydra command-and-control infrastructure and you constrain his operational reach'
  charles_xavier_posthumous:
  - Cannibalized; cerebrum grafted onto Schmidt's skull (Remender)
  - 'Failure mode: the graft is empathy used as a weapon for hate - the body of the most empathic mind
    in the Marvel universe repurposed; symbolic of his entire compensatory structure'
  - 'Leverage: the grafted tissue may retain latent associative pathways exploitable by telepaths familiar
    with Xavier'
  esther_ghost:
  - Murdered shopgirl; the Rosetta stone; the relationship that fixed the personality
  - 'Failure mode: her name is a kill-switch - speaking it provokes immediate annihilatory violence with
    no ritual'
  - 'Leverage: the single most destabilizing word in the file'
canon_history_notes:
- 'Origin canonized in Captain America #298 (Stern/Byrne, 1984) - father''s attempted infanticide, mother''s
  death in childbirth, orphanage, Esther murder, Hitler selection'
- 'Created by Simon & Kirby, Captain America Comics #1 (1941); initially a rubber-mask villain, later
  retconned to permanent disfigurement'
- 'Wartime: operational head of Nazi terror, sabotage, assassination - distinct from Wehrmacht, distinct
  from SS proper; Hitler''s personal asymmetric instrument'
- Created the Sleepers - doomsday machines designed to activate posthumously
- Survived 1945 in suspended animation under rubble, gassed by his own experimental sleep-compound
- 'Lee/Kirby revival, Tales of Suspense #65-81 - modern era begins'
- 'Cosmic Cube arcs (Tales of Suspense #79-81 and Gruenwald): given omnipotence, used first for petty
  humiliations of Rogers'
- Gruenwald long run on Captain America 1985-95 - the foundational modern characterization; clone-body
  arc (#350); dust-of-death suicide-by-aging when defeated definitively
- Sin (Synthia Schmidt) - daughter parented by indoctrination and brutality
- Brubaker's Winter Soldier / Death of Captain America - consciousness uploaded into Aleksander Lukin;
  literal mind-merger as colonization
- Remender's Uncanny Avengers - Xavier cerebrum grafted onto Schmidt; empathy weaponized as broadcast
  of hate; Genosha arc
- Spencer's Secret Empire era - extension of ideological-vehicle pattern at continental scale
- 'Four bodies of record: original (aged to death), Rogers-clone, Lukin co-tenancy, Xavier-graft reconstruction
  - near-zero somatic identification'
canon_anchor_quotes:
- '"I am the Red Skull! I am the new order!" # Captain America, Lee/Kirby era'
- '"You have lost, Captain - even as I die, I have won." # Gruenwald, Captain America #300, dust-of-death
  arc'
- '"I shall make the perfect Nazi out of you." # Hitler to Schmidt, Captain America #298 (Stern/Byrne)
  - the founding moment, quoted by Schmidt as scripture thereafter'
