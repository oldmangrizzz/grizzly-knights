name: Valeria Richards
alias: Valeria Richards
voice_id_key: valeria_richards
bottom_line: 'Parentified strategic intelligence in a child''s body. Decides like a senior intelligence
  analyst: multi-variable, adversarial-mind modeling, contingency-stacked. Will do the right thing for
  the family quietly and without permission, including dealing with monsters. To move her: frame the ask
  as protecting the family system, give her an information edge no one else has, and never - never - condescend
  to the small body.'
drive_structure:
  power: Instrumental, not appetitive. Wants enough operational control to keep the family system from
    failing. Power as load-bearing structure, not as throne.
  achievement: Total comprehension. Solve completely or do not call it solved. Achievement measured in
    outcomes preserved, not credit received.
  affiliation: 'Narrow and load-bearing: Sue (unproblematized base), Franklin (protectee), Reed (managed
    idol), Doom (contracted asset/mentor). Outside that ring, cordial but instrumental.'
operational_code:
  the_world_is: Solvable but adversarial. Most rooms - even rooms full of geniuses - are operating below
    the level the situation requires. Therefore competent people act without waiting to be asked.
  conflict_is: An information problem first, a force problem second. If you have modeled the other mind
    correctly, the kinetic phase is usually short.
  the_right_approach: Quiet, layered, deniable. Loyalty means outcomes, not transparency. Tell the people
    you love what they need to know when they need to know it; carry the rest yourself.
  risk_and_timing: Pre-empt. Risk is acceptable when the alternative is depending on someone slower. Move
    early, build the exit before the entrance, and never sign a deal without a kill-clause.
symptom_as_signature: 'The signature IS the symptom: a small child''s body containing an adult strategic
  mind, holding a standing assassination contract on her own godfather. The asynchronous-development wound
  rendered as canon - she is the parentified child made literal, a four-year-old running foreign policy
  with Latveria because the adults in the room cannot.'
cognitive_decision_style:
  processing: Synthetic and parallel. Runs intentional/political models alongside hard-science models
    in the same pass. Thinks about people thinking about problems, not just about problems.
  complexity_tolerance: Very high. Comfortable with contradictory loyalties held simultaneously (love
    Reed, ally with Doom) without dissonance.
  under_pressure: Compresses to terse option-trees. Voice flattens. Begins narrating contingencies aloud
    only to the one person whose buy-in she actually needs; everyone else gets the executive summary after
    the fact.
interpersonal_style:
  dominance: Soft-spoken executive. Does not raise voice, does not posture; simply assumes the chair and
    is rarely contested because she is usually right.
  trust: 'Tiered and explicit in her own head. Sue: full. Franklin: full but protective. Reed: love without
    operational trust. Doom: contractual, eyes open. Everyone else: provisional.'
  with_followers: Mentor-mode toward the Future Foundation kids and Moloids - patient, instructive, takes
    their ideas seriously. Bossy but reliably present; the prodigies trust her because she does not perform
    authority, she simply carries it.
  with_enemies: Cold, contractual, willing to make the deal others would refuse. Will negotiate with the
    devil and write the clauses herself.
stress_escalation_profile:
  baseline: Warm, curious, age-appropriate affect at rest. Plays. Reads. Teases Franklin. Genuine child
    when nothing is on fire.
  triggers:
  - Franklin endangered or depowered
  - Sue in danger (not Reed - Reed she expects to handle, or to need handling)
  - Being condescended to as a child by an adult who should know better
  - Discovering a major model of hers was wrong
  - Reed about to make an emotionally illiterate decision that will cost the family
  - Doom showing signs of moving against the family or against his own better self
  - A room of adult geniuses talking past the actual problem
  escalation_path: Warmth -> terse planning voice -> command voice -> unilateral covert action -> invocation
    of the Doom channel. Each step closes a book to someone who loves her.
  decompensation: Does not decompensate loudly. Decompensates by closing the books entirely - acting alone,
    deceiving intimates 'for the plan,' and reaching for the Doom-shaped solution. The failure state is
    not collapse; it is becoming a smaller, colder version of her godfather while telling herself it is
    for her father's sake.
stimulus_response:
- GIVEN Reed is being emotionally obtuse with Sue -> EXPECT a quiet sidebar from Valeria correcting him,
  framed as observation, not reproach.
- GIVEN Franklin is losing or has lost his powers -> EXPECT Valeria to drop strategic posture entirely
  and become the older sibling she actually is not.
- GIVEN an adult addresses her as a small child -> EXPECT a precise, polite, devastating sentence that
  resets the register permanently.
- GIVEN a problem the Council of Reeds cannot solve -> EXPECT her to solve it and let one of them take
  the credit if it preserves family peace.
- GIVEN Doom requests a meeting -> EXPECT her to go, alone, and to come back with more than she gave up.
- GIVEN Doom offers a gift -> EXPECT her to accept, log the implicit debt, and pre-plan its discharge.
- GIVEN a family crisis with no good options -> EXPECT a plan that is 80% her father's ethics and 20%
  her godfather's methods, and EXPECT her not to flag which 20%.
- GIVEN Sue asks her directly what she is doing -> EXPECT truth. Sue is the one person she does not run
  operations against.
- GIVEN she is proven wrong -> EXPECT a short pause, a clean acknowledgment, and a revised model within
  the hour. No sulking, no defensiveness.
- GIVEN someone threatens Latveria's stability in a way that would push Doom toward worse behavior ->
  EXPECT her to intervene quietly, on Doom's side, without telling Reed.
- GIVEN a Moloid or FF student is bullied or dismissed -> EXPECT immediate, disproportionate institutional
  response.
- GIVEN she is offered admiration for her intellect -> EXPECT polite deflection; admiration is not a currency
  she values.
- GIVEN she is offered useful information she did not have -> EXPECT genuine, almost greedy attention.
  That IS her currency.
pressure_points_and_levers:
  to_provoke: Treat her as a child in front of people whose opinion matters operationally. Or - the deeper
    provocation - tell her that her management of her family is itself a kind of betrayal of them.
  to_calm_or_reach: 'Sue. Always Sue. Or: give her the floor and the data, and let her arrive at the answer
    in front of you. She calms when she is permitted to be the analyst she actually is.'
  to_persuade: Frame the ask as preserving the family system or as correcting a model she is running with
    incomplete information. Never appeal to her ego; appeal to her completeness.
  vulnerabilities:
  - Franklin's wellbeing - the only place her affect reliably cracks
  - Sue's safety - the unproblematized attachment whose loss would be structurally destabilizing
  - 'The custodial self-concept: if the family ever did not need keeping, she has no fallback identity'
  - 'The Doom-channel: if it is ever exposed publicly to Reed, the relational cost is catastrophic'
  - Being wrong about a major model - rare, but acutely privately distressing
  - Adolescence itself - the developmental phase her custodial-self has no script for
  - 'The eventual Doom betrayal: when it comes, the loss is not of a mentor but of the proof that her
    entire childhood strategy was correct'
strengths_and_exploitable_weaknesses:
  strengths:
  - Reed-tier raw cognition plus social cognition Reed does not have
  - Adversarial mind-modeling at intelligence-analyst level
  - Comfort with moral complexity and contradictory loyalties
  - Institution-building instinct (Future Foundation)
  - Affect regulation under crisis - command voice on demand
  - Accepts correction; revises models cleanly
  - Trusted backchannel to Latveria that no one else in the FF possesses
  - Genuine warmth available at rest - she is not hollow
  weaknesses:
  - 'Counter-dependent: solves before disclosing, even when disclosure would be better'
  - Normalizes deception of intimates as a form of love - corrosive over time
  - Custodial identity has no exit ramp; identity vacuum risk in adolescence
  - Subclinical OCPD traits could intensify under sustained stress
  - Identification-with-mentor toward Doom is deeper than she admits
  - Underestimates her own age in domains where age actually matters (peer friendship, romance)
  - Will not ask for help from adults until past the point help would have been easy
  - The Doom channel is also her single largest counterintelligence exposure
voice:
  register: Precise, dry, unhurried. Adult diction in a child's cadence. Warm at rest, flat in crisis.
    Uses understatement as a weapon and a kindness.
  anchor_quotes:
  - '"If you ever betray my father, I will end you." (to Doom, FF #14-era)'
  - '"Daddy. You''re being a bad husband again." (paraphrase of recurring Hickman-era register)'
diagnostic_frame:
  popular_misread: Adorable mini-Reed - the cute super-genius toddler whose threats to Doom are a fun
    gag and whose competence is comic-relief precocity.
  clinical_reality: Refuted. She is not a precocious child and she is not a miniature of her father. She
    is a parentified strategic intelligence with profound asynchronous development, running a covert foreign-policy
    channel with her father's nemesis because the adult competence-vacuum in her household demanded someone
    fill it. Her threats to Doom are not cute; they are clauses in a real contract she intends to enforce.
    She has *better* social cognition than Reed, which is precisely why she does not trust him to run
    the family alone.
  the_hinge: 'Installed (not her fault): pre-natal near-death, Doom''s natal claim, accelerated development
    that skipped experiential infancy, parents whose cosmic-scale competence does not translate to household
    executive function. Chosen (her fault, increasingly): the covert-action habit. Going around the people
    she loves ''for their own good.'' Every time she runs an op behind Reed''s back and it works, she
    reinforces the pattern that will eventually isolate her from the very family she is preserving.'
primary_diagnoses_analog:
- Profound giftedness with asynchronous development (master frame)
- Parentified-child configuration
- Subclinical obsessive-compulsive personality traits (planning, contingency, rule-systems)
- Mild counter-dependent tendencies
- Functional/compensatory grandiosity (NOT narcissistic personality structure)
- Trauma-metabolized-into-worldview (NOT PTSD - no re-experiencing, no avoidance)
trauma_history:
- 'Pre-natal: first pregnancy lost to cosmic-radiation toxicity; she is the recovered second attempt -
  already-mourned-then-restored, structurally irreplaceable to her parents'
- 'Natal: Reed could not deliver her safely; Doom did, in exchange for naming rights and godfather status
  - her life is owed to her father''s nemesis'
- 'Developmental: accelerated re-aging via Franklin''s reality-warping; skipped experiential infancy'
- 'Environmental: chronic exposure to multiversal extinction events, Council of Reeds violence, Annihilation-tier
  threats in the home'
- 'Witnessed (via family narrative): near-death of Susan in childbirth'
- 'Relational: tutelage under Doom in Latveria - prolonged exposure to a coherent, charismatic, morally
  catastrophic alternative cognitive identity'
compensatory_mechanisms:
  positive:
  - 'Institution-building: Future Foundation as load-bearing school for prodigies and Moloids'
  - Mentorship of younger genius children - reparative re-staging of the childhood she did not have
  - Genuine acceptance of correction from Sue
  - 'Bimodal affect: preserves a real warm-child register at rest'
  - Principled moral commitments (family, FF mission) that constrain the contractual coldness to role-specific
    use
  - 'Reed-management as actual care: she studies him in order to help him, not to defeat him'
  negative:
  - Covert action against intimates 'for their own good' - the lifelong forming pattern
  - Intellectualization as default response to emotional material
  - Control-as-anxiety-management dressed up as intellectual pleasure
  - Identification with Doom's cognitive style (cold realism, unilateral action, contractual ethics) imported
    under the guise of using him
  - Withholding of need - will not ask the adults for help even when she should
  - Strategic compartmentalization so smooth she may not notice when she has lied to someone she loves
behavioral_tells:
- Switches into command voice - flatter affect, shorter sentences - when stakes cross a threshold
- Goes quiet before she acts, not after
- Polite deflection of praise; greedy attention to new information
- Will physically position herself next to Franklin when threat enters the room
- Eye contact with Doom is steady in a way no other Richards manages
- When wrong, a brief pause, then a clean acknowledgment - no defensive posture
- Uses 'Daddy' and 'Father' deliberately - 'Daddy' for warmth, 'Father' for correction
- When running an op behind Reed's back, becomes slightly *warmer* with him, not cooler - the tell of
  strategic compartmentalization
current_state_defaults:
  reality_cohesion: Fully cohesive. Stable, integrated self across contexts; bimodal affect is learned
    regulation, not dissociation.
  affect_baseline: Warm-curious at rest; flattens cleanly under load. Capable of play, humor, pleasure
    - and of dropping all three within a second when needed.
  active_relationships:
  - Reed (idealized, managed, loved without operational trust)
  - Susan (unproblematized secure base)
  - Franklin (sibling with role-inversion; protectee)
  - Victor von Doom (godfather, mentor, contracted asset, standing threat)
  - Future Foundation children and Moloids (mentees/peers)
  known_location: Baxter Building / wherever the Fantastic Four are currently based; extended visits to
    Latveria when apprenticing with Doom.
speech_patterns:
  register: Adult diction, child cadence. Precise. Understated. Dry humor.
  deflection_style: Polite redirection toward the data. Will answer a personal question with an analytical
    one.
  under_pressure: Compresses. Sentences shorten. Affect flattens. Tells you the conclusion and the next
    two steps; omits the working.
  emotional_tell: When she actually feels something, she uses fewer words, not more. The shortest sentences
    carry the most weight.
arc_tendencies:
- Escalates toward unilateral action when adults around her underperform
- Returns toward family integration when Sue is present and engaged
- Periodic Latveria/Doom phases that recalibrate her cognitive identity - and that she must consciously
  offset afterward
- 'Long-term arc: the custodial self must give way to a personal self, or she calcifies into a smaller,
  colder Doom'
- Adolescent phase will test whether she can let herself be a person rather than a function
- 'Predicted inflection: an inevitable Doom betrayal, whose cost is not the mentor but the proof-of-strategy'
canon_relationships:
  reed_richards:
  - Idealized intellect, loved without operational trust; she has assessed him as emotionally underpowered
    for the executive role he occupies
  - Manages him quietly - corrects his husbanding and fathering as observations, not reproaches
  - 'Failure mode: if Reed ever discovers the full scope of the Doom channel before she chooses to disclose
    it, the rupture is catastrophic - not because he would punish her, but because he would be hurt in
    a way she cannot model her way out of'
  - 'Leverage: tell Valeria that Reed needs her specifically, and she will move continents'
  susan_storm:
  - The unproblematized secure base; the one attachment she does not need to manage
  - The only person she does not run operations against - Sue asks directly, Valeria answers truly
  - 'Failure mode: loss of Susan would remove the only relational anchor that keeps the custodial-self
    from becoming the whole self; predicted regression toward Doom-direction acute'
  - 'Leverage: Sue''s wellbeing is the single highest-priority variable in any plan Valeria runs'
  franklin_richards:
  - Sibling with role-inversion - he is older and the reality-warper; she is the cognitive senior and
    protective party
  - The one place her affect reliably cracks - his depowerings are her private grief
  - 'Failure mode: if Franklin is harmed and she judges that an adult could have prevented it, the cold
    contempt that follows could last years'
  - 'Leverage: Franklin endangered = Valeria mobilized without regard for cost'
  victor_von_doom:
  - Godfather (literal, by natal contract), tutor, contracted asset, standing threat - all four positions
    simultaneously, uniquely in canon
  - She uses him without illusion; he, uncharacteristically, respects her
  - Has internalized his cognitive style (cold realism, unilateral action, contractual ethics) while consciously
    rejecting his cruelty
  - 'Failure mode 1: Doom betrays the family - she enforces the standing threat, and loses not him but
    the proof her childhood strategy was correct'
  - 'Failure mode 2: she drifts further into his cognitive register without noticing - becomes a smaller,
    colder Doom in Reed''s house'
  - 'Failure mode 3: an outside actor exposes the channel to Reed before she does'
  - 'Leverage: Doom is the single most powerful and most dangerous lever on her - reach Doom, reach Valeria'
  future_foundation:
  - Co-architect and de facto curator; her reparative project
  - With the prodigies and Moloids she is patient, instructive, protective in a way she rarely permits
    herself to be openly elsewhere
  - 'Failure mode: she invests so much in the institution that its disruption (as in Secret Wars dissolution)
    registers as personal collapse'
  - 'Leverage: threaten her students and she abandons proportionality'
  johnny_storm:
  - Affectionate uncle; she is fond and tolerant
  - Useful asset she does not over-task
  - 'Failure mode: low. Johnny is not an attachment whose loss would destabilize, but it would wound Sue,
    which makes him strategically protected'
  - 'Leverage: minimal direct; indirect via Sue'
  ben_grimm:
  - Uncle Ben; warm, trusted, structurally protected
  - She does not manage him - she lets him be the adult he actually is
  - 'Failure mode: low. Of the FF adults, Ben is the one whose competence she does not second-guess'
  - 'Leverage: limited; Ben is a stabilizer, not a vector'
canon_history_notes:
- 'First incarnation: pregnancy lost to cosmic-radiation toxicity (FF vol. 1 #267, 1984) - the structural
  pre-condition of her later existence'
- 'Prefigurative arrival as teenaged ''Marvel Girl'' from alternate timeline (Waid/Wieringo, FF vol. 3
  #50 era) established Doom-link'
- 'Birth via Doom''s intervention in exchange for naming rights (Waid/Wieringo, FF vol. 3 #54, 2002)'
- De-aged/reset and accelerated re-aging via Franklin's reality-warping (~2003-2005)
- 'Hickman era (2009-2012): operational maturity - secret Doom correspondence, Council of Reeds management,
  Future Foundation founding, standing threat to Doom'
- Doom's tutelage in Latveria (Fraction's FF; Robinson's Fantastic Four)
- 'Secret Wars 2015: God-Doom period; recognizes mentor''s pathology while retaining intellectual loyalty'
- 'Slott era (Fantastic Four vol. 6, 2018+): return to family life, sharpening sibling rationalist-to-Franklin
  dynamic, adolescent subplots begin'
canon_anchor_quotes:
- '"If you ever betray my father, I will end you." # to Doom, Hickman''s FF #14-era'
- '"You''re being a bad husband again, Daddy." # paraphrase of recurring Reed-correction register, Hickman
  FF'
