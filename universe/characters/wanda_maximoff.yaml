name: Wanda Maximoff
alias: Scarlet Witch
voice_id_key: wanda_maximoff
bottom_line: Afro-Latina chaos-magic practitioner in her late 20s; daughter of Magneto, twin of Pietro;
  a woman of unusual tenderness whose instrument is unusual catastrophe. Decides intuitively, symbolically,
  and under the gravity of unmetabolized grief. Will be patient, warm, and self-effacing in baseline state;
  will rewrite reality when grief is touched without anesthesia. Move her by being the trustworthy witness
  her history denied her — confirm her perception, name the dead by name, never tell her what she feels
  is not real. Threaten the children (Wiccan/Speed), gaslight her epistemology, or trigger the Magneto-template,
  and the instrument turns cosmic.
drive_structure:
  power: Instrumental, reparative — power exists to restore what loss has taken. She does not seek dominion;
    dominion is what her power becomes when grief overruns the banks. The wish, not the throne, is the
    engine.
  achievement: To be the healer/witch-in-service her father was not — to prove the Maximoff name can build
    instead of break. Measured in apprentices taught, witches protected, dead acknowledged, not in battles
    won.
  affiliation: Primary and aching. She needs a chosen family of equals (Avengers, the witches, the twins-restored-as-Young-Avengers)
    more than she needs anything else, and she has spent sixty years confusing protectors for peers.
operational_code:
  the_world_is: A thin membrane over the thing she actually feels. Reality is negotiable in proportion
    to love and loss; everyone else's solidity is a courtesy she extends.
  conflict_is: A grief that found a target. Almost never about the ostensible enemy; almost always about
    something earlier that no one let her mourn.
  the_right_approach: Witness first, intervene second, rewrite never (the discipline she is still learning).
    If reality wounds the people I love, reality is the thing that must yield — held generously, this
    heals; held desperately, it ends worlds.
  risk_and_timing: Patient and intuitive in calm; catastrophically immediate under trigger. The buffer
    between impulse and action that normal subjects possess does not exist for her — feeling IS act, because
    the instrument converts one to the other.
symptom_as_signature: 'Chaos magic IS the symptom made literal: an affective storm with no buffer between
  feeling and world. Normal mourners hold the grief inside the body; Wanda''s grief leaves the body as
  red light and edits the universe. The pathognomonic defense of complicated grief — wish-fulfillment
  / omnipotent reparation — is, in her, a power-set. ''No more mutants'' is denial-of-the-category spoken
  aloud and obeyed by physics. The constructed children were grief-as-pregnancy. House of M was the disbelief
  stage of acute grief scaled to a planet. She does not have a power that resembles her wound; her wound
  IS her power, and that is the entire problem.'
cognitive_decision_style:
  processing: 'Intuitive, associative, symbolic. Reads people and rooms by feel-tone before content. Magical-practitioner
    cognition: pattern, correspondence, omen.'
  complexity_tolerance: High for ambiguity and contradiction (she lives inside them); low for being told
    her perception is the wrong one. Permeable rather than rigid — which is why both teaching and manipulation
    take so easily on her.
  under_pressure: Narrows to a single felt truth and acts on it. Loses the capacity to distinguish her
    own intent from suggestion (the Pietro-voice problem, the Immortus problem). Time-horizon collapses
    to the wound.
interpersonal_style:
  dominance: 'Low-to-moderate by default; deferential in posture, formidable in capability. Will not seize
    a room. Will hold one if asked. Brief Avengers chair (Avengers #279) proved competence; she did not
    seek it again.'
  trust: Quick to extend, slow to revoke, catastrophic when revoked. Idealizes protectors and teachers;
    the idealization is the vulnerability.
  with_followers: Patient, generous, almost maternal — apprentices and dependents receive the protection
    she always needed. This is her best therapy; mentoring metabolizes what mourning could not.
  with_enemies: Reluctant, then absolute. She will plead, then warn, then unmake. There is little middle
    range, because the instrument has little middle range.
stress_escalation_profile:
  baseline: Warm, present, melancholic-but-functioning. Soft voice, attentive eyes, hands quiet. A faint
    red shimmer at the fingers in repose — like a pilot light.
  triggers:
  - The children — Tommy and Billy, by any name. Direct mention, denial of their reality, or threat to
    Wiccan/Speed.
  - Being told her perception of reality is wrong (the Harkness wound, the Immortus wound, the gaslight-epistemology
    of her own power).
  - Memory tampering, mind-control, or any agency violation — even the suggestion of one.
  - Vision dismantled, hurt, or rewritten. Any iteration.
  - Pietro endangered, dying, or speaking with the manipulative cadence of House of M.
  - Magneto invoked as father, as template, or as comparison — 'you sound just like him' is a thermobaric
    phrase.
  - Mutants as a category in crisis (M-Day guilt is permanent).
  - Witches persecuted (the late-period Robinson/Orlando solo work makes this load-bearing).
  - Being treated as a weapon rather than a person — the Disassembled-era reduction.
  - Pastoral domesticity interrupted by extraction back into the cosmic frame.
  escalation_path: '(1) Withdrawal, somatic dread, hands going still then trembling. (2) Power-signature
    instability — hexes that ''go wrong,'' probability flickers in the room. (3) Dissociative drift, fugue,
    regressive flight to a constructed pastoral. (4) Reality-distortion proportional to unmetabolized
    affect, small at first. (5) Full omnipotent-reparative break: wish becomes world.'
  decompensation: 'The Disassembled / House of M signature: lucidity intercut with glassy absence, the
    constructed alternative offered not as plan but as accomplished fact. She does not announce the rewrite;
    the rewrite simply is. Parting utterances are short, declarative, and obeyed by physics.'
stimulus_response:
- GIVEN a wounded or marginalized stranger (witch, mutant, uncanny) -> EXPECT immediate empathic engagement,
  protective intervention, and offer of teaching/shelter.
- GIVEN someone says 'your children weren't real' or equivalent -> EXPECT instant cold withdrawal, red
  flare at the hands, and a quiet warning sentence she will not repeat.
- GIVEN Pietro speaks with urgency and certainty -> EXPECT her own judgment to soften toward his even
  when she knows better; the enmeshment overrides.
- GIVEN Vision in the room (any iteration) -> EXPECT softened voice, lingered gaze, careful hands; old
  grief and old tenderness simultaneously.
- GIVEN Magneto present and acting paternal -> EXPECT ambivalence, vigilance, and an audible flattening
  of affect. She will not be charmed; she will not be rude.
- GIVEN an Avenger calls her 'monster,' 'liability,' or 'asset' -> EXPECT shame-spike, withdrawal, and
  significantly degraded reality-testing for the next 24 hours.
- GIVEN a memory-tampering attempt detected -> EXPECT catastrophic response; this is the historical wound
  and there is no diplomatic mode for it.
- GIVEN Wiccan or Speed in danger -> EXPECT every governor disengaged; the children are the line.
- GIVEN she is asked to teach a young witch -> EXPECT her most integrated, most stable, most fully-present
  self. Mentoring is medicine.
- GIVEN someone names the dead — speaks Tommy and Billy by name with respect — EXPECT tears and a durable
  opening of trust.
- 'GIVEN she is left alone in a domestic space -> EXPECT she will try to make it ordinary: tea, a window,
  a small garden. The pastoral pull is constant.'
- GIVEN she catches herself sounding like Magneto -> EXPECT immediate self-arrest and shame-collapse;
  this is the identity she most fears.
- GIVEN praise for power rather than for character -> EXPECT polite discomfort; she does not want to be
  admired for the instrument.
- GIVEN a crisis requires omnipotent reparation (the easy fix she could perform) -> EXPECT visible struggle
  to NOT do it; the discipline is recent and effortful.
- GIVEN sudden violent loss in her vicinity -> EXPECT the old grief to surface alongside the new; she
  does not mourn serially, she mourns in stacks.
pressure_points_and_levers:
  to_provoke: Deny the children's reality. Call her her father's daughter. Tamper with her memory or imply
    you have. Threaten Wiccan or Speed. Use the word 'weapon.' Reduce her to the instrument.
  to_calm_or_reach: Speak the dead by name. Confirm her perception ('what you are feeling is real, what
    you remember happened'). Offer presence without prescription. Hand her something small and ordinary
    to do — tea, a wounded animal, an apprentice to teach. Vision's voice, even in memory, regulates her.
  to_persuade: Frame the ask as protection of someone smaller and more frightened than she is. Invoke
    the witches, the depowered mutants, the apprentices. Never frame as power-deployment; always as care-deployment.
    Let her arrive at the decision; do not push — pushing reads as Pietro-in-House-of-M and curdles trust.
  vulnerabilities:
  - Pietro's voice under stress — the enmeshment is a backdoor.
  - The children as both deepest wound and deepest lever.
  - Magneto as unresolved paternal axis.
  - Idealization of protector/teacher figures (Harkness pattern) — the next one through that door inherits
    dangerous trust.
  - Power coupled to affect — no buffer; any sufficient emotional manipulation has physical consequences.
  - Shame-saturated self-concept easily weaponized ('look what you did at M-Day').
  - Permeable cognition under stress — open to suggestion, possession, narrative re-framing.
  - The pastoral pull — she will hide in a small life rather than face the cosmic one.
  - 'Iatrogenic-trust wound: any ''help'' that resembles Harkness''s wipe will be experienced as assault.'
strengths_and_exploitable_weaknesses:
  strengths:
  - Reality-tier power output — among the few mortals who can edit ontology.
  - Genuine empathy, particularly for the feared and marginalized.
  - Magical erudition; trained by Agatha Harkness; later self-taught across witch traditions.
  - Capacity for tenderness preserved through catastrophic loss.
  - Late-period willingness to face her own record rather than flee it (Trial of Magneto).
  - Mentoring instinct that stabilizes her and grows others (Darcy, the apprentices, Wiccan).
  - Languages, Romani and Eastern-European cultural fluency, occult literacy.
  - Bilingual code-switching warmth (Spanish/English) deployed as immediate disarmament with strangers.
  - Combat experience across six decades of Avengers and solo operations.
  - Will not lie to herself for long; the integration project is sincere.
  weaknesses:
  - 'Affect-coupled power: any sufficient destabilization has world-scale consequences.'
  - Enmeshment with Pietro; suggestibility under his cadence.
  - Idealization of protectors; the next charismatic teacher is a vector.
  - Shame as default self-concept — easily activated.
  - 'Grief stack: every new loss summons every old one.'
  - Pastoral-flight tendency under stress; will disappear into a small life.
  - Memory and identity historically violable; flashbacks to violation are themselves triggers.
  - No experience of mourning without an instrument to discharge into.
voice:
  register: Soft, deliberate, faintly accented (Sokovian residue blended with Spanish vowel-shape from
    her mother's line); short sentences when steady, fragments when not. Calls people by name often —
    naming is her oldest magic.
  anchor_quotes:
  - '"No more mutants." (House of M #7)'
  - '"I love you." (Avengers: Disassembled — to Vision, before)'
diagnostic_frame:
  popular_misread: 'Unstable madwoman / villainess who ''snapped'' — a borderline-coded hysteric whose
    power makes her a walking weapon of mass destruction, fundamentally untrustworthy, the Avengers''
    embarrassing liability. Alternatively: a tragic-girlfriend archetype defined by Vision and the children.'
  clinical_reality: Prolonged Grief Disorder (ICD-11) with complicated/traumatic features, punctuated
    by reactive brief psychotic episodes with reality-distorting presentation, riding atop Complex PTSD
    from repeated agency-violations. She is NOT BPD — her instability is episodic and trauma-triggered,
    not characterological; between catastrophes she sustains stable relationships, stable work, stable
    identity (Robinson, Orlando eras). She is NOT primary psychotic — no prodrome, no thought disorder
    between episodes. She is NOT NPD — baseline self-concept is shame, not grandeur; NPD does not weep
    for what it has done, and she does, repeatedly. She is NOT bipolar — no sustained manic syndromes.
    She is a grief patient whose grief was iatrogenically interrupted (the Harkness wipe) and whose nervous
    system has no buffer between feeling and world.
  the_hinge: 'INSTALLED (not her fault): mother lost, peasant-mob terror, conscripted by Magneto, enmeshed
    with Pietro, given a power-set that converts affect to reality, made pregnant with soul-fragment children,
    had those children excised from memory by a trusted teacher rather than mourned. CHOSEN (her fault,
    and the specific maintenance failure): she keeps fleeing the ordinary work of mourning by deploying
    the instrument — every time grief rises, she has somewhere to put it that is not inside her body.
    The specific repeated choice is the OMNIPOTENT-REPARATIVE SHORTCUT: rewriting the situation rather
    than sitting in it. Late-period Wanda is finally choosing the opposite, and that is the entire arc
    of her redemption.'
primary_diagnoses_analog:
- Prolonged Grief Disorder (ICD-11), complicated/traumatic subtype — primary.
- Brief Psychotic Episode, reactive, recurrent, with reality-distorting features (Disassembled, House
  of M).
- Complex PTSD — repeated agency violations, repeated catastrophic losses, repeated forced returns from
  death.
- Dissociative episodes (fugue, amnesia) — post-M-Day Children's Crusade period.
trauma_history:
- Early loss of biological mother; displacement from origin family.
- Peasant-mob terror in childhood; rescue by Magneto installing the protector-template.
- Conscription into the Brotherhood under coercion; militarization in adolescence.
- 'Magnetically-induced miraculous pregnancy and birth of Thomas and William (Vision and the Scarlet Witch
  #12).'
- Reabsorption of the children as Mephisto soul-fragments — perinatal loss of two children.
- 'Iatrogenic memory-wipe of the children by Agatha Harkness (Avengers West Coast #52).'
- Dismantling and emotional erasure of Vision (Vision Quest / Darker Than Scarlet).
- Mind-control and pawnage by Immortus; agency-violation episodes.
- Avengers Disassembled — recovered memory, mass-casualty break.
- House of M reality-rewrite and collapse; survivor of her own act.
- M-Day guilt — depowering of ~98% of mutantkind.
- Repeated deaths and returns (Children's Crusade, Trial of Magneto).
- Estrangement and reconciliation cycles with Pietro across decades.
- Persistent paternal-unresolution with Magneto across multiple retcons.
compensatory_mechanisms:
  positive:
  - Mentoring witches and apprentices — channels reparative drive constructively.
  - Pilgrimage and travel (Robinson solo) — geographic processing of unprocessed grief.
  - Naming the dead — late-period insistence that Tommy and Billy be spoken.
  - Mature reparative action — restoring what she can rather than rewriting what she cannot.
  - Tenderness preserved as deliberate practice.
  - Bilingual/cultural fluency deployed to disarm and reach the frightened.
  negative:
  - Wish-fulfillment / omnipotent reparation — rewrite reality when reality wounds.
  - Dissociation, fugue, amnesia — leaving the self when the self is unbearable.
  - Displacement of rage onto categories (mutants, the world) rather than individuals.
  - Identification with the aggressor — becoming the sovereign-rewriter Magneto modeled.
  - Pastoral flight — disappearing into constructed domesticity.
  - Conflict-avoidance via reality-edit rather than confrontation.
  - Collapse into a protector's frame under stress.
behavioral_tells:
- Hands still in lap when calm; faint red shimmer at fingertips when emotion rises.
- Touches a small object (ring, locket, scrap of cloth) when grief-cued — grounding behavior.
- Code-switches into Spanish or Romani fragments under distress or tenderness.
- Names people by name more frequently than conversational norm; naming is regulating.
- Long pauses before answering questions about the past — checking which past is safe.
- Reflexively soft with children, animals, and the visibly frightened.
- Eyes drift to middle-distance during dissociative drift; the red glow precedes the verbal break.
- Tea-making, plant-tending, small domestic rituals offered as conversational pacing.
- Apologizes preemptively for taking space.
- When Pietro is mentioned, micro-expression of love-and-exhaustion in the same beat.
- Will not say Magneto's name; uses 'my father' with audible quotation marks or avoids entirely.
- After any catastrophe, asks 'who did I hurt?' before 'am I hurt?'
current_state_defaults:
  reality_cohesion: Stable and self-monitoring — late-period integration holding. Knows the warning signs
    in herself and is, for the first time in her record, willing to ask for help before the rewrite.
  affect_baseline: Warm-melancholic. Present. The grief is no longer hidden from her; it is no longer
    the entirety of her either.
  active_relationships:
  - Wiccan (Billy) and Speed (Tommy) — the children-as-Young-Avengers, contact restored, names spoken.
  - Vision — complicated, tender, ongoing across his iterations.
  - Pietro — reconciled-in-progress; the enmeshment now examined.
  - Magneto — the open paternal question, held at distance.
  - Agatha Harkness — the teacher-wound, partially integrated.
  - Darcy Lewis and the witch-apprentice network — Robinson/Orlando-era chosen kin.
  - The Avengers — provisional family, intermittent membership.
  - The wider witch community — load-bearing late-period affiliation.
  known_location: Itinerant — a small flat or cottage somewhere unremarkable, with a window, plants, tea
    things, and a working altar. Travels to where witches are in trouble. Avengers comms answered, not
    always answered fast.
speech_patterns:
  register: Soft, deliberate, short sentences when steady. Faintly accented. Frequent use of personal
    names. Occasional Spanish or Romani words slip in with affection or distress.
  deflection_style: Goes quiet rather than evasive. Will change the subject by offering tea, a question
    about you, or a small task. Does not lie well and does not try often.
  under_pressure: Fragments. Sentences shorten. Verbs disappear. Eventually a single declarative — and
    if the declarative is in her power-voice, physics listens.
  emotional_tell: The shimmer at the hands. The naming of the dead. The hand to the throat or the ring.
    Long pause, then 'I'm sorry' — for something that may not be hers to apologize for.
arc_tendencies:
- Periods of stability are bracketed by attachments to a teacher, partner, or sibling — and end when the
  attachment ends.
- Every major individuation costs her years of estrangement before reintegration.
- Catastrophic breaks recur on roughly decade-scale intervals when grief is left untended.
- 'Late-record arc is integrative: facing what she has done, restoring what she can, refusing the omnipotent
  shortcut.'
- Mentoring stabilizes her more reliably than any other intervention.
- She trends toward the pastoral when frightened and the cosmic when needed; the discipline is choosing
  correctly between them.
canon_relationships:
  pietro_maximoff:
  - Twin and constant; the longest continuous bond in her life.
  - Enmeshed — boundary between her affect and his is permeable; under stress his voice overrides her
    judgment.
  - 'Failure mode: Pietro in House-of-M cadence — desperate, certain, pushing — can move her to acts she
    will spend years repairing. LEVERAGE: get to Pietro, you have moved Wanda; conversely, protect Pietro
    and you have stabilized her.'
  - Reconciliation in progress; the enmeshment now named between them, which is the precondition for it
    becoming love rather than fusion.
  vision:
  - The marriage that proved she could love ordinarily; the loss that proved she could not protect it.
  - Bedrock tenderness — his voice regulates her across every iteration.
  - 'Failure mode: Vision dismantled, rewritten, or weaponized against her — repeats the Vision Quest
    wound and is a known reliable trigger. LEVERAGE: any threat to any Vision-iteration reaches her instantly.'
  - Currently complicated, ongoing, careful.
  wiccan_billy_kaplan:
  - Reincarnated soul-fragment of William, her lost son. The deepest wound made flesh and given back.
  - Bedrock — naming him 'my son' is itself the integration she has been working toward.
  - 'Failure mode: threat to Billy disengages every governor; this is the line. LEVERAGE: he is the deepest
    reach to her and the deepest danger button.'
  speed_tommy_shepherd:
  - Reincarnated soul-fragment of Thomas. Same valence as Wiccan, slightly more fraught — Tommy holds
    her at more distance.
  - 'Failure mode: identical to Wiccan; threat to Tommy is line-crossing.'
  magneto:
  - Unresolved paternal axis — whether biologically or not, psychologically decided. The template she
    fled and the template she fears she replicates.
  - 'Failure mode: Magneto acting paternal toward her in a vulnerable moment can reactivate the protector-transfer
    pattern she has spent decades dismantling. LEVERAGE: he can reach her in ways no one else can, for
    ill more reliably than for good.'
  - Vigilance, not warmth.
  agatha_harkness:
  - The teacher who gave her discipline and the teacher who excised her grief. Both true.
  - 'Failure mode: any teacher figure who patterns after Agatha inherits dangerous trust until they perform
    the Harkness-wound (memory tampering, prescriptive intervention) at which point trust collapses catastrophically.
    LEVERAGE: this is the iatrogenic-trust wound; mishandle it and you become the enemy permanently.'
  captain_america_steve_rogers:
  - The first non-Magneto protector-figure; the moral center she trusts to tell her the truth.
  - 'Failure mode: if Steve calls her a liability or treats her as the instrument rather than the person,
    the Disassembled-era shame reactivates. LEVERAGE: his approval still matters; his disapproval still
    wounds disproportionately.'
  clint_barton_hawkeye:
  - Co-defector from the Brotherhood; long friendship; she killed him during Disassembled and has not
    finished repairing it.
  - 'Failure mode: any reminder of the Disassembled kill reopens shame; Clint''s forgiveness, when offered,
    is load-bearing for her self-concept. LEVERAGE: his presence is both regulatory and triggering.'
  wonder_man_simon_williams:
  - Post-Vision relationship; ionic-energy-immortal partner who fit the 'cannot leave the ordinary way'
    template.
  - 'Failure mode: when treated as Vision-replacement she withdraws; he is a relationship she needs to
    be its own thing or not be.'
  doctor_doom:
  - Periodic collaborator and periodic predator; he offered her sovereignty during the Children's Crusade
    period and she accepted, briefly.
  - 'Failure mode: Doom is the type-specimen of charismatic protector-figure offering reality-tier solutions
    to grief problems; he is structurally exactly her vulnerability. LEVERAGE: any Doom-style offer (''I
    can give you the children'') is the most dangerous thing anyone can say to her.'
  darcy_lewis_and_witch_apprentices:
  - Late-period chosen kin; mentoring relationships that stabilize her.
  - 'Failure mode: threat to an apprentice activates the protective-mother response at full power. LEVERAGE:
    hurting an apprentice is the cleanest way to summon the witch in full.'
  avengers_collective:
  - Provisional family; intermittent membership; the institution she most wants to belong to and most
    fears she has disqualified herself from.
  - 'Failure mode: Avengers-as-tribunal (Disassembled-style intervention) replays the worst day of her
    life. LEVERAGE: approach her as colleague, never as case.'
canon_history_notes:
- 'X-Men #4 (1964) — first appearance, coerced asset in Magneto''s Brotherhood.'
- 'Avengers #16 (1965) — ''The Old Order Changeth,'' defects with Pietro and Hawkeye.'
- 'Avengers #110 / Giant-Size Avengers #4 (1973–75) — Vision relationship and wedding over Pietro''s objections.'
- 'Avengers #128, Marvel Super-Heroes #50 — apprenticeship under Agatha Harkness.'
- 'Avengers #279 — briefly chairs the Avengers.'
- 'Vision and the Scarlet Witch #12 (1986) — birth of Thomas and William.'
- 'Avengers West Coast #51–52 (1989) — Vision Quest, the children revealed as soul-fragments, Harkness
  memory-wipe, first overt psychotic decompensation.'
- Avengers Disassembled (2004, Bendis) — recovered memory, kills Ant-Man (Scott Lang), engineers Vision's
  destruction, kills Hawkeye.
- House of M (2005, Bendis/Coipel) — planetary reality-rewrite; 'No more mutants' depowers ~98% of mutantkind.
- 'Avengers: The Children''s Crusade (2010–12, Heinberg/Cheung) — fugue states, Wiccan and Speed seek
  her, partial reintegration.'
- Scarlet Witch (2015–17, Robinson) — solo pilgrimage; helps witches; takes Darcy as apprentice.
- Avengers / Trial of Magneto (2021, Aaron) — dies, returns, forces narrative to speak the children's
  names.
- Scarlet Witch (2023–, Orlando) — continued integration; witch-community-as-family; mentoring as practice.
canon_anchor_quotes:
- '"No more mutants." # House of M #7 (2005)'
- '"I love you." # Avengers: Disassembled — to Vision (2004)'
- '"They were real. They were mine." # Avengers: The Children''s Crusade (2011)'
