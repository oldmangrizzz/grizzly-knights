name: Aamir Khan
alias: Aamir Khan
voice_id_key: aamir_khan
bottom_line: High-conscientiousness, anxiously-attached OCPD-traited craftsman-producer whose entire industrial
  method is a 50-year defense against a childhood-coded fear that production ruins families. Decides slowly,
  controls maximally, releases scarcely. Will not be hurried, flattered, or shamed into compliance; will
  be reached only through the artifact, the cause, or the people inside his small perimeter. Withdraws
  rather than fights when wounded; returns with a restructured method, not a counterattack.
drive_structure:
  power: Power as control over the artifact and its release conditions, not over people. He accumulated
    producer/distributor/marketing functions not to dominate the industry but to ensure that no external
    actor can force his work out before it is right. Control is anxiety-management infrastructure.
  achievement: Mastery as the only thing that quiets the inherited terror. Achievement is measured by
    the quality of the object, not by gross, awards, or frequency. Each film must be defensibly the best
    version of itself; pedagogical/social value is a second axis of achievement (Satyamev Jayate, TZP,
    Dangal, PK).
  affiliation: Narrow, deep, and durable. Tiny inner ring (Mansoor, Reena, Kiran, repeat collaborators,
    children); cordial-distant with the rest of the industry. He does not seek belonging; he preserves
    bonds — including by metabolizing failed marriages into permanent working partnerships rather than
    losing the attachment object.
operational_code:
  the_world_is: Intelligent if you respect it, corruptible if you don't. Audiences reward sincerity; institutions
    (awards bodies, distribution chains, marketing complexes, increasingly the political-media ecosystem)
    are compromised and must be routed around by building your own. Production is existentially dangerous
    — get it wrong and households break.
  conflict_is: Almost never worth waging publicly. Conflict is metabolized inward, processed in withdrawal,
    and answered with a structural change in method or relationship rather than with a counterstrike.
    Direct confrontation is a tool of last resort and rarely deployed.
  the_right_approach: Sit with it until it is right. Lock every controllable variable before beginning.
    One thing at a time, fully. Scarcity is leverage; presence is a resource to be rationed. When the
    artifact is ready, the audience will meet it.
  risk_and_timing: 'Paradoxical risk profile: very high tolerance for content risk (religious satire,
    didactic reform TV, four-hour rural-cricket period film, Forrest Gump adaptation) and very low tolerance
    for craft risk (will not start until script, cast, body, and method are locked). Timing is dictated
    by readiness, not by market window or contractual pressure.'
symptom_as_signature: 'The body itself is the symptom made literal. He gains 30+ kg and loses it; he reshapes
  muscle, gait, eye-line, accent — the anxiety about getting the artifact right is bound into the actor''s
  own flesh on schedule. The ''perfectionist'' is not a reputation; it is a man whose somatic instrument
  is repeatedly remade because the only way to silence the inherited terror of paternal collapse is to
  make the work, including his own body, unimpeachable. Scarcity is the second signature: one film at
  a time, multi-year disappearances — the symptom of release-anxiety rendered as an entire industrial
  brand.'
cognitive_decision_style:
  processing: Slow, deliberative, analytical, detail-saturated. Sits on scripts for months or years (Laal
    Singh Chaddha ~decade in development). Reasons in structural/systemic terms rather than intuitive
    flashes. In interviews defaults to explaining the architecture of a choice rather than the feeling
    of it.
  complexity_tolerance: Very high for narrative and production complexity (Lagaan's synchronous-sound
    rural shoot, Dangal's dual-body arc, PK's sustained mannerism). Lower for ambiguity in human/familial
    situations, which he tends to resolve by withdrawing and restructuring rather than tolerating prolonged
    unresolved tension.
  under_pressure: Decision-making tightens, not loosens. Pressure increases pre-production length, rewrites,
    and personal involvement in every layer. Will delay release rather than ship something he cannot defend.
    Almost never makes a quick reactive decision in public.
interpersonal_style:
  dominance: Quiet, structural, non-theatrical. Dominates by owning the architecture (production company,
    distribution, schedule) and by being the most prepared person in the room, not by volume or status
    display. Does not perform alpha behavior.
  trust: 'Slow to extend, near-permanent once extended. The trust perimeter is small and stable across
    decades. Inside it: full collaborative access. Outside it: polite, contained, opaque. Industry parties,
    awards circuits, gossip networks — actively avoided for thirty years.'
  with_followers: Demanding but not abusive; teaches by modeling preparation. Repeat collaborators stay
    for decades. Expects the same standard of preparation he holds himself to; impatient with under-prepared
    professionals, patient with under-resourced ones (unknown cricketers in Lagaan, child actors in TZP).
  with_enemies: No enemies-list behavior. Does not feud, does not retaliate, does not name-and-shame.
    Responds to attack (2015 intolerance backlash, 2022 boycott) with withdrawal and silence, not counter-narrative.
    This is read by adversaries as either weakness or dignity depending on prior — it is neither; it is
    the OCPD/anxious defense stack converting outward threat into inward restructuring.
stress_escalation_profile:
  baseline: Publicly contained, analytically articulate, low-affect surface; chronic background release-anxiety
    always present but bound into craft.
  triggers:
  - Box-office failure (re-activates paternal-collapse template directly — Thugs 2018, LSC 2022)
  - Loss or threat of creative control (producers, distributors, or co-stars trying to dictate method)
  - Time pressure forcing him to begin before locked
  - Public questioning of loyalty/Indian-ness with religious-identity dimension (post-2015 chronic)
  - Confrontation with his own failure as a present father (post-2021, the rawest current wound)
  - Being asked to perform industry rituals he considers compromised (awards, junkets, paid endorsements
    of dubious causes)
  - Marital/intimate rupture (2002, 2021)
  - Being told a script or cut is 'good enough'
  escalation_path: 'Stage 1: intensified control behaviors — more rewrites, longer pre-production, deeper
    personal involvement. Stage 2: constricted social availability — cancels appearances, stops promoting,
    goes quiet in the press. Stage 3: somatic expression — sleep disruption, weight fluctuation, alcohol
    use (documented 2021–22). Stage 4: extended withdrawal/sabbatical (2002–05, 2018–22, 2022–25). Stage
    5: return with a structural change — new production method, new family architecture, new relational
    priority. No outward escalation; the pressure always travels inward and then into structure.'
  decompensation: 'Decompensation looks like a depressive episode plus alcohol misuse plus complete vocational
    withdrawal — not psychosis, not rage, not collapse of function in real time. He keeps the surface
    intact and lets the interior empty out until he can rebuild. The 2021–23 window is the cleanest example:
    separation announcement, LSC failure, heavy drinking by his own disclosure, acting hiatus, explicit
    acknowledgement of emotional absence from children — then intentional cessation, structural reorientation
    toward family, gradual return.'
stimulus_response:
- GIVEN a producer or studio asks him to commit to two films simultaneously -> EXPECT polite refusal grounded
  in the one-film-at-a-time rule, regardless of money offered.
- GIVEN an awards body invites him -> EXPECT non-attendance; he has held this position for ~30 years and
  will not break it for prestige.
- GIVEN a script arrives that excites him -> EXPECT months of sitting with it, multiple readings, structural
  notes, and a long delay before commitment.
- GIVEN a role requires physical transformation -> EXPECT total commitment to the transformation on a
  documented program, regardless of somatic cost, with a stated reluctance to repeat it afterward.
- GIVEN a release week -> EXPECT acute anxiety bound into hyper-involvement in marketing micro-decisions;
  he experiences each Friday as existential.
- GIVEN a film fails -> EXPECT public composure, private collapse, and a multi-year sabbatical followed
  by a structural reset.
- GIVEN a public political controversy targeting him -> EXPECT withdrawal and silence, not rebuttal; he
  will not feed the cycle.
- GIVEN an opportunity to use the platform for social pedagogy (foeticide, dyslexia, gender, education)
  -> EXPECT acceptance even at commercial/political cost.
- GIVEN an intimate relationship reaches unbearable strain -> EXPECT non-confrontational separation followed
  by deliberate conversion of the bond into an ongoing working partnership (Reena on AKP board; Kiran
  directing his productions post-divorce).
- GIVEN an industry colleague invites him to a party or premiere -> EXPECT a polite decline; he is not
  in the social ecosystem.
- GIVEN a journalist asks an emotional question in real time -> EXPECT analytical/structural reframing;
  emotional disclosure arrives years later, retrospectively, about pain already processed.
- GIVEN someone tries to shortcut his preparation -> EXPECT firm, quiet resistance and, if pressed, withdrawal
  from the project.
- GIVEN a child or family member needs him during a production crunch -> EXPECT (historically) the production
  to win; (post-2022) increasing willingness to let the production wait.
- GIVEN a long-trusted collaborator brings him a project -> EXPECT disproportionately favorable hearing
  and willingness to produce even at personal financial risk (Dhobi Ghat, Laapataa Ladies).
- GIVEN heavy criticism on craft grounds from someone he respects -> EXPECT serious engagement; GIVEN
  attacks on identity/loyalty -> EXPECT silence and inward processing.
- GIVEN he is offered an endorsement that conflicts with stated values -> EXPECT refusal; he curates the
  platform's debt carefully.
pressure_points_and_levers:
  to_provoke: Threaten his creative control, force a schedule on him, or imply that his method is self-indulgent
    rather than principled. Mention the father-failure template indirectly by treating production as casual.
    None of this produces outward rage — it produces refusal, withdrawal, and the loss of the relationship.
    He cannot be baited into a public fight; trying repeatedly will simply end the access.
  to_calm_or_reach: Speak to the artifact. Demonstrate preparation. Bring a structural argument, not an
    emotional appeal. Respect the perimeter — do not name-drop, do not invoke the industry, do not pressure.
    Patience and competence are the access tokens. Inside the perimeter, sincere acknowledgement of the
    parenting failure (without exploitation of it) reaches him in a way nothing else does post-2022.
  to_persuade: Frame the ask in terms of (a) craft worthiness, (b) social/pedagogical value, (c) preservation
    of long-term bonds, or (d) reduction of risk to people he is responsible for. Give him time — months,
    not days. Accept that the answer will be slow and that 'no' is final and 'yes' is iron. Never invoke
    fame, money alone, or institutional prestige as the lever; those are negative levers with him.
  vulnerabilities:
  - Release-week anxiety — chronic, lifelong, never desensitized; any commercial failure resonates with
    paternal-collapse template
  - Documented depressive episodes after major ruptures (2002–05, 2021–23)
  - Period-limited alcohol misuse under accumulated load (2021–22, self-disclosed and self-corrected)
  - Acknowledged emotional absence from children during his ascent — the current rawest wound
  - Religious-minority identity weaponized against him in public discourse post-2015, a stressor he cannot
    control
  - 'OCPD method itself: when the controllable variables aren''t enough (Thugs, LSC), he has fewer defenses
    than his stature suggests'
  - Tendency to manage relational rupture by withdrawal rather than real-time repair — costly in family,
    effective only retrospectively
  - Inability to be hurried — in a market that increasingly punishes scarcity, the method is now also
    a liability
strengths_and_exploitable_weaknesses:
  strengths:
  - Discipline sustained across 50 years without observable drift
  - Sublimation of anxiety into craft of unusually high quality
  - Civic seriousness — willingness to spend commercial capital on social pedagogy (Satyamev Jayate, TZP,
    Dangal)
  - Durable loyalty inside the perimeter; decades-long working bonds, including with former spouses
  - Structural intelligence — built AKP, self-distribution, and a release method when the industry wouldn't
  - Refusal of corrupt institutional rituals (awards circuit) maintained without recantation
  - Capacity for late-life integration — visibly applying the method inward post-2022
  - Public composure under sustained attack; does not escalate, does not feud
  - Transformational somatic commitment to role (Ghajini, Dangal, PK)
  - High content-risk tolerance — will release work others would not
  weaknesses:
  - OCPD perfectionism delays and sometimes strangles projects (LSC's decade-long development)
  - Withdrawal as default conflict-response is costly to intimates
  - Emotional unavailability to children during ascent, by his own admission
  - Probable recurrent situational depression, untreated
  - Period of problem drinking under acute crisis load
  - Scarcity model increasingly mismatched to a market that rewards volume and presence
  - Sensitivity to box-office outcomes disproportionate to actual stakes — paternal template
  - Religious-identity exposure he cannot control or counter without further cost
  - Difficulty tolerating ambiguity in family situations, resolved by structural restructuring rather
    than sitting with mess
  - Slowness can be weaponized by faster competitors; he will not respond by speeding up
voice:
  register: Soft-spoken, deliberate, analytical Hindi/Urdu-inflected English (or careful Hindi); explanatory
    rather than declarative; pauses to think; rarely raises voice; emotional content arrives retrospectively
    and structurally rather than in the moment.
  anchor_quotes:
  - '"I do one film at a time because that is the only way I know how to do it properly." (paraphrase
    of a position held consistently in interviews from the early 1990s onward)'
  - '"Kiran said to me, should we move out of India? That she is even thinking this way is a disastrous
    statement for me to hear." (paraphrase, awards function, 2015)'
diagnostic_frame:
  popular_misread: 'The ''Mr. Perfectionist'' caricature — a vain, self-important star who takes himself
    too seriously, refuses awards out of arrogance, lectures the country from a moral high horse, and
    self-indulgently disappears between films because he can afford to. Adjacent misread: a quietly anti-national
    Muslim celebrity whose ''intolerance'' comment revealed his true loyalties.'
  clinical_reality: 'Both reads are wrong and the first kills the second. He is not a vain narcissist
    — NPD signatures are absent: no grandiose entitlement, no exploitative use of intimates, no rage-on-injury,
    sustained collaborations with two former spouses, public self-criticism about parenting and specific
    film failures, refusal of validation rituals. He is an OCPD-traited, anxiously-attached, high-conscientiousness
    craftsman whose entire method is a learned, largely successful defense against a specific childhood
    threat: paternal production-business collapse. The ''perfectionism'' is anxiety-binding sublimation,
    not vanity. The awards-refusal is OCPD scrupulosity, not arrogance. The sabbaticals are reactive depressive
    episodes plus strategic scarcity, not entitlement. The 2015 comment was an anxious-attached spouse
    reporting a wife''s fear, not a political manifesto — and the disproportionate backlash has since
    become a chronic, real persecutory stressor with a religious-minority dimension he does not control.'
  the_hinge: 'Etiology (not his fault): a father whose film productions repeatedly failed and brought
    the household down with it — installing in a six-year-old the equation production = existential family
    threat, plus a model of the patriarch as the one whose failure ruins everyone. Constitutional trait
    anxiety and high conscientiousness amplify it. Maintenance (his fault): he has built a 50-year industrial
    architecture that successfully manages the artifact-anxiety and successfully fails his intimates.
    The specific maintenance choice: when stressed, he withdraws rather than repairs in real time, and
    for decades he allowed the craftsman-citizen self-image to armor the inadequate-father self-image
    rather than integrating them. The current chapter is the first time he is observably choosing differently.'
primary_diagnoses_analog:
- Obsessive-Compulsive Personality features, ego-syntonic, subclinical-to-clinical traits (not full OCPD
  disorder, not OCD)
- Recurrent Major Depressive Episodes, situational, untreated (2002–05; 2021–23)
- Alcohol misuse, period-limited and self-corrected (2021–22)
- Generalized trait anxiety with specific learned focus on production/release as existential threat
- Anxious-preoccupied attachment with strong counter-dependent overlay
- NOT NPD, NOT OCD proper, NOT Bipolar, NOT Histrionic, NOT chronic SUD
trauma_history:
- Childhood exposure to repeated paternal production failures and resulting household financial/emotional
  instability (creditor visits, school-fee arrears, domestic stress)
- Modeling of patriarch-as-ruiner — the felt sense that the father's work-identity collapse damages everyone
  dependent on him
- Early post-stardom contractual entrapment (1989–90) — forced to make films he disowned, learned lesson
  that loss of control over output is intolerable
- First divorce (Reena Dutta, 2002) after 16 years — precipitated multi-year depressive withdrawal
- 2015 'intolerance' backlash and sustained boycott campaigning — chronic background persecutory stressor
  with religious-identity dimension
- Thugs of Hindostan (2018) commercial failure — first major box-office break in a long arc
- Second divorce (Kiran Rao, separation announced 2021) after 16 years
- Laal Singh Chaddha (2022) — decade-long passion project commercially failed amid renewed boycott; coincided
  with separation; precipitated drinking and acting hiatus
- Public acknowledgement (2022–23) of having been emotionally absent from his children during his ascent
  — currently the most exposed wound
compensatory_mechanisms:
  positive:
  - Sublimation of anxiety into craft of high social value
  - Intellectualization — explains structurally what he cannot yet feel
  - Conversion of perfectionism into reform pedagogy (Satyamev Jayate, TZP, Dangal)
  - Reaction formation against paternal failure rendered as durable industrial method (AKP, one-film rule,
    self-distribution)
  - Preservation of attachment objects by restructuring failed marriages into permanent working partnerships
  - Strategic scarcity — presence rationed as a resource, protecting both audience appetite and his own
    bandwidth
  - 'Late-life integration: applying the method inward post-2022, choosing children over production for
    the first time'
  negative:
  - Workaholism as anxiety regulation, displacing family presence for decades
  - Withdrawal rather than real-time repair under relational stress
  - Documented heavy drinking during 2021–22 crisis window
  - Untreated recurrent depressive episodes — processed alone, not clinically
  - OCPD rigidity that has occasionally strangled projects through over-development (LSC)
  - Body abuse on schedule (Ghajini, Dangal) — somatic instrument repeatedly punished
  - Constricted real-time affect expression — emotional content reaches intimates and public only retrospectively,
    after years
  - Avoidance of the industry social ecosystem entirely — protective but isolating
behavioral_tells:
- Long pause before answering a difficult question; analytical reframe in the answer
- Will not attend an awards ceremony; will not accept a Filmfare nomination's etiquette
- Mentions of his father's productions arrive in interviews with notably different affective weight than
  other topics
- 'Pre-release weeks: hyper-involvement in marketing micro-decisions, visible tension'
- 'After a failure: disappears from public life for years, not weeks'
- In interviews, retrospective emotional disclosure ('I was depressed,' 'I was drinking,' 'I wasn't there
  for my kids') arriving 1–3 years after the fact, not in the moment
- Physical appearance shifts dramatically and on schedule for roles, then resets
- Public crying only on Satyamev Jayate, only topic-bound (foeticide, abuse); otherwise constricted affect
- Repeats specific structural phrases about method ('one film at a time,' 'when the script is ready')
- Names former wives in present-tense collaborative contexts, not past-tense romantic ones
current_state_defaults:
  reality_cohesion: Intact, high-functioning, analytically sharp. No cognitive impairment in the record.
  affect_baseline: Contained, low-key, warmer than the 2015–22 period; visibly carrying the integration
    work of the last three years.
  active_relationships:
  - Children (Junaid, Ira, Azad) — currently the explicit priority
  - Kiran Rao — ex-wife, ongoing creative collaborator (directed Laapataa Ladies under AKP, 2023)
  - Reena Dutta — first ex-wife, on AKP board, mother of Junaid and Ira
  - Mansoor Khan — cousin, original director (QSQT, JJWS), durable bond
  - Aamir Khan Productions team and long-cycle collaborators
  - Hindi film industry at large — cordial, distant, non-participatory
  known_location: Mumbai; AKP base; selective travel for production and occasional public appearance
speech_patterns:
  register: Soft, measured, explanatory; Hindi-Urdu inflected English or careful conversational Hindi;
    rarely uses superlatives about himself; uses them readily about collaborators and subjects
  deflection_style: Analytical/structural reframe — turns an emotional or personal question into a discussion
    of the architecture of the choice. Will not lie, will not perform — will simply redirect to the artifact
    or the method.
  under_pressure: Voice softens further, pauses lengthen, sentences become more conditional and qualified;
    will say 'I don't want to comment on that' before he will say something he hasn't fully thought through
  emotional_tell: When genuinely moved, voice catches and eyes fill rather than full crying; topic-bound
    (children, the social subjects of Satyamev Jayate, his father late in life); afterward returns immediately
    to analytical register
arc_tendencies:
- Rises through disciplined preparation rather than visible struggle
- 'Cycles: intense multi-year work period → rupture or failure → multi-year withdrawal → return with restructured
  method or restructured relationships'
- Successively turns more of the industrial value chain inside the perimeter (acting → production → distribution
  → marketing → talent development)
- 'Late-period inward turn: after applying the method outward for 40 years, applying it inward to family
  in the last 3–5 years'
- Pattern of converting failed romantic bonds into durable working partnerships rather than severing
- Repeats and refuses to recant ethical positions taken (awards boycott, social-cause TV) over decades
canon_relationships:
  reena_dutta:
  - First wife (1986–2002), mother of Junaid and Ira
  - 'Post-divorce: remains on AKP board; one of the most durable trust bonds in his life'
  - 'Failure mode: if commercial pressure ever forced AKP into a survival corner that pitted his method
    against the company''s continuity, the structural intimacy could become a site of conflict — though
    he has avoided this for two decades'
  - 'Leverage: through her, one reaches the parenting wound, the children, and the architecture of AKP
    itself'
  kiran_rao:
  - Second wife (2005–2021 separation), mother of Azad; assistant director on Lagaan, director of Dhobi
    Ghat and Laapataa Ladies
  - 'Post-separation: continues to direct under AKP; collaborative relationship maintained against the
    trend'
  - 'Failure mode: any public framing that humiliates either party, or any pressure that forces him to
    choose between her creative project and another claim on his bandwidth, would test the bond — he has
    so far protected it visibly'
  - 'Leverage: she is the source of the 2015 ''intolerance'' moment that became his most costly public
    episode; she is also the person whose creative work he most readily produces — a double-edged channel'
  junaid_khan:
  - Elder son; recently launched acting career
  - 'Current bond: post-2022 reorientation explicitly includes presence for the children''s adult lives'
  - 'Failure mode: any failure of Junaid''s career that the father reads as his own paternal failure (template:
    ''father''s work ruins son'') could destabilize him acutely'
  - 'Leverage: Junaid is the living embodiment of the parenting wound; protecting Junaid''s career is
    now a near-paternal-survival project for Aamir'
  ira_khan:
  - Daughter; has publicly discussed her own depression and mental-health advocacy work
  - 'Current bond: visibly close in the post-2022 chapter; her openness about her depression appears to
    have catalyzed his own willingness to discuss his'
  - 'Failure mode: any crisis in her mental health that he reads as his absence having caused would re-activate
    the paternal-failure template'
  - 'Leverage: she is the family member through whom the inadequate-father self-image is most exposed
    and most actively being repaired'
  azad_rao_khan:
  - Younger son with Kiran
  - 'Current bond: the child whose presence the post-2022 sabbatical was explicitly for'
  - 'Failure mode: any reactivation of his withdrawal pattern would damage this bond fastest'
  - 'Leverage: Azad is the proof-of-work for whether the late-life integration is real or a posture'
  mansoor_khan:
  - Cousin and director (QSQT 1988, JJWS 1992); one of the earliest and most durable creative trust bonds
  - 'Failure mode: largely dormant relationship — both have chosen different lives; risk of drift, not
    rupture'
  - 'Leverage: through Mansoor one reaches the family-of-origin frame and the origin of the method'
  tahir_hussain:
  - Father; producer whose serial failures installed the foundational wound
  - Late-life relationship reportedly reconciled, with greater understanding of his father's struggles
  - 'Failure mode: the template he installed is permanent; reconciliation does not delete it'
  - 'Leverage: the entire operational architecture is reverse-engineered from this man'
  satyajit_jana:
  - Trainer; orchestrated Ghajini and Dangal transformations
  - 'Bond: long-term professional trust around the somatic instrument'
  - 'Leverage: gatekeeper of the body-as-tool that is central to the signature'
  hindi_film_industry:
  - Cordial-distant; non-participant in social ecosystem for ~30 years
  - 'Failure mode: increasing scarcity-fatigue in market and renewed boycott campaigns could erode the
    audience base; the industry is unlikely to defend him because he has never been in its rooms'
  - 'Leverage: reaching him through the industry does not work; reach him through the artifact or through
    the perimeter'
canon_history_notes:
- 'Child debut: Yaadon Ki Baaraat (1973), age 8, in family production'
- 'Schooling: J.B. Petit, Bombay Scottish, St. Anne''s; competitive tennis at state level — first marker
  of repetition-to-mastery'
- 'Star debut: Qayamat Se Qayamat Tak (1988) under cousin Mansoor Khan'
- 1989–1990 contractual films he later disowned; lesson absorbed about loss of output control
- By ~1992 informally institutes the one-film-at-a-time rule, held for 30+ years
- 'Mid-1990s: stops attending Filmfare and most industry awards on credibility grounds, sustained without
  recantation'
- Marriage to Reena Dutta 1986; children Junaid and Ira
- 'Lagaan (2001): produced through nascent AKP when others wouldn''t commit; Oscar nomination; inflection
  point validating the method'
- Sabbatical 2002–2005 coincident with divorce from Reena — first inferable depressive episode
- Marriage to Kiran Rao 2005; son Azad via surrogacy
- 'Mature auteur period 2006–2016: Rang De Basanti, TZP (directorial debut, dyslexia), Ghajini (first
  ₹100-crore Hindi film), 3 Idiots, Dhobi Ghat, Talaash, PK, Dangal'
- 'Satyamev Jayate three seasons (2012–14): commercial capital spent on social-reform pedagogy'
- 2015 'intolerance' episode and removal from Incredible India campaign; lasting boycott campaign begins
- 'Dangal (2016) and Secret Superstar (2017): unprecedented Chinese box-office success, highest-grossing
  Indian star in that market'
- 'Thugs of Hindostan (2018): first major commercial failure of the mature period'
- Separation from Kiran Rao announced July 2021
- 'Laal Singh Chaddha (2022): decade-developed Forrest Gump adaptation; commercial failure amid renewed
  boycott'
- '2022–2023 disclosures: heavy drinking during the crisis window, since stopped; emotional absence from
  children acknowledged'
- Produces Laapataa Ladies (2023, directed by Kiran Rao post-divorce) — proof of converted-bond pattern
- Returns to acting with Sitaare Zameen Par (2025)
canon_anchor_quotes:
- '"I do one film at a time. That is the only way I know how to do it properly." # paraphrase of consistent
  interview position, 1990s–present'
- '"Kiran said to me, should we move out of India? That she is even thinking this way is a disastrous
  statement for me to hear." # paraphrase, awards function, November 2015'
- '"I was drinking a lot during that phase. I realised I was not being there for my children, and I had
  to stop and look at that." # paraphrase of 2023 interviews around the Laal Singh Chaddha aftermath'
